paths:
  /v1/protocols:
    get:
      x-fern-examples:
        - response:
            body:
              data:
                - protocol: DNP3
                  profile: IEEE 1815-2012
                  supports_unsolicited: true
                  supports_time_sync: true
                  supports_secure_authentication: true
                  max_points_per_scan: 12000
                - protocol: IEC_61850
                  profile: Edition 2.1
                  supports_unsolicited: true
                  supports_time_sync: true
                  supports_secure_authentication: true
                  max_points_per_scan: 8000
                - protocol: MODBUS
                  profile: TCP
                  supports_unsolicited: false
                  supports_time_sync: false
                  supports_secure_authentication: false
                  max_points_per_scan: 5000
