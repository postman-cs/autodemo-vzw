repo_flag: vzw-partner-demo
service:
  name: VZW Telemetry Ingest API
  slug: vzw-telemetry-ingest-api
  runtime: ecs_service
  insights_enabled: true
  visibility: internal
  deployable: true
  spec_path: openapi/openapi.yaml
  portal_role: internal-catalog
  fern_slug: vzw-telemetry-ingest-api
upstream_dependencies:
  - name: patient-vitals-pipeline
    kind: data-stream
    purpose: Streams heart rate, blood pressure, SpO2 from ambulance onboard sensors.
  - name: connectivity-quality-store
    kind: data-store
    purpose: Records per-device signal strength, QoD session health, and handoff events.
  - name: alert-routing-engine
    kind: internal-api
    purpose: Evaluates telemetry against thresholds and dispatches alerts to ER staff.
  - name: telemetry-archive-lake
    kind: data-store
    purpose: Long-term storage for compliance and post-incident review.
derived_specs:
  enabled: true
  source: openapi/openapi.yaml
