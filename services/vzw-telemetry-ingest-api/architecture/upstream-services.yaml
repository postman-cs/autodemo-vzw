services:
  - name: patient-vitals-pipeline
    data_owner: ambulance sensor platform
    records:
      - unit_id
      - patient_encounter_id
      - heart_rate_bpm
      - blood_pressure_systolic
      - blood_pressure_diastolic
      - spo2_percent
      - observed_at
  - name: connectivity-quality-store
    data_owner: Verizon network telemetry
    records:
      - unit_id
      - signal_strength_dbm
      - qod_session_health
      - handoff_event_count
      - packet_loss_percent
      - measured_at
  - name: alert-routing-engine
    data_owner: emergency response operations
    records:
      - alert_id
      - unit_id
      - severity
      - threshold_name
      - routed_to
      - routed_at
  - name: telemetry-archive-lake
    data_owner: compliance and incident review
    records:
      - ingestion_batch_id
      - unit_id
      - payload_hash
      - archived_at
      - retention_class
