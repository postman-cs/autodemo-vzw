        operator_id:
          type: string
          minLength: 3
          maxLength: 64
        ack_reason:
          type: string
          minLength: 5
          maxLength: 500
    AcknowledgeAlertResponse:
      type: object
      additionalProperties: false
      required:
        - alert_id
        - status
        - acknowledged_by
        - ack_reason
        - acknowledged_at
      properties:
        alert_id:
          type: string
          minLength: 10
          maxLength: 64
        status:
          type: string
          enum:
            - acknowledged
        acknowledged_by:
          type: string
          minLength: 3
          maxLength: 64
        ack_reason:
          type: string
          minLength: 5
          maxLength: 500
        acknowledged_at:
