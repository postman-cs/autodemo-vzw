        p95_packet_loss_pct:
          type: number
          format: float
        max_packet_loss_pct:
          type: number
          format: float
        active_alert_count:
          type: integer
          minimum: 0
        resolved_alert_count:
          type: integer
          minimum: 0
    SeverityBreakdown:
      type: object
