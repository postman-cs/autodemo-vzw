                name: "Consumer Risk Weekly Digest"
                type: "SCHEDULED"
                format: "CSV"
                status: "ACTIVE"
                sections:
                  - "USAGE"
                  - "ERRORS"
                  - "ANOMALIES"
                  - "FORECASTS"
                scope:
                  consumer_ids:
                    - "con_8b6c1f3a"
                    - "con_920d31ab"
                  product_ids:
                    - "prd_dispatch"
                window:
                  relative_days: 7
                schedule:
                  cadence: "WEEKLY"
                  timezone: "UTC"
                  day_of_week: "MONDAY"
                  hour_utc: 6
                delivery:
                  channel: "EMAIL"
                  recipients:
                    - "ops-partner-analytics@verizon.com"
                created_at: "2026-03-27T12:06:00Z"
                updated_at: "2026-03-27T12:06:00Z"
                next_run_at: "2026-03-31T06:00:00Z"
        "400":
          $ref: "#/components/responses/400"
