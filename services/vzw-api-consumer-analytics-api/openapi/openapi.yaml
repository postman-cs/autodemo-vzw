openapi: 3.0.3
info:
  title: VZW API Consumer Analytics API
  description: >-
    Provides usage analytics, error intelligence, anomaly detection, and quota exhaustion forecasts
    for Verizon partner API consumers. The API is designed for partner operations teams that need
    measurable adoption trends, service quality indicators, and proactive capacity planning insights
    across products, apps, and consumer organizations.
  version: 1.0.0
  contact:
    name: Verizon API Platform - Analytics Engineering
    email: api-platform-analytics@verizon.com
    url: https://developer.verizon.com
  license:
    name: Proprietary
    url: https://www.verizon.com/business/terms/
  x-catalog-id: vzw-api-consumer-analytics-api
  x-domain: analytics
servers:
  - url: https://vzw-api-consumer-analytics-api.api.verizon.com/v1
    description: Production
  - url: https://vzw-api-consumer-analytics-api.staging.api.verizon.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Consumer Usage
    description: Consumer-level usage and latency analytics for partner API applications
  - name: Error Analysis
    description: Error trend analysis, categorization, and reliability indicators
  - name: Adoption
    description: Product adoption and consumer engagement metrics across partner channels
  - name: Anomaly Detection
    description: Statistical detection of usage or reliability anomalies in partner traffic
  - name: Forecasts
    description: Predictive analytics for quota exhaustion and capacity risk management
  - name: Reports
    description: Scheduled and ad-hoc report management for analytics exports and summaries
paths:
  /v1/consumers/{consumerId}/usage:
    get:
      operationId: getConsumerUsageAnalytics
      summary: Get usage analytics for a consumer
      description: >-
        Returns aggregated usage metrics for a specific API consumer over a requested time window.
        Supports hourly, daily, and weekly bucketing and includes percentile latency fields such as
        p50_latency_ms and p99_latency_ms, error_rate_pct, and active_app_count to help operations
        teams evaluate usage intensity and service quality over time.
      tags:
        - Consumer Usage
      parameters:
        - $ref: "#/components/parameters/ConsumerId"
        - $ref: "#/components/parameters/StartTime"
        - $ref: "#/components/parameters/EndTime"
        - $ref: "#/components/parameters/Granularity"
        - $ref: "#/components/parameters/ProductIdFilter"
        - $ref: "#/components/parameters/IncludePercentiles"
      responses:
        "200":
          description: Consumer usage analytics retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsumerUsageResponse"
              example:
                consumer_id: "con_8b6c1f3a"
                window_start: "2026-03-20T00:00:00Z"
                window_end: "2026-03-27T00:00:00Z"
                granularity: "DAY"
                summary:
                  total_request_count: 190245
                  total_error_count: 2291
                  error_rate_pct: 1.2
                  avg_latency_ms: 84.3
                  p50_latency_ms: 71.0
                  p95_latency_ms: 164.7
                  p99_latency_ms: 240.2
                  active_app_count: 11
                buckets:
                  - bucket_start: "2026-03-20T00:00:00Z"
                    bucket_end: "2026-03-21T00:00:00Z"
                    request_count: 27011
                    success_count: 26706
                    error_count: 305
                    error_rate_pct: 1.13
                    p50_latency_ms: 69.2
                    p99_latency_ms: 219.4
                    active_app_count: 9
                  - bucket_start: "2026-03-21T00:00:00Z"
                    bucket_end: "2026-03-22T00:00:00Z"
                    request_count: 26110
                    success_count: 25795
                    error_count: 315
                    error_rate_pct: 1.21
                    p50_latency_ms: 72.3
                    p99_latency_ms: 228.8
                    active_app_count: 10
                trace_id: "4126f1f2-6087-4b73-b026-37a2f8f02f82"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "422":
          $ref: "#/components/responses/422"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /v1/consumers/{consumerId}/errors:
    get:
      operationId: getConsumerErrorAnalytics
      summary: Get error analytics for a consumer
      description: >-
        Returns categorized error metrics for an API consumer, including error rates by product,
        endpoint, and normalized error codes. This endpoint supports remediation workflows by
        exposing trending reliability degradation and top recurring failures.
      tags:
        - Error Analysis
      parameters:
        - $ref: "#/components/parameters/ConsumerId"
        - $ref: "#/components/parameters/StartTime"
        - $ref: "#/components/parameters/EndTime"
        - $ref: "#/components/parameters/ProductIdFilter"
        - $ref: "#/components/parameters/ErrorCodeFilter"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Consumer error analytics retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsumerErrorsResponse"
              example:
                consumer_id: "con_8b6c1f3a"
                window_start: "2026-03-20T00:00:00Z"
                window_end: "2026-03-27T00:00:00Z"
                total_request_count: 190245
                total_error_count: 2291
                error_rate_pct: 1.2
                top_errors:
                  - code: "UPSTREAM_TIMEOUT"
                    category: "UPSTREAM"
                    http_status: 504
                    count: 632
                    error_rate_pct: 0.33
                    impacted_endpoint_count: 4
                    trend_direction: "UP"
                  - code: "RATE_LIMIT_EXCEEDED"
                    category: "THROTTLING"
                    http_status: 429
                    count: 541
                    error_rate_pct: 0.28
                    impacted_endpoint_count: 6
                    trend_direction: "FLAT"
                endpoints:
                  - product_id: "prd_dispatch"
                    endpoint: "GET /v2/dispatch/tasks"
                    request_count: 82111
                    error_count: 1177
                    error_rate_pct: 1.43
                    p99_latency_ms: 304.1
                pagination:
                  next_cursor: "eyJvZmZzZXQiOjIwfQ=="
                  limit: 20
                trace_id: "f659e7ad-cf11-45c1-a980-24fe83b4f393"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "422":
          $ref: "#/components/responses/422"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /v1/products/{productId}/adoption:
    get:
      operationId: getProductAdoptionMetrics
      summary: Get adoption metrics for a product
      description: >-
        Returns product adoption analytics across partner consumers and applications. Includes active
        consumer counts, integration depth, retention indicators, and request growth deltas that help
        partner success teams evaluate whether API product onboarding targets are being met.
      tags:
        - Adoption
      parameters:
        - $ref: "#/components/parameters/ProductIdPath"
        - $ref: "#/components/parameters/StartTime"
        - $ref: "#/components/parameters/EndTime"
        - $ref: "#/components/parameters/Granularity"
      responses:
        "200":
          description: Product adoption metrics retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductAdoptionResponse"
              example:
                product_id: "prd_dispatch"
                window_start: "2026-03-01T00:00:00Z"
                window_end: "2026-03-27T00:00:00Z"
                granularity: "WEEK"
                summary:
                  active_consumer_count: 143
                  new_consumer_count: 17
                  churned_consumer_count: 4
                  active_app_count: 526
                  adoption_rate_pct: 74.3
                  request_growth_pct: 12.6
                series:
                  - bucket_start: "2026-03-01T00:00:00Z"
                    bucket_end: "2026-03-08T00:00:00Z"
                    active_consumer_count: 131
                    active_app_count: 487
                    request_count: 852190
                    request_growth_pct: 5.9
                  - bucket_start: "2026-03-08T00:00:00Z"
                    bucket_end: "2026-03-15T00:00:00Z"
                    active_consumer_count: 136
                    active_app_count: 503
                    request_count: 914380
                    request_growth_pct: 7.3
                trace_id: "3236e0b6-b4db-4024-9728-fd8b9fcc0665"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "422":
          $ref: "#/components/responses/422"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /v1/anomalies/detect:
    post:
      operationId: detectAnalyticsAnomalies
      summary: Detect anomalies in analytics signals
      description: >-
        Evaluates requested metric series using robust z-score and seasonal baseline analysis to
        identify anomalous points. Use this endpoint to detect sudden regressions in latency,
        spikes in error_rate_pct, or abnormal shifts in request volume before SLA violations occur.
      tags:
        - Anomaly Detection
      requestBody:
        required: true
        description: Anomaly detection request with metric series and sensitivity settings
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnomalyDetectionRequest"
            example:
              subject:
                scope: "CONSUMER"
                consumer_id: "con_8b6c1f3a"
                product_id: "prd_dispatch"
              metrics:
                - name: "error_rate_pct"
                  points:
                    - timestamp: "2026-03-26T10:00:00Z"
                      value: 1.1
                    - timestamp: "2026-03-26T11:00:00Z"
                      value: 1.3
                    - timestamp: "2026-03-26T12:00:00Z"
                      value: 4.8
                - name: "p99_latency_ms"
                  points:
                    - timestamp: "2026-03-26T10:00:00Z"
                      value: 212.4
                    - timestamp: "2026-03-26T11:00:00Z"
                      value: 219.8
                    - timestamp: "2026-03-26T12:00:00Z"
                      value: 398.1
              config:
                method: "ROBUST_Z_SCORE"
                z_score_threshold: 2.5
                min_baseline_points: 24
                include_context: true
      responses:
        "200":
          description: Anomaly detection completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnomalyDetectionResponse"
              example:
                subject:
                  scope: "CONSUMER"
                  consumer_id: "con_8b6c1f3a"
                  product_id: "prd_dispatch"
                method: "ROBUST_Z_SCORE"
                anomalies:
                  - metric: "error_rate_pct"
                    timestamp: "2026-03-26T12:00:00Z"
                    observed_value: 4.8
                    baseline_value: 1.2
                    z_score: 3.9
                    severity: "HIGH"
                    context:
                      request_count: 6421
                      p99_latency_ms: 398.1
                  - metric: "p99_latency_ms"
                    timestamp: "2026-03-26T12:00:00Z"
                    observed_value: 398.1
                    baseline_value: 225.7
                    z_score: 3.1
                    severity: "MEDIUM"
                trace_id: "24a7648d-7288-4b1f-b4de-8f3fb2efd36b"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "422":
          $ref: "#/components/responses/422"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /v1/forecasts/quota-exhaustion:
    get:
      operationId: getQuotaExhaustionForecast
      summary: Forecast quota exhaustion risk
      description: >-
        Forecasts when configured API quotas are expected to be exhausted based on recent usage
        velocity and trend seasonality. Supports consumer- and product-level forecasting to help
        partner managers prioritize remediation before service disruption.
      tags:
        - Forecasts
      parameters:
        - $ref: "#/components/parameters/ConsumerIdOptional"
        - $ref: "#/components/parameters/ProductIdFilter"
        - $ref: "#/components/parameters/HorizonDays"
        - $ref: "#/components/parameters/ConfidenceLevel"
      responses:
        "200":
          description: Quota exhaustion forecast computed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuotaForecastResponse"
              example:
                generated_at: "2026-03-27T08:12:31Z"
                horizon_days: 30
                confidence_level: 0.95
                items:
                  - scope: "CONSUMER_PRODUCT"
                    consumer_id: "con_8b6c1f3a"
                    product_id: "prd_dispatch"
                    quota_limit: 500000
                    consumed_to_date: 451233
                    forecasted_consumption: 541909
                    quota_exhaustion_date: "2026-04-03"
                    exhaustion_probability_pct: 92.1
                    risk_level: "HIGH"
                  - scope: "PRODUCT"
                    product_id: "prd_edge-monitor"
                    quota_limit: 9000000
                    consumed_to_date: 6145000
                    forecasted_consumption: 8422000
                    quota_exhaustion_date: null
                    exhaustion_probability_pct: 11.6
                    risk_level: "LOW"
                trace_id: "5586812e-caa5-4588-b0f8-f1d8f0ef4b95"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "422":
          $ref: "#/components/responses/422"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /v1/reports:
    get:
      operationId: listAnalyticsReports
      summary: List analytics reports
      description: >-
        Returns paginated report definitions and execution states. Reports may be ad-hoc snapshots
        or scheduled recurring exports. Use pagination fields and cursors to navigate large report
        inventories.
      tags:
        - Reports
      parameters:
        - $ref: "#/components/parameters/ReportType"
        - $ref: "#/components/parameters/ReportStatus"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated report list retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportListResponse"
              example:
                data:
                  - report_id: "rpt_01JY7W1TKVWV3N3D8MN3"
                    name: "Weekly Partner Reliability Rollup"
                    type: "SCHEDULED"
                    format: "CSV"
                    status: "ACTIVE"
                    scope:
                      consumer_ids:
                        - "con_8b6c1f3a"
                      product_ids:
                        - "prd_dispatch"
                    created_at: "2026-03-01T09:10:00Z"
                    updated_at: "2026-03-21T11:15:00Z"
                    next_run_at: "2026-03-28T06:00:00Z"
                  - report_id: "rpt_01JY7W3M10D7WQSD2MF1"
                    name: "March Consumer Usage Snapshot"
                    type: "AD_HOC"
                    format: "JSON"
                    status: "COMPLETED"
                    scope:
                      consumer_ids:
                        - "con_8b6c1f3a"
                        - "con_920d31ab"
                      product_ids:
                        - "prd_dispatch"
                        - "prd_edge-monitor"
                    created_at: "2026-03-22T15:40:00Z"
                    updated_at: "2026-03-22T15:41:00Z"
                    next_run_at: null
                pagination:
                  page: 1
                  per_page: 20
                  total_items: 2
                  total_pages: 1
                trace_id: "e6e7cdaf-0f83-45fb-bf2c-a8cc57bc5138"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "422":
          $ref: "#/components/responses/422"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: createAnalyticsReport
      summary: Create a new analytics report
      description: >-
        Creates a report definition for ad-hoc generation or recurring scheduled delivery.
        Reports can include usage, errors, adoption, anomaly, and quota forecast sections with
        scoped filters for selected consumers and products.
      tags:
        - Reports
      requestBody:
        required: true
        description: Report creation payload
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReportRequest"
            example:
              name: "Consumer Risk Weekly Digest"
              type: "SCHEDULED"
              format: "CSV"
              sections:
