services:
  - name: network-topology-registry
    data_owner: edge infrastructure platform
    records:
      - node_id
      - gateway_id
      - device_pool_id
      - topology_version
      - updated_at
  - name: device-health-store
    data_owner: edge operations
    records:
      - device_id
      - reachability_status
      - last_seen_at
      - error_rate_percent
      - probe_failure_count
  - name: probe-schedule-controller
    data_owner: reliability engineering
    records:
      - schedule_id
      - node_selector
      - probe_interval_seconds
      - target_count
      - next_run_at
  - name: insights-collector-endpoint
    data_owner: Postman Insights
    records:
      - collector_batch_id
      - node_id
      - sample_count
      - accepted_at
      - ingest_status
