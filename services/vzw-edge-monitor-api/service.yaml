repo_flag: vzw-partner-demo
service:
  name: VZW Edge Monitor API
  slug: vzw-edge-monitor-api
  runtime: k8s_discovery
  visibility: partner
  deployable: true
  spec_path: openapi/openapi.yaml
  portal_role: internal-and-partner
  fern_slug: vzw-edge-monitor-api
upstream_dependencies:
  - name: network-topology-registry
    kind: internal-api
    purpose: Provides the current graph of edge nodes, gateways, and connected device pools.
  - name: device-health-store
    kind: data-store
    purpose: Stores per-device reachability status, last-seen timestamps, and error rates.
  - name: probe-schedule-controller
    kind: internal-api
    purpose: Manages the cadence and target list for active health probes.
  - name: insights-collector-endpoint
    kind: partner-api
    purpose: The Postman Insights agent endpoint that receives collected metrics.
derived_specs:
  enabled: true
  source: openapi/openapi.yaml
