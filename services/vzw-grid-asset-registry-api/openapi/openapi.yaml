openapi: 3.0.3
info:
  title: Verizon Grid Asset Registry API
  description: >-
    Maintains the authoritative registry for physical and logical utility grid assets used by Verizon Grid
    Intelligence workloads. The API supports asset onboarding, lifecycle updates, tag annotation, and
    topology traversal across substations, feeders, relays, and smart meters. Registry records include
    operational state, utility region, criticality tier, and geospatial metadata required for planning,
    outage triage, and orchestration use cases.
  version: 1.0.0
  contact:
    name: Verizon Grid Platform API Team
    email: grid-api-support@verizon.com
    url: https://developer.verizon.com/grid
  license:
    name: Proprietary
    url: https://www.verizon.com/business/terms/
  x-verizon-catalog-id: vzw-grid-asset-registry-api
  x-verizon-domain: grid
servers:
  - url: https://vzw-grid-asset-registry-api.api.verizon.com/v1
    description: Production
  - url: https://vzw-grid-asset-registry-api.staging.api.verizon.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Assets
    description: CRUD and query endpoints for utility assets
  - name: Topology
    description: Asset relationship traversal and connectivity metadata
  - name: Tags
    description: Domain tags for search, routing, and policy overlays
paths:
  /v1/assets:
    post:
      operationId: createAsset
      summary: Register a new utility asset
      description: >-
        Creates a registry record for a utility asset. The asset id is generated server-side and remains immutable.
        Use this endpoint to onboard substations, feeders, smart meters, and relays before telemetry or control
        integrations are activated.
      tags:
        - Assets
      requestBody:
        required: true
        description: Asset registration payload
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssetRequest"
            examples:
              create_substation:
                summary: Register a distribution substation
                value:
                  external_asset_ref: utility-south-ss-1001
                  asset_name: South Valley Substation
                  asset_type: substation
                  utility_region: US-SE-GA-ATL
                  criticality_tier: tier_1
                  operational_state: active
                  commissioning_date: "2023-04-19"
                  owner_organization: Verizon Utility Operations
                  location:
                    latitude: 33.749215
                    longitude: -84.388104
                    timezone: America/New_York
                    address_line_1: 12 Grid Loop
                    city: Atlanta
                    state_province: GA
                    postal_code: "30303"
                    country_code: US
                  rated_capacity:
                    value: 125.0
                    unit: MVA
                  tags:
                    - distribution
                    - priority-restoration
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetEnvelope"
              examples:
                created:
                  summary: Registered asset
                  value:
                    data:
                      asset_id: ast_7f31d2ab0c6d4d59a87f6de9001577a1
                      external_asset_ref: utility-south-ss-1001
                      asset_name: South Valley Substation
                      asset_type: substation
                      utility_region: US-SE-GA-ATL
                      criticality_tier: tier_1
                      operational_state: active
                      lifecycle_status: commissioned
                      commissioning_date: "2023-04-19"
                      owner_organization: Verizon Utility Operations
                      location:
                        latitude: 33.749215
                        longitude: -84.388104
                        timezone: America/New_York
                        address_line_1: 12 Grid Loop
                        city: Atlanta
                        state_province: GA
                        postal_code: "30303"
                        country_code: US
                      rated_capacity:
                        value: 125.0
                        unit: MVA
                      tags:
                        - distribution
                        - priority-restoration
                      audit:
                        created_at: "2026-03-27T14:17:34Z"
                        updated_at: "2026-03-27T14:17:34Z"
                        created_by: svc-grid-registry
                        updated_by: svc-grid-registry
                    trace_id: 3dfb4f22-805f-4ac0-92ec-3a13057288ce
        "400":
