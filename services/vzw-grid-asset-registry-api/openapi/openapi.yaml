        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "409":
          $ref: "#/components/responses/409"
        "422":
          $ref: "#/components/responses/422"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    get:
      operationId: listAssets
      summary: List registered utility assets
      description: >-
        Returns a paginated list of assets with optional filtering by asset type, utility region, criticality tier,
        and operational state. Results are sorted by latest update time descending unless overridden.
      tags:
        - Assets
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/per_page"
        - $ref: "#/components/parameters/asset_type"
        - $ref: "#/components/parameters/utility_region"
        - $ref: "#/components/parameters/criticality_tier"
        - $ref: "#/components/parameters/operational_state"
        - $ref: "#/components/parameters/search"
