  /v1/reports/{reportId}:submit:
    post:
      operationId: submitReportFiling
      summary: Submit report filing to regulator
      description: >-
        Submits a signed report package to the configured regulator_endpoint. The report must be in
        REVIEW_PENDING or SIGNED status, and signature_status must be SIGNED prior to submission.
        Successful submission transitions filing_status to SUBMITTED and records a submission receipt.
      tags:
        - Submissions
      parameters:
        - $ref: '#/components/parameters/ReportId'
      requestBody:
        required: true
        description: Submission metadata and attestation payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportSubmissionRequest'
            examples:
              submitWithAttestation:
                value:
                  submitter_id: user-864
                  attestation:
                    attest_statement: I certify the data is complete and accurate to the best of my knowledge.
                    signed_at: '2026-01-22T12:29:55Z'
                    signing_authority: Director of Grid Reliability
                  transmission:
                    idempotency_key: 975be2cf-4f66-41a5-a6f1-30de28f8452f
                    transport_mode: API_PUSH
                    callback_url: https://compliance.verizon.com/filings/callback
      responses:
        '202':
          description: Filing submission accepted for processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionAcceptedResponse'
              examples:
                accepted:
                  value:
                    report_id: rpt-7bc8d126
                    filing_status: SUBMISSION_IN_PROGRESS
                    regulator_endpoint: https://filings.nypsc.gov/api/v2/submissions
                    signature_status: SIGNED
                    submission_job_id: job-f31ca2f1
                    accepted_at: '2026-01-22T12:30:00Z'
                    trace_id: c8dd1f15-f9ba-4d36-b3af-ae04c687791f
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '409':
          $ref: '#/components/responses/409'
        '422':
          $ref: '#/components/responses/422'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
  /v1/audit/filings:
    get:
      operationId: listFilingAuditRecords
      summary: List filing audit records
      description: >-
        Returns immutable filing audit entries that include filing status transitions, signature validation
        details, and regulator acknowledgement artifacts. Results are paginated and can be filtered by
        report_id, filing_status, and submission time range.
      tags:
        - Audit
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: report_id
          in: query
          required: false
          description: Restrict audit records to a specific report
          schema:
            type: string
            maxLength: 64
            example: rpt-7bc8d126
        - name: filing_status
          in: query
          required: false
          description: Restrict records to a filing status
          schema:
            $ref: '#/components/schemas/FilingStatus'
        - name: submitted_after
          in: query
          required: false
          description: Lower bound for submission timestamp (inclusive)
          schema:
            type: string
            format: date-time
            example: '2026-01-01T00:00:00Z'
        - name: submitted_before
          in: query
          required: false
          description: Upper bound for submission timestamp (inclusive)
          schema:
            type: string
            format: date-time
            example: '2026-02-01T00:00:00Z'
      responses:
        '200':
          description: Paginated filing audit records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilingAuditListResponse'
              examples:
                filings:
                  value:
                    data:
                      - audit_id: aud-90210c8a
                        report_id: rpt-7bc8d126
                        filing_status: SUBMITTED
                        regulator_endpoint: https://filings.nypsc.gov/api/v2/submissions
                        signature_status: VERIFIED
                        compliance_score: 97.4
                        event_type: REGULATOR_ACCEPTED
                        event_timestamp: '2026-01-22T12:31:02Z'
