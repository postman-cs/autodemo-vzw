openapi: 3.0.3
info:
  title: VZW Regulatory Reporting API
  description: >-
    Generates auditable outage reliability and demand-response filings for utility regulators. This API
    supports report creation, regulator submission workflows, report retrieval, and filing audit evidence
    required for compliance programs and external investigations.
  version: 1.0.0
  contact:
    name: Verizon Regulatory Platform API Support
    email: regulatory-api-support@verizon.com
    url: https://developer.verizon.com/apis/vzw-regulatory-reporting-api
  license:
    name: Proprietary
    url: https://www.verizon.com/business/terms/
  x-verizon-catalog-id: vzw-regulatory-reporting-api
  x-verizon-domain: regulatory
servers:
  - url: https://vzw-regulatory-reporting-api.api.verizon.com/v1
    description: Production
  - url: https://vzw-regulatory-reporting-api.staging.api.verizon.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Reports
    description: Create and retrieve outage and demand-response reports
  - name: Submissions
    description: Submit generated reports to regulator endpoints and track filing status
  - name: Audit
    description: Retrieve filing artifacts and signature evidence for compliance audits
paths:
  /v1/reports/outage-reliability:
    post:
      operationId: createOutageReliabilityReport
      summary: Create outage reliability filing report
      description: >-
        Creates an outage reliability report candidate for a regulatory filing cycle. The request includes
        SAIDI and SAIFI measurements, jurisdiction metadata, and evidentiary links used during external
        audits. The generated report is initially stored with filing_status DRAFT.
      tags:
        - Reports
      requestBody:
        required: true
        description: Outage reliability report payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OutageReliabilityReportCreateRequest'
            examples:
              annualDistributionReliability:
                summary: Annual outage reliability report
                value:
                  utility_id: util-nyc-grid-001
                  jurisdiction: NY-PSC
                  reporting_period:
                    period_start: '2025-01-01'
                    period_end: '2025-12-31'
                    filing_due_date: '2026-03-31'
                  saidi_minutes: 113.6
                  saifi_events: 0.94
                  customer_count: 2350041
                  major_event_day_excluded: true
                  compliance_score: 97.4
                  methodology_version: ieee-1366-2023
                  regulator_endpoint: https://filings.nypsc.gov/api/v2/submissions
                  evidence_links:
                    - evidence_id: ev-9f10ba21
                      title: OMS Reliability Extract
                      uri: s3://vzw-regulatory/evidence/2025/oms-extract.parquet
                      sha256: b89d02fef7f9b80f0362e6900f5492d97f0e3a4faa9f9fbc1307d1665cd5a266
                  notes: Includes MED exclusions as approved in docket 23-E-1044.
      responses:
        '201':
          description: Outage reliability report created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportRecord'
              examples:
                created:
                  value:
                    report_id: rpt-7bc8d126
                    report_type: OUTAGE_RELIABILITY
                    utility_id: util-nyc-grid-001
                    jurisdiction: NY-PSC
                    reporting_period:
                      period_start: '2025-01-01'
                      period_end: '2025-12-31'
                      filing_due_date: '2026-03-31'
                    saidi_minutes: 113.6
                    saifi_events: 0.94
                    compliance_score: 97.4
                    regulator_endpoint: https://filings.nypsc.gov/api/v2/submissions
                    filing_status: DRAFT
                    signature_status: NOT_SIGNED
                    created_at: '2026-01-08T13:05:20Z'
                    updated_at: '2026-01-08T13:05:20Z'
                    created_by: user-501
                    updated_by: user-501
                    trace_id: 73f8b6da-2487-446f-a11c-6f89d68f16e5
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '409':
          $ref: '#/components/responses/409'
        '422':
          $ref: '#/components/responses/422'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
  /v1/reports/demand-response:
    post:
      operationId: createDemandResponseReport
      summary: Create demand-response filing report
      description: >-
        Creates a demand-response report candidate including dispatch counts, enrolled load, delivered load,
        and performance scoring. The report can be reviewed and signed before submission to the configured
        regulator_endpoint.
      tags:
        - Reports
      requestBody:
        required: true
        description: Demand-response report payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DemandResponseReportCreateRequest'
            examples:
              summerProgram:
                summary: Summer demand-response filing
                value:
                  utility_id: util-ne-grid-904
                  jurisdiction: ISO-NE-DPU
                  reporting_period:
                    period_start: '2025-06-01'
                    period_end: '2025-09-30'
                    filing_due_date: '2025-11-15'
                  enrolled_mw: 486.2
                  dispatched_events: 18
                  average_event_duration_minutes: 117
                  delivered_mwh: 14926.5
                  baseline_mwh: 15788.3
                  compliance_score: 95.1
                  regulator_endpoint: https://regulator.iso-ne.com/v1/dr-filings
                  portfolio_segments:
                    - segment_id: seg-cni
                      segment_name: Commercial and Industrial
                      enrolled_mw: 298.7
                      delivered_mwh: 9102.6
                    - segment_id: seg-res
                      segment_name: Residential Aggregation
                      enrolled_mw: 187.5
                      delivered_mwh: 5823.9
                  notes: Includes emergency dispatches and voluntary events.
      responses:
        '201':
          description: Demand-response report created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportRecord'
              examples:
                created:
                  value:
                    report_id: rpt-41a7b2de
                    report_type: DEMAND_RESPONSE
                    utility_id: util-ne-grid-904
                    jurisdiction: ISO-NE-DPU
                    reporting_period:
                      period_start: '2025-06-01'
                      period_end: '2025-09-30'
                      filing_due_date: '2025-11-15'
                    compliance_score: 95.1
                    regulator_endpoint: https://regulator.iso-ne.com/v1/dr-filings
                    filing_status: DRAFT
                    signature_status: PENDING_SIGNATURE
                    created_at: '2025-10-09T11:15:44Z'
                    updated_at: '2025-10-09T11:15:44Z'
                    created_by: user-782
                    updated_by: user-782
                    trace_id: 2f7c7af6-6e6f-42ec-8a2f-c8f3961824b1
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '409':
          $ref: '#/components/responses/409'
        '422':
          $ref: '#/components/responses/422'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
  /v1/reports:
    get:
      operationId: listReports
      summary: List generated reports
      description: >-
        Returns paginated outage reliability and demand-response reports with filing and signature status.
        Use filters to constrain report_type, filing_status, and reporting period boundaries for regulator
        audit preparation.
      tags:
        - Reports
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: report_type
          in: query
          required: false
          description: Restrict results to one report type
          schema:
            $ref: '#/components/schemas/ReportType'
        - name: filing_status
          in: query
          required: false
          description: Restrict results by filing lifecycle status
          schema:
            $ref: '#/components/schemas/FilingStatus'
        - name: utility_id
          in: query
          required: false
          description: Restrict results to a utility identifier
          schema:
            type: string
            maxLength: 64
            example: util-ne-grid-904
        - name: period_start_from
          in: query
          required: false
          description: Inclusive lower bound for reporting period start
          schema:
            type: string
            format: date
            example: '2025-01-01'
        - name: period_end_to
          in: query
          required: false
          description: Inclusive upper bound for reporting period end
          schema:
            type: string
            format: date
            example: '2025-12-31'
      responses:
        '200':
          description: Paginated list of reports
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportListResponse'
              examples:
                pageOne:
                  value:
                    data:
                      - report_id: rpt-7bc8d126
                        report_type: OUTAGE_RELIABILITY
                        utility_id: util-nyc-grid-001
                        jurisdiction: NY-PSC
                        reporting_period:
                          period_start: '2025-01-01'
                          period_end: '2025-12-31'
                          filing_due_date: '2026-03-31'
                        saidi_minutes: 113.6
                        saifi_events: 0.94
                        compliance_score: 97.4
                        filing_status: REVIEW_PENDING
                        regulator_endpoint: https://filings.nypsc.gov/api/v2/submissions
                        signature_status: SIGNED
                        created_at: '2026-01-08T13:05:20Z'
                        updated_at: '2026-01-20T09:14:10Z'
                        created_by: user-501
                        updated_by: user-864
                        trace_id: 73f8b6da-2487-446f-a11c-6f89d68f16e5
                      - report_id: rpt-41a7b2de
                        report_type: DEMAND_RESPONSE
                        utility_id: util-ne-grid-904
                        jurisdiction: ISO-NE-DPU
                        reporting_period:
                          period_start: '2025-06-01'
                          period_end: '2025-09-30'
                          filing_due_date: '2025-11-15'
                        compliance_score: 95.1
                        filing_status: SUBMITTED
                        regulator_endpoint: https://regulator.iso-ne.com/v1/dr-filings
                        signature_status: SIGNED
                        created_at: '2025-10-09T11:15:44Z'
                        updated_at: '2025-11-09T14:02:03Z'
                        created_by: user-782
                        updated_by: user-782
                        trace_id: 2f7c7af6-6e6f-42ec-8a2f-c8f3961824b1
                    pagination:
                      page: 1
                      page_size: 25
                      total_records: 2
                      total_pages: 1
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
  /v1/reports/{reportId}:
    get:
      operationId: getReportById
      summary: Get report details
      description: >-
        Returns a single report with full reporting metrics, filing lifecycle metadata, and signature status.
        If the report has been submitted, submission receipt metadata is included.
      tags:
        - Reports
      parameters:
        - $ref: '#/components/parameters/ReportId'
