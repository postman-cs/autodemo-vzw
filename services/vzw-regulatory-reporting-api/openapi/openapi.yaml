                        evidence_uri: s3://vzw-regulatory/receipts/nypsc-2026-rel-000913.json
                        trace_id: c8dd1f15-f9ba-4d36-b3af-ae04c687791f
                      - audit_id: aud-90210c8b
                        report_id: rpt-41a7b2de
