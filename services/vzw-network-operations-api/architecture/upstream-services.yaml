services:
  - name: subscriber-device-registry
    data_owner: Verizon device platform
    records:
      - device_id
      - mdn
      - account_name
      - line_status
      - last_network_seen_at
  - name: location-cache-store
    data_owner: Verizon location platform
    records:
      - device_id
      - latitude
      - longitude
      - cached_at
      - accuracy_radius_meters
  - name: policy-qos-engine
    data_owner: Verizon network policy
    records:
      - service_profile
      - tenant_id
      - allowed_qos_profiles
      - duration_limit_seconds
  - name: oauth-client-directory
    data_owner: Verizon identity
    records:
      - client_id
      - client_name
      - allowed_scopes
      - team_slug
