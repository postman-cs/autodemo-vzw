repo_flag: vzw-partner-demo
service:
  name: VZW Network Operations API
  slug: vzw-network-operations-api
  runtime: lambda
  visibility: internal
  deployable: true
  spec_path: openapi/openapi.yaml
  portal_role: internal-catalog
  fern_slug: vzw-network-operations-api
upstream_dependencies:
  - name: subscriber-device-registry
    kind: internal-api
    purpose: Maps IMEI and MDN values to account ownership, device status, and provisioned line metadata.
  - name: location-cache-store
    kind: data-store
    purpose: Stores recent location fixes so cacheMode requests can return a warm result without querying the network.
  - name: policy-qos-engine
    kind: internal-api
    purpose: Validates requested QoD profiles against enterprise policy, line entitlements, and current network posture.
  - name: oauth-client-directory
    kind: data-store
    purpose: Stores demo client IDs, scopes, and team ownership for token issuance.
derived_specs:
  enabled: true
  source: openapi/openapi.yaml
