services:
  - name: traffic-conditions-stream
    data_owner: regional traffic intelligence
    records:
      - segment_id
      - average_speed_mph
      - congestion_level
      - observed_at
  - name: place-search-index
    data_owner: location search platform
    records:
      - place_id
      - label
      - address_components
      - latitude
      - longitude
  - name: route-optimization-engine
    data_owner: routing platform
    records:
      - route_id
      - summary_duration_seconds
      - summary_length_meters
      - polyline
  - name: roadway-graph-store
    data_owner: mapping platform
    records:
      - graph_version
      - edge_id
      - source_vertex
      - target_vertex
      - allowed_modes
