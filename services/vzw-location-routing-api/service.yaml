repo_flag: vzw-partner-demo
service:
  name: VZW Location Routing API
  slug: vzw-location-routing-api
  runtime: ecs
  visibility: partner
  deployable: true
  spec_path: openapi/openapi.yaml
  portal_role: internal-and-partner
  fern_slug: vzw-location-routing-api
upstream_dependencies:
  - name: traffic-conditions-stream
    kind: data-stream
    purpose: Supplies near-real-time roadway conditions and estimated congestion.
  - name: place-search-index
    kind: search-index
    purpose: Resolves freeform addresses and known facility names to coordinate points.
  - name: route-optimization-engine
    kind: internal-api
    purpose: Computes fastest and shortest route options from normalized map graph data.
  - name: roadway-graph-store
    kind: data-store
    purpose: Stores road network graph snapshots, edge weights, and travel restrictions.
derived_specs:
  enabled: true
  source: openapi/openapi.yaml
