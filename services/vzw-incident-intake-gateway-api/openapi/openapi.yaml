          minimum: 0
          maximum: 100
          description: Computed severity score from normalization and policy models
          example: 88
        priority:
          $ref: "#/components/schemas/IncidentPriority"
        geo_cell_id:
          type: string
          description: Derived geospatial grid cell identifier for dispatch zoning
