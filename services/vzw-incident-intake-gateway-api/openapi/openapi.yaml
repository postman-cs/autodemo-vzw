        - ingested_at
    IncidentValidateRequest:
      type: object
      description: Request payload for schema and geospatial validation
      properties:
        channel:
          $ref: "#/components/schemas/IntakeChannel"
        payload:
          type: object
          description: Candidate incident payload to validate before ingestion
          properties:
            incident_type:
              $ref: "#/components/schemas/CanonicalIncidentType"
