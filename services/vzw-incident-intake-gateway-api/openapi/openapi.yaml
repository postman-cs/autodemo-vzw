        - channels
        - trace_id
    IncidentDeduplicateRequest:
      type: object
      description: Request payload for incident deduplication merge operation
      properties:
        duplicate_incident_ids:
          type: array
          minItems: 1
          description: List of incident IDs considered duplicates of the canonical incident
          items:
            type: string
            description: Duplicate incident identifier
            example: "inc-20260327-58cb7ae1"
          example:
            - "inc-20260327-58cb7ae1"
            - "inc-20260327-94a6a721"
        merge_strategy:
          type: string
          description: Strategy used to resolve field conflicts across duplicate reports
          enum:
            - "HIGHEST_CONFIDENCE_FIELDS"
            - "MOST_RECENT_REPORT"
            - "CANONICAL_SOURCE_PRIORITY"
          example: "HIGHEST_CONFIDENCE_FIELDS"
        preserve_channel_events:
          type: boolean
          description: Preserve per-channel event lineage after merge completion
          example: true
        initiated_by:
          type: string
          description: Identity of service or operator initiating deduplication
          example: "dedupe-engine-v2"
      required:
        - duplicate_incident_ids
        - merge_strategy
        - preserve_channel_events
        - initiated_by
    IncidentDeduplicateResponse:
      type: object
      description: Result payload for deduplication and merge operation
      properties:
        canonical_incident_id:
          type: string
          description: Canonical incident id retained after merge
          example: "inc-20260327-7a2d11c9"
        merged_incident_ids:
          type: array
          description: Duplicate incident ids merged into canonical incident
          items:
            type: string
            description: Merged duplicate incident id
            example: "inc-20260327-58cb7ae1"
        merge_strategy:
          type: string
          description: Effective merge strategy used during deduplication
          example: "HIGHEST_CONFIDENCE_FIELDS"
        merged_fields:
          type: array
          description: Canonical fields updated during merge operation
          items:
            type: string
            description: Updated canonical field path
            example: "incident.description"
          example:
            - "caller.phone_number"
            - "incident.description"
            - "location.neighborhood"
        deduplication_score:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Confidence score that merged incidents represented same event
          example: 0.96
        merged_at:
          type: string
          format: date-time
          description: Timestamp when deduplication merge completed
          example: "2026-03-27T16:27:11Z"
        trace_id:
          type: string
          format: uuid
          description: Trace id for deduplication workflow
          example: "6fce9010-31db-46ca-b4c7-0d909cb4348f"
      required:
        - canonical_incident_id
        - merged_incident_ids
        - merge_strategy
        - merged_fields
        - deduplication_score
        - merged_at
        - trace_id
    ErrorDetail:
      type: object
      description: Structured field-level validation or processing error detail
      properties:
        field:
          type: string
          description: Request field path associated with the error detail
          example: "location.latitude"
        reason:
          type: string
          description: Human-readable reason for the field-level error
          example: "Must be within configured San Francisco geofence bounds"
      required:
        - field
        - reason
    ErrorEnvelope:
      type: object
      description: Standard error envelope for API error responses
      properties:
        code:
          type: string
          description: Machine-readable error code for programmatic handling
          example: "VALIDATION_ERROR"
        message:
          type: string
          description: Human-readable error summary
          example: "The request body contains invalid fields."
        details:
          type: array
          description: Optional detailed error list for field-level issues
          items:
            $ref: "#/components/schemas/ErrorDetail"
        request_id:
          type: string
          description: Request identifier for support and troubleshooting correlation
          example: "req-a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      required:
        - code
        - message
        - request_id
    Error:
      type: object
      description: API error response wrapper
      properties:
        error:
          $ref: "#/components/schemas/ErrorEnvelope"
      required:
        - error
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer token issued by Verizon Identity Platform
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for trusted service-to-service integrations
  responses:
    "400":
      description: Bad Request — The request was malformed or contains invalid parameters.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: "VALIDATION_ERROR"
              message: "The request body contains invalid fields."
              details:
                - field: "location.latitude"
                  reason: "Must be within configured San Francisco geofence bounds"
              request_id: "req-a1b2c3d4-e5f6-7890-abcd-ef1234567890"
    "401":
      description: Unauthorized — Authentication credentials are missing or invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: "UNAUTHORIZED"
              message: "Invalid or expired authentication token."
              request_id: "req-b2c3d4e5-f6a7-8901-bcde-f12345678901"
    "403":
      description: Forbidden — You do not have permission to access this resource.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: "FORBIDDEN"
              message: "You do not have the required permissions for this action."
              request_id: "req-c3d4e5f6-a7b8-9012-cdef-123456789012"
    "404":
      description: Not Found — The requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: "NOT_FOUND"
              message: "The requested resource was not found."
              request_id: "req-d4e5f6a7-b8c9-0123-defa-234567890123"
    "409":
      description: Conflict — The request conflicts with the current state of the resource.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: "CONFLICT"
              message: "The resource has been modified by another request."
              request_id: "req-a1b2c3d4-e5f6-0123-abcd-ef1234560000"
    "422":
      description: Unprocessable Entity — The request was well-formed but contains semantic errors.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: "UNPROCESSABLE_ENTITY"
              message: "The request could not be processed due to business rule violations."
              details:
                - field: "duplicate_incident_ids"
                  reason: "At least one duplicate incident id must be provided"
              request_id: "req-b2c3d4e5-f6a7-0123-bcde-f12345670000"
    "429":
      description: Too Many Requests — Rate limit exceeded.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: "RATE_LIMIT_EXCEEDED"
              message: "You have exceeded the rate limit. Please retry after 30 seconds."
              request_id: "req-e5f6a7b8-c9d0-1234-efab-345678901234"
    "500":
      description: Internal Server Error — An unexpected error occurred.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: "INTERNAL_ERROR"
              message: "An unexpected error occurred. Please try again later."
              request_id: "req-f6a7b8c9-d0e1-2345-fabc-456789012345"
