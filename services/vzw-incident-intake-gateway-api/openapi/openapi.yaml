              $ref: "#/components/schemas/CallerInfo"
            metadata:
              type: object
              description: Producer-specific metadata included in validation run
              properties:
                customer_account_id:
                  type: string
                  description: Customer account identifier for app-originated incidents
                  example: "acct-177220"
                app_version:
                  type: string
                  description: Source app version when channel is APP
                  example: "7.12.0"
          required:
            - incident_type
            - description
            - location
      required:
        - channel
        - payload
    ValidationWarning:
      type: object
      description: Non-blocking validation finding
      properties:
        code:
          type: string
          description: Machine-readable warning code from validation pipeline
          example: "LOW_PRECISION_LOCATION"
        message:
          type: string
          description: Human-readable explanation of warning condition
          example: "GPS precision is low; fallback geocoder was applied"
      required:
        - code
        - message
    GeoValidationResult:
      type: object
      description: Geospatial validation details for service-area routing
      properties:
        in_service_area:
          type: boolean
          description: Indicates whether location is within configured service boundaries
          example: true
        geofence:
          type: string
          description: Service geofence identifier used for validation
          example: "SF-PRIMARY"
        nearest_grid:
          type: string
          description: Nearest operational grid reference for dispatch lookup
          example: "SF-MISSION-14"
      required:
        - in_service_area
        - geofence
        - nearest_grid
    IncidentValidateResponse:
      type: object
      description: Validation outcome payload
      properties:
        valid:
          type: boolean
          description: Indicates whether candidate payload passed all blocking validations
          example: true
        validation_result:
          type: string
          description: Overall validation result classification
          enum:
            - "PASSED"
            - "FAILED"
            - "PASSED_WITH_WARNINGS"
          example: "PASSED"
        schema_version:
          type: string
          description: Validation schema version applied to candidate payload
          example: "2026-03"
        geo_validation:
          $ref: "#/components/schemas/GeoValidationResult"
        warnings:
          type: array
          description: Non-blocking findings emitted during validation
          items:
            $ref: "#/components/schemas/ValidationWarning"
        trace_id:
          type: string
          format: uuid
          description: Trace id for validation request lifecycle
          example: "6d2b66f5-ecdb-4e43-8bb3-a0e7f94a8ea1"
      required:
        - valid
        - validation_result
        - schema_version
        - geo_validation
        - trace_id
    IncidentQueueItem:
