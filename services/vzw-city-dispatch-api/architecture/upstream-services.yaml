services:
  - name: incident-case-store
    data_owner: metro city dispatch
    records:
      - incident_id
      - incident_type
      - priority
      - address
      - status
      - created_at
  - name: unit-availability-registry
    data_owner: field operations
    records:
      - unit_id
      - unit_type
      - crew_names
      - status
      - latitude
      - longitude
  - name: hospital-capacity-directory
    data_owner: metro health network
    records:
      - facility_id
      - facility_name
      - telemetry_endpoint
      - trauma_status
      - last_updated_at
  - name: vzw-network-operations-api
    data_owner: Verizon network platform
    records:
      - latest_device_fix
      - qos_session_status
      - device_line_state
  - name: vzw-location-routing-api
    data_owner: routing platform
    records:
      - candidate_route
      - route_duration_seconds
      - route_distance_meters
