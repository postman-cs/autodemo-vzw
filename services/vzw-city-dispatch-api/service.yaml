repo_flag: vzw-partner-demo
service:
  name: VZW City Dispatch API
  slug: vzw-city-dispatch-api
  runtime: k8s_workspace
  visibility: partner
  deployable: true
  spec_path: openapi/openapi.yaml
  portal_role: internal-and-partner
  fern_slug: vzw-city-dispatch-api
upstream_dependencies:
  - name: incident-case-store
    kind: data-store
    purpose: Stores active incidents, severity, caller details, and dispatch status transitions.
  - name: unit-availability-registry
    kind: internal-api
    purpose: Tracks the current location, readiness, and crew assignment of response units.
  - name: hospital-capacity-directory
    kind: internal-api
    purpose: Supplies telemetry destination and facility readiness for incoming emergency traffic.
  - name: vzw-network-operations-api
    kind: partner-api
    purpose: Provides device location and QoD session reservation for connected units.
  - name: vzw-location-routing-api
    kind: partner-api
    purpose: Provides geocoding and route optimization for dispatching the nearest unit.
derived_specs:
  enabled: true
  source: openapi/openapi.yaml
