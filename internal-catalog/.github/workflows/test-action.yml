name: Validate Action Bundles
on:
  pull_request:
  workflow_dispatch:

jobs:
  validate_bundles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Build action bundles
        run: npm run build:actions

      - name: Fail on bundle drift
        run: git diff --exit-code -- .github/actions/*/dist

      - name: Local action load smoke test
        uses: ./.github/actions/postman-bootstrap
        with:
          step: noop
          project_name: test
          domain: test
          domain_code: test
          requester_email: test@test.com
          spec_url: http://test.com/spec.yaml
          team_id: 123
          runtime_mode: lambda
          postman_api_key: test
          postman_access_token: test
          github_app_token: test
          governance_mapping: "{}"
