name: ECS Shared Infrastructure Setup

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region for shared ECS infrastructure
        required: true
        default: eu-west-2
        type: string
      resource_prefix:
        description: Prefix for shared ECS resources
        required: true
        default: vzw-partner-demo
        type: string

concurrency:
  group: ecs-infra-lifecycle
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  init:
    runs-on: ubuntu-latest-16-cores
    env:
      AWS_REGION: ${{ inputs.aws_region }}
      RESOURCE_PREFIX: ${{ inputs.resource_prefix }}
      AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
      AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
    outputs:
      record_id: ${{ steps.airtable_start.outputs.record_id }}
      vpc_id: ${{ steps.vpc.outputs.vpc_id }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Upsert Airtable record (provisioning)
        id: airtable_start
        run: |
          set -euo pipefail
          if [ -z "${AIRTABLE_API_KEY}" ] || [ -z "${AIRTABLE_BASE_ID}" ]; then
            echo "AIRTABLE_API_KEY and AIRTABLE_BASE_ID are required secrets"
            exit 1
          fi

          NOW="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          FILTER="{component}='ecs_shared'"
          QUERY_URL="https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/Infrastructure"

          RESP="$(curl -sS --get "${QUERY_URL}" \
            -H "Authorization: Bearer ${AIRTABLE_API_KEY}" \
            --data-urlencode "filterByFormula=${FILTER}" \
            --data-urlencode "maxRecords=1")"

          REC_ID="$(echo "${RESP}" | jq -r '.records[0].id // empty')"

          PAYLOAD="$(jq -n --arg now "${NOW}" --arg region "${AWS_REGION}" '{
            fields: {
              component: "ecs_shared",
              status: "provisioning",
              aws_region: $region,
              created_at: $now,
              updated_at: $now,
              last_error: "",
              last_run_url: ""
            }
          }')"

          if [ -n "${REC_ID}" ]; then
            curl -sS -X PATCH "${QUERY_URL}/${REC_ID}" \
              -H "Authorization: Bearer ${AIRTABLE_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "${PAYLOAD}" >/dev/null
          else
            CREATE_RESP="$(curl -sS -X POST "${QUERY_URL}" \
              -H "Authorization: Bearer ${AIRTABLE_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "${PAYLOAD}")"
            REC_ID="$(echo "${CREATE_RESP}" | jq -r '.id // empty')"
            if [ -z "${REC_ID}" ]; then
              echo "Failed to create Infrastructure Airtable record"
              echo "${CREATE_RESP}"
              exit 1
            fi
          fi

          echo "record_id=${REC_ID}" >> "${GITHUB_OUTPUT}"

      - name: Discover default VPC
        id: vpc
        run: |
          set -euo pipefail
          VPC_ID="$(aws ec2 describe-vpcs \
            --region "${AWS_REGION}" \
            --filters Name=isDefault,Values=true \
            --query 'Vpcs[0].VpcId' \
            --output text)"
          if [ "${VPC_ID}" = "None" ] || [ -z "${VPC_ID}" ]; then
            echo "No default VPC found in ${AWS_REGION}"
            exit 1
          fi
          echo "vpc_id=${VPC_ID}" >> "${GITHUB_OUTPUT}"

  networking:
    needs: [init]
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ inputs.aws_region }}
      RESOURCE_PREFIX: ${{ inputs.resource_prefix }}
    outputs:
      subnet_ids: ${{ steps.subnets.outputs.subnet_ids }}
      alb_sg_id: ${{ steps.alb_sg.outputs.sg_id }}
      ecs_sg_id: ${{ steps.ecs_sg.outputs.sg_id }}
      alb_arn: ${{ steps.alb.outputs.alb_arn }}
      alb_dns_name: ${{ steps.alb.outputs.alb_dns_name }}
      alb_listener_arn: ${{ steps.listener.outputs.listener_arn }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Discover subnets
        id: subnets
        env:
          VPC_ID: ${{ needs.init.outputs.vpc_id }}
        run: |
          set -euo pipefail
          mapfile -t SUBNET_IDS < <(aws ec2 describe-subnets \
            --region "${AWS_REGION}" \
            --filters Name=vpc-id,Values="${VPC_ID}" Name=state,Values=available \
            --query 'Subnets[].SubnetId' \
            --output text | tr '\t' '\n' | sed '/^$/d')

          if [ "${#SUBNET_IDS[@]}" -lt 2 ]; then
            echo "At least two default VPC subnets are required"
            exit 1
          fi

          SUBNET1="${SUBNET_IDS[0]}"
          SUBNET2="${SUBNET_IDS[1]}"
          {
            echo "subnet1=${SUBNET1}"
            echo "subnet2=${SUBNET2}"
            echo "subnet_ids=${SUBNET1},${SUBNET2}"
          } >> "${GITHUB_OUTPUT}"

      - name: Create ALB security group
        id: alb_sg
        env:
          VPC_ID: ${{ needs.init.outputs.vpc_id }}
        run: |
          set -euo pipefail
          SG_NAME="${RESOURCE_PREFIX}-alb-sg"
          SG_ID="$(aws ec2 describe-security-groups \
            --region "${AWS_REGION}" \
            --filters Name=vpc-id,Values="${VPC_ID}" Name=group-name,Values="${SG_NAME}" \
            --query 'SecurityGroups[0].GroupId' \
            --output text 2>/dev/null || true)"

          if [ "${SG_ID}" = "None" ] || [ -z "${SG_ID}" ]; then
            SG_ID="$(aws ec2 create-security-group \
              --region "${AWS_REGION}" \
              --group-name "${SG_NAME}" \
              --description "ALB security group for ${RESOURCE_PREFIX}" \
              --vpc-id "${VPC_ID}" \
              --tag-specifications 'ResourceType=security-group,Tags=[{Key=ResourceGroup,Value=vzw-partner-demo}]' \
              --query 'GroupId' \
              --output text)"
          fi

          aws ec2 authorize-security-group-ingress \
            --region "${AWS_REGION}" \
            --group-id "${SG_ID}" \
            --ip-permissions 'IpProtocol=tcp,FromPort=80,ToPort=80,IpRanges=[{CidrIp=0.0.0.0/0}]' >/dev/null 2>&1 || true

          echo "sg_id=${SG_ID}" >> "${GITHUB_OUTPUT}"

      - name: Create ECS tasks security group
        id: ecs_sg
        env:
          VPC_ID: ${{ needs.init.outputs.vpc_id }}
          ALB_SG_ID: ${{ steps.alb_sg.outputs.sg_id }}
        run: |
          set -euo pipefail
          SG_NAME="${RESOURCE_PREFIX}-ecs-sg"
          SG_ID="$(aws ec2 describe-security-groups \
            --region "${AWS_REGION}" \
            --filters Name=vpc-id,Values="${VPC_ID}" Name=group-name,Values="${SG_NAME}" \
            --query 'SecurityGroups[0].GroupId' \
            --output text 2>/dev/null || true)"

          if [ "${SG_ID}" = "None" ] || [ -z "${SG_ID}" ]; then
            SG_ID="$(aws ec2 create-security-group \
              --region "${AWS_REGION}" \
              --group-name "${SG_NAME}" \
              --description "ECS tasks security group for ${RESOURCE_PREFIX}" \
              --vpc-id "${VPC_ID}" \
              --tag-specifications 'ResourceType=security-group,Tags=[{Key=ResourceGroup,Value=vzw-partner-demo}]' \
              --query 'GroupId' \
              --output text)"
          fi

          aws ec2 authorize-security-group-ingress \
            --region "${AWS_REGION}" \
            --group-id "${SG_ID}" \
            --ip-permissions "[{\"IpProtocol\":\"tcp\",\"FromPort\":5000,\"ToPort\":5000,\"UserIdGroupPairs\":[{\"GroupId\":\"${ALB_SG_ID}\"}]}]" >/dev/null 2>&1 || true

          echo "sg_id=${SG_ID}" >> "${GITHUB_OUTPUT}"

      - name: Create ALB
        id: alb
        env:
          SUBNET1: ${{ steps.subnets.outputs.subnet1 }}
          SUBNET2: ${{ steps.subnets.outputs.subnet2 }}
          ALB_SG_ID: ${{ steps.alb_sg.outputs.sg_id }}
        run: |
          set -euo pipefail
          ALB_NAME="${RESOURCE_PREFIX}-alb"
          if aws elbv2 describe-load-balancers --region "${AWS_REGION}" --names "${ALB_NAME}" >/tmp/alb.json 2>/dev/null; then
            ALB_ARN="$(jq -r '.LoadBalancers[0].LoadBalancerArn' /tmp/alb.json)"
            ALB_DNS_NAME="$(jq -r '.LoadBalancers[0].DNSName' /tmp/alb.json)"
          else
            aws elbv2 create-load-balancer \
              --region "${AWS_REGION}" \
              --name "${ALB_NAME}" \
              --type application \
              --scheme internet-facing \
              --subnets "${SUBNET1}" "${SUBNET2}" \
              --security-groups "${ALB_SG_ID}" \
              --tags Key=ResourceGroup,Value=vzw-partner-demo >/tmp/alb.json
            ALB_ARN="$(jq -r '.LoadBalancers[0].LoadBalancerArn' /tmp/alb.json)"
            ALB_DNS_NAME="$(jq -r '.LoadBalancers[0].DNSName' /tmp/alb.json)"
          fi

          echo "alb_arn=${ALB_ARN}" >> "${GITHUB_OUTPUT}"
          echo "alb_dns_name=${ALB_DNS_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Create ALB listener
        id: listener
        env:
          ALB_ARN: ${{ steps.alb.outputs.alb_arn }}
        run: |
          set -euo pipefail
          LISTENER_ARN="$(aws elbv2 describe-listeners \
            --region "${AWS_REGION}" \
            --load-balancer-arn "${ALB_ARN}" \
            --query "Listeners[?Port==\`80\`].ListenerArn | [0]" \
            --output text 2>/dev/null || true)"

          if [ "${LISTENER_ARN}" = "None" ] || [ -z "${LISTENER_ARN}" ]; then
            LISTENER_ARN="$(aws elbv2 create-listener \
              --region "${AWS_REGION}" \
              --load-balancer-arn "${ALB_ARN}" \
              --port 80 \
              --protocol HTTP \
              --default-actions Type=fixed-response,FixedResponseConfig='{StatusCode=404,ContentType=text/plain,MessageBody=Not Found}' \
              --query 'Listeners[0].ListenerArn' \
              --output text)"
          fi

          echo "listener_arn=${LISTENER_ARN}" >> "${GITHUB_OUTPUT}"

  compute:
    needs: [init]
    runs-on: ubuntu-latest-16-cores
    env:
      AWS_REGION: ${{ inputs.aws_region }}
      RESOURCE_PREFIX: ${{ inputs.resource_prefix }}
    outputs:
      ecr_repository: ${{ steps.ecr.outputs.repository }}
      cluster_name: ${{ steps.cluster.outputs.cluster_name }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Create ECR repository
        id: ecr
        run: |
          set -euo pipefail
          if aws ecr describe-repositories --region "${AWS_REGION}" --repository-names "${RESOURCE_PREFIX}" >/tmp/ecr.json 2>/dev/null; then
            REPO_NAME="$(jq -r '.repositories[0].repositoryName' /tmp/ecr.json)"
          else
            aws ecr create-repository \
              --region "${AWS_REGION}" \
              --repository-name "${RESOURCE_PREFIX}" \
              --tags Key=ResourceGroup,Value=vzw-partner-demo >/tmp/ecr.json
            REPO_NAME="$(jq -r '.repository.repositoryName' /tmp/ecr.json)"
          fi

          aws ecr put-lifecycle-policy \
            --region "${AWS_REGION}" \
            --repository-name "${RESOURCE_PREFIX}" \
            --lifecycle-policy-text '{"rules":[{"rulePriority":1,"description":"retain-last-50","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":50},"action":{"type":"expire"}}]}' >/dev/null

          echo "repository=${REPO_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Create ECS cluster
        id: cluster
        run: |
          set -euo pipefail
          CLUSTER_NAME="${RESOURCE_PREFIX}-cluster"
          STATUS="$(aws ecs describe-clusters \
            --region "${AWS_REGION}" \
            --clusters "${CLUSTER_NAME}" \
            --query 'clusters[0].status' \
            --output text 2>/dev/null || true)"

          if [ "${STATUS}" = "None" ] || [ -z "${STATUS}" ]; then
            aws ecs create-cluster \
              --region "${AWS_REGION}" \
              --cluster-name "${CLUSTER_NAME}" \
              --tags key=ResourceGroup,value=vzw-partner-demo >/dev/null
          fi

          aws ecs put-cluster-capacity-providers \
            --region "${AWS_REGION}" \
            --cluster "${CLUSTER_NAME}" \
            --capacity-providers FARGATE FARGATE_SPOT \
            --default-capacity-provider-strategy capacityProvider=FARGATE,weight=1 >/dev/null 2>&1 || true

          echo "cluster_name=${CLUSTER_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Create CloudWatch log group
        id: logs
        run: |
          set -euo pipefail
          LOG_GROUP="/ecs/${RESOURCE_PREFIX}"
          EXISTS="$(aws logs describe-log-groups --region "${AWS_REGION}" --log-group-name-prefix "${LOG_GROUP}" --query 'length(logGroups[?logGroupName==`'"${LOG_GROUP}"'`])' --output text)"
          if [ "${EXISTS}" = "0" ]; then
            aws logs create-log-group \
              --region "${AWS_REGION}" \
              --log-group-name "${LOG_GROUP}" \
              --tags ResourceGroup=vzw-partner-demo >/dev/null
          fi
          aws logs put-retention-policy \
            --region "${AWS_REGION}" \
            --log-group-name "${LOG_GROUP}" \
            --retention-in-days 14 >/dev/null

  iam:
    needs: [init]
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ inputs.aws_region }}
      RESOURCE_PREFIX: ${{ inputs.resource_prefix }}
    outputs:
      execution_role_arn: ${{ steps.exec_role.outputs.role_arn }}
      task_role_arn: ${{ steps.task_role.outputs.role_arn }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Create ECS task execution role
        id: exec_role
        run: |
          set -euo pipefail
          ROLE_NAME="${RESOURCE_PREFIX}-ecs-execution-role"
          ROLE_ARN="$(aws iam get-role --role-name "${ROLE_NAME}" --query 'Role.Arn' --output text 2>/dev/null || true)"

          if [ -z "${ROLE_ARN}" ] || [ "${ROLE_ARN}" = "None" ]; then
            cat >/tmp/ecs-trust-policy.json <<'JSON'
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Principal": { "Service": "ecs-tasks.amazonaws.com" },
                "Action": "sts:AssumeRole"
              }
            ]
          }
          JSON

            aws iam create-role \
              --role-name "${ROLE_NAME}" \
              --assume-role-policy-document file:///tmp/ecs-trust-policy.json \
              --tags Key=ResourceGroup,Value=vzw-partner-demo >/dev/null
            ROLE_ARN="$(aws iam get-role --role-name "${ROLE_NAME}" --query 'Role.Arn' --output text)"
          fi

          aws iam attach-role-policy \
            --role-name "${ROLE_NAME}" \
            --policy-arn arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy >/dev/null 2>&1 || true

          aws iam put-role-policy \
            --role-name "${ROLE_NAME}" \
            --policy-name "${RESOURCE_PREFIX}-ecs-exec-inline" \
            --policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":["ecr:GetAuthorizationToken","ecr:BatchGetImage","ecr:GetDownloadUrlForLayer","logs:CreateLogStream","logs:PutLogEvents"],"Resource":"*"}]}' >/dev/null

          echo "role_arn=${ROLE_ARN}" >> "${GITHUB_OUTPUT}"

      - name: Create ECS task role
        id: task_role
        run: |
          set -euo pipefail
          ROLE_NAME="${RESOURCE_PREFIX}-ecs-task-role"
          ROLE_ARN="$(aws iam get-role --role-name "${ROLE_NAME}" --query 'Role.Arn' --output text 2>/dev/null || true)"

          if [ -z "${ROLE_ARN}" ] || [ "${ROLE_ARN}" = "None" ]; then
            cat >/tmp/ecs-task-trust-policy.json <<'JSON'
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Principal": { "Service": "ecs-tasks.amazonaws.com" },
                "Action": "sts:AssumeRole"
              }
            ]
          }
          JSON

            aws iam create-role \
              --role-name "${ROLE_NAME}" \
              --assume-role-policy-document file:///tmp/ecs-task-trust-policy.json \
              --tags Key=ResourceGroup,Value=vzw-partner-demo >/dev/null
            ROLE_ARN="$(aws iam get-role --role-name "${ROLE_NAME}" --query 'Role.Arn' --output text)"
          fi

          aws iam put-role-policy \
            --role-name "${ROLE_NAME}" \
            --policy-name "${RESOURCE_PREFIX}-ecs-task-inline" \
            --policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":["cloudwatch:PutMetricData"],"Resource":"*"}]}' >/dev/null

          echo "role_arn=${ROLE_ARN}" >> "${GITHUB_OUTPUT}"

  finalize:
    needs: [init, networking, compute, iam]
    if: always()
    runs-on: ubuntu-latest-16-cores
    env:
      AWS_REGION: ${{ inputs.aws_region }}
      RESOURCE_PREFIX: ${{ inputs.resource_prefix }}
      AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
      AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
    steps:
      - name: Update Airtable record (active)
        if: >-
          needs.init.result == 'success' &&
          needs.networking.result == 'success' &&
          needs.compute.result == 'success' &&
          needs.iam.result == 'success'
        env:
          RECORD_ID: ${{ needs.init.outputs.record_id }}
          CLUSTER_NAME: ${{ needs.compute.outputs.cluster_name }}
          VPC_ID: ${{ needs.init.outputs.vpc_id }}
          SUBNET_IDS: ${{ needs.networking.outputs.subnet_ids }}
          ALB_SG_ID: ${{ needs.networking.outputs.alb_sg_id }}
          ECS_SG_ID: ${{ needs.networking.outputs.ecs_sg_id }}
          EXEC_ROLE_ARN: ${{ needs.iam.outputs.execution_role_arn }}
          TASK_ROLE_ARN: ${{ needs.iam.outputs.task_role_arn }}
          ALB_ARN: ${{ needs.networking.outputs.alb_arn }}
          ALB_LISTENER_ARN: ${{ needs.networking.outputs.alb_listener_arn }}
          ALB_DNS_NAME: ${{ needs.networking.outputs.alb_dns_name }}
          ECR_REPOSITORY: ${{ needs.compute.outputs.ecr_repository }}
        run: |
          set -euo pipefail
          NOW="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          SG_IDS="${ALB_SG_ID},${ECS_SG_ID}"
          PAYLOAD="$(jq -n \
            --arg status "active" \
            --arg cluster_name "${CLUSTER_NAME}" \
            --arg vpc_id "${VPC_ID}" \
            --arg subnet_ids "${SUBNET_IDS}" \
            --arg security_group_ids "${SG_IDS}" \
            --arg execution_role_arn "${EXEC_ROLE_ARN}" \
            --arg task_role_arn "${TASK_ROLE_ARN}" \
            --arg alb_arn "${ALB_ARN}" \
            --arg alb_listener_arn "${ALB_LISTENER_ARN}" \
            --arg alb_dns_name "${ALB_DNS_NAME}" \
            --arg ecr_repository "${ECR_REPOSITORY}" \
            --arg alb_sg_id "${ALB_SG_ID}" \
            --arg ecs_sg_id "${ECS_SG_ID}" \
            --arg aws_region "${AWS_REGION}" \
            --arg updated_at "${NOW}" \
            --arg last_error "" \
            --arg last_run_url "${RUN_URL}" \
            '{fields:{status:$status,cluster_name:$cluster_name,vpc_id:$vpc_id,subnet_ids:$subnet_ids,security_group_ids:$security_group_ids,execution_role_arn:$execution_role_arn,task_role_arn:$task_role_arn,alb_arn:$alb_arn,alb_listener_arn:$alb_listener_arn,alb_dns_name:$alb_dns_name,ecr_repository:$ecr_repository,alb_sg_id:$alb_sg_id,ecs_sg_id:$ecs_sg_id,aws_region:$aws_region,updated_at:$updated_at,last_error:$last_error,last_run_url:$last_run_url}}')"
          curl -sS -X PATCH "https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/Infrastructure/${RECORD_ID}" \
            -H "Authorization: Bearer ${AIRTABLE_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}" >/dev/null

      - name: Update Airtable record (error)
        if: >-
          needs.init.outputs.record_id != '' &&
          !(
            needs.init.result == 'success' &&
            needs.networking.result == 'success' &&
            needs.compute.result == 'success' &&
            needs.iam.result == 'success'
          )
        env:
          RECORD_ID: ${{ needs.init.outputs.record_id }}
        run: |
          set -euo pipefail
          NOW="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          PAYLOAD="$(jq -n \
            --arg status "error" \
            --arg updated_at "${NOW}" \
            --arg last_error "setup workflow failed" \
            --arg last_run_url "${RUN_URL}" \
            '{fields:{status:$status,updated_at:$updated_at,last_error:$last_error,last_run_url:$last_run_url}}')"
          curl -sS -X PATCH "https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/Infrastructure/${RECORD_ID}" \
            -H "Authorization: Bearer ${AIRTABLE_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}" >/dev/null || true
