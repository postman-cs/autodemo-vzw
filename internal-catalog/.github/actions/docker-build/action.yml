name: 'docker-build'
description: 'Build and push Docker image for API Catalog service'
inputs:
  project_name:
    description: 'Name of the service'
    required: true
  runtime_mode:
    description: 'Runtime mode (ecs_service, k8s_workspace, k8s_discovery)'
    required: true
  aws_access_key_id:
    description: 'AWS Access Key ID'
    required: false
  aws_secret_access_key:
    description: 'AWS Secret Access Key'
    required: false
  aws_region:
    description: 'AWS Region'
    required: true
    default: 'eu-central-1'
  github_app_token:
    description: 'GitHub Token'
    required: false
  gh_fallback_token:
    description: 'Fallback GitHub token for repository variable APIs'
    required: false
  gh_auth_mode:
    description: 'Auth mode for GitHub API client (github_token_first, fallback_pat_first, app_token)'
    required: false
    default: 'github_token_first'
  persist_repo_variables:
    description: 'Whether to persist derived runtime values as repository variables for legacy workflow compatibility'
    required: false
    default: 'true'
outputs:
  project_slug:
    description: 'Sanitized project name'
  service_name:
    description: 'ECS Service Name or K8s Workload Name'
  task_family:
    description: 'ECS Task Family (ECS only)'
  target_group_name:
    description: 'ALB Target Group Name (ECS only)'
  runtime_base_url:
    description: 'Public URL of the service'
  image_uri:
    description: 'Full ECR image URI'
runs:
  using: 'node20'
  main: 'dist/index.js'
