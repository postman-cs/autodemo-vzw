name: 'aws-deploy'
description: 'Deploy AWS Infrastructure for API Catalog service'
inputs:
  project_name:
    description: 'Name of the service'
    required: false
  runtime_mode:
    description: 'Runtime mode (lambda, ecs_service, k8s_workspace, k8s_discovery)'
    required: false
  chaos_enabled:
    description: 'Enable chaos behavior in deployed runtimes'
    required: false
    default: 'true'
  chaos_config:
    description: 'Chaos engineering profile or configuration overrides (JSON)'
    required: false
    default: ''
  github_workspace_sync:
    description: 'Enable Bifrost GitHub workspace sync steps'
    required: false
    default: 'true'
  environment_sync_enabled:
    description: 'Enable system-environment association steps'
    required: false
    default: 'true'
  environments:
    description: 'JSON array of environments (e.g. ["prod"])'
    required: false
    default: '["prod"]'
  system_env_map:
    description: 'JSON map of environment slug to Postman System Environment ID'
    required: false
    default: '{}'
  dependency_targets_json:
    description: 'JSON array of ClusterIP DNS dependency target URLs for inter-service traffic'
    required: false
    default: '[]'
  postman_team_id:
    description: 'Postman Team ID'
    required: false
  baseline_uid:
    description: 'Postman Baseline Collection UID'
    required: false
  workspace_id:
    description: 'Postman Workspace ID'
    required: false
  image_uri:
    description: 'Docker image URI (container modes only)'
    required: false
  runtime_base_url:
    description: 'Public URL of the service (container modes only)'
    required: false
  service_name:
    description: 'ECS Service Name or K8s Workload Name (from docker-build)'
    required: false
  task_family:
    description: 'ECS Task Family (from docker-build)'
    required: false
  target_group_name:
    description: 'ALB Target Group Name (from docker-build)'
    required: false
  project_slug:
    description: 'Sanitized project name (from docker-build)'
    required: false
  postman_api_key:
    description: 'Postman API Key'
    required: false
  postman_access_token:
    description: 'Postman Access Token (for Bifrost)'
    required: false
  github_app_token:
    description: 'GitHub Token'
    required: false
  gh_fallback_token:
    description: 'Fallback GitHub token for repository variable APIs'
    required: false
  gh_auth_mode:
    description: 'Auth mode for GitHub API client (github_token_first, fallback_pat_first, app_token)'
    required: false
    default: 'github_token_first'
  persist_predeploy_env_repo_variables:
    description: 'Whether pre-deploy Postman environment UIDs should also be persisted as repository variables for legacy workflow compatibility'
    required: false
    default: 'true'
  aws_access_key_id:
    description: 'AWS Access Key ID'
    required: false
  aws_secret_access_key:
    description: 'AWS Secret Access Key'
    required: false
  aws_region:
    description: 'AWS Region'
    required: false
    default: 'eu-central-1'
  step:
    description: 'Single step name to execute, or all'
    required: false
  dev_gw_url:
    description: 'Lambda API Gateway URL (dev)'
    required: false
  prod_gw_url:
    description: 'Lambda API Gateway URL (prod)'
    required: false
  dev_api_id:
    description: 'Lambda API Gateway ID (dev)'
    required: false
  prod_api_id:
    description: 'Lambda API Gateway ID (prod)'
    required: false
  host_port:
    description: 'Host port for k8s_discovery hostNetwork mode (unique per service)'
    required: false
  insights_project_id:
    description: 'Insights project ID for step-mode execution'
    required: false
outputs:
  ecs_service_name:
    description: 'Deployed ECS Service Name'
  ecs_target_group_arn:
    description: 'Deployed Target Group ARN'
  ecs_listener_rule_arn:
    description: 'Deployed Listener Rule ARN'
  k8s_namespace:
    description: 'Kubernetes Namespace'
  k8s_deployment_name:
    description: 'Kubernetes Deployment Name'
  k8s_service_name:
    description: 'Kubernetes Service Name'
  k8s_ingress_name:
    description: 'Kubernetes Ingress Name'
  runtime_base_url:
    description: 'Public URL of the service'
  insights_project_id:
    description: 'Postman Insights Project ID'
  image_uri:
    description: 'Full ECR image URI'
  dev_gw_url:
    description: 'Lambda API Gateway URL (dev)'
  prod_gw_url:
    description: 'Lambda API Gateway URL (prod)'
  dev_api_id:
    description: 'Lambda API Gateway ID (dev)'
  prod_api_id:
    description: 'Lambda API Gateway ID (prod)'
  gw_urls_json:
    description: 'JSON map of environment to API Gateway URL'
  gw_ids_json:
    description: 'JSON map of environment to API Gateway ID'
  env_runtime_urls_json:
    description: 'JSON map of environment to runtime URL for all runtime modes'
  env_resource_names_json:
    description: 'JSON map of environment to deployed resource identifiers'
  environment_deployments_json:
    description: 'JSON array of environment deployment records'
  env_uids_json:
    description: 'JSON map of environment slug to Postman environment UID created during pre-deploy steps'
  ecs_task_definition:
    description: 'Derived ECS task definition family'
runs:
  using: 'node20'
  main: 'dist/index.js'
