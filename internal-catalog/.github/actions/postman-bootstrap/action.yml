name: 'Postman Bootstrap'
description: 'Bootstrap Postman workspace, spec, and collections for a new service'
inputs:
  project_name:
    description: 'Name of the project'
    required: false
  domain:
    description: 'Domain'
    required: false
  domain_code:
    description: 'Domain code'
    required: false
  requester_email:
    description: 'Email of requester'
    required: false
  spec_url:
    description: 'URL to OpenAPI spec'
    required: false
  team_id:
    description: 'Postman team ID'
    required: false
  runtime_mode:
    description: 'Deployment runtime mode'
    required: false
  environments:
    description: 'JSON array of environments (e.g. ["prod"])'
    required: false
    default: '["prod"]'
  system_env_map:
    description: 'JSON map of environment slug to Postman System Environment ID'
    required: false
    default: '{}'
  postman_api_key:
    description: 'Postman API Key'
    required: false
  postman_access_token:
    description: 'Postman Access Token'
    required: false
  postman_team_id:
    description: 'Postman team ID for workspace resolution'
    required: false
  postman_team_slug:
    description: 'Postman team slug (used for team-scoped operations)'
    required: false
  workspace_team_id:
    description: 'Workspace team ID for Org Mode instance'
    required: false
  workspace_team_name:
    description: 'Workspace team name for Org Mode instance'
    required: false
  github_app_token:
    description: 'GitHub Token'
    required: false
  gh_fallback_token:
    description: 'Fallback GitHub token for repository variable APIs'
    required: false
  gh_auth_mode:
    description: 'Auth mode for GitHub API client (github_token_first, fallback_pat_first, app_token)'
    required: false
    default: 'github_token_first'
  governance_mapping:
    description: 'Governance mapping (JSON string)'
    required: false
  step:
    description: 'Single step name to execute, or all'
    required: false
  workspace_id:
    description: 'Workspace ID for step-mode execution'
    required: false
  spec_uid:
    description: 'Spec UID for step-mode execution'
    required: false
  baseline_uid:
    description: 'Baseline collection UID for step-mode execution'
    required: false
  smoke_uid:
    description: 'Smoke collection UID for step-mode execution'
    required: false
  contract_uid:
    description: 'Contract collection UID for step-mode execution'
    required: false
outputs:
  workspace_id:
    description: 'Postman workspace ID'
  workspace_name:
    description: 'Postman workspace name'
  spec_uid:
    description: 'Postman spec UID'
  baseline_uid:
    description: 'Baseline collection UID'
  smoke_uid:
    description: 'Smoke collection UID'
  contract_uid:
    description: 'Contract collection UID'
runs:
  using: 'node20'
  main: 'dist/index.js'
