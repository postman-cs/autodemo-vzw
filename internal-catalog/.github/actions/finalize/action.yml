name: 'finalize'
description: 'Finalize provisioning, export artifacts and replace with CI workflow'
inputs:
  project_name:
    description: 'Name of the service'
    required: false
  runtime_mode:
    description: 'Runtime mode (lambda, ecs_service, k8s_workspace, k8s_discovery)'
    required: false
  github_workspace_sync:
    description: 'Enable Bifrost GitHub workspace sync steps'
    required: false
    default: 'true'
  environment_sync_enabled:
    description: 'Enable system-environment association steps'
    required: false
  deployment_mode:
    description: 'Deployment mode (single or graph)'
    required: false
    default: 'single'
  k8s_discovery_workspace_link:
    description: 'Whether to link workspace for k8s_discovery'
    required: false
    default: 'false'
  environments:
    description: 'JSON array of environments (e.g. ["prod"])'
    required: false
    default: '["prod"]'
  system_env_map:
    description: 'JSON map of environment slug to Postman System Environment ID'
    required: false
    default: '{}'
  postman_team_id:
    description: 'Postman Team ID'
    required: false
  workspace_team_id:
    description: 'Workspace sub-team ID (for org-mode instances)'
    required: false
  workspace_id:
    description: 'Postman Workspace ID'
    required: false
  baseline_uid:
    description: 'Postman Baseline Collection UID'
    required: false
  smoke_uid:
    description: 'Postman Smoke Collection UID'
    required: false
  contract_uid:
    description: 'Postman Contract Collection UID'
    required: false
  image_uri:
    description: 'Docker image URI'
    required: false
  runtime_base_url:
    description: 'Public URL of the service'
    required: false
  insights_project_id:
    description: 'Postman Insights Project ID'
    required: false
  ecs_service_name:
    description: 'ECS Service Name'
    required: false
  ecs_target_group_arn:
    description: 'ECS Target Group ARN'
    required: false
  ecs_listener_rule_arn:
    description: 'ECS Listener Rule ARN'
    required: false
  ecs_task_definition:
    description: 'ECS Task Definition Family'
    required: false
  k8s_namespace:
    description: 'K8s Namespace'
    required: false
  k8s_deployment_name:
    description: 'K8s Deployment Name'
    required: false
  k8s_service_name:
    description: 'K8s Service Name'
    required: false
  k8s_ingress_name:
    description: 'K8s Ingress Name'
    required: false
  dev_gw_url:
    description: 'Lambda API Gateway URL (dev)'
    required: false
  prod_gw_url:
    description: 'Lambda API Gateway URL (prod)'
    required: false
  dev_api_id:
    description: 'Lambda API Gateway ID (dev)'
    required: false
  prod_api_id:
    description: 'Lambda API Gateway ID (prod)'
    required: false
  gw_urls_json:
    description: 'JSON map of environment to API Gateway URL'
    required: false
    default: '{}'
  gw_ids_json:
    description: 'JSON map of environment to API Gateway ID'
    required: false
    default: '{}'
  env_runtime_urls_json:
    description: 'JSON map of environment to runtime URL for all runtime modes'
    required: false
    default: '{}'
  env_resource_names_json:
    description: 'JSON map of environment to deployed resource identifiers'
    required: false
    default: '{}'
  environment_deployments_json:
    description: 'JSON array of environment deployment records'
    required: false
    default: '[]'
  postman_api_key:
    description: 'Postman API Key'
    required: false
  postman_access_token:
    description: 'Postman Access Token'
    required: false
  github_app_token:
    description: 'GitHub Token'
    required: false
  push_token:
    description: 'Explicit token for workflow-file commits and pushes'
    required: false
  gh_fallback_token:
    description: 'Fallback GitHub token for repository variable APIs'
    required: false
  gh_auth_mode:
    description: 'Auth mode for GitHub API client (github_token_first, fallback_pat_first, app_token)'
    required: false
    default: 'github_token_first'
  fern_token:
    description: 'Fern Token'
    required: false
  ci_workflow_base64:
    description: 'Base64 encoded CI workflow content'
    required: false
  committer_name:
    description: 'Git committer name'
    required: false
    default: 'Postman CSE'
  committer_email:
    description: 'Git committer email'
    required: false
    default: 'help@postman.com'
  step:
    description: 'Single step name to execute, or all'
    required: false
  env_uids:
    description: 'Serialized environment UID map for step-mode execution'
    required: false
    default: '{}'
  insights_cluster_name:
    description: 'Insights cluster name for discovery service matching'
    required: false
outputs:
  mock_url:
    description: 'Postman Mock Server URL'
  monitor_uid:
    description: 'Postman Smoke Monitor UID'
  fern_docs_url:
    description: 'Fern Docs URL'
runs:
  using: 'node20'
  main: 'dist/index.js'
