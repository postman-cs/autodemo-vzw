openapi: 3.0.3
info:
  title: VZW Identity Federation API
  description: >-
    Provides enterprise identity federation capabilities for Verizon partner
    integrations. The API exchanges external identity provider assertions for
    Verizon-issued OAuth tokens, manages trusted API clients, and exposes
    signing key metadata used by relying parties to validate token signatures.
    It is designed for service-to-service trust mediation, delegated API access,
    and controlled lifecycle management of federated client credentials.
  version: 1.0.0
  contact:
    name: Verizon Identity Platform API Team
    email: identity-api-team@verizon.com
    url: https://developer.verizon.com/identity
  license:
    name: Proprietary
    url: https://www.verizon.com/business/terms/network-api-license
  x-verizon-catalog-id: vzw-identity-federation-api
  x-verizon-domain: identity
servers:
  - url: https://vzw-identity-federation-api.api.verizon.com/v1
    description: Production
  - url: https://vzw-identity-federation-api.staging.verizon.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Token Exchange
    description: Exchange external enterprise assertions for Verizon OAuth tokens
  - name: Client Management
    description: Register and maintain trusted OAuth clients and redirect policy
  - name: Key Management
    description: Rotate signing keys and publish JWKS metadata for verifiers
paths:
  /v1/token/exchange:
    post:
      operationId: exchangeEnterpriseToken
      summary: Exchange enterprise SSO assertion for Verizon access token
      description: >-
        Exchanges a trusted enterprise identity assertion for a Verizon-issued
        OAuth2 token. The incoming assertion can be an OIDC ID token or SAML2
        bearer assertion depending on federated client policy. The token
        exchange enforces audience binding, issuer trust, and client policy
        constraints before minting an access token for downstream Verizon APIs.
      tags:
        - Token Exchange
      security: []
      requestBody:
        required: true
        description: OAuth2 token exchange request compliant with RFC 8693 profile
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenExchangeRequest'
            examples:
              oidc_id_token:
                summary: Exchange OIDC ID token for access token
                value:
                  grant_type: urn:ietf:params:oauth:grant-type:token-exchange
                  subject_token_type: urn:ietf:params:oauth:token-type:id_token
                  subject_token: eyJraWQiOiJpZHAta2lkLTIwMjYiLCJhbGciOiJSUzI1NiJ9.eyJpc3MiOiJodHRwczovL2lkcC5wYXJ0bmVyLmNvbSIsImF1ZCI6InZ6dy1pZGVudGl0eS1mZWRlcmF0aW9uLWFwaSIsInN1YiI6InVzZXItNzQyIn0.signature
                  requested_token_type: urn:ietf:params:oauth:token-type:access_token
                  audience: vzw-network-operations-api
                  scope: network.read network.location
                  client_id: acme-incident-console
                  trace_id: 8f7b2f9f-1220-4e20-bf0d-84e6d5d8cb69
              saml_assertion:
                summary: Exchange SAML2 bearer assertion
                value:
                  grant_type: urn:ietf:params:oauth:grant-type:token-exchange
                  subject_token_type: urn:ietf:params:oauth:token-type:saml2
                  subject_token: PHNhbWxwOlJlc3BvbnNlIElEPSJfN2I2IiBWZXJzaW9uPSIyLjAiIElzc3VlSW5zdGFudD0iMjAyNi0wMy0xNFQxMjo1NDo0NloiPjxzYW1sOklzc3Vlcj5odHRwczovL2lkcC5wYXJ0bmVyLmNvbS88L3NhbWw6SXNzdWVyPjwvc2FtbHA6UmVzcG9uc2U+
                  requested_token_type: urn:ietf:params:oauth:token-type:access_token
                  audience: vzw-edge-monitor-api
                  scope: monitor.read
                  client_id: acme-observability-agent
                  trace_id: 6605ed2f-0a5c-4d0a-ab16-09f96df63d90
      responses:
        '200':
          description: Token exchange successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenExchangeResponse'
              examples:
                access_token_issued:
                  summary: Access token with key id for verifier pinning
                  value:
                    access_token: eyJraWQiOiJ2encta2lkLTIwMjYtMDMtMjciLCJhbGciOiJSUzI1NiJ9.eyJpc3MiOiJodHRwczovL2lkZW50aXR5LnZlcml6b24uY29tIiwiYXVkIjoidnp3LW5ldHdvcmstb3BlcmF0aW9ucy1hcGkiLCJzY29wZSI6Im5ldHdvcmsucmVhZCBuZXR3b3JrLmxvY2F0aW9uIn0.signature
                    token_type: Bearer
                    expires_in: 900
                    issued_token_type: urn:ietf:params:oauth:token-type:access_token
                    scope: network.read network.location
                    client_id: acme-incident-console
                    audience: vzw-network-operations-api
                    jwk_kid: vzw-kid-2026-03-27
                    trace_id: 8f7b2f9f-1220-4e20-bf0d-84e6d5d8cb69
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '409':
          $ref: '#/components/responses/409'
        '422':
          $ref: '#/components/responses/422'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
  /v1/clients:
    post:
      operationId: createFederatedClient
      summary: Register federated OAuth client
      description: >-
        Creates a trusted client registration for enterprise federation. The
        client metadata controls allowed grant types, redirect URI policy,
        token lifetime limits, and issuer trust boundaries used during token
        exchange. Registered clients are scoped to a tenant and can be managed
        later through update operations.
      tags:
        - Client Management
      requestBody:
        required: true
        description: Federated client registration payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientCreateRequest'
            examples:
              service_client:
                summary: Service client using JWT assertion auth
                value:
                  name: Acme Incident Console
                  tenant_id: ent-acme-prod
                  redirect_uris:
                    - https://console.acme.example.com/auth/callback
                    - https://console.acme.example.com/oauth/oidc
                  grant_types:
                    - client_credentials
                    - urn:ietf:params:oauth:grant-type:token-exchange
                  token_endpoint_auth_method: private_key_jwt
                  issuer: https://idp.partner.com
                  audience_allowlist:
                    - vzw-network-operations-api
                    - vzw-edge-monitor-api
                  scopes:
                    - network.read
                    - network.location
                    - monitor.read
                  jwks_uri: https://console.acme.example.com/.well-known/jwks.json
                  access_token_ttl_seconds: 900
                  refresh_token_ttl_seconds: 0
      responses:
        '201':
          description: Federated client created
          headers:
            Location:
              description: URI of the newly created client resource
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientResponse'
              examples:
                created_client:
                  summary: Newly registered client metadata
                  value:
                    client_id: cli_7f2f10f8f3a4
                    name: Acme Incident Console
                    tenant_id: ent-acme-prod
                    status: ACTIVE
                    redirect_uris:
                      - https://console.acme.example.com/auth/callback
                      - https://console.acme.example.com/oauth/oidc
                    grant_types:
                      - client_credentials
                      - urn:ietf:params:oauth:grant-type:token-exchange
                    token_endpoint_auth_method: private_key_jwt
                    issuer: https://idp.partner.com
                    audience_allowlist:
                      - vzw-network-operations-api
                      - vzw-edge-monitor-api
                    scopes:
                      - network.read
                      - network.location
                      - monitor.read
                    jwks_uri: https://console.acme.example.com/.well-known/jwks.json
                    access_token_ttl_seconds: 900
                    refresh_token_ttl_seconds: 0
                    created_at: '2026-03-27T10:24:30Z'
                    updated_at: '2026-03-27T10:24:30Z'
                    created_by: iam-admin@acme.example.com
                    updated_by: iam-admin@acme.example.com
                    trace_id: 6ea8921c-45b8-46dc-9ad1-3bb4caa16b0b
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '409':
          $ref: '#/components/responses/409'
        '422':
          $ref: '#/components/responses/422'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
  /v1/clients/{clientId}:
    get:
      operationId: getFederatedClient
      summary: Get federated client details
      description: >-
        Retrieves the current configuration and trust policy of a federated
        OAuth client registration. Use this endpoint to verify redirect URI
        allowlists, auth method settings, active key references, and status
        prior to operational rollout.
      tags:
        - Client Management
      parameters:
        - $ref: '#/components/parameters/ClientIdPath'
      responses:
        '200':
          description: Federated client retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientResponse'
              examples:
                active_client:
                  summary: Existing active client registration
                  value:
                    client_id: cli_7f2f10f8f3a4
                    name: Acme Incident Console
                    tenant_id: ent-acme-prod
                    status: ACTIVE
                    redirect_uris:
                      - https://console.acme.example.com/auth/callback
                      - https://console.acme.example.com/oauth/oidc
                    grant_types:
                      - client_credentials
                      - urn:ietf:params:oauth:grant-type:token-exchange
                    token_endpoint_auth_method: private_key_jwt
                    issuer: https://idp.partner.com
                    audience_allowlist:
                      - vzw-network-operations-api
                      - vzw-edge-monitor-api
                    scopes:
                      - network.read
                      - network.location
                      - monitor.read
                    jwks_uri: https://console.acme.example.com/.well-known/jwks.json
                    jwk_kid: acme-kid-2026-q1
                    access_token_ttl_seconds: 900
                    refresh_token_ttl_seconds: 0
                    created_at: '2026-03-27T10:24:30Z'
                    updated_at: '2026-03-27T14:07:05Z'
                    created_by: iam-admin@acme.example.com
                    updated_by: secops@acme.example.com
                    trace_id: 2f3564be-8813-46fd-8241-16f0f7de1151
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
    patch:
      operationId: updateFederatedClient
      summary: Update federated client policy
      description: >-
        Applies partial updates to a federated client registration. Only fields
        included in the request are modified. Policy updates are audited and may
        trigger key validation checks when authentication metadata changes.
      tags:
        - Client Management
      parameters:
        - $ref: '#/components/parameters/ClientIdPath'
      requestBody:
        required: true
        description: Partial federated client update payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientPatchRequest'
            examples:
              rotate_redirect_and_scope:
                summary: Add callback URI and adjust scopes
                value:
                  redirect_uris:
                    - https://console.acme.example.com/auth/callback
                    - https://console.acme.example.com/oauth/oidc
                    - https://console.acme.example.com/oauth/incident-callback
                  scopes:
                    - network.read
                    - network.location
                  access_token_ttl_seconds: 600
                  status: ACTIVE
                  trace_id: dccf4d4f-8b83-4d2e-a0fc-6f13b8dcb380
      responses:
        '200':
          description: Federated client updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientResponse'
              examples:
                updated_client:
                  summary: Updated client metadata
                  value:
                    client_id: cli_7f2f10f8f3a4
                    name: Acme Incident Console
                    tenant_id: ent-acme-prod
                    status: ACTIVE
                    redirect_uris:
                      - https://console.acme.example.com/auth/callback
                      - https://console.acme.example.com/oauth/oidc
                      - https://console.acme.example.com/oauth/incident-callback
                    grant_types:
                      - client_credentials
                      - urn:ietf:params:oauth:grant-type:token-exchange
                    token_endpoint_auth_method: private_key_jwt
                    issuer: https://idp.partner.com
                    audience_allowlist:
                      - vzw-network-operations-api
                      - vzw-edge-monitor-api
                    scopes:
                      - network.read
                      - network.location
                    jwks_uri: https://console.acme.example.com/.well-known/jwks.json
                    jwk_kid: acme-kid-2026-q2
                    access_token_ttl_seconds: 600
                    refresh_token_ttl_seconds: 0
                    created_at: '2026-03-27T10:24:30Z'
                    updated_at: '2026-03-27T15:16:44Z'
                    created_by: iam-admin@acme.example.com
                    updated_by: secops@acme.example.com
                    trace_id: dccf4d4f-8b83-4d2e-a0fc-6f13b8dcb380
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '409':
          $ref: '#/components/responses/409'
        '422':
          $ref: '#/components/responses/422'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
  /v1/keys/rotate:
    post:
      operationId: rotateSigningKey
      summary: Rotate federation signing keys
      description: >-
        Rotates the active Verizon signing key used for token issuance by the
        identity federation service. Rotation creates a new active key id while
        preserving prior keys in JWKS until their deprecation window expires.
        This endpoint is restricted to security administrators.
      tags:
        - Key Management
      requestBody:
        required: true
        description: Signing key rotation request payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KeyRotateRequest'
            examples:
              standard_rotation:
                summary: Planned key rotation with overlap period
                value:
                  reason: Scheduled quarterly cryptographic hygiene rotation
                  algorithm: RS256
                  overlap_seconds: 259200
                  notify_webhook: https://secops.acme.example.com/hooks/vzw-key-events
                  requested_by: secops@verizon.com
                  trace_id: 51d242c5-cdc4-4f08-969a-50d35623f8b2
      responses:
        '202':
          description: Key rotation accepted and processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeyRotateResponse'
              examples:
                rotation_accepted:
                  summary: Key rotation job accepted
                  value:
                    rotation_id: rot_4f22b0d0d8d1
                    status: ACCEPTED
                    previous_jwk_kid: vzw-kid-2026-03-27
                    new_jwk_kid: vzw-kid-2026-06-30
                    effective_at: '2026-06-30T00:00:00Z'
                    overlap_seconds: 259200
                    trace_id: 51d242c5-cdc4-4f08-969a-50d35623f8b2
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '409':
          $ref: '#/components/responses/409'
        '422':
          $ref: '#/components/responses/422'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
  /v1/.well-known/jwks.json:
    get:
      operationId: getJsonWebKeySet
      summary: Get JWKS document for token signature verification
      description: >-
        Returns the JSON Web Key Set used by Verizon Identity Federation for
        signing JWT access tokens. Relying parties should cache this response
        and refresh based on cache-control policy or key id misses.
      tags:
        - Key Management
      security: []
      responses:
        '200':
          description: Current JWKS published
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JwksResponse'
              examples:
                active_and_grace_keys:
                  summary: Active key and prior key during overlap period
                  value:
                    keys:
                      - kty: RSA
                        use: sig
                        alg: RS256
                        kid: vzw-kid-2026-06-30
                        n: sXchhA5KrX0liP-6kP7K7C8w6mvtYx58vEtA0M02fM2aEwCC4N64KDs5mww9wv3OmjTTjzE8gca1W4C4pcN2lQYIn8QjZDxGOQuD4dV3YFT6nYq5qA7JpFIihjz3Y0jB8GXrRynLCrMifVvuz1hdG8gkXIvVpWl0YzKMSQ3p8Zb7QkGx7Uh4w2gI2vTgNqK4Zpl7_M-S8q5HupCk3-2mH8C9ek3L5YY8sjkK8fH3qfRk4jZ_sV0I8SXw0WfQ7vCI6gUz5IgaLhXvNn7rP4Jlz0f5Yt6S0
