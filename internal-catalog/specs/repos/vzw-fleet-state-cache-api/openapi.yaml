          type: string
          format: date-time
          example: '2026-03-27T16:06:10Z'
        assignmentId:
          type: string
          nullable: true
          example: ASG-893400
        currentIncidentId:
          type: string
          nullable: true
          example: INC-20260327-0088
        crew:
