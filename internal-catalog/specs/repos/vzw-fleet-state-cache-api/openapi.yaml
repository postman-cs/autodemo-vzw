    UnitState:
      type: object
      description: Full unit state snapshot
      properties:
        unitId:
          type: string
          example: U-SF-ENG-104
        callsign:
          type: string
          example: ENG-104
        agency:
          type: string
          example: SFFD
        district:
          type: string
          example: FINANCIAL_DISTRICT
        status:
          $ref: '#/components/schemas/UnitStatus'
        statusReason:
          type: string
          nullable: true
