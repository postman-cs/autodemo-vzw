    DeviceClass:
      type: object
      description: Allowed policy class and provisioning constraints for a device cohort
      properties:
        class_id:
          type: string
          description: Stable policy class identifier used in provisioning workflows
          example: ems-tablet
        display_name:
          type: string
          description: Human-readable name for the policy class
          example: EMS Tablet
        description:
          type: string
          description: Detailed intent and network behavior for this policy class
          example: LTE tablet profile with prioritized telemedicine routing
        enabled:
          type: boolean
          description: Indicates whether this class can be assigned to new devices
          example: true
        supported_qod_tiers:
          type: array
          description: QoD tiers this policy class is permitted to request
          items:
            type: string
            description: Allowed QoD priority tier for this class
            example: incident_critical
            enum:
              - routine
              - elevated
              - incident_critical
          example:
            - elevated
            - incident_critical
        max_devices_per_incident:
          type: integer
          description: Maximum active devices of this class allowed per incident
          example: 120
        updated_at:
          type: string
          format: date-time
          description: Timestamp of latest policy class update
          example: 2026-03-01T20:11:05Z
      required:
        - class_id
        - display_name
        - description
        - enabled
        - supported_qod_tiers
        - max_devices_per_incident
        - updated_at
    PaginationMeta:
      type: object
      description: Cursor and size metadata for paginated list responses
      properties:
        page:
          type: integer
          description: Current page number represented in this response
          example: 1
        page_size:
          type: integer
          description: Number of records returned per page request
          example: 25
        total_items:
          type: integer
          description: Total number of records across all pages
          example: 3
        total_pages:
          type: integer
          description: Total number of pages for current query shape
          example: 1
        has_next_page:
          type: boolean
          description: Indicates whether another page is available
          example: false
      required:
        - page
        - page_size
        - total_items
        - total_pages
        - has_next_page
    ErrorResponse:
      type: object
      description: Standardized error envelope for failed API requests
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'
      required:
        - error
    ErrorDetail:
      type: object
      description: Detailed error payload with machine and human-readable context
      properties:
        code:
          type: string
          description: Machine-readable application error code
          example: invalid_request
        message:
          type: string
          description: Human-readable summary of the failure
          example: Request payload did not pass validation checks
        details:
          type: string
          description: Additional context describing the exact failure condition
          example: Field incident_id must be a non-empty string
        status:
          type: integer
          description: HTTP status code associated with this error
          example: 400
        trace_id:
          type: string
          format: uuid
          description: Distributed trace id that can be used for support correlation
          example: 4f2f2ccf-1d66-4e47-9e48-b0c687b03610
      required:
        - code
        - message
        - details
        - status
        - trace_id
