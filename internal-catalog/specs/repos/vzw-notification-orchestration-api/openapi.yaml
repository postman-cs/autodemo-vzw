openapi: 3.0.3
info:
  title: VZW Notification Orchestration API
  description: >-
    Orchestrates customer and operator notifications across SMS, email, and push channels with runtime preference
    enforcement. Supports message template lifecycle management, notification dispatch tracking, and per-party
    communication preference controls including quiet hours, channel policy, locale, and opt-in status.
  version: 1.0.0
  contact:
    name: Verizon API Platform Team
    email: api-support@verizon.com
    url: https://developer.verizon.com
  license:
    name: Proprietary
    url: https://www.verizon.com/about/terms-conditions
  x-verizon-catalog-id: vzw-notification-orchestration-api
  x-verizon-domain: notifications
servers:
  - url: https://vzw-notification-orchestration-api.api.verizon.com/v1
    description: Production
  - url: https://vzw-notification-orchestration-api.staging.api.verizon.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Notifications
    description: Create and retrieve multi-channel notification delivery records
  - name: Templates
    description: Manage reusable notification templates and delivery metadata
  - name: Preferences
    description: Upsert and retrieve communication preferences for customers and operators
paths:
  /v1/notifications:
    post:
      operationId: createNotification
      summary: Create and dispatch notification
      description: >-
        Creates a notification request and dispatches content to one or more channels based on runtime
        preference enforcement. The orchestrator applies channel policy, opt-in status, locale selection,
        and quiet-hour constraints before selecting final delivery channel order.
      tags:
        - Notifications
      requestBody:
        required: true
        description: Notification dispatch payload
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNotificationRequest"
            examples:
              smsFirstAlert:
                summary: SMS-first outage alert notification
                value:
                  party_id: "cust-935714"
                  correlation_id: "a53d13a9-3d8c-44d5-a385-2f8617b4b542"
                  event_type: "NETWORK_OUTAGE_ALERT"
                  recipient_type: "CUSTOMER"
                  priority: "HIGH"
                  template_id: "tpl-network-outage-v3"
                  locale: "en-US"
                  channel_policy: "sms_first"
                  variables:
                    incident_id: "inc-7742"
                    service_area: "Dallas, TX"
                    estimated_restore_time: "2026-03-27T22:00:00Z"
                  metadata:
                    source_system: "network-ops"
                    operator_id: "ops-112"
                    request_origin: "nms"
      responses:
        "201":
          description: Notification accepted and queued for channel delivery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
              examples:
                acceptedForDelivery:
                  summary: Notification accepted
                  value:
                    notification_id: "ntf-01JPQ6X2Y8S9M3W4D0Q47E7TNY"
                    correlation_id: "a53d13a9-3d8c-44d5-a385-2f8617b4b542"
                    party_id: "cust-935714"
                    recipient_type: "CUSTOMER"
                    event_type: "NETWORK_OUTAGE_ALERT"
                    status: "QUEUED"
                    priority: "HIGH"
                    locale: "en-US"
                    channel_policy: "sms_first"
                    quiet_hours:
                      enabled: true
                      timezone: "America/Chicago"
                      start: "22:00"
                      end: "07:00"
                    opt_in_status: "OPTED_IN"
                    channels_attempted:
                      - channel: "SMS"
                        delivery_status: "PENDING"
                        attempted_at: "2026-03-27T20:13:31Z"
                    template_id: "tpl-network-outage-v3"
                    created_at: "2026-03-27T20:13:31Z"
                    updated_at: "2026-03-27T20:13:31Z"
                    trace_id: "b6f3b16f-e80d-45d5-a6eb-17246fa648e6"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "409":
          $ref: "#/components/responses/409"
        "422":
          $ref: "#/components/responses/422"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /v1/notifications/{notificationId}:
    get:
      operationId: getNotificationById
      summary: Get notification by identifier
      description: >-
        Retrieves current dispatch status for a notification including final channel outcomes,
        preference context used for routing decisions, and delivery timestamps for each attempted channel.
      tags:
        - Notifications
      parameters:
        - $ref: "#/components/parameters/NotificationId"
      responses:
        "200":
          description: Notification details returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
              examples:
                deliveredEmailFallback:
                  summary: Delivered through email fallback
                  value:
                    notification_id: "ntf-01JPQ6X2Y8S9M3W4D0Q47E7TNY"
                    correlation_id: "a53d13a9-3d8c-44d5-a385-2f8617b4b542"
                    party_id: "cust-935714"
                    recipient_type: "CUSTOMER"
                    event_type: "NETWORK_OUTAGE_ALERT"
                    status: "DELIVERED"
                    priority: "HIGH"
                    locale: "en-US"
                    channel_policy: "sms_first"
                    quiet_hours:
                      enabled: true
                      timezone: "America/Chicago"
                      start: "22:00"
                      end: "07:00"
                    opt_in_status: "OPTED_IN"
                    channels_attempted:
                      - channel: "SMS"
                        delivery_status: "FAILED"
                        attempted_at: "2026-03-27T20:13:31Z"
                        provider_message_id: "sms-msg-927741"
                        failure_reason: "HANDSET_UNREACHABLE"
                      - channel: "EMAIL"
                        delivery_status: "DELIVERED"
                        attempted_at: "2026-03-27T20:14:02Z"
                        delivered_at: "2026-03-27T20:14:09Z"
                        provider_message_id: "ses-msg-112872"
                    template_id: "tpl-network-outage-v3"
                    created_at: "2026-03-27T20:13:31Z"
                    updated_at: "2026-03-27T20:14:09Z"
                    trace_id: "b6f3b16f-e80d-45d5-a6eb-17246fa648e6"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /v1/templates:
    post:
      operationId: createTemplate
      summary: Create notification template
      description: >-
        Creates a versioned notification template that can be reused for event-driven dispatch.
        Templates may define channel-specific content variants and localization defaults.
      tags:
        - Templates
      requestBody:
        required: true
        description: Template creation payload
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTemplateRequest"
            examples:
              outageTemplate:
                summary: Outage status template
                value:
                  name: "Network Outage Alert"
                  event_type: "NETWORK_OUTAGE_ALERT"
                  description: "Customer outage status update with restoration ETA"
                  locale: "en-US"
                  channels:
                    sms:
                      enabled: true
                      body: "Verizon: Service disruption in {{service_area}}. ETA {{estimated_restore_time}}. Incident {{incident_id}}."
                    email:
                      enabled: true
                      subject: "Service Alert: {{service_area}}"
                      body: "We are working to resolve an outage in {{service_area}}. Estimated restoration time: {{estimated_restore_time}}."
                    push:
                      enabled: true
                      title: "Service Alert"
                      body: "Outage in {{service_area}}. ETA {{estimated_restore_time}}."
                  active: true
      responses:
        "201":
          description: Template created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
              examples:
                createdTemplate:
                  summary: Created template response
                  value:
                    template_id: "tpl-network-outage-v3"
                    version: 3
                    name: "Network Outage Alert"
                    event_type: "NETWORK_OUTAGE_ALERT"
                    description: "Customer outage status update with restoration ETA"
                    locale: "en-US"
                    channels:
                      sms:
                        enabled: true
                        body: "Verizon: Service disruption in {{service_area}}. ETA {{estimated_restore_time}}. Incident {{incident_id}}."
                      email:
                        enabled: true
                        subject: "Service Alert: {{service_area}}"
                        body: "We are working to resolve an outage in {{service_area}}. Estimated restoration time: {{estimated_restore_time}}."
                      push:
                        enabled: true
                        title: "Service Alert"
                        body: "Outage in {{service_area}}. ETA {{estimated_restore_time}}."
                    active: true
                    created_at: "2026-03-27T18:00:00Z"
                    updated_at: "2026-03-27T18:00:00Z"
                    created_by: "ops-admin-42"
                    updated_by: "ops-admin-42"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "409":
          $ref: "#/components/responses/409"
        "422":
          $ref: "#/components/responses/422"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    get:
      operationId: listTemplates
      summary: List notification templates
      description: >-
        Returns a paginated list of templates filtered by event type, locale, and active status.
        Results are ordered by most recently updated first.
      tags:
        - Templates
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: event_type
          in: query
          required: false
          description: Filter templates by event type
          schema:
            type: string
            example: "NETWORK_OUTAGE_ALERT"
        - name: locale
          in: query
          required: false
          description: Filter templates by locale code
          schema:
            $ref: "#/components/schemas/LocaleCode"
        - name: active
          in: query
          required: false
          description: Filter templates by active status
          schema:
            type: boolean
            example: true
      responses:
        "200":
          description: Paginated template list returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplatePage"
              examples:
                pageOne:
                  summary: First page of templates
                  value:
                    data:
                      - template_id: "tpl-network-outage-v3"
                        version: 3
                        name: "Network Outage Alert"
                        event_type: "NETWORK_OUTAGE_ALERT"
                        description: "Customer outage status update with restoration ETA"
                        locale: "en-US"
                        channels:
                          sms:
                            enabled: true
                            body: "Verizon: Service disruption in {{service_area}}. ETA {{estimated_restore_time}}. Incident {{incident_id}}."
                          email:
                            enabled: true
                            subject: "Service Alert: {{service_area}}"
                            body: "We are working to resolve an outage in {{service_area}}. Estimated restoration time: {{estimated_restore_time}}."
                          push:
                            enabled: true
                            title: "Service Alert"
                            body: "Outage in {{service_area}}. ETA {{estimated_restore_time}}."
                        active: true
                        created_at: "2026-03-20T17:00:00Z"
                        updated_at: "2026-03-27T18:00:00Z"
                        created_by: "ops-admin-42"
                        updated_by: "ops-admin-42"
                      - template_id: "tpl-operator-escalation-v1"
                        version: 1
                        name: "Operator Escalation"
                        event_type: "OPERATOR_ESCALATION_REQUIRED"
                        description: "Internal escalation notice to operator shifts"
                        locale: "en-US"
                        channels:
                          sms:
                            enabled: true
                            body: "Escalation {{incident_id}} assigned to {{operator_name}} at {{site_code}}."
                          email:
                            enabled: true
                            subject: "Escalation {{incident_id}}"
                            body: "Escalation {{incident_id}} requires immediate review at {{site_code}}."
                          push:
                            enabled: false
                        active: true
                        created_at: "2026-03-11T08:30:00Z"
                        updated_at: "2026-03-22T13:05:00Z"
                        created_by: "ops-manager-7"
                        updated_by: "ops-manager-7"
                    page: 1
                    page_size: 2
                    total_items: 18
                    total_pages: 9
                    has_next: true
                    has_previous: false
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /v1/templates/{templateId}:
    patch:
      operationId: updateTemplate
      summary: Update notification template
      description: >-
        Applies partial updates to a template. Update requests may change content, activation state,
        or locale metadata. The service increments template version when channel bodies are modified.
      tags:
        - Templates
      parameters:
        - $ref: "#/components/parameters/TemplateId"
      requestBody:
        required: true
        description: Partial template update payload
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTemplateRequest"
            examples:
              updatePushBody:
                summary: Update push message text
                value:
                  description: "Customer outage status update with restoration ETA and impacted services"
                  channels:
                    push:
                      enabled: true
                      title: "Service Alert"
                      body: "Outage in {{service_area}} affecting {{service_type}}. ETA {{estimated_restore_time}}."
                  active: true
      responses:
        "200":
          description: Template updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
              examples:
                updatedTemplate:
                  summary: Updated template response
                  value:
                    template_id: "tpl-network-outage-v3"
                    version: 4
                    name: "Network Outage Alert"
                    event_type: "NETWORK_OUTAGE_ALERT"
                    description: "Customer outage status update with restoration ETA and impacted services"
                    locale: "en-US"
                    channels:
                      sms:
                        enabled: true
                        body: "Verizon: Service disruption in {{service_area}}. ETA {{estimated_restore_time}}. Incident {{incident_id}}."
                      email:
                        enabled: true
                        subject: "Service Alert: {{service_area}}"
                        body: "We are working to resolve an outage in {{service_area}} affecting {{service_type}}. Estimated restoration time: {{estimated_restore_time}}."
                      push:
                        enabled: true
                        title: "Service Alert"
                        body: "Outage in {{service_area}} affecting {{service_type}}. ETA {{estimated_restore_time}}."
                    active: true
                    created_at: "2026-03-20T17:00:00Z"
                    updated_at: "2026-03-27T20:30:00Z"
                    created_by: "ops-admin-42"
                    updated_by: "ops-admin-11"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "409":
          $ref: "#/components/responses/409"
        "422":
          $ref: "#/components/responses/422"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /v1/preferences/{partyId}:upsert:
    post:
      operationId: upsertPreferenceProfile
      summary: Upsert party communication preferences
      description: >-
        Creates or updates the communication preference profile for a customer or operator party identifier.
        Preference updates are applied atomically and become effective for all subsequent notification dispatches.
      tags:
        - Preferences
      parameters:
        - $ref: "#/components/parameters/PartyId"
      requestBody:
        required: true
        description: Preference profile upsert payload
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertPreferenceRequest"
            examples:
              operatorProfile:
                summary: Operator preference upsert
                value:
                  recipient_type: "OPERATOR"
                  channel_policy: "email_first"
                  priority: "MEDIUM"
                  locale: "en-US"
                  quiet_hours:
                    enabled: false
                    timezone: "America/New_York"
                    start: "22:00"
                    end: "06:00"
                  opt_in_status: "OPTED_IN"
                  channels:
                    sms:
                      enabled: true
                      address: "+14155559876"
                      verified: true
                    email:
                      enabled: true
                      address: "operator.shift1@verizon.com"
                      verified: true
                    push:
                      enabled: true
                      address: "device-token-4428"
                      verified: true
      responses:
        "200":
          description: Preference profile upserted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreferenceProfile"
              examples:
                upsertedProfile:
                  summary: Upserted preference profile
                  value:
                    party_id: "opr-2291"
                    recipient_type: "OPERATOR"
                    channel_policy: "email_first"
                    priority: "MEDIUM"
                    locale: "en-US"
                    quiet_hours:
                      enabled: false
                      timezone: "America/New_York"
                      start: "22:00"
                      end: "06:00"
                    opt_in_status: "OPTED_IN"
                    channels:
                      sms:
                        enabled: true
                        address: "+14155559876"
                        verified: true
                      email:
                        enabled: true
                        address: "operator.shift1@verizon.com"
                        verified: true
                      push:
                        enabled: true
                        address: "device-token-4428"
                        verified: true
                    created_at: "2026-03-11T08:20:00Z"
                    updated_at: "2026-03-27T20:45:00Z"
                    created_by: "preference-service"
                    updated_by: "preference-service"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "422":
          $ref: "#/components/responses/422"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /v1/preferences/{partyId}:
    get:
      operationId: getPreferenceProfile
      summary: Get party communication preferences
      description: >-
        Returns the effective communication preferences for the specified party identifier,
        including channel addresses, default priority, locale, quiet-hours, and opt-in status.
      tags:
        - Preferences
      parameters:
        - $ref: "#/components/parameters/PartyId"
      responses:
        "200":
          description: Preference profile returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreferenceProfile"
              examples:
                customerProfile:
                  summary: Customer preference profile
                  value:
                    party_id: "cust-935714"
                    recipient_type: "CUSTOMER"
                    channel_policy: "sms_first"
                    priority: "LOW"
                    locale: "es-US"
                    quiet_hours:
                      enabled: true
                      timezone: "America/Chicago"
                      start: "21:00"
                      end: "08:00"
                    opt_in_status: "OPTED_IN"
                    channels:
                      sms:
                        enabled: true
                        address: "+12145557890"
                        verified: true
                      email:
                        enabled: true
                        address: "customer935714@example.com"
                        verified: true
                      push:
                        enabled: false
                        address: ""
                        verified: false
                    created_at: "2026-01-05T12:00:00Z"
                    updated_at: "2026-03-25T09:50:00Z"
                    created_by: "customer-portal"
                    updated_by: "customer-portal"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "429":
          $ref: "#/components/responses/429"
        "500":
