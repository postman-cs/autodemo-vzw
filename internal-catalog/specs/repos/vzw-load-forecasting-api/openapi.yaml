          example: -274.12
      required:
        - baseline_peak_load_mw
        - scenario_peak_load_mw
        - peak_delta_mw
    ScenarioResultResponse:
      type: object
      properties:
        scenario_id:
          type: string
          example: scn-79bb641a
        scenario_name:
          type: string
          example: q4-der-growth-northeast
        baseline_forecast_id:
          type: string
          example: fct-24aa95e4
        status:
          type: string
          enum:
            - queued
            - running
            - completed
            - failed
          example: completed
        target_scope:
          $ref: "#/components/schemas/ForecastScope"
        forecast_horizon_hours:
          type: integer
          example: 168
        assumptions:
          $ref: "#/components/schemas/ScenarioAssumptions"
        outcomes:
          $ref: "#/components/schemas/ScenarioOutcomes"
        evaluated_at:
          type: string
          format: date-time
          nullable: true
        trace_id:
          type: string
          format: uuid
      required:
        - scenario_id
        - scenario_name
        - baseline_forecast_id
        - status
        - target_scope
        - forecast_horizon_hours
    ErrorEnvelope:
      type: object
      properties:
