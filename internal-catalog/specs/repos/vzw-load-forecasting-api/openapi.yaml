          additionalProperties: true
        trace_id:
          type: string
          format: uuid
      required:
        - code
        - message
        - trace_id
    ErrorResponse:
      type: object
      properties:
        error:
          $ref: "#/components/schemas/ErrorEnvelope"
      required:
        - error
