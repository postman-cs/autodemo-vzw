    ScenarioAssumptions:
      type: object
      description: Inputs applied to baseline forecast for what-if simulation
      properties:
        der_capacity_kw_delta:
          type: number
          format: double
          description: Additional DER capacity added in scenario in kW
          example: 5200
        expected_der_dispatch_pct:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: Scenario DER dispatch expectation
          example: 56.2
        demand_shift_pct:
          type: number
          format: double
          minimum: -100
          maximum: 500
          description: Relative demand shift versus baseline
          example: -1.8
        weather_temperature_delta_c:
          type: number
          format: double
          description: Temperature anomaly delta in Celsius
          example: 1.4
        conservation_program_uptake_pct:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: Share of demand impacted by conservation actions
          example: 7.5
      required:
        - der_capacity_kw_delta
        - demand_shift_pct
    CreateScenarioRequest:
      type: object
      properties:
        scenario_name:
          type: string
          minLength: 3
          maxLength: 128
          example: q4-der-growth-northeast
        baseline_forecast_id:
          type: string
          minLength: 6
          maxLength: 64
          example: fct-24aa95e4
        target_scope:
          $ref: "#/components/schemas/ForecastScope"
        forecast_horizon_hours:
          type: integer
          minimum: 1
          maximum: 720
          example: 168
        assumptions:
          $ref: "#/components/schemas/ScenarioAssumptions"
        requested_by:
          type: string
          format: email
          example: capacity.planning@verizon.example.com
      required:
        - scenario_name
        - baseline_forecast_id
        - target_scope
        - forecast_horizon_hours
        - assumptions
        - requested_by
    ScenarioOutcomes:
      type: object
      properties:
        baseline_peak_load_mw:
          type: number
          format: double
          example: 141.28
        scenario_peak_load_mw:
          type: number
          format: double
          example: 136.04
        peak_delta_mw:
          type: number
          format: double
          description: Scenario peak load minus baseline peak load
          example: -5.24
        cumulative_energy_delta_mwh:
          type: number
          format: double
