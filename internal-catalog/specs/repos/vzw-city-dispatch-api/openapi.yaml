  /v1/dispatches/{dispatchId}:
    patch:
      operationId: updateDispatchStatus
      summary: Update dispatch status
      description: >-
        Updates dispatch progression status as field units progress through the response workflow.
        Allowed transitions include `en_route`, `on_scene`, and `transporting`.
      tags:
        - Dispatch
      parameters:
        - $ref: "#/components/parameters/DispatchId"
      requestBody:
        required: true
        description: Dispatch status update payload
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDispatchStatusRequest"
            examples:
              arriveScene:
                value:
                  status: on_scene
                  status_note: "Medic-42 arrived and initiated patient assessment"
                  updated_by_unit: "medic-42"
      responses:
        "200":
          description: Dispatch status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DispatchResponse"
              examples:
                updatedStatus:
                  value:
                    dispatch:
                      dispatch_id: "dsp-77511"
                      incident_id: "inc-8f3f95b2"
                      unit_ids:
                        - "medic-42"
                        - "engine-11"
                      qod_intent: life_safety_priority
                      route:
                        origin:
                          latitude: 37.779258
                          longitude: -122.419281
                        destination:
                          latitude: 37.785892
                          longitude: -122.400612
                        eta_minutes: 4
                      status: on_scene
                      command_notes: "Stage engine one block south until medic confirms scene safety"
                      issued_at: "2026-03-27T16:11:12Z"
                    trace_id: "22746d3a-8f36-4857-a56b-046721a45091"
