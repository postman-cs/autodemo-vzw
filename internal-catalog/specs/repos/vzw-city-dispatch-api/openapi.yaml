  /v1/incidents/{incidentId}/telemetry/subscriptions:
    post:
      operationId: createTelemetrySubscription
      summary: Subscribe to incident telemetry
      description: >-
        Subscribes a command center endpoint to live telemetry feeds for the incident, such as unit GPS,
        vitals monitors, and radio transcription streams. Subscription policies enforce authorization and
        feed retention constraints.
      tags:
        - Telemetry
      parameters:
        - $ref: "#/components/parameters/IncidentId"
      requestBody:
        required: true
        description: Telemetry subscription payload
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTelemetrySubscriptionRequest"
            examples:
              commandCenterFeed:
                value:
                  subscriber_id: "cmd-west-01"
                  callback_url: "https://dispatch-console.verizon.com/hooks/incident-telemetry"
                  feed_types:
                    - unit_position
                    - patient_vitals
                    - radio_transcript
                  qos_profile: high_reliability
                  expires_at: "2026-03-27T20:12:00Z"
      responses:
        "201":
          description: Telemetry subscription created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelemetrySubscriptionResponse"
              examples:
                subscriptionCreated:
                  value:
                    subscription:
                      subscription_id: "sub-99102"
                      incident_id: "inc-8f3f95b2"
                      subscriber_id: "cmd-west-01"
                      callback_url: "https://dispatch-console.verizon.com/hooks/incident-telemetry"
                      feed_types:
                        - unit_position
                        - patient_vitals
                        - radio_transcript
                      qos_profile: high_reliability
                      status: active
                      created_at: "2026-03-27T16:12:00Z"
                      expires_at: "2026-03-27T20:12:00Z"
                    trace_id: "4f913f06-0ffd-4c1f-b0f5-2637917f0b67"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "409":
          $ref: "#/components/responses/409"
        "422":
          $ref: "#/components/responses/422"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
components:
  parameters:
    IncidentId:
      name: incidentId
      in: path
      required: true
      description: Unique incident identifier
      schema:
        type: string
        example: "inc-8f3f95b2"
    DispatchId:
      name: dispatchId
      in: path
      required: true
      description: Unique dispatch identifier
      schema:
        type: string
        example: "dsp-77511"
    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque cursor from prior paginated response
      schema:
        type: string
        example: "eyJvZmZzZXQiOjIwfQ=="
    Limit:
      name: limit
      in: query
      required: false
      description: Number of records to return, maximum 100
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
        example: 20
    IncidentStatus:
      name: status
      in: query
      required: false
      description: Filter by incident lifecycle status
      schema:
        $ref: "#/components/schemas/IncidentStatus"
    IncidentPriority:
      name: priority
      in: query
      required: false
      description: Filter by dispatch priority level
      schema:
        $ref: "#/components/schemas/IncidentPriority"
    UnitDistrict:
      name: district
      in: query
      required: false
      description: District filter for availability search
      schema:
        $ref: "#/components/schemas/DistrictCode"
    UnitSkill:
      name: skill
      in: query
      required: false
      description: Capability filter for availability search
      schema:
        $ref: "#/components/schemas/UnitCapability"
  schemas:
    CreateIncidentRequest:
      type: object
      description: Command intake payload for opening an incident
      properties:
        external_reference:
          type: string
          description: External source ticket or PSAP reference identifier
          example: "sf-911-20260327-000312"
        severity:
          $ref: "#/components/schemas/IncidentSeverity"
        incident_type:
          $ref: "#/components/schemas/IncidentType"
        reported_channel:
          $ref: "#/components/schemas/ReportedChannel"
        priority:
          $ref: "#/components/schemas/IncidentPriority"
        district:
          $ref: "#/components/schemas/DistrictCode"
        summary:
          type: string
          description: Human-readable concise incident summary
          maxLength: 220
          example: "Unconscious person, no pulse, CPR started"
        location:
          $ref: "#/components/schemas/GeoAddress"
        reporter:
          $ref: "#/components/schemas/Reporter"
        metadata:
          type: object
          description: Additional source metadata retained for auditing
          additionalProperties:
            type: string
          example:
            source_system: city-psap-core
            language: en-US
      required:
        - severity
        - incident_type
        - reported_channel
        - priority
        - district
        - summary
        - location
    IncidentCreateResponse:
      type: object
      description: Incident creation result envelope
      properties:
        incident:
          $ref: "#/components/schemas/IncidentDetail"
        trace_id:
          type: string
          format: uuid
          description: Distributed tracing identifier for request correlation
          example: "38b4ee06-73fb-45cd-9ddf-2fd73e0ab8e9"
      required:
        - incident
        - trace_id
    IncidentListResponse:
      type: object
      description: Cursor-paginated incident list
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/IncidentSummary"
        meta:
          $ref: "#/components/schemas/CursorMeta"
        trace_id:
          type: string
          format: uuid
      required:
        - data
        - meta
        - trace_id
    IncidentDetailResponse:
      type: object
      description: Detailed incident response envelope
      properties:
        incident:
          $ref: "#/components/schemas/IncidentDetail"
        trace_id:
          type: string
          format: uuid
      required:
        - incident
        - trace_id
    AssignUnitsRequest:
      type: object
      description: Unit assignment command payload
      properties:
        required_capabilities:
          type: array
          description: Required capabilities that must be satisfied by selected units
          items:
            $ref: "#/components/schemas/UnitCapability"
          minItems: 1
        district_preference:
          $ref: "#/components/schemas/DistrictCode"
        max_units:
          type: integer
          minimum: 1
          maximum: 10
          default: 2
          description: Maximum number of units to assign for this command
          example: 2
        candidate_units:
          type: array
          description: Optional pre-selected candidates to prioritize
          items:
            $ref: "#/components/schemas/UnitCandidate"
          minItems: 1
      required:
        - required_capabilities
    UnitAssignmentResponse:
      type: object
      description: Unit assignment command result
      properties:
        incident_id:
          type: string
          example: "inc-8f3f95b2"
        assignment_batch_id:
          type: string
          example: "asg-00191"
        assignments:
          type: array
          items:
            $ref: "#/components/schemas/AssignedResponder"
        unmet_capabilities:
          type: array
          description: Required capabilities not covered by confirmed assignments
          items:
            $ref: "#/components/schemas/UnitCapability"
        trace_id:
          type: string
          format: uuid
      required:
        - incident_id
        - assignment_batch_id
        - assignments
        - unmet_capabilities
        - trace_id
    CreateDispatchRequest:
      type: object
      description: Dispatch order creation payload
      properties:
        unit_ids:
          type: array
          description: Assigned units receiving this dispatch command
          items:
            type: string
          minItems: 1
          example:
            - "medic-42"
            - "engine-11"
        qod_intent:
          $ref: "#/components/schemas/QodIntent"
        route:
          $ref: "#/components/schemas/DispatchRoute"
        command_notes:
          type: string
          description: Operator notes attached to dispatch command
          maxLength: 500
          example: "Stage engine one block south until medic confirms scene safety"
      required:
        - unit_ids
        - qod_intent
        - route
    UpdateDispatchStatusRequest:
      type: object
      description: Patch payload for dispatch workflow updates
      properties:
        status:
          $ref: "#/components/schemas/DispatchStatus"
        status_note:
          type: string
          description: Optional note describing field status change
          maxLength: 280
          example: "Medic-42 arrived and initiated patient assessment"
        updated_by_unit:
          type: string
          description: Unit identifier issuing status update
          example: "medic-42"
      required:
        - status
    DispatchResponse:
      type: object
      description: Dispatch response envelope
      properties:
        dispatch:
          $ref: "#/components/schemas/DispatchOrder"
        trace_id:
          type: string
          format: uuid
      required:
        - dispatch
        - trace_id
    CreateEscalationRequest:
      type: object
      description: Request payload to escalate incident to higher command authority
      properties:
        escalation_level:
          $ref: "#/components/schemas/EscalationLevel"
        reason_code:
          $ref: "#/components/schemas/EscalationReasonCode"
        reason_detail:
          type: string
          description: Human-readable escalation rationale
          maxLength: 500
          example: "No additional ALS units available in district within 10-minute SLA"
        requested_by:
          type: string
          description: User or system id requesting escalation
          example: "dispatcher-ops-12"
        notify_channels:
          type: array
          description: Notification channels for escalation alerting
          items:
            $ref: "#/components/schemas/EscalationNotifyChannel"
          minItems: 1
      required:
        - escalation_level
        - reason_code
        - reason_detail
        - requested_by
    EscalationResponse:
      type: object
      description: Escalation response envelope
      properties:
        escalation:
          $ref: "#/components/schemas/EscalationRecord"
        trace_id:
          type: string
          format: uuid
      required:
        - escalation
        - trace_id
    CreateTelemetrySubscriptionRequest:
      type: object
      description: Payload for creating telemetry stream subscription
      properties:
        subscriber_id:
          type: string
          description: Command center subscriber identifier
          example: "cmd-west-01"
        callback_url:
          type: string
          format: uri
          description: HTTPS endpoint receiving telemetry events
          example: "https://dispatch-console.verizon.com/hooks/incident-telemetry"
        feed_types:
          type: array
          description: Telemetry stream categories to deliver
          items:
            $ref: "#/components/schemas/TelemetryFeedType"
          minItems: 1
        qos_profile:
          $ref: "#/components/schemas/TelemetryQosProfile"
        expires_at:
          type: string
          format: date-time
          description: Timestamp when subscription auto-expires
          example: "2026-03-27T20:12:00Z"
      required:
        - subscriber_id
        - callback_url
        - feed_types
        - qos_profile
    TelemetrySubscriptionResponse:
      type: object
      description: Telemetry subscription response envelope
      properties:
        subscription:
          $ref: "#/components/schemas/TelemetrySubscription"
        trace_id:
          type: string
          format: uuid
      required:
        - subscription
        - trace_id
    UnitAvailabilityResponse:
      type: object
      description: Current availability view for response units
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/UnitAvailability"
        trace_id:
          type: string
          format: uuid
      required:
        - data
        - trace_id
    IncidentSummary:
      type: object
      description: Incident summary optimized for queue listings
      properties:
        incident_id:
          type: string
        external_reference:
          type: string
        severity:
          $ref: "#/components/schemas/IncidentSeverity"
        incident_type:
          $ref: "#/components/schemas/IncidentType"
        reported_channel:
          $ref: "#/components/schemas/ReportedChannel"
        priority:
          $ref: "#/components/schemas/IncidentPriority"
        status:
          $ref: "#/components/schemas/IncidentStatus"
        district:
          $ref: "#/components/schemas/DistrictCode"
        summary:
          type: string
        location:
          $ref: "#/components/schemas/GeoAddress"
        audit:
          $ref: "#/components/schemas/AuditInfo"
      required:
        - incident_id
        - severity
        - incident_type
        - reported_channel
        - priority
        - status
        - district
        - summary
        - location
        - audit
    IncidentDetail:
      allOf:
        - $ref: "#/components/schemas/IncidentSummary"
        - type: object
          properties:
            reporter:
              $ref: "#/components/schemas/Reporter"
            responders:
              type: array
              items:
                $ref: "#/components/schemas/AssignedResponder"
            dispatches:
              type: array
              items:
                $ref: "#/components/schemas/DispatchOrder"
            timeline:
              type: array
              items:
                $ref: "#/components/schemas/IncidentTimelineEvent"
            escalations:
              type: array
              items:
                $ref: "#/components/schemas/EscalationRecord"
    Reporter:
      type: object
      description: Reporter identity and callback details
      properties:
        name:
          type: string
          example: "Taylor Kim"
        callback_number:
          type: string
          description: Reporter callback in E.164 format
          example: "+14155550123"
      required:
        - callback_number
    GeoAddress:
      type: object
      description: Incident geospatial address details
      properties:
        address_line_1:
          type: string
          example: "201 3rd St"
        city:
          type: string
          example: "San Francisco"
        state:
          type: string
          minLength: 2
          maxLength: 2
          example: "CA"
        postal_code:
          type: string
          example: "94103"
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
          example: 37.785892
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
          example: -122.400612
      required:
        - address_line_1
        - city
        - state
        - postal_code
        - latitude
        - longitude
    DispatchRoute:
      type: object
      description: Route intent used for dispatching units to incident location
      properties:
        origin:
          $ref: "#/components/schemas/GeoPoint"
        destination:
          $ref: "#/components/schemas/GeoPoint"
        eta_minutes:
          type: integer
          minimum: 1
          maximum: 180
          example: 4
      required:
        - origin
        - destination
        - eta_minutes
    GeoPoint:
      type: object
      description: Geographic coordinate
      properties:
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
          example: 37.779258
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
          example: -122.419281
      required:
        - latitude
        - longitude
    UnitCandidate:
      type: object
      description: Candidate unit details supplied during assignment command
      properties:
        unit_id:
          type: string
          example: "medic-42"
        justification:
          type: string
          example: "Closest ALS-capable medic unit"
      required:
        - unit_id
    AssignedResponder:
      type: object
      description: Unit responder assignment record
      properties:
        unit_id:
          type: string
          example: "medic-42"
        call_sign:
          type: string
          example: "MED42"
        capability_profile:
          type: array
          items:
            $ref: "#/components/schemas/UnitCapability"
        assigned_at:
          type: string
          format: date-time
          example: "2026-03-27T16:10:33Z"
        assignment_status:
          type: string
          enum:
            - active
            - released
            - completed
          example: active
      required:
        - unit_id
        - call_sign
        - assigned_at
        - assignment_status
    DispatchOrder:
      type: object
      description: Dispatch order record
      properties:
        dispatch_id:
          type: string
        incident_id:
          type: string
        unit_ids:
          type: array
          items:
            type: string
        qod_intent:
          $ref: "#/components/schemas/QodIntent"
        route:
          $ref: "#/components/schemas/DispatchRoute"
        status:
          $ref: "#/components/schemas/DispatchStatus"
        command_notes:
          type: string
        issued_at:
          type: string
          format: date-time
      required:
        - dispatch_id
        - incident_id
        - unit_ids
        - qod_intent
        - route
        - status
        - issued_at
    IncidentTimelineEvent:
      type: object
      description: Chronological incident event record
      properties:
        event_id:
          type: string
          example: "evt-a002"
        event_type:
          type: string
          enum:
            - incident_created
            - units_assigned
            - dispatch_created
            - dispatch_updated
            - escalated
            - closed
          example: units_assigned
        message:
          type: string
          example: "Units medic-42 and engine-11 assigned"
        recorded_at:
          type: string
          format: date-time
          example: "2026-03-27T16:10:33Z"
        actor:
          type: string
          example: "dispatcher-ops-12"
      required:
        - event_id
        - event_type
        - message
        - recorded_at
        - actor
    EscalationRecord:
      type: object
      description: Incident escalation record
      properties:
        escalation_id:
          type: string
          example: "esc-5100"
        incident_id:
          type: string
          example: "inc-8f3f95b2"
        escalation_level:
          $ref: "#/components/schemas/EscalationLevel"
        reason_code:
          $ref: "#/components/schemas/EscalationReasonCode"
        reason_detail:
          type: string
        requested_by:
          type: string
        status:
          type: string
          enum:
            - open
            - acknowledged
            - resolved
          example: open
        opened_at:
          type: string
          format: date-time
          example: "2026-03-27T16:12:45Z"
      required:
        - escalation_id
        - incident_id
        - escalation_level
        - reason_code
        - reason_detail
        - requested_by
        - status
        - opened_at
    UnitAvailability:
      type: object
      description: Current unit readiness snapshot
      properties:
        unit_id:
          type: string
          example: "medic-42"
        call_sign:
          type: string
          example: "MED42"
        district:
          $ref: "#/components/schemas/DistrictCode"
        status:
          type: string
          enum:
            - available
            - assigned
            - en_route
            - off_shift
            - maintenance
          example: available
        capabilities:
          type: array
          items:
            $ref: "#/components/schemas/UnitCapability"
        last_known_location:
          $ref: "#/components/schemas/GeoPoint"
        available_since:
          type: string
          format: date-time
          example: "2026-03-27T16:00:10Z"
      required:
        - unit_id
        - call_sign
        - district
        - status
        - capabilities
    TelemetrySubscription:
      type: object
      description: Telemetry subscription record for incident feed distribution
      properties:
        subscription_id:
          type: string
          example: "sub-99102"
        incident_id:
          type: string
          example: "inc-8f3f95b2"
        subscriber_id:
          type: string
          example: "cmd-west-01"
        callback_url:
          type: string
          format: uri
          example: "https://dispatch-console.verizon.com/hooks/incident-telemetry"
        feed_types:
          type: array
          items:
            $ref: "#/components/schemas/TelemetryFeedType"
        qos_profile:
          $ref: "#/components/schemas/TelemetryQosProfile"
        status:
          type: string
          enum:
            - active
            - paused
            - expired
            - revoked
          example: active
        created_at:
          type: string
          format: date-time
          example: "2026-03-27T16:12:00Z"
        expires_at:
          type: string
          format: date-time
          example: "2026-03-27T20:12:00Z"
      required:
        - subscription_id
        - incident_id
        - subscriber_id
        - callback_url
        - feed_types
        - qos_profile
        - status
        - created_at
    CursorMeta:
      type: object
      description: Cursor pagination metadata
      properties:
        next_cursor:
          type: string
          nullable: true
          example: "eyJvZmZzZXQiOjIwfQ=="
        limit:
          type: integer
          example: 20
        has_more:
          type: boolean
          example: true
      required:
        - limit
        - has_more
    AuditInfo:
      type: object
      description: Audit trail metadata for resource mutation and ownership
      properties:
        created_at:
          type: string
          format: date-time
          example: "2026-03-27T16:08:43Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-03-27T16:11:12Z"
        created_by:
          type: string
          example: "system-psap-ingest"
        updated_by:
          type: string
          example: "dispatcher-ops-12"
      required:
        - created_at
        - updated_at
        - created_by
        - updated_by
    Error:
      type: object
      description: Standardized API error structure
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Machine-readable error code
              example: VALIDATION_ERROR
            message:
              type: string
              description: Human-readable error message
              example: The request body contains invalid fields.
            details:
              type: array
              description: Detailed validation or business rule errors
              items:
                type: object
                properties:
                  field:
                    type: string
                    example: reported_channel
                  reason:
                    type: string
                    example: Must be one of phone_911, radio, mobile_app, sensor_auto
            request_id:
              type: string
              format: uuid
              description: Request correlation id for operational support
              example: "ac9ea3db-5675-4fa3-b4d8-1b7e036fa8c5"
          required:
            - code
            - message
            - request_id
      required:
        - error
    IncidentSeverity:
      type: string
      description: Severity level based on potential impact and urgency
      enum:
        - low
        - moderate
        - high
        - critical
      example: critical
    IncidentType:
      type: string
      description: Classification of incident category
      enum:
        - medical_emergency
        - structure_fire
        - traffic_collision
        - hazmat_release
        - public_safety
        - utility_failure
      example: medical_emergency
    ReportedChannel:
      type: string
      description: Channel through which incident was reported
      enum:
        - phone_911
        - radio
        - mobile_app
        - sensor_auto
      example: phone_911
    IncidentPriority:
      type: string
      description: Priority queue level used by dispatch command
      enum:
        - p1
        - p2
        - p3
        - p4
      example: p1
    IncidentStatus:
      type: string
      description: Incident lifecycle status
      enum:
        - intake
        - units_assigned
        - dispatch_in_progress
        - on_scene
        - resolved
        - closed
      example: dispatch_in_progress
    DispatchStatus:
      type: string
      description: Current status of dispatch order workflow
      enum:
        - en_route
        - on_scene
        - transporting
      example: en_route
    QodIntent:
      type: string
      description: Quality-of-dispatch intent guiding route and response behavior
      enum:
        - life_safety_priority
        - balanced_response
        - containment_priority
      example: life_safety_priority
    DistrictCode:
      type: string
      description: San Francisco dispatch district code
      enum:
        - SOMA
        - MISSION
        - RICHMOND
        - SUNSET
        - BAYVIEW
        - FINANCIAL
      example: SOMA
    UnitCapability:
      type: string
      description: Unit capability label used for assignment constraints
      enum:
        - als
        - bls
        - cardiac
        - fire_suppression
        - rescue
        - hazmat
        - pediatric
      example: als
    EscalationLevel:
      type: string
      description: Escalation authority level
      enum:
        - district_command
        - regional_command
        - multi_agency
      example: regional_command
    EscalationReasonCode:
      type: string
      description: Canonical reason for escalation workflow
      enum:
        - resource_shortage
        - cross_district_impact
        - hazardous_conditions
        - prolonged_response_time
      example: resource_shortage
    EscalationNotifyChannel:
      type: string
      description: Escalation notification channel
      enum:
        - command_console
        - sms_bridge
        - secure_email
        - radio_override
      example: command_console
    TelemetryFeedType:
      type: string
      description: Live telemetry feed category
      enum:
        - unit_position
        - patient_vitals
        - radio_transcript
        - bodycam_status
      example: unit_position
    TelemetryQosProfile:
      type: string
      description: Delivery reliability profile for telemetry streams
      enum:
        - low_latency
        - balanced
        - high_reliability
      example: high_reliability
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT bearer token issued by Verizon identity platform
  responses:
    "400":
      description: Bad Request — Request payload or query parameters are malformed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: VALIDATION_ERROR
              message: The request body contains invalid fields.
              details:
                - field: reported_channel
                  reason: Must be one of phone_911, radio, mobile_app, sensor_auto
              request_id: "ac9ea3db-5675-4fa3-b4d8-1b7e036fa8c5"
    "401":
      description: Unauthorized — Authentication credentials are missing or invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: UNAUTHORIZED
              message: Invalid or expired bearer token.
              request_id: "9a881451-dfc1-408d-8da8-c2a650da6af0"
    "403":
      description: Forbidden — Caller lacks required role permissions for this operation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: FORBIDDEN
              message: Dispatch supervisor role required for escalation commands.
              request_id: "9acbcf50-4d0b-4718-868c-2c95f2bce612"
    "404":
      description: Not Found — Requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: NOT_FOUND
              message: Incident inc-8f3f95b2 was not found.
              request_id: "29eff99f-b2d5-4a32-9c74-035ac7f33cf1"
    "409":
      description: Conflict — Request conflicts with current state of resource.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: CONFLICT
              message: Dispatch status transition from transporting to en_route is not allowed.
              request_id: "b7fe5209-ee13-4275-bb1f-17a05ff9c6ab"
    "422":
      description: Unprocessable Entity — Business rules prevent processing this request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: UNPROCESSABLE_ENTITY
              message: No candidate unit satisfies required capabilities [als, cardiac].
              request_id: "fef0588f-37e2-4b80-a5a5-f02266043d9a"
    "429":
      description: Too Many Requests — Rate limit exceeded for this caller.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: RATE_LIMIT_EXCEEDED
              message: Rate limit exceeded. Retry after 30 seconds.
              request_id: "aa7e5865-c5b6-4f13-bf31-b604c553ca56"
    "500":
      description: Internal Server Error — Unexpected backend error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: INTERNAL_ERROR
              message: An unexpected error occurred. Please retry.
              request_id: "76674967-ce9d-4491-988f-bff26b7bb6dd"
