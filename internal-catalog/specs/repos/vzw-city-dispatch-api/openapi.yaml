        "409":
          $ref: "#/components/responses/409"
        "422":
          $ref: "#/components/responses/422"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /v1/incidents/{incidentId}/escalations:
    post:
      operationId: escalateIncident
      summary: Escalate incident
      description: >-
        Escalates an incident to regional command when local coverage is insufficient or cross-district
        coordination is required. Escalations are appended to incident history and trigger command notifications.
      tags:
        - Escalation
      parameters:
        - $ref: "#/components/parameters/IncidentId"
      requestBody:
        required: true
        description: Escalation request payload
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEscalationRequest"
            examples:
              regionalEscalation:
                value:
                  escalation_level: regional_command
                  reason_code: resource_shortage
                  reason_detail: "No additional ALS units available in district within 10-minute SLA"
                  requested_by: "dispatcher-ops-12"
                  notify_channels:
                    - command_console
                    - sms_bridge
      responses:
        "201":
          description: Escalation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EscalationResponse"
              examples:
                escalated:
                  value:
                    escalation:
                      escalation_id: "esc-5100"
                      incident_id: "inc-8f3f95b2"
                      escalation_level: regional_command
                      reason_code: resource_shortage
                      reason_detail: "No additional ALS units available in district within 10-minute SLA"
                      requested_by: "dispatcher-ops-12"
                      status: open
                      opened_at: "2026-03-27T16:12:45Z"
                    trace_id: "79361f4a-67fe-4a10-9af0-56a1b2e8f1ef"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "409":
          $ref: "#/components/responses/409"
        "422":
          $ref: "#/components/responses/422"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /v1/units/availability:
    get:
      operationId: getUnitAvailability
      summary: Get unit availability
      description: >-
        Retrieves current unit availability across districts, including capability profile and readiness status.
        Optional filters enable command center users to locate units by district and skill.
      tags:
        - Units
      parameters:
        - $ref: "#/components/parameters/UnitDistrict"
        - $ref: "#/components/parameters/UnitSkill"
      responses:
        "200":
          description: Unit availability retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnitAvailabilityResponse"
              examples:
                somaAls:
                  value:
                    data:
                      - unit_id: "medic-42"
                        call_sign: "MED42"
                        district: SOMA
                        status: available
                        capabilities:
                          - als
                          - cardiac
                        last_known_location:
                          latitude: 37.779258
                          longitude: -122.419281
                        available_since: "2026-03-27T16:00:10Z"
                      - unit_id: "medic-27"
                        call_sign: "MED27"
                        district: SOMA
                        status: available
                        capabilities:
                          - als
                          - pediatric
                        last_known_location:
                          latitude: 37.788143
                          longitude: -122.407121
                        available_since: "2026-03-27T15:54:50Z"
                    trace_id: "4ad2bc58-a9ba-4a64-9e62-baf0ca02f8f5"
        "400":
          $ref: "#/components/responses/400"
        "401":
