openapi: 3.0.3
info:
  title: VZW City Dispatch API
  description: >-
    Provides incident lifecycle management, multi-unit assignment, dispatch command orchestration,
    escalation workflows, and telemetry subscription controls for Verizon city operations. This API is
    designed for command center operators, regional dispatch supervisors, and downstream responder systems
    coordinating emergency response activity in the San Francisco metropolitan area.
  version: 1.0.0
  contact:
    name: Verizon Dispatch Platform Team
    email: dispatch-api-support@verizon.com
    url: https://developer.verizon.com
  license:
    name: Proprietary
    url: https://www.verizon.com/business/terms/
  x-catalog-id: vzw-city-dispatch-api
  x-domain: dispatch
servers:
  - url: https://vzw-city-dispatch-api.api.verizon.com/v1
    description: Production
  - url: https://vzw-city-dispatch-api.staging.verizon.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Incidents
    description: Incident intake, retrieval, and lifecycle state management
  - name: Dispatch
    description: Assignment and dispatch order workflows for responder units
  - name: Units
    description: Unit availability and capability visibility by district
  - name: Telemetry
    description: Subscription management for live command center telemetry feeds
  - name: Escalation
    description: Regional command escalation and oversight controls
paths:
  /v1/incidents:
    post:
      operationId: createIncident
      summary: Create incident
      description: >-
        Creates a new incident in the dispatch system and starts the incident lifecycle. The request captures
        severity, incident type, reporting channel, geospatial location, and caller details. Newly created incidents
        are initialized in `intake` status and become available for unit assignment immediately.
      tags:
        - Incidents
      requestBody:
        required: true
        description: Incident creation payload
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIncidentRequest"
            examples:
              downtownMedical:
                summary: Medical incident near SoMa
                value:
                  external_reference: "sf-911-20260327-000312"
                  severity: critical
                  incident_type: medical_emergency
                  reported_channel: phone_911
                  priority: p1
                  district: SOMA
                  summary: "Unconscious person, no pulse, CPR started"
                  location:
                    address_line_1: "201 3rd St"
                    city: "San Francisco"
                    state: "CA"
                    postal_code: "94103"
                    latitude: 37.785892
                    longitude: -122.400612
                  reporter:
                    name: "Taylor Kim"
                    callback_number: "+14155550123"
                  metadata:
                    source_system: "city-psap-core"
                    language: "en-US"
      responses:
        "201":
          description: Incident created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncidentCreateResponse"
              examples:
                created:
                  value:
                    incident:
                      incident_id: "inc-8f3f95b2"
                      external_reference: "sf-911-20260327-000312"
                      severity: critical
                      incident_type: medical_emergency
                      reported_channel: phone_911
                      priority: p1
                      status: intake
                      district: SOMA
                      summary: "Unconscious person, no pulse, CPR started"
                      location:
                        address_line_1: "201 3rd St"
                        city: "San Francisco"
                        state: "CA"
                        postal_code: "94103"
                        latitude: 37.785892
                        longitude: -122.400612
                      reporter:
                        name: "Taylor Kim"
                        callback_number: "+14155550123"
                      responders: []
                      timeline:
                        - event_id: "evt-a001"
                          event_type: incident_created
                          message: "Incident created from PSAP intake"
                          recorded_at: "2026-03-27T16:08:43Z"
                          actor: "city-psap-core"
                      audit:
                        created_at: "2026-03-27T16:08:43Z"
                        updated_at: "2026-03-27T16:08:43Z"
                        created_by: "system-psap-ingest"
                        updated_by: "system-psap-ingest"
                    trace_id: "38b4ee06-73fb-45cd-9ddf-2fd73e0ab8e9"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "409":
          $ref: "#/components/responses/409"
        "422":
          $ref: "#/components/responses/422"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    get:
      operationId: listIncidents
      summary: List incidents
      description: >-
        Returns a cursor-paginated list of incidents with optional filtering by status and priority.
        Use this endpoint to power active command board views and incident queue monitoring.
      tags:
        - Incidents
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/IncidentStatus"
        - $ref: "#/components/parameters/IncidentPriority"
      responses:
        "200":
          description: Incident list retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncidentListResponse"
              examples:
                activeQueue:
                  value:
                    data:
                      - incident_id: "inc-8f3f95b2"
                        external_reference: "sf-911-20260327-000312"
                        severity: critical
                        incident_type: medical_emergency
                        reported_channel: phone_911
                        priority: p1
                        status: units_assigned
                        district: SOMA
                        summary: "Unconscious person, no pulse, CPR started"
                        location:
                          address_line_1: "201 3rd St"
                          city: "San Francisco"
                          state: "CA"
                          postal_code: "94103"
                          latitude: 37.785892
                          longitude: -122.400612
                        audit:
                          created_at: "2026-03-27T16:08:43Z"
                          updated_at: "2026-03-27T16:11:10Z"
                          created_by: "system-psap-ingest"
                          updated_by: "dispatcher-ops-12"
                      - incident_id: "inc-b3a92e4d"
                        external_reference: "sf-911-20260327-000299"
                        severity: high
                        incident_type: structure_fire
                        reported_channel: mobile_app
                        priority: p2
                        status: dispatch_in_progress
                        district: MISSION
                        summary: "Smoke visible from 3rd-floor residential unit"
                        location:
                          address_line_1: "3130 Mission St"
                          city: "San Francisco"
                          state: "CA"
                          postal_code: "94110"
                          latitude: 37.747871
                          longitude: -122.418246
                        audit:
                          created_at: "2026-03-27T15:58:04Z"
                          updated_at: "2026-03-27T16:09:57Z"
                          created_by: "mobile-reporter-gateway"
                          updated_by: "dispatcher-ops-07"
                    meta:
                      next_cursor: "eyJvZmZzZXQiOjIwfQ=="
                      limit: 20
                      has_more: true
                    trace_id: "750054b8-34d4-4bdb-ab4e-c388f4bfd5a8"
