  /v1/incidents/{incidentId}/units:assign:
    post:
      operationId: assignUnitsToIncident
      summary: Assign units to incident
      description: >-
        Assigns one or more units to an incident with capability constraints. The assignment engine validates
        district proximity, required skill coverage, and current unit state before confirming.
      tags:
        - Dispatch
      parameters:
        - $ref: "#/components/parameters/IncidentId"
      requestBody:
        required: true
        description: Unit assignment command
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignUnitsRequest"
            examples:
              assignCriticalResponse:
                value:
                  required_capabilities:
                    - als
                    - cardiac
                  district_preference: SOMA
                  max_units: 2
                  candidate_units:
                    - unit_id: "medic-42"
                      justification: "Closest ALS-capable medic unit"
                    - unit_id: "engine-11"
                      justification: "Dual-role rescue backup"
      responses:
        "200":
          description: Units assigned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnitAssignmentResponse"
              examples:
                assignmentCreated:
                  value:
                    incident_id: "inc-8f3f95b2"
                    assignment_batch_id: "asg-00191"
                    assignments:
                      - unit_id: "medic-42"
                        call_sign: "MED42"
                        assignment_status: active
                        assigned_at: "2026-03-27T16:10:33Z"
                      - unit_id: "engine-11"
                        call_sign: "E11"
                        assignment_status: active
                        assigned_at: "2026-03-27T16:10:33Z"
                    unmet_capabilities: []
                    trace_id: "77f705ef-b5a1-4b31-825f-7f92fa498f1a"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "409":
          $ref: "#/components/responses/409"
        "422":
          $ref: "#/components/responses/422"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /v1/incidents/{incidentId}/dispatches:
    post:
      operationId: createDispatchOrder
      summary: Create dispatch order
      description: >-
        Creates a dispatch order for assigned units, including route intent and QoD (quality-of-dispatch)
        objective. Use this endpoint once assignment has been confirmed and route planning is complete.
      tags:
        - Dispatch
      parameters:
        - $ref: "#/components/parameters/IncidentId"
      requestBody:
        required: true
        description: Dispatch command payload
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDispatchRequest"
            examples:
              routeWithIntent:
                value:
                  unit_ids:
                    - "medic-42"
                    - "engine-11"
                  qod_intent: life_safety_priority
                  route:
                    origin:
                      latitude: 37.779258
                      longitude: -122.419281
                    destination:
                      latitude: 37.785892
                      longitude: -122.400612
                    eta_minutes: 4
                  command_notes: "Stage engine one block south until medic confirms scene safety"
      responses:
        "201":
          description: Dispatch order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DispatchResponse"
              examples:
                dispatchCreated:
                  value:
                    dispatch:
                      dispatch_id: "dsp-77511"
                      incident_id: "inc-8f3f95b2"
                      unit_ids:
                        - "medic-42"
                        - "engine-11"
                      qod_intent: life_safety_priority
                      route:
                        origin:
                          latitude: 37.779258
                          longitude: -122.419281
                        destination:
                          latitude: 37.785892
                          longitude: -122.400612
                        eta_minutes: 4
                      status: en_route
                      command_notes: "Stage engine one block south until medic confirms scene safety"
                      issued_at: "2026-03-27T16:11:12Z"
                    trace_id: "56e62de7-1284-4f54-8079-b20368de24cc"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "409":
          $ref: "#/components/responses/409"
        "422":
          $ref: "#/components/responses/422"
        "429":
          $ref: "#/components/responses/429"
        "500":
