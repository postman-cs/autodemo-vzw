              description: Confirmed restoration timestamp
              example: "2026-03-27T15:58:00Z"
            closed_at:
              type: string
              format: date-time
              description: Timestamp when outage was moved to CLOSED
              example: "2026-03-27T16:02:11Z"
          required:
            - restored_at
            - closed_at
    Error:
      type: object
      description: Standard error envelope
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Machine-readable error code
              example: VALIDATION_ERROR
            message:
              type: string
              description: Human-readable error message
              example: The request body contains invalid fields.
            details:
              type: array
              description: Optional detailed validation or business rule violations
              items:
                type: object
                properties:
                  field:
                    type: string
                    description: Request field that caused the issue
                    example: alarms[0].occurred_at
                  reason:
                    type: string
                    description: Why validation failed
                    example: Must be a valid RFC3339 timestamp.
            request_id:
              type: string
              format: uuid
              description: Request identifier for support and tracing
              example: 4ddde762-8e7a-4d76-8396-91f3541942f9
          required:
            - code
            - message
            - request_id
      required:
        - error
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT bearer token issued by Verizon identity platform
  responses:
    "400":
      description: Bad Request - The request was malformed or contained invalid parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: VALIDATION_ERROR
              message: The request body contains invalid fields.
              details:
                - field: alarms[0].occurred_at
                  reason: Must be a valid RFC3339 timestamp.
              request_id: 27a6382f-f227-468f-82a2-7f20f58f768f
    "401":
      description: Unauthorized - Authentication credentials are missing or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: UNAUTHORIZED
              message: Invalid or expired authentication token.
              request_id: 264c6ec4-cbe4-4ccd-b515-2ceb0f614d8f
    "403":
      description: Forbidden - The authenticated principal lacks required permissions.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: FORBIDDEN
              message: You do not have the required permissions for this action.
              request_id: 0c8b6f52-8f32-4ce2-b946-b0d362f2dbf2
    "404":
      description: Not Found - The requested outage resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: NOT_FOUND
              message: The requested outage was not found.
              request_id: 6d4f06ab-56ea-4679-87c7-0545c69255e3
    "409":
      description: Conflict - The request conflicts with the current outage state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: CONFLICT
              message: Outage is already closed and cannot be recomputed.
              request_id: a3036d84-12f5-4d04-b4a0-23f6ce7af23a
    "422":
      description: Unprocessable Entity - Request semantics violated business rules.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: UNPROCESSABLE_ENTITY
              message: restored_at must be greater than outage created_at.
              request_id: 45eb8252-f5e3-4f53-ba7e-6cfb97b17c0f
    "429":
      description: Too Many Requests - Rate limit exceeded for this client.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: RATE_LIMIT_EXCEEDED
              message: Rate limit exceeded. Retry in 30 seconds.
              request_id: 73ba6a98-9fdb-4ae7-b9e8-d16f4f2ea707
    "500":
      description: Internal Server Error - An unexpected error occurred.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: INTERNAL_ERROR
              message: An unexpected error occurred. Please try again later.
              request_id: 5cf56d3e-dd31-44a9-a994-06ced42d6bc2
