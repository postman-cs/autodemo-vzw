openapi: 3.0.3
info:
  title: Quality Control API
  description: Track quality inspection results, defect reports, and corrective action workflows across the manufacturing
    process. Supports SPC charting, first-time-through rate tracking, and supplier quality incident management.
  version: 1.7.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-mfg-quality
  x-acme-domain: manufacturing
servers:
  - url: https://av-mfg-quality.api.acmevehicles.com/v1
    description: Production
  - url: https://av-mfg-quality.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Inspections
    description: Quality inspection management
  - name: Defects
    description: Defect tracking and resolution
paths:
  /inspections:
    get:
      operationId: listInspection
      summary: List inspection
      description: List operation for inspection resources.
      tags:
        - Inspections
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: inspection identifier
                    example: inspection-a1b2c3d4
    post:
      operationId: createInspection
      summary: Create inspection
      description: Create operation for inspection resources.
      tags:
        - Inspections
      requestBody:
        required: true
        description: Create inspection request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: inspection data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: inspection identifier
                    example: inspection-a1b2c3d4
  /inspections/{inspection_id}:
    get:
      operationId: getInspectionById
      summary: Get inspection
      description: Get operation for inspection resources.
      tags:
        - Inspections
      parameters:
        - &a1
          name: inspection_id
          in: path
          required: true
          description: inspection id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: inspection identifier
                    example: inspection-a1b2c3d4
    put:
      operationId: updateInspectionById
      summary: Update inspection
      description: Update operation for inspection resources.
      tags:
        - Inspections
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update inspection request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: inspection data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: inspection identifier
                    example: inspection-a1b2c3d4
  /defects:
    get:
      operationId: listDefect
      summary: List defect
      description: List operation for defect resources.
      tags:
        - Inspections
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: defect identifier
                    example: defect-a1b2c3d4
    post:
      operationId: createDefect
      summary: Create defect
      description: Create operation for defect resources.
      tags:
        - Inspections
      requestBody:
        required: true
        description: Create defect request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: defect data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: defect identifier
                    example: defect-a1b2c3d4
  /defects/{defect_id}:
    get:
      operationId: getDefectById
      summary: Get defect
      description: Get operation for defect resources.
      tags:
        - Inspections
      parameters:
        - &a2
          name: defect_id
          in: path
          required: true
          description: defect id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: defect identifier
                    example: defect-a1b2c3d4
    put:
      operationId: updateDefectById
      summary: Update defect
      description: Update operation for defect resources.
      tags:
        - Inspections
      parameters:
        - *a2
      requestBody:
        required: true
        description: Update defect request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: defect data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: defect identifier
                    example: defect-a1b2c3d4
  /defects/{defect_id}/corrective-action:
    post:
      operationId: createActionById
      summary: Create action
      description: Create operation for action resources.
      tags:
        - Inspections
      parameters:
        - name: defect_id
          in: path
          required: true
          description: defect id
          schema:
            type: string
      requestBody:
        required: true
        description: Create action request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: action data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: action identifier
                    example: action-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
