openapi: 3.0.3
info:
  title: Vehicle Concierge API
  description: Premium concierge services including restaurant reservations, hotel bookings, event tickets, and
    point-of-interest recommendations delivered to the vehicle navigation system. Supports voice-initiated requests and
    calendar integration.
  version: 1.1.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-connected-concierge
  x-acme-domain: connected-services
servers:
  - url: https://av-connected-concierge.api.acmevehicles.com/v1
    description: Production
  - url: https://av-connected-concierge.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Bookings
    description: Reservation and booking management
  - name: Recommendations
    description: POI and activity recommendations
paths:
  /bookings:
    get:
      operationId: listBooking
      summary: List booking
      description: List operation for booking resources.
      tags:
        - Bookings
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: booking identifier
                    example: booking-a1b2c3d4
    post:
      operationId: createBooking
      summary: Create booking
      description: Create operation for booking resources.
      tags:
        - Bookings
      requestBody:
        required: true
        description: Create booking request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: booking data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: booking identifier
                    example: booking-a1b2c3d4
  /bookings/{booking_id}:
    get:
      operationId: getBookingById
      summary: Get booking
      description: Get operation for booking resources.
      tags:
        - Bookings
      parameters:
        - &a1
          name: booking_id
          in: path
          required: true
          description: booking id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: booking identifier
                    example: booking-a1b2c3d4
    put:
      operationId: updateBookingById
      summary: Update booking
      description: Update operation for booking resources.
      tags:
        - Bookings
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update booking request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: booking data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: booking identifier
                    example: booking-a1b2c3d4
  /bookings/{booking_id}/cancel:
    post:
      operationId: actionBookingById
      summary: Action booking
      description: Action operation for booking resources.
      tags:
        - Bookings
      parameters:
        - name: booking_id
          in: path
          required: true
          description: booking id
          schema:
            type: string
      requestBody:
        required: true
        description: Action booking request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: booking data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: booking identifier
                    example: booking-a1b2c3d4
  /recommendations:
    get:
      operationId: listRecommendation
      summary: List recommendation
      description: List operation for recommendation resources.
      tags:
        - Bookings
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: recommendation identifier
                    example: recommendation-a1b2c3d4
  /recommendations/nearby:
    post:
      operationId: searchRecommendation
      summary: Search recommendation
      description: Search operation for recommendation resources.
      tags:
        - Bookings
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      requestBody:
        required: true
        description: Search recommendation request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: recommendation data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: recommendation identifier
                    example: recommendation-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
