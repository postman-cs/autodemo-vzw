openapi: 3.0.3
info:
  title: Fleet Charging Optimization API
  description: Optimize depot-level charging schedules for commercial EV fleets. Manages charger allocation, priority
    queuing, energy budget constraints, and departure-time guarantees while minimizing electricity costs through demand
    charge management.
  version: 1.2.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-ev-fleet-charging
  x-acme-domain: ev-services
servers:
  - url: https://av-ev-fleet-charging.api.acmevehicles.com/v1
    description: Production
  - url: https://av-ev-fleet-charging.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Depot
    description: Depot charging infrastructure management
  - name: Optimization
    description: Fleet charging schedule optimization
paths:
  /depots:
    get:
      operationId: listDepot
      summary: List depot
      description: List operation for depot resources.
      tags:
        - Depot
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: depot identifier
                    example: depot-a1b2c3d4
    post:
      operationId: createDepot
      summary: Create depot
      description: Create operation for depot resources.
      tags:
        - Depot
      requestBody:
        required: true
        description: Create depot request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: depot data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: depot identifier
                    example: depot-a1b2c3d4
  /depots/{depot_id}:
    get:
      operationId: getDepotById
      summary: Get depot
      description: Get operation for depot resources.
      tags:
        - Depot
      parameters:
        - &a1
          name: depot_id
          in: path
          required: true
          description: depot id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: depot identifier
                    example: depot-a1b2c3d4
    put:
      operationId: updateDepotById
      summary: Update depot
      description: Update operation for depot resources.
      tags:
        - Depot
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update depot request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: depot data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: depot identifier
                    example: depot-a1b2c3d4
  /depots/{depot_id}/chargers:
    get:
      operationId: listChargerById
      summary: List charger
      description: List operation for charger resources.
      tags:
        - Depot
      parameters:
        - name: depot_id
          in: path
          required: true
          description: depot id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: charger identifier
                    example: charger-a1b2c3d4
  /depots/{depot_id}/schedule:
    get:
      operationId: getScheduleById
      summary: Get schedule
      description: Get operation for schedule resources.
      tags:
        - Depot
      parameters:
        - &a2
          name: depot_id
          in: path
          required: true
          description: depot id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: schedule identifier
                    example: schedule-a1b2c3d4
    put:
      operationId: updateScheduleById
      summary: Update schedule
      description: Update operation for schedule resources.
      tags:
        - Depot
      parameters:
        - *a2
      requestBody:
        required: true
        description: Update schedule request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: schedule data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: schedule identifier
                    example: schedule-a1b2c3d4
  /depots/{depot_id}/energy-budget:
    get:
      operationId: getBudgetById
      summary: Get budget
      description: Get operation for budget resources.
      tags:
        - Depot
      parameters:
        - &a3
          name: depot_id
          in: path
          required: true
          description: depot id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: budget identifier
                    example: budget-a1b2c3d4
    put:
      operationId: updateBudgetById
      summary: Update budget
      description: Update operation for budget resources.
      tags:
        - Depot
      parameters:
        - *a3
      requestBody:
        required: true
        description: Update budget request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: budget data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: budget identifier
                    example: budget-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
