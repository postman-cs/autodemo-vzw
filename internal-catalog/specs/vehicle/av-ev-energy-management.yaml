openapi: 3.0.3
info:
  title: Energy Management API
  description: Smart charging schedule management with grid integration, time-of-use rate optimization, and
    vehicle-to-grid (V2G) bidirectional energy flow. Supports demand response programs, renewable energy preference
    settings, and home solar integration.
  version: 1.3.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-ev-energy-management
  x-acme-domain: ev-services
servers:
  - url: https://av-ev-energy-management.api.acmevehicles.com/v1
    description: Production
  - url: https://av-ev-energy-management.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Schedules
    description: Smart charging schedule management
  - name: Grid
    description: Vehicle-to-grid and demand response
paths:
  /vehicles/{vin}/charging-schedule:
    get:
      operationId: getScheduleById
      summary: Get schedule
      description: Get operation for schedule resources.
      tags:
        - Schedules
      parameters:
        - &a1
          name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: schedule identifier
                    example: schedule-a1b2c3d4
    put:
      operationId: updateScheduleById
      summary: Update schedule
      description: Update operation for schedule resources.
      tags:
        - Schedules
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update schedule request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: schedule data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: schedule identifier
                    example: schedule-a1b2c3d4
  /vehicles/{vin}/energy-preferences:
    get:
      operationId: getPreferencesById
      summary: Get preferences
      description: Get operation for preferences resources.
      tags:
        - Schedules
      parameters:
        - &a2
          name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: preferences identifier
                    example: preferences-a1b2c3d4
    put:
      operationId: updatePreferencesById
      summary: Update preferences
      description: Update operation for preferences resources.
      tags:
        - Schedules
      parameters:
        - *a2
      requestBody:
        required: true
        description: Update preferences request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: preferences data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: preferences identifier
                    example: preferences-a1b2c3d4
  /v2g/sessions:
    get:
      operationId: listV2gSession
      summary: List v2g session
      description: List operation for v2g session resources.
      tags:
        - Schedules
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: v2g_session identifier
                    example: v2g_session-a1b2c3d4
    post:
      operationId: createV2gSession
      summary: Create v2g session
      description: Create operation for v2g session resources.
      tags:
        - Schedules
      requestBody:
        required: true
        description: Create v2g_session request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: v2g_session data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: v2g_session identifier
                    example: v2g_session-a1b2c3d4
  /v2g/sessions/{session_id}:
    get:
      operationId: getV2gSessionById
      summary: Get v2g session
      description: Get operation for v2g session resources.
      tags:
        - Schedules
      parameters:
        - name: session_id
          in: path
          required: true
          description: session id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: v2g_session identifier
                    example: v2g_session-a1b2c3d4
  /demand-response/events:
    get:
      operationId: listEvent
      summary: List event
      description: List operation for event resources.
      tags:
        - Schedules
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: event identifier
                    example: event-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
