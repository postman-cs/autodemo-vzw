openapi: 3.0.3
info:
  title: Voice Assistant API
  description: Process natural language voice commands for vehicle control, navigation, and information queries. Supports
    multi-language NLU, contextual follow-up intents, and integration with vehicle subsystems for hands-free operation.
  version: 1.3.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-connected-voice-assistant
  x-acme-domain: connected-services
servers:
  - url: https://av-connected-voice-assistant.api.acmevehicles.com/v1
    description: Production
  - url: https://av-connected-voice-assistant.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Voice
    description: Voice command processing
  - name: Intents
    description: Intent management and routing
paths:
  /voice/sessions:
    post:
      operationId: createSession
      summary: Create session
      description: Create operation for session resources.
      tags:
        - Voice
      requestBody:
        required: true
        description: Create session request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: session data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: session identifier
                    example: session-a1b2c3d4
  /voice/sessions/{session_id}:
    get:
      operationId: getSessionById
      summary: Get session
      description: Get operation for session resources.
      tags:
        - Voice
      parameters:
        - name: session_id
          in: path
          required: true
          description: session id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: session identifier
                    example: session-a1b2c3d4
  /voice/sessions/{session_id}/utterance:
    post:
      operationId: createUtteranceById
      summary: Create utterance
      description: Create operation for utterance resources.
      tags:
        - Voice
      parameters:
        - name: session_id
          in: path
          required: true
          description: session id
          schema:
            type: string
      requestBody:
        required: true
        description: Create utterance request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: utterance data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: utterance identifier
                    example: utterance-a1b2c3d4
  /voice/intents:
    get:
      operationId: listIntent
      summary: List intent
      description: List operation for intent resources.
      tags:
        - Voice
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: intent identifier
                    example: intent-a1b2c3d4
  /voice/languages:
    get:
      operationId: listLanguage
      summary: List language
      description: List operation for language resources.
      tags:
        - Voice
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: language identifier
                    example: language-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
