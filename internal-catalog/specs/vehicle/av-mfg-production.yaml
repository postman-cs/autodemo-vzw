openapi: 3.0.3
info:
  title: Production Scheduling API
  description: Manage vehicle production scheduling, line tracking, and build-to-order fulfillment. Provides production
    slot allocation, build status tracking, constraint-based scheduling, and customer delivery date estimation.
  version: 2.1.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-mfg-production
  x-acme-domain: manufacturing
servers:
  - url: https://av-mfg-production.api.acmevehicles.com/v1
    description: Production
  - url: https://av-mfg-production.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Production
    description: Production schedule management
  - name: Orders
    description: Build-to-order tracking
paths:
  /production/orders:
    get:
      operationId: listOrder
      summary: List order
      description: List operation for order resources.
      tags:
        - Production
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: order identifier
                    example: order-a1b2c3d4
    post:
      operationId: createOrder
      summary: Create order
      description: Create operation for order resources.
      tags:
        - Production
      requestBody:
        required: true
        description: Create order request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: order data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: order identifier
                    example: order-a1b2c3d4
  /production/orders/{order_id}:
    get:
      operationId: getOrderById
      summary: Get order
      description: Get operation for order resources.
      tags:
        - Production
      parameters:
        - &a1
          name: order_id
          in: path
          required: true
          description: order id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: order identifier
                    example: order-a1b2c3d4
    put:
      operationId: updateOrderById
      summary: Update order
      description: Update operation for order resources.
      tags:
        - Production
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update order request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: order data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: order identifier
                    example: order-a1b2c3d4
  /production/orders/{order_id}/status:
    get:
      operationId: getStatusById
      summary: Get status
      description: Get operation for status resources.
      tags:
        - Production
      parameters:
        - name: order_id
          in: path
          required: true
          description: order id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: status identifier
                    example: status-a1b2c3d4
  /production/lines:
    get:
      operationId: listLine
      summary: List line
      description: List operation for line resources.
      tags:
        - Production
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: line identifier
                    example: line-a1b2c3d4
  /production/lines/{line_id}/schedule:
    get:
      operationId: getScheduleById
      summary: Get schedule
      description: Get operation for schedule resources.
      tags:
        - Production
      parameters:
        - name: line_id
          in: path
          required: true
          description: line id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: schedule identifier
                    example: schedule-a1b2c3d4
  /production/capacity:
    get:
      operationId: getCapacity
      summary: Get capacity
      description: Get operation for capacity resources.
      tags:
        - Production
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: capacity identifier
                    example: capacity-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
