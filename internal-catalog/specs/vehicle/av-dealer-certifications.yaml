openapi: 3.0.3
info:
  title: Dealer Certification API
  description: Manage dealer certification programs, training completions, and compliance requirements. Supports
    EV-specific certifications, service technician skill tracking, and certification renewal workflows with automated
    reminders.
  version: 1.0.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-dealer-certifications
  x-acme-domain: dealer
servers:
  - url: https://av-dealer-certifications.api.acmevehicles.com/v1
    description: Production
  - url: https://av-dealer-certifications.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Certifications
    description: Dealer certification management
paths:
  /dealers/{dealer_id}/certifications:
    get:
      operationId: listCertificationById
      summary: List certification
      description: List operation for certification resources.
      tags:
        - Certifications
      parameters:
        - name: dealer_id
          in: path
          required: true
          description: dealer id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: certification identifier
                    example: certification-a1b2c3d4
  /dealers/{dealer_id}/certifications/{cert_id}:
    get:
      operationId: getCertificationById
      summary: Get certification
      description: Get operation for certification resources.
      tags:
        - Certifications
      parameters:
        - name: dealer_id
          in: path
          required: true
          description: dealer id
          schema:
            type: string
        - name: cert_id
          in: path
          required: true
          description: cert id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: certification identifier
                    example: certification-a1b2c3d4
  /training/courses:
    get:
      operationId: listCourse
      summary: List course
      description: List operation for course resources.
      tags:
        - Certifications
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: course identifier
                    example: course-a1b2c3d4
  /training/completions:
    get:
      operationId: listCompletion
      summary: List completion
      description: List operation for completion resources.
      tags:
        - Certifications
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: completion identifier
                    example: completion-a1b2c3d4
    post:
      operationId: createCompletion
      summary: Create completion
      description: Create operation for completion resources.
      tags:
        - Certifications
      requestBody:
        required: true
        description: Create completion request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: completion data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: completion identifier
                    example: completion-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
