openapi: 3.0.3
info:
  title: Driver Notifications API
  description: Send driver-ready itinerary and trip updates to mobile app channels after route and charging plans are
    finalized. Supports push notifications, in-vehicle head unit alerts, email digests, and configurable notification
    preferences per driver profile.
  version: 2.2.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-connected-notifications
  x-acme-domain: connected-services
servers:
  - url: https://av-connected-notifications.api.acmevehicles.com/v1
    description: Production
  - url: https://av-connected-notifications.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Notifications
    description: Send and manage driver notifications
  - name: Preferences
    description: Notification preference management
paths:
  /notifications:
    get:
      operationId: listNotification
      summary: List notification
      description: List operation for notification resources.
      tags:
        - Notifications
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: notification identifier
                    example: notification-a1b2c3d4
    post:
      operationId: createNotification
      summary: Create notification
      description: Create operation for notification resources.
      tags:
        - Notifications
      requestBody:
        required: true
        description: Create notification request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: notification data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: notification identifier
                    example: notification-a1b2c3d4
  /notifications/{notification_id}:
    get:
      operationId: getNotificationById
      summary: Get notification
      description: Get operation for notification resources.
      tags:
        - Notifications
      parameters:
        - name: notification_id
          in: path
          required: true
          description: notification id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: notification identifier
                    example: notification-a1b2c3d4
  /notifications/bulk:
    post:
      operationId: createBatch
      summary: Create batch
      description: Create operation for batch resources.
      tags:
        - Notifications
      requestBody:
        required: true
        description: Create batch request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: batch data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: batch identifier
                    example: batch-a1b2c3d4
  /preferences:
    get:
      operationId: getPreferences
      summary: Get preferences
      description: Get operation for preferences resources.
      tags:
        - Notifications
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: preferences identifier
                    example: preferences-a1b2c3d4
    put:
      operationId: updatePreferences
      summary: Update preferences
      description: Update operation for preferences resources.
      tags:
        - Notifications
      requestBody:
        required: true
        description: Update preferences request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: preferences data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: preferences identifier
                    example: preferences-a1b2c3d4
  /channels:
    get:
      operationId: listChannel
      summary: List channel
      description: List operation for channel resources.
      tags:
        - Notifications
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: channel identifier
                    example: channel-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
