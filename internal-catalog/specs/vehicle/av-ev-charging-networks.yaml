openapi: 3.0.3
info:
  title: Charging Network Roaming API
  description: Manage charging network partnerships, OCPI roaming agreements, and cross-network authentication. Provides
    unified access to partner charging infrastructure with transparent pricing and seamless authentication across
    networks.
  version: 1.1.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-ev-charging-networks
  x-acme-domain: ev-services
servers:
  - url: https://av-ev-charging-networks.api.acmevehicles.com/v1
    description: Production
  - url: https://av-ev-charging-networks.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Networks
    description: Partner charging network management
  - name: Roaming
    description: Cross-network access and pricing
paths:
  /networks:
    get:
      operationId: listNetwork
      summary: List network
      description: List operation for network resources.
      tags:
        - Networks
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: network identifier
                    example: network-a1b2c3d4
  /networks/{network_id}:
    get:
      operationId: getNetworkById
      summary: Get network
      description: Get operation for network resources.
      tags:
        - Networks
      parameters:
        - name: network_id
          in: path
          required: true
          description: network id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: network identifier
                    example: network-a1b2c3d4
  /networks/{network_id}/stations:
    get:
      operationId: listStationById
      summary: List station
      description: List operation for station resources.
      tags:
        - Networks
      parameters:
        - name: network_id
          in: path
          required: true
          description: network id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: station identifier
                    example: station-a1b2c3d4
  /roaming/agreements:
    get:
      operationId: listAgreement
      summary: List agreement
      description: List operation for agreement resources.
      tags:
        - Networks
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: agreement identifier
                    example: agreement-a1b2c3d4
  /roaming/tokens:
    get:
      operationId: listToken
      summary: List token
      description: List operation for token resources.
      tags:
        - Networks
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: token identifier
                    example: token-a1b2c3d4
    post:
      operationId: createToken
      summary: Create token
      description: Create operation for token resources.
      tags:
        - Networks
      requestBody:
        required: true
        description: Create token request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: token data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: token identifier
                    example: token-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
