openapi: 3.0.3
info:
  title: ETA Prediction API
  description: Calculate estimated time of arrival using real-time traffic, weather conditions, historical travel
    patterns, and vehicle-specific speed profiles. Provides confidence intervals, delay cause attribution, and automatic
    ETA refresh for active navigation.
  version: 1.3.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-telematics-eta
  x-acme-domain: telematics
servers:
  - url: https://av-telematics-eta.api.acmevehicles.com/v1
    description: Production
  - url: https://av-telematics-eta.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: ETA
    description: Arrival time estimation
paths:
  /eta/calculate:
    post:
      operationId: createEta
      summary: Create eta
      description: Create operation for eta resources.
      tags:
        - ETA
      requestBody:
        required: true
        description: Create eta request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: eta data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: eta identifier
                    example: eta-a1b2c3d4
  /eta/active/{session_id}:
    get:
      operationId: getEtaById
      summary: Get eta
      description: Get operation for eta resources.
      tags:
        - ETA
      parameters:
        - name: session_id
          in: path
          required: true
          description: session id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: eta identifier
                    example: eta-a1b2c3d4
  /eta/active/{session_id}/refresh:
    post:
      operationId: actionEtaById
      summary: Action eta
      description: Action operation for eta resources.
      tags:
        - ETA
      parameters:
        - name: session_id
          in: path
          required: true
          description: session id
          schema:
            type: string
      requestBody:
        required: true
        description: Action eta request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: eta data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: eta identifier
                    example: eta-a1b2c3d4
  /eta/history:
    get:
      operationId: listRecord
      summary: List record
      description: List operation for record resources.
      tags:
        - ETA
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: record identifier
                    example: record-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
