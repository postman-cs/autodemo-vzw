openapi: 3.0.3
info:
  title: Fleet Maintenance API
  description: Schedule and track preventive and corrective maintenance for fleet vehicles. Manages work orders, parts
    requisition, mechanic assignments, and maintenance compliance with automated reminders based on mileage and time
    intervals.
  version: 2.3.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-fleet-maintenance
  x-acme-domain: fleet-ops
servers:
  - url: https://av-fleet-maintenance.api.acmevehicles.com/v1
    description: Production
  - url: https://av-fleet-maintenance.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Work Orders
    description: Maintenance work order management
  - name: Scheduling
    description: Preventive maintenance scheduling
paths:
  /work-orders:
    get:
      operationId: listWorkOrder
      summary: List work order
      description: List operation for work order resources.
      tags:
        - Work Orders
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: work_order identifier
                    example: work_order-a1b2c3d4
    post:
      operationId: createWorkOrder
      summary: Create work order
      description: Create operation for work order resources.
      tags:
        - Work Orders
      requestBody:
        required: true
        description: Create work_order request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: work_order data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: work_order identifier
                    example: work_order-a1b2c3d4
  /work-orders/{order_id}:
    get:
      operationId: getWorkOrderById
      summary: Get work order
      description: Get operation for work order resources.
      tags:
        - Work Orders
      parameters:
        - &a1
          name: order_id
          in: path
          required: true
          description: order id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: work_order identifier
                    example: work_order-a1b2c3d4
    put:
      operationId: updateWorkOrderById
      summary: Update work order
      description: Update operation for work order resources.
      tags:
        - Work Orders
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update work_order request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: work_order data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: work_order identifier
                    example: work_order-a1b2c3d4
  /work-orders/{order_id}/complete:
    post:
      operationId: actionWorkOrderById
      summary: Action work order
      description: Action operation for work order resources.
      tags:
        - Work Orders
      parameters:
        - name: order_id
          in: path
          required: true
          description: order id
          schema:
            type: string
      requestBody:
        required: true
        description: Action work_order request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: work_order data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: work_order identifier
                    example: work_order-a1b2c3d4
  /schedules:
    get:
      operationId: listSchedule
      summary: List schedule
      description: List operation for schedule resources.
      tags:
        - Work Orders
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: schedule identifier
                    example: schedule-a1b2c3d4
  /schedules/{schedule_id}:
    get:
      operationId: getScheduleById
      summary: Get schedule
      description: Get operation for schedule resources.
      tags:
        - Work Orders
      parameters:
        - &a2
          name: schedule_id
          in: path
          required: true
          description: schedule id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: schedule identifier
                    example: schedule-a1b2c3d4
    put:
      operationId: updateScheduleById
      summary: Update schedule
      description: Update operation for schedule resources.
      tags:
        - Work Orders
      parameters:
        - *a2
      requestBody:
        required: true
        description: Update schedule request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: schedule data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: schedule identifier
                    example: schedule-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
