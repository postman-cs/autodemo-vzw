openapi: 3.0.3
info:
  title: Autonomous Fleet Dispatch API
  description: Dispatch and manage autonomous vehicle fleets for ride-hailing and goods delivery. Provides vehicle-to-ride
    matching, route assignment, passenger notification, and fleet rebalancing optimization for driverless operations.
  version: 1.0.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-autonomous-fleet-dispatch
  x-acme-domain: autonomous
servers:
  - url: https://av-autonomous-fleet-dispatch.api.acmevehicles.com/v1
    description: Production
  - url: https://av-autonomous-fleet-dispatch.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Dispatch
    description: Autonomous vehicle dispatching
  - name: Rides
    description: Ride request management
paths:
  /rides:
    get:
      operationId: listRide
      summary: List ride
      description: List operation for ride resources.
      tags:
        - Dispatch
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ride identifier
                    example: ride-a1b2c3d4
    post:
      operationId: createRide
      summary: Create ride
      description: Create operation for ride resources.
      tags:
        - Dispatch
      requestBody:
        required: true
        description: Create ride request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: ride data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ride identifier
                    example: ride-a1b2c3d4
  /rides/{ride_id}:
    get:
      operationId: getRideById
      summary: Get ride
      description: Get operation for ride resources.
      tags:
        - Dispatch
      parameters:
        - name: ride_id
          in: path
          required: true
          description: ride id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ride identifier
                    example: ride-a1b2c3d4
  /rides/{ride_id}/cancel:
    post:
      operationId: actionRideById
      summary: Action ride
      description: Action operation for ride resources.
      tags:
        - Dispatch
      parameters:
        - name: ride_id
          in: path
          required: true
          description: ride id
          schema:
            type: string
      requestBody:
        required: true
        description: Action ride request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: ride data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ride identifier
                    example: ride-a1b2c3d4
  /rides/{ride_id}/tracking:
    get:
      operationId: getTrackingById
      summary: Get tracking
      description: Get operation for tracking resources.
      tags:
        - Dispatch
      parameters:
        - name: ride_id
          in: path
          required: true
          description: ride id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: tracking identifier
                    example: tracking-a1b2c3d4
  /fleet/rebalance:
    post:
      operationId: createPlan
      summary: Create plan
      description: Create operation for plan resources.
      tags:
        - Dispatch
      requestBody:
        required: true
        description: Create plan request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: plan data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: plan identifier
                    example: plan-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
