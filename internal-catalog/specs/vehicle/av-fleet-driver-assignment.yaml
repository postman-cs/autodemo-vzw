openapi: 3.0.3
info:
  title: Driver Assignment API
  description: Manage driver-to-vehicle assignments, driver qualification tracking, and shift scheduling. Supports license
    verification, driver scoring integration, and automated assignment optimization based on vehicle requirements and
    driver certifications.
  version: 1.0.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-fleet-driver-assignment
  x-acme-domain: fleet-ops
servers:
  - url: https://av-fleet-driver-assignment.api.acmevehicles.com/v1
    description: Production
  - url: https://av-fleet-driver-assignment.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Assignments
    description: Driver-vehicle assignment management
  - name: Drivers
    description: Driver profile and qualification management
paths:
  /drivers:
    get:
      operationId: listDriver
      summary: List driver
      description: List operation for driver resources.
      tags:
        - Assignments
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: driver identifier
                    example: driver-a1b2c3d4
    post:
      operationId: createDriver
      summary: Create driver
      description: Create operation for driver resources.
      tags:
        - Assignments
      requestBody:
        required: true
        description: Create driver request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: driver data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: driver identifier
                    example: driver-a1b2c3d4
  /drivers/{driver_id}:
    get:
      operationId: getDriverById
      summary: Get driver
      description: Get operation for driver resources.
      tags:
        - Assignments
      parameters:
        - &a1
          name: driver_id
          in: path
          required: true
          description: driver id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: driver identifier
                    example: driver-a1b2c3d4
    put:
      operationId: updateDriverById
      summary: Update driver
      description: Update operation for driver resources.
      tags:
        - Assignments
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update driver request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: driver data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: driver identifier
                    example: driver-a1b2c3d4
  /drivers/{driver_id}/qualifications:
    get:
      operationId: listQualificationById
      summary: List qualification
      description: List operation for qualification resources.
      tags:
        - Assignments
      parameters:
        - name: driver_id
          in: path
          required: true
          description: driver id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: qualification identifier
                    example: qualification-a1b2c3d4
  /assignments:
    get:
      operationId: listAssignment
      summary: List assignment
      description: List operation for assignment resources.
      tags:
        - Assignments
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: assignment identifier
                    example: assignment-a1b2c3d4
    post:
      operationId: createAssignment
      summary: Create assignment
      description: Create operation for assignment resources.
      tags:
        - Assignments
      requestBody:
        required: true
        description: Create assignment request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: assignment data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: assignment identifier
                    example: assignment-a1b2c3d4
  /assignments/{assignment_id}:
    get:
      operationId: getAssignmentById
      summary: Get assignment
      description: Get operation for assignment resources.
      tags:
        - Assignments
      parameters:
        - &a2
          name: assignment_id
          in: path
          required: true
          description: assignment id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: assignment identifier
                    example: assignment-a1b2c3d4
    put:
      operationId: updateAssignmentById
      summary: Update assignment
      description: Update operation for assignment resources.
      tags:
        - Assignments
      parameters:
        - *a2
      requestBody:
        required: true
        description: Update assignment request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: assignment data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: assignment identifier
                    example: assignment-a1b2c3d4
    delete:
      operationId: deleteAssignmentById
      summary: Delete assignment
      description: Delete operation for assignment resources.
      tags:
        - Assignments
      parameters:
        - *a2
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: assignment identifier
                    example: assignment-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
