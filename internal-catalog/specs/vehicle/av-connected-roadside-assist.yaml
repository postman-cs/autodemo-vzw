openapi: 3.0.3
info:
  title: Roadside Assistance API
  description: Request and track roadside assistance including towing, tire changes, jump starts, fuel delivery, and
    lockout services. Provides real-time ETA tracking, service provider dispatch, and automatic breakdown detection with
    proactive assistance offers.
  version: 1.4.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-connected-roadside-assist
  x-acme-domain: connected-services
servers:
  - url: https://av-connected-roadside-assist.api.acmevehicles.com/v1
    description: Production
  - url: https://av-connected-roadside-assist.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Requests
    description: Roadside assistance request management
  - name: Tracking
    description: Service provider tracking
paths:
  /assistance/requests:
    get:
      operationId: listRequest
      summary: List request
      description: List operation for request resources.
      tags:
        - Requests
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: request identifier
                    example: request-a1b2c3d4
    post:
      operationId: createRequest
      summary: Create request
      description: Create operation for request resources.
      tags:
        - Requests
      requestBody:
        required: true
        description: Create request request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: request data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: request identifier
                    example: request-a1b2c3d4
  /assistance/requests/{request_id}:
    get:
      operationId: getRequestById
      summary: Get request
      description: Get operation for request resources.
      tags:
        - Requests
      parameters:
        - name: request_id
          in: path
          required: true
          description: request id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: request identifier
                    example: request-a1b2c3d4
  /assistance/requests/{request_id}/cancel:
    post:
      operationId: actionRequestById
      summary: Action request
      description: Action operation for request resources.
      tags:
        - Requests
      parameters:
        - name: request_id
          in: path
          required: true
          description: request id
          schema:
            type: string
      requestBody:
        required: true
        description: Action request request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: request data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: request identifier
                    example: request-a1b2c3d4
  /assistance/requests/{request_id}/tracking:
    get:
      operationId: getTrackingById
      summary: Get tracking
      description: Get operation for tracking resources.
      tags:
        - Requests
      parameters:
        - name: request_id
          in: path
          required: true
          description: request id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: tracking identifier
                    example: tracking-a1b2c3d4
  /assistance/providers/nearby:
    post:
      operationId: searchProvider
      summary: Search provider
      description: Search operation for provider resources.
      tags:
        - Requests
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      requestBody:
        required: true
        description: Search provider request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: provider data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: provider identifier
                    example: provider-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
