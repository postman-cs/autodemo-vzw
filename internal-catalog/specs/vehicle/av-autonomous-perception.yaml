openapi: 3.0.3
info:
  title: Perception API
  description: Access real-time object detection and classification results from the autonomous driving perception stack.
    Provides 3D bounding boxes, semantic segmentation, lane markings, traffic sign recognition, and pedestrian intent
    prediction.
  version: 1.4.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-autonomous-perception
  x-acme-domain: autonomous
servers:
  - url: https://av-autonomous-perception.api.acmevehicles.com/v1
    description: Production
  - url: https://av-autonomous-perception.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Detection
    description: Object detection and classification
  - name: Scene
    description: Scene understanding
paths:
  /vehicles/{vin}/perception/objects:
    get:
      operationId: listObjectById
      summary: List object
      description: List operation for object resources.
      tags:
        - Detection
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: object identifier
                    example: object-a1b2c3d4
  /vehicles/{vin}/perception/lanes:
    get:
      operationId: getLanesById
      summary: Get lanes
      description: Get operation for lanes resources.
      tags:
        - Detection
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: lanes identifier
                    example: lanes-a1b2c3d4
  /vehicles/{vin}/perception/signs:
    get:
      operationId: listSignById
      summary: List sign
      description: List operation for sign resources.
      tags:
        - Detection
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: sign identifier
                    example: sign-a1b2c3d4
  /vehicles/{vin}/perception/scene:
    get:
      operationId: getSceneById
      summary: Get scene
      description: Get operation for scene resources.
      tags:
        - Detection
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: scene identifier
                    example: scene-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
