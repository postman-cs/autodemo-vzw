openapi: 3.0.3
info:
  title: Auto Insurance Claims API
  description: File and track auto insurance claims with automated damage assessment and repair coordination. Supports
    FNOL processing, photo-based AI damage estimation, preferred repair shop routing, and rental car arrangement.
  version: 2.0.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-insurance-claims
  x-acme-domain: insurance
servers:
  - url: https://av-insurance-claims.api.acmevehicles.com/v1
    description: Production
  - url: https://av-insurance-claims.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Claims
    description: Insurance claim processing
  - name: Assessment
    description: Damage assessment and estimation
paths:
  /claims:
    get:
      operationId: listClaim
      summary: List claim
      description: List operation for claim resources.
      tags:
        - Claims
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: claim identifier
                    example: claim-a1b2c3d4
    post:
      operationId: createClaim
      summary: Create claim
      description: Create operation for claim resources.
      tags:
        - Claims
      requestBody:
        required: true
        description: Create claim request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: claim data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: claim identifier
                    example: claim-a1b2c3d4
  /claims/{claim_id}:
    get:
      operationId: getClaimById
      summary: Get claim
      description: Get operation for claim resources.
      tags:
        - Claims
      parameters:
        - &a1
          name: claim_id
          in: path
          required: true
          description: claim id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: claim identifier
                    example: claim-a1b2c3d4
    put:
      operationId: updateClaimById
      summary: Update claim
      description: Update operation for claim resources.
      tags:
        - Claims
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update claim request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: claim data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: claim identifier
                    example: claim-a1b2c3d4
  /claims/{claim_id}/photos:
    get:
      operationId: listPhotoById
      summary: List photo
      description: List operation for photo resources.
      tags:
        - Claims
      parameters:
        - &a2
          name: claim_id
          in: path
          required: true
          description: claim id
          schema:
            type: string
        - name: page
