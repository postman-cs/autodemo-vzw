          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: photo identifier
                    example: photo-a1b2c3d4
    post:
      operationId: createPhotoById
      summary: Create photo
      description: Create operation for photo resources.
      tags:
        - Claims
      parameters:
        - *a2
      requestBody:
        required: true
        description: Create photo request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: photo data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: photo identifier
                    example: photo-a1b2c3d4
  /claims/{claim_id}/estimate:
