openapi: 3.0.3
info:
  title: Insurance Policy API
  description: Manage auto insurance policies including coverage details, premium payments, and policy amendments.
    Supports vehicle addition/removal, coverage upgrades, and automated renewal processing with rate re-evaluation.
  version: 1.5.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-insurance-policies
  x-acme-domain: insurance
servers:
  - url: https://av-insurance-policies.api.acmevehicles.com/v1
    description: Production
  - url: https://av-insurance-policies.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Policies
    description: Policy lifecycle management
  - name: Payments
    description: Premium payment processing
paths:
  /policies:
    get:
      operationId: listPolicy
      summary: List policy
      description: List operation for policy resources.
      tags:
        - Policies
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: policy identifier
                    example: policy-a1b2c3d4
  /policies/{policy_id}:
    get:
      operationId: getPolicyById
      summary: Get policy
      description: Get operation for policy resources.
      tags:
        - Policies
      parameters:
        - &a1
          name: policy_id
          in: path
          required: true
          description: policy id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: policy identifier
                    example: policy-a1b2c3d4
    put:
      operationId: updatePolicyById
      summary: Update policy
      description: Update operation for policy resources.
      tags:
        - Policies
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update policy request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: policy data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: policy identifier
                    example: policy-a1b2c3d4
  /policies/{policy_id}/vehicles:
    get:
      operationId: listVehicleById
      summary: List vehicle
      description: List operation for vehicle resources.
      tags:
        - Policies
      parameters:
        - &a2
          name: policy_id
          in: path
          required: true
          description: policy id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: vehicle identifier
                    example: vehicle-a1b2c3d4
    post:
      operationId: createVehicleById
      summary: Create vehicle
      description: Create operation for vehicle resources.
      tags:
        - Policies
      parameters:
        - *a2
      requestBody:
        required: true
        description: Create vehicle request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: vehicle data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: vehicle identifier
                    example: vehicle-a1b2c3d4
  /policies/{policy_id}/payments:
    get:
      operationId: listPaymentById
      summary: List payment
      description: List operation for payment resources.
      tags:
        - Policies
      parameters:
        - name: policy_id
          in: path
          required: true
          description: policy id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: payment identifier
                    example: payment-a1b2c3d4
  /policies/{policy_id}/renew:
    post:
      operationId: actionPolicyById
      summary: Action policy
      description: Action operation for policy resources.
      tags:
        - Policies
      parameters:
        - name: policy_id
          in: path
          required: true
          description: policy id
          schema:
            type: string
      requestBody:
        required: true
        description: Action policy request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: policy data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: policy identifier
                    example: policy-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
