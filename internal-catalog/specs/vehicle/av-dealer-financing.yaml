openapi: 3.0.3
info:
  title: Auto Financing API
  description: Process auto loan and lease credit applications with multi-lender decisioning. Supports credit bureau
    pulls, rate shopping across lending partners, payment calculator, and digital contract signing for F&I workflows.
  version: 2.0.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-dealer-financing
  x-acme-domain: dealer
servers:
  - url: https://av-dealer-financing.api.acmevehicles.com/v1
    description: Production
  - url: https://av-dealer-financing.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Applications
    description: Credit application processing
  - name: Offers
    description: Financing offer management
paths:
  /applications:
    get:
      operationId: listApplication
      summary: List application
      description: List operation for application resources.
      tags:
        - Applications
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: application identifier
                    example: application-a1b2c3d4
    post:
      operationId: createApplication
      summary: Create application
      description: Create operation for application resources.
      tags:
        - Applications
      requestBody:
        required: true
        description: Create application request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: application data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: application identifier
                    example: application-a1b2c3d4
  /applications/{app_id}:
    get:
      operationId: getApplicationById
      summary: Get application
      description: Get operation for application resources.
      tags:
        - Applications
      parameters:
        - name: app_id
          in: path
          required: true
          description: app id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: application identifier
                    example: application-a1b2c3d4
  /applications/{app_id}/decisions:
    get:
      operationId: listDecisionById
      summary: List decision
      description: List operation for decision resources.
      tags:
        - Applications
      parameters:
        - name: app_id
          in: path
          required: true
          description: app id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: decision identifier
                    example: decision-a1b2c3d4
  /applications/{app_id}/accept:
    post:
      operationId: actionApplicationById
      summary: Action application
      description: Action operation for application resources.
      tags:
        - Applications
      parameters:
        - name: app_id
          in: path
          required: true
          description: app id
          schema:
            type: string
      requestBody:
        required: true
        description: Action application request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: application data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: application identifier
                    example: application-a1b2c3d4
  /calculators/payment:
    post:
      operationId: createCalculation
      summary: Create calculation
      description: Create operation for calculation resources.
      tags:
        - Applications
      requestBody:
        required: true
        description: Create calculation request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: calculation data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: calculation identifier
                    example: calculation-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
