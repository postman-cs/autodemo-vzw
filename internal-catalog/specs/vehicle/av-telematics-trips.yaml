openapi: 3.0.3
info:
  title: Trip Recording API
  description: Automatic trip detection, recording, and route history with start/stop location, distance, duration, and
    fuel/energy consumption per trip. Supports trip purpose classification, expense mileage tracking, and trip-level
    carbon footprint calculation.
  version: 2.1.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-telematics-trips
  x-acme-domain: telematics
servers:
  - url: https://av-telematics-trips.api.acmevehicles.com/v1
    description: Production
  - url: https://av-telematics-trips.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Trips
    description: Trip recording and history
  - name: Analytics
    description: Trip analytics and classification
paths:
  /vehicles/{vin}/trips:
    get:
      operationId: listTripById
      summary: List trip
      description: List operation for trip resources.
      tags:
        - Trips
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: trip identifier
                    example: trip-a1b2c3d4
  /vehicles/{vin}/trips/{trip_id}:
    get:
      operationId: getTripById
      summary: Get trip
      description: Get operation for trip resources.
      tags:
        - Trips
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: trip_id
          in: path
          required: true
          description: trip id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: trip identifier
                    example: trip-a1b2c3d4
  /vehicles/{vin}/trips/{trip_id}/route:
    get:
      operationId: getRouteById
      summary: Get route
      description: Get operation for route resources.
      tags:
        - Trips
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: trip_id
          in: path
          required: true
          description: trip id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: route identifier
                    example: route-a1b2c3d4
  /vehicles/{vin}/trips/{trip_id}/classify:
    post:
      operationId: actionTripById
      summary: Action trip
      description: Action operation for trip resources.
      tags:
        - Trips
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: trip_id
          in: path
          required: true
          description: trip id
          schema:
            type: string
      requestBody:
        required: true
        description: Action trip request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: trip data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: trip identifier
                    example: trip-a1b2c3d4
  /vehicles/{vin}/trips/summary:
    get:
      operationId: getSummaryById
      summary: Get summary
      description: Get operation for summary resources.
      tags:
        - Trips
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: summary identifier
                    example: summary-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
