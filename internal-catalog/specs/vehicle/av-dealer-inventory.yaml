openapi: 3.0.3
info:
  title: Dealer Inventory API
  description: Search and manage dealer vehicle inventory including new, certified pre-owned, and used vehicles. Supports
    VIN-level detail, photo galleries, window sticker generation, and real-time inventory synchronization across dealer
    groups.
  version: 2.4.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-dealer-inventory
  x-acme-domain: dealer
servers:
  - url: https://av-dealer-inventory.api.acmevehicles.com/v1
    description: Production
  - url: https://av-dealer-inventory.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Inventory
    description: Vehicle inventory management
  - name: Search
    description: Inventory search and filtering
paths:
  /dealers/{dealer_id}/inventory:
    get:
      operationId: listVehicleById
      summary: List vehicle
      description: List operation for vehicle resources.
      tags:
        - Inventory
      parameters:
        - name: dealer_id
          in: path
          required: true
          description: dealer id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: vehicle identifier
                    example: vehicle-a1b2c3d4
  /dealers/{dealer_id}/inventory/{vin}:
    get:
      operationId: getVehicleById
      summary: Get vehicle
      description: Get operation for vehicle resources.
      tags:
        - Inventory
      parameters:
        - &a1
          name: dealer_id
          in: path
          required: true
          description: dealer id
          schema:
            type: string
        - &a2
          name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: vehicle identifier
                    example: vehicle-a1b2c3d4
    put:
      operationId: updateVehicleById
      summary: Update vehicle
      description: Update operation for vehicle resources.
      tags:
        - Inventory
      parameters:
        - *a1
        - *a2
      requestBody:
        required: true
        description: Update vehicle request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: vehicle data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: vehicle identifier
                    example: vehicle-a1b2c3d4
  /inventory/search:
    post:
      operationId: searchVehicle
      summary: Search vehicle
      description: Search operation for vehicle resources.
      tags:
        - Inventory
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      requestBody:
        required: true
        description: Search vehicle request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: vehicle data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: vehicle identifier
                    example: vehicle-a1b2c3d4
  /dealers/{dealer_id}/inventory/sync:
    post:
      operationId: actionInventoryById
      summary: Action inventory
      description: Action operation for inventory resources.
      tags:
        - Inventory
      parameters:
        - name: dealer_id
          in: path
          required: true
          description: dealer id
          schema:
            type: string
      requestBody:
        required: true
        description: Action inventory request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: inventory data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: inventory identifier
                    example: inventory-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
