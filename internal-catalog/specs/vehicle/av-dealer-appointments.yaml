openapi: 3.0.3
info:
  title: Service Appointments API
  description: Schedule dealer service appointments for maintenance, repair, and recall work. Supports online booking,
    appointment reminders, service advisor assignment, and estimated completion time with real-time service bay
    availability.
  version: 2.1.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-dealer-appointments
  x-acme-domain: dealer
servers:
  - url: https://av-dealer-appointments.api.acmevehicles.com/v1
    description: Production
  - url: https://av-dealer-appointments.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Appointments
    description: Service appointment management
  - name: Availability
    description: Service bay availability
paths:
  /dealers/{dealer_id}/appointments:
    get:
      operationId: listAppointmentById
      summary: List appointment
      description: List operation for appointment resources.
      tags:
        - Appointments
      parameters:
        - &a1
          name: dealer_id
          in: path
          required: true
          description: dealer id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: appointment identifier
                    example: appointment-a1b2c3d4
    post:
      operationId: createAppointmentById
      summary: Create appointment
      description: Create operation for appointment resources.
      tags:
        - Appointments
      parameters:
        - *a1
      requestBody:
        required: true
        description: Create appointment request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: appointment data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: appointment identifier
                    example: appointment-a1b2c3d4
  /dealers/{dealer_id}/appointments/{appt_id}:
    get:
      operationId: getAppointmentById
      summary: Get appointment
      description: Get operation for appointment resources.
      tags:
        - Appointments
      parameters:
        - &a2
          name: dealer_id
          in: path
          required: true
          description: dealer id
          schema:
            type: string
        - &a3
          name: appt_id
          in: path
          required: true
          description: appt id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: appointment identifier
                    example: appointment-a1b2c3d4
    put:
      operationId: updateAppointmentById
      summary: Update appointment
      description: Update operation for appointment resources.
      tags:
        - Appointments
      parameters:
        - *a2
        - *a3
      requestBody:
        required: true
        description: Update appointment request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: appointment data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: appointment identifier
                    example: appointment-a1b2c3d4
    delete:
      operationId: deleteAppointmentById
      summary: Delete appointment
      description: Delete operation for appointment resources.
      tags:
        - Appointments
      parameters:
        - *a2
        - *a3
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: appointment identifier
                    example: appointment-a1b2c3d4
  /dealers/{dealer_id}/availability:
    get:
      operationId: getAvailabilityById
      summary: Get availability
      description: Get operation for availability resources.
      tags:
        - Appointments
      parameters:
        - name: dealer_id
          in: path
          required: true
          description: dealer id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: availability identifier
                    example: availability-a1b2c3d4
  /dealers/{dealer_id}/advisors:
    get:
      operationId: listAdvisorById
      summary: List advisor
      description: List operation for advisor resources.
      tags:
        - Appointments
      parameters:
        - name: dealer_id
          in: path
          required: true
          description: dealer id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: advisor identifier
                    example: advisor-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
