openapi: 3.0.3
info:
  title: Collision Avoidance API
  description: Forward collision warning and automatic emergency braking configuration and event reporting. Provides
    braking intervention logs, near-miss analytics, pedestrian detection settings, and cyclist awareness zone
    configuration.
  version: 1.4.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-safety-collision-avoidance
  x-acme-domain: safety
servers:
  - url: https://av-safety-collision-avoidance.api.acmevehicles.com/v1
    description: Production
  - url: https://av-safety-collision-avoidance.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: FCW
    description: Forward collision warning configuration
  - name: AEB
    description: Automatic emergency braking events
paths:
  /vehicles/{vin}/collision-avoidance/config:
    get:
      operationId: getConfigById
      summary: Get config
      description: Get operation for config resources.
      tags:
        - FCW
      parameters:
        - &a1
          name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: config identifier
                    example: config-a1b2c3d4
    put:
      operationId: updateConfigById
      summary: Update config
      description: Update operation for config resources.
      tags:
        - FCW
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update config request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: config data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: config identifier
                    example: config-a1b2c3d4
  /vehicles/{vin}/collision-avoidance/events:
    get:
      operationId: listEventById
      summary: List event
      description: List operation for event resources.
      tags:
        - FCW
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: event identifier
                    example: event-a1b2c3d4
  /vehicles/{vin}/collision-avoidance/events/{event_id}:
    get:
      operationId: getEventById
      summary: Get event
      description: Get operation for event resources.
      tags:
        - FCW
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: event_id
          in: path
          required: true
          description: event id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: event identifier
                    example: event-a1b2c3d4
  /vehicles/{vin}/collision-avoidance/stats:
    get:
      operationId: getStatsById
      summary: Get stats
      description: Get operation for stats resources.
      tags:
        - FCW
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: stats identifier
                    example: stats-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
