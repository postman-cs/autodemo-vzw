openapi: 3.0.3
info:
  title: Fleet Management API
  description: Comprehensive fleet tracking and utilization management for commercial vehicle operations. Provides
    real-time fleet dashboards, vehicle assignment workflows, utilization metrics, and TCO analysis across mixed ICE/EV
    fleets.
  version: 3.0.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-fleet-management
  x-acme-domain: fleet-ops
servers:
  - url: https://av-fleet-management.api.acmevehicles.com/v1
    description: Production
  - url: https://av-fleet-management.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Fleet
    description: Fleet-level operations and dashboards
  - name: Vehicles
    description: Fleet vehicle management
paths:
  /fleets:
    get:
      operationId: listFleet
      summary: List fleet
      description: List operation for fleet resources.
      tags:
        - Fleet
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: fleet identifier
                    example: fleet-a1b2c3d4
    post:
      operationId: createFleet
      summary: Create fleet
      description: Create operation for fleet resources.
      tags:
        - Fleet
      requestBody:
        required: true
        description: Create fleet request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: fleet data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: fleet identifier
                    example: fleet-a1b2c3d4
  /fleets/{fleet_id}:
    get:
      operationId: getFleetById
      summary: Get fleet
      description: Get operation for fleet resources.
      tags:
        - Fleet
      parameters:
        - &a1
          name: fleet_id
          in: path
          required: true
          description: fleet id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: fleet identifier
                    example: fleet-a1b2c3d4
    put:
      operationId: updateFleetById
      summary: Update fleet
      description: Update operation for fleet resources.
      tags:
        - Fleet
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update fleet request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: fleet data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: fleet identifier
                    example: fleet-a1b2c3d4
  /fleets/{fleet_id}/vehicles:
    get:
      operationId: listVehicleById
      summary: List vehicle
      description: List operation for vehicle resources.
      tags:
        - Fleet
      parameters:
        - &a2
          name: fleet_id
          in: path
          required: true
          description: fleet id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: vehicle identifier
                    example: vehicle-a1b2c3d4
    post:
      operationId: createVehicleById
      summary: Create vehicle
      description: Create operation for vehicle resources.
      tags:
        - Fleet
      parameters:
        - *a2
      requestBody:
        required: true
        description: Create vehicle request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: vehicle data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: vehicle identifier
                    example: vehicle-a1b2c3d4
  /fleets/{fleet_id}/vehicles/{vin}:
    get:
      operationId: getVehicleById
      summary: Get vehicle
      description: Get operation for vehicle resources.
      tags:
        - Fleet
      parameters:
        - &a3
          name: fleet_id
          in: path
          required: true
          description: fleet id
          schema:
            type: string
        - &a4
          name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: vehicle identifier
                    example: vehicle-a1b2c3d4
    put:
      operationId: updateVehicleById
      summary: Update vehicle
      description: Update operation for vehicle resources.
      tags:
        - Fleet
      parameters:
        - *a3
        - *a4
      requestBody:
        required: true
        description: Update vehicle request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: vehicle data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: vehicle identifier
                    example: vehicle-a1b2c3d4
    delete:
      operationId: deleteVehicleById
      summary: Delete vehicle
      description: Delete operation for vehicle resources.
      tags:
        - Fleet
      parameters:
        - *a3
        - *a4
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: vehicle identifier
                    example: vehicle-a1b2c3d4
  /fleets/{fleet_id}/utilization:
    get:
      operationId: getUtilizationById
      summary: Get utilization
      description: Get operation for utilization resources.
      tags:
        - Fleet
      parameters:
        - name: fleet_id
          in: path
          required: true
          description: fleet id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: utilization identifier
                    example: utilization-a1b2c3d4
  /fleets/{fleet_id}/dashboard:
    get:
      operationId: getDashboardById
      summary: Get dashboard
      description: Get operation for dashboard resources.
      tags:
        - Fleet
      parameters:
        - name: fleet_id
          in: path
          required: true
          description: fleet id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: dashboard identifier
                    example: dashboard-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
