openapi: 3.0.3
info:
  title: Fleet Geofencing API
  description: Define and manage geofence zones for fleet operations with entry/exit event detection and real-time
    alerting. Supports polygon and radius zone types, time-based activation rules, and multi-zone correlation for route
    compliance monitoring.
  version: 1.4.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-fleet-geofencing
  x-acme-domain: fleet-ops
servers:
  - url: https://av-fleet-geofencing.api.acmevehicles.com/v1
    description: Production
  - url: https://av-fleet-geofencing.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Zones
    description: Geofence zone management
  - name: Events
    description: Zone entry/exit events
paths:
  /zones:
    get:
      operationId: listZone
      summary: List zone
      description: List operation for zone resources.
      tags:
        - Zones
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: zone identifier
                    example: zone-a1b2c3d4
    post:
      operationId: createZone
      summary: Create zone
      description: Create operation for zone resources.
      tags:
        - Zones
      requestBody:
        required: true
        description: Create zone request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: zone data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: zone identifier
                    example: zone-a1b2c3d4
  /zones/{zone_id}:
    get:
      operationId: getZoneById
      summary: Get zone
      description: Get operation for zone resources.
      tags:
        - Zones
      parameters:
        - &a1
          name: zone_id
          in: path
          required: true
          description: zone id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: zone identifier
                    example: zone-a1b2c3d4
    put:
      operationId: updateZoneById
      summary: Update zone
      description: Update operation for zone resources.
      tags:
        - Zones
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update zone request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: zone data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: zone identifier
                    example: zone-a1b2c3d4
    delete:
      operationId: deleteZoneById
      summary: Delete zone
      description: Delete operation for zone resources.
      tags:
        - Zones
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: zone identifier
                    example: zone-a1b2c3d4
  /zones/{zone_id}/events:
    get:
      operationId: listEventById
      summary: List event
      description: List operation for event resources.
      tags:
        - Zones
      parameters:
        - name: zone_id
          in: path
          required: true
          description: zone id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: event identifier
                    example: event-a1b2c3d4
  /alerts:
    get:
      operationId: listAlert
      summary: List alert
      description: List operation for alert resources.
      tags:
        - Zones
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: alert identifier
                    example: alert-a1b2c3d4
  /alerts/{alert_id}:
    get:
      operationId: getAlertById
      summary: Get alert
      description: Get operation for alert resources.
      tags:
        - Zones
      parameters:
        - name: alert_id
          in: path
          required: true
          description: alert id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: alert identifier
                    example: alert-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
