openapi: 3.0.3
info:
  title: Harsh Event Detection API
  description: Detect and classify harsh driving events including hard braking, rapid acceleration, sharp cornering, and
    swerving. Provides accelerometer-derived severity scoring, event replay with map visualization, and trend analysis
    for fleet safety programs.
  version: 1.5.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-telematics-harsh-events
  x-acme-domain: telematics
servers:
  - url: https://av-telematics-harsh-events.api.acmevehicles.com/v1
    description: Production
  - url: https://av-telematics-harsh-events.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Events
    description: Harsh event detection and classification
paths:
  /vehicles/{vin}/harsh-events:
    get:
      operationId: listEventById
      summary: List event
      description: List operation for event resources.
      tags:
        - Events
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: event identifier
                    example: event-a1b2c3d4
  /vehicles/{vin}/harsh-events/{event_id}:
    get:
      operationId: getEventById
      summary: Get event
      description: Get operation for event resources.
      tags:
        - Events
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: event_id
          in: path
          required: true
          description: event id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: event identifier
                    example: event-a1b2c3d4
  /vehicles/{vin}/harsh-events/summary:
    get:
      operationId: getSummaryById
      summary: Get summary
      description: Get operation for summary resources.
      tags:
        - Events
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: summary identifier
                    example: summary-a1b2c3d4
  /fleet/harsh-events/report:
    post:
      operationId: createReport
      summary: Create report
      description: Create operation for report resources.
      tags:
        - Events
      requestBody:
        required: true
        description: Create report request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: report data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: report identifier
                    example: report-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
