openapi: 3.0.3
info:
  title: Real-Time Tracking API
  description: Real-time GPS tracking for fleet and consumer vehicles with sub-second position updates. Supports
    multi-vehicle map views, breadcrumb trail visualization, speed corridor monitoring, and integration with dispatch
    management systems.
  version: 2.8.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-telematics-tracking
  x-acme-domain: telematics
servers:
  - url: https://av-telematics-tracking.api.acmevehicles.com/v1
    description: Production
  - url: https://av-telematics-tracking.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Tracking
    description: Real-time vehicle position tracking
paths:
  /vehicles/{vin}/position:
    get:
      operationId: getPositionById
      summary: Get position
      description: Get operation for position resources.
      tags:
        - Tracking
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: position identifier
                    example: position-a1b2c3d4
  /vehicles/{vin}/trail:
    get:
      operationId: listBreadcrumbById
      summary: List breadcrumb
      description: List operation for breadcrumb resources.
      tags:
        - Tracking
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: breadcrumb identifier
                    example: breadcrumb-a1b2c3d4
  /vehicles/positions:
    get:
      operationId: listPosition
      summary: List position
      description: List operation for position resources.
      tags:
        - Tracking
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: position identifier
                    example: position-a1b2c3d4
  /vehicles/{vin}/speed:
    get:
      operationId: getSpeedById
      summary: Get speed
      description: Get operation for speed resources.
      tags:
        - Tracking
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: speed identifier
                    example: speed-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
