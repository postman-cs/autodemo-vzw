openapi: 3.0.3
info:
  title: Vehicle Recall Management API
  description: Manage vehicle recall campaigns, affected VIN lookups, dealer appointment scheduling, and recall completion
    tracking. Integrates with NHTSA recall databases and provides proactive owner notification workflows.
  version: 1.6.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-safety-recalls
  x-acme-domain: safety
servers:
  - url: https://av-safety-recalls.api.acmevehicles.com/v1
    description: Production
  - url: https://av-safety-recalls.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Recalls
    description: Recall campaign management
  - name: Appointments
    description: Recall service appointments
paths:
  /recalls:
    get:
      operationId: listRecall
      summary: List recall
      description: List operation for recall resources.
      tags:
        - Recalls
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: recall identifier
                    example: recall-a1b2c3d4
  /recalls/{recall_id}:
    get:
      operationId: getRecallById
      summary: Get recall
      description: Get operation for recall resources.
      tags:
        - Recalls
      parameters:
        - name: recall_id
          in: path
          required: true
          description: recall id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: recall identifier
                    example: recall-a1b2c3d4
  /vehicles/{vin}/recalls:
    get:
      operationId: listRecallById
      summary: List recall
      description: List operation for recall resources.
      tags:
        - Recalls
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: recall identifier
                    example: recall-a1b2c3d4
  /recalls/{recall_id}/appointments:
    get:
      operationId: listAppointmentById
      summary: List appointment
      description: List operation for appointment resources.
      tags:
        - Recalls
      parameters:
        - &a1
          name: recall_id
          in: path
          required: true
          description: recall id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: appointment identifier
                    example: appointment-a1b2c3d4
    post:
      operationId: createAppointmentById
      summary: Create appointment
      description: Create operation for appointment resources.
      tags:
        - Recalls
      parameters:
        - *a1
      requestBody:
        required: true
        description: Create appointment request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: appointment data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: appointment identifier
                    example: appointment-a1b2c3d4
  /recalls/{recall_id}/appointments/{appointment_id}:
    get:
      operationId: getAppointmentById
      summary: Get appointment
      description: Get operation for appointment resources.
      tags:
        - Recalls
      parameters:
        - &a2
          name: recall_id
          in: path
          required: true
          description: recall id
          schema:
            type: string
        - &a3
          name: appointment_id
          in: path
          required: true
          description: appointment id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: appointment identifier
                    example: appointment-a1b2c3d4
    put:
      operationId: updateAppointmentById
      summary: Update appointment
      description: Update operation for appointment resources.
      tags:
        - Recalls
      parameters:
        - *a2
        - *a3
      requestBody:
        required: true
        description: Update appointment request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: appointment data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: appointment identifier
                    example: appointment-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
