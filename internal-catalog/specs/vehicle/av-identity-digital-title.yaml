openapi: 3.0.3
info:
  title: Digital Vehicle Title API
  description: Manage digital vehicle titles with blockchain-anchored ownership records. Supports title transfers, lien
    holder management, salvage title flagging, and interstate title conversion with DMV integration.
  version: 1.0.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-identity-digital-title
  x-acme-domain: identity
servers:
  - url: https://av-identity-digital-title.api.acmevehicles.com/v1
    description: Production
  - url: https://av-identity-digital-title.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Titles
    description: Digital title management
  - name: Transfers
    description: Title transfer processing
paths:
  /titles/{vin}:
    get:
      operationId: getTitleById
      summary: Get title
      description: Get operation for title resources.
      tags:
        - Titles
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: title identifier
                    example: title-a1b2c3d4
  /titles/{vin}/transfers:
    get:
      operationId: listTransferById
      summary: List transfer
      description: List operation for transfer resources.
      tags:
        - Titles
      parameters:
        - &a1
          name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: transfer identifier
                    example: transfer-a1b2c3d4
    post:
      operationId: createTransferById
      summary: Create transfer
      description: Create operation for transfer resources.
      tags:
        - Titles
      parameters:
        - *a1
      requestBody:
        required: true
        description: Create transfer request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: transfer data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: transfer identifier
                    example: transfer-a1b2c3d4
  /titles/{vin}/transfers/{transfer_id}:
    get:
      operationId: getTransferById
      summary: Get transfer
      description: Get operation for transfer resources.
      tags:
        - Titles
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: transfer_id
          in: path
          required: true
          description: transfer id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: transfer identifier
                    example: transfer-a1b2c3d4
  /titles/{vin}/liens:
    get:
      operationId: listLienById
      summary: List lien
      description: List operation for lien resources.
      tags:
        - Titles
      parameters:
        - &a2
          name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: lien identifier
                    example: lien-a1b2c3d4
    post:
      operationId: createLienById
      summary: Create lien
      description: Create operation for lien resources.
      tags:
        - Titles
      parameters:
        - *a2
      requestBody:
        required: true
        description: Create lien request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: lien data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: lien identifier
                    example: lien-a1b2c3d4
  /titles/{vin}/liens/{lien_id}:
    get:
      operationId: getLienById
      summary: Get lien
      description: Get operation for lien resources.
      tags:
        - Titles
      parameters:
        - &a3
          name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - &a4
          name: lien_id
          in: path
          required: true
          description: lien id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: lien identifier
                    example: lien-a1b2c3d4
    delete:
      operationId: deleteLienById
      summary: Delete lien
      description: Delete operation for lien resources.
      tags:
        - Titles
      parameters:
        - *a3
        - *a4
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: lien identifier
                    example: lien-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
