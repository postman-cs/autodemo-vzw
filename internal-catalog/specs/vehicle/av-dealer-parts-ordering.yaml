openapi: 3.0.3
info:
  title: Parts Ordering API
  description: Order OEM and aftermarket parts with real-time availability, pricing, and delivery estimation. Supports
    VIN-based parts lookup, supersession chain resolution, and dealer-to-dealer parts transfer for urgent repair needs.
  version: 1.3.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-dealer-parts-ordering
  x-acme-domain: dealer
servers:
  - url: https://av-dealer-parts-ordering.api.acmevehicles.com/v1
    description: Production
  - url: https://av-dealer-parts-ordering.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Parts
    description: Parts catalog and lookup
  - name: Orders
    description: Parts order management
paths:
  /parts/search:
    post:
      operationId: searchPart
      summary: Search part
      description: Search operation for part resources.
      tags:
        - Parts
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      requestBody:
        required: true
        description: Search part request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: part data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: part identifier
                    example: part-a1b2c3d4
  /parts/{part_number}:
    get:
      operationId: getPartById
      summary: Get part
      description: Get operation for part resources.
      tags:
        - Parts
      parameters:
        - name: part_number
          in: path
          required: true
          description: part number
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: part identifier
                    example: part-a1b2c3d4
  /parts/{part_number}/compatibility:
    get:
      operationId: getCompatibilityById
      summary: Get compatibility
      description: Get operation for compatibility resources.
      tags:
        - Parts
      parameters:
        - name: part_number
          in: path
          required: true
          description: part number
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: compatibility identifier
                    example: compatibility-a1b2c3d4
  /orders:
    get:
      operationId: listOrder
      summary: List order
      description: List operation for order resources.
      tags:
        - Parts
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: order identifier
                    example: order-a1b2c3d4
    post:
      operationId: createOrder
      summary: Create order
      description: Create operation for order resources.
      tags:
        - Parts
      requestBody:
        required: true
        description: Create order request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: order data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: order identifier
                    example: order-a1b2c3d4
  /orders/{order_id}:
    get:
      operationId: getOrderById
      summary: Get order
      description: Get operation for order resources.
      tags:
        - Parts
      parameters:
        - name: order_id
          in: path
          required: true
          description: order id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: order identifier
                    example: order-a1b2c3d4
  /orders/{order_id}/tracking:
    get:
      operationId: getTrackingById
      summary: Get tracking
      description: Get operation for tracking resources.
      tags:
        - Parts
      parameters:
        - name: order_id
          in: path
          required: true
          description: order id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: tracking identifier
                    example: tracking-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
