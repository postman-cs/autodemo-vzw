openapi: 3.0.3
info:
  title: Warranty Policies API
  description: Access warranty policy definitions, coverage windows, component eligibility, and service-plan mapping for
    connected vehicle support. Supports extended warranty purchases, coverage verification, and transferable warranty
    management.
  version: 1.5.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-fleet-warranty
  x-acme-domain: fleet-ops
servers:
  - url: https://av-fleet-warranty.api.acmevehicles.com/v1
    description: Production
  - url: https://av-fleet-warranty.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Policies
    description: Warranty policy management
  - name: Claims
    description: Warranty claim processing
paths:
  /warranties:
    get:
      operationId: listWarranty
      summary: List warranty
      description: List operation for warranty resources.
      tags:
        - Policies
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: warranty identifier
                    example: warranty-a1b2c3d4
  /warranties/{warranty_id}:
    get:
      operationId: getWarrantyById
      summary: Get warranty
      description: Get operation for warranty resources.
      tags:
        - Policies
      parameters:
        - name: warranty_id
          in: path
          required: true
          description: warranty id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: warranty identifier
                    example: warranty-a1b2c3d4
  /vehicles/{vin}/warranty:
    get:
      operationId: getCoverageById
      summary: Get coverage
      description: Get operation for coverage resources.
      tags:
        - Policies
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: coverage identifier
                    example: coverage-a1b2c3d4
  /vehicles/{vin}/warranty/eligibility:
    get:
      operationId: getEligibilityById
      summary: Get eligibility
      description: Get operation for eligibility resources.
      tags:
        - Policies
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: eligibility identifier
                    example: eligibility-a1b2c3d4
  /warranties/claims:
    get:
      operationId: listClaim
      summary: List claim
      description: List operation for claim resources.
      tags:
        - Policies
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: claim identifier
                    example: claim-a1b2c3d4
    post:
      operationId: createClaim
      summary: Create claim
      description: Create operation for claim resources.
      tags:
        - Policies
      requestBody:
        required: true
        description: Create claim request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: claim data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: claim identifier
                    example: claim-a1b2c3d4
  /warranties/claims/{claim_id}:
    get:
      operationId: getClaimById
      summary: Get claim
      description: Get operation for claim resources.
      tags:
        - Policies
      parameters:
        - name: claim_id
          in: path
          required: true
          description: claim id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: claim identifier
                    example: claim-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
