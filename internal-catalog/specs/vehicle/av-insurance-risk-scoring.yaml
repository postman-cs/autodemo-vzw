openapi: 3.0.3
info:
  title: Driver Risk Scoring API
  description: Calculate driver risk scores using vehicle telematics, driving history, and environmental factors. Provides
    granular risk factor breakdowns, peer comparison percentiles, and risk trend analysis for insurance underwriting
    decisions.
  version: 1.1.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-insurance-risk-scoring
  x-acme-domain: insurance
servers:
  - url: https://av-insurance-risk-scoring.api.acmevehicles.com/v1
    description: Production
  - url: https://av-insurance-risk-scoring.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Risk
    description: Risk score calculation
paths:
  /drivers/{driver_id}/risk-score:
    get:
      operationId: getScoreById
      summary: Get score
      description: Get operation for score resources.
      tags:
        - Risk
      parameters:
        - name: driver_id
          in: path
          required: true
          description: driver id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: score identifier
                    example: score-a1b2c3d4
  /drivers/{driver_id}/risk-factors:
    get:
      operationId: listFactorById
      summary: List factor
      description: List operation for factor resources.
      tags:
        - Risk
      parameters:
        - name: driver_id
          in: path
          required: true
          description: driver id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: factor identifier
                    example: factor-a1b2c3d4
  /drivers/{driver_id}/risk-history:
    get:
      operationId: listSnapshotById
      summary: List snapshot
      description: List operation for snapshot resources.
      tags:
        - Risk
      parameters:
        - name: driver_id
          in: path
          required: true
          description: driver id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: snapshot identifier
                    example: snapshot-a1b2c3d4
  /risk/benchmarks:
    get:
      operationId: getBenchmark
      summary: Get benchmark
      description: Get operation for benchmark resources.
      tags:
        - Risk
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: benchmark identifier
                    example: benchmark-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
