openapi: 3.0.3
info:
  title: Supply Chain API
  description: Manage automotive parts supply chain including supplier onboarding, purchase orders, shipment tracking, and
    supply risk monitoring. Provides multi-tier supplier visibility, lead time forecasting, and disruption impact
    analysis.
  version: 2.0.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-mfg-supply-chain
  x-acme-domain: manufacturing
servers:
  - url: https://av-mfg-supply-chain.api.acmevehicles.com/v1
    description: Production
  - url: https://av-mfg-supply-chain.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Suppliers
    description: Supplier management
  - name: Orders
    description: Purchase order tracking
paths:
  /suppliers:
    get:
      operationId: listSupplier
      summary: List supplier
      description: List operation for supplier resources.
      tags:
        - Suppliers
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: supplier identifier
                    example: supplier-a1b2c3d4
    post:
      operationId: createSupplier
      summary: Create supplier
      description: Create operation for supplier resources.
      tags:
        - Suppliers
      requestBody:
        required: true
        description: Create supplier request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: supplier data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: supplier identifier
                    example: supplier-a1b2c3d4
  /suppliers/{supplier_id}:
    get:
      operationId: getSupplierById
      summary: Get supplier
      description: Get operation for supplier resources.
      tags:
        - Suppliers
      parameters:
        - &a1
          name: supplier_id
          in: path
          required: true
          description: supplier id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: supplier identifier
                    example: supplier-a1b2c3d4
    put:
      operationId: updateSupplierById
      summary: Update supplier
      description: Update operation for supplier resources.
      tags:
        - Suppliers
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update supplier request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: supplier data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: supplier identifier
                    example: supplier-a1b2c3d4
  /purchase-orders:
    get:
      operationId: listOrder
      summary: List order
      description: List operation for order resources.
      tags:
        - Suppliers
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: order identifier
                    example: order-a1b2c3d4
    post:
      operationId: createOrder
      summary: Create order
      description: Create operation for order resources.
      tags:
        - Suppliers
      requestBody:
        required: true
        description: Create order request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: order data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: order identifier
                    example: order-a1b2c3d4
  /purchase-orders/{order_id}:
    get:
      operationId: getOrderById
      summary: Get order
      description: Get operation for order resources.
      tags:
        - Suppliers
      parameters:
        - &a2
          name: order_id
          in: path
          required: true
          description: order id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: order identifier
                    example: order-a1b2c3d4
    put:
      operationId: updateOrderById
      summary: Update order
      description: Update operation for order resources.
      tags:
        - Suppliers
      parameters:
        - *a2
      requestBody:
        required: true
        description: Update order request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: order data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: order identifier
                    example: order-a1b2c3d4
  /shipments:
    get:
      operationId: listShipment
      summary: List shipment
      description: List operation for shipment resources.
      tags:
        - Suppliers
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: shipment identifier
                    example: shipment-a1b2c3d4
  /shipments/{shipment_id}:
    get:
      operationId: getShipmentById
      summary: Get shipment
      description: Get operation for shipment resources.
      tags:
        - Suppliers
      parameters:
        - name: shipment_id
          in: path
          required: true
          description: shipment id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: shipment identifier
                    example: shipment-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
