openapi: 3.0.3
info:
  title: Vehicle Registration API
  description: Manage vehicle registration records, VIN decoding, and title status verification. Supports multi-state
    registration, registration renewal reminders, and digital registration card generation for law enforcement
    verification.
  version: 1.3.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-identity-vehicle-registration
  x-acme-domain: identity
servers:
  - url: https://av-identity-vehicle-registration.api.acmevehicles.com/v1
    description: Production
  - url: https://av-identity-vehicle-registration.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Registration
    description: Vehicle registration management
  - name: VIN
    description: VIN decoding and lookup
paths:
  /registrations:
    get:
      operationId: listRegistration
      summary: List registration
      description: List operation for registration resources.
      tags:
        - Registration
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: registration identifier
                    example: registration-a1b2c3d4
    post:
      operationId: createRegistration
      summary: Create registration
      description: Create operation for registration resources.
      tags:
        - Registration
      requestBody:
        required: true
        description: Create registration request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: registration data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: registration identifier
                    example: registration-a1b2c3d4
  /registrations/{registration_id}:
    get:
      operationId: getRegistrationById
      summary: Get registration
      description: Get operation for registration resources.
      tags:
        - Registration
      parameters:
        - &a1
          name: registration_id
          in: path
          required: true
          description: registration id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: registration identifier
                    example: registration-a1b2c3d4
    put:
      operationId: updateRegistrationById
      summary: Update registration
      description: Update operation for registration resources.
      tags:
        - Registration
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update registration request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: registration data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: registration identifier
                    example: registration-a1b2c3d4
  /registrations/{registration_id}/renew:
    post:
      operationId: actionRegistrationById
      summary: Action registration
      description: Action operation for registration resources.
      tags:
        - Registration
      parameters:
        - name: registration_id
          in: path
          required: true
          description: registration id
          schema:
            type: string
      requestBody:
        required: true
        description: Action registration request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: registration data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: registration identifier
                    example: registration-a1b2c3d4
  /vin/{vin}/decode:
    get:
      operationId: getDecodeById
      summary: Get decode
      description: Get operation for decode resources.
      tags:
        - Registration
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: decode identifier
                    example: decode-a1b2c3d4
  /vin/{vin}/title:
    get:
      operationId: getTitleById
      summary: Get title
      description: Get operation for title resources.
      tags:
        - Registration
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: title identifier
                    example: title-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
