openapi: 3.0.3
info:
  title: Range Estimation API
  description: Calculate estimated driving range based on current battery state, weather conditions, driving patterns,
    terrain elevation, and HVAC usage. Provides confidence intervals and range anxiety alerts with route-aware
    consumption modeling.
  version: 2.0.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-ev-range-estimation
  x-acme-domain: ev-services
servers:
  - url: https://av-ev-range-estimation.api.acmevehicles.com/v1
    description: Production
  - url: https://av-ev-range-estimation.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Range
    description: Range estimation and prediction
  - name: Factors
    description: Environmental and driving factor analysis
paths:
  /vehicles/{vin}/range:
    get:
      operationId: getEstimateById
      summary: Get estimate
      description: Get operation for estimate resources.
      tags:
        - Range
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: estimate identifier
                    example: estimate-a1b2c3d4
  /vehicles/{vin}/range/factors:
    get:
      operationId: getFactorsById
      summary: Get factors
      description: Get operation for factors resources.
      tags:
        - Range
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: factors identifier
                    example: factors-a1b2c3d4
  /vehicles/{vin}/range/history:
    get:
      operationId: listSnapshotById
      summary: List snapshot
      description: List operation for snapshot resources.
      tags:
        - Range
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: snapshot identifier
                    example: snapshot-a1b2c3d4
  /range/simulate:
    post:
      operationId: createSimulation
      summary: Create simulation
      description: Create operation for simulation resources.
      tags:
        - Range
      requestBody:
        required: true
        description: Create simulation request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: simulation data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: simulation identifier
                    example: simulation-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
