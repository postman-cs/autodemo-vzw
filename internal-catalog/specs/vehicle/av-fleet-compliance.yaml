openapi: 3.0.3
info:
  title: Fleet Compliance API
  description: Manage regulatory compliance requirements including DOT inspections, emissions testing, driver
    hours-of-service tracking, and vehicle registration renewals. Provides compliance dashboards and automated violation
    alerting.
  version: 1.1.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-fleet-compliance
  x-acme-domain: fleet-ops
servers:
  - url: https://av-fleet-compliance.api.acmevehicles.com/v1
    description: Production
  - url: https://av-fleet-compliance.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Inspections
    description: Vehicle inspection management
  - name: Compliance
    description: Regulatory compliance tracking
paths:
  /inspections:
    get:
      operationId: listInspection
      summary: List inspection
      description: List operation for inspection resources.
      tags:
        - Inspections
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: inspection identifier
                    example: inspection-a1b2c3d4
    post:
      operationId: createInspection
      summary: Create inspection
      description: Create operation for inspection resources.
      tags:
        - Inspections
      requestBody:
        required: true
        description: Create inspection request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: inspection data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: inspection identifier
                    example: inspection-a1b2c3d4
  /inspections/{inspection_id}:
    get:
      operationId: getInspectionById
      summary: Get inspection
      description: Get operation for inspection resources.
      tags:
        - Inspections
      parameters:
        - &a1
          name: inspection_id
          in: path
          required: true
          description: inspection id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: inspection identifier
                    example: inspection-a1b2c3d4
    put:
      operationId: updateInspectionById
      summary: Update inspection
      description: Update operation for inspection resources.
      tags:
        - Inspections
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update inspection request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: inspection data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: inspection identifier
                    example: inspection-a1b2c3d4
  /compliance/status:
    get:
      operationId: getStatus
      summary: Get status
      description: Get operation for status resources.
      tags:
        - Inspections
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: status identifier
                    example: status-a1b2c3d4
  /compliance/violations:
    get:
      operationId: listViolation
      summary: List violation
      description: List operation for violation resources.
      tags:
        - Inspections
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: violation identifier
                    example: violation-a1b2c3d4
  /compliance/renewals:
    get:
      operationId: listRenewal
      summary: List renewal
      description: List operation for renewal resources.
      tags:
        - Inspections
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: renewal identifier
                    example: renewal-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
