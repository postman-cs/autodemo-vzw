openapi: 3.0.3
info:
  title: Vehicle Performance API
  description: Access acceleration, braking, lateral G-force, and powertrain performance metrics. Supports track-mode data
    logging, performance comparison benchmarks, and driving dynamics telemetry for enthusiast and motorsport
    applications.
  version: 1.5.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-vehicle-performance
  x-acme-domain: vehicle-data
servers:
  - url: https://av-vehicle-performance.api.acmevehicles.com/v1
    description: Production
  - url: https://av-vehicle-performance.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Performance
    description: Driving dynamics and performance data
  - name: Track Mode
    description: Track session logging
paths:
  /vehicles/{vin}/performance:
    get:
      operationId: getMetricsById
      summary: Get metrics
      description: Get operation for metrics resources.
      tags:
        - Performance
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: metrics identifier
                    example: metrics-a1b2c3d4
  /vehicles/{vin}/performance/laps:
    get:
      operationId: listLapById
      summary: List lap
      description: List operation for lap resources.
      tags:
        - Performance
      parameters:
        - &a1
          name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: lap identifier
                    example: lap-a1b2c3d4
    post:
      operationId: createLapById
      summary: Create lap
      description: Create operation for lap resources.
      tags:
        - Performance
      parameters:
        - *a1
      requestBody:
        required: true
        description: Create lap request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: lap data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: lap identifier
                    example: lap-a1b2c3d4
  /vehicles/{vin}/performance/laps/{lap_id}:
    get:
      operationId: getLapById
      summary: Get lap
      description: Get operation for lap resources.
      tags:
        - Performance
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: lap_id
          in: path
          required: true
          description: lap id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: lap identifier
                    example: lap-a1b2c3d4
  /vehicles/{vin}/performance/benchmarks:
    get:
      operationId: getBenchmarkById
      summary: Get benchmark
      description: Get operation for benchmark resources.
      tags:
        - Performance
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: benchmark identifier
                    example: benchmark-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
