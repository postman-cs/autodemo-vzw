openapi: 3.0.3
info:
  title: Owner Verification API
  description: Verify vehicle ownership through multi-factor identity verification including document upload,
    knowledge-based authentication, and biometric matching. Required for remote service activation and digital key
    provisioning.
  version: 1.1.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-identity-owner-verification
  x-acme-domain: identity
servers:
  - url: https://av-identity-owner-verification.api.acmevehicles.com/v1
    description: Production
  - url: https://av-identity-owner-verification.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Verification
    description: Owner identity verification
paths:
  /verifications:
    get:
      operationId: listVerification
      summary: List verification
      description: List operation for verification resources.
      tags:
        - Verification
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: verification identifier
                    example: verification-a1b2c3d4
    post:
      operationId: createVerification
      summary: Create verification
      description: Create operation for verification resources.
      tags:
        - Verification
      requestBody:
        required: true
        description: Create verification request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: verification data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: verification identifier
                    example: verification-a1b2c3d4
  /verifications/{verification_id}:
    get:
      operationId: getVerificationById
      summary: Get verification
      description: Get operation for verification resources.
      tags:
        - Verification
      parameters:
        - name: verification_id
          in: path
          required: true
          description: verification id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: verification identifier
                    example: verification-a1b2c3d4
  /verifications/{verification_id}/documents:
    get:
      operationId: listDocumentById
      summary: List document
      description: List operation for document resources.
      tags:
        - Verification
      parameters:
        - &a1
          name: verification_id
          in: path
          required: true
          description: verification id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: document identifier
                    example: document-a1b2c3d4
    post:
      operationId: createDocumentById
      summary: Create document
      description: Create operation for document resources.
      tags:
        - Verification
      parameters:
        - *a1
      requestBody:
        required: true
        description: Create document request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: document data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: document identifier
                    example: document-a1b2c3d4
  /verifications/{verification_id}/complete:
    post:
      operationId: actionVerificationById
      summary: Action verification
      description: Action operation for verification resources.
      tags:
        - Verification
      parameters:
        - name: verification_id
          in: path
          required: true
          description: verification id
          schema:
            type: string
      requestBody:
        required: true
        description: Action verification request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: verification data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: verification identifier
                    example: verification-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
