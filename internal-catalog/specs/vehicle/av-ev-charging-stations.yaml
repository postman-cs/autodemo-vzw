openapi: 3.0.3
info:
  title: Charging Station Discovery API
  description: Discover EV charging stations, check real-time availability, retrieve pricing and session details for
    connected vehicle charging experiences. Supports CCS, CHAdeMO, and Type 2 connectors with geographic radius search
    and route-based corridor queries.
  version: 3.1.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-ev-charging-stations
  x-acme-domain: ev-services
servers:
  - url: https://av-ev-charging-stations.api.acmevehicles.com/v1
    description: Production
  - url: https://av-ev-charging-stations.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Stations
    description: Search and retrieve charging station details
  - name: Availability
    description: Real-time connector availability and status
paths:
  /stations:
    get:
      operationId: listStation
      summary: List station
      description: List operation for station resources.
      tags:
        - Stations
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: station identifier
                    example: station-a1b2c3d4
    post:
      operationId: createStation
      summary: Create station
      description: Create operation for station resources.
      tags:
        - Stations
      requestBody:
        required: true
        description: Create station request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: station data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: station identifier
                    example: station-a1b2c3d4
  /stations/{station_id}:
    get:
      operationId: getStationById
      summary: Get station
      description: Get operation for station resources.
      tags:
        - Stations
      parameters:
        - &a1
          name: station_id
          in: path
          required: true
          description: station id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: station identifier
                    example: station-a1b2c3d4
    put:
      operationId: updateStationById
      summary: Update station
      description: Update operation for station resources.
      tags:
        - Stations
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update station request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: station data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: station identifier
                    example: station-a1b2c3d4
  /stations/nearby:
    post:
      operationId: searchStation
      summary: Search station
      description: Search operation for station resources.
      tags:
        - Stations
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      requestBody:
        required: true
        description: Search station request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: station data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: station identifier
                    example: station-a1b2c3d4
  /stations/{station_id}/connectors:
    get:
      operationId: listConnectorById
      summary: List connector
      description: List operation for connector resources.
      tags:
        - Stations
      parameters:
        - name: station_id
          in: path
          required: true
          description: station id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: connector identifier
                    example: connector-a1b2c3d4
  /stations/{station_id}/availability:
    get:
      operationId: getAvailabilityById
      summary: Get availability
      description: Get operation for availability resources.
      tags:
        - Stations
      parameters:
        - name: station_id
          in: path
          required: true
          description: station id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: availability identifier
                    example: availability-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
