openapi: 3.0.3
info:
  title: Emergency Contact API
  description: Manage emergency contact lists for automatic notification during crash events and SOS activations. Supports
    contact prioritization, notification channel preferences, and medical information storage for first responder
    access.
  version: 1.0.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-safety-emergency-contacts
  x-acme-domain: safety
servers:
  - url: https://av-safety-emergency-contacts.api.acmevehicles.com/v1
    description: Production
  - url: https://av-safety-emergency-contacts.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Contacts
    description: Emergency contact management
paths:
  /contacts:
    get:
      operationId: listContact
      summary: List contact
      description: List operation for contact resources.
      tags:
        - Contacts
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: contact identifier
                    example: contact-a1b2c3d4
    post:
      operationId: createContact
      summary: Create contact
      description: Create operation for contact resources.
      tags:
        - Contacts
      requestBody:
        required: true
        description: Create contact request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: contact data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: contact identifier
                    example: contact-a1b2c3d4
  /contacts/{contact_id}:
    get:
      operationId: getContactById
      summary: Get contact
      description: Get operation for contact resources.
      tags:
        - Contacts
      parameters:
        - &a1
          name: contact_id
          in: path
          required: true
          description: contact id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: contact identifier
                    example: contact-a1b2c3d4
    put:
      operationId: updateContactById
      summary: Update contact
      description: Update operation for contact resources.
      tags:
        - Contacts
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update contact request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: contact data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: contact identifier
                    example: contact-a1b2c3d4
    delete:
      operationId: deleteContactById
      summary: Delete contact
      description: Delete operation for contact resources.
      tags:
        - Contacts
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: contact identifier
                    example: contact-a1b2c3d4
  /contacts/verify:
    post:
      operationId: actionContact
      summary: Action contact
      description: Action operation for contact resources.
      tags:
        - Contacts
      requestBody:
        required: true
        description: Action contact request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: contact data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: contact identifier
                    example: contact-a1b2c3d4
  /medical-info:
    get:
      operationId: getMedicalInfo
      summary: Get medical info
      description: Get operation for medical info resources.
      tags:
        - Contacts
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: medical_info identifier
                    example: medical_info-a1b2c3d4
    put:
      operationId: updateMedicalInfo
      summary: Update medical info
      description: Update operation for medical info resources.
      tags:
        - Contacts
      requestBody:
        required: true
        description: Update medical_info request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: medical_info data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: medical_info identifier
                    example: medical_info-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
