openapi: 3.0.3
info:
  title: Vehicle Location API
  description: Query current vehicle GPS position, heading, speed, and altitude. Supports geofence zone management with
    entry/exit event notifications, location history trails, and parking location memory for connected vehicle
    experiences.
  version: 2.3.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-vehicle-location
  x-acme-domain: vehicle-data
servers:
  - url: https://av-vehicle-location.api.acmevehicles.com/v1
    description: Production
  - url: https://av-vehicle-location.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Location
    description: GPS position and tracking
  - name: Geofences
    description: Geofence zone management
paths:
  /vehicles/{vin}/location:
    get:
      operationId: getLocationById
      summary: Get location
      description: Get operation for location resources.
      tags:
        - Location
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: location identifier
                    example: location-a1b2c3d4
  /vehicles/{vin}/location/history:
    get:
      operationId: listPositionById
      summary: List position
      description: List operation for position resources.
      tags:
        - Location
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: position identifier
                    example: position-a1b2c3d4
  /vehicles/{vin}/location/parking:
    get:
      operationId: getParkingById
      summary: Get parking
      description: Get operation for parking resources.
      tags:
        - Location
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: parking identifier
                    example: parking-a1b2c3d4
  /geofences:
    get:
      operationId: listGeofence
      summary: List geofence
      description: List operation for geofence resources.
      tags:
        - Location
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: geofence identifier
                    example: geofence-a1b2c3d4
    post:
      operationId: createGeofence
      summary: Create geofence
      description: Create operation for geofence resources.
      tags:
        - Location
      requestBody:
        required: true
        description: Create geofence request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: geofence data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: geofence identifier
                    example: geofence-a1b2c3d4
  /geofences/{geofence_id}:
    get:
      operationId: getGeofenceById
      summary: Get geofence
      description: Get operation for geofence resources.
      tags:
        - Location
      parameters:
        - &a1
          name: geofence_id
          in: path
          required: true
          description: geofence id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: geofence identifier
                    example: geofence-a1b2c3d4
    put:
      operationId: updateGeofenceById
      summary: Update geofence
      description: Update operation for geofence resources.
      tags:
        - Location
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update geofence request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: geofence data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: geofence identifier
                    example: geofence-a1b2c3d4
    delete:
      operationId: deleteGeofenceById
      summary: Delete geofence
      description: Delete operation for geofence resources.
      tags:
        - Location
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: geofence identifier
                    example: geofence-a1b2c3d4
  /geofences/{geofence_id}/events:
    get:
      operationId: listEventById
      summary: List event
      description: List operation for event resources.
      tags:
        - Location
      parameters:
        - name: geofence_id
          in: path
          required: true
          description: geofence id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: event identifier
                    example: event-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
