openapi: 3.0.3
info:
  title: Vehicle Climate Control API
  description: Remote HVAC control including cabin pre-conditioning, seat heating/cooling, steering wheel heating, and
    defrost activation. Supports scheduled climate presets, temperature zone management, and air quality monitoring with
    cabin filtration status.
  version: 1.4.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-vehicle-climate
  x-acme-domain: vehicle-data
servers:
  - url: https://av-vehicle-climate.api.acmevehicles.com/v1
    description: Production
  - url: https://av-vehicle-climate.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Climate
    description: HVAC and cabin climate control
  - name: Presets
    description: Climate schedule presets
paths:
  /vehicles/{vin}/climate:
    get:
      operationId: getClimateById
      summary: Get climate
      description: Get operation for climate resources.
      tags:
        - Climate
      parameters:
        - &a1
          name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: climate identifier
                    example: climate-a1b2c3d4
    put:
      operationId: updateClimateById
      summary: Update climate
      description: Update operation for climate resources.
      tags:
        - Climate
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update climate request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: climate data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: climate identifier
                    example: climate-a1b2c3d4
  /vehicles/{vin}/climate/presets:
    get:
      operationId: listPresetById
      summary: List preset
      description: List operation for preset resources.
      tags:
        - Climate
      parameters:
        - &a2
          name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: preset identifier
                    example: preset-a1b2c3d4
    post:
      operationId: createPresetById
      summary: Create preset
      description: Create operation for preset resources.
      tags:
        - Climate
      parameters:
        - *a2
      requestBody:
        required: true
        description: Create preset request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: preset data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: preset identifier
                    example: preset-a1b2c3d4
  /vehicles/{vin}/climate/presets/{preset_id}:
    get:
      operationId: getPresetById
      summary: Get preset
      description: Get operation for preset resources.
      tags:
        - Climate
      parameters:
        - &a3
          name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - &a4
          name: preset_id
          in: path
          required: true
          description: preset id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: preset identifier
                    example: preset-a1b2c3d4
    put:
      operationId: updatePresetById
      summary: Update preset
      description: Update operation for preset resources.
      tags:
        - Climate
      parameters:
        - *a3
        - *a4
      requestBody:
        required: true
        description: Update preset request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: preset data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: preset identifier
                    example: preset-a1b2c3d4
    delete:
      operationId: deletePresetById
      summary: Delete preset
      description: Delete operation for preset resources.
      tags:
        - Climate
      parameters:
        - *a3
        - *a4
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: preset identifier
                    example: preset-a1b2c3d4
  /vehicles/{vin}/climate/air-quality:
    get:
      operationId: getAirQualityById
      summary: Get air quality
      description: Get operation for air quality resources.
      tags:
        - Climate
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: air_quality identifier
                    example: air_quality-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
