openapi: 3.0.3
info:
  title: Charging Payments API
  description: Manage Plug & Charge payment methods, tokenized billing profiles, and automated settlement for charging
    sessions. Supports ISO 15118 Plug & Charge protocol, fleet billing accounts, and split-payment configurations.
  version: 2.1.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-ev-charging-payments
  x-acme-domain: ev-services
servers:
  - url: https://av-ev-charging-payments.api.acmevehicles.com/v1
    description: Production
  - url: https://av-ev-charging-payments.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Payment Methods
    description: Manage payment instruments for charging
  - name: Billing
    description: Invoicing and settlement
paths:
  /payment-methods:
    get:
      operationId: listPaymentMethod
      summary: List payment method
      description: List operation for payment method resources.
      tags:
        - Payment Methods
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: payment_method identifier
                    example: payment_method-a1b2c3d4
    post:
      operationId: createPaymentMethod
      summary: Create payment method
      description: Create operation for payment method resources.
      tags:
        - Payment Methods
      requestBody:
        required: true
        description: Create payment_method request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: payment_method data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: payment_method identifier
                    example: payment_method-a1b2c3d4
  /payment-methods/{method_id}:
    get:
      operationId: getPaymentMethodById
      summary: Get payment method
      description: Get operation for payment method resources.
      tags:
        - Payment Methods
      parameters:
        - &a1
          name: method_id
          in: path
          required: true
          description: method id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: payment_method identifier
                    example: payment_method-a1b2c3d4
    put:
      operationId: updatePaymentMethodById
      summary: Update payment method
      description: Update operation for payment method resources.
      tags:
        - Payment Methods
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update payment_method request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: payment_method data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: payment_method identifier
                    example: payment_method-a1b2c3d4
    delete:
      operationId: deletePaymentMethodById
      summary: Delete payment method
      description: Delete operation for payment method resources.
      tags:
        - Payment Methods
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: payment_method identifier
                    example: payment_method-a1b2c3d4
  /invoices:
    get:
      operationId: listInvoice
      summary: List invoice
      description: List operation for invoice resources.
      tags:
        - Payment Methods
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: invoice identifier
                    example: invoice-a1b2c3d4
  /invoices/{invoice_id}:
    get:
      operationId: getInvoiceById
      summary: Get invoice
      description: Get operation for invoice resources.
      tags:
        - Payment Methods
      parameters:
        - name: invoice_id
          in: path
          required: true
          description: invoice id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: invoice identifier
                    example: invoice-a1b2c3d4
  /settlements:
    get:
      operationId: listSettlement
      summary: List settlement
      description: List operation for settlement resources.
      tags:
        - Payment Methods
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: settlement identifier
                    example: settlement-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
