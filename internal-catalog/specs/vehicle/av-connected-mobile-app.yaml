openapi: 3.0.3
info:
  title: Mobile App Backend API
  description: Backend services for the connected vehicle mobile application including user preferences, vehicle pairing,
    dashboard widget configuration, and feature entitlement management based on subscription tier and vehicle
    capabilities.
  version: 2.1.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-connected-mobile-app
  x-acme-domain: connected-services
servers:
  - url: https://av-connected-mobile-app.api.acmevehicles.com/v1
    description: Production
  - url: https://av-connected-mobile-app.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Preferences
    description: User preferences and settings
  - name: Pairing
    description: Vehicle-device pairing
paths:
  /users/me/preferences:
    get:
      operationId: getPreferences
      summary: Get preferences
      description: Get operation for preferences resources.
      tags:
        - Preferences
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: preferences identifier
                    example: preferences-a1b2c3d4
    put:
      operationId: updatePreferences
      summary: Update preferences
      description: Update operation for preferences resources.
      tags:
        - Preferences
      requestBody:
        required: true
        description: Update preferences request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: preferences data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: preferences identifier
                    example: preferences-a1b2c3d4
  /users/me/vehicles:
    get:
      operationId: listVehicle
      summary: List vehicle
      description: List operation for vehicle resources.
      tags:
        - Preferences
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: vehicle identifier
                    example: vehicle-a1b2c3d4
    post:
      operationId: createVehicle
      summary: Create vehicle
      description: Create operation for vehicle resources.
      tags:
        - Preferences
      requestBody:
        required: true
        description: Create vehicle request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: vehicle data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: vehicle identifier
                    example: vehicle-a1b2c3d4
  /users/me/vehicles/{vin}:
    get:
      operationId: getVehicleById
      summary: Get vehicle
      description: Get operation for vehicle resources.
      tags:
        - Preferences
      parameters:
        - &a1
          name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: vehicle identifier
                    example: vehicle-a1b2c3d4
    delete:
      operationId: deleteVehicleById
      summary: Delete vehicle
      description: Delete operation for vehicle resources.
      tags:
        - Preferences
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: vehicle identifier
                    example: vehicle-a1b2c3d4
  /users/me/widgets:
    get:
      operationId: listWidget
      summary: List widget
      description: List operation for widget resources.
      tags:
        - Preferences
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: widget identifier
                    example: widget-a1b2c3d4
    put:
      operationId: updateWidget
      summary: Update widget
      description: Update operation for widget resources.
      tags:
        - Preferences
      requestBody:
        required: true
        description: Update widget request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: widget data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: widget identifier
                    example: widget-a1b2c3d4
  /entitlements:
    get:
      operationId: getEntitlements
      summary: Get entitlements
      description: Get operation for entitlements resources.
      tags:
        - Preferences
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: entitlements identifier
                    example: entitlements-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
