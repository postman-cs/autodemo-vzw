openapi: 3.0.3
info:
  title: Usage-Based Insurance API
  description: Provide driving behavior data for usage-based insurance (UBI) programs including mileage, time-of-day, road
    type, and driving score metrics. Supports pay-per-mile and pay-how-you-drive insurance models with
    privacy-preserving data sharing.
  version: 1.6.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-insurance-ubi
  x-acme-domain: insurance
servers:
  - url: https://av-insurance-ubi.api.acmevehicles.com/v1
    description: Production
  - url: https://av-insurance-ubi.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: UBI
    description: Usage-based insurance data
  - name: Scoring
    description: Insurance risk scoring
paths:
  /policies/{policy_id}/ubi-data:
    get:
      operationId: getDataById
      summary: Get data
      description: Get operation for data resources.
      tags:
        - UBI
      parameters:
        - name: policy_id
          in: path
          required: true
          description: policy id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: data identifier
                    example: data-a1b2c3d4
  /policies/{policy_id}/ubi-score:
    get:
      operationId: getScoreById
      summary: Get score
      description: Get operation for score resources.
      tags:
        - UBI
      parameters:
        - name: policy_id
          in: path
          required: true
          description: policy id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: score identifier
                    example: score-a1b2c3d4
  /policies/{policy_id}/mileage:
    get:
      operationId: getMileageById
      summary: Get mileage
      description: Get operation for mileage resources.
      tags:
        - UBI
      parameters:
        - name: policy_id
          in: path
          required: true
          description: policy id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: mileage identifier
                    example: mileage-a1b2c3d4
  /policies/{policy_id}/trips:
    get:
      operationId: listTripById
      summary: List trip
      description: List operation for trip resources.
      tags:
        - UBI
      parameters:
        - name: policy_id
          in: path
          required: true
          description: policy id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: trip identifier
                    example: trip-a1b2c3d4
  /consent:
    get:
      operationId: getConsent
      summary: Get consent
      description: Get operation for consent resources.
      tags:
        - UBI
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: consent identifier
                    example: consent-a1b2c3d4
    put:
      operationId: updateConsent
      summary: Update consent
      description: Update operation for consent resources.
      tags:
        - UBI
      requestBody:
        required: true
        description: Update consent request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: consent data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: consent identifier
                    example: consent-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
