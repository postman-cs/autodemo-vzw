openapi: 3.0.3
info:
  title: End-of-Line Testing API
  description: Manage end-of-line vehicle testing including dynamic tests, water leak tests, electrical system
    verification, and ADAS sensor calibration. Tracks test results, pass/fail rates, and retest scheduling for
    manufacturing quality assurance.
  version: 1.2.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-mfg-testing
  x-acme-domain: manufacturing
servers:
  - url: https://av-mfg-testing.api.acmevehicles.com/v1
    description: Production
  - url: https://av-mfg-testing.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Tests
    description: Vehicle test execution and results
paths:
  /tests:
    get:
      operationId: listTest
      summary: List test
      description: List operation for test resources.
      tags:
        - Tests
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: test identifier
                    example: test-a1b2c3d4
    post:
      operationId: createTest
      summary: Create test
      description: Create operation for test resources.
      tags:
        - Tests
      requestBody:
        required: true
        description: Create test request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: test data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: test identifier
                    example: test-a1b2c3d4
  /tests/{test_id}:
    get:
      operationId: getTestById
      summary: Get test
      description: Get operation for test resources.
      tags:
        - Tests
      parameters:
        - &a1
          name: test_id
          in: path
          required: true
          description: test id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: test identifier
                    example: test-a1b2c3d4
    put:
      operationId: updateTestById
      summary: Update test
      description: Update operation for test resources.
      tags:
        - Tests
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update test request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: test data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: test identifier
                    example: test-a1b2c3d4
  /tests/{test_id}/results:
    get:
      operationId: getResultsById
      summary: Get results
      description: Get operation for results resources.
      tags:
        - Tests
      parameters:
        - name: test_id
          in: path
          required: true
          description: test id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: results identifier
                    example: results-a1b2c3d4
  /test-plans:
    get:
      operationId: listPlan
      summary: List plan
      description: List operation for plan resources.
      tags:
        - Tests
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: plan identifier
                    example: plan-a1b2c3d4
  /test-plans/{plan_id}:
    get:
      operationId: getPlanById
      summary: Get plan
      description: Get operation for plan resources.
      tags:
        - Tests
      parameters:
        - name: plan_id
          in: path
          required: true
          description: plan id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: plan identifier
                    example: plan-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
