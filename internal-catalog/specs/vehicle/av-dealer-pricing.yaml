openapi: 3.0.3
info:
  title: Vehicle Pricing API
  description: Retrieve MSRP, dealer invoice, incentive programs, and customer-facing pricing for vehicle models. Supports
    configuration-based pricing, regional incentive stacking, and competitive price comparison for sales tool
    integration.
  version: 1.8.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-dealer-pricing
  x-acme-domain: dealer
servers:
  - url: https://av-dealer-pricing.api.acmevehicles.com/v1
    description: Production
  - url: https://av-dealer-pricing.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Pricing
    description: Vehicle price calculation
  - name: Incentives
    description: Incentive and rebate programs
paths:
  /models/{model_id}/pricing:
    get:
      operationId: getPricingById
      summary: Get pricing
      description: Get operation for pricing resources.
      tags:
        - Pricing
      parameters:
        - name: model_id
          in: path
          required: true
          description: model id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: pricing identifier
                    example: pricing-a1b2c3d4
  /models/{model_id}/configure:
    post:
      operationId: createConfigurationById
      summary: Create configuration
      description: Create operation for configuration resources.
      tags:
        - Pricing
      parameters:
        - name: model_id
          in: path
          required: true
          description: model id
          schema:
            type: string
      requestBody:
        required: true
        description: Create configuration request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: configuration data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: configuration identifier
                    example: configuration-a1b2c3d4
  /incentives:
    get:
      operationId: listIncentive
      summary: List incentive
      description: List operation for incentive resources.
      tags:
        - Pricing
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: incentive identifier
                    example: incentive-a1b2c3d4
  /incentives/{incentive_id}:
    get:
      operationId: getIncentiveById
      summary: Get incentive
      description: Get operation for incentive resources.
      tags:
        - Pricing
      parameters:
        - name: incentive_id
          in: path
          required: true
          description: incentive id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: incentive identifier
                    example: incentive-a1b2c3d4
  /incentives/eligibility:
    post:
      operationId: createEligibility
      summary: Create eligibility
      description: Create operation for eligibility resources.
      tags:
        - Pricing
      requestBody:
        required: true
        description: Create eligibility request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: eligibility data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: eligibility identifier
                    example: eligibility-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
