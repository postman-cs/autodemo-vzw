openapi: 3.0.3
info:
  title: Insurance Telematics API
  description: Share vehicle telematics data with insurance partners through standardized APIs. Provides configurable data
    sharing scopes, driver consent management, and aggregated risk metrics for actuarial analysis and premium
    calculation.
  version: 1.3.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-insurance-telematics
  x-acme-domain: insurance
servers:
  - url: https://av-insurance-telematics.api.acmevehicles.com/v1
    description: Production
  - url: https://av-insurance-telematics.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Data Sharing
    description: Telematics data sharing
  - name: Consent
    description: Driver consent management
paths:
  /data-shares:
    get:
      operationId: listShare
      summary: List share
      description: List operation for share resources.
      tags:
        - Data Sharing
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: share identifier
                    example: share-a1b2c3d4
    post:
      operationId: createShare
      summary: Create share
      description: Create operation for share resources.
      tags:
        - Data Sharing
      requestBody:
        required: true
        description: Create share request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: share data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: share identifier
                    example: share-a1b2c3d4
  /data-shares/{share_id}:
    get:
      operationId: getShareById
      summary: Get share
      description: Get operation for share resources.
      tags:
        - Data Sharing
      parameters:
        - &a1
          name: share_id
          in: path
          required: true
          description: share id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: share identifier
                    example: share-a1b2c3d4
    put:
      operationId: updateShareById
      summary: Update share
      description: Update operation for share resources.
      tags:
        - Data Sharing
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update share request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: share data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: share identifier
                    example: share-a1b2c3d4
  /data-shares/{share_id}/revoke:
    post:
      operationId: actionShareById
      summary: Action share
      description: Action operation for share resources.
      tags:
        - Data Sharing
      parameters:
        - name: share_id
          in: path
          required: true
          description: share id
          schema:
            type: string
      requestBody:
        required: true
        description: Action share request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: share data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: share identifier
                    example: share-a1b2c3d4
  /risk-metrics/{vin}:
    get:
      operationId: getMetricsById
      summary: Get metrics
      description: Get operation for metrics resources.
      tags:
        - Data Sharing
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: metrics identifier
                    example: metrics-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
