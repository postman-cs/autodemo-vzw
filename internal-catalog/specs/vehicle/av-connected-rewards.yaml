openapi: 3.0.3
info:
  title: Connected Rewards API
  description: Manage loyalty rewards points, accrual events, redemption offers, and activity history for connected
    vehicle programs. Supports tier-based benefits, partner reward exchange, referral bonuses, and gamified driving
    challenges.
  version: 1.2.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-connected-rewards
  x-acme-domain: connected-services
servers:
  - url: https://av-connected-rewards.api.acmevehicles.com/v1
    description: Production
  - url: https://av-connected-rewards.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Points
    description: Rewards points and accruals
  - name: Offers
    description: Redemption offers and catalog
paths:
  /rewards/balance:
    get:
      operationId: getBalance
      summary: Get balance
      description: Get operation for balance resources.
      tags:
        - Points
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: balance identifier
                    example: balance-a1b2c3d4
  /rewards/transactions:
    get:
      operationId: listTransaction
      summary: List transaction
      description: List operation for transaction resources.
      tags:
        - Points
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: transaction identifier
                    example: transaction-a1b2c3d4
  /rewards/offers:
    get:
      operationId: listOffer
      summary: List offer
      description: List operation for offer resources.
      tags:
        - Points
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: offer identifier
                    example: offer-a1b2c3d4
  /rewards/offers/{offer_id}/redeem:
    post:
      operationId: actionOfferById
      summary: Action offer
      description: Action operation for offer resources.
      tags:
        - Points
      parameters:
        - name: offer_id
          in: path
          required: true
          description: offer id
          schema:
            type: string
      requestBody:
        required: true
        description: Action offer request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: offer data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: offer identifier
                    example: offer-a1b2c3d4
  /rewards/challenges:
    get:
      operationId: listChallenge
      summary: List challenge
      description: List operation for challenge resources.
      tags:
        - Points
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: challenge identifier
                    example: challenge-a1b2c3d4
  /rewards/challenges/{challenge_id}:
    get:
      operationId: getChallengeById
      summary: Get challenge
      description: Get operation for challenge resources.
      tags:
        - Points
      parameters:
        - name: challenge_id
          in: path
          required: true
          description: challenge id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: challenge identifier
                    example: challenge-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
