openapi: 3.0.3
info:
  title: Remote Operations API
  description: Enable remote human operator assistance for autonomous vehicles encountering edge cases. Supports video
    streaming from vehicle cameras, remote driving takeover, waypoint guidance, and incident escalation workflows.
  version: 1.2.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-autonomous-remote-ops
  x-acme-domain: autonomous
servers:
  - url: https://av-autonomous-remote-ops.api.acmevehicles.com/v1
    description: Production
  - url: https://av-autonomous-remote-ops.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Sessions
    description: Remote operation sessions
  - name: Controls
    description: Remote vehicle controls
paths:
  /sessions:
    get:
      operationId: listSession
      summary: List session
      description: List operation for session resources.
      tags:
        - Sessions
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: session identifier
                    example: session-a1b2c3d4
    post:
      operationId: createSession
      summary: Create session
      description: Create operation for session resources.
      tags:
        - Sessions
      requestBody:
        required: true
        description: Create session request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: session data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: session identifier
                    example: session-a1b2c3d4
  /sessions/{session_id}:
    get:
      operationId: getSessionById
      summary: Get session
      description: Get operation for session resources.
      tags:
        - Sessions
      parameters:
        - name: session_id
          in: path
          required: true
          description: session id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: session identifier
                    example: session-a1b2c3d4
  /sessions/{session_id}/video:
    get:
      operationId: getStreamById
      summary: Get stream
      description: Get operation for stream resources.
      tags:
        - Sessions
      parameters:
        - name: session_id
          in: path
          required: true
          description: session id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: stream identifier
                    example: stream-a1b2c3d4
  /sessions/{session_id}/commands:
    post:
      operationId: createCommandById
      summary: Create command
      description: Create operation for command resources.
      tags:
        - Sessions
      parameters:
        - name: session_id
          in: path
          required: true
          description: session id
          schema:
            type: string
      requestBody:
        required: true
        description: Create command request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: command data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: command identifier
                    example: command-a1b2c3d4
  /sessions/{session_id}/end:
    post:
      operationId: actionSessionById
      summary: Action session
      description: Action operation for session resources.
      tags:
        - Sessions
      parameters:
        - name: session_id
          in: path
          required: true
          description: session id
          schema:
            type: string
      requestBody:
        required: true
        description: Action session request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: session data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: session identifier
                    example: session-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
