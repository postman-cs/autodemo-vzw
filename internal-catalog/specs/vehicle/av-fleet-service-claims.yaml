openapi: 3.0.3
info:
  title: Service Claims API
  description: Create and track service claims, diagnostics evidence, dealer action records, and claim adjudication
    outcomes. Supports photo upload for damage documentation, automated parts pricing, and third-party repair network
    integration.
  version: 1.3.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-fleet-service-claims
  x-acme-domain: fleet-ops
servers:
  - url: https://av-fleet-service-claims.api.acmevehicles.com/v1
    description: Production
  - url: https://av-fleet-service-claims.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Claims
    description: Service claim lifecycle management
  - name: Evidence
    description: Diagnostic evidence and documentation
paths:
  /claims:
    get:
      operationId: listClaim
      summary: List claim
      description: List operation for claim resources.
      tags:
        - Claims
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: claim identifier
                    example: claim-a1b2c3d4
    post:
      operationId: createClaim
      summary: Create claim
      description: Create operation for claim resources.
      tags:
        - Claims
      requestBody:
        required: true
        description: Create claim request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: claim data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: claim identifier
                    example: claim-a1b2c3d4
  /claims/{claim_id}:
    get:
      operationId: getClaimById
      summary: Get claim
      description: Get operation for claim resources.
      tags:
        - Claims
      parameters:
        - &a1
          name: claim_id
          in: path
          required: true
          description: claim id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: claim identifier
                    example: claim-a1b2c3d4
    put:
      operationId: updateClaimById
      summary: Update claim
      description: Update operation for claim resources.
      tags:
        - Claims
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update claim request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: claim data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: claim identifier
                    example: claim-a1b2c3d4
  /claims/{claim_id}/evidence:
    get:
      operationId: listEvidenceById
      summary: List evidence
      description: List operation for evidence resources.
      tags:
        - Claims
      parameters:
        - &a2
          name: claim_id
          in: path
          required: true
          description: claim id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: evidence identifier
                    example: evidence-a1b2c3d4
    post:
      operationId: createEvidenceById
      summary: Create evidence
      description: Create operation for evidence resources.
      tags:
        - Claims
      parameters:
        - *a2
      requestBody:
        required: true
        description: Create evidence request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: evidence data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: evidence identifier
                    example: evidence-a1b2c3d4
  /claims/{claim_id}/adjudicate:
    post:
      operationId: actionClaimById
      summary: Action claim
      description: Action operation for claim resources.
      tags:
        - Claims
      parameters:
        - name: claim_id
          in: path
          required: true
          description: claim id
          schema:
            type: string
      requestBody:
        required: true
        description: Action claim request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: claim data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: claim identifier
                    example: claim-a1b2c3d4
  /claims/{claim_id}/payments:
    get:
      operationId: listPaymentById
      summary: List payment
      description: List operation for payment resources.
      tags:
        - Claims
      parameters:
        - name: claim_id
          in: path
          required: true
          description: claim id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: payment identifier
                    example: payment-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
