openapi: 3.0.3
info:
  title: Accident Report API
  description: File digital accident reports with vehicle telemetry data, photos, witness information, and police report
    integration. Supports structured data capture for FNOL acceleration and automated fault determination assistance.
  version: 1.0.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-insurance-accident-reports
  x-acme-domain: insurance
servers:
  - url: https://av-insurance-accident-reports.api.acmevehicles.com/v1
    description: Production
  - url: https://av-insurance-accident-reports.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Reports
    description: Accident report filing
paths:
  /reports:
    get:
      operationId: listReport
      summary: List report
      description: List operation for report resources.
      tags:
        - Reports
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: report identifier
                    example: report-a1b2c3d4
    post:
      operationId: createReport
      summary: Create report
      description: Create operation for report resources.
      tags:
        - Reports
      requestBody:
        required: true
        description: Create report request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: report data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: report identifier
                    example: report-a1b2c3d4
  /reports/{report_id}:
    get:
      operationId: getReportById
      summary: Get report
      description: Get operation for report resources.
      tags:
        - Reports
      parameters:
        - &a1
          name: report_id
          in: path
          required: true
          description: report id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: report identifier
                    example: report-a1b2c3d4
    put:
      operationId: updateReportById
      summary: Update report
      description: Update operation for report resources.
      tags:
        - Reports
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update report request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: report data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: report identifier
                    example: report-a1b2c3d4
  /reports/{report_id}/photos:
    get:
      operationId: listPhotoById
      summary: List photo
      description: List operation for photo resources.
      tags:
        - Reports
      parameters:
        - &a2
          name: report_id
          in: path
          required: true
          description: report id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: photo identifier
                    example: photo-a1b2c3d4
    post:
      operationId: createPhotoById
      summary: Create photo
      description: Create operation for photo resources.
      tags:
        - Reports
      parameters:
        - *a2
      requestBody:
        required: true
        description: Create photo request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: photo data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: photo identifier
                    example: photo-a1b2c3d4
  /reports/{report_id}/witnesses:
    get:
      operationId: listWitnessById
      summary: List witness
      description: List operation for witness resources.
      tags:
        - Reports
      parameters:
        - &a3
          name: report_id
          in: path
          required: true
          description: report id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: witness identifier
                    example: witness-a1b2c3d4
    post:
      operationId: createWitnessById
      summary: Create witness
      description: Create operation for witness resources.
      tags:
        - Reports
      parameters:
        - *a3
      requestBody:
        required: true
        description: Create witness request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: witness data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: witness identifier
                    example: witness-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
