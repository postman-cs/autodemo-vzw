openapi: 3.0.3
info:
  title: Fleet Fuel Cards API
  description: Manage fleet fuel card programs including card issuance, spending limits, transaction monitoring, and
    expense reconciliation. Supports fuel-only restrictions, geographic usage policies, and integration with fleet
    accounting systems.
  version: 1.2.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-fleet-fuel-cards
  x-acme-domain: fleet-ops
servers:
  - url: https://av-fleet-fuel-cards.api.acmevehicles.com/v1
    description: Production
  - url: https://av-fleet-fuel-cards.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Cards
    description: Fuel card management
  - name: Transactions
    description: Fuel card transaction monitoring
paths:
  /fuel-cards:
    get:
      operationId: listCard
      summary: List card
      description: List operation for card resources.
      tags:
        - Cards
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: card identifier
                    example: card-a1b2c3d4
    post:
      operationId: createCard
      summary: Create card
      description: Create operation for card resources.
      tags:
        - Cards
      requestBody:
        required: true
        description: Create card request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: card data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: card identifier
                    example: card-a1b2c3d4
  /fuel-cards/{card_id}:
    get:
      operationId: getCardById
      summary: Get card
      description: Get operation for card resources.
      tags:
        - Cards
      parameters:
        - &a1
          name: card_id
          in: path
          required: true
          description: card id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: card identifier
                    example: card-a1b2c3d4
    put:
      operationId: updateCardById
      summary: Update card
      description: Update operation for card resources.
      tags:
        - Cards
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update card request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: card data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: card identifier
                    example: card-a1b2c3d4
  /fuel-cards/{card_id}/transactions:
    get:
      operationId: listTransactionById
      summary: List transaction
      description: List operation for transaction resources.
      tags:
        - Cards
      parameters:
        - name: card_id
          in: path
          required: true
          description: card id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: transaction identifier
                    example: transaction-a1b2c3d4
  /fuel-cards/{card_id}/limits:
    get:
      operationId: getLimitsById
      summary: Get limits
      description: Get operation for limits resources.
      tags:
        - Cards
      parameters:
        - &a2
          name: card_id
          in: path
          required: true
          description: card id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: limits identifier
                    example: limits-a1b2c3d4
    put:
      operationId: updateLimitsById
      summary: Update limits
      description: Update operation for limits resources.
      tags:
        - Cards
      parameters:
        - *a2
      requestBody:
        required: true
        description: Update limits request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: limits data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: limits identifier
                    example: limits-a1b2c3d4
  /fuel-cards/{card_id}/suspend:
    post:
      operationId: actionCardById
      summary: Action card
      description: Action operation for card resources.
      tags:
        - Cards
      parameters:
        - name: card_id
          in: path
          required: true
          description: card id
          schema:
            type: string
      requestBody:
        required: true
        description: Action card request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: card data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: card identifier
                    example: card-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
