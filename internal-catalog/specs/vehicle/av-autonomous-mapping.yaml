openapi: 3.0.3
info:
  title: HD Mapping API
  description: Access high-definition maps with lane-level precision, road surface condition data, and dynamic traffic
    object overlays. Supports map tile streaming, crowd-sourced map update contributions, and offline map package
    management.
  version: 2.0.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-autonomous-mapping
  x-acme-domain: autonomous
servers:
  - url: https://av-autonomous-mapping.api.acmevehicles.com/v1
    description: Production
  - url: https://av-autonomous-mapping.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Maps
    description: HD map tile access
  - name: Updates
    description: Map data contributions and updates
paths:
  /maps/tiles:
    get:
      operationId: listTile
      summary: List tile
      description: List operation for tile resources.
      tags:
        - Maps
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: tile identifier
                    example: tile-a1b2c3d4
  /maps/tiles/{tile_id}:
    get:
      operationId: getTileById
      summary: Get tile
      description: Get operation for tile resources.
      tags:
        - Maps
      parameters:
        - name: tile_id
          in: path
          required: true
          description: tile id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: tile identifier
                    example: tile-a1b2c3d4
  /maps/routes/{route_id}/layers:
    get:
      operationId: listLayerById
      summary: List layer
      description: List operation for layer resources.
      tags:
        - Maps
      parameters:
        - name: route_id
          in: path
          required: true
          description: route id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: layer identifier
                    example: layer-a1b2c3d4
  /maps/contributions:
    get:
      operationId: listContribution
      summary: List contribution
      description: List operation for contribution resources.
      tags:
        - Maps
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: contribution identifier
                    example: contribution-a1b2c3d4
    post:
      operationId: createContribution
      summary: Create contribution
      description: Create operation for contribution resources.
      tags:
        - Maps
      requestBody:
        required: true
        description: Create contribution request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: contribution data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: contribution identifier
                    example: contribution-a1b2c3d4
  /maps/packages:
    get:
      operationId: listPackage
      summary: List package
      description: List operation for package resources.
      tags:
        - Maps
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: package identifier
                    example: package-a1b2c3d4
  /maps/packages/{package_id}:
    get:
      operationId: getPackageById
      summary: Get package
      description: Get operation for package resources.
      tags:
        - Maps
      parameters:
        - name: package_id
          in: path
          required: true
          description: package id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: package identifier
                    example: package-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
