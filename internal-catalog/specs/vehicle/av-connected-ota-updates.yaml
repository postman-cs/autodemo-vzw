openapi: 3.0.3
info:
  title: Over-the-Air Updates API
  description: Manage vehicle software update campaigns, firmware distribution, rollout scheduling, and update
    installation tracking. Supports delta updates, A/B partition switching, rollback capabilities, and compliance with
    UNECE R156 regulations.
  version: 2.5.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-connected-ota-updates
  x-acme-domain: connected-services
servers:
  - url: https://av-connected-ota-updates.api.acmevehicles.com/v1
    description: Production
  - url: https://av-connected-ota-updates.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Campaigns
    description: OTA update campaign management
  - name: Vehicles
    description: Per-vehicle update status
paths:
  /campaigns:
    get:
      operationId: listCampaign
      summary: List campaign
      description: List operation for campaign resources.
      tags:
        - Campaigns
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: campaign identifier
                    example: campaign-a1b2c3d4
    post:
      operationId: createCampaign
      summary: Create campaign
      description: Create operation for campaign resources.
      tags:
        - Campaigns
      requestBody:
        required: true
        description: Create campaign request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: campaign data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: campaign identifier
                    example: campaign-a1b2c3d4
  /campaigns/{campaign_id}:
    get:
      operationId: getCampaignById
      summary: Get campaign
      description: Get operation for campaign resources.
      tags:
        - Campaigns
      parameters:
        - &a1
          name: campaign_id
          in: path
          required: true
          description: campaign id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: campaign identifier
                    example: campaign-a1b2c3d4
    put:
      operationId: updateCampaignById
      summary: Update campaign
      description: Update operation for campaign resources.
      tags:
        - Campaigns
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update campaign request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: campaign data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: campaign identifier
                    example: campaign-a1b2c3d4
  /campaigns/{campaign_id}/rollout:
    get:
      operationId: getRolloutById
      summary: Get rollout
      description: Get operation for rollout resources.
      tags:
        - Campaigns
      parameters:
        - &a2
          name: campaign_id
          in: path
          required: true
          description: campaign id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rollout identifier
                    example: rollout-a1b2c3d4
    put:
      operationId: updateRolloutById
      summary: Update rollout
      description: Update operation for rollout resources.
      tags:
        - Campaigns
      parameters:
        - *a2
      requestBody:
        required: true
        description: Update rollout request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: rollout data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rollout identifier
                    example: rollout-a1b2c3d4
  /vehicles/{vin}/updates:
    get:
      operationId: listUpdateById
      summary: List update
      description: List operation for update resources.
      tags:
        - Campaigns
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: update identifier
                    example: update-a1b2c3d4
  /vehicles/{vin}/updates/{update_id}:
    get:
      operationId: getUpdateById
      summary: Get update
      description: Get operation for update resources.
      tags:
        - Campaigns
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: update_id
          in: path
          required: true
          description: update id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: update identifier
                    example: update-a1b2c3d4
  /vehicles/{vin}/updates/{update_id}/install:
    post:
      operationId: actionUpdateById
      summary: Action update
      description: Action operation for update resources.
      tags:
        - Campaigns
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: update_id
          in: path
          required: true
          description: update id
          schema:
            type: string
      requestBody:
        required: true
        description: Action update request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: update data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: update identifier
                    example: update-a1b2c3d4
  /vehicles/{vin}/software:
    get:
      operationId: getSoftwareManifestById
      summary: Get software manifest
      description: Get operation for software manifest resources.
      tags:
        - Campaigns
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: software_manifest identifier
                    example: software_manifest-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
