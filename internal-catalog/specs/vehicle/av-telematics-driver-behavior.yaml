openapi: 3.0.3
info:
  title: Driver Behavior API
  description: Analyze driving patterns to produce composite driver scores covering safety, efficiency, and eco-driving
    metrics. Detects harsh events, phone distraction, fatigue indicators, and provides coaching recommendations for
    behavior improvement.
  version: 1.9.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-telematics-driver-behavior
  x-acme-domain: telematics
servers:
  - url: https://av-telematics-driver-behavior.api.acmevehicles.com/v1
    description: Production
  - url: https://av-telematics-driver-behavior.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Scores
    description: Driver behavior scoring
  - name: Events
    description: Driving event detection
paths:
  /drivers/{driver_id}/score:
    get:
      operationId: getScoreById
      summary: Get score
      description: Get operation for score resources.
      tags:
        - Scores
      parameters:
        - name: driver_id
          in: path
          required: true
          description: driver id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: score identifier
                    example: score-a1b2c3d4
  /drivers/{driver_id}/events:
    get:
      operationId: listEventById
      summary: List event
      description: List operation for event resources.
      tags:
        - Scores
      parameters:
        - name: driver_id
          in: path
          required: true
          description: driver id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: event identifier
                    example: event-a1b2c3d4
  /drivers/{driver_id}/trends:
    get:
      operationId: getTrendById
      summary: Get trend
      description: Get operation for trend resources.
      tags:
        - Scores
      parameters:
        - name: driver_id
          in: path
          required: true
          description: driver id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: trend identifier
                    example: trend-a1b2c3d4
  /drivers/{driver_id}/coaching:
    get:
      operationId: listTipById
      summary: List tip
      description: List operation for tip resources.
      tags:
        - Scores
      parameters:
        - name: driver_id
          in: path
          required: true
          description: driver id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: tip identifier
                    example: tip-a1b2c3d4
  /leaderboard:
    get:
      operationId: getLeaderboard
      summary: Get leaderboard
      description: Get operation for leaderboard resources.
      tags:
        - Scores
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: leaderboard identifier
                    example: leaderboard-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
