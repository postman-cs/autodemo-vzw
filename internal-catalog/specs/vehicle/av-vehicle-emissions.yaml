openapi: 3.0.3
info:
  title: Vehicle Emissions API
  description: Track vehicle CO2 and NOx emissions with compliance reporting for regulatory standards. Provides carbon
    footprint calculations, emissions offset tracking, and fleet-level sustainability dashboards aligned with WLTP and
    EPA test cycles.
  version: 1.0.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-vehicle-emissions
  x-acme-domain: vehicle-data
servers:
  - url: https://av-vehicle-emissions.api.acmevehicles.com/v1
    description: Production
  - url: https://av-vehicle-emissions.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Emissions
    description: Emissions tracking and reporting
paths:
  /vehicles/{vin}/emissions:
    get:
      operationId: getEmissionsById
      summary: Get emissions
      description: Get operation for emissions resources.
      tags:
        - Emissions
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: emissions identifier
                    example: emissions-a1b2c3d4
  /vehicles/{vin}/emissions/history:
    get:
      operationId: listReadingById
      summary: List reading
      description: List operation for reading resources.
      tags:
        - Emissions
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: reading identifier
                    example: reading-a1b2c3d4
  /vehicles/{vin}/emissions/offsets:
    get:
      operationId: listOffsetById
      summary: List offset
      description: List operation for offset resources.
      tags:
        - Emissions
      parameters:
        - &a1
          name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: offset identifier
                    example: offset-a1b2c3d4
    post:
      operationId: createOffsetById
      summary: Create offset
      description: Create operation for offset resources.
      tags:
        - Emissions
      parameters:
        - *a1
      requestBody:
        required: true
        description: Create offset request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: offset data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: offset identifier
                    example: offset-a1b2c3d4
  /fleet/emissions/report:
    post:
      operationId: createReport
      summary: Create report
      description: Create operation for report resources.
      tags:
        - Emissions
      requestBody:
        required: true
        description: Create report request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: report data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: report identifier
                    example: report-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
