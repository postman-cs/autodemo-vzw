openapi: 3.0.3
info:
  title: Idle Time Monitoring API
  description: Monitor vehicle idle time duration, frequency, and fuel waste. Provides configurable idle thresholds,
    real-time idle alerts, and aggregate idle time reporting for fleet efficiency optimization and emissions reduction
    programs.
  version: 1.0.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-telematics-idling
  x-acme-domain: telematics
servers:
  - url: https://av-telematics-idling.api.acmevehicles.com/v1
    description: Production
  - url: https://av-telematics-idling.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Idling
    description: Idle time detection and reporting
paths:
  /vehicles/{vin}/idling:
    get:
      operationId: getSummaryById
      summary: Get summary
      description: Get operation for summary resources.
      tags:
        - Idling
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: summary identifier
                    example: summary-a1b2c3d4
  /vehicles/{vin}/idling/events:
    get:
      operationId: listEventById
      summary: List event
      description: List operation for event resources.
      tags:
        - Idling
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: event identifier
                    example: event-a1b2c3d4
  /idling/policies:
    get:
      operationId: listPolicy
      summary: List policy
      description: List operation for policy resources.
      tags:
        - Idling
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: policy identifier
                    example: policy-a1b2c3d4
    post:
      operationId: createPolicy
      summary: Create policy
      description: Create operation for policy resources.
      tags:
        - Idling
      requestBody:
        required: true
        description: Create policy request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: policy data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: policy identifier
                    example: policy-a1b2c3d4
  /idling/policies/{policy_id}:
    get:
      operationId: getPolicyById
      summary: Get policy
      description: Get operation for policy resources.
      tags:
        - Idling
      parameters:
        - &a1
          name: policy_id
          in: path
          required: true
          description: policy id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: policy identifier
                    example: policy-a1b2c3d4
    put:
      operationId: updatePolicyById
      summary: Update policy
      description: Update operation for policy resources.
      tags:
        - Idling
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update policy request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: policy data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: policy identifier
                    example: policy-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
