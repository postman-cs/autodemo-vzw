openapi: 3.0.3
info:
  title: Simulation API
  description: Run autonomous driving simulations with configurable scenarios, weather conditions, and traffic
    participants. Supports scenario generation from real-world driving logs, regression testing suites, and safety
    metric extraction.
  version: 1.5.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-autonomous-simulation
  x-acme-domain: autonomous
servers:
  - url: https://av-autonomous-simulation.api.acmevehicles.com/v1
    description: Production
  - url: https://av-autonomous-simulation.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Simulations
    description: Simulation run management
  - name: Scenarios
    description: Test scenario management
paths:
  /simulations:
    get:
      operationId: listSimulation
      summary: List simulation
      description: List operation for simulation resources.
      tags:
        - Simulations
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: simulation identifier
                    example: simulation-a1b2c3d4
    post:
      operationId: createSimulation
      summary: Create simulation
      description: Create operation for simulation resources.
      tags:
        - Simulations
      requestBody:
        required: true
        description: Create simulation request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: simulation data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: simulation identifier
                    example: simulation-a1b2c3d4
  /simulations/{sim_id}:
    get:
      operationId: getSimulationById
      summary: Get simulation
      description: Get operation for simulation resources.
      tags:
        - Simulations
      parameters:
        - name: sim_id
          in: path
          required: true
          description: sim id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: simulation identifier
                    example: simulation-a1b2c3d4
  /simulations/{sim_id}/results:
    get:
      operationId: getResultsById
      summary: Get results
      description: Get operation for results resources.
      tags:
        - Simulations
      parameters:
        - name: sim_id
          in: path
          required: true
          description: sim id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: results identifier
                    example: results-a1b2c3d4
  /simulations/{sim_id}/metrics:
    get:
      operationId: getMetricsById
      summary: Get metrics
      description: Get operation for metrics resources.
      tags:
        - Simulations
      parameters:
        - name: sim_id
          in: path
          required: true
          description: sim id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: metrics identifier
                    example: metrics-a1b2c3d4
  /scenarios:
    get:
      operationId: listScenario
      summary: List scenario
      description: List operation for scenario resources.
      tags:
        - Simulations
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: scenario identifier
                    example: scenario-a1b2c3d4
    post:
      operationId: createScenario
      summary: Create scenario
      description: Create operation for scenario resources.
      tags:
        - Simulations
      requestBody:
        required: true
        description: Create scenario request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: scenario data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: scenario identifier
                    example: scenario-a1b2c3d4
  /scenarios/{scenario_id}:
    get:
      operationId: getScenarioById
      summary: Get scenario
      description: Get operation for scenario resources.
      tags:
        - Simulations
      parameters:
        - &a1
          name: scenario_id
          in: path
          required: true
          description: scenario id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: scenario identifier
                    example: scenario-a1b2c3d4
    put:
      operationId: updateScenarioById
      summary: Update scenario
      description: Update operation for scenario resources.
      tags:
        - Simulations
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update scenario request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: scenario data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: scenario identifier
                    example: scenario-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
