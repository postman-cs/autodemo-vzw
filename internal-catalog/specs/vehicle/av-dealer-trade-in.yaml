openapi: 3.0.3
info:
  title: Trade-In Valuation API
  description: Generate instant trade-in valuations based on VIN decode, mileage, condition assessment, and market data.
    Supports photo-based condition AI assessment, KBB/Black Book integration, and guaranteed price offers with
    expiration windows.
  version: 1.1.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-dealer-trade-in
  x-acme-domain: dealer
servers:
  - url: https://av-dealer-trade-in.api.acmevehicles.com/v1
    description: Production
  - url: https://av-dealer-trade-in.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Valuations
    description: Trade-in value estimation
paths:
  /valuations:
    get:
      operationId: listValuation
      summary: List valuation
      description: List operation for valuation resources.
      tags:
        - Valuations
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: valuation identifier
                    example: valuation-a1b2c3d4
    post:
      operationId: createValuation
      summary: Create valuation
      description: Create operation for valuation resources.
      tags:
        - Valuations
      requestBody:
        required: true
        description: Create valuation request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: valuation data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: valuation identifier
                    example: valuation-a1b2c3d4
  /valuations/{valuation_id}:
    get:
      operationId: getValuationById
      summary: Get valuation
      description: Get operation for valuation resources.
      tags:
        - Valuations
      parameters:
        - name: valuation_id
          in: path
          required: true
          description: valuation id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: valuation identifier
                    example: valuation-a1b2c3d4
  /valuations/{valuation_id}/offer:
    post:
      operationId: createOfferById
      summary: Create offer
      description: Create operation for offer resources.
      tags:
        - Valuations
      parameters:
        - name: valuation_id
          in: path
          required: true
          description: valuation id
          schema:
            type: string
      requestBody:
        required: true
        description: Create offer request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: offer data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: offer identifier
                    example: offer-a1b2c3d4
  /valuations/{valuation_id}/photos:
    get:
      operationId: listPhotoById
      summary: List photo
      description: List operation for photo resources.
      tags:
        - Valuations
      parameters:
        - &a1
          name: valuation_id
          in: path
          required: true
          description: valuation id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: photo identifier
                    example: photo-a1b2c3d4
    post:
      operationId: createPhotoById
      summary: Create photo
      description: Create operation for photo resources.
      tags:
        - Valuations
      parameters:
        - *a1
      requestBody:
        required: true
        description: Create photo request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: photo data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: photo identifier
                    example: photo-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
