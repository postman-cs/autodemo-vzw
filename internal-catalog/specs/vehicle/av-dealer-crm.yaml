openapi: 3.0.3
info:
  title: Dealer CRM API
  description: Customer relationship management for automotive dealerships including lead tracking, customer profiles,
    communication history, and sales pipeline management. Supports multi-channel lead capture and automated follow-up
    workflows.
  version: 1.5.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-dealer-crm
  x-acme-domain: dealer
servers:
  - url: https://av-dealer-crm.api.acmevehicles.com/v1
    description: Production
  - url: https://av-dealer-crm.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Leads
    description: Sales lead management
  - name: Customers
    description: Customer profile management
paths:
  /leads:
    get:
      operationId: listLead
      summary: List lead
      description: List operation for lead resources.
      tags:
        - Leads
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: lead identifier
                    example: lead-a1b2c3d4
    post:
      operationId: createLead
      summary: Create lead
      description: Create operation for lead resources.
      tags:
        - Leads
      requestBody:
        required: true
        description: Create lead request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: lead data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: lead identifier
                    example: lead-a1b2c3d4
  /leads/{lead_id}:
    get:
      operationId: getLeadById
      summary: Get lead
      description: Get operation for lead resources.
      tags:
        - Leads
      parameters:
        - &a1
          name: lead_id
          in: path
          required: true
          description: lead id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: lead identifier
                    example: lead-a1b2c3d4
    put:
      operationId: updateLeadById
      summary: Update lead
      description: Update operation for lead resources.
      tags:
        - Leads
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update lead request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: lead data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: lead identifier
                    example: lead-a1b2c3d4
  /leads/{lead_id}/activities:
    get:
      operationId: listActivityById
      summary: List activity
      description: List operation for activity resources.
      tags:
        - Leads
      parameters:
        - &a2
          name: lead_id
          in: path
          required: true
          description: lead id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: activity identifier
                    example: activity-a1b2c3d4
    post:
      operationId: createActivityById
      summary: Create activity
      description: Create operation for activity resources.
      tags:
        - Leads
      parameters:
        - *a2
      requestBody:
        required: true
        description: Create activity request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: activity data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: activity identifier
                    example: activity-a1b2c3d4
  /customers:
    get:
      operationId: listCustomer
      summary: List customer
      description: List operation for customer resources.
      tags:
        - Leads
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: customer identifier
                    example: customer-a1b2c3d4
  /customers/{customer_id}:
    get:
      operationId: getCustomerById
      summary: Get customer
      description: Get operation for customer resources.
      tags:
        - Leads
      parameters:
        - &a3
          name: customer_id
          in: path
          required: true
          description: customer id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: customer identifier
                    example: customer-a1b2c3d4
    put:
      operationId: updateCustomerById
      summary: Update customer
      description: Update operation for customer resources.
      tags:
        - Leads
      parameters:
        - *a3
      requestBody:
        required: true
        description: Update customer request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: customer data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: customer identifier
                    example: customer-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
