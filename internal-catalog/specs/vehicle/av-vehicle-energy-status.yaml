openapi: 3.0.3
info:
  title: Vehicle Energy Status API
  description: Retrieve current battery state-of-charge, estimated range, battery capacity, and vehicle location for trip
    planning decisions. Provides both instant readings and time-series trend data for energy consumption pattern
    analysis.
  version: 2.0.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-vehicle-energy-status
  x-acme-domain: vehicle-data
servers:
  - url: https://av-vehicle-energy-status.api.acmevehicles.com/v1
    description: Production
  - url: https://av-vehicle-energy-status.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Energy
    description: Battery and energy status readings
paths:
  /vehicles/{vin}/energy:
    get:
      operationId: getEnergyStatusById
      summary: Get energy status
      description: Get operation for energy status resources.
      tags:
        - Energy
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: energy_status identifier
                    example: energy_status-a1b2c3d4
  /vehicles/{vin}/energy/trends:
    get:
      operationId: listTrendById
      summary: List trend
      description: List operation for trend resources.
      tags:
        - Energy
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: trend identifier
                    example: trend-a1b2c3d4
  /vehicles/{vin}/energy/consumption:
    get:
      operationId: getConsumptionById
      summary: Get consumption
      description: Get operation for consumption resources.
      tags:
        - Energy
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: consumption identifier
                    example: consumption-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
