openapi: 3.0.3
info:
  title: Driver Assistance API
  description: Configure ADAS feature settings including adaptive cruise control, lane centering, automatic emergency
    braking, and parking assist. Provides feature availability by vehicle model, calibration status, and driver
    preference profiles.
  version: 1.8.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-safety-driver-assist
  x-acme-domain: safety
servers:
  - url: https://av-safety-driver-assist.api.acmevehicles.com/v1
    description: Production
  - url: https://av-safety-driver-assist.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: ADAS
    description: ADAS feature configuration
  - name: Calibration
    description: Sensor calibration status
paths:
  /vehicles/{vin}/adas/features:
    get:
      operationId: listFeatureById
      summary: List feature
      description: List operation for feature resources.
      tags:
        - ADAS
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: feature identifier
                    example: feature-a1b2c3d4
  /vehicles/{vin}/adas/features/{feature_id}:
    get:
      operationId: getFeatureById
      summary: Get feature
      description: Get operation for feature resources.
      tags:
        - ADAS
      parameters:
        - &a1
          name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - &a2
          name: feature_id
          in: path
          required: true
          description: feature id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: feature identifier
                    example: feature-a1b2c3d4
    put:
      operationId: updateFeatureById
      summary: Update feature
      description: Update operation for feature resources.
      tags:
        - ADAS
      parameters:
        - *a1
        - *a2
      requestBody:
        required: true
        description: Update feature request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: feature data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: feature identifier
                    example: feature-a1b2c3d4
  /vehicles/{vin}/adas/calibration:
    get:
      operationId: getCalibrationById
      summary: Get calibration
      description: Get operation for calibration resources.
      tags:
        - ADAS
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: calibration identifier
                    example: calibration-a1b2c3d4
  /vehicles/{vin}/adas/profiles:
    get:
      operationId: listProfileById
      summary: List profile
      description: List operation for profile resources.
      tags:
        - ADAS
      parameters:
        - &a3
          name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: profile identifier
                    example: profile-a1b2c3d4
    post:
      operationId: createProfileById
      summary: Create profile
      description: Create operation for profile resources.
      tags:
        - ADAS
      parameters:
        - *a3
      requestBody:
        required: true
        description: Create profile request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: profile data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: profile identifier
                    example: profile-a1b2c3d4
  /vehicles/{vin}/adas/profiles/{profile_id}:
    get:
      operationId: getProfileById
      summary: Get profile
      description: Get operation for profile resources.
      tags:
        - ADAS
      parameters:
        - &a4
          name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - &a5
          name: profile_id
          in: path
          required: true
          description: profile id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: profile identifier
                    example: profile-a1b2c3d4
    put:
      operationId: updateProfileById
      summary: Update profile
      description: Update operation for profile resources.
      tags:
        - ADAS
      parameters:
        - *a4
        - *a5
      requestBody:
        required: true
        description: Update profile request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: profile data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: profile identifier
                    example: profile-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
