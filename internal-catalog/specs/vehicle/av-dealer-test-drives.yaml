openapi: 3.0.3
info:
  title: Test Drive Scheduling API
  description: Schedule and manage test drive appointments with vehicle availability matching. Supports solo and
    accompanied test drives, route suggestions, digital liability waiver signing, and post-drive feedback collection.
  version: 1.0.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-dealer-test-drives
  x-acme-domain: dealer
servers:
  - url: https://av-dealer-test-drives.api.acmevehicles.com/v1
    description: Production
  - url: https://av-dealer-test-drives.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Test Drives
    description: Test drive scheduling and management
paths:
  /test-drives:
    get:
      operationId: listTestDrive
      summary: List test drive
      description: List operation for test drive resources.
      tags:
        - Test Drives
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: test_drive identifier
                    example: test_drive-a1b2c3d4
    post:
      operationId: createTestDrive
      summary: Create test drive
      description: Create operation for test drive resources.
      tags:
        - Test Drives
      requestBody:
        required: true
        description: Create test_drive request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: test_drive data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: test_drive identifier
                    example: test_drive-a1b2c3d4
  /test-drives/{drive_id}:
    get:
      operationId: getTestDriveById
      summary: Get test drive
      description: Get operation for test drive resources.
      tags:
        - Test Drives
      parameters:
        - &a1
          name: drive_id
          in: path
          required: true
          description: drive id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: test_drive identifier
                    example: test_drive-a1b2c3d4
    put:
      operationId: updateTestDriveById
      summary: Update test drive
      description: Update operation for test drive resources.
      tags:
        - Test Drives
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update test_drive request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: test_drive data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: test_drive identifier
                    example: test_drive-a1b2c3d4
  /test-drives/{drive_id}/waiver:
    get:
      operationId: getWaiverById
      summary: Get waiver
      description: Get operation for waiver resources.
      tags:
        - Test Drives
      parameters:
        - &a2
          name: drive_id
          in: path
          required: true
          description: drive id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: waiver identifier
                    example: waiver-a1b2c3d4
    post:
      operationId: createWaiverById
      summary: Create waiver
      description: Create operation for waiver resources.
      tags:
        - Test Drives
      parameters:
        - *a2
      requestBody:
        required: true
        description: Create waiver request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: waiver data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: waiver identifier
                    example: waiver-a1b2c3d4
  /test-drives/{drive_id}/feedback:
    post:
      operationId: createFeedbackById
      summary: Create feedback
      description: Create operation for feedback resources.
      tags:
        - Test Drives
      parameters:
        - name: drive_id
          in: path
          required: true
          description: drive id
          schema:
            type: string
      requestBody:
        required: true
        description: Create feedback request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: feedback data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: feedback identifier
                    example: feedback-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
