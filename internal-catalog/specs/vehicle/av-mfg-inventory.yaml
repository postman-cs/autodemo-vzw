openapi: 3.0.3
info:
  title: Parts Inventory API
  description: Manage parts inventory across manufacturing plants and warehouses. Provides real-time stock levels, reorder
    point alerting, cycle count scheduling, and cross-plant transfer coordination for just-in-time manufacturing.
  version: 1.5.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-mfg-inventory
  x-acme-domain: manufacturing
servers:
  - url: https://av-mfg-inventory.api.acmevehicles.com/v1
    description: Production
  - url: https://av-mfg-inventory.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Inventory
    description: Parts stock management
  - name: Transfers
    description: Cross-plant inventory transfers
paths:
  /inventory:
    get:
      operationId: listItem
      summary: List item
      description: List operation for item resources.
      tags:
        - Inventory
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: item identifier
                    example: item-a1b2c3d4
  /inventory/{part_number}:
    get:
      operationId: getItemById
      summary: Get item
      description: Get operation for item resources.
      tags:
        - Inventory
      parameters:
        - &a1
          name: part_number
          in: path
          required: true
          description: part number
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: item identifier
                    example: item-a1b2c3d4
    put:
      operationId: updateItemById
      summary: Update item
      description: Update operation for item resources.
      tags:
        - Inventory
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update item request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: item data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: item identifier
                    example: item-a1b2c3d4
  /inventory/{part_number}/transactions:
    get:
      operationId: listTransactionById
      summary: List transaction
      description: List operation for transaction resources.
      tags:
        - Inventory
      parameters:
        - name: part_number
          in: path
          required: true
          description: part number
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: transaction identifier
                    example: transaction-a1b2c3d4
  /transfers:
    get:
      operationId: listTransfer
      summary: List transfer
      description: List operation for transfer resources.
      tags:
        - Inventory
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: transfer identifier
                    example: transfer-a1b2c3d4
    post:
      operationId: createTransfer
      summary: Create transfer
      description: Create operation for transfer resources.
      tags:
        - Inventory
      requestBody:
        required: true
        description: Create transfer request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: transfer data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: transfer identifier
                    example: transfer-a1b2c3d4
  /transfers/{transfer_id}:
    get:
      operationId: getTransferById
      summary: Get transfer
      description: Get operation for transfer resources.
      tags:
        - Inventory
      parameters:
        - name: transfer_id
          in: path
          required: true
          description: transfer id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: transfer identifier
                    example: transfer-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
