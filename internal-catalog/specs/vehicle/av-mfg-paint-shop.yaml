openapi: 3.0.3
info:
  title: Paint Shop API
  description: Manage paint shop processes including color batch tracking, booth environment monitoring, and finish
    quality inspection. Supports color-match verification, environmental compliance monitoring, and paint waste
    reduction analytics.
  version: 1.0.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-mfg-paint-shop
  x-acme-domain: manufacturing
servers:
  - url: https://av-mfg-paint-shop.api.acmevehicles.com/v1
    description: Production
  - url: https://av-mfg-paint-shop.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Batches
    description: Paint batch management
  - name: Quality
    description: Paint finish quality control
paths:
  /batches:
    get:
      operationId: listBatch
      summary: List batch
      description: List operation for batch resources.
      tags:
        - Batches
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: batch identifier
                    example: batch-a1b2c3d4
    post:
      operationId: createBatch
      summary: Create batch
      description: Create operation for batch resources.
      tags:
        - Batches
      requestBody:
        required: true
        description: Create batch request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: batch data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: batch identifier
                    example: batch-a1b2c3d4
  /batches/{batch_id}:
    get:
      operationId: getBatchById
      summary: Get batch
      description: Get operation for batch resources.
      tags:
        - Batches
      parameters:
        - name: batch_id
          in: path
          required: true
          description: batch id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: batch identifier
                    example: batch-a1b2c3d4
  /booths:
    get:
      operationId: listBooth
      summary: List booth
      description: List operation for booth resources.
      tags:
        - Batches
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: booth identifier
                    example: booth-a1b2c3d4
  /booths/{booth_id}/environment:
    get:
      operationId: getEnvironmentById
      summary: Get environment
      description: Get operation for environment resources.
      tags:
        - Batches
      parameters:
        - name: booth_id
          in: path
          required: true
          description: booth id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: environment identifier
                    example: environment-a1b2c3d4
  /quality-checks:
    get:
      operationId: listCheck
      summary: List check
      description: List operation for check resources.
      tags:
        - Batches
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: check identifier
                    example: check-a1b2c3d4
    post:
      operationId: createCheck
      summary: Create check
      description: Create operation for check resources.
      tags:
        - Batches
      requestBody:
        required: true
        description: Create check request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: check data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: check identifier
                    example: check-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
