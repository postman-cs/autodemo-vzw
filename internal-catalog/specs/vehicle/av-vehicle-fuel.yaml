openapi: 3.0.3
info:
  title: Vehicle Fuel Management API
  description: Monitor fuel level, consumption rate, and efficiency metrics for ICE and hybrid vehicles. Provides fuel
    economy trend analysis, refueling event detection, and cost-per-mile calculations with local fuel price integration.
  version: 1.3.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-vehicle-fuel
  x-acme-domain: vehicle-data
servers:
  - url: https://av-vehicle-fuel.api.acmevehicles.com/v1
    description: Production
  - url: https://av-vehicle-fuel.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Fuel
    description: Fuel level and consumption data
  - name: Economy
    description: Fuel efficiency analytics
paths:
  /vehicles/{vin}/fuel:
    get:
      operationId: getFuelStatusById
      summary: Get fuel status
      description: Get operation for fuel status resources.
      tags:
        - Fuel
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: fuel_status identifier
                    example: fuel_status-a1b2c3d4
  /vehicles/{vin}/fuel/consumption:
    get:
      operationId: getConsumptionById
      summary: Get consumption
      description: Get operation for consumption resources.
      tags:
        - Fuel
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: consumption identifier
                    example: consumption-a1b2c3d4
  /vehicles/{vin}/fuel/history:
    get:
      operationId: listReadingById
      summary: List reading
      description: List operation for reading resources.
      tags:
        - Fuel
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: reading identifier
                    example: reading-a1b2c3d4
  /vehicles/{vin}/fuel/economy:
    get:
      operationId: getEconomyById
      summary: Get economy
      description: Get operation for economy resources.
      tags:
        - Fuel
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: economy identifier
                    example: economy-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
