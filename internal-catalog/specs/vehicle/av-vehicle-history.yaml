openapi: 3.0.3
info:
  title: Vehicle History Report API
  description: Comprehensive vehicle history reports including ownership records, accident history, title status, service
    records, and odometer verification. Provides NMVTIS integration and CarFax-style vehicle condition scoring for
    pre-purchase inspections.
  version: 1.0.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-vehicle-history
  x-acme-domain: vehicle-data
servers:
  - url: https://av-vehicle-history.api.acmevehicles.com/v1
    description: Production
  - url: https://av-vehicle-history.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: History
    description: Vehicle history and ownership records
  - name: Reports
    description: Vehicle history report generation
paths:
  /vehicles/{vin}/history:
    get:
      operationId: getHistoryById
      summary: Get history
      description: Get operation for history resources.
      tags:
        - History
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: history identifier
                    example: history-a1b2c3d4
  /vehicles/{vin}/history/owners:
    get:
      operationId: listOwnerById
      summary: List owner
      description: List operation for owner resources.
      tags:
        - History
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: owner identifier
                    example: owner-a1b2c3d4
  /vehicles/{vin}/history/accidents:
    get:
      operationId: listAccidentById
      summary: List accident
      description: List operation for accident resources.
      tags:
        - History
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: accident identifier
                    example: accident-a1b2c3d4
  /vehicles/{vin}/history/service:
    get:
      operationId: listServiceRecordById
      summary: List service record
      description: List operation for service record resources.
      tags:
        - History
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: service_record identifier
                    example: service_record-a1b2c3d4
  /reports:
    post:
      operationId: createReport
      summary: Create report
      description: Create operation for report resources.
      tags:
        - History
      requestBody:
        required: true
        description: Create report request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: report data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: report identifier
                    example: report-a1b2c3d4
  /reports/{report_id}:
    get:
      operationId: getReportById
      summary: Get report
      description: Get operation for report resources.
      tags:
        - History
      parameters:
        - name: report_id
          in: path
          required: true
          description: report id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: report identifier
                    example: report-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
