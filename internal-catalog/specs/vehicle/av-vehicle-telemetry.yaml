openapi: 3.0.3
info:
  title: Vehicle Telemetry API
  description: Stream and query real-time vehicle telemetry data including speed, acceleration, steering angle, brake
    pressure, and powertrain metrics. Supports WebSocket streaming, batch historical queries, and configurable sampling
    rates for connected vehicle applications.
  version: 3.2.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-vehicle-telemetry
  x-acme-domain: vehicle-data
servers:
  - url: https://av-vehicle-telemetry.api.acmevehicles.com/v1
    description: Production
  - url: https://av-vehicle-telemetry.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Telemetry
    description: Real-time and historical telemetry data
  - name: Streams
    description: WebSocket telemetry streaming
paths:
  /vehicles/{vin}/telemetry:
    get:
      operationId: getTelemetryById
      summary: Get telemetry
      description: Get operation for telemetry resources.
      tags:
        - Telemetry
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: telemetry identifier
                    example: telemetry-a1b2c3d4
  /vehicles/{vin}/telemetry/history:
    get:
      operationId: listSnapshotById
      summary: List snapshot
      description: List operation for snapshot resources.
      tags:
        - Telemetry
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: snapshot identifier
                    example: snapshot-a1b2c3d4
  /vehicles/{vin}/telemetry/stream:
    post:
      operationId: createStreamById
      summary: Create stream
      description: Create operation for stream resources.
      tags:
        - Telemetry
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      requestBody:
        required: true
        description: Create stream request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: stream data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: stream identifier
                    example: stream-a1b2c3d4
  /vehicles/{vin}/telemetry/config:
    get:
      operationId: getConfigById
      summary: Get config
      description: Get operation for config resources.
      tags:
        - Telemetry
      parameters:
        - &a1
          name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: config identifier
                    example: config-a1b2c3d4
    put:
      operationId: updateConfigById
      summary: Update config
      description: Update operation for config resources.
      tags:
        - Telemetry
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update config request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: config data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: config identifier
                    example: config-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
