openapi: 3.0.3
info:
  title: Digital Key API
  description: Manage CCC Digital Key sharing for NFC and UWB vehicle access. Supports temporary key creation with
    time-based and geo-restricted permissions, key revocation, and audit trails for shared vehicle access management.
  version: 2.0.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-connected-digital-key
  x-acme-domain: connected-services
servers:
  - url: https://av-connected-digital-key.api.acmevehicles.com/v1
    description: Production
  - url: https://av-connected-digital-key.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Keys
    description: Digital key lifecycle management
  - name: Sharing
    description: Key sharing and permissions
paths:
  /vehicles/{vin}/keys:
    get:
      operationId: listKeyById
      summary: List key
      description: List operation for key resources.
      tags:
        - Keys
      parameters:
        - &a1
          name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: key identifier
                    example: key-a1b2c3d4
    post:
      operationId: createKeyById
      summary: Create key
      description: Create operation for key resources.
      tags:
        - Keys
      parameters:
        - *a1
      requestBody:
        required: true
        description: Create key request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: key data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: key identifier
                    example: key-a1b2c3d4
  /vehicles/{vin}/keys/{key_id}:
    get:
      operationId: getKeyById
      summary: Get key
      description: Get operation for key resources.
      tags:
        - Keys
      parameters:
        - &a2
          name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - &a3
          name: key_id
          in: path
          required: true
          description: key id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: key identifier
                    example: key-a1b2c3d4
    put:
      operationId: updateKeyById
      summary: Update key
      description: Update operation for key resources.
      tags:
        - Keys
      parameters:
        - *a2
        - *a3
      requestBody:
        required: true
        description: Update key request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: key data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: key identifier
                    example: key-a1b2c3d4
    delete:
      operationId: deleteKeyById
      summary: Delete key
      description: Delete operation for key resources.
      tags:
        - Keys
      parameters:
        - *a2
        - *a3
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: key identifier
                    example: key-a1b2c3d4
  /vehicles/{vin}/keys/{key_id}/share:
    post:
      operationId: createShareById
      summary: Create share
      description: Create operation for share resources.
      tags:
        - Keys
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: key_id
          in: path
          required: true
          description: key id
          schema:
            type: string
      requestBody:
        required: true
        description: Create share request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: share data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: share identifier
                    example: share-a1b2c3d4
  /vehicles/{vin}/keys/{key_id}/revoke:
    post:
      operationId: actionKeyById
      summary: Action key
      description: Action operation for key resources.
      tags:
        - Keys
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: key_id
          in: path
          required: true
          description: key id
          schema:
            type: string
      requestBody:
        required: true
        description: Action key request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: key data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: key identifier
                    example: key-a1b2c3d4
  /vehicles/{vin}/access-log:
    get:
      operationId: listAccessEventById
      summary: List access event
      description: List operation for access event resources.
      tags:
        - Keys
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: access_event identifier
                    example: access_event-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
