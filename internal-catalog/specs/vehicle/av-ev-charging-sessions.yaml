openapi: 3.0.3
info:
  title: Charging Session Management API
  description: Manage active EV charging sessions including start, stop, and monitoring of charge progress. Provides
    real-time power delivery metrics, estimated completion times, and session cost tracking with support for scheduled
    charging windows.
  version: 2.4.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-ev-charging-sessions
  x-acme-domain: ev-services
servers:
  - url: https://av-ev-charging-sessions.api.acmevehicles.com/v1
    description: Production
  - url: https://av-ev-charging-sessions.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Sessions
    description: Start, stop, and monitor charging sessions
  - name: Scheduling
    description: Schedule future charging windows
paths:
  /sessions:
    get:
      operationId: listSession
      summary: List session
      description: List operation for session resources.
      tags:
        - Sessions
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: session identifier
                    example: session-a1b2c3d4
    post:
      operationId: createSession
      summary: Create session
      description: Create operation for session resources.
      tags:
        - Sessions
      requestBody:
        required: true
        description: Create session request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: session data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: session identifier
                    example: session-a1b2c3d4
  /sessions/{session_id}:
    get:
      operationId: getSessionById
      summary: Get session
      description: Get operation for session resources.
      tags:
        - Sessions
      parameters:
        - name: session_id
          in: path
          required: true
          description: session id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: session identifier
                    example: session-a1b2c3d4
  /sessions/{session_id}/stop:
    post:
      operationId: actionSessionById
      summary: Action session
      description: Action operation for session resources.
      tags:
        - Sessions
      parameters:
        - name: session_id
          in: path
          required: true
          description: session id
          schema:
            type: string
      requestBody:
        required: true
        description: Action session request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: session data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: session identifier
                    example: session-a1b2c3d4
  /sessions/{session_id}/metrics:
    get:
      operationId: getMetricsById
      summary: Get metrics
      description: Get operation for metrics resources.
      tags:
        - Sessions
      parameters:
        - name: session_id
          in: path
          required: true
          description: session id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: metrics identifier
                    example: metrics-a1b2c3d4
  /schedules:
    get:
      operationId: listSchedule
      summary: List schedule
      description: List operation for schedule resources.
      tags:
        - Sessions
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: schedule identifier
                    example: schedule-a1b2c3d4
    post:
      operationId: createSchedule
      summary: Create schedule
      description: Create operation for schedule resources.
      tags:
        - Sessions
      requestBody:
        required: true
        description: Create schedule request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: schedule data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: schedule identifier
                    example: schedule-a1b2c3d4
  /schedules/{schedule_id}:
    get:
      operationId: getScheduleById
      summary: Get schedule
      description: Get operation for schedule resources.
      tags:
        - Sessions
      parameters:
        - &a1
          name: schedule_id
          in: path
          required: true
          description: schedule id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: schedule identifier
                    example: schedule-a1b2c3d4
    put:
      operationId: updateScheduleById
      summary: Update schedule
      description: Update operation for schedule resources.
      tags:
        - Sessions
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update schedule request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: schedule data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: schedule identifier
                    example: schedule-a1b2c3d4
    delete:
      operationId: deleteScheduleById
      summary: Delete schedule
      description: Delete operation for schedule resources.
      tags:
        - Sessions
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: schedule identifier
                    example: schedule-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
