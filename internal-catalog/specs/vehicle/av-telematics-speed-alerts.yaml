openapi: 3.0.3
info:
  title: Speed Alert API
  description: Configure speed monitoring thresholds and receive real-time alerts when vehicles exceed posted limits or
    custom speed policies. Supports speed corridor definitions, school zone awareness, and speed violation report
    generation.
  version: 1.2.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-telematics-speed-alerts
  x-acme-domain: telematics
servers:
  - url: https://av-telematics-speed-alerts.api.acmevehicles.com/v1
    description: Production
  - url: https://av-telematics-speed-alerts.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Alerts
    description: Speed alert configuration and delivery
paths:
  /speed-policies:
    get:
      operationId: listPolicy
      summary: List policy
      description: List operation for policy resources.
      tags:
        - Alerts
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: policy identifier
                    example: policy-a1b2c3d4
    post:
      operationId: createPolicy
      summary: Create policy
      description: Create operation for policy resources.
      tags:
        - Alerts
      requestBody:
        required: true
        description: Create policy request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: policy data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: policy identifier
                    example: policy-a1b2c3d4
  /speed-policies/{policy_id}:
    get:
      operationId: getPolicyById
      summary: Get policy
      description: Get operation for policy resources.
      tags:
        - Alerts
      parameters:
        - &a1
          name: policy_id
          in: path
          required: true
          description: policy id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: policy identifier
                    example: policy-a1b2c3d4
    put:
      operationId: updatePolicyById
      summary: Update policy
      description: Update operation for policy resources.
      tags:
        - Alerts
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update policy request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: policy data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: policy identifier
                    example: policy-a1b2c3d4
    delete:
      operationId: deletePolicyById
      summary: Delete policy
      description: Delete operation for policy resources.
      tags:
        - Alerts
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: policy identifier
                    example: policy-a1b2c3d4
  /speed-alerts:
    get:
      operationId: listAlert
      summary: List alert
      description: List operation for alert resources.
      tags:
        - Alerts
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: alert identifier
                    example: alert-a1b2c3d4
  /speed-alerts/{alert_id}:
    get:
      operationId: getAlertById
      summary: Get alert
      description: Get operation for alert resources.
      tags:
        - Alerts
      parameters:
        - name: alert_id
          in: path
          required: true
          description: alert id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: alert identifier
                    example: alert-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
