openapi: 3.0.3
info:
  title: Infotainment API
  description: Manage in-vehicle infotainment content including media streaming integration, navigation POI delivery, app
    catalog management, and driver profile synchronization across multiple vehicles in the household.
  version: 1.8.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-connected-infotainment
  x-acme-domain: connected-services
servers:
  - url: https://av-connected-infotainment.api.acmevehicles.com/v1
    description: Production
  - url: https://av-connected-infotainment.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Media
    description: Media and streaming integration
  - name: Apps
    description: In-vehicle app catalog
paths:
  /vehicles/{vin}/media/now-playing:
    get:
      operationId: getMediaById
      summary: Get media
      description: Get operation for media resources.
      tags:
        - Media
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: media identifier
                    example: media-a1b2c3d4
  /vehicles/{vin}/media/sources:
    get:
      operationId: listSourceById
      summary: List source
      description: List operation for source resources.
      tags:
        - Media
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: source identifier
                    example: source-a1b2c3d4
  /apps:
    get:
      operationId: listApp
      summary: List app
      description: List operation for app resources.
      tags:
        - Media
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: app identifier
                    example: app-a1b2c3d4
  /apps/{app_id}:
    get:
      operationId: getAppById
      summary: Get app
      description: Get operation for app resources.
      tags:
        - Media
      parameters:
        - name: app_id
          in: path
          required: true
          description: app id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: app identifier
                    example: app-a1b2c3d4
  /vehicles/{vin}/profiles:
    get:
      operationId: listProfileById
      summary: List profile
      description: List operation for profile resources.
      tags:
        - Media
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: profile identifier
                    example: profile-a1b2c3d4
  /vehicles/{vin}/profiles/{profile_id}:
    get:
      operationId: getProfileById
      summary: Get profile
      description: Get operation for profile resources.
      tags:
        - Media
      parameters:
        - &a1
          name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - &a2
          name: profile_id
          in: path
          required: true
          description: profile id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: profile identifier
                    example: profile-a1b2c3d4
    put:
      operationId: updateProfileById
      summary: Update profile
      description: Update operation for profile resources.
      tags:
        - Media
      parameters:
        - *a1
        - *a2
      requestBody:
        required: true
        description: Update profile request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: profile data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: profile identifier
                    example: profile-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
