openapi: 3.0.3
info:
  title: Dealer Campaign API
  description: Manage marketing campaigns, promotional offers, and customer outreach programs for dealerships. Supports
    targeted audience segmentation, multi-channel campaign delivery, conversion tracking, and ROI measurement
    dashboards.
  version: 1.2.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-dealer-campaigns
  x-acme-domain: dealer
servers:
  - url: https://av-dealer-campaigns.api.acmevehicles.com/v1
    description: Production
  - url: https://av-dealer-campaigns.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Campaigns
    description: Marketing campaign management
  - name: Audiences
    description: Customer segmentation and targeting
paths:
  /campaigns:
    get:
      operationId: listCampaign
      summary: List campaign
      description: List operation for campaign resources.
      tags:
        - Campaigns
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: campaign identifier
                    example: campaign-a1b2c3d4
    post:
      operationId: createCampaign
      summary: Create campaign
      description: Create operation for campaign resources.
      tags:
        - Campaigns
      requestBody:
        required: true
        description: Create campaign request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: campaign data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: campaign identifier
                    example: campaign-a1b2c3d4
  /campaigns/{campaign_id}:
    get:
      operationId: getCampaignById
      summary: Get campaign
      description: Get operation for campaign resources.
      tags:
        - Campaigns
      parameters:
        - &a1
          name: campaign_id
          in: path
          required: true
          description: campaign id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: campaign identifier
                    example: campaign-a1b2c3d4
    put:
      operationId: updateCampaignById
      summary: Update campaign
      description: Update operation for campaign resources.
      tags:
        - Campaigns
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update campaign request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: campaign data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: campaign identifier
                    example: campaign-a1b2c3d4
  /campaigns/{campaign_id}/audiences:
    get:
      operationId: listAudienceById
      summary: List audience
      description: List operation for audience resources.
      tags:
        - Campaigns
      parameters:
        - &a2
          name: campaign_id
          in: path
          required: true
          description: campaign id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: audience identifier
                    example: audience-a1b2c3d4
    post:
      operationId: createAudienceById
      summary: Create audience
      description: Create operation for audience resources.
      tags:
        - Campaigns
      parameters:
        - *a2
      requestBody:
        required: true
        description: Create audience request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: audience data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: audience identifier
                    example: audience-a1b2c3d4
  /campaigns/{campaign_id}/metrics:
    get:
      operationId: getMetricsById
      summary: Get metrics
      description: Get operation for metrics resources.
      tags:
        - Campaigns
      parameters:
        - name: campaign_id
          in: path
          required: true
          description: campaign id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: metrics identifier
                    example: metrics-a1b2c3d4
  /campaigns/{campaign_id}/send:
    post:
      operationId: actionCampaignById
      summary: Action campaign
      description: Action operation for campaign resources.
      tags:
        - Campaigns
      parameters:
        - name: campaign_id
          in: path
          required: true
          description: campaign id
          schema:
            type: string
      requestBody:
        required: true
        description: Action campaign request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: campaign data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: campaign identifier
                    example: campaign-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
