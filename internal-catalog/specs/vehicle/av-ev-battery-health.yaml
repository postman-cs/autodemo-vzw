openapi: 3.0.3
info:
  title: Battery Health Monitoring API
  description: Monitor battery pack degradation, cell-level health diagnostics, and state-of-health (SoH) trends over
    time. Provides thermal runaway risk assessments, capacity fade predictions, and warranty eligibility checks based on
    battery condition.
  version: 1.5.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-ev-battery-health
  x-acme-domain: ev-services
servers:
  - url: https://av-ev-battery-health.api.acmevehicles.com/v1
    description: Production
  - url: https://av-ev-battery-health.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Health Metrics
    description: Battery state-of-health and diagnostics
  - name: Predictions
    description: Degradation forecasts and alerts
paths:
  /vehicles/{vin}/battery/health:
    get:
      operationId: getHealthById
      summary: Get health
      description: Get operation for health resources.
      tags:
        - Health Metrics
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: health identifier
                    example: health-a1b2c3d4
  /vehicles/{vin}/battery/cells:
    get:
      operationId: listCellById
      summary: List cell
      description: List operation for cell resources.
      tags:
        - Health Metrics
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: cell identifier
                    example: cell-a1b2c3d4
  /vehicles/{vin}/battery/history:
    get:
      operationId: listSnapshotById
      summary: List snapshot
      description: List operation for snapshot resources.
      tags:
        - Health Metrics
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: snapshot identifier
                    example: snapshot-a1b2c3d4
  /vehicles/{vin}/battery/predictions:
    get:
      operationId: getPredictionById
      summary: Get prediction
      description: Get operation for prediction resources.
      tags:
        - Health Metrics
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: prediction identifier
                    example: prediction-a1b2c3d4
  /vehicles/{vin}/battery/warranty:
    get:
      operationId: getWarrantyById
      summary: Get warranty
      description: Get operation for warranty resources.
      tags:
        - Health Metrics
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: warranty identifier
                    example: warranty-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
