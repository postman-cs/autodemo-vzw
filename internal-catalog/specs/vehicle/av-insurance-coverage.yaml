openapi: 3.0.3
info:
  title: Coverage Verification API
  description: Verify active insurance coverage for vehicles including liability, collision, and comprehensive coverage.
    Provides real-time proof of insurance generation, coverage gap detection, and lender requirement compliance
    verification.
  version: 1.0.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-insurance-coverage
  x-acme-domain: insurance
servers:
  - url: https://av-insurance-coverage.api.acmevehicles.com/v1
    description: Production
  - url: https://av-insurance-coverage.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Verification
    description: Coverage verification and proof
paths:
  /verify/{vin}:
    get:
      operationId: getCoverageById
      summary: Get coverage
      description: Get operation for coverage resources.
      tags:
        - Verification
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: coverage identifier
                    example: coverage-a1b2c3d4
  /proof-of-insurance/{vin}:
    get:
      operationId: getProofById
      summary: Get proof
      description: Get operation for proof resources.
      tags:
        - Verification
      parameters:
        - &a1
          name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: proof identifier
                    example: proof-a1b2c3d4
    post:
      operationId: createProofById
      summary: Create proof
      description: Create operation for proof resources.
      tags:
        - Verification
      parameters:
        - *a1
      requestBody:
        required: true
        description: Create proof request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: proof data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: proof identifier
                    example: proof-a1b2c3d4
  /coverage-gaps/{vin}:
    get:
      operationId: getGapsById
      summary: Get gaps
      description: Get operation for gaps resources.
      tags:
        - Verification
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: gaps identifier
                    example: gaps-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
