openapi: 3.0.3
info:
  title: Smart Parking API
  description: Discover available parking spaces, reserve spots, and process parking payments. Integrates with garage
    sensors, street meter systems, and valet services with automatic vehicle dimension matching and EV charger-equipped
    space filtering.
  version: 1.6.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-connected-parking
  x-acme-domain: connected-services
servers:
  - url: https://av-connected-parking.api.acmevehicles.com/v1
    description: Production
  - url: https://av-connected-parking.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Discovery
    description: Parking space search and availability
  - name: Reservations
    description: Parking reservation management
paths:
  /parking/search:
    post:
      operationId: searchSpace
      summary: Search space
      description: Search operation for space resources.
      tags:
        - Discovery
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      requestBody:
        required: true
        description: Search space request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: space data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: space identifier
                    example: space-a1b2c3d4
  /parking/reservations:
    get:
      operationId: listReservation
      summary: List reservation
      description: List operation for reservation resources.
      tags:
        - Discovery
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: reservation identifier
                    example: reservation-a1b2c3d4
    post:
      operationId: createReservation
      summary: Create reservation
      description: Create operation for reservation resources.
      tags:
        - Discovery
      requestBody:
        required: true
        description: Create reservation request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: reservation data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: reservation identifier
                    example: reservation-a1b2c3d4
  /parking/reservations/{reservation_id}:
    get:
      operationId: getReservationById
      summary: Get reservation
      description: Get operation for reservation resources.
      tags:
        - Discovery
      parameters:
        - &a1
          name: reservation_id
          in: path
          required: true
          description: reservation id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: reservation identifier
                    example: reservation-a1b2c3d4
    delete:
      operationId: deleteReservationById
      summary: Delete reservation
      description: Delete operation for reservation resources.
      tags:
        - Discovery
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: reservation identifier
                    example: reservation-a1b2c3d4
  /parking/sessions:
    get:
      operationId: listSession
      summary: List session
      description: List operation for session resources.
      tags:
        - Discovery
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: session identifier
                    example: session-a1b2c3d4
  /parking/sessions/{session_id}:
    get:
      operationId: getSessionById
      summary: Get session
      description: Get operation for session resources.
      tags:
        - Discovery
      parameters:
        - name: session_id
          in: path
          required: true
          description: session id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: session identifier
                    example: session-a1b2c3d4
  /parking/payments:
    get:
      operationId: listPayment
      summary: List payment
      description: List operation for payment resources.
      tags:
        - Discovery
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: payment identifier
                    example: payment-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
