openapi: 3.0.3
info:
  title: Component Traceability API
  description: Track component serial numbers, manufacturing lot codes, and assembly genealogy for full vehicle build
    traceability. Supports recall impact analysis, warranty claim part verification, and regulatory compliance
    documentation.
  version: 1.1.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-mfg-traceability
  x-acme-domain: manufacturing
servers:
  - url: https://av-mfg-traceability.api.acmevehicles.com/v1
    description: Production
  - url: https://av-mfg-traceability.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Components
    description: Component tracking and genealogy
  - name: Tracing
    description: Forward and backward traceability
paths:
  /components:
    get:
      operationId: listComponent
      summary: List component
      description: List operation for component resources.
      tags:
        - Components
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: component identifier
                    example: component-a1b2c3d4
  /components/{serial_number}:
    get:
      operationId: getComponentById
      summary: Get component
      description: Get operation for component resources.
      tags:
        - Components
      parameters:
        - name: serial_number
          in: path
          required: true
          description: serial number
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: component identifier
                    example: component-a1b2c3d4
  /components/{serial_number}/genealogy:
    get:
      operationId: getGenealogyById
      summary: Get genealogy
      description: Get operation for genealogy resources.
      tags:
        - Components
      parameters:
        - name: serial_number
          in: path
          required: true
          description: serial number
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: genealogy identifier
                    example: genealogy-a1b2c3d4
  /vehicles/{vin}/bill-of-materials:
    get:
      operationId: getBomById
      summary: Get bom
      description: Get operation for bom resources.
      tags:
        - Components
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: bom identifier
                    example: bom-a1b2c3d4
  /trace/forward/{lot_code}:
    get:
      operationId: getTraceById
      summary: Get trace
      description: Get operation for trace resources.
      tags:
        - Components
      parameters:
        - name: lot_code
          in: path
          required: true
          description: lot code
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: trace identifier
                    example: trace-a1b2c3d4
  /trace/backward/{serial_number}:
    get:
      operationId: getTraceById
      summary: Get trace
      description: Get operation for trace resources.
      tags:
        - Components
      parameters:
        - name: serial_number
          in: path
          required: true
          description: serial number
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: trace identifier
                    example: trace-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
