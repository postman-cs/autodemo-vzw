openapi: 3.0.3
info:
  title: Path Planning API
  description: Access autonomous vehicle path planning outputs including trajectory candidates, selected path, and
    decision rationale. Provides scenario logging, edge case detection, and planning parameter configuration for
    different operational design domains.
  version: 1.3.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-autonomous-planning
  x-acme-domain: autonomous
servers:
  - url: https://av-autonomous-planning.api.acmevehicles.com/v1
    description: Production
  - url: https://av-autonomous-planning.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Trajectories
    description: Path trajectory planning
  - name: Decisions
    description: Planning decision logging
paths:
  /vehicles/{vin}/planning/trajectory:
    get:
      operationId: getTrajectoryById
      summary: Get trajectory
      description: Get operation for trajectory resources.
      tags:
        - Trajectories
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: trajectory identifier
                    example: trajectory-a1b2c3d4
  /vehicles/{vin}/planning/decisions:
    get:
      operationId: listDecisionById
      summary: List decision
      description: List operation for decision resources.
      tags:
        - Trajectories
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: decision identifier
                    example: decision-a1b2c3d4
  /vehicles/{vin}/planning/config:
    get:
      operationId: getConfigById
      summary: Get config
      description: Get operation for config resources.
      tags:
        - Trajectories
      parameters:
        - &a1
          name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: config identifier
                    example: config-a1b2c3d4
    put:
      operationId: updateConfigById
      summary: Update config
      description: Update operation for config resources.
      tags:
        - Trajectories
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update config request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: config data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: config identifier
                    example: config-a1b2c3d4
  /scenarios:
    get:
      operationId: listScenario
      summary: List scenario
      description: List operation for scenario resources.
      tags:
        - Trajectories
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: scenario identifier
                    example: scenario-a1b2c3d4
  /scenarios/{scenario_id}:
    get:
      operationId: getScenarioById
      summary: Get scenario
      description: Get operation for scenario resources.
      tags:
        - Trajectories
      parameters:
        - name: scenario_id
          in: path
          required: true
          description: scenario id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: scenario identifier
                    example: scenario-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
