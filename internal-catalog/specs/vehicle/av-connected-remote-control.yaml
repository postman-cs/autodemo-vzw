openapi: 3.0.3
info:
  title: Remote Vehicle Control API
  description: Execute remote vehicle commands including lock/unlock, engine start/stop, horn honk, lights flash, and
    window control. All commands require two-factor authentication and provide real-time execution status with
    confirmation callbacks.
  version: 3.0.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-connected-remote-control
  x-acme-domain: connected-services
servers:
  - url: https://av-connected-remote-control.api.acmevehicles.com/v1
    description: Production
  - url: https://av-connected-remote-control.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Commands
    description: Remote vehicle command execution
  - name: Status
    description: Command execution status tracking
paths:
  /vehicles/{vin}/commands:
    get:
      operationId: listCommandById
      summary: List command
      description: List operation for command resources.
      tags:
        - Commands
      parameters:
        - &a1
          name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: command identifier
                    example: command-a1b2c3d4
    post:
      operationId: createCommandById
      summary: Create command
      description: Create operation for command resources.
      tags:
        - Commands
      parameters:
        - *a1
      requestBody:
        required: true
        description: Create command request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: command data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: command identifier
                    example: command-a1b2c3d4
  /vehicles/{vin}/commands/{command_id}:
    get:
      operationId: getCommandById
      summary: Get command
      description: Get operation for command resources.
      tags:
        - Commands
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: command_id
          in: path
          required: true
          description: command id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: command identifier
                    example: command-a1b2c3d4
  /vehicles/{vin}/lock:
    post:
      operationId: actionLockById
      summary: Action lock
      description: Action operation for lock resources.
      tags:
        - Commands
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      requestBody:
        required: true
        description: Action lock request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: lock data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: lock identifier
                    example: lock-a1b2c3d4
  /vehicles/{vin}/unlock:
    post:
      operationId: actionLockById
      summary: Action lock
      description: Action operation for lock resources.
      tags:
        - Commands
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      requestBody:
        required: true
        description: Action lock request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: lock data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: lock identifier
                    example: lock-a1b2c3d4
  /vehicles/{vin}/start:
    post:
      operationId: actionEngineById
      summary: Action engine
      description: Action operation for engine resources.
      tags:
        - Commands
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      requestBody:
        required: true
        description: Action engine request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: engine data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: engine identifier
                    example: engine-a1b2c3d4
  /vehicles/{vin}/stop:
    post:
      operationId: actionEngineById
      summary: Action engine
      description: Action operation for engine resources.
      tags:
        - Commands
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      requestBody:
        required: true
        description: Action engine request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: engine data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: engine identifier
                    example: engine-a1b2c3d4
  /vehicles/{vin}/horn:
    post:
      operationId: actionHornById
      summary: Action horn
      description: Action operation for horn resources.
      tags:
        - Commands
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      requestBody:
        required: true
        description: Action horn request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: horn data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: horn identifier
                    example: horn-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
