openapi: 3.0.3
info:
  title: Home Charging Management API
  description: Configure and monitor home wall box chargers, manage installation requests, and track home energy
    consumption for EV charging. Supports OCPP-based charger communication, load balancing with household circuits, and
    solar surplus charging.
  version: 1.0.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-ev-home-charging
  x-acme-domain: ev-services
servers:
  - url: https://av-ev-home-charging.api.acmevehicles.com/v1
    description: Production
  - url: https://av-ev-home-charging.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Chargers
    description: Home charger configuration and monitoring
  - name: Installation
    description: Installation requests and scheduling
paths:
  /home-chargers:
    get:
      operationId: listCharger
      summary: List charger
      description: List operation for charger resources.
      tags:
        - Chargers
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: charger identifier
                    example: charger-a1b2c3d4
    post:
      operationId: createCharger
      summary: Create charger
      description: Create operation for charger resources.
      tags:
        - Chargers
      requestBody:
        required: true
        description: Create charger request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: charger data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: charger identifier
                    example: charger-a1b2c3d4
  /home-chargers/{charger_id}:
    get:
      operationId: getChargerById
      summary: Get charger
      description: Get operation for charger resources.
      tags:
        - Chargers
      parameters:
        - &a1
          name: charger_id
          in: path
          required: true
          description: charger id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: charger identifier
                    example: charger-a1b2c3d4
    put:
      operationId: updateChargerById
      summary: Update charger
      description: Update operation for charger resources.
      tags:
        - Chargers
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update charger request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: charger data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: charger identifier
                    example: charger-a1b2c3d4
    delete:
      operationId: deleteChargerById
      summary: Delete charger
      description: Delete operation for charger resources.
      tags:
        - Chargers
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: charger identifier
                    example: charger-a1b2c3d4
  /home-chargers/{charger_id}/status:
    get:
      operationId: getStatusById
      summary: Get status
      description: Get operation for status resources.
      tags:
        - Chargers
      parameters:
        - name: charger_id
          in: path
          required: true
          description: charger id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: status identifier
                    example: status-a1b2c3d4
  /installations:
    get:
      operationId: listInstallation
      summary: List installation
      description: List operation for installation resources.
      tags:
        - Chargers
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: installation identifier
                    example: installation-a1b2c3d4
    post:
      operationId: createInstallation
      summary: Create installation
      description: Create operation for installation resources.
      tags:
        - Chargers
      requestBody:
        required: true
        description: Create installation request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: installation data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: installation identifier
                    example: installation-a1b2c3d4
  /installations/{installation_id}:
    get:
      operationId: getInstallationById
      summary: Get installation
      description: Get operation for installation resources.
      tags:
        - Chargers
      parameters:
        - name: installation_id
          in: path
          required: true
          description: installation id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: installation identifier
                    example: installation-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
