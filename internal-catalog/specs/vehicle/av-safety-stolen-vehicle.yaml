openapi: 3.0.3
info:
  title: Stolen Vehicle Recovery API
  description: Report stolen vehicles, activate tracking mode, and coordinate with law enforcement for vehicle recovery.
    Supports remote immobilization, silent tracking mode activation, and geofence-based alert corridors for recovery
    operations.
  version: 1.2.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-safety-stolen-vehicle
  x-acme-domain: safety
servers:
  - url: https://av-safety-stolen-vehicle.api.acmevehicles.com/v1
    description: Production
  - url: https://av-safety-stolen-vehicle.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Reports
    description: Theft report management
  - name: Tracking
    description: Stolen vehicle tracking
paths:
  /theft-reports:
    get:
      operationId: listReport
      summary: List report
      description: List operation for report resources.
      tags:
        - Reports
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: report identifier
                    example: report-a1b2c3d4
    post:
      operationId: createReport
      summary: Create report
      description: Create operation for report resources.
      tags:
        - Reports
      requestBody:
        required: true
        description: Create report request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: report data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: report identifier
                    example: report-a1b2c3d4
  /theft-reports/{report_id}:
    get:
      operationId: getReportById
      summary: Get report
      description: Get operation for report resources.
      tags:
        - Reports
      parameters:
        - &a1
          name: report_id
          in: path
          required: true
          description: report id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: report identifier
                    example: report-a1b2c3d4
    put:
      operationId: updateReportById
      summary: Update report
      description: Update operation for report resources.
      tags:
        - Reports
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update report request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: report data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: report identifier
                    example: report-a1b2c3d4
  /theft-reports/{report_id}/track:
    get:
      operationId: getTrackingById
      summary: Get tracking
      description: Get operation for tracking resources.
      tags:
        - Reports
      parameters:
        - name: report_id
          in: path
          required: true
          description: report id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: tracking identifier
                    example: tracking-a1b2c3d4
  /theft-reports/{report_id}/immobilize:
    post:
      operationId: actionVehicleById
      summary: Action vehicle
      description: Action operation for vehicle resources.
      tags:
        - Reports
      parameters:
        - name: report_id
          in: path
          required: true
          description: report id
          schema:
            type: string
      requestBody:
        required: true
        description: Action vehicle request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: vehicle data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: vehicle identifier
                    example: vehicle-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
