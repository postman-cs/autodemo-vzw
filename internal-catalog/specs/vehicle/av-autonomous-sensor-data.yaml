openapi: 3.0.3
info:
  title: Sensor Data API
  description: Access and manage autonomous vehicle sensor data streams including LiDAR point clouds, camera feeds, radar
    returns, and ultrasonic proximity data. Supports data labeling, anonymization pipelines, and sensor fusion output
    retrieval.
  version: 1.7.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-autonomous-sensor-data
  x-acme-domain: autonomous
servers:
  - url: https://av-autonomous-sensor-data.api.acmevehicles.com/v1
    description: Production
  - url: https://av-autonomous-sensor-data.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Sensors
    description: Sensor data access and management
  - name: Fusion
    description: Sensor fusion outputs
paths:
  /vehicles/{vin}/sensors:
    get:
      operationId: listSensorById
      summary: List sensor
      description: List operation for sensor resources.
      tags:
        - Sensors
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: sensor identifier
                    example: sensor-a1b2c3d4
  /vehicles/{vin}/sensors/{sensor_id}/data:
    get:
      operationId: getDataById
      summary: Get data
      description: Get operation for data resources.
      tags:
        - Sensors
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: sensor_id
          in: path
          required: true
          description: sensor id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: data identifier
                    example: data-a1b2c3d4
  /vehicles/{vin}/sensors/{sensor_id}/calibration:
    get:
      operationId: getCalibrationById
      summary: Get calibration
      description: Get operation for calibration resources.
      tags:
        - Sensors
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: sensor_id
          in: path
          required: true
          description: sensor id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: calibration identifier
                    example: calibration-a1b2c3d4
  /vehicles/{vin}/fusion:
    get:
      operationId: getFusionById
      summary: Get fusion
      description: Get operation for fusion resources.
      tags:
        - Sensors
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: fusion identifier
                    example: fusion-a1b2c3d4
  /data-exports:
    get:
      operationId: listExport
      summary: List export
      description: List operation for export resources.
      tags:
        - Sensors
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: export identifier
                    example: export-a1b2c3d4
    post:
      operationId: createExport
      summary: Create export
      description: Create operation for export resources.
      tags:
        - Sensors
      requestBody:
        required: true
        description: Create export request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: export data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: export identifier
                    example: export-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
