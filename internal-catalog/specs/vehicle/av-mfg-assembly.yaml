openapi: 3.0.3
info:
  title: Assembly Line Monitoring API
  description: Real-time assembly line monitoring including station cycle times, throughput metrics, and bottleneck
    detection. Supports andon call management, line stoppage tracking, and OEE calculation for lean manufacturing
    dashboards.
  version: 1.3.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-mfg-assembly
  x-acme-domain: manufacturing
servers:
  - url: https://av-mfg-assembly.api.acmevehicles.com/v1
    description: Production
  - url: https://av-mfg-assembly.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Stations
    description: Assembly station monitoring
  - name: Metrics
    description: Line performance metrics
paths:
  /lines/{line_id}/stations:
    get:
      operationId: listStationById
      summary: List station
      description: List operation for station resources.
      tags:
        - Stations
      parameters:
        - name: line_id
          in: path
          required: true
          description: line id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: station identifier
                    example: station-a1b2c3d4
  /lines/{line_id}/stations/{station_id}:
    get:
      operationId: getStationById
      summary: Get station
      description: Get operation for station resources.
      tags:
        - Stations
      parameters:
        - name: line_id
          in: path
          required: true
          description: line id
          schema:
            type: string
        - name: station_id
          in: path
          required: true
          description: station id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: station identifier
                    example: station-a1b2c3d4
  /lines/{line_id}/metrics:
    get:
      operationId: getMetricsById
      summary: Get metrics
      description: Get operation for metrics resources.
      tags:
        - Stations
      parameters:
        - name: line_id
          in: path
          required: true
          description: line id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: metrics identifier
                    example: metrics-a1b2c3d4
  /lines/{line_id}/andon:
    get:
      operationId: listAndonCallById
      summary: List andon call
      description: List operation for andon call resources.
      tags:
        - Stations
      parameters:
        - &a1
          name: line_id
          in: path
          required: true
          description: line id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: andon_call identifier
                    example: andon_call-a1b2c3d4
    post:
      operationId: createAndonCallById
      summary: Create andon call
      description: Create operation for andon call resources.
      tags:
        - Stations
      parameters:
        - *a1
      requestBody:
        required: true
        description: Create andon_call request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: andon_call data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: andon_call identifier
                    example: andon_call-a1b2c3d4
  /lines/{line_id}/stoppages:
    get:
      operationId: listStoppageById
      summary: List stoppage
      description: List operation for stoppage resources.
      tags:
        - Stations
      parameters:
        - name: line_id
          in: path
          required: true
          description: line id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: stoppage identifier
                    example: stoppage-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
