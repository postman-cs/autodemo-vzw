openapi: 3.0.3
info:
  title: Dashcam Management API
  description: Manage integrated dashcam footage including event-triggered clips, continuous recording segments, and cloud
    upload. Supports multi-camera views, automatic incident detection clips, and footage sharing for insurance claims.
  version: 1.3.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-safety-dashcam
  x-acme-domain: safety
servers:
  - url: https://av-safety-dashcam.api.acmevehicles.com/v1
    description: Production
  - url: https://av-safety-dashcam.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Footage
    description: Dashcam footage management
  - name: Events
    description: Event-triggered clip capture
paths:
  /vehicles/{vin}/dashcam/clips:
    get:
      operationId: listClipById
      summary: List clip
      description: List operation for clip resources.
      tags:
        - Footage
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: clip identifier
                    example: clip-a1b2c3d4
  /vehicles/{vin}/dashcam/clips/{clip_id}:
    get:
      operationId: getClipById
      summary: Get clip
      description: Get operation for clip resources.
      tags:
        - Footage
      parameters:
        - &a1
          name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - &a2
          name: clip_id
          in: path
          required: true
          description: clip id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: clip identifier
                    example: clip-a1b2c3d4
    delete:
      operationId: deleteClipById
      summary: Delete clip
      description: Delete operation for clip resources.
      tags:
        - Footage
      parameters:
        - *a1
        - *a2
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: clip identifier
                    example: clip-a1b2c3d4
  /vehicles/{vin}/dashcam/clips/{clip_id}/share:
    post:
      operationId: createShareById
      summary: Create share
      description: Create operation for share resources.
      tags:
        - Footage
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: clip_id
          in: path
          required: true
          description: clip id
          schema:
            type: string
      requestBody:
        required: true
        description: Create share request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: share data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: share identifier
                    example: share-a1b2c3d4
  /vehicles/{vin}/dashcam/settings:
    get:
      operationId: getSettingsById
      summary: Get settings
      description: Get operation for settings resources.
      tags:
        - Footage
      parameters:
        - &a3
          name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: settings identifier
                    example: settings-a1b2c3d4
    put:
      operationId: updateSettingsById
      summary: Update settings
      description: Update operation for settings resources.
      tags:
        - Footage
      parameters:
        - *a3
      requestBody:
        required: true
        description: Update settings request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: settings data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: settings identifier
                    example: settings-a1b2c3d4
  /vehicles/{vin}/dashcam/storage:
    get:
      operationId: getStorageById
      summary: Get storage
      description: Get operation for storage resources.
      tags:
        - Footage
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: storage identifier
                    example: storage-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
