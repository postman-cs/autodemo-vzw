openapi: 3.0.3
info:
  title: Vehicle Access Control API
  description: Manage vehicle access permissions and roles for multi-user vehicle sharing. Supports primary owner, family
    member, valet, and fleet driver permission levels with time-restricted and feature-restricted access profiles.
  version: 1.4.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-identity-access-control
  x-acme-domain: identity
servers:
  - url: https://av-identity-access-control.api.acmevehicles.com/v1
    description: Production
  - url: https://av-identity-access-control.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Roles
    description: Access role management
  - name: Permissions
    description: Permission assignment and enforcement
paths:
  /vehicles/{vin}/roles:
    get:
      operationId: listRoleById
      summary: List role
      description: List operation for role resources.
      tags:
        - Roles
      parameters:
        - &a1
          name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: role identifier
                    example: role-a1b2c3d4
    post:
      operationId: createRoleById
      summary: Create role
      description: Create operation for role resources.
      tags:
        - Roles
      parameters:
        - *a1
      requestBody:
        required: true
        description: Create role request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: role data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: role identifier
                    example: role-a1b2c3d4
  /vehicles/{vin}/roles/{role_id}:
    get:
      operationId: getRoleById
      summary: Get role
      description: Get operation for role resources.
      tags:
        - Roles
      parameters:
        - &a2
          name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - &a3
          name: role_id
          in: path
          required: true
          description: role id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: role identifier
                    example: role-a1b2c3d4
    put:
      operationId: updateRoleById
      summary: Update role
      description: Update operation for role resources.
      tags:
        - Roles
      parameters:
        - *a2
        - *a3
      requestBody:
        required: true
        description: Update role request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: role data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: role identifier
                    example: role-a1b2c3d4
    delete:
      operationId: deleteRoleById
      summary: Delete role
      description: Delete operation for role resources.
      tags:
        - Roles
      parameters:
        - *a2
        - *a3
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: role identifier
                    example: role-a1b2c3d4
