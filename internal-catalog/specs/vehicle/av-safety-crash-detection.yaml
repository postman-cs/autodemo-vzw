openapi: 3.0.3
info:
  title: Crash Detection API
  description: Automatic collision detection using accelerometer and airbag deployment signals with emergency SOS
    dispatch. Provides crash severity classification, automatic emergency service notification, and post-crash vehicle
    status assessment.
  version: 2.2.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-safety-crash-detection
  x-acme-domain: safety
servers:
  - url: https://av-safety-crash-detection.api.acmevehicles.com/v1
    description: Production
  - url: https://av-safety-crash-detection.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Detection
    description: Crash detection and alerting
  - name: Emergency
    description: Emergency response coordination
paths:
  /crashes:
    get:
      operationId: listCrash
      summary: List crash
      description: List operation for crash resources.
      tags:
        - Detection
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: crash identifier
                    example: crash-a1b2c3d4
  /crashes/{crash_id}:
    get:
      operationId: getCrashById
      summary: Get crash
      description: Get operation for crash resources.
      tags:
        - Detection
      parameters:
        - name: crash_id
          in: path
          required: true
          description: crash id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: crash identifier
                    example: crash-a1b2c3d4
  /crashes/{crash_id}/sos:
    post:
      operationId: actionSosById
      summary: Action sos
      description: Action operation for sos resources.
      tags:
        - Detection
      parameters:
        - name: crash_id
          in: path
          required: true
          description: crash id
          schema:
            type: string
      requestBody:
        required: true
        description: Action sos request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: sos data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: sos identifier
                    example: sos-a1b2c3d4
  /crashes/{crash_id}/report:
    get:
      operationId: getReportById
      summary: Get report
      description: Get operation for report resources.
      tags:
        - Detection
      parameters:
        - name: crash_id
          in: path
          required: true
          description: crash id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: report identifier
                    example: report-a1b2c3d4
  /emergency-contacts:
    get:
      operationId: listContact
      summary: List contact
      description: List operation for contact resources.
      tags:
        - Detection
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: contact identifier
                    example: contact-a1b2c3d4
    post:
      operationId: createContact
      summary: Create contact
      description: Create operation for contact resources.
      tags:
        - Detection
      requestBody:
        required: true
        description: Create contact request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: contact data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: contact identifier
                    example: contact-a1b2c3d4
  /emergency-contacts/{contact_id}:
    get:
      operationId: getContactById
      summary: Get contact
      description: Get operation for contact resources.
      tags:
        - Detection
      parameters:
        - &a1
          name: contact_id
          in: path
          required: true
          description: contact id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: contact identifier
                    example: contact-a1b2c3d4
    put:
      operationId: updateContactById
      summary: Update contact
      description: Update operation for contact resources.
      tags:
        - Detection
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update contact request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: contact data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: contact identifier
                    example: contact-a1b2c3d4
    delete:
      operationId: deleteContactById
      summary: Delete contact
      description: Delete operation for contact resources.
      tags:
        - Detection
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: contact identifier
                    example: contact-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
