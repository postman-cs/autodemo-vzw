openapi: 3.0.3
info:
  title: Route Optimization API
  description: Compute EV route distance, ETA, route geometry, and estimated energy usage for concierge trip workflows.
    Supports multi-stop optimization, charging stop insertion, real-time traffic integration, and truck-specific routing
    constraints.
  version: 2.0.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-telematics-routing
  x-acme-domain: telematics
servers:
  - url: https://av-telematics-routing.api.acmevehicles.com/v1
    description: Production
  - url: https://av-telematics-routing.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Routes
    description: Route calculation and optimization
  - name: Charging Stops
    description: En-route charging stop planning
paths:
  /routes/calculate:
    post:
      operationId: createRoute
      summary: Create route
      description: Create operation for route resources.
      tags:
        - Routes
      requestBody:
        required: true
        description: Create route request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: route data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: route identifier
                    example: route-a1b2c3d4
  /routes/{route_id}:
    get:
      operationId: getRouteById
      summary: Get route
      description: Get operation for route resources.
      tags:
        - Routes
      parameters:
        - name: route_id
          in: path
          required: true
          description: route id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: route identifier
                    example: route-a1b2c3d4
  /routes/{route_id}/charging-stops:
    get:
      operationId: listStopById
      summary: List stop
      description: List operation for stop resources.
      tags:
        - Routes
      parameters:
        - name: route_id
          in: path
          required: true
          description: route id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: stop identifier
                    example: stop-a1b2c3d4
  /routes/optimize:
    post:
      operationId: createOptimizedRoute
      summary: Create optimized route
      description: Create operation for optimized route resources.
      tags:
        - Routes
      requestBody:
        required: true
        description: Create optimized_route request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: optimized_route data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: optimized_route identifier
                    example: optimized_route-a1b2c3d4
  /routes/{route_id}/alternatives:
    get:
      operationId: listAlternativeById
      summary: List alternative
      description: List operation for alternative resources.
      tags:
        - Routes
      parameters:
        - name: route_id
          in: path
          required: true
          description: route id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: alternative identifier
                    example: alternative-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
