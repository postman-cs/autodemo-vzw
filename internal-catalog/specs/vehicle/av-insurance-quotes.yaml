openapi: 3.0.3
info:
  title: Insurance Quote API
  description: Generate auto insurance quotes based on vehicle specifications, driver profile, location, and telematics
    data. Supports multi-carrier quote comparison, bundling discounts, and instant bind for qualifying applicants.
  version: 1.4.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-insurance-quotes
  x-acme-domain: insurance
servers:
  - url: https://av-insurance-quotes.api.acmevehicles.com/v1
    description: Production
  - url: https://av-insurance-quotes.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Quotes
    description: Insurance quote generation
paths:
  /quotes:
    get:
      operationId: listQuote
      summary: List quote
      description: List operation for quote resources.
      tags:
        - Quotes
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: quote identifier
                    example: quote-a1b2c3d4
    post:
      operationId: createQuote
      summary: Create quote
      description: Create operation for quote resources.
      tags:
        - Quotes
      requestBody:
        required: true
        description: Create quote request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: quote data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: quote identifier
                    example: quote-a1b2c3d4
  /quotes/{quote_id}:
    get:
      operationId: getQuoteById
      summary: Get quote
      description: Get operation for quote resources.
      tags:
        - Quotes
      parameters:
        - name: quote_id
          in: path
          required: true
          description: quote id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: quote identifier
                    example: quote-a1b2c3d4
  /quotes/{quote_id}/bind:
    post:
      operationId: actionQuoteById
      summary: Action quote
      description: Action operation for quote resources.
      tags:
        - Quotes
      parameters:
        - name: quote_id
          in: path
          required: true
          description: quote id
          schema:
            type: string
      requestBody:
        required: true
        description: Action quote request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: quote data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: quote identifier
                    example: quote-a1b2c3d4
  /quotes/compare:
    post:
      operationId: createComparison
      summary: Create comparison
      description: Create operation for comparison resources.
      tags:
        - Quotes
      requestBody:
        required: true
        description: Create comparison request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: comparison data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: comparison identifier
                    example: comparison-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
