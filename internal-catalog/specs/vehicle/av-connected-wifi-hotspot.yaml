openapi: 3.0.3
info:
  title: In-Vehicle WiFi API
  description: Manage in-vehicle WiFi hotspot connectivity including data plan activation, usage monitoring, connected
    device management, and parental controls. Supports multi-carrier eSIM profiles and automatic network selection based
    on coverage.
  version: 1.0.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-connected-wifi-hotspot
  x-acme-domain: connected-services
servers:
  - url: https://av-connected-wifi-hotspot.api.acmevehicles.com/v1
    description: Production
  - url: https://av-connected-wifi-hotspot.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Hotspot
    description: WiFi hotspot configuration
  - name: Data Plans
    description: Data plan management
paths:
  /vehicles/{vin}/wifi:
    get:
      operationId: getHotspotById
      summary: Get hotspot
      description: Get operation for hotspot resources.
      tags:
        - Hotspot
      parameters:
        - &a1
          name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: hotspot identifier
                    example: hotspot-a1b2c3d4
    put:
      operationId: updateHotspotById
      summary: Update hotspot
      description: Update operation for hotspot resources.
      tags:
        - Hotspot
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update hotspot request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: hotspot data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: hotspot identifier
                    example: hotspot-a1b2c3d4
  /vehicles/{vin}/wifi/devices:
    get:
      operationId: listDeviceById
      summary: List device
      description: List operation for device resources.
      tags:
        - Hotspot
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: device identifier
                    example: device-a1b2c3d4
  /vehicles/{vin}/wifi/usage:
    get:
      operationId: getUsageById
      summary: Get usage
      description: Get operation for usage resources.
      tags:
        - Hotspot
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: usage identifier
                    example: usage-a1b2c3d4
  /data-plans:
    get:
      operationId: listPlan
      summary: List plan
      description: List operation for plan resources.
      tags:
        - Hotspot
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: plan identifier
                    example: plan-a1b2c3d4
  /data-plans/{plan_id}/activate:
    post:
      operationId: actionPlanById
      summary: Action plan
      description: Action operation for plan resources.
      tags:
        - Hotspot
      parameters:
        - name: plan_id
          in: path
          required: true
          description: plan id
          schema:
            type: string
      requestBody:
        required: true
        description: Action plan request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: plan data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: plan identifier
                    example: plan-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
