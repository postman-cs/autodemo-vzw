openapi: 3.0.3
info:
  title: Fleet Leasing API
  description: Manage fleet vehicle lease agreements, terms, renewal workflows, and end-of-lease inspections. Provides
    lease vs. buy analysis, residual value tracking, and automated lease return processing with damage assessment
    integration.
  version: 1.1.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-fleet-leasing
  x-acme-domain: fleet-ops
servers:
  - url: https://av-fleet-leasing.api.acmevehicles.com/v1
    description: Production
  - url: https://av-fleet-leasing.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Leases
    description: Lease agreement management
  - name: Returns
    description: Lease return and inspection
paths:
  /leases:
    get:
      operationId: listLease
      summary: List lease
      description: List operation for lease resources.
      tags:
        - Leases
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: lease identifier
                    example: lease-a1b2c3d4
    post:
      operationId: createLease
      summary: Create lease
      description: Create operation for lease resources.
      tags:
        - Leases
      requestBody:
        required: true
        description: Create lease request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: lease data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: lease identifier
                    example: lease-a1b2c3d4
  /leases/{lease_id}:
    get:
      operationId: getLeaseById
      summary: Get lease
      description: Get operation for lease resources.
      tags:
        - Leases
      parameters:
        - &a1
          name: lease_id
          in: path
          required: true
          description: lease id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: lease identifier
                    example: lease-a1b2c3d4
    put:
      operationId: updateLeaseById
      summary: Update lease
      description: Update operation for lease resources.
      tags:
        - Leases
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update lease request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: lease data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: lease identifier
                    example: lease-a1b2c3d4
  /leases/{lease_id}/renew:
    post:
      operationId: actionLeaseById
      summary: Action lease
      description: Action operation for lease resources.
      tags:
        - Leases
      parameters:
        - name: lease_id
          in: path
          required: true
          description: lease id
          schema:
            type: string
      requestBody:
        required: true
        description: Action lease request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: lease data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: lease identifier
                    example: lease-a1b2c3d4
  /leases/{lease_id}/return:
    post:
      operationId: createReturnById
      summary: Create return
      description: Create operation for return resources.
      tags:
        - Leases
      parameters:
        - name: lease_id
          in: path
          required: true
          description: lease id
          schema:
            type: string
      requestBody:
        required: true
        description: Create return request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: return data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: return identifier
                    example: return-a1b2c3d4
  /leases/{lease_id}/inspection:
    get:
      operationId: getInspectionById
      summary: Get inspection
      description: Get operation for inspection resources.
      tags:
        - Leases
      parameters:
        - &a2
          name: lease_id
          in: path
          required: true
          description: lease id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: inspection identifier
                    example: inspection-a1b2c3d4
    post:
      operationId: createInspectionById
      summary: Create inspection
      description: Create operation for inspection resources.
      tags:
        - Leases
      parameters:
        - *a2
      requestBody:
        required: true
        description: Create inspection request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: inspection data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: inspection identifier
                    example: inspection-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
