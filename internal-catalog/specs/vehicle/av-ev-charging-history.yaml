openapi: 3.0.3
info:
  title: Charging History API
  description: Retrieve charging history statements, energy delivered reports, and downloadable receipts for completed
    sessions. Supports date-range filtering, station-level aggregation, and carbon offset calculations for
    sustainability reporting.
  version: 1.8.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-ev-charging-history
  x-acme-domain: ev-services
servers:
  - url: https://av-ev-charging-history.api.acmevehicles.com/v1
    description: Production
  - url: https://av-ev-charging-history.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: History
    description: Query completed charging session records
  - name: Reports
    description: Generate energy and cost reports
paths:
  /history:
    get:
      operationId: listRecord
      summary: List record
      description: List operation for record resources.
      tags:
        - History
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: record identifier
                    example: record-a1b2c3d4
  /history/{record_id}:
    get:
      operationId: getRecordById
      summary: Get record
      description: Get operation for record resources.
      tags:
        - History
      parameters:
        - name: record_id
          in: path
          required: true
          description: record id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: record identifier
                    example: record-a1b2c3d4
  /history/{record_id}/receipt:
    get:
      operationId: getReceiptById
      summary: Get receipt
      description: Get operation for receipt resources.
      tags:
        - History
      parameters:
        - name: record_id
          in: path
          required: true
          description: record id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: receipt identifier
                    example: receipt-a1b2c3d4
  /reports/energy:
    post:
      operationId: createReport
      summary: Create report
      description: Create operation for report resources.
      tags:
        - History
      requestBody:
        required: true
        description: Create report request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: report data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: report identifier
                    example: report-a1b2c3d4
  /reports/cost:
    post:
      operationId: createReport
      summary: Create report
      description: Create operation for report resources.
      tags:
        - History
      requestBody:
        required: true
        description: Create report request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: report data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: report identifier
                    example: report-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
