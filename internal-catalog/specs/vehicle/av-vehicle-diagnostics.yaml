openapi: 3.0.3
info:
  title: Vehicle Diagnostics API
  description: Read OBD-II diagnostic trouble codes (DTCs), freeze-frame data, and module-level fault information.
    Supports standard SAE J1979 PIDs, manufacturer-specific enhanced diagnostics, and automated fault correlation for
    predictive maintenance workflows.
  version: 2.6.0
  contact:
    name: Acme Vehicles API Team
    email: api-support@acmevehicles.com
    url: https://developer.acmevehicles.com
  license:
    name: Proprietary
    url: https://acmevehicles.com/terms
  x-acme-catalog-id: av-vehicle-diagnostics
  x-acme-domain: vehicle-data
servers:
  - url: https://av-vehicle-diagnostics.api.acmevehicles.com/v1
    description: Production
  - url: https://av-vehicle-diagnostics.staging.acmevehicles.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: DTCs
    description: Diagnostic trouble codes and fault data
  - name: Modules
    description: ECU module diagnostics
paths:
  /vehicles/{vin}/dtcs:
    get:
      operationId: listDtcById
      summary: List dtc
      description: List operation for dtc resources.
      tags:
        - DTCs
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: dtc identifier
                    example: dtc-a1b2c3d4
  /vehicles/{vin}/dtcs/{dtc_code}:
    get:
      operationId: getDtcById
      summary: Get dtc
      description: Get operation for dtc resources.
      tags:
        - DTCs
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: dtc_code
          in: path
          required: true
          description: dtc code
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: dtc identifier
                    example: dtc-a1b2c3d4
  /vehicles/{vin}/dtcs/clear:
    post:
      operationId: actionDtcById
      summary: Action dtc
      description: Action operation for dtc resources.
      tags:
        - DTCs
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
      requestBody:
        required: true
        description: Action dtc request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: dtc data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: dtc identifier
                    example: dtc-a1b2c3d4
  /vehicles/{vin}/modules:
    get:
      operationId: listModuleById
      summary: List module
      description: List operation for module resources.
      tags:
        - DTCs
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: module identifier
                    example: module-a1b2c3d4
  /vehicles/{vin}/modules/{module_id}/pids:
    get:
      operationId: listPidById
      summary: List pid
      description: List operation for pid resources.
      tags:
        - DTCs
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: module_id
          in: path
          required: true
          description: module id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: pid identifier
                    example: pid-a1b2c3d4
  /vehicles/{vin}/freeze-frames:
    get:
      operationId: listFreezeFrameById
      summary: List freeze frame
      description: List operation for freeze frame resources.
      tags:
        - DTCs
      parameters:
        - name: vin
          in: path
          required: true
          description: vin
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: freeze_frame identifier
                    example: freeze_frame-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmevehicles.com/authorize
          tokenUrl: https://auth.acmevehicles.com/token
          scopes:
            vehicle:read: Read vehicle data
            vehicle:write: Write vehicle data
            vehicle:control: Control vehicle
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
