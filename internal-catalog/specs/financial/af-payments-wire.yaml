    post:
      operationId: requestWireAmendment
      summary: Request wire amendment
      description: >-
        Submit an amendment request for a submitted wire transfer. The receiving bank must approve the
        amendment. Available amendment types depend on the wire network: Fedwire supports beneficiary and
        amount amendments; SWIFT supports all field amendments.
      tags:
        - Amendments & Inquiries
      requestBody:
        required: true
        description: Request wire amendment request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    amendment_type:
                      type: string
                      description: Field being amended
                      enum:
                        - amount
                        - beneficiary
                        - intermediary
                        - purpose
                        - recall
                    amended_value:
                      type: string
                      description: New value for the amended field
                    reason:
                      type: string
              required:
                - amendment_type
                - amended_value
                - reason
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  amendment_id:
                    type: string
                    format: uuid
                  wire_id:
                    type: string
                    description: Wire transfer identifier
                    format: uuid
