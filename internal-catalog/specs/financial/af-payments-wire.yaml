openapi: 3.0.3
info:
  title: Acme Finance Wire Transfer API
  description: >-
    Domestic and international wire transfer processing via Fedwire, CHIPS, and SWIFT networks. Includes real-time
    OFAC/SDN sanctions screening, beneficiary pre-validation, IMAD/OMAD tracking for Fedwire, SWIFT gpi tracking,
    wire amendments, recall requests, and reusable transfer templates for operational efficiency.
  version: 4.1.0
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-payments-wire
  x-acme-domain: payments
servers:
  - url: https://af-payments-wire.api.acmefin.com/v1
    description: Production
  - url: https://af-payments-wire.staging.acmefin.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Wire Transfers
    description: Initiate, track, and manage wire transfers across Fedwire, CHIPS, and SWIFT
  - name: Beneficiary Validation
    description: Pre-validate beneficiary details and OFAC/SDN sanctions screening
  - name: Amendments & Inquiries
    description: Wire amendments, recall requests, and post-submission modifications
paths:
  /wires:
    get:
      operationId: listWires
      summary: List wire transfers
      description: >-
        Retrieve wire transfers across Fedwire, CHIPS, and SWIFT networks with filtering by status, wire
        type, and date range. Includes IMAD/OMAD tracking data for Fedwire transfers.
      tags:
        - Wire Transfers
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: wire_type
          in: query
          required: false
          description: Filter by wire_type
          schema:
            type: "string"
        - name: status
          in: query
          required: false
          description: Filter by status
          schema:
            type: "string"
        - name: from_date
          in: query
          required: false
          description: Filter by from_date
          schema:
            type: "string"
            format: "date"
        - name: to_date
          in: query
          required: false
          description: Filter by to_date
          schema:
            type: "string"
            format: "date"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        wire_id:
                          type: string
                          description: Wire transfer identifier
                          format: uuid
                        wire_type:
                          type: string
                          description: Wire network
                          enum:
                            - fedwire
                            - chips
                            - swift
                        imad:
                          type: string
                          description: Input Message Accountability Data (Fedwire)
                          example: "20250615MMQFMP070000001"
                        omad:
                          type: string
                          description: Output Message Accountability Data (Fedwire)
                          nullable: true
                        amount:
                          type: number
                          description: Transaction amount
                          format: double
                          example: 1500.0
                        currency:
                          type: string
                          description: ISO 4217 currency code
                          example: "USD"
                          minLength: 3
                          maxLength: 3
                        sender_name:
                          type: string
                          description: Originator name
                        sender_account:
                          type: string
                          description: Originator account number
                        sender_routing:
                          type: string
                          description: Originator routing number
                        beneficiary_name:
                          type: string
                          description: Beneficiary name
                        beneficiary_account:
                          type: string
                          description: Beneficiary account number
                        beneficiary_routing:
                          type: string
                          description: Beneficiary routing number or SWIFT BIC
                        intermediary_bank:
                          type: string
                          description: Intermediary/correspondent bank identifier
                          nullable: true
                        status:
                          type: string
                          enum:
                            - pending_ofac
                            - ofac_cleared
                            - submitted
                            - acknowledged
                            - completed
                            - rejected
                            - returned
                            - amended
                        purpose_of_wire:
                          type: string
                          description: Business purpose of the transfer
                        reference_for_beneficiary:
                          type: string
                          description: Reference information for the beneficiary
                          maxLength: 140
                      required:
                        - wire_id
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: initiateWire
      summary: Initiate wire transfer
      description: >-
        Submit a domestic or international wire transfer. All wires undergo OFAC/SDN screening before
        submission to the wire network. Fedwire transfers settle in real-time during operating hours (Mon-
        Fri 9:00 PM ET to 6:30 PM ET). CHIPS transfers are netted and settled at end of day.
      tags:
        - Wire Transfers
      requestBody:
        required: true
        description: Initiate wire transfer request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    wire_type:
                      type: string
                      description: Wire network
                      enum:
                        - fedwire
                        - chips
                        - swift
                    amount:
                      type: number
                      description: Transaction amount
                      format: double
                      example: 1500.0
                    currency:
                      type: string
                      description: ISO 4217 currency code
                      example: "USD"
                      minLength: 3
                      maxLength: 3
                    sender_name:
                      type: string
                      description: Originator name
                    sender_account:
                      type: string
                      description: Originator account number
                    sender_routing:
                      type: string
                      description: Originator routing number
                    beneficiary_name:
                      type: string
                      description: Beneficiary name
                    beneficiary_account:
                      type: string
                      description: Beneficiary account number
                    beneficiary_routing:
                      type: string
                      description: Beneficiary routing number or SWIFT BIC
                    purpose_of_wire:
                      type: string
                      description: Business purpose of the transfer
                    reference_for_beneficiary:
                      type: string
                      description: Reference information for the beneficiary
                      maxLength: 140
              required:
                - wire_type
                - amount
                - currency
                - sender_account
                - sender_routing
                - beneficiary_name
                - beneficiary_account
                - beneficiary_routing
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  wire_id:
                    type: string
                    description: Wire transfer identifier
                    format: uuid
                  wire_type:
                    type: string
                    description: Wire network
                    enum:
                      - fedwire
                      - chips
                      - swift
                  imad:
                    type: string
                    description: Input Message Accountability Data (Fedwire)
                    example: "20250615MMQFMP070000001"
                  omad:
                    type: string
                    description: Output Message Accountability Data (Fedwire)
                    nullable: true
                  amount:
                    type: number
                    description: Transaction amount
                    format: double
                    example: 1500.0
                  currency:
                    type: string
                    description: ISO 4217 currency code
                    example: "USD"
                    minLength: 3
                    maxLength: 3
                  sender_name:
                    type: string
                    description: Originator name
                  sender_account:
                    type: string
                    description: Originator account number
                  sender_routing:
                    type: string
                    description: Originator routing number
                  beneficiary_name:
                    type: string
                    description: Beneficiary name
                  beneficiary_account:
                    type: string
                    description: Beneficiary account number
                  beneficiary_routing:
                    type: string
                    description: Beneficiary routing number or SWIFT BIC
                  intermediary_bank:
                    type: string
                    description: Intermediary/correspondent bank identifier
                    nullable: true
                  status:
                    type: string
                    enum:
                      - pending_ofac
                      - ofac_cleared
                      - submitted
                      - acknowledged
                      - completed
                      - rejected
                      - returned
                      - amended
                  purpose_of_wire:
                    type: string
                    description: Business purpose of the transfer
                  reference_for_beneficiary:
                    type: string
                    description: Reference information for the beneficiary
                    maxLength: 140
                required:
                  - wire_id
                  - status
                  - imad
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /wires/{wire_id}:
    get:
      operationId: getWire
      summary: Get wire transfer
      description: >-
        Retrieve wire transfer details including IMAD/OMAD, OFAC screening results, intermediary bank chain,
        and current status.
      tags:
        - Wire Transfers
      parameters:
        - name: wire_id
          in: path
          required: true
          description: Unique wire id
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  wire_id:
                    type: string
                    description: Wire transfer identifier
                    format: uuid
                  wire_type:
                    type: string
                    description: Wire network
                    enum:
                      - fedwire
                      - chips
                      - swift
                  imad:
                    type: string
                    description: Input Message Accountability Data (Fedwire)
                    example: "20250615MMQFMP070000001"
                  omad:
                    type: string
                    description: Output Message Accountability Data (Fedwire)
                    nullable: true
                  amount:
                    type: number
                    description: Transaction amount
                    format: double
                    example: 1500.0
                  currency:
                    type: string
                    description: ISO 4217 currency code
                    example: "USD"
                    minLength: 3
                    maxLength: 3
                  sender_name:
                    type: string
                    description: Originator name
                  sender_account:
                    type: string
                    description: Originator account number
                  sender_routing:
                    type: string
                    description: Originator routing number
                  beneficiary_name:
                    type: string
                    description: Beneficiary name
                  beneficiary_account:
                    type: string
                    description: Beneficiary account number
                  beneficiary_routing:
                    type: string
                    description: Beneficiary routing number or SWIFT BIC
                  intermediary_bank:
                    type: string
                    description: Intermediary/correspondent bank identifier
                    nullable: true
                  status:
                    type: string
                    enum:
                      - pending_ofac
                      - ofac_cleared
                      - submitted
                      - acknowledged
                      - completed
                      - rejected
                      - returned
                      - amended
                  purpose_of_wire:
                    type: string
                    description: Business purpose of the transfer
                  reference_for_beneficiary:
                    type: string
                    description: Reference information for the beneficiary
                    maxLength: 140
                required:
                  - wire_id
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    patch:
      operationId: updateWireDraft
      summary: Update wire draft
      description: >-
        Modify a wire transfer in draft or pending_ofac status. Once submitted to the network, use the
        amendment endpoint instead.
      tags:
        - Wire Transfers
      parameters:
        - name: wire_id
          in: path
          required: true
          description: Unique wire id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Update wire draft request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    beneficiary_name:
                      type: string
                      description: Beneficiary name
                    beneficiary_account:
                      type: string
                      description: Beneficiary account number
                    beneficiary_routing:
                      type: string
                      description: Beneficiary routing number or SWIFT BIC
                    amount:
                      type: number
                      description: Transaction amount
                      format: double
                      example: 1500.0
                    purpose_of_wire:
                      type: string
                      description: Business purpose of the transfer
                    reference_for_beneficiary:
                      type: string
                      description: Reference information for the beneficiary
                      maxLength: 140
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  wire_id:
                    type: string
                    description: Wire transfer identifier
                    format: uuid
                  wire_type:
                    type: string
                    description: Wire network
                    enum:
                      - fedwire
                      - chips
                      - swift
                  imad:
                    type: string
                    description: Input Message Accountability Data (Fedwire)
                    example: "20250615MMQFMP070000001"
                  omad:
                    type: string
                    description: Output Message Accountability Data (Fedwire)
                    nullable: true
                  amount:
                    type: number
                    description: Transaction amount
                    format: double
                    example: 1500.0
                  currency:
                    type: string
                    description: ISO 4217 currency code
                    example: "USD"
                    minLength: 3
                    maxLength: 3
                  sender_name:
                    type: string
                    description: Originator name
                  sender_account:
                    type: string
                    description: Originator account number
                  sender_routing:
                    type: string
                    description: Originator routing number
                  beneficiary_name:
                    type: string
                    description: Beneficiary name
                  beneficiary_account:
                    type: string
                    description: Beneficiary account number
                  beneficiary_routing:
                    type: string
                    description: Beneficiary routing number or SWIFT BIC
                  intermediary_bank:
                    type: string
                    description: Intermediary/correspondent bank identifier
                    nullable: true
                  status:
                    type: string
                    enum:
                      - pending_ofac
                      - ofac_cleared
                      - submitted
                      - acknowledged
                      - completed
                      - rejected
                      - returned
                      - amended
                  purpose_of_wire:
                    type: string
                    description: Business purpose of the transfer
                  reference_for_beneficiary:
                    type: string
                    description: Reference information for the beneficiary
                    maxLength: 140
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /wires/{wire_id}/cancel:
    post:
      operationId: cancelWire
      summary: Cancel wire transfer
      description: >-
        Request cancellation of a wire transfer. For Fedwire, sends a reversal request (which the receiving
        bank may decline). For CHIPS, cancellation is possible before the netting cycle closes.
      tags:
        - Wire Transfers
      parameters:
        - name: wire_id
          in: path
          required: true
          description: Unique wire id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Cancel wire transfer request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    reason:
                      type: string
                      description: Cancellation reason
              required:
                - reason
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  wire_id:
                    type: string
                    description: Wire transfer identifier
                    format: uuid
                  cancellation_status:
                    type: string
                    enum:
                      - cancelled
                      - reversal_requested
                      - reversal_pending
                  cancellation_reference:
                    type: string
                required:
                  - wire_id
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /wires/{wire_id}/status:
    get:
      operationId: getWireStatus
      summary: Get wire status
      description: >-
        Retrieve real-time wire transfer status with network-level tracking. For Fedwire, shows IMAD/OMAD
        acknowledgment. For SWIFT, shows gpi tracking events.
      tags:
        - Wire Transfers
      parameters:
        - name: wire_id
          in: path
          required: true
          description: Unique wire id
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  wire_id:
                    type: string
                    description: Wire transfer identifier
                    format: uuid
                  status:
                    type: string
                    enum:
                      - pending_ofac
                      - ofac_cleared
                      - submitted
                      - acknowledged
                      - completed
                      - rejected
                      - returned
                      - amended
                  network_status:
                    type: string
                  imad:
                    type: string
                    description: Input Message Accountability Data (Fedwire)
                    example: "20250615MMQFMP070000001"
                  omad:
                    type: string
                    description: Output Message Accountability Data (Fedwire)
                    nullable: true
                  last_updated:
                    type: string
                    format: date-time
                  tracking_events:
                    type: array
                    items:
                      type: object
                required:
                  - wire_id
                  - status
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /wires/{wire_id}/ofac-screening:
    get:
      operationId: getOfacScreening
      summary: Get OFAC screening results
      description: >-
        Retrieve detailed OFAC/SDN screening results for a wire transfer. Shows screening against the
        Specially Designated Nationals list, sectoral sanctions, and country-based restrictions.
      tags:
        - Wire Transfers
      parameters:
        - name: wire_id
          in: path
          required: true
          description: Unique wire id
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  wire_id:
                    type: string
                    description: Wire transfer identifier
                    format: uuid
                  overall_result:
                    type: string
                    enum:
                      - clear
                      - potential_match
                      - blocked
                  screened_parties:
                    type: array
                    description: Screening results for each party (sender, beneficiary, intermediary)
                    items:
                      type: object
                  screened_at:
                    type: string
                    format: date-time
                required:
                  - wire_id
                  - overall_result
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /wires/beneficiary-validation:
    post:
      operationId: validateWireBeneficiary
      summary: Validate wire beneficiary
      description: >-
        Pre-validate wire beneficiary details before initiating a transfer. Performs OFAC screening,
        account/routing number validation, and fuzzy name matching against the receiving institution's
        records (where supported via account validation services).
      tags:
        - Beneficiary Validation
      requestBody:
        required: true
        description: Validate wire beneficiary request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    beneficiary_name:
                      type: string
                      description: Beneficiary name
                    beneficiary_account:
                      type: string
                      description: Beneficiary account number
                    beneficiary_routing:
                      type: string
                      description: Beneficiary routing number or SWIFT BIC
                    wire_type:
                      type: string
                      description: Wire network
                      enum:
                        - fedwire
                        - chips
                        - swift
              required:
                - beneficiary_name
                - beneficiary_account
                - beneficiary_routing
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  validation_id:
                    type: string
                    format: uuid
                  beneficiary_name:
                    type: string
                    description: Beneficiary name
                  beneficiary_account:
                    type: string
                    description: Beneficiary account number
                  beneficiary_routing:
                    type: string
                    description: Beneficiary routing number or SWIFT BIC
                  name_match_score:
                    type: number
                    description: Fuzzy name match confidence (0-1)
                    format: double
                    example: 0.95
                  account_valid:
                    type: boolean
                  ofac_screening_result:
                    type: string
                    description: OFAC SDN list screening result
                    enum:
                      - clear
                      - potential_match
                      - blocked
                  ofac_match_details:
                    type: string
                    description: OFAC match details if potential_match
                    nullable: true
                required:
                  - validation_id
                  - account_valid
                  - ofac_screening_result
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /wires/beneficiary-validation/{validation_id}:
    get:
      operationId: getBeneficiaryValidation
      summary: Get beneficiary validation
      description: >-
        Retrieve beneficiary validation results including OFAC screening details and name match confidence
        score.
      tags:
        - Beneficiary Validation
      parameters:
        - name: validation_id
          in: path
          required: true
          description: Unique validation id
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  validation_id:
                    type: string
                    format: uuid
                  beneficiary_name:
                    type: string
                    description: Beneficiary name
                  beneficiary_account:
                    type: string
                    description: Beneficiary account number
                  beneficiary_routing:
                    type: string
                    description: Beneficiary routing number or SWIFT BIC
                  name_match_score:
                    type: number
                    description: Fuzzy name match confidence (0-1)
                    format: double
                    example: 0.95
                  account_valid:
                    type: boolean
                  ofac_screening_result:
                    type: string
                    description: OFAC SDN list screening result
                    enum:
                      - clear
                      - potential_match
                      - blocked
                  ofac_match_details:
                    type: string
                    description: OFAC match details if potential_match
                    nullable: true
                required:
                  - validation_id
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /wires/ofac-batch-screen:
    post:
      operationId: batchOfacScreen
      summary: Batch OFAC screening
      description: >-
        Submit a batch of names and entities for OFAC/SDN screening. Returns screening results for each
        party. Used for pre-screening before wire origination or periodic re-screening of existing
        beneficiaries.
      tags:
        - Beneficiary Validation
      requestBody:
        required: true
        description: Batch OFAC screening request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    parties:
                      type: array
                      description: List of parties to screen
                      items:
                        type: object
                    screening_lists:
                      type: array
                      description: Sanctions lists to screen against
                      items:
                        type: string
                        example: "OFAC_SDN"
              required:
                - parties
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  batch_screen_id:
                    type: string
                    format: uuid
                  results_count:
                    type: integer
                  clear_count:
                    type: integer
                  potential_match_count:
                    type: integer
                  blocked_count:
                    type: integer
                required:
                  - batch_screen_id
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /wires/{wire_id}/amendments:
    get:
      operationId: listWireAmendments
      summary: List wire amendments
      description: >-
        Retrieve amendment requests for a wire transfer. Amendments allow modification of wire details after
