  /wires/{wire_id}/recall:
    post:
      operationId: recallWire
      summary: Recall wire transfer
      description: >-
        Request a recall (return of funds) for a completed wire transfer. For Fedwire, sends a drawback
        request to the receiving bank. For SWIFT, sends an MT n92 cancellation request. The receiving bank
        may decline if funds have already been disbursed.
      tags:
        - Amendments & Inquiries
      parameters:
        - name: wire_id
          in: path
          required: true
          description: Unique wire id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Recall wire transfer request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    reason:
                      type: string
                      description: Recall reason
                      enum:
                        - duplicate_payment
                        - incorrect_amount
                        - incorrect_beneficiary
                        - fraud
                        - technical_error
                    contact_name:
                      type: string
                    contact_phone:
                      type: string
              required:
                - reason
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  recall_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    example: "recall_requested"
                  recall_reference:
                    type: string
                required:
                  - recall_id
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
