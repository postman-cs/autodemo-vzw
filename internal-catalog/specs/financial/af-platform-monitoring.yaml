openapi: 3.0.3
info:
  title: Acme Finance Monitoring & Observability API
  description: >-
    Full-stack monitoring platform providing metric collection, alerting with PagerDuty/Slack integration,
    customizable dashboards, synthetic health checks, and SLO tracking. Supports custom metrics (counters, gauges,
    histograms), PromQL-compatible queries, multi-condition alert rules, and automated incident creation with
    runbook links.
  version: 3.0.2
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-platform-monitoring
  x-acme-domain: platform
servers:
  - url: https://af-platform-monitoring.api.acmefin.com/v1
    description: Production
  - url: https://af-platform-monitoring.staging.acmefin.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Metrics
    description: Push and query application metrics with PromQL-compatible syntax
  - name: Alerts & Incidents
    description: Configure alerts, manage incidents, and define SLOs
  - name: Dashboards
    description: Create and manage monitoring dashboards with widget configuration
paths:
  /metrics:
    get:
      operationId: listMetricNames
      summary: List metric names
      description: >-
        List all available metric names with their types, labels, and ingestion statistics.
      tags:
        - Metrics
      parameters:
        - name: prefix
          in: query
          required: false
          description: "Filter by metric name prefix"
          schema:
            type: "string"
        - name: type
          in: query
          required: false
          description: "Filter by metric type"
          schema:
            type: "string"
            enum:
              - counter
              - gauge
              - histogram
              - summary
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  metrics:
                    type: array
                    description: "Available metric names and metadata"
                    items:
                      type: object
                  total_series:
                    type: integer
                    description: "Total unique time series"
                    example: 45230
                required:
                  - metrics
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: pushMetrics
      summary: Push custom metrics
      description: >-
        Push one or more custom metric data points. Supports counter, gauge, histogram, and summary types.
        Metrics are ingested asynchronously and available for query within 15 seconds.
      tags:
        - Metrics
      requestBody:
        required: true
        description: Push custom metrics request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    metrics:
                      type: array
                      description: "Metric data points to push"
                      items:
                        type: object
                    source:
                      type: string
                      description: "Source service"
                      example: "payments-service"
              required:
                - metrics
                - source
      responses:
        "202":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted:
                    type: integer
                    description: "Data points accepted"
                    example: 25
                  rejected:
                    type: integer
                    description: "Points rejected"
                    example: 0
                required:
                  - accepted
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /metrics/query:
    post:
      operationId: queryMetrics
      summary: Query metrics
      description: >-
        Execute a PromQL-compatible query against the metrics store. Supports instant and range queries with
        configurable step intervals.
      tags:
        - Metrics
      requestBody:
        required: true
        description: Query metrics request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    query:
                      type: string
                      description: "PromQL expression"
                      example: 'rate(http_requests_total{service="payments"}[5m])'
                    start:
                      type: string
                      description: "Range start"
                      format: date-time
                      example: "2025-06-15T14:30:00Z"
                    end:
                      type: string
                      description: "Range end"
                      format: date-time
                      example: "2025-06-15T14:30:00Z"
                    step:
                      type: string
                      description: "Query step interval"
                      example: "1m"
                    type:
                      type: string
                      description: "Query type"
                      example: "instant"
                      enum:
                        - instant
                        - range
              required:
                - query
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  result_type:
                    type: string
                    description: "Result data type"
                    example: "vector"
                    enum:
                      - vector
                      - matrix
                      - scalar
                  data:
                    type: array
                    description: "Query result data points"
                    items:
                      type: object
                  took_ms:
                    type: integer
                    description: "Query time"
                    example: 32
                required:
                  - result_type
                  - data
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /alerts:
    get:
      operationId: listAlerts
      summary: List monitoring alerts
      description: >-
        List all alert rules with their current state, severity, and notification channel configuration.
      tags:
        - Alerts & Incidents
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        alert_id:
                          type: string
                          description: "Alert ID"
                          format: uuid
                          example: "alt-6a7b8c9d"
                        name:
                          type: string
                          description: "Alert name"
                          example: "High Error Rate"
                        query:
                          type: string
                          description: "PromQL condition"
                          example: "rate(http_5xx_total[5m]) > 0.05"
                        severity:
                          type: string
                          description: "Alert severity"
                          example: "info"
                          enum:
                            - info
                            - warning
                            - critical
                            - page
                        status:
                          type: string
                          description: "Alert status"
                          example: "active"
                          enum:
                            - active
                            - firing
                            - silenced
                            - resolved
                        channels:
                          type: array
                          description: "Notification channels"
                          items:
                            type: string
                        last_fired_at:
                          type: string
                          description: "Last trigger"
                          format: date-time
                          example: "2025-06-15T14:30:00Z"
                      required:
                        - alert_id
                        - name
                        - severity
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: createAlert
      summary: Create alert rule
      description: >-
        Create a new alert rule with PromQL condition, evaluation interval, and notification channels.
      tags:
        - Alerts & Incidents
      requestBody:
        required: true
        description: Create alert rule request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    name:
                      type: string
                      description: "Name"
                      example: "Latency SLO Breach"
                    query:
                      type: string
                      description: "PromQL condition"
                      example: "histogram_quantile(0.99, rate(request_duration_seconds_bucket[5m])) > 0.5"
                    for_duration:
                      type: string
                      description: "Duration condition must hold"
                      example: "5m"
                    severity:
                      type: string
                      description: "Severity"
                      example: "info"
                      enum:
                        - info
                        - warning
                        - critical
                        - page
                    channels:
                      type: array
                      description: "Notification channels"
                      items:
                        type: string
                    runbook_url:
                      type: string
                      description: "Runbook link"
                      example: "https://wiki.acmefin.com/runbooks/latency-slo"
                    labels:
                      type: object
                      description: "Alert labels for routing"
              required:
                - name
                - query
                - severity
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  alert_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "alt-6a7b8c9d"
                  name:
                    type: string
                    description: "Name"
                    example: "Latency SLO Breach"
                  status:
                    type: string
                    description: "Status"
                    example: "active"
                required:
                  - alert_id
                  - name
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /alerts/{alert_id}:
    get:
      operationId: getAlert
      summary: Get alert rule
      description: Retrieve alert configuration and firing history.
      tags:
        - Alerts & Incidents
      parameters:
        - name: alert_id
          in: path
          required: true
          description: "Unique alert id"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  alert_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "alt-6a7b8c9d"
                  name:
                    type: string
                    description: "Name"
                    example: "High Error Rate"
                  query:
                    type: string
                    description: "Condition"
                    example: "rate(http_5xx_total[5m]) > 0.05"
                  severity:
                    type: string
                    description: "Severity"
                    example: "critical"
                  status:
                    type: string
                    description: "Status"
                    example: "active"
                required:
                  - alert_id
                  - name
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    patch:
      operationId: updateAlert
      summary: Update alert rule
      description: Update alert configuration.
      tags:
        - Alerts & Incidents
      parameters:
        - name: alert_id
          in: path
          required: true
          description: "Unique alert id"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Update alert rule request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    query:
                      type: string
                      description: "Updated condition"
                      example: "rate(http_5xx_total[5m]) > 0.1"
                    severity:
                      type: string
                      description: "Severity"
                      example: "info"
                      enum:
                        - info
                        - warning
                        - critical
                        - page
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  alert_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "alt-6a7b8c9d"
                  updated_at:
                    type: string
                    description: "ISO 8601 timestamp"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - alert_id
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
    delete:
      operationId: deleteAlert
      summary: Delete alert
      description: Remove an alert rule.
      tags:
        - Alerts & Incidents
      parameters:
        - name: alert_id
          in: path
          required: true
          description: "Unique alert id"
          schema:
            type: "string"
      responses:
        "204":
          description: Resource deleted successfully
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /dashboards:
    get:
      operationId: listDashboards
      summary: List dashboards
      description: List all monitoring dashboards with summary metadata.
      tags:
        - Dashboards
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        dashboard_id:
                          type: string
                          description: "Dashboard ID"
                          format: uuid
                          example: "dsh-4a5b6c7d"
                        name:
                          type: string
                          description: "Dashboard name"
                          example: "Payment Service Overview"
                        owner:
                          type: string
                          description: "Dashboard owner"
                          example: "platform-team"
                        widgets_count:
                          type: integer
                          description: "Number of widgets"
                          example: 12
                        updated_at:
                          type: string
                          description: "ISO 8601 timestamp"
                          format: date-time
                          example: "2025-06-15T14:30:00Z"
                      required:
                        - dashboard_id
                        - name
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: createDashboard
      summary: Create dashboard
      description: Create a new monitoring dashboard with configurable widgets.
      tags:
        - Dashboards
      requestBody:
        required: true
        description: Create dashboard request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    name:
                      type: string
                      description: "Name"
                      example: "Account Service Metrics"
                    description:
                      type: string
                      description: "Description"
                      example: "Key metrics for account service"
                    widgets:
                      type: array
                      description: "Dashboard widgets"
                      items:
                        type: object
                    refresh_interval_seconds:
                      type: integer
                      description: "Auto-refresh interval"
                      example: 30
              required:
                - name
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  dashboard_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "dsh-4a5b6c7d"
                  name:
                    type: string
                    description: "Name"
                    example: "Account Service Metrics"
                required:
                  - dashboard_id
                  - name
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /dashboards/{dashboard_id}:
    get:
      operationId: getDashboard
      summary: Get dashboard
      description: Retrieve full dashboard configuration with widget definitions.
      tags:
        - Dashboards
      parameters:
        - name: dashboard_id
          in: path
          required: true
          description: "Unique dashboard id"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  dashboard_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "dsh-4a5b6c7d"
                  name:
                    type: string
                    description: "Name"
                    example: "Payment Service Overview"
                  widgets:
                    type: array
                    description: "Widget configs"
                    items:
                      type: object
                required:
                  - dashboard_id
                  - name
                  - widgets
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    patch:
      operationId: updateDashboard
      summary: Update dashboard
      description: Update dashboard layout and widgets.
      tags:
        - Dashboards
      parameters:
        - name: dashboard_id
          in: path
          required: true
          description: "Unique dashboard id"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Update dashboard request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    name:
                      type: string
                      description: "Name"
                      example: "Payment Service v2"
                    widgets:
                      type: array
                      description: "Updated widgets"
                      items:
                        type: object
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  dashboard_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "dsh-4a5b6c7d"
                  updated_at:
                    type: string
                    description: "ISO 8601 timestamp"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - dashboard_id
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
    delete:
      operationId: deleteDashboard
      summary: Delete dashboard
      description: Remove a dashboard.
      tags:
        - Dashboards
      parameters:
        - name: dashboard_id
          in: path
          required: true
          description: "Unique dashboard id"
          schema:
            type: "string"
      responses:
        "204":
          description: Resource deleted successfully
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /health-checks:
    get:
      operationId: listHealthChecks
      summary: List health checks
      description: List synthetic health check probes configured to monitor service availability.
      tags:
        - Alerts & Incidents
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        check_id:
                          type: string
                          description: "Check ID"
                          format: uuid
                          example: "hc-8a9b0c1d"
                        name:
                          type: string
                          description: "Check name"
                          example: "Payment API Availability"
                        url:
                          type: string
                          description: "Target URL"
                          example: "https://payments.acmefin.com/health"
                        method:
                          type: string
                          description: "HTTP method"
                          example: "GET"
                          enum:
                            - GET
                            - POST
                            - HEAD
                        interval_seconds:
                          type: integer
                          description: "Check interval"
                          example: 30
                        status:
                          type: string
                          description: "Current status"
                          example: "passing"
                          enum:
                            - passing
                            - failing
                            - unknown
                        uptime_percent:
                          type: number
                          description: "30-day uptime"
                          format: double
                          example: 99.95
                      required:
                        - check_id
                        - name
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: createHealthCheck
      summary: Create health check
      description: Create a synthetic health check probe.
      tags:
        - Alerts & Incidents
      requestBody:
        required: true
        description: Create health check request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    name:
                      type: string
                      description: "Name"
                      example: "Account API"
                    url:
                      type: string
                      description: "URL"
                      example: "https://accounts.acmefin.com/health"
                    method:
                      type: string
                      description: "Method"
                      example: "GET"
                      enum:
                        - GET
                        - POST
                        - HEAD
                    interval_seconds:
                      type: integer
                      description: "Interval"
                      example: 30
                    timeout_seconds:
                      type: integer
                      description: "Timeout"
                      example: 10
                    expected_status:
                      type: integer
                      description: "Expected HTTP status"
                      example: 200
                    regions:
                      type: array
                      description: "Check from these regions"
                      items:
                        type: string
              required:
                - name
