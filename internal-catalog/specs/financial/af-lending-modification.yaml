openapi: 3.0.3
info:
  title: Acme Finance Loan Modification API
  description: >-
    Process loan modification requests including forbearance, rate reductions, term extensions, and principal
    forgiveness. Manages trial payment periods and permanent modification conversion. Compliant with CFPB loss
    mitigation requirements under Regulation X and investor waterfall guidelines for GSE-backed loans.
  version: 2.0.0
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-lending-modification
  x-acme-domain: lending
servers:
  - url: https://af-lending-modification.api.acmefin.com/v1
    description: Production
  - url: https://af-lending-modification.staging.acmefin.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Modifications
    description: Loan modification request processing
  - name: Trial Periods
    description: Trial payment period management
paths:
  /modifications:
    get:
      operationId: listModifications
      summary: List modification requests
      description: >-
        Retrieve loan modification requests with filtering by loan, type, status, or hardship reason.
        Returns current terms comparison and trial period status.
      tags:
        - Modifications
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: loan_id
          in: query
          required: false
          description: "Filter by loan"
          schema:
            type: "string"
        - name: status
          in: query
          required: false
          description: "Filter by status"
          schema:
            type: "string"
        - name: type
          in: query
          required: false
          description: "Filter by modification type"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        modification_id:
                          type: string
                          description: "Modification request identifier"
                          example: "mod-880056"
                        loan_id:
                          type: string
                          description: "Loan being modified"
                          example: "loan-440028"
                        type:
                          type: string
                          description: "Modification type"
                          example: "RATE_REDUCTION"
                          enum:
                            - FORBEARANCE
                            - DEFERMENT
                            - RATE_REDUCTION
                            - TERM_EXTENSION
                            - PRINCIPAL_FORGIVENESS
                            - CAPITALIZATION
                            - COMBINATION
                        status:
                          type: string
                          description: "Request status"
                          example: "TRIAL_PERIOD"
                          enum:
                            - REQUESTED
                            - UNDER_REVIEW
                            - APPROVED
                            - TRIAL_PERIOD
                            - PERMANENT
                            - DENIED
                            - WITHDRAWN
                            - CANCELLED
                        original_rate:
                          type: number
                          description: "Original interest rate"
                          format: double
                          example: 6.75
                        modified_rate:
                          type: number
                          description: "Modified interest rate"
                          format: double
                          example: 4.5
                        original_payment:
                          type: number
                          description: "Original monthly payment"
                          format: double
                          example: 1842.0
                        modified_payment:
                          type: number
                          description: "Modified monthly payment"
                          format: double
                          example: 1456.0
                        trial_start_date:
                          type: string
                          description: "Trial period start"
                          format: date
                          example: "2026-04-01"
                        trial_end_date:
                          type: string
                          description: "Trial period end"
                          format: date
                          example: "2026-06-30"
                        hardship_reason:
                          type: string
                          description: "Borrower hardship reason"
                          example: "JOB_LOSS"
                          enum:
                            - JOB_LOSS
                            - INCOME_REDUCTION
                            - MEDICAL
                            - DIVORCE
                            - DEATH_OF_COBORROWER
                            - NATURAL_DISASTER
                            - MILITARY_SERVICE
                            - OTHER
                        requested_at:
                          type: string
                          description: "Request timestamp"
                          format: date-time
                          example: "2026-02-01T12:00:00Z"
                      required:
                        - modification_id
                        - loan_id
                        - type
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: requestModification
      summary: Request loan modification
      description: >-
        Submit a loan modification request with hardship documentation. Evaluates the borrower against
        available modification options using the investor-specific waterfall. Requires income documentation
        and hardship affidavit for most modification types.
      tags:
        - Modifications
      requestBody:
        required: true
        description: Request loan modification request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                loan_id:
                  type: string
                  description: "Loan to modify"
                  example: "loan-440028"
                type:
                  type: string
                  description: "Requested modification type"
                  example: "RATE_REDUCTION"
                hardship_reason:
                  type: string
                  description: "Hardship reason code"
                  example: "JOB_LOSS"
                monthly_income:
                  type: number
                  description: "Current gross monthly income"
                  format: double
                  example: 4500.0
                monthly_expenses:
                  type: number
                  description: "Total monthly expenses"
                  format: double
                  example: 3800.0
                hardship_start_date:
                  type: string
                  description: "When hardship began"
                  format: date
                  example: "2025-11-15"
              required:
                - loan_id
                - type
                - hardship_reason
                - monthly_income
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  modification_id:
                    type: string
                    description: "Modification request identifier"
                    example: "mod-880056"
                  loan_id:
                    type: string
                    description: "Loan being modified"
                    example: "loan-440028"
                  type:
                    type: string
                    description: "Modification type"
                    example: "RATE_REDUCTION"
                    enum:
                      - FORBEARANCE
                      - DEFERMENT
                      - RATE_REDUCTION
                      - TERM_EXTENSION
                      - PRINCIPAL_FORGIVENESS
                      - CAPITALIZATION
                      - COMBINATION
                  status:
                    type: string
                    description: "Request status"
                    example: "TRIAL_PERIOD"
                    enum:
                      - REQUESTED
                      - UNDER_REVIEW
                      - APPROVED
                      - TRIAL_PERIOD
                      - PERMANENT
                      - DENIED
                      - WITHDRAWN
                      - CANCELLED
                  original_rate:
                    type: number
                    description: "Original interest rate"
                    format: double
                    example: 6.75
                  modified_rate:
                    type: number
                    description: "Modified interest rate"
                    format: double
                    example: 4.5
                  original_payment:
                    type: number
                    description: "Original monthly payment"
                    format: double
                    example: 1842.0
                  modified_payment:
                    type: number
                    description: "Modified monthly payment"
                    format: double
                    example: 1456.0
                  trial_start_date:
                    type: string
                    description: "Trial period start"
                    format: date
                    example: "2026-04-01"
                  trial_end_date:
                    type: string
                    description: "Trial period end"
                    format: date
                    example: "2026-06-30"
                  hardship_reason:
                    type: string
                    description: "Borrower hardship reason"
                    example: "JOB_LOSS"
                    enum:
                      - JOB_LOSS
                      - INCOME_REDUCTION
                      - MEDICAL
                      - DIVORCE
                      - DEATH_OF_COBORROWER
                      - NATURAL_DISASTER
                      - MILITARY_SERVICE
                      - OTHER
                  requested_at:
                    type: string
                    description: "Request timestamp"
                    format: date-time
                    example: "2026-02-01T12:00:00Z"
                required:
                  - modification_id
                  - loan_id
                  - type
                  - status
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /modifications/{modification_id}:
    get:
      operationId: getModification
      summary: Get modification details
      description: >-
        Retrieve complete modification request including terms comparison, trial period schedule, required
        documents checklist, and decision rationale.
      tags:
        - Modifications
      parameters:
        - name: modification_id
          in: path
          required: true
          description: "Unique modification id"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  modification_id:
                    type: string
                    description: "Modification request identifier"
                    example: "mod-880056"
                  loan_id:
                    type: string
                    description: "Loan being modified"
                    example: "loan-440028"
                  type:
                    type: string
                    description: "Modification type"
                    example: "RATE_REDUCTION"
                    enum:
                      - FORBEARANCE
                      - DEFERMENT
                      - RATE_REDUCTION
                      - TERM_EXTENSION
                      - PRINCIPAL_FORGIVENESS
                      - CAPITALIZATION
                      - COMBINATION
                  status:
                    type: string
                    description: "Request status"
                    example: "TRIAL_PERIOD"
                    enum:
                      - REQUESTED
                      - UNDER_REVIEW
                      - APPROVED
                      - TRIAL_PERIOD
                      - PERMANENT
                      - DENIED
                      - WITHDRAWN
                      - CANCELLED
                  original_rate:
                    type: number
                    description: "Original interest rate"
                    format: double
                    example: 6.75
                  modified_rate:
                    type: number
                    description: "Modified interest rate"
                    format: double
                    example: 4.5
                  original_payment:
                    type: number
                    description: "Original monthly payment"
                    format: double
                    example: 1842.0
                  modified_payment:
                    type: number
                    description: "Modified monthly payment"
                    format: double
                    example: 1456.0
                  trial_start_date:
                    type: string
                    description: "Trial period start"
                    format: date
                    example: "2026-04-01"
                  trial_end_date:
                    type: string
                    description: "Trial period end"
                    format: date
                    example: "2026-06-30"
                  hardship_reason:
                    type: string
                    description: "Borrower hardship reason"
                    example: "JOB_LOSS"
                    enum:
                      - JOB_LOSS
                      - INCOME_REDUCTION
                      - MEDICAL
                      - DIVORCE
                      - DEATH_OF_COBORROWER
                      - NATURAL_DISASTER
                      - MILITARY_SERVICE
                      - OTHER
                  requested_at:
                    type: string
                    description: "Request timestamp"
                    format: date-time
                    example: "2026-02-01T12:00:00Z"
                required:
                  - modification_id
                  - loan_id
                  - type
                  - status
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /modifications/{modification_id}/evaluate:
    post:
      operationId: evaluateOptions
      summary: Evaluate modification options
      description: >-
        Run the investor waterfall to determine all available modification options for the borrower.
        Compares net present value of each option against foreclosure alternative. Returns ranked options
        with projected savings.
      tags:
        - Modifications
      parameters:
        - name: modification_id
          in: path
          required: true
          description: "Unique modification id"
          schema:
            type: "string"
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  options:
                    type: array
                    description: "Available modification options ranked by NPV"
                    items:
                      type: string
                  recommended_option:
                    type: string
                    description: "Recommended option"
                    example: "RATE_REDUCTION"
                  npv_result:
                    type: string
                    description: "NPV test result"
                    example: "POSITIVE"
                required:
                  - options
                  - recommended_option
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /modifications/{modification_id}/approve:
    post:
      operationId: approveModification
      summary: Approve modification
      description: >-
        Approve the modification request and initiate the trial period. Sets trial payment amount and
        schedule. Borrower must make all trial payments on time to convert to a permanent modification.
      tags:
        - Modifications
      parameters:
        - name: modification_id
          in: path
          required: true
          description: "Unique modification id"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Approve modification request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                modified_rate:
                  type: number
                  description: "Approved modified rate"
                  format: double
                  example: 4.5
                modified_term_months:
                  type: integer
                  description: "New remaining term"
                  example: 360
                trial_months:
                  type: integer
                  description: "Number of trial months"
                  example: 3
                trial_payment:
                  type: number
                  description: "Trial period monthly payment"
                  format: double
                  example: 1456.0
              required:
                - modified_rate
                - trial_payment
                - trial_months
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  modification_id:
                    type: string
                    description: "Modification request identifier"
                    example: "mod-880056"
                  loan_id:
                    type: string
                    description: "Loan being modified"
                    example: "loan-440028"
                  type:
                    type: string
                    description: "Modification type"
                    example: "RATE_REDUCTION"
                    enum:
                      - FORBEARANCE
                      - DEFERMENT
                      - RATE_REDUCTION
                      - TERM_EXTENSION
                      - PRINCIPAL_FORGIVENESS
                      - CAPITALIZATION
                      - COMBINATION
                  status:
                    type: string
                    description: "Request status"
                    example: "TRIAL_PERIOD"
                    enum:
                      - REQUESTED
                      - UNDER_REVIEW
                      - APPROVED
                      - TRIAL_PERIOD
                      - PERMANENT
                      - DENIED
                      - WITHDRAWN
                      - CANCELLED
                  original_rate:
                    type: number
                    description: "Original interest rate"
                    format: double
                    example: 6.75
                  modified_rate:
                    type: number
                    description: "Modified interest rate"
                    format: double
                    example: 4.5
                  original_payment:
                    type: number
                    description: "Original monthly payment"
                    format: double
                    example: 1842.0
                  modified_payment:
                    type: number
                    description: "Modified monthly payment"
                    format: double
                    example: 1456.0
                  trial_start_date:
                    type: string
                    description: "Trial period start"
                    format: date
                    example: "2026-04-01"
                  trial_end_date:
                    type: string
                    description: "Trial period end"
                    format: date
                    example: "2026-06-30"
                  hardship_reason:
                    type: string
                    description: "Borrower hardship reason"
                    example: "JOB_LOSS"
                    enum:
                      - JOB_LOSS
                      - INCOME_REDUCTION
                      - MEDICAL
                      - DIVORCE
                      - DEATH_OF_COBORROWER
                      - NATURAL_DISASTER
                      - MILITARY_SERVICE
                      - OTHER
                  requested_at:
                    type: string
                    description: "Request timestamp"
                    format: date-time
                    example: "2026-02-01T12:00:00Z"
                required:
                  - modification_id
                  - loan_id
                  - type
                  - status
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /modifications/{modification_id}/convert:
    post:
      operationId: convertToPermanent
      summary: Convert to permanent modification
      description: >-
        Convert a successful trial modification to permanent status. Requires all trial payments made on
        time. Generates the permanent modification agreement and updated loan terms. Notifies credit bureaus
        of the modified account status.
      tags:
        - Trial Periods
      parameters:
        - name: modification_id
          in: path
          required: true
          description: "Unique modification id"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Convert to permanent modification request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                effective_date:
                  type: string
                  description: "Permanent modification effective date"
                  format: date
                  example: "2026-07-01"
              required:
                - effective_date
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  modification_id:
                    type: string
                    description: "Modification request identifier"
                    example: "mod-880056"
                  loan_id:
                    type: string
                    description: "Loan being modified"
                    example: "loan-440028"
                  type:
                    type: string
                    description: "Modification type"
                    example: "RATE_REDUCTION"
                    enum:
                      - FORBEARANCE
                      - DEFERMENT
                      - RATE_REDUCTION
                      - TERM_EXTENSION
                      - PRINCIPAL_FORGIVENESS
                      - CAPITALIZATION
                      - COMBINATION
                  status:
                    type: string
                    description: "Request status"
                    example: "TRIAL_PERIOD"
                    enum:
                      - REQUESTED
                      - UNDER_REVIEW
                      - APPROVED
                      - TRIAL_PERIOD
                      - PERMANENT
                      - DENIED
                      - WITHDRAWN
                      - CANCELLED
                  original_rate:
                    type: number
                    description: "Original interest rate"
                    format: double
                    example: 6.75
                  modified_rate:
                    type: number
                    description: "Modified interest rate"
                    format: double
                    example: 4.5
                  original_payment:
                    type: number
                    description: "Original monthly payment"
                    format: double
                    example: 1842.0
                  modified_payment:
                    type: number
                    description: "Modified monthly payment"
                    format: double
                    example: 1456.0
                  trial_start_date:
                    type: string
                    description: "Trial period start"
                    format: date
                    example: "2026-04-01"
                  trial_end_date:
                    type: string
                    description: "Trial period end"
                    format: date
                    example: "2026-06-30"
                  hardship_reason:
                    type: string
                    description: "Borrower hardship reason"
                    example: "JOB_LOSS"
                    enum:
                      - JOB_LOSS
                      - INCOME_REDUCTION
                      - MEDICAL
                      - DIVORCE
                      - DEATH_OF_COBORROWER
                      - NATURAL_DISASTER
                      - MILITARY_SERVICE
                      - OTHER
                  requested_at:
                    type: string
                    description: "Request timestamp"
                    format: date-time
                    example: "2026-02-01T12:00:00Z"
                required:
                  - modification_id
                  - loan_id
                  - type
                  - status
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /modifications/{modification_id}/deny:
    post:
      operationId: denyModification
      summary: Deny modification request
      description: >-
        Deny the modification request with a specific reason. Generates the adverse action notice per ECOA
        and CFPB requirements. Must include information about appeal rights and housing counselor resources.
      tags:
        - Modifications
      parameters:
        - name: modification_id
          in: path
          required: true
          description: "Unique modification id"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Deny modification request request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                denial_reason:
                  type: string
                  description: "Denial reason"
                  example: "INSUFFICIENT_INCOME"
                  enum:
                    - INSUFFICIENT_INCOME
                    - PROPERTY_VALUE
                    - INVESTOR_RESTRICTION
                    - NPV_NEGATIVE
                    - INELIGIBLE_LOAN_TYPE
                    - EXCESSIVE_FORBEARANCE
                appeal_deadline:
                  type: string
                  description: "Deadline to file appeal"
                  format: date
                  example: "2026-04-15"
              required:
                - denial_reason
      responses:
        "202":
          description: Action accepted for processing
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
components:
  schemas:
    Money:
      type: object
      description: Monetary amount with currency
      properties:
        amount:
          type: number
          format: double
          description: The monetary amount
          example: 1250.00
        currency:
          type: string
          description: ISO 4217 currency code
          example: USD
          minLength: 3
          maxLength: 3
      required:
        - amount
        - currency
    Address:
      type: object
      description: Physical mailing address
      properties:
        line1:
          type: string
          description: Street address line 1
          example: 123 Main Street
        line2:
          type: string
          description: Street address line 2
          example: Suite 400
        city:
          type: string
          description: City name
          example: New York
        state:
          type: string
          description: State or province code
          example: NY
        postal_code:
          type: string
          description: ZIP or postal code
          example: "10001"
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code
          example: US
          minLength: 2
          maxLength: 2
      required:
        - line1
        - city
        - state
        - postal_code
        - country
    PaginationMeta:
      type: object
      description: Pagination metadata for list responses
      properties:
        page:
          type: integer
          description: Current page number
          example: 1
        per_page:
          type: integer
          description: Number of items per page
          example: 20
        total_items:
          type: integer
          description: Total number of items across all pages
          example: 142
        total_pages:
          type: integer
          description: Total number of pages
          example: 8
      required:
        - page
        - per_page
        - total_items
        - total_pages
    Error:
      type: object
      description: Standard error response
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Machine-readable error code
              example: VALIDATION_ERROR
            message:
              type: string
              description: Human-readable error message
              example: The request body contains invalid fields.
            details:
              type: array
              description: Detailed error information
              items:
                type: object
                properties:
                  field:
                    type: string
                    description: The field that caused the error
                    example: email
                  reason:
                    type: string
