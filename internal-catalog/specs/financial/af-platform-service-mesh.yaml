openapi: 3.0.3
info:
  title: Acme Finance Service Mesh Control Plane API
  description: >-
    Service mesh control plane managing service discovery, health monitoring, circuit breaker patterns, retry
    policies with jitter, weighted traffic shifting for canary deployments, and mutual TLS certificate management.
    Provides a centralized API for configuring Envoy sidecar proxies across the microservices fleet.
  version: 2.1.0
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-platform-service-mesh
  x-acme-domain: platform
servers:
  - url: https://af-platform-service-mesh.api.acmefin.com/v1
    description: Production
  - url: https://af-platform-service-mesh.staging.acmefin.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Service Registry
    description: Service registration, discovery, and instance health monitoring
  - name: Resilience Policies
    description: Circuit breaker and retry policy configuration
  - name: Traffic Management
    description: Traffic shifting rules and mutual TLS certificate management
paths:
  /services:
    get:
      operationId: listMeshServices
      summary: List mesh services
      description: List all services registered in the mesh with health status and instance counts.
      tags:
        - Service Registry
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        service_id:
                          type: string
                          description: "Service ID"
                          format: uuid
                          example: "svc-4a5b6c7d-8e9f"
                        name:
                          type: string
                          description: "Service name"
                          example: "payments-service"
                        namespace:
                          type: string
                          description: "Service namespace"
                          example: "finance"
                        healthy_instances:
                          type: integer
                          description: "Healthy instance count"
                          example: 5
                        total_instances:
                          type: integer
                          description: "Total instances"
                          example: 6
                        protocol:
                          type: string
                          description: "Service protocol"
                          example: "http"
                          enum:
                            - http
                            - grpc
                            - tcp
                        mtls_enabled:
                          type: boolean
                          description: "Whether mTLS is enforced"
                          example: true
                      required:
                        - service_id
                        - name
                        - healthy_instances
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: registerMeshService
      summary: Register service
      description: >-
        Register a new service in the mesh. Service discovery begins immediately and health checks are
        scheduled.
      tags:
        - Service Registry
      requestBody:
        required: true
        description: Register service request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    name:
                      type: string
                      description: "Service name"
                      example: "accounts-service"
                    namespace:
                      type: string
                      description: "Namespace"
                      example: "finance"
                    port:
                      type: integer
                      description: "Service port"
                      example: 8080
                    protocol:
                      type: string
                      description: "Protocol"
                      example: "http"
                      enum:
                        - http
                        - grpc
                        - tcp
                    health_check_path:
                      type: string
                      description: "Health endpoint"
                      example: "/health"
                    labels:
                      type: object
                      description: "Service labels for routing"
              required:
                - name
                - port
                - protocol
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  service_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "svc-4a5b6c7d"
                  name:
                    type: string
                    description: "Name"
                    example: "accounts-service"
                  status:
                    type: string
                    description: "Status"
                    example: "registered"
                required:
                  - service_id
                  - name
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /services/{service_id}:
    get:
      operationId: getMeshService
      summary: Get service
      description: Retrieve service configuration and health status.
      tags:
        - Service Registry
      parameters:
        - name: service_id
          in: path
          required: true
          description: "Unique service id"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  service_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "svc-4a5b6c7d"
                  name:
                    type: string
                    description: "Name"
                    example: "payments-service"
                  namespace:
                    type: string
                    description: "Namespace"
                    example: "finance"
                  healthy_instances:
                    type: integer
                    description: "Healthy"
                    example: 5
                  total_instances:
                    type: integer
                    description: "Total"
                    example: 6
                required:
                  - service_id
                  - name
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    patch:
      operationId: updateMeshService
      summary: Update service
      description: Update service mesh configuration.
      tags:
        - Service Registry
      parameters:
        - name: service_id
          in: path
          required: true
          description: "Unique service id"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Update service request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    health_check_path:
                      type: string
                      description: "Health path"
                      example: "/healthz"
                    labels:
                      type: object
                      description: "Labels"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  service_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "svc-4a5b6c7d"
                  updated_at:
                    type: string
                    description: "ISO 8601 timestamp"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - service_id
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
    delete:
      operationId: deregisterMeshService
      summary: Deregister service
      description: Remove a service from the mesh.
      tags:
        - Service Registry
      parameters:
        - name: service_id
          in: path
          required: true
          description: "Unique service id"
          schema:
            type: "string"
      responses:
        "204":
          description: Resource deleted successfully
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /services/{service_id}/health:
    get:
      operationId: getMeshServiceHealth
      summary: Get service health
      description: Retrieve detailed health status for all instances of a service.
      tags:
        - Service Registry
      parameters:
        - name: service_id
          in: path
          required: true
          description: "Unique service id"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  service_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "svc-4a5b6c7d"
                  overall_status:
                    type: string
                    description: "Aggregate health"
                    example: "healthy"
                    enum:
                      - healthy
                      - degraded
                      - unhealthy
                  instances:
                    type: array
                    description: "Per-instance health details"
                    items:
                      type: object
                required:
                  - service_id
                  - overall_status
                  - instances
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /services/{service_id}/instances:
    get:
      operationId: listServiceInstances
      summary: List service instances
      description: >-
        List all running instances of a service with their IP addresses, ports, health status, and load
        metrics.
      tags:
        - Service Registry
      parameters:
        - name: service_id
          in: path
          required: true
          description: "Service ID"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        instance_id:
                          type: string
                          description: "Instance ID"
                          format: uuid
                          example: "ins-1a2b3c4d"
                        address:
                          type: string
                          description: "Instance IP"
                          example: "10.0.1.42"
                        port:
                          type: integer
                          description: "Instance port"
                          example: 8080
                        status:
                          type: string
                          description: "Instance health"
                          example: "healthy"
                          enum:
                            - healthy
                            - draining
                            - unhealthy
                        zone:
                          type: string
                          description: "Availability zone"
                          example: "us-east-1a"
                        requests_per_second:
                          type: number
                          description: "Current RPS"
                          format: double
                          example: 125.3
                        started_at:
                          type: string
                          description: "Instance start time"
                          format: date-time
                          example: "2025-06-15T14:30:00Z"
                      required:
                        - instance_id
                        - address
                        - port
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /circuit-breakers:
    get:
      operationId: listCircuitBreakers
      summary: List circuit breakers
      description: List all circuit breaker configurations in the mesh.
      tags:
        - Resilience Policies
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        breaker_id:
                          type: string
                          description: "Circuit breaker ID"
                          format: uuid
                          example: "cb-6a7b8c9d"
                        service_id:
                          type: string
                          description: "Target service"
                          format: uuid
                          example: "svc-4a5b6c7d"
                        state:
                          type: string
                          description: "Current breaker state"
                          example: "closed"
                          enum:
                            - closed
                            - open
                            - half_open
                        failure_threshold:
                          type: integer
                          description: "Failures to trip"
                          example: 5
                        reset_timeout_seconds:
                          type: integer
                          description: "Seconds before half-open"
                          example: 30
                        consecutive_failures:
                          type: integer
                          description: "Current failure count"
                          example: 0
                      required:
                        - breaker_id
                        - service_id
                        - state
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: createCircuitBreaker
      summary: Create circuit breaker
      description: >-
        Configure a circuit breaker for a service. When failures exceed the threshold, the circuit opens and
        requests fail fast.
      tags:
        - Resilience Policies
      requestBody:
        required: true
        description: Create circuit breaker request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    service_id:
                      type: string
                      description: "Target service"
                      format: uuid
                      example: "svc-4a5b6c7d"
                    failure_threshold:
                      type: integer
                      description: "Trip threshold"
                      example: 5
                    reset_timeout_seconds:
                      type: integer
                      description: "Reset timeout"
                      example: 30
                    half_open_max_requests:
                      type: integer
                      description: "Requests in half-open"
                      example: 3
                    failure_rate_threshold:
                      type: number
                      description: "Failure rate to trip (0.0-1.0)"
                      format: double
                      example: 0.5
              required:
                - service_id
                - failure_threshold
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  breaker_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "cb-6a7b8c9d"
                  service_id:
                    type: string
                    description: "Service"
                    format: uuid
                    example: "svc-4a5b6c7d"
                  state:
                    type: string
                    description: "State"
                    example: "closed"
                required:
                  - breaker_id
                  - state
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /circuit-breakers/{breaker_id}:
    get:
      operationId: getCircuitBreaker
      summary: Get circuit breaker
      description: Retrieve circuit breaker state and configuration.
      tags:
        - Resilience Policies
      parameters:
        - name: breaker_id
          in: path
          required: true
          description: "Unique breaker id"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  breaker_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "cb-6a7b8c9d"
                  service_id:
                    type: string
                    description: "Service"
                    format: uuid
                    example: "svc-4a5b6c7d"
                  state:
                    type: string
                    description: "State"
                    example: "closed"
                  failure_threshold:
                    type: integer
                    description: "Threshold"
                    example: 5
                  consecutive_failures:
                    type: integer
                    description: "Failures"
                    example: 0
                required:
                  - breaker_id
                  - state
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    patch:
      operationId: updateCircuitBreaker
      summary: Update circuit breaker
      description: Update circuit breaker thresholds.
      tags:
        - Resilience Policies
      parameters:
        - name: breaker_id
          in: path
          required: true
          description: "Unique breaker id"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Update circuit breaker request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    failure_threshold:
                      type: integer
                      description: "New threshold"
                      example: 10
                    reset_timeout_seconds:
                      type: integer
                      description: "New timeout"
                      example: 60
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  breaker_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "cb-6a7b8c9d"
                  updated_at:
                    type: string
                    description: "ISO 8601 timestamp"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - breaker_id
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
    delete:
      operationId: deleteCircuitBreaker
      summary: Delete circuit breaker
      description: Remove circuit breaker configuration.
      tags:
        - Resilience Policies
      parameters:
        - name: breaker_id
          in: path
          required: true
          description: "Unique breaker id"
          schema:
            type: "string"
      responses:
        "204":
          description: Resource deleted successfully
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /circuit-breakers/{breaker_id}/state:
    get:
      operationId: getCircuitBreakerState
      summary: Get breaker state
      description: Get real-time circuit breaker state with failure history.
      tags:
        - Resilience Policies
      parameters:
        - name: breaker_id
          in: path
          required: true
          description: "Unique breaker id"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  state:
                    type: string
                    description: "Current state"
                    example: "closed"
                    enum:
                      - closed
                      - open
                      - half_open
                  consecutive_failures:
                    type: integer
                    description: "Failure count"
                    example: 0
                  last_failure_at:
                    type: string
                    description: "Last failure time"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                  last_success_at:
                    type: string
                    description: "Last success time"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                  total_requests:
                    type: integer
                    description: "Requests since last reset"
                    example: 15420
                  total_failures:
                    type: integer
                    description: "Failures since last reset"
                    example: 3
                required:
                  - state
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    put:
      operationId: setCircuitBreakerState
      summary: Force breaker state
      description: >-
        Manually force a circuit breaker to a specific state. Use for emergency recovery.
      tags:
        - Resilience Policies
      parameters:
        - name: breaker_id
          in: path
          required: true
          description: "Breaker ID"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Force breaker state request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    state:
                      type: string
                      description: "Target state"
                      example: "closed"
                      enum:
                        - closed
                        - open
                        - half_open
                    reason:
                      type: string
                      description: "Reason for override"
                      example: "Manual reset after incident resolution"
              required:
                - state
                - reason
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  breaker_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "cb-6a7b8c9d"
                  state:
                    type: string
                    description: "New state"
                    example: "closed"
                  forced_at:
                    type: string
                    description: "ISO 8601 timestamp"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - breaker_id
                  - state
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /retry-policies:
    get:
      operationId: listRetryPolicies
      summary: List retry policies
      description: List all retry policies configured in the service mesh.
      tags:
        - Resilience Policies
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
