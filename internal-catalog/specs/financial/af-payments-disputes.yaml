openapi: 3.0.3
info:
  title: Acme Finance Payment Disputes API
  description: >-
    End-to-end dispute lifecycle management for card-present and card-not-present transactions across Visa,
    Mastercard, American Express, and Discover networks. Covers chargeback initiation, evidence management,
    representment, pre-arbitration, and formal arbitration with network-specific reason code validation and
    deadline tracking.
  version: 3.2.0
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-payments-disputes
  x-acme-domain: payments
servers:
  - url: https://af-payments-disputes.api.acmefin.com/v1
    description: Production
  - url: https://af-payments-disputes.staging.acmefin.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Disputes
    description: Manage dispute cases, submit responses, and handle representment and pre-arbitration
  - name: Evidence
    description: Upload and manage supporting evidence documents for dispute cases
  - name: Arbitration
    description: Card network arbitration filings, rulings, and appeals
paths:
  /disputes:
    get:
      operationId: listDisputes
      summary: List disputes
      description: >-
        Retrieve dispute cases with filtering by type, status, network, and response deadline. Includes
        chargeback, retrieval, pre-arbitration, and arbitration cases across all card networks.
      tags:
        - Disputes
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: type
          in: query
          required: false
          description: Filter by type
          schema:
            type: "string"
        - name: status
          in: query
          required: false
          description: Filter by status
          schema:
            type: "string"
        - name: network
          in: query
          required: false
          description: Filter by network
          schema:
            type: "string"
        - name: respond_by_before
          in: query
          required: false
          description: Disputes with response deadline before this date
          schema:
            type: "string"
            format: "date"
        - name: merchant_id
          in: query
          required: false
          description: Filter by merchant_id
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        dispute_id:
                          type: string
                          description: Dispute case identifier
                          format: uuid
                        transaction_id:
                          type: string
                          description: Original transaction reference
                          format: uuid
                        amount:
                          type: number
                          description: Transaction amount
                          format: double
                          example: 1500.0
                        currency:
                          type: string
                          description: ISO 4217 currency code
                          example: "USD"
                          minLength: 3
                          maxLength: 3
                        reason_code:
                          type: string
                          description: Network reason code (Visa/MC/Amex)
                          example: "10.4"
                        reason_description:
                          type: string
                          description: Human-readable dispute reason
                          example: "Cardholder does not recognize the transaction"
                        type:
                          type: string
                          enum:
                            - chargeback
                            - retrieval
                            - pre_arbitration
                            - arbitration
                            - fraud
                            - compliance
                        status:
                          type: string
                          enum:
                            - opened
                            - under_review
                            - evidence_requested
                            - responded
                            - won
                            - lost
                            - pre_arbitration
                            - arbitration
                            - closed
                        network:
                          type: string
                          description: Card network
                          enum:
                            - visa
                            - mastercard
                            - amex
                            - discover
                        respond_by:
                          type: string
                          description: Deadline for merchant response
                          format: date
                        merchant_id:
                          type: string
                          description: Merchant identifier
                      required:
                        - dispute_id
                        - type
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: initiateDispute
      summary: Initiate dispute
      description: >-
        Open a new dispute case for a transaction. Validates the dispute reason code against the card
        network's dispute rules and calculates the response deadline based on network-specific timeframes.
      tags:
        - Disputes
      requestBody:
        required: true
        description: Initiate dispute request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    transaction_id:
                      type: string
                      description: Original transaction reference
                      format: uuid
                    reason_code:
                      type: string
                      description: Network reason code (Visa/MC/Amex)
                      example: "10.4"
                    type:
                      type: string
                      enum:
                        - chargeback
                        - retrieval
                        - pre_arbitration
                        - arbitration
                        - fraud
                        - compliance
                    amount:
                      type: number
                      description: Transaction amount
                      format: double
                      example: 1500.0
                    currency:
                      type: string
                      description: ISO 4217 currency code
                      example: "USD"
                      minLength: 3
                      maxLength: 3
                    description:
                      type: string
                      description: Detailed dispute description
              required:
                - transaction_id
                - reason_code
                - type
                - amount
                - currency
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  dispute_id:
                    type: string
                    description: Dispute case identifier
                    format: uuid
                  transaction_id:
                    type: string
                    description: Original transaction reference
                    format: uuid
                  amount:
                    type: number
                    description: Transaction amount
                    format: double
                    example: 1500.0
                  currency:
                    type: string
                    description: ISO 4217 currency code
                    example: "USD"
                    minLength: 3
                    maxLength: 3
                  reason_code:
                    type: string
                    description: Network reason code (Visa/MC/Amex)
                    example: "10.4"
                  reason_description:
                    type: string
                    description: Human-readable dispute reason
                    example: "Cardholder does not recognize the transaction"
                  type:
                    type: string
                    enum:
                      - chargeback
                      - retrieval
                      - pre_arbitration
                      - arbitration
                      - fraud
                      - compliance
                  status:
                    type: string
                    enum:
                      - opened
                      - under_review
                      - evidence_requested
                      - responded
                      - won
                      - lost
                      - pre_arbitration
                      - arbitration
                      - closed
                  network:
                    type: string
                    description: Card network
                    enum:
                      - visa
                      - mastercard
                      - amex
                      - discover
                  respond_by:
                    type: string
                    description: Deadline for merchant response
                    format: date
                  merchant_id:
                    type: string
                    description: Merchant identifier
                required:
                  - dispute_id
                  - status
                  - respond_by
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /disputes/{dispute_id}:
    get:
      operationId: getDispute
      summary: Get dispute
      description: >-
        Retrieve complete dispute details including timeline, evidence submitted, network communications,
        and current status.
      tags:
        - Disputes
      parameters:
        - name: dispute_id
          in: path
          required: true
          description: Unique dispute id
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  dispute_id:
                    type: string
                    description: Dispute case identifier
                    format: uuid
                  transaction_id:
                    type: string
                    description: Original transaction reference
                    format: uuid
                  amount:
                    type: number
                    description: Transaction amount
                    format: double
                    example: 1500.0
                  currency:
                    type: string
                    description: ISO 4217 currency code
                    example: "USD"
                    minLength: 3
                    maxLength: 3
                  reason_code:
                    type: string
                    description: Network reason code (Visa/MC/Amex)
                    example: "10.4"
                  reason_description:
                    type: string
                    description: Human-readable dispute reason
                    example: "Cardholder does not recognize the transaction"
                  type:
                    type: string
                    enum:
                      - chargeback
                      - retrieval
                      - pre_arbitration
                      - arbitration
                      - fraud
                      - compliance
                  status:
                    type: string
                    enum:
                      - opened
                      - under_review
                      - evidence_requested
                      - responded
                      - won
                      - lost
                      - pre_arbitration
                      - arbitration
                      - closed
                  network:
                    type: string
                    description: Card network
                    enum:
                      - visa
                      - mastercard
                      - amex
                      - discover
                  respond_by:
                    type: string
                    description: Deadline for merchant response
                    format: date
                  merchant_id:
                    type: string
                    description: Merchant identifier
                required:
                  - dispute_id
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    patch:
      operationId: updateDispute
      summary: Update dispute
      description: >-
        Update dispute details or add internal notes. Status transitions are managed via specific action
        endpoints.
      tags:
        - Disputes
      parameters:
        - name: dispute_id
          in: path
          required: true
          description: Unique dispute id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Update dispute request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    internal_notes:
                      type: string
                    assigned_to:
                      type: string
                      description: Analyst assigned to the case
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  dispute_id:
                    type: string
                    description: Dispute case identifier
                    format: uuid
                  transaction_id:
                    type: string
                    description: Original transaction reference
                    format: uuid
                  amount:
                    type: number
                    description: Transaction amount
                    format: double
                    example: 1500.0
                  currency:
                    type: string
                    description: ISO 4217 currency code
                    example: "USD"
                    minLength: 3
                    maxLength: 3
                  reason_code:
                    type: string
                    description: Network reason code (Visa/MC/Amex)
                    example: "10.4"
                  reason_description:
                    type: string
                    description: Human-readable dispute reason
                    example: "Cardholder does not recognize the transaction"
                  type:
                    type: string
                    enum:
                      - chargeback
                      - retrieval
                      - pre_arbitration
                      - arbitration
                      - fraud
                      - compliance
                  status:
                    type: string
                    enum:
                      - opened
                      - under_review
                      - evidence_requested
                      - responded
                      - won
                      - lost
                      - pre_arbitration
                      - arbitration
                      - closed
                  network:
                    type: string
                    description: Card network
                    enum:
                      - visa
                      - mastercard
                      - amex
                      - discover
                  respond_by:
                    type: string
                    description: Deadline for merchant response
                    format: date
                  merchant_id:
                    type: string
                    description: Merchant identifier
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /disputes/{dispute_id}/respond:
    post:
      operationId: respondToDispute
      summary: Respond to dispute
      description: >-
        Submit the merchant's response to a chargeback or retrieval request. Must include a rebuttal letter
        and reference uploaded evidence. Response must be submitted before the network deadline.
      tags:
        - Disputes
      parameters:
        - name: dispute_id
          in: path
          required: true
          description: Unique dispute id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Respond to dispute request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    rebuttal:
                      type: string
                      description: Merchant's written rebuttal
                    evidence_ids:
                      type: array
                      description: Evidence document IDs to include
                      items:
                        type: string
                    accept_liability:
                      type: boolean
                      description: Accept the dispute without contest
                      default: false
              required:
                - rebuttal
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  dispute_id:
                    type: string
                    description: Dispute case identifier
                    format: uuid
                  status:
                    type: string
                    example: "responded"
                  responded_at:
                    type: string
                    format: date-time
                required:
                  - dispute_id
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /disputes/{dispute_id}/accept:
    post:
      operationId: acceptDispute
      summary: Accept dispute liability
      description: >-
        Accept liability for the dispute, waiving the right to contest. The disputed amount is debited from
        the merchant's settlement account.
      tags:
        - Disputes
      parameters:
        - name: dispute_id
          in: path
          required: true
          description: Unique dispute id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Accept dispute liability request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    reason:
                      type: string
                      description: Reason for accepting liability
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  dispute_id:
                    type: string
                    description: Dispute case identifier
                    format: uuid
                  status:
                    type: string
                    example: "lost"
                  debit_amount:
                    type: number
                    format: double
                required:
                  - dispute_id
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /disputes/{dispute_id}/representment:
    post:
      operationId: submitRepresentment
      summary: Submit representment
      description: >-
        Submit a second presentment (representment) to the card network after an initial chargeback loss.
        Includes compelling evidence per the network's representment rights guidelines.
      tags:
        - Disputes
      parameters:
        - name: dispute_id
          in: path
          required: true
          description: Unique dispute id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Submit representment request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    compelling_evidence:
                      type: string
                      description: Narrative with compelling evidence per network rules
                    evidence_ids:
                      type: array
                      items:
                        type: string
              required:
                - compelling_evidence
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  dispute_id:
                    type: string
                    description: Dispute case identifier
                    format: uuid
                  status:
                    type: string
                    example: "under_review"
                  representment_submitted_at:
                    type: string
                    format: date-time
                required:
                  - dispute_id
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /disputes/{dispute_id}/pre-arbitration:
    post:
      operationId: filePreabitration
      summary: File pre-arbitration
      description: >-
        File a pre-arbitration case with the card network when representment is unsuccessful. Pre-
        arbitration is the final step before formal arbitration and incurs network fees.
      tags:
        - Disputes
      parameters:
        - name: dispute_id
          in: path
          required: true
          description: Unique dispute id
          schema:
            type: "string"
      requestBody:
        required: true
        description: File pre-arbitration request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    justification:
                      type: string
                      description: Pre-arbitration justification
                    proposed_resolution:
                      type: string
                      enum:
                        - full_reversal
                        - partial_credit
                        - accept_liability
              required:
                - justification
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  dispute_id:
                    type: string
                    description: Dispute case identifier
                    format: uuid
                  status:
                    type: string
                    example: "pre_arbitration"
                  network_case_id:
                    type: string
                required:
                  - dispute_id
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /disputes/{dispute_id}/evidence:
    get:
      operationId: listDisputeEvidence
      summary: List dispute evidence
      description: Retrieve all evidence documents uploaded for a dispute case.
      tags:
        - Evidence
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        evidence_id:
                          type: string
                          description: Evidence document identifier
                          format: uuid
                        dispute_id:
                          type: string
                          description: Dispute case identifier
                          format: uuid
                        document_type:
                          type: string
                          enum:
                            - receipt
                            - shipping_proof
                            - customer_communication
                            - refund_policy
                            - avs_cvv_match
                            - 3ds_authentication
                            - service_agreement
                            - other
                        file_name:
                          type: string
                          description: Original file name
                          example: "shipping-confirmation.pdf"
                        file_size_bytes:
                          type: integer
                          description: File size in bytes
                        uploaded_at:
                          type: string
                          format: date-time
                      required:
                        - evidence_id
                        - document_type
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: uploadEvidence
      summary: Upload evidence
      description: >-
        Upload supporting evidence for a dispute response. Accepted formats: PDF, PNG, JPG, TIFF. Maximum
        file size 10 MB. Documents are stored encrypted and retained per card network data retention
        requirements.
      tags:
        - Evidence
      requestBody:
        required: true
        description: Upload evidence request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    dispute_id:
                      type: string
                      description: Dispute case identifier
                      format: uuid
                    document_type:
                      type: string
                      enum:
                        - receipt
                        - shipping_proof
                        - customer_communication
                        - refund_policy
                        - avs_cvv_match
                        - 3ds_authentication
                        - service_agreement
                        - other
                    file_content_base64:
                      type: string
                      description: Base64-encoded file content
                    file_name:
                      type: string
                      description: Original file name
                      example: "shipping-confirmation.pdf"
                    description:
                      type: string
                      description: Evidence description
              required:
                - dispute_id
                - document_type
                - file_content_base64
                - file_name
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  evidence_id:
                    type: string
                    description: Evidence document identifier
                    format: uuid
                  dispute_id:
                    type: string
                    description: Dispute case identifier
                    format: uuid
                  document_type:
                    type: string
                    enum:
                      - receipt
                      - shipping_proof
                      - customer_communication
                      - refund_policy
                      - avs_cvv_match
                      - 3ds_authentication
                      - service_agreement
                      - other
                  file_name:
                    type: string
                    description: Original file name
                    example: "shipping-confirmation.pdf"
                  file_size_bytes:
                    type: integer
                    description: File size in bytes
                  uploaded_at:
                    type: string
                    format: date-time
                required:
                  - evidence_id
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /disputes/{dispute_id}/evidence/{evidence_id}:
    get:
      operationId: getEvidence
      summary: Get evidence document
      description: Retrieve evidence document metadata and a time-limited download URL.
      tags:
        - Evidence
      parameters:
        - name: evidence_id
          in: path
          required: true
          description: Unique evidence id
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  evidence_id:
                    type: string
                    description: Evidence document identifier
                    format: uuid
                  dispute_id:
                    type: string
                    description: Dispute case identifier
                    format: uuid
                  document_type:
                    type: string
                    enum:
                      - receipt
                      - shipping_proof
                      - customer_communication
                      - refund_policy
                      - avs_cvv_match
                      - 3ds_authentication
                      - service_agreement
                      - other
                  file_name:
                    type: string
                    description: Original file name
                    example: "shipping-confirmation.pdf"
                  file_size_bytes:
                    type: integer
                    description: File size in bytes
                  uploaded_at:
                    type: string
                    format: date-time
                  download_url:
                    type: string
                    description: Pre-signed URL valid for 15 minutes
                    format: uri
                required:
                  - evidence_id
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    delete:
      operationId: deleteEvidence
