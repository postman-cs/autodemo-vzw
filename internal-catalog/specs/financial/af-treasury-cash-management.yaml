openapi: 3.0.3
info:
  title: Acme Finance Cash Management API
  description: >-
    Enterprise cash management platform providing real-time cash position visibility across all bank accounts,
    automated sweep configurations for optimal liquidity distribution, concentration account management for
    centralized funding, disbursement scheduling, and zero-balance account (ZBA) structures for efficient
    subsidiary cash management.
  version: 3.2.0
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-treasury-cash-management
  x-acme-domain: treasury
servers:
  - url: https://af-treasury-cash-management.api.acmefin.com/v1
    description: Production
  - url: https://af-treasury-cash-management.staging.acmefin.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Cash Positions
    description: Real-time and end-of-day cash position reporting across accounts and currencies
  - name: Cash Sweeps
    description: Automated sweep rules, concentration accounts, and disbursement management
paths:
  /cash-positions:
    get:
      operationId: listCashPositions
      summary: List cash positions
      description: >-
        Retrieve current cash positions across all monitored accounts with real-time and projected balances.
        Supports filtering by currency, entity, and bank.
      tags:
        - Cash Positions
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: currency
          in: query
          required: false
          description: "Filter by currency code"
          schema:
            type: "string"
        - name: entity
          in: query
          required: false
          description: "Filter by legal entity"
          schema:
            type: "string"
        - name: bank
          in: query
          required: false
          description: "Filter by bank"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        account_id:
                          type: string
                          description: "Account ID"
                          format: uuid
                          example: "acct-4a5b6c7d-8e9f-0a1b-2c3d"
                        bank_name:
                          type: string
                          description: "Bank name"
                          example: "JPMorgan Chase"
                        account_number:
                          type: string
                          description: "Masked account number"
                          example: "****4521"
                        currency:
                          type: string
                          description: "Account currency (ISO 4217)"
                          example: "USD"
                        current_balance:
                          type: number
                          description: "Real-time available balance"
                          format: double
                          example: 2450000.0
                        ledger_balance:
                          type: number
                          description: "Ledger balance (EOD)"
                          format: double
                          example: 2500000.0
                        projected_balance:
                          type: number
                          description: "Projected EOD balance"
                          format: double
                          example: 2320000.0
                        entity:
                          type: string
                          description: "Legal entity"
                          example: "Acme Finance Corp"
                        as_of:
                          type: string
                          description: "Balance timestamp"
                          format: date-time
                          example: "2025-06-15T14:30:00Z"
                      required:
                        - account_id
                        - currency
                        - current_balance
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /cash-positions/{account_id}:
    get:
      operationId: getCashPosition
      summary: Get account position
      description: >-
        Retrieve detailed cash position for a specific account including intraday transaction history,
        holds, and projected flows.
      tags:
        - Cash Positions
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Unique account id"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  account_id:
                    type: string
                    description: "Account ID"
                    format: uuid
                    example: "acct-4a5b6c7d"
                  bank_name:
                    type: string
                    description: "Bank"
                    example: "JPMorgan Chase"
                  currency:
                    type: string
                    description: "Currency"
                    example: "USD"
                  current_balance:
                    type: number
                    description: "Available balance"
                    format: double
                    example: 2450000.0
                  ledger_balance:
                    type: number
                    description: "Ledger balance"
                    format: double
                    example: 2500000.0
                  held_amount:
                    type: number
                    description: "Amount on hold"
                    format: double
                    example: 50000.0
                  intraday_credits:
                    type: number
                    description: "Today's credits"
                    format: double
                    example: 750000.0
                  intraday_debits:
                    type: number
                    description: "Today's debits"
                    format: double
                    example: 800000.0
                  projected_eod:
                    type: number
                    description: "Projected EOD balance"
                    format: double
                    example: 2320000.0
                  as_of:
                    type: string
                    description: "ISO 8601 timestamp"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - account_id
                  - currency
                  - current_balance
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /sweeps:
    get:
      operationId: listSweeps
      summary: List sweep rules
      description: >-
        List all automated sweep configurations governing how excess cash is moved between accounts based on
        target balances and triggers.
      tags:
        - Cash Sweeps
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        sweep_id:
                          type: string
                          description: "Sweep ID"
                          format: uuid
                          example: "swp-2a3b4c5d-6e7f"
                        name:
                          type: string
                          description: "Sweep rule name"
                          example: "USD Daily Concentration"
                        source_account:
                          type: string
                          description: "Source account"
                          format: uuid
                          example: "acct-4a5b6c7d"
                        target_account:
                          type: string
                          description: "Target account"
                          format: uuid
                          example: "acct-9a0b1c2d"
                        sweep_type:
                          type: string
                          description: "Sweep type"
                          example: "target_balance"
                          enum:
                            - target_balance
                            - zero_balance
                            - threshold
                            - percentage
                        target_balance:
                          type: number
                          description: "Target balance to maintain"
                          format: double
                          example: 100000.0
                        currency:
                          type: string
                          description: "Currency"
                          example: "USD"
                        frequency:
                          type: string
                          description: "Execution frequency"
                          example: "daily"
                          enum:
                            - daily
                            - intraday
                            - weekly
                        status:
                          type: string
                          description: "Rule status"
                          example: "active"
                          enum:
                            - active
                            - paused
                            - disabled
                        last_executed_at:
                          type: string
                          description: "Last sweep execution"
                          format: date-time
                          example: "2025-06-15T14:30:00Z"
                      required:
                        - sweep_id
                        - name
                        - sweep_type
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: createSweep
      summary: Create sweep rule
      description: >-
        Create an automated sweep rule to transfer excess cash between accounts based on target balances,
        thresholds, or percentages. Sweeps execute at the configured frequency.
      tags:
        - Cash Sweeps
      requestBody:
        required: true
        description: Create sweep rule request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    name:
                      type: string
                      description: "Rule name"
                      example: "EUR Excess Sweep"
                    source_account:
                      type: string
                      description: "Source"
                      format: uuid
                      example: "acct-4a5b6c7d"
                    target_account:
                      type: string
                      description: "Target"
                      format: uuid
                      example: "acct-9a0b1c2d"
                    sweep_type:
                      type: string
                      description: "Type"
                      example: "target_balance"
                      enum:
                        - target_balance
                        - zero_balance
                        - threshold
                        - percentage
                    target_balance:
                      type: number
                      description: "Target balance"
                      format: double
                      example: 50000.0
                    currency:
                      type: string
                      description: "Currency"
                      example: "EUR"
                    frequency:
                      type: string
                      description: "Frequency"
                      example: "daily"
                      enum:
                        - daily
                        - intraday
                        - weekly
                    min_transfer:
                      type: number
                      description: "Minimum transfer amount"
                      format: double
                      example: 1000.0
              required:
                - name
                - source_account
                - target_account
                - sweep_type
                - currency
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  sweep_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "swp-2a3b4c5d"
                  name:
                    type: string
                    description: "Name"
                    example: "EUR Excess Sweep"
                  status:
                    type: string
                    description: "Status"
                    example: "active"
                required:
                  - sweep_id
                  - name
                  - status
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /sweeps/{sweep_id}:
    get:
      operationId: getSweep
      summary: Get sweep rule
      description: Retrieve sweep rule details including execution history and transfer statistics.
      tags:
        - Cash Sweeps
      parameters:
        - name: sweep_id
          in: path
          required: true
          description: "Unique sweep id"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  sweep_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "swp-2a3b4c5d"
                  name:
                    type: string
                    description: "Name"
                    example: "USD Daily Concentration"
                  sweep_type:
                    type: string
                    description: "Type"
                    example: "target_balance"
                  target_balance:
                    type: number
                    description: "Target"
                    format: double
                    example: 100000.0
                  status:
                    type: string
                    description: "Status"
                    example: "active"
                  total_swept:
                    type: number
                    description: "Lifetime amount swept"
                    format: double
                    example: 45000000.0
                  execution_count:
                    type: integer
                    description: "Total executions"
                    example: 245
                required:
                  - sweep_id
                  - name
                  - status
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    patch:
      operationId: updateSweep
      summary: Update sweep rule
      description: Modify sweep parameters. Changes take effect at the next scheduled execution.
      tags:
        - Cash Sweeps
      parameters:
        - name: sweep_id
          in: path
          required: true
          description: "Unique sweep id"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Update sweep rule request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    target_balance:
                      type: number
                      description: "Updated target"
                      format: double
                      example: 75000.0
                    frequency:
                      type: string
                      description: "Frequency"
                      example: "daily"
                      enum:
                        - daily
                        - intraday
                        - weekly
                    status:
                      type: string
                      description: "Status"
                      example: "active"
                      enum:
                        - active
                        - paused
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  sweep_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "swp-2a3b4c5d"
                  target_balance:
                    type: number
                    description: "Target"
                    format: double
                    example: 75000.0
                  updated_at:
                    type: string
                    description: "ISO 8601 timestamp"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - sweep_id
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /concentration-accounts:
    get:
      operationId: listConcentrationAccounts
      summary: List concentration accounts
      description: >-
        List concentration (header) accounts used for cash pooling and centralized liquidity management.
      tags:
        - Cash Positions
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        account_id:
                          type: string
                          description: "Account ID"
                          format: uuid
                          example: "con-6a7b8c9d"
                        name:
                          type: string
                          description: "Account name"
                          example: "USD Master Concentration"
                        bank_name:
                          type: string
                          description: "Bank"
                          example: "Citibank"
                        currency:
                          type: string
                          description: "Currency"
                          example: "USD"
                        current_balance:
                          type: number
                          description: "Current balance"
                          format: double
                          example: 15000000.0
                        subsidiary_count:
                          type: integer
                          description: "Connected subsidiary accounts"
                          example: 12
                        pool_type:
                          type: string
                          description: "Pooling type"
                          example: "physical"
                          enum:
                            - physical
                            - notional
                            - hybrid
                      required:
                        - account_id
                        - name
                        - currency
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: createConcentrationAccount
      summary: Create concentration account
      description: Designate a bank account as a concentration account for cash pooling.
      tags:
        - Cash Positions
      requestBody:
        required: true
        description: Create concentration account request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    name:
                      type: string
                      description: "Account name"
                      example: "EUR Master Pool"
                    bank_account_id:
                      type: string
                      description: "Bank account"
                      format: uuid
                      example: "acct-4a5b6c7d"
                    pool_type:
                      type: string
                      description: "Pool type"
                      example: "physical"
                      enum:
                        - physical
                        - notional
                        - hybrid
                    auto_sweep:
                      type: boolean
                      description: "Enable automatic sweeps from subsidiaries"
                      example: true
              required:
                - name
                - bank_account_id
                - pool_type
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  account_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "con-6a7b8c9d"
                  name:
                    type: string
                    description: "Name"
                    example: "EUR Master Pool"
                  pool_type:
                    type: string
                    description: "Type"
                    example: "physical"
                required:
                  - account_id
                  - name
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /concentration-accounts/{account_id}:
    get:
      operationId: getConcentrationAccount
      summary: Get concentration account
      description: >-
        Retrieve concentration account details with connected subsidiaries and pool balances.
      tags:
        - Cash Positions
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Unique account id"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  account_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "con-6a7b8c9d"
                  name:
                    type: string
                    description: "Name"
                    example: "USD Master Concentration"
                  currency:
                    type: string
                    description: "Currency"
                    example: "USD"
                  current_balance:
                    type: number
                    description: "Balance"
                    format: double
                    example: 15000000.0
                  subsidiaries:
                    type: array
                    description: "Connected subsidiary accounts"
                    items:
                      type: object
                required:
                  - account_id
                  - name
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    patch:
      operationId: updateConcentrationAccount
      summary: Update concentration account
      description: Update concentration account configuration.
      tags:
        - Cash Positions
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Unique account id"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Update concentration account request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    auto_sweep:
                      type: boolean
                      description: "Auto-sweep enabled"
                      example: true
                    pool_type:
                      type: string
                      description: "Pool type"
                      example: "physical"
                      enum:
                        - physical
                        - notional
                        - hybrid
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  account_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "con-6a7b8c9d"
                  updated_at:
                    type: string
                    description: "ISO 8601 timestamp"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - account_id
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /disbursements:
    get:
      operationId: listDisbursements
      summary: List disbursements
      description: List scheduled and completed disbursement payments from operating accounts.
      tags:
        - Cash Sweeps
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        disbursement_id:
                          type: string
                          description: "Disbursement ID"
                          format: uuid
                          example: "dsb-8a9b0c1d"
                        source_account:
                          type: string
                          description: "Source account"
                          format: uuid
                          example: "acct-4a5b6c7d"
                        beneficiary:
                          type: string
                          description: "Beneficiary name"
                          example: "Vendor Corp"
                        amount:
                          type: number
                          description: "Payment amount"
                          format: double
                          example: 125000.0
                        currency:
                          type: string
                          description: "Currency"
                          example: "USD"
                        payment_method:
                          type: string
                          description: "Payment rail"
                          example: "wire"
