openapi: 3.0.3
info:
  title: Acme Finance Credit Decisioning API
  description: >-
    Automate credit application decisions using configurable policy rules, risk scoring models, and regulatory
    compliance checks. Supports the full application lifecycle from submission through automated decisioning,
    manual review queues, decision overrides, and ECOA-compliant adverse action notices. Integrates with credit
    scoring and bureau APIs for real-time data during the decision process.
  version: 2.0.3
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-credit-decisioning
  x-acme-domain: credit
servers:
  - url: https://af-credit-decisioning.api.acmefin.com/v1
    description: Production
  - url: https://af-credit-decisioning.staging.acmefin.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Applications
    description: Submit, review, and manage credit applications through the decisioning pipeline
  - name: Decision Engine
    description: Automated decisioning, manual review queues, overrides, and audit trails
  - name: Policy Management
    description: Configure and manage business rules that govern automated credit decisions
paths:
  /applications:
    get:
      operationId: listApplications
      summary: List applications
      description: >-
        Retrieve credit applications with filtering by decision status, product type, date range, and risk
        score threshold. Default sort is by submission date descending.
      tags:
        - Applications
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: decision
          in: query
          required: false
          description: Filter by decision status
          schema:
            type: "string"
            enum:
              - pending
              - approved
              - conditionally_approved
              - declined
              - referred_to_review
        - name: product_type
          in: query
          required: false
          description: Filter by product type
          schema:
            type: "string"
        - name: submitted_after
          in: query
          required: false
          description: Applications submitted after this date
          schema:
            type: "string"
            format: "date-time"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        application_id:
                          type: string
                          description: Application identifier
                          format: uuid
                          example: "app-4d5e6f7a-b8c9-0123-defa-456789012345"
                        consumer_id:
                          type: string
                          description: Applicant consumer ID
                          format: uuid
                          example: "con-8b3c4d5e-f6a7-5432-bcde-2345678901bc"
                        product_type:
                          type: string
                          description: Credit product being applied for
                          example: "credit_card"
                          enum:
                            - credit_card
                            - personal_loan
                            - auto_loan
                            - mortgage
                            - heloc
                            - business_line
                        requested_amount:
                          type: number
                          description: Requested credit amount in USD
                          example: 25000.0
                        decision:
                          type: string
                          description: Current decision status
                          example: "pending"
                          enum:
                            - pending
                            - approved
                            - conditionally_approved
                            - declined
                            - referred_to_review
                            - withdrawn
                        risk_score:
                          type: integer
                          description: Internal risk score from decisioning model
                          example: 78
                          minimum: 0
                          maximum: 100
                        debt_to_income:
                          type: number
                          description: Applicant's debt-to-income ratio
                          example: 32.5
                        decision_method:
                          type: string
                          description: How the decision was rendered
                          example: "automated"
                          enum:
                            - automated
                            - manual_review
                            - override
                            - policy_exception
                        adverse_action_reasons:
                          type: array
                          description: Reasons for decline or conditional approval per ECOA
                          items:
                            type: string
                            example: "Insufficient credit history"
                        submitted_at:
                          type: string
                          description: Application submission timestamp
                          format: date-time
                          example: "2025-03-14T09:00:00Z"
                        decided_at:
                          type: string
                          description: Decision timestamp
                          format: date-time
                          example: "2025-03-14T09:00:45Z"
                      required:
                        - application_id
                        - consumer_id
                        - decision
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: submitApplication
      summary: Submit credit application
      description: >-
        Submit a new credit application for decisioning. The system pulls the applicant's credit score and
        report, evaluates against active policy rules, and renders an automated decision within seconds.
        Applications that cannot be auto-decided are routed to the manual review queue.
      tags:
        - Applications
      requestBody:
        required: true
        description: Submit credit application request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    consumer_id:
                      type: string
                      description: Applicant
                      format: uuid
                      example: "con-8b3c4d5e"
                    product_type:
                      type: string
                      description: Product
                      example: "credit_card"
                      enum:
                        - credit_card
                        - personal_loan
                        - auto_loan
                        - mortgage
                        - heloc
                    requested_amount:
                      type: number
                      description: Requested amount in USD
                      example: 25000.0
                    annual_income:
                      type: number
                      description: Stated annual income in USD
                      example: 85000.0
                    employment_status:
                      type: string
                      description: Employment status
                      example: "employed"
                      enum:
                        - employed
                        - self_employed
                        - retired
                        - student
                        - unemployed
                    housing_status:
                      type: string
                      description: Housing status
                      example: "own"
                      enum:
                        - own
                        - rent
                        - other
                    monthly_housing_payment:
                      type: number
                      description: Monthly housing payment
                      example: 1450.0
              required:
                - consumer_id
                - product_type
                - requested_amount
                - annual_income
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  application_id:
                    type: string
                    description: Application identifier
                    format: uuid
                    example: "app-4d5e6f7a-b8c9-0123-defa-456789012345"
                  consumer_id:
                    type: string
                    description: Applicant consumer ID
                    format: uuid
                    example: "con-8b3c4d5e-f6a7-5432-bcde-2345678901bc"
                  product_type:
                    type: string
                    description: Credit product being applied for
                    example: "credit_card"
                    enum:
                      - credit_card
                      - personal_loan
                      - auto_loan
                      - mortgage
                      - heloc
                      - business_line
                  requested_amount:
                    type: number
                    description: Requested credit amount in USD
                    example: 25000.0
                  decision:
                    type: string
                    description: Current decision status
                    example: "pending"
                    enum:
                      - pending
                      - approved
                      - conditionally_approved
                      - declined
                      - referred_to_review
                      - withdrawn
                  risk_score:
                    type: integer
                    description: Internal risk score from decisioning model
                    example: 78
                    minimum: 0
                    maximum: 100
                  debt_to_income:
                    type: number
                    description: Applicant's debt-to-income ratio
                    example: 32.5
                  decision_method:
                    type: string
                    description: How the decision was rendered
                    example: "automated"
                    enum:
                      - automated
                      - manual_review
                      - override
                      - policy_exception
                  adverse_action_reasons:
                    type: array
                    description: Reasons for decline or conditional approval per ECOA
                    items:
                      type: string
                      example: "Insufficient credit history"
                  submitted_at:
                    type: string
                    description: Application submission timestamp
                    format: date-time
                    example: "2025-03-14T09:00:00Z"
                  decided_at:
                    type: string
                    description: Decision timestamp
                    format: date-time
                    example: "2025-03-14T09:00:45Z"
                required:
                  - application_id
                  - decision
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /applications/{application_id}:
    get:
      operationId: getApplication
      summary: Get application details
      description: >-
        Retrieve complete application details including the applicant's submitted information, credit data
        used in decisioning, the decision outcome, and any adverse action reasons.
      tags:
        - Applications
      parameters:
        - name: application_id
          in: path
          required: true
          description: Unique application id
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  application_id:
                    type: string
                    description: Application identifier
                    format: uuid
                    example: "app-4d5e6f7a-b8c9-0123-defa-456789012345"
                  consumer_id:
                    type: string
                    description: Applicant consumer ID
                    format: uuid
                    example: "con-8b3c4d5e-f6a7-5432-bcde-2345678901bc"
                  product_type:
                    type: string
                    description: Credit product being applied for
                    example: "credit_card"
                    enum:
                      - credit_card
                      - personal_loan
                      - auto_loan
                      - mortgage
                      - heloc
                      - business_line
                  requested_amount:
                    type: number
                    description: Requested credit amount in USD
                    example: 25000.0
                  decision:
                    type: string
                    description: Current decision status
                    example: "pending"
                    enum:
                      - pending
                      - approved
                      - conditionally_approved
                      - declined
                      - referred_to_review
                      - withdrawn
                  risk_score:
                    type: integer
                    description: Internal risk score from decisioning model
                    example: 78
                    minimum: 0
                    maximum: 100
                  debt_to_income:
                    type: number
                    description: Applicant's debt-to-income ratio
                    example: 32.5
                  decision_method:
                    type: string
                    description: How the decision was rendered
                    example: "automated"
                    enum:
                      - automated
                      - manual_review
                      - override
                      - policy_exception
                  adverse_action_reasons:
                    type: array
                    description: Reasons for decline or conditional approval per ECOA
                    items:
                      type: string
                      example: "Insufficient credit history"
                  submitted_at:
                    type: string
                    description: Application submission timestamp
                    format: date-time
                    example: "2025-03-14T09:00:00Z"
                  decided_at:
                    type: string
                    description: Decision timestamp
                    format: date-time
                    example: "2025-03-14T09:00:45Z"
                required:
                  - application_id
                  - consumer_id
                  - decision
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    patch:
      operationId: updateApplication
      summary: Update application
      description: >-
        Update a pending application with corrected applicant information. Only applications in 'pending' or
        'referred_to_review' status can be updated. Updating triggers a re-evaluation against current policy
        rules.
      tags:
        - Applications
      parameters:
        - name: application_id
          in: path
          required: true
          description: Unique application id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Update application request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    annual_income:
                      type: number
                      description: Corrected annual income
                      example: 92000.0
                    employment_status:
                      type: string
                      description: Updated employment status
                      example: "employed"
                      enum:
                        - employed
                        - self_employed
                        - retired
                    additional_income:
                      type: number
                      description: Additional documented income
                      example: 12000.0
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  application_id:
                    type: string
                    description: Application identifier
                    format: uuid
                    example: "app-4d5e6f7a-b8c9-0123-defa-456789012345"
                  consumer_id:
                    type: string
                    description: Applicant consumer ID
                    format: uuid
                    example: "con-8b3c4d5e-f6a7-5432-bcde-2345678901bc"
                  product_type:
                    type: string
                    description: Credit product being applied for
                    example: "credit_card"
                    enum:
                      - credit_card
                      - personal_loan
                      - auto_loan
                      - mortgage
                      - heloc
                      - business_line
                  requested_amount:
                    type: number
                    description: Requested credit amount in USD
                    example: 25000.0
                  decision:
                    type: string
                    description: Current decision status
                    example: "pending"
                    enum:
                      - pending
                      - approved
                      - conditionally_approved
                      - declined
                      - referred_to_review
                      - withdrawn
                  risk_score:
                    type: integer
                    description: Internal risk score from decisioning model
                    example: 78
                    minimum: 0
                    maximum: 100
                  debt_to_income:
                    type: number
                    description: Applicant's debt-to-income ratio
                    example: 32.5
                  decision_method:
                    type: string
                    description: How the decision was rendered
                    example: "automated"
                    enum:
                      - automated
                      - manual_review
                      - override
                      - policy_exception
                  adverse_action_reasons:
                    type: array
                    description: Reasons for decline or conditional approval per ECOA
                    items:
                      type: string
                      example: "Insufficient credit history"
                  submitted_at:
                    type: string
                    description: Application submission timestamp
                    format: date-time
                    example: "2025-03-14T09:00:00Z"
                  decided_at:
                    type: string
                    description: Decision timestamp
                    format: date-time
                    example: "2025-03-14T09:00:45Z"
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /applications/{application_id}/decide:
    post:
      operationId: autoDecide
      summary: Run automated decision
      description: >-
        Trigger the automated decisioning engine for a pending application. Evaluates the application
        against all active policy rules in priority order, pulls fresh credit data if stale, and renders a
        decision. Returns the decision along with the matched policy rules and adverse action reasons if
        applicable.
      tags:
        - Decision Engine
      parameters:
        - name: application_id
          in: path
          required: true
          description: Unique application id
          schema:
            type: "string"
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  application_id:
                    type: string
                    description: Application
                    format: uuid
                    example: "app-4d5e6f7a"
                  decision:
                    type: string
                    description: Rendered decision
                    example: "approved"
                    enum:
                      - approved
                      - conditionally_approved
                      - declined
                      - referred_to_review
                  matched_policies:
                    type: array
                    description: Policy rules that matched
                    items:
                      type: string
                      example: "pol-5e6f7a8b"
                  risk_score:
                    type: integer
                    description: Calculated risk score
                    example: 78
                  adverse_action_reasons:
                    type: array
                    description: ECOA adverse action reasons
                    items:
                      type: string
                      example: "Insufficient credit history"
                  decided_at:
                    type: string
                    description: Decision timestamp
                    format: date-time
                    example: "2025-01-15T09:30:00Z"
                required:
                  - application_id
                  - decision
                  - risk_score
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /applications/{application_id}/review:
    post:
      operationId: manualReview
      summary: Submit manual review
      description: >-
        Submit a manual underwriter review decision for an application in the review queue. Requires a
        decision, justification notes, and optional conditions. Manual reviews are fully audited and subject
        to supervisory approval for overrides.
      tags:
        - Decision Engine
      parameters:
        - name: application_id
          in: path
          required: true
          description: Unique application id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Submit manual review request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    decision:
                      type: string
                      description: Review decision
                      example: "approved"
                      enum:
                        - approved
                        - conditionally_approved
                        - declined
                    reviewer_notes:
                      type: string
                      description: Underwriter justification
                      example: "Verified income documentation supports approval at reduced limit"
                    conditions:
                      type: array
                      description: Conditions for conditional approval
                      items:
                        type: string
                        example: "Provide 2 months bank statements"
                    approved_amount:
                      type: number
                      description: Approved amount (may differ from requested)
                      example: 20000.0
              required:
                - decision
                - reviewer_notes
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  application_id:
                    type: string
                    description: Application
                    format: uuid
                    example: "app-4d5e6f7a"
                  decision:
                    type: string
                    description: Final decision
                    example: "approved"
                    enum:
                      - approved
                      - conditionally_approved
                      - declined
                  reviewed_by:
                    type: string
                    description: Reviewer user ID
                    example: "user-underwriter-42"
                  reviewed_at:
                    type: string
                    description: Review timestamp
                    format: date-time
                    example: "2025-01-15T09:30:00Z"
                required:
                  - application_id
                  - decision
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /applications/{application_id}/override:
    post:
      operationId: overrideDecision
      summary: Override decision
      description: >-
        Override a previous automated or manual decision on an application. Overrides require supervisor-
        level authorization and a documented business justification. All overrides are flagged for
        compliance review and appear on the application's audit trail.
      tags:
        - Decision Engine
      parameters:
        - name: application_id
          in: path
          required: true
          description: Unique application id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Override decision request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    new_decision:
                      type: string
                      description: Overridden decision
                      example: "approved"
                      enum:
                        - approved
                        - conditionally_approved
                        - declined
                    justification:
                      type: string
                      description: Business justification for override
                      example: "Customer provided updated income documentation showing $120K annual income"
                    supervisor_id:
                      type: string
                      description: Approving supervisor user ID
                      example: "user-supervisor-7"
                    override_type:
                      type: string
                      description: Override classification
                      example: "policy_exception"
                      enum:
                        - policy_exception
                        - data_correction
                        - escalation_resolution
              required:
                - new_decision
                - justification
                - supervisor_id
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  application_id:
                    type: string
                    description: Application
                    format: uuid
                    example: "app-4d5e6f7a"
                  previous_decision:
                    type: string
                    description: Previous decision
                    example: "declined"
                    enum:
                      - declined
                      - referred_to_review
                  new_decision:
                    type: string
                    description: New decision
                    example: "approved"
                    enum:
                      - approved
                      - conditionally_approved
                  override_id:
                    type: string
                    description: Override record ID
                    format: uuid
                    example: "ovr-6f7a8b9c"
                required:
                  - application_id
                  - new_decision
                  - override_id
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /applications/{application_id}/audit-trail:
    get:
      operationId: getApplicationAuditTrail
      summary: Get audit trail
      description: >-
        Retrieve the complete audit trail for an application, including every status change, policy
        evaluation, manual review, override, and data access event. Required for ECOA, FCRA, and fair
        lending compliance audits.
      tags:
        - Decision Engine
      parameters:
        - name: application_id
          in: path
          required: true
          description: Application identifier
          schema:
            type: "string"
        - name: page
          in: query
          required: false
          description: Page number
          schema:
            type: "integer"
            default: 1
        - name: per_page
          in: query
          required: false
          description: Results per page
          schema:
            type: "integer"
            default: 20
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        event_id:
                          type: string
                          description: Audit event identifier
                          format: uuid
                          example: "evt-7a8b9c0d"
                        event_type:
                          type: string
                          description: Type of audit event
                          example: "submitted"
                          enum:
                            - submitted
                            - policy_evaluated
                            - decision_rendered
                            - manual_review
                            - override
                            - status_changed
                        actor:
                          type: string
                          description: User or system that performed the action
                          example: "system:decisioning-engine"
                        description:
                          type: string
                          description: Event description
                          example: "Automated decision: approved at $25,000"
                        timestamp:
                          type: string
                          description: Event timestamp
                          format: date-time
                          example: "2025-01-15T09:30:00Z"
                      required:
                        - event_id
                        - event_type
                        - timestamp
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /review-queue:
    get:
      operationId: getReviewQueue
      summary: Get manual review queue
      description: >-
        Retrieve applications waiting for manual underwriter review, sorted by priority. Priority is
        determined by product type, requested amount, and time in queue. Applications approaching SLA
        deadlines are flagged.
      tags:
        - Decision Engine
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
