openapi: 3.0.3
info:
  title: Acme Finance Counterparty Management API
  description: >-
    Comprehensive counterparty relationship management for treasury operations covering entity onboarding, credit
    limit assignment, real-time exposure monitoring, bilateral netting agreement management, ISDA Master Agreement
    tracking, KYC documentation workflows, and internal risk rating maintenance. Supports regulatory requirements
    for counterparty credit risk (CCR) under Basel III/IV.
  version: 2.5.0
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-treasury-counterparty
  x-acme-domain: treasury
servers:
  - url: https://af-treasury-counterparty.api.acmefin.com/v1
    description: Production
  - url: https://af-treasury-counterparty.staging.acmefin.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Counterparties
    description: Counterparty entity management, credit limits, and exposure monitoring
  - name: Agreements
    description: Netting agreements and ISDA Master Agreement management
  - name: KYC & Compliance
    description: Know Your Customer documentation and compliance workflows
paths:
  /counterparties:
    get:
      operationId: listCounterparties
      summary: List counterparties
      description: >-
        List all counterparties with filtering by status, entity type, risk rating, and country.
      tags:
        - Counterparties
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: status
          in: query
          required: false
          description: "Filter by status"
          schema:
            type: "string"
            enum:
              - active
              - suspended
              - under_review
        - name: entity_type
          in: query
          required: false
          description: "Filter by entity type"
          schema:
            type: "string"
        - name: risk_rating
          in: query
          required: false
          description: "Filter by risk rating"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        counterparty_id:
                          type: string
                          description: "Counterparty ID"
                          format: uuid
                          example: "cpty-4a5b6c7d-8e9f-0a1b-2c3d"
                        legal_name:
                          type: string
                          description: "Legal entity name"
                          example: "Goldman Sachs International"
                        short_name:
                          type: string
                          description: "Short name"
                          example: "GSI"
                        lei:
                          type: string
                          description: "Legal Entity Identifier"
                          example: "W22LROWP2IHZNBB6K528"
                        country:
                          type: string
                          description: "Country of incorporation"
                          example: "GB"
                        entity_type:
                          type: string
                          description: "Entity type"
                          example: "bank"
                          enum:
                            - bank
                            - broker_dealer
                            - corporate
                            - sovereign
                            - ccp
                            - fund
                        risk_rating:
                          type: string
                          description: "Internal risk rating"
                          example: "AAA"
                          enum:
                            - AAA
                            - AA
                            - A
                            - BBB
                            - BB
                            - B
                            - CCC
                            - NR
                        status:
                          type: string
                          description: "Relationship status"
                          example: "active"
                          enum:
                            - active
                            - suspended
                            - under_review
                            - terminated
                        onboarded_at:
                          type: string
                          description: "Onboarding date"
                          format: date-time
                          example: "2025-06-15T14:30:00Z"
                      required:
                        - counterparty_id
                        - legal_name
                        - risk_rating
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: createCounterparty
      summary: Onboard counterparty
      description: >-
        Onboard a new counterparty entity. Triggers KYC workflow initiation and credit limit assessment.
      tags:
        - Counterparties
      requestBody:
        required: true
        description: Onboard counterparty request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    legal_name:
                      type: string
                      description: "Legal name"
                      example: "BNP Paribas SA"
                    short_name:
                      type: string
                      description: "Short name"
                      example: "BNPP"
                    lei:
                      type: string
                      description: "LEI code"
                      example: "R0MUWSFPU8MPRO8K5P83"
                    country:
                      type: string
                      description: "Country code"
                      example: "FR"
                    entity_type:
                      type: string
                      description: "Type"
                      example: "bank"
                      enum:
                        - bank
                        - broker_dealer
                        - corporate
                        - sovereign
                        - ccp
                        - fund
                    industry_sector:
                      type: string
                      description: "Industry"
                      example: "Financial Services"
                    relationship_manager:
                      type: string
                      description: "RM email"
                      example: "rm@acmefin.com"
              required:
                - legal_name
                - lei
                - country
                - entity_type
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  counterparty_id:
                    type: string
                    description: "Counterparty ID"
                    format: uuid
                    example: "cpty-4a5b6c7d-8e9f-0a1b-2c3d"
                  legal_name:
                    type: string
                    description: "Legal entity name"
                    example: "Goldman Sachs International"
                  short_name:
                    type: string
                    description: "Short name"
                    example: "GSI"
                  lei:
                    type: string
                    description: "Legal Entity Identifier"
                    example: "W22LROWP2IHZNBB6K528"
                  country:
                    type: string
                    description: "Country of incorporation"
                    example: "GB"
                  entity_type:
                    type: string
                    description: "Entity type"
                    example: "bank"
                    enum:
                      - bank
                      - broker_dealer
                      - corporate
                      - sovereign
                      - ccp
                      - fund
                  risk_rating:
                    type: string
                    description: "Internal risk rating"
                    example: "AAA"
                    enum:
                      - AAA
                      - AA
                      - A
                      - BBB
                      - BB
                      - B
                      - CCC
                      - NR
                  status:
                    type: string
                    description: "Relationship status"
                    example: "active"
                    enum:
                      - active
                      - suspended
                      - under_review
                      - terminated
                  onboarded_at:
                    type: string
                    description: "Onboarding date"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - counterparty_id
                  - legal_name
                  - status
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /counterparties/{counterparty_id}:
    get:
      operationId: getCounterparty
      summary: Get counterparty
      description: >-
        Retrieve full counterparty profile including credit limits, exposure summary, and KYC status.
      tags:
        - Counterparties
      parameters:
        - name: counterparty_id
          in: path
          required: true
          description: "Unique counterparty id"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  counterparty_id:
                    type: string
                    description: "Counterparty ID"
                    format: uuid
                    example: "cpty-4a5b6c7d-8e9f-0a1b-2c3d"
                  legal_name:
                    type: string
                    description: "Legal entity name"
                    example: "Goldman Sachs International"
                  short_name:
                    type: string
                    description: "Short name"
                    example: "GSI"
                  lei:
                    type: string
                    description: "Legal Entity Identifier"
                    example: "W22LROWP2IHZNBB6K528"
                  country:
                    type: string
                    description: "Country of incorporation"
                    example: "GB"
                  entity_type:
                    type: string
                    description: "Entity type"
                    example: "bank"
                    enum:
                      - bank
                      - broker_dealer
                      - corporate
                      - sovereign
                      - ccp
                      - fund
                  risk_rating:
                    type: string
                    description: "Internal risk rating"
                    example: "AAA"
                    enum:
                      - AAA
                      - AA
                      - A
                      - BBB
                      - BB
                      - B
                      - CCC
                      - NR
                  status:
                    type: string
                    description: "Relationship status"
                    example: "active"
                    enum:
                      - active
                      - suspended
                      - under_review
                      - terminated
                  onboarded_at:
                    type: string
                    description: "Onboarding date"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - counterparty_id
                  - legal_name
                  - status
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    patch:
      operationId: updateCounterparty
      summary: Update counterparty
      description: Update counterparty information.
      tags:
        - Counterparties
      parameters:
        - name: counterparty_id
          in: path
          required: true
          description: "Unique counterparty id"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Update counterparty request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    short_name:
                      type: string
                      description: "Updated short name"
                      example: "BNPP"
                    relationship_manager:
                      type: string
                      description: "Updated RM"
                      example: "new-rm@acmefin.com"
                    status:
                      type: string
                      description: "Status"
                      example: "active"
                      enum:
                        - active
                        - suspended
                        - under_review
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  counterparty_id:
                    type: string
                    description: "Counterparty ID"
                    format: uuid
                    example: "cpty-4a5b6c7d-8e9f-0a1b-2c3d"
                  legal_name:
                    type: string
                    description: "Legal entity name"
                    example: "Goldman Sachs International"
                  short_name:
                    type: string
                    description: "Short name"
                    example: "GSI"
                  lei:
                    type: string
                    description: "Legal Entity Identifier"
                    example: "W22LROWP2IHZNBB6K528"
                  country:
                    type: string
                    description: "Country of incorporation"
                    example: "GB"
                  entity_type:
                    type: string
                    description: "Entity type"
                    example: "bank"
                    enum:
                      - bank
                      - broker_dealer
                      - corporate
                      - sovereign
                      - ccp
                      - fund
                  risk_rating:
                    type: string
                    description: "Internal risk rating"
                    example: "AAA"
                    enum:
                      - AAA
                      - AA
                      - A
                      - BBB
                      - BB
                      - B
                      - CCC
                      - NR
                  status:
                    type: string
                    description: "Relationship status"
                    example: "active"
                    enum:
                      - active
                      - suspended
                      - under_review
                      - terminated
                  onboarded_at:
                    type: string
                    description: "Onboarding date"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - counterparty_id
                  - legal_name
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
    delete:
      operationId: terminateCounterparty
      summary: Terminate counterparty
      description: >-
        Terminate a counterparty relationship. All open positions must be closed or novated first.
      tags:
        - Counterparties
      parameters:
        - name: counterparty_id
          in: path
          required: true
          description: "Unique counterparty id"
          schema:
            type: "string"
      responses:
        "204":
          description: Resource deleted successfully
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /counterparties/{counterparty_id}/credit-limit:
    get:
      operationId: getCreditLimit
      summary: Get credit limit
      description: >-
        Retrieve the credit limit structure for a counterparty including limits by product, tenor, and
        settlement risk.
      tags:
        - Counterparties
      parameters:
        - name: counterparty_id
          in: path
          required: true
          description: "Unique counterparty id"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  counterparty_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "cpty-4a5b6c7d"
                  global_limit:
                    type: number
                    description: "Global credit limit"
                    format: double
                    example: 50000000.0
                  utilized:
                    type: number
                    description: "Current utilization"
                    format: double
                    example: 12500000.0
                  available:
                    type: number
                    description: "Available limit"
                    format: double
                    example: 37500000.0
                  utilization_percent:
                    type: number
                    description: "Utilization rate"
                    format: double
                    example: 25.0
                  product_limits:
                    type: object
                    description: "Per-product limit breakdown"
                  approved_by:
                    type: string
                    description: "Approver"
                    example: "credit-committee"
                  expires_at:
                    type: string
                    description: "Limit expiry date"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - counterparty_id
                  - global_limit
                  - utilized
                  - available
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    put:
      operationId: updateCreditLimit
      summary: Update credit limit
      description: >-
        Update the credit limit for a counterparty. Requires credit committee approval for increases above
        $10M.
      tags:
        - Counterparties
      parameters:
        - name: counterparty_id
          in: path
          required: true
          description: "Counterparty ID"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Update credit limit request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    global_limit:
                      type: number
                      description: "New global limit"
                      format: double
                      example: 75000000.0
                    product_limits:
                      type: object
                      description: "Per-product limits"
                    reason:
                      type: string
                      description: "Change reason"
                      example: "Annual credit review — upgrading to A+ rating"
                    expires_at:
                      type: string
                      description: "New expiry"
                      format: date-time
                      example: "2025-06-15T14:30:00Z"
              required:
                - global_limit
                - reason
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  counterparty_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "cpty-4a5b6c7d"
                  global_limit:
                    type: number
                    description: "Updated limit"
                    format: double
                    example: 75000000.0
                  approved_by:
                    type: string
                    description: "Approver"
                    example: "credit-committee"
                  updated_at:
                    type: string
                    description: "ISO 8601 timestamp"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - counterparty_id
                  - global_limit
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /counterparties/{counterparty_id}/exposure:
    get:
      operationId: getExposure
      summary: Get counterparty exposure
      description: >-
        Calculate real-time counterparty exposure across all products including current exposure, potential
        future exposure (PFE), and credit value adjustment (CVA).
      tags:
        - Counterparties
      parameters:
        - name: counterparty_id
          in: path
          required: true
          description: "Unique counterparty id"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  counterparty_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "cpty-4a5b6c7d"
                  current_exposure:
                    type: number
                    description: "Current mark-to-market exposure"
                    format: double
                    example: 8500000.0
                  potential_future_exposure:
                    type: number
                    description: "PFE at 95% confidence"
                    format: double
                    example: 15200000.0
                  credit_limit:
                    type: number
                    description: "Approved credit limit"
                    format: double
                    example: 50000000.0
                  limit_utilization_percent:
                    type: number
                    description: "Limit utilization"
                    format: double
                    example: 17.0
                  cva:
                    type: number
                    description: "Credit Value Adjustment"
                    format: double
                    example: 125000.0
                  netting_benefit:
                    type: number
                    description: "Netting benefit from ISDA"
                    format: double
                    example: 3200000.0
                  collateral_held:
                    type: number
                    description: "Collateral value held"
                    format: double
                    example: 5000000.0
                  net_exposure:
                    type: number
                    description: "Net exposure after netting and collateral"
                    format: double
                    example: 300000.0
                  by_product:
                    type: object
                    description: "Exposure breakdown by product"
                  as_of:
                    type: string
                    description: "Calculation timestamp"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - counterparty_id
                  - current_exposure
                  - net_exposure
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /netting-agreements:
    get:
      operationId: listNettingAgreements
      summary: List netting agreements
      description: >-
        List bilateral netting agreements that reduce gross exposure to net exposure across trades.
      tags:
        - Agreements
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        agreement_id:
                          type: string
                          description: "Agreement ID"
                          format: uuid
                          example: "na-2a3b4c5d"
                        counterparty_id:
                          type: string
                          description: "Counterparty"
                          format: uuid
                          example: "cpty-4a5b6c7d"
                        counterparty_name:
                          type: string
                          description: "Counterparty name"
                          example: "Goldman Sachs"
                        agreement_type:
                          type: string
                          description: "Netting type"
                          example: "bilateral"
                          enum:
                            - bilateral
                            - multilateral
                        products_covered:
                          type: array
                          description: "Products covered by netting"
                          items:
                            type: string
                        gross_exposure:
                          type: number
                          description: "Gross exposure"
                          format: double
                          example: 25000000.0
                        net_exposure:
                          type: number
                          description: "Net after netting"
                          format: double
                          example: 3500000.0
                        netting_benefit:
                          type: number
                          description: "Netting benefit"
                          format: double
                          example: 21500000.0
                        status:
                          type: string
                          description: "Agreement status"
                          example: "active"
                          enum:
                            - active
                            - pending
                            - expired
                      required:
                        - agreement_id
                        - counterparty_id
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: createNettingAgreement
      summary: Create netting agreement
      description: Record a bilateral netting agreement with a counterparty.
      tags:
        - Agreements
      requestBody:
        required: true
        description: Create netting agreement request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    counterparty_id:
                      type: string
                      description: "Counterparty"
                      format: uuid
                      example: "cpty-4a5b6c7d"
                    agreement_type:
                      type: string
                      description: "Type"
                      example: "bilateral"
                      enum:
                        - bilateral
                        - multilateral
                    products_covered:
                      type: array
                      description: "Covered products"
                      items:
                        type: string
                    effective_date:
                      type: string
                      description: "Effective date"
                      example: "2025-01-01"
                    governing_law:
                      type: string
                      description: "Governing law"
                      example: "English Law"
              required:
                - counterparty_id
                - agreement_type
                - products_covered
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  agreement_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "na-2a3b4c5d"
                  status:
                    type: string
                    description: "Status"
                    example: "active"
                required:
                  - agreement_id
                  - status
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
