      description: JWT Bearer token obtained from the Acme Finance Identity service
    OAuth2:
      type: oauth2
      description: OAuth 2.0 authorization for Acme Finance APIs
      flows:
        clientCredentials:
          tokenUrl: https://auth.acmefin.com/oauth2/token
          scopes:
            read: Read access to resources
            write: Write access to resources
            admin: Administrative access
        authorizationCode:
          authorizationUrl: https://auth.acmefin.com/oauth2/authorize
          tokenUrl: https://auth.acmefin.com/oauth2/token
          scopes:
            read: Read access to resources
            write: Write access to resources
            admin: Administrative access
    ApiKeyAuth:
      type: apiKey
      in: header
