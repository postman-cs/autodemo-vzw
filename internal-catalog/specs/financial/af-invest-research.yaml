openapi: 3.0.3
info:
  title: Acme Finance Research API
  description: >-
    Equity research data services providing analyst consensus ratings, earnings estimates and actuals, SEC filing
    access, stock screener, watchlist management, and individual analyst price targets. Supports fundamental
    analysis with P/E, EV/EBITDA, and growth metrics for investment decision-making.
  version: 3.5.0
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-invest-research
  x-acme-domain: invest
servers:
  - url: https://af-invest-research.api.acmefin.com/v1
    description: Production
  - url: https://af-invest-research.staging.acmefin.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Analyst Ratings
    description: Consensus analyst ratings, price targets, and rating distribution
  - name: Earnings
    description: Earnings estimates, actuals, surprise data, and management guidance
  - name: SEC Filings
    description: SEC EDGAR filings including 10-K, 10-Q, 8-K, and insider transactions
  - name: Screener
    description: Multi-criteria stock screener with fundamental and technical filters
  - name: Watchlists
    description: User-managed security watchlists for tracking research candidates
  - name: Price Targets
    description: Individual analyst price targets and rating changes
paths:
  /ratings/{ticker}:
    get:
      operationId: getAnalystRatings
      summary: Get analyst ratings
      description: >-
        Retrieve consensus analyst rating, price target distribution (mean, median, high, low), and
        buy/hold/sell rating counts for a security.
      tags:
        - Analyst Ratings
      parameters:
        - name: ticker
          in: path
          required: true
          description: "Unique ticker"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticker:
                    type: string
                    description: "Ticker symbol"
                    example: "AAPL"
                  consensus_rating:
                    type: string
                    description: "Consensus analyst rating"
                    enum:
                      - strong_buy
                      - buy
                      - hold
                      - sell
                      - strong_sell
                  mean_target_price:
                    type: number
                    description: "Mean analyst price target"
                    format: double
                    example: 195.0
                  median_target_price:
                    type: number
                    description: "Median analyst price target"
                    format: double
                    example: 192.5
                  high_target:
                    type: number
                    description: "Highest analyst target"
                    format: double
                    example: 225.0
                  low_target:
                    type: number
                    description: "Lowest analyst target"
                    format: double
                    example: 160.0
                  num_analysts:
                    type: integer
                    description: "Number of covering analysts"
                    example: 38
                  buy_count:
                    type: integer
                    description: "Number of buy/strong buy ratings"
                    example: 28
                  hold_count:
                    type: integer
                    description: "Number of hold ratings"
                    example: 8
                  sell_count:
                    type: integer
                    description: "Number of sell/strong sell ratings"
                    example: 2
                  last_updated:
                    type: string
                    description: "Last rating update"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - ticker
                  - consensus_rating
                  - num_analysts
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /ratings:
    get:
      operationId: listRatingsChanges
      summary: List recent rating changes
      description: >-
        Retrieve recent analyst rating changes and initiations across the coverage universe. Useful for
        identifying sentiment shifts.
      tags:
        - Analyst Ratings
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: date_from
          in: query
          required: false
          description: "Start date"
          schema:
            type: "string"
            format: "date"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        ticker:
                          type: string
                          description: "Ticker symbol"
                          example: "AAPL"
                        analyst_firm:
                          type: string
                          description: "Firm making the change"
                          example: "Morgan Stanley"
                        old_rating:
                          type: string
                          description: "Previous rating"
                          example: "hold"
                        new_rating:
                          type: string
                          description: "New rating"
                          example: "buy"
                        date:
                          type: string
                          description: "Rating change date"
                          format: date
                          example: "2025-06-15"
                        target_price:
                          type: number
                          description: "Updated price target"
                          format: double
                          example: 195.0
                      required:
                        - ticker
                        - new_rating
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /earnings/{ticker}:
    get:
      operationId: listEarnings
      summary: List earnings history
      description: >-
        Retrieve historical and upcoming earnings data for a security including EPS estimates, actuals,
        surprise percentages, revenue figures, and management guidance ranges.
      tags:
        - Earnings
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: upcoming_only
          in: query
          required: false
          description: "Show only upcoming (unreported) quarters"
          schema:
            type: "boolean"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        ticker:
                          type: string
                          description: "Ticker symbol"
                          example: "AAPL"
                        fiscal_quarter:
                          type: string
                          description: "Fiscal quarter"
                          example: "Q2 2025"
                        report_date:
                          type: string
                          description: "Earnings report date"
                          format: date
                          example: "2025-07-24"
                        eps_estimate:
                          type: number
                          description: "Consensus EPS estimate"
                          format: double
                          example: 1.35
                        eps_actual:
                          type: number
                          description: "Actual reported EPS (null if upcoming)"
                          format: double
                          example: 1.42
                        eps_surprise_pct:
                          type: number
                          description: "EPS surprise percentage"
                          format: double
                          example: 5.19
                        revenue_estimate:
                          type: object
                          description: "Consensus revenue estimate"
                          properties:
                            amount:
                              type: number
                              description: "Monetary amount"
                              format: double
                              example: 94500000000.0
                            currency:
                              type: string
                              description: "ISO 4217 currency code"
                              example: "USD"
                        revenue_actual:
                          type: object
                          description: "Actual reported revenue"
                          properties:
                            amount:
                              type: number
                              description: "Monetary amount"
                              format: double
                              example: 95800000000.0
                            currency:
                              type: string
                              description: "ISO 4217 currency code"
                              example: "USD"
                        guidance_eps_low:
                          type: number
                          description: "Management EPS guidance low end"
                          format: double
                          example: 1.38
                        guidance_eps_high:
                          type: number
                          description: "Management EPS guidance high end"
                          format: double
                          example: 1.48
                      required:
                        - ticker
                        - fiscal_quarter
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /earnings/calendar:
    get:
      operationId: listEarningsCalendar
      summary: List earnings calendar
      description: >-
        Retrieve the earnings release calendar for a date range showing which companies report and their
        consensus estimates. Useful for portfolio event risk management.
      tags:
        - Earnings
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: from_date
          in: query
          required: false
          description: "Start date"
          schema:
            type: "string"
            format: "date"
        - name: to_date
          in: query
          required: false
          description: "End date"
          schema:
            type: "string"
            format: "date"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        ticker:
                          type: string
                          description: "Ticker symbol"
                          example: "AAPL"
                        company_name:
                          type: string
                          description: "Company name"
                          example: "Apple Inc."
                        report_date:
                          type: string
                          description: "Earnings date"
                          format: date
                          example: "2025-06-15"
                        report_timing:
                          type: string
                          description: "Report timing"
                          enum:
                            - before_open
                            - after_close
                            - during_session
                        eps_estimate:
                          type: number
                          description: "Consensus EPS estimate"
                          format: double
                          example: 1.35
                      required:
                        - ticker
                        - report_date
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /filings/{ticker}:
    get:
      operationId: listSECFilings
      summary: List SEC filings
      description: >-
        Retrieve SEC EDGAR filings for a company including 10-K annual reports, 10-Q quarterly reports, 8-K
        current reports, proxy statements, and insider transaction forms (Form 4).
      tags:
        - SEC Filings
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: form_type
          in: query
          required: false
          description: "Filter by SEC form type"
          schema:
            type: "string"
            enum:
              - 10-K
              - 10-Q
              - 8-K
              - DEF 14A
              - 4
        - name: from_date
          in: query
          required: false
          description: "Filing date start"
          schema:
            type: "string"
            format: "date"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        filing_id:
                          type: string
                          description: "SEC filing identifier"
                          format: uuid
                          example: "filing-a1b2c3d4"
                        ticker:
                          type: string
                          description: "Ticker symbol"
                          example: "AAPL"
                        form_type:
                          type: string
                          description: "SEC form type"
                          enum:
                            - 10-K
                            - 10-Q
                            - 8-K
                            - DEF 14A
                            - S-1
                            - 4
                            - SC 13D
                            - 13F-HR
                        filed_date:
                          type: string
                          description: "Filing date"
                          format: date
                          example: "2025-05-15"
                        period_of_report:
                          type: string
                          description: "Period of report"
                          format: date
                          example: "2025-03-31"
                        description:
                          type: string
                          description: "Filing description"
                          example: "Quarterly Report"
                        filing_url:
                          type: string
                          description: "EDGAR filing URL"
                          example: "https://www.sec.gov/Archives/edgar/data/320193/filing.htm"
                        accession_number:
                          type: string
                          description: "SEC accession number"
                          example: "0000320193-25-000042"
                      required:
                        - filing_id
                        - form_type
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /filings/{ticker}/{filing_id}:
    get:
      operationId: getSECFiling
      summary: Get SEC filing details
      description: >-
        Retrieve detailed information for a specific SEC filing including document links, filing period, and
        accession number for EDGAR lookup.
      tags:
        - SEC Filings
      parameters:
        - name: filing_id
          in: path
          required: true
          description: "Unique filing id"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  filing_id:
                    type: string
                    description: "SEC filing identifier"
                    format: uuid
                    example: "filing-a1b2c3d4"
                  ticker:
                    type: string
                    description: "Ticker symbol"
                    example: "AAPL"
                  form_type:
                    type: string
                    description: "SEC form type"
                    enum:
                      - 10-K
                      - 10-Q
                      - 8-K
                      - DEF 14A
                      - S-1
                      - 4
                      - SC 13D
                      - 13F-HR
                  filed_date:
                    type: string
                    description: "Filing date"
                    format: date
                    example: "2025-05-15"
                  period_of_report:
                    type: string
                    description: "Period of report"
                    format: date
                    example: "2025-03-31"
                  description:
                    type: string
                    description: "Filing description"
                    example: "Quarterly Report"
                  filing_url:
                    type: string
                    description: "EDGAR filing URL"
                    example: "https://www.sec.gov/Archives/edgar/data/320193/filing.htm"
                  accession_number:
                    type: string
                    description: "SEC accession number"
                    example: "0000320193-25-000042"
                required:
                  - filing_id
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /screener:
    post:
      operationId: runScreener
      summary: Run stock screener
      description: >-
        Execute a multi-criteria stock screen with fundamental filters (P/E, EV/EBITDA, dividend yield,
        market cap, revenue growth) and technical filters (RSI, moving averages, volume). Returns ranked
        results.
      tags:
        - Screener
      requestBody:
        required: true
        description: Run stock screener request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    market_cap_min:
                      type: object
                      description: "Minimum market cap"
                      properties:
                        amount:
                          type: number
                          description: "Monetary amount"
                          format: double
                          example: 10000000000.0
                        currency:
                          type: string
                          description: "ISO 4217 currency code"
                          example: "USD"
                    market_cap_max:
                      type: object
                      description: "Maximum market cap"
                      properties:
                        amount:
                          type: number
                          description: "Monetary amount"
                          format: double
                          example: 0
                        currency:
                          type: string
                          description: "ISO 4217 currency code"
                          example: "USD"
                    pe_ratio_max:
                      type: number
                      description: "Maximum P/E ratio"
                      format: double
                      example: 25.0
                    dividend_yield_min:
                      type: number
                      description: "Minimum dividend yield"
                      format: double
                      example: 2.0
                    revenue_growth_min:
                      type: number
                      description: "Minimum revenue growth %"
                      format: double
                      example: 10.0
                    sector:
                      type: string
                      description: "GICS sector filter"
                      example: "Information Technology"
                    exchange:
                      type: string
                      description: "Exchange filter"
                      enum:
                        - NYSE
                        - NASDAQ
                        - AMEX
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    description: "Securities matching screen criteria"
                    items:
                      type: object
                  total_matches:
                    type: integer
                    description: "Total securities matching criteria"
                    example: 47
                  criteria_applied:
                    type: array
                    description: "Filter criteria used"
                    items:
                      type: string
                required:
                  - results
                  - total_matches
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /watchlists:
    get:
      operationId: listWatchlists
      summary: List watchlists
      description: >-
        Retrieve all watchlists for the authenticated user with security counts and last-updated timestamps.
      tags:
        - Watchlists
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        watchlist_id:
                          type: string
                          description: "Watchlist identifier"
                          format: uuid
                          example: "wl-a1b2c3d4"
                        name:
                          type: string
                          description: "Watchlist name"
                          example: "Tech Mega-Caps"
                        tickers:
                          type: array
                          description: "Securities in the watchlist"
                          items:
                            type: string
                        item_count:
                          type: integer
                          description: "Number of securities in watchlist"
                          example: 12
                        created_at:
                          type: string
                          description: "Watchlist creation date"
                          format: date-time
                          example: "2025-06-15T14:30:00Z"
                        updated_at:
                          type: string
                          description: "Last modification date"
                          format: date-time
                          example: "2025-06-15T14:30:00Z"
                      required:
                        - watchlist_id
                        - name
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: createWatchlist
      summary: Create a watchlist
      description: >-
        Create a new watchlist with an initial set of ticker symbols for tracking research candidates and
        monitoring price movements.
      tags:
        - Watchlists
      requestBody:
        required: true
        description: Create a watchlist request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    name:
                      type: string
                      description: "Watchlist name"
                      example: "Dividend Growers"
                    tickers:
                      type: array
                      description: "Initial ticker symbols"
                      items:
                        type: string
              required:
                - name
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  watchlist_id:
                    type: string
                    description: "Watchlist identifier"
                    format: uuid
                    example: "wl-a1b2c3d4"
                  name:
                    type: string
                    description: "Watchlist name"
                    example: "Tech Mega-Caps"
                  tickers:
                    type: array
                    description: "Securities in the watchlist"
                    items:
                      type: string
                  item_count:
                    type: integer
                    description: "Number of securities in watchlist"
                    example: 12
                  created_at:
                    type: string
                    description: "Watchlist creation date"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                  updated_at:
                    type: string
                    description: "Last modification date"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - watchlist_id
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /watchlists/{watchlist_id}:
    get:
      operationId: getWatchlist
      summary: Get watchlist details
      description: >-
        Retrieve a watchlist with all included securities and their current quotes for a quick snapshot of
        tracked research candidates.
