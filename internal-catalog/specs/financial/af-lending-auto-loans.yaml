openapi: 3.0.3
info:
  title: Acme Finance Auto Loans API
  description: >-
    Manage the complete auto loan lifecycle from application through payoff. Supports dealer-originated and
    direct-to-consumer channels with integrated vehicle valuation, GAP coverage, and title tracking. Provides
    real-time decisioning with configurable credit policies and risk-based pricing.
  version: 2.5.0
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-lending-auto-loans
  x-acme-domain: lending
servers:
  - url: https://af-lending-auto-loans.api.acmefin.com/v1
    description: Production
  - url: https://af-lending-auto-loans.staging.acmefin.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Applications
    description: Auto loan application processing
  - name: Loans
    description: Active auto loan management
  - name: Vehicles
    description: Vehicle information and valuation
paths:
  /applications:
    get:
      operationId: listAutoApplications
      summary: List auto loan applications
      description: >-
        Retrieve auto loan applications with filtering by status, dealer, date range, or applicant. Includes
        vehicle details and preliminary pricing terms.
      tags:
        - Applications
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: status
          in: query
          required: false
          description: "Filter by application status"
          schema:
            type: "string"
            enum:
              - APPLICATION
              - APPROVED
              - FUNDED
              - DECLINED
        - name: dealer_id
          in: query
          required: false
          description: "Filter by originating dealer"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        loan_id:
                          type: string
                          description: "Unique auto loan identifier"
                          example: "auto-770034"
                        applicant_id:
                          type: string
                          description: "Primary applicant identifier"
                          example: "cust-220019"
                        vehicle_year:
                          type: integer
                          description: "Vehicle model year"
                          example: 2025
                        vehicle_make:
                          type: string
                          description: "Vehicle manufacturer"
                          example: "Toyota"
                        vehicle_model:
                          type: string
                          description: "Vehicle model name"
                          example: "Camry"
                        vin:
                          type: string
                          description: "Vehicle identification number (17 chars)"
                          example: "1HGCV1F34PA012345"
                          minLength: 17
                          maxLength: 17
                        loan_amount:
                          type: number
                          description: "Approved loan amount"
                          format: double
                          example: 32500.0
                        apr:
                          type: number
                          description: "Annual percentage rate"
                          format: double
                          example: 4.99
                        term_months:
                          type: integer
                          description: "Loan term in months"
                          example: 60
                        monthly_payment:
                          type: number
                          description: "Monthly payment amount"
                          format: double
                          example: 613.24
                        ltv_ratio:
                          type: number
                          description: "Loan-to-value ratio"
                          format: double
                          example: 92.5
                        status:
                          type: string
                          description: "Loan status"
                          example: "ACTIVE"
                          enum:
                            - APPLICATION
                            - APPROVED
                            - FUNDED
                            - ACTIVE
                            - PAID_OFF
                            - DEFAULTED
                            - CHARGED_OFF
                        dealer_id:
                          type: string
                          description: "Originating dealer identifier"
                          example: "dlr-8801"
                        created_at:
                          type: string
                          description: "Loan creation timestamp"
                          format: date-time
                          example: "2025-09-15T14:30:00Z"
                      required:
                        - loan_id
                        - applicant_id
                        - loan_amount
                        - apr
                        - term_months
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: submitAutoApplication
      summary: Submit auto loan application
      description: >-
        Submit a new auto loan application with applicant information, vehicle details, and requested terms.
        Triggers automated credit check and risk-based pricing. Returns preliminary decision within seconds
        for qualified applicants.
      tags:
        - Applications
      requestBody:
        required: true
        description: Submit auto loan application request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                applicant_id:
                  type: string
                  description: "Primary applicant CIF"
                  example: "cust-220019"
                co_applicant_id:
                  type: string
                  description: "Co-applicant CIF (optional)"
                  example: "cust-220020"
                vin:
                  type: string
                  description: "Vehicle VIN"
                  example: "1HGCV1F34PA012345"
                requested_amount:
                  type: number
                  description: "Requested loan amount"
                  format: double
                  example: 32500.0
                requested_term:
                  type: integer
                  description: "Requested term in months"
                  example: 60
                down_payment:
                  type: number
                  description: "Down payment amount"
                  format: double
                  example: 3000.0
                dealer_id:
                  type: string
                  description: "Originating dealer"
                  example: "dlr-8801"
                trade_in_value:
                  type: number
                  description: "Trade-in vehicle value"
                  format: double
                  example: 8500.0
              required:
                - applicant_id
                - vin
                - requested_amount
                - requested_term
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  loan_id:
                    type: string
                    description: "Unique auto loan identifier"
                    example: "auto-770034"
                  applicant_id:
                    type: string
                    description: "Primary applicant identifier"
                    example: "cust-220019"
                  vehicle_year:
                    type: integer
                    description: "Vehicle model year"
                    example: 2025
                  vehicle_make:
                    type: string
                    description: "Vehicle manufacturer"
                    example: "Toyota"
                  vehicle_model:
                    type: string
                    description: "Vehicle model name"
                    example: "Camry"
                  vin:
                    type: string
                    description: "Vehicle identification number (17 chars)"
                    example: "1HGCV1F34PA012345"
                    minLength: 17
                    maxLength: 17
                  loan_amount:
                    type: number
                    description: "Approved loan amount"
                    format: double
                    example: 32500.0
                  apr:
                    type: number
                    description: "Annual percentage rate"
                    format: double
                    example: 4.99
                  term_months:
                    type: integer
                    description: "Loan term in months"
                    example: 60
                  monthly_payment:
                    type: number
                    description: "Monthly payment amount"
                    format: double
                    example: 613.24
                  ltv_ratio:
                    type: number
                    description: "Loan-to-value ratio"
                    format: double
                    example: 92.5
                  status:
                    type: string
                    description: "Loan status"
                    example: "ACTIVE"
                    enum:
                      - APPLICATION
                      - APPROVED
                      - FUNDED
                      - ACTIVE
                      - PAID_OFF
                      - DEFAULTED
                      - CHARGED_OFF
                  dealer_id:
                    type: string
                    description: "Originating dealer identifier"
                    example: "dlr-8801"
                  created_at:
                    type: string
                    description: "Loan creation timestamp"
                    format: date-time
                    example: "2025-09-15T14:30:00Z"
                required:
                  - loan_id
                  - applicant_id
                  - loan_amount
                  - apr
                  - term_months
                  - status
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /applications/{loan_id}:
