        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    patch:
      operationId: updateAutoApplication
      summary: Update auto loan application
      description: >-
        Update application details such as vehicle information, requested terms, or dealer assignment prior
        to funding.
      tags:
        - Applications
      parameters:
        - name: loan_id
          in: path
          required: true
          description: "Unique loan id"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Update auto loan application request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                requested_amount:
                  type: number
                  description: "Updated loan amount"
                  format: double
                  example: 30000.0
                requested_term:
                  type: integer
