  /applications/{loan_id}/approve:
    post:
      operationId: approveAutoLoan
      summary: Approve auto loan
      description: >-
        Approve the auto loan application with final terms. Generates loan documents and initiates the
        funding process. Requires all stipulations to be satisfied before approval.
      tags:
        - Applications
      parameters:
        - name: loan_id
          in: path
          required: true
          description: "Unique loan id"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Approve auto loan request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                final_amount:
                  type: number
                  description: "Final approved amount"
                  format: double
                  example: 32500.0
                final_apr:
                  type: number
                  description: "Final APR"
                  format: double
                  example: 4.99
                final_term:
                  type: integer
                  description: "Final term months"
                  example: 60
                gap_coverage:
                  type: boolean
                  description: "Include GAP insurance"
                  example: true
              required:
                - final_amount
                - final_apr
                - final_term
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  loan_id:
                    type: string
                    description: "Unique auto loan identifier"
                    example: "auto-770034"
                  applicant_id:
