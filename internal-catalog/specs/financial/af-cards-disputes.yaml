  /reason-codes:
    get:
      operationId: listReasonCodes
      summary: List dispute reason codes
      description: >-
        Returns the complete list of supported dispute reason codes across all card networks. Each code
        includes the network, category, description, required evidence types, and typical resolution
        timeframe. Use this to guide cardholders through the dispute filing process.
      tags:
        - Disputes
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          description: Reason code identifier
                          example: "10.4"
                        network:
                          type: string
                          description: Card network
                          example: "VISA"
                        category:
                          type: string
                          description: Dispute category
                          example: "Fraud"
                        description:
                          type: string
                          description: Reason code description
                          example: "Other Fraud - Card Absent Environment"
                        required_evidence:
                          type: array
                          description: Evidence types required for this reason code
                          items:
                            type: string
                            example: "POLICE_REPORT"
                      required:
                        - code
                        - network
                        - description
