  /chargebacks:
    post:
      operationId: processChargeback
      summary: Initiate chargeback processing
      description: >-
        Submits a chargeback to the card network for a dispute case. The chargeback is filed with the
        appropriate network (Visa, Mastercard, or Amex) using the dispute's reason code and supporting
        evidence. The acquirer bank is notified and has a defined response window. Interchange fees are
        applied to the chargeback amount.
      tags:
        - Chargebacks
      requestBody:
        required: true
        description: Initiate chargeback processing request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    dispute_id:
                      type: string
                      description: Unique dispute case identifier
                      example: "dsp-7a2f9c01"
                    amount:
                      type: number
                      description: Monetary amount
                      format: double
                      example: 250.0
                    currency:
                      type: string
                      description: ISO 4217 currency code
                      example: "USD"
                      minLength: 3
                      maxLength: 3
              required:
                - dispute_id
                - amount
                - currency
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  chargeback_id:
                    type: string
                    description: Unique chargeback identifier
                    example: "cb-9d4e72"
                  dispute_id:
                    type: string
                    description: Unique dispute case identifier
                    example: "dsp-7a2f9c01"
                  amount:
                    type: number
                    description: Monetary amount
                    format: double
                    example: 250.0
                  currency:
                    type: string
                    description: ISO 4217 currency code
                    example: "USD"
                    minLength: 3
                    maxLength: 3
                  reason_code:
                    type: string
                    description: Network reason code for the dispute
                    example: "10.4"
                  network:
                    type: string
                    description: Card network processing the chargeback
                    example: "VISA"
                    enum:
                      - VISA
                      - MASTERCARD
                      - AMEX
                      - DISCOVER
                  status:
                    type: string
                    description: Chargeback processing status
                    example: "SUBMITTED"
                    enum:
                      - INITIATED
                      - SUBMITTED
                      - ACCEPTED
                      - REPRESENTMENT_FILED
                      - ARBITRATION
                      - RESOLVED
                  acquirer_reference:
                    type: string
                    description: Acquirer reference number for the chargeback
                    example: "ACQ-2025-789012"
                  interchange_fee:
                    type: number
                    description: Interchange fee associated with the chargeback
                    format: double
                    example: 25.0
                  created_at:
                    type: string
                    description: ISO 8601 timestamp
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - chargeback_id
                  - status
