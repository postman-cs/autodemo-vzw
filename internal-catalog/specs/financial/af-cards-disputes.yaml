      description: >-
        Returns all correspondence related to a dispute case, including letters sent to the cardholder,
        merchant responses, and network communications. Correspondence is generated at key lifecycle
        transitions and when evidence is received. Each entry includes the direction (inbound/outbound),
        channel, and content summary.
