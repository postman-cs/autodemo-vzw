        required: true
        description: File merchant representment request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    representment_reason:
                      type: string
                      description: Merchant's reason for representment
                      example: "Cardholder received merchandise per tracking confirmation"
                    evidence_reference:
                      type: string
                      description: Reference to merchant's supporting evidence
                      example: "TRACK-2025-789012"
              required:
