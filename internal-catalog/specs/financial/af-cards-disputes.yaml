    post:
      operationId: fileRepresentment
      summary: File merchant representment
      description: >-
        Records a merchant representment response to a chargeback. The merchant's acquiring bank submits
        evidence that the original transaction was valid. This updates the chargeback status and may lead to
        arbitration if the issuer disagrees. Used by the dispute operations team during the chargeback
        response process.
      tags:
