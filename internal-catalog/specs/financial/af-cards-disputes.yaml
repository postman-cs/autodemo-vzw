  /disputes/{dispute_id}/timeline:
    get:
      operationId: getDisputeTimeline
      summary: Get dispute timeline
      description: >-
        Returns a chronological timeline of all events in a dispute case, including status changes, evidence
        submissions, provisional credits, chargeback filings, and resolution actions. Each event includes a
        timestamp, actor, and description. Useful for dispute case review and audit purposes.
      tags:
        - Disputes
      parameters:
        - name: dispute_id
          in: path
          required: true
          description: Unique dispute id
          schema:
            type: "string"
