openapi: 3.0.3
info:
  title: Acme Finance Card Disputes API
  description: >-
    Manages the full lifecycle of card transaction disputes from initial filing through chargeback resolution.
    Handles dispute case creation, evidence submission, provisional credit issuance, chargeback processing, and
    merchant representment. Compliant with Visa Claims Resolution (VCR) and Mastercard Chargeback Monitoring
    Program (MCMP) requirements. Supports all major reason codes for fraud, merchandise, and processing error
    disputes.
  version: 2.1.0
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-cards-disputes
  x-acme-domain: cards
servers:
  - url: https://af-cards-disputes.api.acmefin.com/v1
    description: Production
  - url: https://af-cards-disputes.staging.acmefin.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Disputes
    description: Dispute case management from filing through resolution
  - name: Evidence
    description: Supporting evidence and documentation for dispute cases
  - name: Chargebacks
    description: Chargeback processing and merchant representment
paths:
  /disputes:
    get:
      operationId: listDisputes
      summary: List disputes
      description: >-
        Returns a paginated list of disputes filed by cardholders. Supports filtering by card, status,
        reason code, and filing date range. Results include provisional credit amounts and resolution
        deadlines. Use this for dispute queue management and reporting.
      tags:
        - Disputes
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: card_id
          in: query
          required: false
          description: Filter by card identifier
          schema:
            type: "string"
        - name: status
          in: query
          required: false
          description: Filter by dispute status
          schema:
            type: "string"
            enum:
              - OPENED
              - UNDER_REVIEW
              - EVIDENCE_REQUESTED
              - RESOLVED_WON
              - RESOLVED_LOST
        - name: from_date
          in: query
          required: false
          description: Include disputes filed on or after this date
          schema:
            type: "string"
            format: "date"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        dispute_id:
                          type: string
                          description: Unique dispute case identifier
                          example: "dsp-7a2f9c01"
                        card_id:
                          type: string
                          description: Unique card identifier
                          example: "card-8a2f4b91"
                        transaction_id:
                          type: string
                          description: Disputed transaction identifier
                          example: "txn-8f3c92"
                        amount:
                          type: number
                          description: Monetary amount
                          format: double
                          example: 250.0
                        currency:
                          type: string
                          description: ISO 4217 currency code
                          example: "USD"
                          minLength: 3
                          maxLength: 3
                        reason_code:
                          type: string
                          description: Network reason code for the dispute
                          example: "10.4"
                        reason_description:
                          type: string
                          description: Human-readable reason for the dispute
                          example: "Merchandise not received"
                        status:
                          type: string
                          description: Current dispute lifecycle status
                          example: "UNDER_REVIEW"
                          enum:
                            - OPENED
                            - UNDER_REVIEW
                            - EVIDENCE_REQUESTED
                            - PROVISIONAL_CREDIT
                            - RESOLVED_WON
                            - RESOLVED_LOST
                            - CLOSED
                            - CANCELLED
                        provisional_credit:
                          type: number
                          description: Provisional credit amount applied to the cardholder account
                          format: double
                          example: 250.0
                        merchant_name:
                          type: string
                          description: Merchant name as registered with the acquirer
                          example: "ACME Electronics Store"
                        merchant_category_code:
                          type: string
                          description: ISO 18245 merchant category code
                          example: "5411"
                          pattern: '^[0-9]{4}$'
                        filed_at:
                          type: string
                          description: ISO 8601 timestamp
                          format: date-time
                          example: "2025-06-15T14:30:00Z"
                        resolution_deadline:
                          type: string
                          description: Regulatory deadline for dispute resolution
                          format: date
                          example: "2025-09-15"
                        resolved_at:
                          type: string
                          description: Timestamp when the dispute was resolved
                          format: date-time
                          example: "2025-06-15T14:30:00Z"
                          nullable: true
                      required:
                        - dispute_id
                        - card_id
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: fileDispute
      summary: File a new dispute
      description: >-
        Creates a new dispute case for a card transaction. The cardholder must provide the transaction
        identifier, reason code, and description of the issue. A provisional credit is automatically applied
        for qualifying disputes over $25 within one business day. The dispute enters the review queue for
        investigation.
      tags:
        - Disputes
      requestBody:
        required: true
        description: File a new dispute request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    card_id:
                      type: string
                      description: Unique card identifier
                      example: "card-8a2f4b91"
                    transaction_id:
                      type: string
                      description: Disputed transaction identifier
                      example: "txn-8f3c92"
                    reason_code:
                      type: string
                      description: Network reason code for the dispute
                      example: "10.4"
                    description:
                      type: string
                      description: Detailed description of the dispute reason
                      example: "I ordered a laptop but received an empty box. Merchant has not responded to my emails."
                    contact_email:
                      type: string
                      description: Cardholder contact email for dispute correspondence
                      format: email
                      example: "jane.doe@email.com"
              required:
                - card_id
                - transaction_id
                - reason_code
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  dispute_id:
                    type: string
                    description: Unique dispute case identifier
                    example: "dsp-7a2f9c01"
                  card_id:
                    type: string
                    description: Unique card identifier
                    example: "card-8a2f4b91"
                  transaction_id:
                    type: string
                    description: Disputed transaction identifier
                    example: "txn-8f3c92"
                  amount:
                    type: number
                    description: Monetary amount
                    format: double
                    example: 250.0
                  currency:
                    type: string
                    description: ISO 4217 currency code
                    example: "USD"
                    minLength: 3
                    maxLength: 3
                  reason_code:
                    type: string
                    description: Network reason code for the dispute
                    example: "10.4"
                  reason_description:
                    type: string
                    description: Human-readable reason for the dispute
                    example: "Merchandise not received"
                  status:
                    type: string
                    description: Current dispute lifecycle status
                    example: "UNDER_REVIEW"
                    enum:
                      - OPENED
                      - UNDER_REVIEW
                      - EVIDENCE_REQUESTED
                      - PROVISIONAL_CREDIT
                      - RESOLVED_WON
                      - RESOLVED_LOST
                      - CLOSED
                      - CANCELLED
                  provisional_credit:
                    type: number
                    description: Provisional credit amount applied to the cardholder account
                    format: double
                    example: 250.0
                  merchant_name:
                    type: string
                    description: Merchant name as registered with the acquirer
                    example: "ACME Electronics Store"
                  merchant_category_code:
                    type: string
                    description: ISO 18245 merchant category code
                    example: "5411"
                    pattern: '^[0-9]{4}$'
                  filed_at:
                    type: string
                    description: ISO 8601 timestamp
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                  resolution_deadline:
                    type: string
                    description: Regulatory deadline for dispute resolution
                    format: date
                    example: "2025-09-15"
                  resolved_at:
                    type: string
                    description: Timestamp when the dispute was resolved
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                    nullable: true
                required:
                  - dispute_id
                  - status
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /disputes/{dispute_id}:
    get:
      operationId: getDispute
      summary: Get dispute details
      description: >-
        Retrieves the full details of a dispute case including its current status, reason code, provisional
        credit, merchant information, evidence submissions, and resolution deadline. The response includes
        the full timeline of status changes.
      tags:
        - Disputes
      parameters:
        - name: dispute_id
          in: path
          required: true
          description: Unique dispute id
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  dispute_id:
                    type: string
                    description: Unique dispute case identifier
                    example: "dsp-7a2f9c01"
                  card_id:
                    type: string
                    description: Unique card identifier
                    example: "card-8a2f4b91"
                  transaction_id:
                    type: string
                    description: Disputed transaction identifier
                    example: "txn-8f3c92"
                  amount:
                    type: number
                    description: Monetary amount
                    format: double
                    example: 250.0
                  currency:
                    type: string
                    description: ISO 4217 currency code
                    example: "USD"
                    minLength: 3
                    maxLength: 3
                  reason_code:
                    type: string
                    description: Network reason code for the dispute
                    example: "10.4"
                  reason_description:
                    type: string
                    description: Human-readable reason for the dispute
                    example: "Merchandise not received"
                  status:
                    type: string
                    description: Current dispute lifecycle status
                    example: "UNDER_REVIEW"
                    enum:
                      - OPENED
                      - UNDER_REVIEW
                      - EVIDENCE_REQUESTED
                      - PROVISIONAL_CREDIT
                      - RESOLVED_WON
                      - RESOLVED_LOST
                      - CLOSED
                      - CANCELLED
                  provisional_credit:
                    type: number
                    description: Provisional credit amount applied to the cardholder account
                    format: double
                    example: 250.0
                  merchant_name:
                    type: string
                    description: Merchant name as registered with the acquirer
                    example: "ACME Electronics Store"
                  merchant_category_code:
                    type: string
                    description: ISO 18245 merchant category code
                    example: "5411"
                    pattern: '^[0-9]{4}$'
                  filed_at:
                    type: string
                    description: ISO 8601 timestamp
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                  resolution_deadline:
                    type: string
                    description: Regulatory deadline for dispute resolution
                    format: date
                    example: "2025-09-15"
                  resolved_at:
                    type: string
                    description: Timestamp when the dispute was resolved
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                    nullable: true
                required:
                  - dispute_id
                  - status
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    patch:
      operationId: updateDispute
      summary: Update dispute information
      description: >-
        Updates a dispute case with additional information or corrected details. Only disputes in OPENED or
        UNDER_REVIEW status can be updated. Changes to the dispute amount or reason code may affect
        provisional credit eligibility and require re-review.
      tags:
        - Disputes
      parameters:
        - name: dispute_id
          in: path
          required: true
          description: Unique dispute id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Update dispute information request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    reason_code:
                      type: string
                      description: Network reason code for the dispute
                      example: "10.4"
                    description:
                      type: string
                      description: Updated dispute description
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  dispute_id:
                    type: string
                    description: Unique dispute case identifier
                    example: "dsp-7a2f9c01"
                  card_id:
                    type: string
                    description: Unique card identifier
                    example: "card-8a2f4b91"
                  transaction_id:
                    type: string
                    description: Disputed transaction identifier
                    example: "txn-8f3c92"
                  amount:
                    type: number
                    description: Monetary amount
                    format: double
                    example: 250.0
                  currency:
                    type: string
                    description: ISO 4217 currency code
                    example: "USD"
                    minLength: 3
                    maxLength: 3
                  reason_code:
                    type: string
                    description: Network reason code for the dispute
                    example: "10.4"
                  reason_description:
                    type: string
                    description: Human-readable reason for the dispute
                    example: "Merchandise not received"
                  status:
                    type: string
                    description: Current dispute lifecycle status
                    example: "UNDER_REVIEW"
                    enum:
                      - OPENED
                      - UNDER_REVIEW
                      - EVIDENCE_REQUESTED
                      - PROVISIONAL_CREDIT
                      - RESOLVED_WON
                      - RESOLVED_LOST
                      - CLOSED
                      - CANCELLED
                  provisional_credit:
                    type: number
                    description: Provisional credit amount applied to the cardholder account
                    format: double
                    example: 250.0
                  merchant_name:
                    type: string
                    description: Merchant name as registered with the acquirer
                    example: "ACME Electronics Store"
                  merchant_category_code:
                    type: string
                    description: ISO 18245 merchant category code
                    example: "5411"
                    pattern: '^[0-9]{4}$'
                  filed_at:
                    type: string
                    description: ISO 8601 timestamp
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                  resolution_deadline:
                    type: string
                    description: Regulatory deadline for dispute resolution
                    format: date
                    example: "2025-09-15"
                  resolved_at:
                    type: string
                    description: Timestamp when the dispute was resolved
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                    nullable: true
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /disputes/{dispute_id}/cancel:
    post:
      operationId: cancelDispute
      summary: Cancel a dispute
      description: >-
        Cancels an open dispute case at the cardholder's request. Any provisional credit applied is
        reversed. The dispute transitions to CANCELLED status. Only disputes in OPENED or UNDER_REVIEW
        status can be cancelled. This action is irreversible; a new dispute must be filed if needed.
      tags:
        - Disputes
      parameters:
        - name: dispute_id
          in: path
          required: true
          description: Unique dispute id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Cancel a dispute request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    cancellation_reason:
                      type: string
                      description: Reason for cancelling the dispute
                      example: "Resolved directly with merchant"
              required:
                - cancellation_reason
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  dispute_id:
                    type: string
                    description: Unique dispute case identifier
                    example: "dsp-7a2f9c01"
                  card_id:
                    type: string
                    description: Unique card identifier
                    example: "card-8a2f4b91"
                  transaction_id:
                    type: string
                    description: Disputed transaction identifier
                    example: "txn-8f3c92"
                  amount:
                    type: number
                    description: Monetary amount
                    format: double
                    example: 250.0
                  currency:
                    type: string
                    description: ISO 4217 currency code
                    example: "USD"
                    minLength: 3
                    maxLength: 3
                  reason_code:
                    type: string
                    description: Network reason code for the dispute
                    example: "10.4"
                  reason_description:
                    type: string
                    description: Human-readable reason for the dispute
                    example: "Merchandise not received"
                  status:
                    type: string
                    description: Current dispute lifecycle status
                    example: "UNDER_REVIEW"
                    enum:
                      - OPENED
                      - UNDER_REVIEW
                      - EVIDENCE_REQUESTED
                      - PROVISIONAL_CREDIT
                      - RESOLVED_WON
                      - RESOLVED_LOST
                      - CLOSED
                      - CANCELLED
                  provisional_credit:
                    type: number
                    description: Provisional credit amount applied to the cardholder account
                    format: double
                    example: 250.0
                  merchant_name:
                    type: string
                    description: Merchant name as registered with the acquirer
                    example: "ACME Electronics Store"
                  merchant_category_code:
                    type: string
                    description: ISO 18245 merchant category code
                    example: "5411"
                    pattern: '^[0-9]{4}$'
                  filed_at:
                    type: string
                    description: ISO 8601 timestamp
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                  resolution_deadline:
                    type: string
                    description: Regulatory deadline for dispute resolution
                    format: date
                    example: "2025-09-15"
                  resolved_at:
                    type: string
                    description: Timestamp when the dispute was resolved
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                    nullable: true
                required:
                  - dispute_id
                  - status
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /disputes/{dispute_id}/evidence:
    post:
      operationId: submitEvidence
      summary: Submit evidence for a dispute
      description: >-
        Uploads supporting evidence for a dispute case. Accepted file types are PDF, JPEG, PNG, and TIFF
        with a maximum size of 10 MB. Evidence can include receipts, correspondence with the merchant,
        delivery tracking information, screenshots, and signed contracts. Multiple evidence files can be
        submitted per dispute.
      tags:
        - Evidence
      parameters:
        - name: dispute_id
          in: path
          required: true
          description: Unique dispute id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Submit evidence for a dispute request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    type:
                      type: string
                      description: Type of supporting evidence
                      example: "RECEIPT"
                      enum:
                        - RECEIPT
                        - CORRESPONDENCE
                        - TRACKING_INFO
                        - SCREENSHOT
                        - SIGNED_CONTRACT
                        - CANCELLATION_CONFIRMATION
                        - OTHER
                    description:
                      type: string
                      description: Description of the evidence provided
                      example: "Original purchase receipt showing different amount"
                    file_content_base64:
                      type: string
                      description: Base64-encoded file content
                      example: "JVBERi0xLjQK..."
                    file_name:
                      type: string
                      description: Original file name with extension
                      example: "receipt-20250615.pdf"
              required:
                - type
                - file_content_base64
                - file_name
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  evidence_id:
                    type: string
                    description: Unique evidence document identifier
                    example: "evd-3c8f21"
                  dispute_id:
                    type: string
                    description: Unique dispute case identifier
                    example: "dsp-7a2f9c01"
                  type:
                    type: string
                    description: Type of supporting evidence
                    example: "RECEIPT"
                    enum:
                      - RECEIPT
                      - CORRESPONDENCE
                      - TRACKING_INFO
                      - SCREENSHOT
                      - SIGNED_CONTRACT
                      - CANCELLATION_CONFIRMATION
                      - OTHER
                  description:
                    type: string
                    description: Description of the evidence provided
                    example: "Original purchase receipt showing different amount"
                  file_url:
                    type: string
                    description: URL to the uploaded evidence file
                    format: uri
                    example: "https://docs.acmefin.com/evidence/evd-3c8f21.pdf"
                  file_size_bytes:
                    type: integer
                    description: Size of the evidence file in bytes
                    example: 184320
                  submitted_at:
                    type: string
                    description: ISO 8601 timestamp
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                  submitted_by:
                    type: string
                    description: User who submitted the evidence
                    example: "user-cardholder-789"
                required:
                  - evidence_id
                  - type
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
    get:
      operationId: listEvidence
      summary: List evidence for a dispute
      description: >-
        Returns all evidence documents submitted for a dispute case. Each entry includes the evidence type,
        description, file URL, size, and submission details. Evidence files are retained for seven years
        after dispute resolution.
      tags:
        - Evidence
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        evidence_id:
                          type: string
                          description: Unique evidence document identifier
                          example: "evd-3c8f21"
                        dispute_id:
                          type: string
                          description: Unique dispute case identifier
                          example: "dsp-7a2f9c01"
                        type:
                          type: string
                          description: Type of supporting evidence
                          example: "RECEIPT"
                          enum:
                            - RECEIPT
                            - CORRESPONDENCE
                            - TRACKING_INFO
                            - SCREENSHOT
                            - SIGNED_CONTRACT
                            - CANCELLATION_CONFIRMATION
                            - OTHER
                        description:
                          type: string
                          description: Description of the evidence provided
                          example: "Original purchase receipt showing different amount"
                        file_url:
                          type: string
                          description: URL to the uploaded evidence file
                          format: uri
                          example: "https://docs.acmefin.com/evidence/evd-3c8f21.pdf"
                        file_size_bytes:
                          type: integer
                          description: Size of the evidence file in bytes
                          example: 184320
                        submitted_at:
                          type: string
                          description: ISO 8601 timestamp
                          format: date-time
