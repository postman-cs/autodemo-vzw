        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    description: Timeline events in chronological order
                    items:
                      type: string
                      example: "2025-06-15: Dispute filed by cardholder"
                  total_events:
                    type: integer
                    description: Total number of timeline events
                    example: 8
