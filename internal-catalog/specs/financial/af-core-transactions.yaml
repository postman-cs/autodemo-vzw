openapi: 3.0.3
info:
  title: Acme Finance Core Transactions API
  description: >-
    Comprehensive transaction processing and inquiry service for all deposit account activity. Supports debit,
    credit, memo-post, and authorization transactions across all channels including branch, ATM, POS, ACH, wire,
    and digital banking. Provides advanced search with full-text description matching, transaction categorization
    for PFM integration, dispute management per Regulation E timelines, and bulk export for reporting and
    analytics. All transactions post to the Core Ledger as double-entry journal entries.
  version: 3.2.0
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-core-transactions
  x-acme-domain: core
servers:
  - url: https://af-core-transactions.api.acmefin.com/v1
    description: Production
  - url: https://af-core-transactions.staging.acmefin.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Transactions
    description: Transaction posting, inquiry, and lifecycle management
  - name: Disputes
    description: Transaction dispute filing and resolution per Regulation E
  - name: Categorization
    description: Transaction categorization for personal finance management
  - name: Export
    description: Bulk transaction export for reporting and analytics
paths:
  /transactions:
    get:
      operationId: listTransactions
      summary: List transactions
      description: >-
        Retrieve a paginated list of transactions with comprehensive filtering. Supports date ranges, amount
        ranges, transaction type, category, channel, and free-text description search. Results include
        running balances and are ordered by posted_at descending by default.
      tags:
        - Transactions
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: account_id
          in: query
          required: false
          description: Filter by account
          schema:
            type: "string"
        - name: transaction_type
          in: query
          required: false
          description: Filter by type
          schema:
            type: "string"
            enum:
              - DEBIT
              - CREDIT
              - MEMO_DEBIT
              - MEMO_CREDIT
        - name: category
          in: query
          required: false
          description: Filter by category
          schema:
            type: "string"
        - name: status
          in: query
          required: false
          description: Filter by status
          schema:
            type: "string"
            enum:
              - AUTHORIZED
              - PENDING
              - POSTED
              - REVERSED
              - DISPUTED
        - name: from_date
          in: query
          required: false
          description: Start date (YYYY-MM-DD)
          schema:
            type: "string"
            format: "date"
        - name: to_date
          in: query
          required: false
          description: End date (YYYY-MM-DD)
          schema:
            type: "string"
            format: "date"
        - name: min_amount
          in: query
          required: false
          description: Minimum transaction amount
          schema:
            type: "number"
        - name: max_amount
          in: query
          required: false
          description: Maximum transaction amount
          schema:
            type: "number"
        - name: search
          in: query
          required: false
          description: Free-text search in description field
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        transaction_id:
                          type: string
                          description: Unique transaction identifier
                          example: "txn-88210045"
                        account_id:
                          type: string
                          description: Account involved in the transaction
                          example: "acct-10045892"
                        transaction_type:
                          type: string
                          description: Transaction classification
                          enum:
                            - DEBIT
                            - CREDIT
                            - MEMO_DEBIT
                            - MEMO_CREDIT
                        category:
                          type: string
                          description: Transaction category
                          enum:
                            - DEPOSIT
                            - WITHDRAWAL
                            - TRANSFER
                            - PAYMENT
                            - FEE
                            - INTEREST
                            - ADJUSTMENT
                            - ATM
                            - POS
                            - ACH
                            - WIRE
                        amount:
                          type: number
                          description: Transaction amount
                          format: double
                          example: 150.0
                        currency:
                          type: string
                          description: ISO 4217 currency code
                          example: "USD"
                        running_balance:
                          type: number
                          description: Account balance after this transaction
                          format: double
                          example: 24439.47
                        status:
                          type: string
                          description: Transaction lifecycle status
                          enum:
                            - AUTHORIZED
                            - PENDING
                            - POSTED
                            - REVERSED
                            - DISPUTED
                            - VOIDED
                        description:
                          type: string
                          description: Transaction description or merchant name
                          example: "AMAZON.COM AMZN.COM/BILL WA"
                        reference_number:
                          type: string
                          description: External reference or trace number
                          example: "REF-20250610-00482"
                        effective_date:
                          type: string
                          description: Date transaction affects the balance
                          format: date
                          example: "2025-06-10"
                        posted_at:
                          type: string
                          description: Timestamp when transaction was posted
                          format: date-time
                          example: "2025-06-10T14:30:00Z"
                        channel:
                          type: string
                          description: Origination channel
                          enum:
                            - BRANCH
                            - ATM
                            - ONLINE
                            - MOBILE
                            - ACH
                            - WIRE
                            - POS
                            - INTERNAL
                        merchant_category_code:
                          type: string
                          description: MCC code for POS transactions
                          example: "5411"
                        check_number:
                          type: string
                          description: Check number if applicable
                          example: "1042"
                      required:
                        - transaction_id
                        - account_id
                        - transaction_type
                        - amount
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: createTransaction
      summary: Post a transaction
      description: >-
        Post a new transaction to an account. The transaction is validated against account status, available
        balance (for debits), and applicable transaction limits before posting. A corresponding journal
        entry is created in the Core Ledger. Memo-post transactions are reflected in pending balances but do
        not affect the ledger balance until posted.
      tags:
        - Transactions
      requestBody:
        required: true
        description: Post a transaction request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    account_id:
                      type: string
                      description: Account involved in the transaction
                      example: "acct-10045892"
                    transaction_type:
                      type: string
                      description: Transaction classification
                      enum:
                        - DEBIT
                        - CREDIT
                        - MEMO_DEBIT
                        - MEMO_CREDIT
                    category:
                      type: string
                      description: Transaction category
                      enum:
                        - DEPOSIT
                        - WITHDRAWAL
                        - TRANSFER
                        - PAYMENT
                        - FEE
                        - INTEREST
                        - ADJUSTMENT
                        - ATM
                        - POS
                        - ACH
                        - WIRE
                    amount:
                      type: number
                      description: Transaction amount
                      format: double
                      example: 150.0
                    currency:
                      type: string
                      description: ISO 4217 currency code
                      example: "USD"
                    description:
                      type: string
                      description: Transaction description or merchant name
                      example: "AMAZON.COM AMZN.COM/BILL WA"
                    reference_number:
                      type: string
                      description: External reference or trace number
                      example: "REF-20250610-00482"
                    effective_date:
                      type: string
                      description: Date transaction affects the balance
                      format: date
                      example: "2025-06-10"
                    channel:
                      type: string
                      description: Origination channel
                      enum:
                        - BRANCH
                        - ATM
                        - ONLINE
                        - MOBILE
                        - ACH
                        - WIRE
                        - POS
                        - INTERNAL
              required:
                - account_id
                - transaction_type
                - amount
                - currency
                - description
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  transaction_id:
                    type: string
                    description: Unique transaction identifier
                    example: "txn-88210045"
                  account_id:
                    type: string
                    description: Account involved in the transaction
                    example: "acct-10045892"
                  transaction_type:
                    type: string
                    description: Transaction classification
                    enum:
                      - DEBIT
                      - CREDIT
                      - MEMO_DEBIT
                      - MEMO_CREDIT
                  category:
                    type: string
                    description: Transaction category
                    enum:
                      - DEPOSIT
                      - WITHDRAWAL
                      - TRANSFER
                      - PAYMENT
                      - FEE
                      - INTEREST
                      - ADJUSTMENT
                      - ATM
                      - POS
                      - ACH
                      - WIRE
                  amount:
                    type: number
                    description: Transaction amount
                    format: double
                    example: 150.0
                  currency:
                    type: string
                    description: ISO 4217 currency code
                    example: "USD"
                  running_balance:
                    type: number
                    description: Account balance after this transaction
                    format: double
                    example: 24439.47
                  status:
                    type: string
                    description: Transaction lifecycle status
                    enum:
                      - AUTHORIZED
                      - PENDING
                      - POSTED
                      - REVERSED
                      - DISPUTED
                      - VOIDED
                  description:
                    type: string
                    description: Transaction description or merchant name
                    example: "AMAZON.COM AMZN.COM/BILL WA"
                  reference_number:
                    type: string
                    description: External reference or trace number
                    example: "REF-20250610-00482"
                  effective_date:
                    type: string
                    description: Date transaction affects the balance
                    format: date
                    example: "2025-06-10"
                  posted_at:
                    type: string
                    description: Timestamp when transaction was posted
                    format: date-time
                    example: "2025-06-10T14:30:00Z"
                  channel:
                    type: string
                    description: Origination channel
                    enum:
                      - BRANCH
                      - ATM
                      - ONLINE
                      - MOBILE
                      - ACH
                      - WIRE
                      - POS
                      - INTERNAL
                  merchant_category_code:
                    type: string
                    description: MCC code for POS transactions
                    example: "5411"
                  check_number:
                    type: string
                    description: Check number if applicable
                    example: "1042"
                required:
                  - transaction_id
                  - status
                  - running_balance
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /transactions/{transaction_id}:
    get:
      operationId: getTransaction
      summary: Get transaction details
      description: >-
        Retrieve complete details of a specific transaction including the running balance at the time of
        posting, origination channel, merchant information for POS transactions, and any associated dispute
        or reversal references.
      tags:
        - Transactions
      parameters:
        - name: transaction_id
          in: path
          required: true
          description: Unique transaction id
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  transaction_id:
                    type: string
                    description: Unique transaction identifier
                    example: "txn-88210045"
                  account_id:
                    type: string
                    description: Account involved in the transaction
                    example: "acct-10045892"
                  transaction_type:
                    type: string
                    description: Transaction classification
                    enum:
                      - DEBIT
                      - CREDIT
                      - MEMO_DEBIT
                      - MEMO_CREDIT
                  category:
                    type: string
                    description: Transaction category
                    enum:
                      - DEPOSIT
                      - WITHDRAWAL
                      - TRANSFER
                      - PAYMENT
                      - FEE
                      - INTEREST
                      - ADJUSTMENT
                      - ATM
                      - POS
                      - ACH
                      - WIRE
                  amount:
                    type: number
                    description: Transaction amount
                    format: double
                    example: 150.0
                  currency:
                    type: string
                    description: ISO 4217 currency code
                    example: "USD"
                  running_balance:
                    type: number
                    description: Account balance after this transaction
                    format: double
                    example: 24439.47
                  status:
                    type: string
                    description: Transaction lifecycle status
                    enum:
                      - AUTHORIZED
                      - PENDING
                      - POSTED
                      - REVERSED
                      - DISPUTED
                      - VOIDED
                  description:
                    type: string
                    description: Transaction description or merchant name
                    example: "AMAZON.COM AMZN.COM/BILL WA"
                  reference_number:
                    type: string
                    description: External reference or trace number
                    example: "REF-20250610-00482"
                  effective_date:
                    type: string
                    description: Date transaction affects the balance
                    format: date
                    example: "2025-06-10"
                  posted_at:
                    type: string
                    description: Timestamp when transaction was posted
                    format: date-time
                    example: "2025-06-10T14:30:00Z"
                  channel:
                    type: string
                    description: Origination channel
                    enum:
                      - BRANCH
                      - ATM
                      - ONLINE
                      - MOBILE
                      - ACH
                      - WIRE
                      - POS
                      - INTERNAL
                  merchant_category_code:
                    type: string
                    description: MCC code for POS transactions
                    example: "5411"
                  check_number:
                    type: string
                    description: Check number if applicable
                    example: "1042"
                required:
                  - transaction_id
                  - account_id
                  - amount
                  - status
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /transactions/{transaction_id}/reverse:
    post:
      operationId: reverseTransaction
      summary: Reverse a transaction
      description: >-
        Reverse a posted transaction by creating an offsetting entry. The reversal amount equals the
        original transaction amount. Partial reversals are not supported — use a new adjustment transaction
        for partial corrections. The original and reversal transactions are cross-referenced for audit
        trail.
      tags:
        - Transactions
      parameters:
        - name: transaction_id
          in: path
          required: true
          description: Unique transaction id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Reverse a transaction request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    reversal_reason:
                      type: string
                      description: Reason for the reversal
                      enum:
                        - BANK_ERROR
                        - DUPLICATE
                        - CUSTOMER_REQUEST
                        - FRAUD
                        - DISPUTE_RESOLUTION
                    notes:
                      type: string
                      description: Additional details
                      example: "Duplicate ACH debit — originator confirmed error"
              required:
                - reversal_reason
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  original_transaction_id:
                    type: string
                    description: Unique transaction identifier
                    example: "txn-88210045"
                  reversal_transaction_id:
                    type: string
                    description: New reversal transaction ID
                    example: "txn-88210046"
                  reversal_amount:
                    type: number
                    description: Transaction amount
                    format: double
                    example: 150.0
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /transactions/{transaction_id}/authorize:
    post:
      operationId: authorizeTransaction
      summary: Authorize a transaction
      description: >-
        Create a pre-authorization hold against an account's available balance. Used for debit card, POS,
        and real-time payment authorizations. The authorization reduces available balance without affecting
        the ledger. Authorizations expire after the configured timeout period if not captured or voided.
      tags:
        - Transactions
      parameters:
        - name: transaction_id
          in: path
          required: true
          description: Unique transaction id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Authorize a transaction request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    authorization_amount:
                      type: number
                      description: Amount to authorize
                      format: double
                      example: 75.0
                    merchant_name:
                      type: string
                      description: Merchant name
                      example: "Shell Gas Station #4421"
                    merchant_category_code:
                      type: string
                      description: MCC code
                      example: "5541"
                    expiry_hours:
                      type: integer
                      description: Authorization expiry in hours
                      example: 72
                      default: 72
              required:
                - authorization_amount
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  authorization_id:
                    type: string
                    description: Authorization reference
                    example: "auth-20250610-00482"
                  available_balance_after:
                    type: number
                    description: Available balance after auth hold
                    format: double
                    example: 23025.0
                  expires_at:
                    type: string
                    description: Authorization expiration
                    format: date-time
                    example: "2025-06-13T14:30:00Z"
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /transactions/{transaction_id}/capture:
    post:
      operationId: captureTransaction
      summary: Capture an authorization
      description: >-
        Capture (settle) a previously authorized transaction for the final amount. The capture amount may be
        less than or equal to the authorization amount. If less, the remaining authorization hold is
        released. Captures exceeding the original authorization are rejected.
      tags:
        - Transactions
      parameters:
        - name: transaction_id
          in: path
          required: true
          description: Unique transaction id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Capture an authorization request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    capture_amount:
                      type: number
                      description: Final settlement amount
                      format: double
                      example: 62.5
                    authorization_id:
                      type: string
                      description: Original authorization reference
                      example: "auth-20250610-00482"
              required:
                - capture_amount
                - authorization_id
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  transaction_id:
                    type: string
                    description: Unique transaction identifier
                    example: "txn-88210045"
                  status:
                    type: string
                    description: Transaction lifecycle status
                    enum:
                      - AUTHORIZED
                      - PENDING
                      - POSTED
                      - REVERSED
                      - DISPUTED
                      - VOIDED
                  captured_amount:
                    type: number
                    description: Amount captured
                    format: double
                    example: 62.5
                  running_balance:
                    type: number
                    description: Account balance after this transaction
                    format: double
                    example: 24439.47
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /transactions/{transaction_id}/void:
    post:
      operationId: voidAuthorization
      summary: Void an authorization
      description: >-
        Void a pending authorization that has not been captured. The authorization hold is released
        immediately and the available balance is restored. Cannot void transactions that have already been
        captured or posted.
      tags:
        - Transactions
      parameters:
        - name: transaction_id
          in: path
          required: true
          description: Unique transaction id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Void an authorization request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    void_reason:
                      type: string
                      description: Reason for voiding
                      example: "Customer cancelled purchase"
              required:
                - void_reason
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  transaction_id:
                    type: string
                    description: Unique transaction identifier
                    example: "txn-88210045"
                  status:
                    type: string
                    description: Transaction lifecycle status
                    enum:
                      - AUTHORIZED
                      - PENDING
                      - POSTED
                      - REVERSED
                      - DISPUTED
                      - VOIDED
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /transactions/search:
    post:
      operationId: searchTransactions
      summary: Advanced transaction search
      description: >-
        Perform an advanced search across transactions with complex criteria including multiple accounts,
        date ranges, amount ranges, merchant name patterns, and MCC codes. Supports boolean operators for
        combining search terms. Results are scored by relevance when free-text search is used.
      tags:
        - Transactions
      requestBody:
        required: true
        description: Advanced transaction search request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    account_ids:
                      type: array
                      description: Accounts to search across
                      items:
                        type: string
                    query:
                      type: string
                      description: Free-text search query
                      example: "Amazon OR AWS"
                    date_range:
                      type: object
                      description: Date range filter
                      properties:
                        from:
                          type: string
                          format: date
                        to:
                          type: string
                          format: date
                    amount_range:
                      type: object
                      description: Amount range filter
                      properties:
                        min:
                          type: number
                        max:
                          type: number
                    categories:
                      type: array
                      description: Filter by categories
                      items:
                        type: string
                    channels:
                      type: array
                      description: Filter by channels
                      items:
                        type: string
              required:
                - date_range
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    description: Matching transactions
                    items:
                      type: object
                  total_results:
                    type: integer
                    description: Total matches
                    example: 142
                required:
                  - results
                  - total_results
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /transactions/by-reference/{reference_number}:
    get:
      operationId: getTransactionByReference
      summary: Get transaction by reference
      description: >-
        Look up a transaction by its external reference number, check number, or trace number. Useful for
        cross-referencing transactions from external systems, processing ACH returns, or locating specific
        check payments.
      tags:
        - Transactions
      parameters:
        - name: reference_number
          in: path
          required: true
          description: Unique reference number
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
