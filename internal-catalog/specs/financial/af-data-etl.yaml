openapi: 3.0.3
info:
  title: Acme Finance Data ETL Pipeline API
  description: >-
    End-to-end extract, transform, and load pipeline orchestration for enterprise data integration. Design multi-
    stage DAG pipelines connecting heterogeneous data sources (JDBC, Kafka, S3, Snowflake, BigQuery) through
    configurable transformation stages (SQL, Spark, dbt, Python). Includes cron-based scheduling, automatic retry
    policies, connector health monitoring, detailed run logs, and real-time ingestion metrics for petabyte-scale
    data movement.
  version: 4.0.2
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-data-etl
  x-acme-domain: data
servers:
  - url: https://af-data-etl.api.acmefin.com/v1
    description: Production
  - url: https://af-data-etl.staging.acmefin.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Pipelines
    description: Create, configure, and manage ETL pipeline definitions
  - name: Pipeline Runs
    description: Monitor and manage individual pipeline execution runs
  - name: Schedules
    description: Configure cron-based and event-driven pipeline schedules
  - name: Connectors
    description: Manage data source and sink connector configurations
  - name: Transformations
    description: Catalog reusable data transformation definitions
paths:
  /pipelines:
    get:
      operationId: listPipelines
      summary: List pipelines
      description: >-
        Retrieve all ETL pipelines with lifecycle status, last run time, and connector bindings.
      tags:
        - Pipelines
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: status
          in: query
          required: false
          description: Filter by pipeline status
          schema:
            type: "string"
            enum:
              - draft
              - active
              - paused
              - failed
              - archived
        - name: owner
          in: query
          required: false
          description: Filter by pipeline owner
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        pipeline_id:
                          type: string
                          description: "Unique pipeline identifier"
                          format: uuid
                          readOnly: true
                        name:
                          type: string
                          description: "Pipeline name"
                          example: "daily-transactions-ingest"
                        description:
                          type: string
                          description: "Pipeline purpose and data flow summary"
                        source_connector_id:
                          type: string
                          description: "Source connector reference"
                          format: uuid
                        sink_connector_id:
                          type: string
                          description: "Destination connector reference"
                          format: uuid
                        status:
                          type: string
                          description: "Pipeline lifecycle status"
                          enum:
                            - draft
                            - active
                            - paused
                            - failed
                            - archived
                        dag_definition:
                          type: object
                          description: "Directed acyclic graph of transformation stages"
                        retry_policy:
                          type: object
                          description: "Retry configuration for failed stages"
                        owner:
                          type: string
                          description: "Pipeline owner"
                          example: "data-eng@acmefin.com"
                        last_run_at:
                          type: string
                          description: "Timestamp of most recent execution"
                          format: date-time
                        created_at:
                          type: string
                          format: date-time
                      required:
                        - pipeline_id
                        - name
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: createPipeline
      summary: Create pipeline
      description: >-
        Define a new ETL pipeline with source and sink connectors, transformation DAG, and retry policy.
      tags:
        - Pipelines
      requestBody:
        required: true
        description: Create pipeline request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    name:
                      type: string
                    description:
                      type: string
                    source_connector_id:
                      type: string
                      format: uuid
                    sink_connector_id:
                      type: string
                      format: uuid
                    dag_definition:
                      type: object
                      description: "Transformation stage DAG"
                    retry_policy:
                      type: object
              required:
                - name
                - source_connector_id
                - sink_connector_id
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  pipeline_id:
                    type: string
                    description: "Unique pipeline identifier"
                    format: uuid
                    readOnly: true
                  name:
                    type: string
                    description: "Pipeline name"
                    example: "daily-transactions-ingest"
                  description:
                    type: string
                    description: "Pipeline purpose and data flow summary"
                  source_connector_id:
                    type: string
                    description: "Source connector reference"
                    format: uuid
                  sink_connector_id:
                    type: string
                    description: "Destination connector reference"
                    format: uuid
                  status:
                    type: string
                    description: "Pipeline lifecycle status"
                    enum:
                      - draft
                      - active
                      - paused
                      - failed
                      - archived
                  dag_definition:
                    type: object
                    description: "Directed acyclic graph of transformation stages"
                  retry_policy:
                    type: object
                    description: "Retry configuration for failed stages"
                  owner:
                    type: string
                    description: "Pipeline owner"
                    example: "data-eng@acmefin.com"
                  last_run_at:
                    type: string
                    description: "Timestamp of most recent execution"
                    format: date-time
                  created_at:
                    type: string
                    format: date-time
                required:
                  - pipeline_id
                  - name
                  - status
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /pipelines/{pipeline_id}:
    get:
      operationId: getPipeline
      summary: Get pipeline details
      description: >-
        Retrieve a pipeline with full DAG definition, connector configs, recent run history, and health
        summary.
      tags:
        - Pipelines
      parameters:
        - name: pipeline_id
          in: path
          required: true
          description: Unique pipeline id
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  pipeline_id:
                    type: string
                    description: "Unique pipeline identifier"
                    format: uuid
                    readOnly: true
                  name:
                    type: string
                    description: "Pipeline name"
                    example: "daily-transactions-ingest"
                  description:
                    type: string
                    description: "Pipeline purpose and data flow summary"
                  source_connector_id:
                    type: string
                    description: "Source connector reference"
                    format: uuid
                  sink_connector_id:
                    type: string
                    description: "Destination connector reference"
                    format: uuid
                  status:
                    type: string
                    description: "Pipeline lifecycle status"
                    enum:
                      - draft
                      - active
                      - paused
                      - failed
                      - archived
                  dag_definition:
                    type: object
                    description: "Directed acyclic graph of transformation stages"
                  retry_policy:
                    type: object
                    description: "Retry configuration for failed stages"
                  owner:
                    type: string
                    description: "Pipeline owner"
                    example: "data-eng@acmefin.com"
                  last_run_at:
                    type: string
                    description: "Timestamp of most recent execution"
                    format: date-time
                  created_at:
                    type: string
                    format: date-time
                required:
                  - pipeline_id
                  - name
                  - status
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    patch:
      operationId: updatePipeline
      summary: Update pipeline
      description: >-
        Modify pipeline configuration. Active pipelines are paused during update and resumed automatically.
      tags:
        - Pipelines
      parameters:
        - name: pipeline_id
          in: path
          required: true
          description: Unique pipeline id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Update pipeline request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    description:
                      type: string
                    dag_definition:
                      type: object
                    retry_policy:
                      type: object
                    status:
                      type: string
                      enum:
                        - active
                        - paused
                        - archived
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  pipeline_id:
                    type: string
                    description: "Unique pipeline identifier"
                    format: uuid
                    readOnly: true
                  name:
                    type: string
                    description: "Pipeline name"
                    example: "daily-transactions-ingest"
                  description:
                    type: string
                    description: "Pipeline purpose and data flow summary"
                  source_connector_id:
                    type: string
                    description: "Source connector reference"
                    format: uuid
                  sink_connector_id:
                    type: string
                    description: "Destination connector reference"
                    format: uuid
                  status:
                    type: string
                    description: "Pipeline lifecycle status"
                    enum:
                      - draft
                      - active
                      - paused
                      - failed
                      - archived
                  dag_definition:
                    type: object
                    description: "Directed acyclic graph of transformation stages"
                  retry_policy:
                    type: object
                    description: "Retry configuration for failed stages"
                  owner:
                    type: string
                    description: "Pipeline owner"
                    example: "data-eng@acmefin.com"
                  last_run_at:
                    type: string
                    description: "Timestamp of most recent execution"
                    format: date-time
                  created_at:
                    type: string
                    format: date-time
                required:
                  - pipeline_id
                  - name
                  - status
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
    delete:
      operationId: deletePipeline
      summary: Delete pipeline
      description: >-
        Permanently delete a pipeline and its run history. Running executions are cancelled first.
      tags:
        - Pipelines
      parameters:
        - name: pipeline_id
          in: path
          required: true
          description: Unique pipeline id
          schema:
            type: "string"
      responses:
        "204":
          description: Resource deleted successfully
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /pipelines/{pipeline_id}/run:
    post:
      operationId: triggerPipelineRun
      summary: Trigger pipeline run
      description: >-
        Manually trigger a pipeline execution. Optionally override runtime parameters for this run only.
      tags:
        - Pipelines
      parameters:
        - name: pipeline_id
          in: path
          required: true
          description: Unique pipeline id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Trigger pipeline run request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    parameters:
                      type: object
                      description: "Runtime parameter overrides"
                    dry_run:
                      type: boolean
                      description: "Validate without executing"
                      default: false
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum:
                      - queued
                      - running
                  started_at:
                    type: string
                    format: date-time
                required:
                  - run_id
                  - status
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /pipelines/{pipeline_id}/clone:
    post:
      operationId: clonePipeline
      summary: Clone pipeline
      description: >-
        Create a duplicate of an existing pipeline with a new name. All configuration is copied except
        schedules.
      tags:
        - Pipelines
      parameters:
        - name: pipeline_id
          in: path
          required: true
          description: Unique pipeline id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Clone pipeline request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    new_name:
                      type: string
                      description: "Name for the cloned pipeline"
              required:
                - new_name
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  pipeline_id:
                    type: string
                    description: "New pipeline ID"
                    format: uuid
                  name:
                    type: string
                  status:
                    type: string
                required:
                  - pipeline_id
                  - name
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /runs:
    get:
      operationId: listRuns
      summary: List pipeline runs
      description: >-
        Retrieve execution runs across all pipelines with filters for status, trigger type, and date range.
      tags:
        - Pipeline Runs
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: pipeline_id
          in: query
          required: false
          description: Filter by pipeline
          schema:
            type: "string"
        - name: status
          in: query
          required: false
          description: Filter by execution status
          schema:
            type: "string"
            enum:
              - queued
              - running
              - succeeded
              - failed
              - cancelled
        - name: trigger
          in: query
          required: false
          description: Filter by trigger type
          schema:
            type: "string"
        - name: since
          in: query
          required: false
          description: Filter runs started after this timestamp
          schema:
            type: "string"
            format: "date-time"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        run_id:
                          type: string
                          description: "Unique run identifier"
                          format: uuid
                          readOnly: true
                        pipeline_id:
                          type: string
                          description: "Parent pipeline"
                          format: uuid
                        status:
                          type: string
                          description: "Execution status"
                          enum:
                            - queued
                            - running
                            - succeeded
                            - failed
                            - cancelled
                        trigger:
                          type: string
                          description: "How this run was initiated"
                          enum:
                            - scheduled
                            - manual
                            - api
                            - event
                        started_at:
                          type: string
                          format: date-time
                        finished_at:
                          type: string
                          format: date-time
                        records_processed:
                          type: integer
                          description: "Total records ingested during this run"
                        bytes_processed:
                          type: integer
                          description: "Total data volume processed"
                        error_message:
                          type: string
                          description: "Failure reason if status is failed"
                      required:
                        - run_id
                        - pipeline_id
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /runs/{run_id}:
    get:
      operationId: getRun
      summary: Get run details
      description: >-
        Retrieve detailed execution information including per-stage metrics, data volumes, and error
        diagnostics.
      tags:
        - Pipeline Runs
      parameters:
        - name: run_id
          in: path
          required: true
          description: Unique run id
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id:
                    type: string
                    description: "Unique run identifier"
                    format: uuid
                    readOnly: true
                  pipeline_id:
                    type: string
                    description: "Parent pipeline"
                    format: uuid
                  status:
                    type: string
                    description: "Execution status"
                    enum:
                      - queued
                      - running
                      - succeeded
                      - failed
                      - cancelled
                  trigger:
                    type: string
                    description: "How this run was initiated"
                    enum:
                      - scheduled
                      - manual
                      - api
                      - event
                  started_at:
                    type: string
                    format: date-time
                  finished_at:
                    type: string
                    format: date-time
                  records_processed:
                    type: integer
                    description: "Total records ingested during this run"
                  bytes_processed:
                    type: integer
                    description: "Total data volume processed"
                  error_message:
                    type: string
                    description: "Failure reason if status is failed"
                required:
                  - run_id
                  - pipeline_id
                  - status
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /runs/{run_id}/logs:
    get:
      operationId: getRunLogs
      summary: Get run logs
      description: >-
        Stream structured log entries for a pipeline run with severity filtering and stage-level scoping.
      tags:
        - Pipeline Runs
      parameters:
        - name: run_id
          in: path
          required: true
          description: Unique run id
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id:
                    type: string
                  entries:
                    type: array
                    description: "Log entries with timestamp, severity, stage, and message"
                    items:
                      type: object
                  total_entries:
                    type: integer
                required:
                  - run_id
                  - entries
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /runs/{run_id}/cancel:
    post:
      operationId: cancelRun
      summary: Cancel pipeline run
      description: >-
        Request cancellation of a running pipeline execution. In-flight stages complete before the run
        stops.
      tags:
        - Pipeline Runs
      parameters:
        - name: run_id
          in: path
          required: true
          description: Unique run id
          schema:
            type: "string"
      responses:
        "202":
          description: Action accepted for processing
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /schedules:
    get:
      operationId: listSchedules
      summary: List schedules
      description: Retrieve all pipeline schedules with next execution time and enabled status.
      tags:
        - Schedules
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        schedule_id:
                          type: string
                          description: "Schedule identifier"
                          format: uuid
                          readOnly: true
                        pipeline_id:
                          type: string
                          description: "Scheduled pipeline"
                          format: uuid
                        cron_expression:
                          type: string
                          description: "Cron schedule expression"
                          example: "0 2 * * *"
                        timezone:
                          type: string
                          description: "IANA timezone"
                          example: "America/New_York"
                        is_enabled:
                          type: boolean
                          description: "Whether schedule is active"
                        next_run_at:
                          type: string
                          description: "Next scheduled execution"
                          format: date-time
                        last_run_at:
                          type: string
                          format: date-time
                      required:
                        - schedule_id
                        - pipeline_id
                        - cron_expression
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: createSchedule
      summary: Create schedule
      description: >-
        Attach a cron-based schedule to a pipeline. Schedules are evaluated in the specified timezone.
      tags:
        - Schedules
      requestBody:
        required: true
        description: Create schedule request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    pipeline_id:
                      type: string
                      format: uuid
                    cron_expression:
                      type: string
                    timezone:
                      type: string
                      default: "UTC"
