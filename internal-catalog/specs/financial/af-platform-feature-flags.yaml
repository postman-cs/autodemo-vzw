openapi: 3.0.3
info:
  title: Acme Finance Feature Flags API
  description: >-
    Feature flag management with fine-grained targeting rules, percentage-based gradual rollout, A/B test splits
    with metric tracking, emergency kill switch, and comprehensive audit logging. Supports boolean, string,
    number, and JSON flag types with user/segment targeting, environment-specific overrides, and real-time flag
    evaluation via server-side and client-side SDKs.
  version: 2.8.0
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-platform-feature-flags
  x-acme-domain: platform
servers:
  - url: https://af-platform-feature-flags.api.acmefin.com/v1
    description: Production
  - url: https://af-platform-feature-flags.staging.acmefin.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Feature Flags
    description: Create, configure, and manage feature flags
  - name: Targeting & Rollout
    description: Define targeting rules, gradual rollout, and A/B test splits
  - name: Segments
    description: User segments for targeting reusable audience definitions
paths:
  /flags:
    get:
      operationId: listFlags
      summary: List feature flags
      description: >-
        List all feature flags with their current state, targeting rules summary, and rollout percentage.
      tags:
        - Feature Flags
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: enabled
          in: query
          required: false
          description: "Filter by enabled state"
          schema:
            type: "boolean"
        - name: environment
          in: query
          required: false
          description: "Filter by environment"
          schema:
            type: "string"
        - name: tag
          in: query
          required: false
          description: "Filter by tag"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        flag_key:
                          type: string
                          description: "Flag key (unique identifier)"
                          example: "enable-instant-transfers"
                        name:
                          type: string
                          description: "Human-readable name"
                          example: "Instant Transfers"
                        description:
                          type: string
                          description: "Flag description"
                          example: "Enable instant money transfers for eligible accounts"
                        type:
                          type: string
                          description: "Flag value type"
                          example: "boolean"
                          enum:
                            - boolean
                            - string
                            - number
                            - json
                        default_value:
                          type: string
                          description: "Default value when no rules match"
                          example: "false"
                        enabled:
                          type: boolean
                          description: "Whether the flag is active"
                          example: true
                        environment:
                          type: string
                          description: "Target environment"
                          example: "production"
                        tags:
                          type: array
                          description: "Organizational tags"
                          items:
                            type: string
                        created_at:
                          type: string
                          description: "ISO 8601 timestamp"
                          format: date-time
                          example: "2025-06-15T14:30:00Z"
                        updated_at:
                          type: string
                          description: "ISO 8601 timestamp"
                          format: date-time
                          example: "2025-06-15T14:30:00Z"
                      required:
                        - flag_key
                        - name
                        - type
                        - enabled
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: createFlag
      summary: Create feature flag
      description: >-
        Create a new feature flag in disabled state. The flag key must be unique and follow kebab-case
        convention.
      tags:
        - Feature Flags
      requestBody:
        required: true
        description: Create feature flag request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    key:
                      type: string
                      description: "Flag key"
                      example: "enable-biometric-login"
                    name:
                      type: string
                      description: "Display name"
                      example: "Biometric Login"
                    description:
                      type: string
                      description: "Description"
                      example: "Enable fingerprint and face ID login"
                    type:
                      type: string
                      description: "Value type"
                      example: "boolean"
                      enum:
                        - boolean
                        - string
                        - number
                        - json
                    default_value:
                      type: string
                      description: "Default value"
                      example: "false"
                    tags:
                      type: array
                      description: "Tags"
                      items:
                        type: string
              required:
                - key
                - name
                - type
                - default_value
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  flag_key:
                    type: string
                    description: "Flag key (unique identifier)"
                    example: "enable-instant-transfers"
                  name:
                    type: string
                    description: "Human-readable name"
                    example: "Instant Transfers"
                  description:
                    type: string
                    description: "Flag description"
                    example: "Enable instant money transfers for eligible accounts"
                  type:
                    type: string
                    description: "Flag value type"
                    example: "boolean"
                    enum:
                      - boolean
                      - string
                      - number
                      - json
                  default_value:
                    type: string
                    description: "Default value when no rules match"
                    example: "false"
                  enabled:
                    type: boolean
                    description: "Whether the flag is active"
                    example: true
                  environment:
                    type: string
                    description: "Target environment"
                    example: "production"
                  tags:
                    type: array
                    description: "Organizational tags"
                    items:
                      type: string
                  created_at:
                    type: string
                    description: "ISO 8601 timestamp"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                  updated_at:
                    type: string
                    description: "ISO 8601 timestamp"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - flag_key
                  - name
                  - type
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /flags/{flag_key}:
    get:
      operationId: getFlag
      summary: Get feature flag
      description: >-
        Retrieve flag configuration including targeting rules, rollout state, and evaluation statistics.
      tags:
        - Feature Flags
      parameters:
        - name: flag_key
          in: path
          required: true
          description: "Unique flag key"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  flag_key:
                    type: string
                    description: "Flag key (unique identifier)"
                    example: "enable-instant-transfers"
                  name:
                    type: string
                    description: "Human-readable name"
                    example: "Instant Transfers"
                  description:
                    type: string
                    description: "Flag description"
                    example: "Enable instant money transfers for eligible accounts"
                  type:
                    type: string
                    description: "Flag value type"
                    example: "boolean"
                    enum:
                      - boolean
                      - string
                      - number
                      - json
                  default_value:
                    type: string
                    description: "Default value when no rules match"
                    example: "false"
                  enabled:
                    type: boolean
                    description: "Whether the flag is active"
                    example: true
                  environment:
                    type: string
                    description: "Target environment"
                    example: "production"
                  tags:
                    type: array
                    description: "Organizational tags"
                    items:
                      type: string
                  created_at:
                    type: string
                    description: "ISO 8601 timestamp"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                  updated_at:
                    type: string
                    description: "ISO 8601 timestamp"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - flag_key
                  - name
                  - type
                  - enabled
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    patch:
      operationId: updateFlag
      summary: Update feature flag
      description: >-
        Update flag metadata. To change targeting or rollout, use the dedicated sub-endpoints.
      tags:
        - Feature Flags
      parameters:
        - name: flag_key
          in: path
          required: true
          description: "Unique flag key"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Update feature flag request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    name:
                      type: string
                      description: "Updated name"
                      example: "Biometric Auth"
                    description:
                      type: string
                      description: "Updated description"
                      example: "Biometric authentication for all platforms"
                    tags:
                      type: array
                      description: "Updated tags"
                      items:
                        type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  flag_key:
                    type: string
                    description: "Flag key (unique identifier)"
                    example: "enable-instant-transfers"
                  name:
                    type: string
                    description: "Human-readable name"
                    example: "Instant Transfers"
                  description:
                    type: string
                    description: "Flag description"
                    example: "Enable instant money transfers for eligible accounts"
                  type:
                    type: string
                    description: "Flag value type"
                    example: "boolean"
                    enum:
                      - boolean
                      - string
                      - number
                      - json
                  default_value:
                    type: string
                    description: "Default value when no rules match"
                    example: "false"
                  enabled:
                    type: boolean
                    description: "Whether the flag is active"
                    example: true
                  environment:
                    type: string
                    description: "Target environment"
                    example: "production"
                  tags:
                    type: array
                    description: "Organizational tags"
                    items:
                      type: string
                  created_at:
                    type: string
                    description: "ISO 8601 timestamp"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                  updated_at:
                    type: string
                    description: "ISO 8601 timestamp"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - flag_key
                  - name
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
    delete:
      operationId: deleteFlag
      summary: Delete feature flag
      description: >-
        Permanently delete a feature flag. Archived flags can be restored; deleted flags cannot.
      tags:
        - Feature Flags
      parameters:
        - name: flag_key
          in: path
          required: true
          description: "Unique flag key"
          schema:
            type: "string"
      responses:
        "204":
          description: Resource deleted successfully
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /flags/{flag_key}/evaluate:
    post:
      operationId: evaluateFlag
      summary: Evaluate flag
      description: >-
        Evaluate a feature flag for a specific user context. Returns the resolved value based on targeting
        rules, rollout percentage, and A/B splits. This is the server-side evaluation endpoint; SDKs use
        this internally.
      tags:
        - Targeting & Rollout
      parameters:
        - name: flag_key
          in: path
          required: true
          description: "Unique flag key"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Evaluate flag request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    user_id:
                      type: string
                      description: "User identifier"
                      example: "usr-12345"
                    attributes:
                      type: object
                      description: "User attributes for targeting (plan, region, etc.)"
              required:
                - user_id
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  flag_key:
                    type: string
                    description: "Flag key"
                    example: "enable-instant-transfers"
                  value:
                    type: string
                    description: "Resolved value"
                    example: "true"
                  variation:
                    type: string
                    description: "Matched variation name"
                    example: "treatment"
                  reason:
                    type: string
                    description: "Resolution reason"
                    example: "default"
                    enum:
                      - default
                      - targeting_rule
                      - rollout
                      - split
                      - kill_switch
                  segment:
                    type: string
                    description: "Matched segment (if any)"
                    example: "premium-users"
                required:
                  - flag_key
                  - value
                  - reason
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /flags/{flag_key}/targeting:
    get:
      operationId: getTargetingRules
      summary: Get targeting rules
      description: >-
        Retrieve targeting rules for a flag. Rules define which users see which variations based on
        attribute matching.
      tags:
        - Targeting & Rollout
      parameters:
        - name: flag_key
          in: path
          required: true
          description: "Unique flag key"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  flag_key:
                    type: string
                    description: "Flag key"
                    example: "enable-instant-transfers"
                  rules:
                    type: array
                    description: "Ordered targeting rules"
                    items:
                      type: object
                  fallthrough:
                    type: string
                    description: "Value when no rules match"
                    example: "false"
                required:
                  - flag_key
                  - rules
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    put:
      operationId: updateTargetingRules
      summary: Update targeting rules
      description: >-
        Replace all targeting rules for a flag. Rules are evaluated in order; first match wins.
      tags:
        - Targeting & Rollout
      parameters:
        - name: flag_key
          in: path
          required: true
          description: "Flag key"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Update targeting rules request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    rules:
                      type: array
                      description: "Targeting rules"
                      items:
                        type: object
                    fallthrough:
                      type: string
                      description: "Default when no rule matches"
                      example: "false"
              required:
                - rules
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  flag_key:
                    type: string
                    description: "Key"
                    example: "enable-instant-transfers"
                  rules_count:
                    type: integer
                    description: "Number of rules"
                    example: 3
                  updated_at:
                    type: string
                    description: "ISO 8601 timestamp"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - flag_key
                  - rules_count
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /flags/{flag_key}/rollout:
    get:
      operationId: getRollout
      summary: Get rollout config
      description: >-
        Retrieve gradual rollout configuration including current percentage and rollout schedule.
      tags:
        - Targeting & Rollout
      parameters:
        - name: flag_key
          in: path
          required: true
          description: "Unique flag key"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  flag_key:
                    type: string
                    description: "Key"
                    example: "enable-instant-transfers"
                  percentage:
                    type: number
                    description: "Current rollout percentage"
                    format: double
                    example: 25.0
                  rollout_strategy:
                    type: string
                    description: "Rollout strategy"
                    example: "percentage"
                    enum:
                      - percentage
                      - scheduled
                      - manual
                  schedule:
                    type: array
                    description: "Scheduled rollout steps"
                    items:
                      type: object
                required:
                  - flag_key
                  - percentage
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    put:
      operationId: updateRollout
      summary: Update rollout config
      description: >-
        Configure gradual rollout for a flag. Set a percentage or define a schedule for automatic percentage
        increases.
      tags:
        - Targeting & Rollout
      parameters:
        - name: flag_key
          in: path
          required: true
          description: "Flag key"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Update rollout config request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    percentage:
                      type: number
                      description: "Rollout percentage (0-100)"
                      format: double
                      example: 50.0
                    schedule:
                      type: array
                      description: "Rollout schedule steps"
                      items:
                        type: object
              required:
                - percentage
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  flag_key:
                    type: string
                    description: "Key"
                    example: "enable-instant-transfers"
                  percentage:
                    type: number
                    description: "Updated percentage"
                    format: double
                    example: 50.0
                  updated_at:
                    type: string
                    description: "ISO 8601 timestamp"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - flag_key
                  - percentage
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /flags/{flag_key}/splits:
    get:
      operationId: listSplits
      summary: List A/B test splits
      description: >-
        List all A/B test split variations for a flag with their traffic allocation and metric tracking
        configuration.
      tags:
        - Targeting & Rollout
      parameters:
        - name: flag_key
          in: path
          required: true
          description: "Flag key"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        split_id:
                          type: string
                          description: "Split ID"
                          format: uuid
                          example: "spl-1a2b3c4d"
                        name:
                          type: string
                          description: "Variation name"
                          example: "treatment-A"
                        value:
                          type: string
                          description: "Variation value"
                          example: "true"
                        allocation_percent:
                          type: number
                          description: "Traffic allocation"
                          format: double
                          example: 50.0
                        impressions:
                          type: integer
                          description: "Total evaluations for this variation"
                          example: 12500
                      required:
                        - split_id
                        - name
                        - value
                        - allocation_percent
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: createSplit
      summary: Create A/B split
      description: >-
        Add a new A/B test variation to a flag. The total allocation across all splits must not exceed 100%.
      tags:
        - Targeting & Rollout
      parameters:
        - name: flag_key
          in: path
          required: true
          description: "Unique flag key"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Create A/B split request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    name:
                      type: string
                      description: "Variation name"
                      example: "treatment-B"
                    value:
                      type: string
                      description: "Variation value"
                      example: "alternate"
                    allocation_percent:
                      type: number
                      description: "Traffic percentage"
                      format: double
                      example: 25.0
              required:
                - name
                - value
                - allocation_percent
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  split_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "spl-5a6b7c8d"
                  name:
                    type: string
                    description: "Name"
                    example: "treatment-B"
                  allocation_percent:
                    type: number
                    description: "Allocation"
                    format: double
                    example: 25.0
                required:
                  - split_id
                  - name
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /flags/{flag_key}/splits/{split_id}:
    patch:
      operationId: updateSplit
      summary: Update A/B split
      description: Update a split variation's allocation or value.
      tags:
        - Targeting & Rollout
      parameters:
        - name: flag_key
          in: path
          required: true
          description: "Flag key"
          schema:
