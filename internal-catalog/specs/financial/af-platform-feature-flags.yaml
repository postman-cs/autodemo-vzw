  /flags/{flag_key}/audit:
    get:
      operationId: getFlagAudit
      summary: Get flag audit log
      description: >-
        Retrieve the audit trail for a feature flag showing all configuration changes, kill/restore events,
        and who made them.
      tags:
        - Feature Flags
      parameters:
        - name: flag_key
          in: path
          required: true
          description: "Flag key"
          schema:
            type: "string"
        - name: page
          in: query
          required: false
          description: "Page"
          schema:
            type: "integer"
            default: 1
        - name: per_page
          in: query
          required: false
          description: "Per page"
          schema:
            type: "integer"
            default: 20
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        event_id:
                          type: string
                          description: "Event ID"
                          format: uuid
                          example: "fae-2a3b4c5d"
                        action:
                          type: string
                          description: "Action"
                          example: "created"
                          enum:
                            - created
                            - updated
                            - deleted
                            - killed
                            - restored
                            - targeting_updated
                            - rollout_updated
                        actor:
                          type: string
                          description: "Who performed the action"
                          example: "admin@acmefin.com"
                        timestamp:
                          type: string
                          description: "ISO 8601 timestamp"
                          format: date-time
                          example: "2025-06-15T14:30:00Z"
                        details:
                          type: object
                          description: "Change details"
                      required:
                        - event_id
                        - action
                        - actor
                        - timestamp
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /flags/evaluate-all:
    post:
      operationId: evaluateAllFlags
      summary: Evaluate all flags
      description: >-
        Bulk-evaluate all active feature flags for a user context. Returns a map of flag keys to resolved
        values. Used by client-side SDKs for initial flag loading.
      tags:
        - Targeting & Rollout
      requestBody:
        required: true
        description: Evaluate all flags request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    user_id:
                      type: string
                      description: "User ID"
                      example: "usr-12345"
                    attributes:
                      type: object
                      description: "User attributes for targeting"
                    environment:
                      type: string
                      description: "Environment"
                      example: "production"
              required:
                - user_id
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  evaluations:
                    type: object
                    description: "Map of flag_key -> {value, variation, reason}"
                  evaluated_count:
                    type: integer
                    description: "Flags evaluated"
                    example: 42
                  environment:
                    type: string
                    description: "Environment"
                    example: "production"
                required:
                  - evaluations
