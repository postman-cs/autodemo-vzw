  /flags/{flag_key}/kill:
    post:
      operationId: killFlag
      summary: Kill switch
      description: >-
        Emergency kill switch — immediately disable a flag for all users regardless of targeting rules. All
        evaluations return the default value. This is an instant, audit-logged action for incident response.
      tags:
        - Feature Flags
      parameters:
        - name: flag_key
          in: path
          required: true
          description: "Unique flag key"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Kill switch request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    reason:
                      type: string
                      description: "Kill reason"
                      example: "Critical bug in instant transfers — disabling immediately"
              required:
                - reason
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  flag_key:
                    type: string
                    description: "Key"
                    example: "enable-instant-transfers"
                  status:
                    type: string
                    description: "Status"
                    example: "killed"
                  killed_at:
                    type: string
                    description: "ISO 8601 timestamp"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - flag_key
                  - status
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /flags/{flag_key}/restore:
    post:
      operationId: restoreFlag
      summary: Restore killed flag
      description: >-
        Restore a killed flag to its previous targeting and rollout state. Reverses the kill switch action.
      tags:
        - Feature Flags
      parameters:
        - name: flag_key
          in: path
          required: true
          description: "Unique flag key"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Restore killed flag request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    reason:
                      type: string
                      description: "Restore reason"
                      example: "Bug fixed, re-enabling instant transfers"
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  flag_key:
                    type: string
                    description: "Key"
                    example: "enable-instant-transfers"
                  status:
                    type: string
                    description: "Status"
                    example: "active"
                  restored_at:
                    type: string
                    description: "ISO 8601 timestamp"
                    format: date-time
