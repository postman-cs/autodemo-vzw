  /scoring:
    post:
      operationId: scoreTransaction
      summary: Real-time transaction risk scoring
      description: Performs real-time risk scoring on a transaction using the ML fraud detection model. Returns a risk score
        from 0-100, matched rules, recommended action, and contributing risk factors. This endpoint is called during transaction
        authorization to make accept/decline/step-up decisions. Response time SLA is under 100ms at p99.
      tags:
      - Risk Scoring
      requestBody:
        required: true
        description: Real-time transaction risk scoring request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                card_id:
                  type: string
                  description: Unique card identifier
                  example: card-8a2f4b91
                amount:
                  type: number
                  description: Monetary amount
                  format: double
                  example: 250.0
                currency:
                  type: string
                  description: ISO 4217 currency code
                  example: USD
                  minLength: 3
                  maxLength: 3
                merchant_name:
                  type: string
                  description: Merchant name as registered with the acquirer
                  example: ACME Electronics Store
                merchant_category_code:
                  type: string
                  description: ISO 18245 merchant category code
                  example: '5411'
                  pattern: ^[0-9]{4}$
                merchant_country:
                  type: string
                  description: Merchant country code
                  example: US
                channel:
                  type: string
                  description: Transaction channel
                  example: ECOMMERCE
                  enum:
                  - POS
                  - ECOMMERCE
                  - ATM
                  - MOTO
                  - CONTACTLESS
                device_id:
                  type: string
                  description: Device fingerprint identifier if available
                  example: dev-8a3c9f21
                ip_address:
                  type: string
                  description: Cardholder IP address for CNP transactions
                  example: 203.0.113.42
              required:
              - card_id
              - amount
              - currency
              - merchant_name
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  risk_score:
                    type: integer
                    description: ML model risk score from 0 (safe) to 100 (high risk)
                    example: 35
                    minimum: 0
                    maximum: 100
                  recommendation:
                    type: string
                    description: Recommended action based on risk score and rules
                    example: APPROVE
                    enum:
                    - APPROVE
                    - DECLINE
                    - STEP_UP_AUTH
                    - REVIEW
                  matched_rules:
                    type: array
                    description: Rules that triggered for this transaction
                    items:
                      type: string
                      example: rule-international-ecommerce
                  risk_factors:
                    type: array
                    description: Contributing risk factors
                    items:
                      type: string
                      example: NEW_MERCHANT
                  model_version:
                    type: string
                    description: Version of the ML model used for scoring
                    example: v3.4.2-2025-06
                required:
                - risk_score
                - recommendation
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
  /device-fingerprints:
    post:
      operationId: registerDeviceFingerprint
      summary: Register a device fingerprint
      description: Registers a new device fingerprint captured from the cardholder's browser or mobile app. The fingerprint
        includes device type, OS, browser, screen resolution, and other hardware signals. Registered devices build a trust
        profile over time. Unknown devices during transactions increase the risk score.
      tags:
      - Device Intelligence
      requestBody:
        required: true
        description: Register a device fingerprint request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                card_id:
                  type: string
                  description: Unique card identifier
                  example: card-8a2f4b91
                fingerprint_hash:
                  type: string
                  description: SHA-256 hash of the device fingerprint components
                  example: a1b2c3d4e5f6...
                device_type:
                  type: string
                  description: Detected device type
                  example: MOBILE
                  enum:
                  - MOBILE
                  - DESKTOP
                  - TABLET
                  - UNKNOWN
                os:
                  type: string
                  description: Operating system detected
                  example: iOS 18.2
                browser:
                  type: string
                  description: Browser detected
                  example: Safari 18.0
                ip_address:
                  type: string
                  description: Last known IP address
                  example: 203.0.113.42
                screen_resolution:
                  type: string
                  description: Screen resolution
                  example: 1170x2532
              required:
              - card_id
              - fingerprint_hash
      responses:
        '201':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  device_id:
                    type: string
                    description: Device fingerprint identifier
                    example: dev-8a3c9f21
                  card_id:
                    type: string
                    description: Unique card identifier
                    example: card-8a2f4b91
                  fingerprint_hash:
                    type: string
                    description: SHA-256 hash of the device fingerprint components
                    example: a1b2c3d4e5f6...
                  device_type:
