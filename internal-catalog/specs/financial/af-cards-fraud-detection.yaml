openapi: 3.0.3
info:
  title: Acme Finance Card Fraud Detection API
  description: Real-time fraud detection and prevention for card transactions. Combines machine learning risk scoring, configurable
    rule-based detection, device fingerprinting, and velocity analysis to identify and respond to fraudulent activity. Supports
    multiple response actions from soft alerts to hard transaction declines. Integrates with 3DS authentication and card management
    for end-to-end fraud prevention across card-present and card-not-present channels.
  version: 3.4.0
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-cards-fraud-detection
  x-acme-domain: cards
servers:
- url: https://af-cards-fraud-detection.api.acmefin.com/v1
  description: Production
- url: https://af-cards-fraud-detection.staging.acmefin.com/v1
  description: Staging
security:
- BearerAuth: []
tags:
- name: Fraud Alerts
  description: Fraud alert management and investigation workflow
- name: Detection Rules
  description: Configurable fraud detection rules and thresholds
- name: Risk Scoring
  description: Real-time ML-based risk scoring for transactions
- name: Device Intelligence
  description: Device fingerprinting and trust scoring
paths:
  /alerts:
    get:
      operationId: listFraudAlerts
      summary: List fraud alerts
      description: Returns a paginated list of fraud alerts. Supports filtering by card, alert type, status, risk score range,
        and date. Results are sorted by risk score descending by default. Use this to manage the fraud investigation queue.
      tags:
      - Fraud Alerts
      parameters:
      - name: page
        in: query
        required: false
        description: Page number for pagination
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: per_page
        in: query
        required: false
        description: Number of results per page (max 100)
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: sort_by
        in: query
        required: false
        description: Field to sort results by
        schema:
          type: string
      - name: sort_order
        in: query
        required: false
        description: Sort direction
        schema:
          type: string
          enum:
          - asc
          - desc
          default: desc
      - name: card_id
        in: query
        required: false
        description: Filter by card identifier
        schema:
          type: string
      - name: status
        in: query
        required: false
        description: Filter by alert status
        schema:
          type: string
          enum:
          - NEW
          - INVESTIGATING
          - CONFIRMED_FRAUD
          - FALSE_POSITIVE
      - name: alert_type
        in: query
        required: false
        description: Filter by alert type
        schema:
          type: string
          enum:
          - TRANSACTION_ANOMALY
          - VELOCITY_BREACH
          - GEO_ANOMALY
          - DEVICE_ANOMALY
      - name: min_risk_score
        in: query
        required: false
        description: Minimum risk score filter
        schema:
          type: integer
          minimum: 0
          maximum: 100
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        alert_id:
                          type: string
                          description: Unique fraud alert identifier
                          example: frd-9c2f4a81
                        card_id:
                          type: string
                          description: Unique card identifier
                          example: card-8a2f4b91
                        transaction_id:
                          type: string
                          description: Flagged transaction identifier
                          example: txn-3f8c91
                        alert_type:
                          type: string
                          description: Classification of the fraud alert
                          example: TRANSACTION_ANOMALY
                          enum:
                          - TRANSACTION_ANOMALY
                          - VELOCITY_BREACH
                          - GEO_ANOMALY
                          - DEVICE_ANOMALY
                          - PATTERN_MATCH
                          - ACCOUNT_TAKEOVER
                        risk_score:
                          type: integer
                          description: Calculated risk score from 0-100
                          example: 87
                          minimum: 0
                          maximum: 100
                        status:
                          type: string
                          description: Alert investigation status
                          example: NEW
                          enum:
                          - NEW
                          - INVESTIGATING
                          - CONFIRMED_FRAUD
                          - FALSE_POSITIVE
                          - ESCALATED
                          - RESOLVED
                        amount:
                          type: number
                          description: Monetary amount
                          format: double
                          example: 250.0
                        currency:
                          type: string
                          description: ISO 4217 currency code
                          example: USD
                          minLength: 3
                          maxLength: 3
                        merchant_name:
                          type: string
                          description: Merchant name as registered with the acquirer
                          example: ACME Electronics Store
                        merchant_country:
                          type: string
                          description: Merchant country code
                          example: US
                        triggered_rules:
                          type: array
                          description: Fraud rules that triggered this alert
                          items:
                            type: string
                            example: rule-high-value-foreign
                        created_at:
                          type: string
                          description: ISO 8601 timestamp
                          format: date-time
                          example: '2025-06-15T14:30:00Z'
                      required:
                      - alert_id
                      - card_id
                      - status
                      - risk_score
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
                required:
                - data
                - pagination
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
  /alerts/{alert_id}:
    get:
      operationId: getFraudAlert
      summary: Get fraud alert details
      description: Retrieves the full details of a fraud alert including the flagged transaction, risk score, triggered rules,
        merchant information, and investigation status. Includes device and geolocation data if available. Use this to review
        an alert before taking action.
      tags:
      - Fraud Alerts
      parameters:
      - name: alert_id
        in: path
        required: true
        description: Unique alert id
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  alert_id:
                    type: string
                    description: Unique fraud alert identifier
                    example: frd-9c2f4a81
                  card_id:
                    type: string
                    description: Unique card identifier
                    example: card-8a2f4b91
                  transaction_id:
                    type: string
                    description: Flagged transaction identifier
                    example: txn-3f8c91
                  alert_type:
                    type: string
                    description: Classification of the fraud alert
                    example: TRANSACTION_ANOMALY
                    enum:
                    - TRANSACTION_ANOMALY
                    - VELOCITY_BREACH
                    - GEO_ANOMALY
                    - DEVICE_ANOMALY
                    - PATTERN_MATCH
                    - ACCOUNT_TAKEOVER
                  risk_score:
                    type: integer
                    description: Calculated risk score from 0-100
                    example: 87
                    minimum: 0
                    maximum: 100
                  status:
                    type: string
                    description: Alert investigation status
                    example: NEW
                    enum:
                    - NEW
                    - INVESTIGATING
                    - CONFIRMED_FRAUD
                    - FALSE_POSITIVE
                    - ESCALATED
                    - RESOLVED
                  amount:
                    type: number
                    description: Monetary amount
                    format: double
                    example: 250.0
                  currency:
                    type: string
                    description: ISO 4217 currency code
                    example: USD
                    minLength: 3
                    maxLength: 3
                  merchant_name:
                    type: string
                    description: Merchant name as registered with the acquirer
                    example: ACME Electronics Store
                  merchant_country:
                    type: string
                    description: Merchant country code
                    example: US
                  triggered_rules:
                    type: array
                    description: Fraud rules that triggered this alert
                    items:
                      type: string
                      example: rule-high-value-foreign
                  created_at:
                    type: string
                    description: ISO 8601 timestamp
                    format: date-time
                    example: '2025-06-15T14:30:00Z'
                required:
                - alert_id
                - status
                - risk_score
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
    patch:
      operationId: updateFraudAlert
      summary: Update fraud alert status
      description: Updates the investigation status of a fraud alert. Analysts use this to transition alerts through the investigation
        workflow (NEW → INVESTIGATING → CONFIRMED_FRAUD or FALSE_POSITIVE). Status changes are logged for audit purposes.
      tags:
      - Fraud Alerts
      parameters:
      - name: alert_id
        in: path
        required: true
        description: Unique alert id
        schema:
          type: string
      requestBody:
        required: true
        description: Update fraud alert status request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  description: Alert investigation status
                  example: NEW
                  enum:
                  - NEW
                  - INVESTIGATING
                  - CONFIRMED_FRAUD
                  - FALSE_POSITIVE
                  - ESCALATED
                  - RESOLVED
                analyst_notes:
                  type: string
                  description: Investigation notes from the fraud analyst
                  example: Verified with cardholder - legitimate travel purchase
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  alert_id:
                    type: string
                    description: Unique fraud alert identifier
                    example: frd-9c2f4a81
                  card_id:
                    type: string
                    description: Unique card identifier
                    example: card-8a2f4b91
                  transaction_id:
                    type: string
                    description: Flagged transaction identifier
                    example: txn-3f8c91
                  alert_type:
                    type: string
                    description: Classification of the fraud alert
                    example: TRANSACTION_ANOMALY
                    enum:
                    - TRANSACTION_ANOMALY
                    - VELOCITY_BREACH
                    - GEO_ANOMALY
                    - DEVICE_ANOMALY
                    - PATTERN_MATCH
                    - ACCOUNT_TAKEOVER
                  risk_score:
                    type: integer
                    description: Calculated risk score from 0-100
                    example: 87
                    minimum: 0
                    maximum: 100
                  status:
                    type: string
                    description: Alert investigation status
                    example: NEW
                    enum:
                    - NEW
                    - INVESTIGATING
                    - CONFIRMED_FRAUD
                    - FALSE_POSITIVE
                    - ESCALATED
                    - RESOLVED
                  amount:
                    type: number
                    description: Monetary amount
                    format: double
                    example: 250.0
                  currency:
                    type: string
                    description: ISO 4217 currency code
                    example: USD
                    minLength: 3
                    maxLength: 3
                  merchant_name:
                    type: string
                    description: Merchant name as registered with the acquirer
                    example: ACME Electronics Store
                  merchant_country:
                    type: string
                    description: Merchant country code
                    example: US
                  triggered_rules:
                    type: array
                    description: Fraud rules that triggered this alert
                    items:
                      type: string
                      example: rule-high-value-foreign
                  created_at:
                    type: string
                    description: ISO 8601 timestamp
                    format: date-time
                    example: '2025-06-15T14:30:00Z'
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
  /alerts/{alert_id}/confirm:
    post:
      operationId: confirmFraud
      summary: Confirm fraudulent activity
      description: Confirms that the alerted transaction is fraudulent. This triggers automatic card blocking, initiates a
        dispute case for the cardholder, and feeds the outcome back to the ML model for improved detection. A replacement
        card is offered to the cardholder. Use this only after thorough investigation confirms fraud.
      tags:
      - Fraud Alerts
      parameters:
      - name: alert_id
        in: path
        required: true
        description: Unique alert id
        schema:
          type: string
      requestBody:
        required: true
        description: Confirm fraudulent activity request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                block_card:
                  type: boolean
                  description: Whether to immediately block the card
                  example: true
                  default: true
                initiate_dispute:
                  type: boolean
                  description: Whether to auto-file a dispute for the flagged transaction
                  example: true
                analyst_notes:
                  type: string
                  description: Fraud confirmation notes
                  example: Cardholder confirmed they did not make this purchase. Card was skimmed at ATM.
      responses:
        '201':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  alert_id:
                    type: string
                    description: Unique fraud alert identifier
                    example: frd-9c2f4a81
                  status:
                    type: string
                    example: CONFIRMED_FRAUD
                  card_blocked:
                    type: boolean
                    description: Whether the card was blocked
                    example: true
                  dispute_id:
                    type: string
                    description: Created dispute case identifier, if applicable
                    example: dsp-7a2f9c01
                required:
                - alert_id
                - status
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
  /alerts/{alert_id}/dismiss:
    post:
      operationId: dismissAlert
      summary: Dismiss alert as false positive
      description: Marks a fraud alert as a false positive after investigation. The dismissal reason and analyst notes are
        recorded. The outcome is fed back to the ML model to reduce future false positives. The card remains in its current
        status and no dispute is initiated.
      tags:
      - Fraud Alerts
      parameters:
      - name: alert_id
        in: path
        required: true
        description: Unique alert id
        schema:
          type: string
      requestBody:
        required: true
        description: Dismiss alert as false positive request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for dismissing the alert
                  example: Verified legitimate purchase with cardholder
                analyst_notes:
                  type: string
                  description: Additional investigation notes
              required:
              - reason
      responses:
        '201':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  alert_id:
                    type: string
                    description: Unique fraud alert identifier
                    example: frd-9c2f4a81
                  status:
                    type: string
                    example: FALSE_POSITIVE
                required:
                - alert_id
                - status
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
  /rules:
    get:
      operationId: listFraudRules
      summary: List fraud detection rules
      description: Returns all configured fraud detection rules with their conditions, severity levels, and current enabled/disabled
        status. Rules are evaluated in priority order during transaction processing. Use this to review and audit the current
        fraud detection configuration.
      tags:
      - Detection Rules
      parameters:
      - name: page
        in: query
        required: false
        description: Page number for pagination
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: per_page
        in: query
        required: false
        description: Number of results per page (max 100)
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: sort_by
        in: query
        required: false
        description: Field to sort results by
        schema:
          type: string
      - name: sort_order
        in: query
        required: false
        description: Sort direction
        schema:
          type: string
          enum:
          - asc
          - desc
          default: desc
      - name: category
        in: query
        required: false
        description: Filter by rule category
        schema:
          type: string
          enum:
          - VELOCITY
          - GEOLOCATION
          - AMOUNT
          - PATTERN
          - DEVICE
          - BEHAVIORAL
      - name: enabled
        in: query
        required: false
        description: Filter by enabled status
        schema:
          type: boolean
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        rule_id:
                          type: string
                          description: Unique fraud detection rule identifier
                          example: rule-high-value-foreign
                        name:
                          type: string
                          description: Rule display name
                          example: High-Value Foreign Transaction
                        description:
                          type: string
                          description: Detailed rule description and trigger conditions
                          example: Flags transactions over $500 in a country different from the cardholder's home country
                        category:
                          type: string
                          description: Rule category
                          example: GEOLOCATION
                          enum:
                          - VELOCITY
                          - GEOLOCATION
                          - AMOUNT
                          - PATTERN
                          - DEVICE
                          - BEHAVIORAL
                        severity:
                          type: string
                          description: Alert severity when rule triggers
                          example: HIGH
                          enum:
                          - LOW
                          - MEDIUM
                          - HIGH
                          - CRITICAL
                        enabled:
                          type: boolean
                          description: Whether the rule is currently active
                          example: true
                        conditions:
                          type: object
                          description: Rule trigger conditions as a JSON expression
                          properties:
                            field:
                              type: string
                              description: Data field to evaluate
                            operator:
                              type: string
                              description: Comparison operator
                            value:
                              type: string
                              description: Threshold value
                        action:
                          type: string
                          description: Action to take when rule triggers
                          example: ALERT_ONLY
                          enum:
                          - ALERT_ONLY
                          - BLOCK_AND_ALERT
                          - DECLINE_TRANSACTION
                          - STEP_UP_AUTH
                        updated_at:
                          type: string
                          description: ISO 8601 timestamp
                          format: date-time
                          example: '2025-06-15T14:30:00Z'
                      required:
                      - rule_id
                      - name
                      - enabled
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
                required:
                - data
                - pagination
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
    post:
      operationId: createFraudRule
      summary: Create a fraud detection rule
      description: Creates a new fraud detection rule with specified trigger conditions and response action. Rules are evaluated
        in real-time during transaction authorization. New rules are created in disabled state by default and must be explicitly
        enabled after testing. Use the risk scoring endpoint to validate rule effectiveness before enabling.
      tags:
      - Detection Rules
      requestBody:
        required: true
        description: Create a fraud detection rule request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Rule display name
                  example: High-Value Foreign Transaction
                description:
                  type: string
                  description: Detailed rule description and trigger conditions
                  example: Flags transactions over $500 in a country different from the cardholder's home country
                category:
                  type: string
                  description: Rule category
                  example: GEOLOCATION
                  enum:
                  - VELOCITY
                  - GEOLOCATION
                  - AMOUNT
                  - PATTERN
                  - DEVICE
                  - BEHAVIORAL
                severity:
                  type: string
                  description: Alert severity when rule triggers
                  example: HIGH
                  enum:
                  - LOW
                  - MEDIUM
                  - HIGH
                  - CRITICAL
                conditions:
                  type: object
                  description: Rule trigger conditions as a JSON expression
                  properties:
                    field:
                      type: string
                      description: Data field to evaluate
                    operator:
                      type: string
                      description: Comparison operator
                    value:
                      type: string
                      description: Threshold value
                action:
                  type: string
                  description: Action to take when rule triggers
                  example: ALERT_ONLY
                  enum:
                  - ALERT_ONLY
                  - BLOCK_AND_ALERT
                  - DECLINE_TRANSACTION
                  - STEP_UP_AUTH
              required:
              - name
              - category
              - conditions
              - action
      responses:
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  rule_id:
                    type: string
                    description: Unique fraud detection rule identifier
                    example: rule-high-value-foreign
                  name:
                    type: string
                    description: Rule display name
                    example: High-Value Foreign Transaction
                  description:
                    type: string
                    description: Detailed rule description and trigger conditions
                    example: Flags transactions over $500 in a country different from the cardholder's home country
                  category:
                    type: string
                    description: Rule category
                    example: GEOLOCATION
                    enum:
                    - VELOCITY
                    - GEOLOCATION
                    - AMOUNT
                    - PATTERN
                    - DEVICE
                    - BEHAVIORAL
                  severity:
                    type: string
                    description: Alert severity when rule triggers
                    example: HIGH
                    enum:
                    - LOW
                    - MEDIUM
                    - HIGH
                    - CRITICAL
                  enabled:
                    type: boolean
                    description: Whether the rule is currently active
                    example: true
                  conditions:
                    type: object
                    description: Rule trigger conditions as a JSON expression
                    properties:
                      field:
                        type: string
                        description: Data field to evaluate
                      operator:
                        type: string
                        description: Comparison operator
                      value:
                        type: string
                        description: Threshold value
                  action:
                    type: string
                    description: Action to take when rule triggers
                    example: ALERT_ONLY
                    enum:
                    - ALERT_ONLY
                    - BLOCK_AND_ALERT
                    - DECLINE_TRANSACTION
                    - STEP_UP_AUTH
                  updated_at:
                    type: string
                    description: ISO 8601 timestamp
                    format: date-time
                    example: '2025-06-15T14:30:00Z'
                required:
                - rule_id
                - name
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
  /rules/{rule_id}:
    get:
      operationId: getFraudRule
      summary: Get fraud rule details
      description: Retrieves the full definition of a fraud detection rule including its trigger conditions as a JSON expression
        tree, severity level, response action, and performance metrics (hit rate, false positive rate). Use this for detailed
        rule review and optimization.
      tags:
      - Detection Rules
      parameters:
      - name: rule_id
        in: path
        required: true
        description: Unique rule id
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  rule_id:
                    type: string
                    description: Unique fraud detection rule identifier
                    example: rule-high-value-foreign
                  name:
                    type: string
                    description: Rule display name
                    example: High-Value Foreign Transaction
                  description:
                    type: string
                    description: Detailed rule description and trigger conditions
                    example: Flags transactions over $500 in a country different from the cardholder's home country
                  category:
                    type: string
                    description: Rule category
                    example: GEOLOCATION
                    enum:
                    - VELOCITY
                    - GEOLOCATION
                    - AMOUNT
                    - PATTERN
                    - DEVICE
                    - BEHAVIORAL
                  severity:
                    type: string
                    description: Alert severity when rule triggers
                    example: HIGH
                    enum:
                    - LOW
                    - MEDIUM
                    - HIGH
                    - CRITICAL
                  enabled:
                    type: boolean
                    description: Whether the rule is currently active
                    example: true
                  conditions:
                    type: object
                    description: Rule trigger conditions as a JSON expression
                    properties:
                      field:
                        type: string
                        description: Data field to evaluate
                      operator:
                        type: string
                        description: Comparison operator
                      value:
                        type: string
                        description: Threshold value
                  action:
                    type: string
                    description: Action to take when rule triggers
                    example: ALERT_ONLY
                    enum:
                    - ALERT_ONLY
                    - BLOCK_AND_ALERT
                    - DECLINE_TRANSACTION
                    - STEP_UP_AUTH
                  updated_at:
                    type: string
                    description: ISO 8601 timestamp
                    format: date-time
                    example: '2025-06-15T14:30:00Z'
                required:
                - rule_id
                - name
        '401':
