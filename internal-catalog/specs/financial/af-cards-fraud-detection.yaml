        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
    delete:
      operationId: deleteFraudRule
      summary: Delete a fraud detection rule
      description: Permanently deletes a fraud detection rule. Active rules must be disabled before deletion. Historical alerts
        generated by this rule are not affected. This action cannot be undone; consider disabling instead.
      tags:
      - Detection Rules
      parameters:
      - name: rule_id
        in: path
        required: true
        description: Unique rule id
        schema:
          type: string
      responses:
        '204':
          description: Resource deleted successfully
        '401':
          $ref: '#/components/responses/401'
        '404':
