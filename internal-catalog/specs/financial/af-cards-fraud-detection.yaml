    patch:
      operationId: updateFraudRule
      summary: Update a fraud detection rule
      description: Updates the configuration of an existing fraud detection rule. Changes to conditions or action take effect
        immediately for enabled rules. Severity and conditions can be adjusted based on performance metrics. Version history
        is maintained for audit purposes.
      tags:
      - Detection Rules
      parameters:
      - name: rule_id
        in: path
        required: true
        description: Unique rule id
        schema:
          type: string
      requestBody:
        required: true
        description: Update a fraud detection rule request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Rule display name
                  example: High-Value Foreign Transaction
                description:
                  type: string
                  description: Detailed rule description and trigger conditions
                  example: Flags transactions over $500 in a country different from the cardholder's home country
                severity:
                  type: string
                  description: Alert severity when rule triggers
                  example: HIGH
                  enum:
                  - LOW
                  - MEDIUM
                  - HIGH
                  - CRITICAL
                conditions:
                  type: object
                  description: Rule trigger conditions as a JSON expression
                  properties:
                    field:
                      type: string
                      description: Data field to evaluate
                    operator:
                      type: string
                      description: Comparison operator
                    value:
                      type: string
                      description: Threshold value
                action:
                  type: string
                  description: Action to take when rule triggers
                  example: ALERT_ONLY
                  enum:
                  - ALERT_ONLY
                  - BLOCK_AND_ALERT
                  - DECLINE_TRANSACTION
                  - STEP_UP_AUTH
                enabled:
                  type: boolean
                  description: Whether the rule is currently active
                  example: true
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  rule_id:
                    type: string
                    description: Unique fraud detection rule identifier
                    example: rule-high-value-foreign
                  name:
                    type: string
                    description: Rule display name
                    example: High-Value Foreign Transaction
                  description:
                    type: string
                    description: Detailed rule description and trigger conditions
                    example: Flags transactions over $500 in a country different from the cardholder's home country
                  category:
                    type: string
                    description: Rule category
                    example: GEOLOCATION
                    enum:
                    - VELOCITY
                    - GEOLOCATION
                    - AMOUNT
                    - PATTERN
                    - DEVICE
                    - BEHAVIORAL
                  severity:
                    type: string
                    description: Alert severity when rule triggers
                    example: HIGH
                    enum:
                    - LOW
                    - MEDIUM
                    - HIGH
                    - CRITICAL
                  enabled:
                    type: boolean
                    description: Whether the rule is currently active
                    example: true
                  conditions:
                    type: object
                    description: Rule trigger conditions as a JSON expression
                    properties:
                      field:
                        type: string
                        description: Data field to evaluate
                      operator:
                        type: string
                        description: Comparison operator
                      value:
                        type: string
                        description: Threshold value
                  action:
                    type: string
                    description: Action to take when rule triggers
                    example: ALERT_ONLY
                    enum:
                    - ALERT_ONLY
                    - BLOCK_AND_ALERT
                    - DECLINE_TRANSACTION
                    - STEP_UP_AUTH
                  updated_at:
                    type: string
                    description: ISO 8601 timestamp
                    format: date-time
                    example: '2025-06-15T14:30:00Z'
        '400':
