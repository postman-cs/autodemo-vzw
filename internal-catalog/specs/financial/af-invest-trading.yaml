openapi: 3.0.3
info:
  title: Acme Finance Trading API
  description: Advanced trading services for equities and options. Provides extended-hours trading (pre-market and after-
    hours), margin account management with Reg-T and portfolio margin support, short selling with borrow locate management,
    options chain data with Greeks (delta, gamma, theta, vega), algorithmic order strategies (TWAP, VWAP, POV, implementation
    shortfall), and real-time trading halt monitoring.
  version: 5.2.0
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-invest-trading
  x-acme-domain: invest
servers:
- url: https://af-invest-trading.api.acmefin.com/v1
  description: Production
- url: https://af-invest-trading.staging.acmefin.com/v1
  description: Staging
security:
- BearerAuth: []
tags:
- name: Trading Sessions
  description: Exchange session status and extended-hours trading windows
- name: Extended Hours
  description: Pre-market and after-hours limit order submission
- name: Margin
  description: Margin account balances, buying power, and maintenance requirements
- name: Short Selling
  description: Short position management and stock borrow locate services
- name: Options
  description: Options chain data, Greeks, and implied volatility analytics
- name: Algorithmic Trading
  description: Algorithmic order strategies including TWAP, VWAP, and POV
- name: Trading Halts
  description: Real-time trading halt and resumption monitoring
paths:
  /trading/sessions:
    get:
      operationId: listTradingSessions
      summary: List trading sessions
      description: Retrieve current and upcoming trading sessions across exchanges with pre-market, regular, and after- hours
        windows. Includes session status, start/end times, and halt information.
      tags:
      - Trading Sessions
      parameters:
      - name: page
        in: query
        required: false
        description: Page number for pagination
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: per_page
        in: query
        required: false
        description: Number of results per page (max 100)
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: sort_by
        in: query
        required: false
        description: Field to sort results by
        schema:
          type: string
      - name: sort_order
        in: query
        required: false
        description: Sort direction
        schema:
          type: string
          enum:
          - asc
          - desc
          default: desc
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        session_id:
                          type: string
                          description: Trading session identifier
                          format: uuid
                          example: sess-a1b2c3d4
                        exchange:
                          type: string
                          description: Exchange
                          example: NYSE
                        session_type:
                          type: string
                          description: Session type
                          enum:
                          - pre_market
                          - regular
                          - after_hours
                        status:
                          type: string
                          description: Session status
                          enum:
                          - open
                          - closed
                          - halted
                        start_time:
                          type: string
                          description: Session start time
                          format: date-time
                          example: '2025-06-15T14:30:00Z'
                        end_time:
                          type: string
                          description: Session end time
                          format: date-time
                          example: '2025-06-15T14:30:00Z'
                      required:
                      - session_id
                      - exchange
                      - status
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
                required:
                - data
                - pagination
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
  /trading/sessions/{session_id}:
    get:
      operationId: getTradingSession
      summary: Get session details
      description: Retrieve detailed information for a specific trading session including status, timing, and any active halts
        or circuit breakers.
      tags:
      - Trading Sessions
      parameters:
      - name: session_id
        in: path
        required: true
        description: Unique session id
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_id:
                    type: string
                    description: Trading session identifier
                    format: uuid
                    example: sess-a1b2c3d4
                  exchange:
                    type: string
                    description: Exchange
                    example: NYSE
                  session_type:
                    type: string
                    description: Session type
                    enum:
                    - pre_market
                    - regular
                    - after_hours
                  status:
                    type: string
                    description: Session status
                    enum:
                    - open
                    - closed
                    - halted
                  start_time:
                    type: string
                    description: Session start time
                    format: date-time
                    example: '2025-06-15T14:30:00Z'
                  end_time:
                    type: string
                    description: Session end time
                    format: date-time
                    example: '2025-06-15T14:30:00Z'
                required:
                - session_id
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
  /trading/extended-hours/orders:
    get:
      operationId: listExtendedHoursOrders
      summary: List extended hours orders
      description: Retrieve orders placed during pre-market or after-hours trading sessions. Extended hours orders must be
        limit orders and are subject to different liquidity and volatility conditions.
      tags:
      - Extended Hours
      parameters:
      - name: page
        in: query
        required: false
        description: Page number for pagination
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: per_page
        in: query
        required: false
        description: Number of results per page (max 100)
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: sort_by
        in: query
        required: false
        description: Field to sort results by
        schema:
          type: string
      - name: sort_order
        in: query
        required: false
        description: Sort direction
        schema:
          type: string
          enum:
          - asc
          - desc
          default: desc
      - name: session
        in: query
        required: false
        description: Filter by session type
        schema:
          type: string
          enum:
          - pre_market
          - after_hours
      - name: status
        in: query
        required: false
        description: Filter by order status
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        order_id:
                          type: string
                          description: Extended hours order identifier
                          format: uuid
                          example: ord-a1b2c3d4
                        ticker:
                          type: string
                          description: Ticker symbol
                          example: AAPL
                        side:
                          type: string
                          description: Order side
                          enum:
                          - buy
                          - sell
                        quantity:
                          type: number
                          description: Order quantity
                          format: double
                          example: 100
                        limit_price:
                          type: number
                          description: Limit price (required for extended hours)
                          format: double
                          example: 178.0
                        session:
                          type: string
                          description: Trading session
                          enum:
                          - pre_market
                          - after_hours
                        status:
                          type: string
                          description: Order status
                          enum:
                          - new
                          - filled
                          - canceled
                          - rejected
                        submitted_at:
                          type: string
                          description: Submission timestamp
                          format: date-time
                          example: '2025-06-15T14:30:00Z'
                      required:
                      - order_id
                      - ticker
                      - status
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
                required:
                - data
                - pagination
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
    post:
      operationId: placeExtendedHoursOrder
      summary: Place extended hours order
      description: Submit a limit order for execution during pre-market (4:00-9:30 AM ET) or after-hours (4:00-8:00 PM ET)
        trading sessions. Only limit orders are accepted during extended hours.
      tags:
      - Extended Hours
      requestBody:
        required: true
        description: Place extended hours order request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                account_id:
                  type: string
                  description: Brokerage account identifier
                  format: uuid
                  example: acct-a1b2c3d4
                ticker:
                  type: string
                  description: Ticker symbol
                  example: AAPL
                side:
                  type: string
                  description: Order side
                  enum:
                  - buy
                  - sell
                quantity:
                  type: number
                  description: Shares
                  format: double
                  example: 100
                limit_price:
                  type: number
                  description: Limit price
                  format: double
                  example: 178.0
                session:
                  type: string
                  description: Target session
                  enum:
                  - pre_market
                  - after_hours
              required:
              - account_id
              - ticker
              - side
              - quantity
              - limit_price
              - session
      responses:
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  order_id:
                    type: string
                    description: Extended hours order identifier
                    format: uuid
                    example: ord-a1b2c3d4
                  ticker:
                    type: string
                    description: Ticker symbol
                    example: AAPL
                  side:
                    type: string
                    description: Order side
                    enum:
                    - buy
                    - sell
                  quantity:
                    type: number
                    description: Order quantity
                    format: double
                    example: 100
                  limit_price:
                    type: number
                    description: Limit price (required for extended hours)
                    format: double
                    example: 178.0
                  session:
                    type: string
                    description: Trading session
                    enum:
                    - pre_market
                    - after_hours
                  status:
                    type: string
                    description: Order status
                    enum:
                    - new
                    - filled
                    - canceled
                    - rejected
                  submitted_at:
                    type: string
                    description: Submission timestamp
                    format: date-time
                    example: '2025-06-15T14:30:00Z'
                required:
                - order_id
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
  /trading/margin/{account_id}:
    get:
      operationId: getMarginStatus
      summary: Get margin account status
      description: Retrieve real-time margin account details including equity, margin balance, buying power, maintenance requirement,
        SMA balance, day trade buying power (for PDT accounts), and any outstanding margin calls.
      tags:
      - Margin
      parameters:
      - name: account_id
        in: path
        required: true
        description: Margin account identifier
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  account_id:
                    type: string
                    description: Brokerage account identifier
                    format: uuid
                    example: acct-a1b2c3d4
                  margin_type:
                    type: string
                    description: Margin account type
                    enum:
                    - reg_t
                    - portfolio_margin
                  equity:
                    type: object
                    description: Account equity
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: 250000.0
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                  margin_balance:
                    type: object
                    description: Margin debit balance (borrowed funds)
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: 75000.0
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                  buying_power:
                    type: object
                    description: Available buying power
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: 350000.0
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                  maintenance_requirement:
                    type: object
                    description: Maintenance margin requirement
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: 112500.0
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                  maintenance_excess:
                    type: object
                    description: Excess above maintenance (margin cushion)
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: 62500.0
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                  sma:
                    type: object
                    description: Special Memorandum Account balance
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: 45000.0
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                  margin_call_amount:
                    type: object
                    description: Outstanding margin call amount (0 if no call)
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: 0
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                  day_trade_buying_power:
                    type: object
                    description: Day trade buying power (4x equity for PDT accounts)
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: 1000000.0
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                required:
                - account_id
                - equity
                - buying_power
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
  /trading/margin/{account_id}/requirement:
    post:
      operationId: calculateMarginRequirement
      summary: Calculate margin requirement
      description: Calculate the initial and maintenance margin requirement for a proposed trade. Returns the margin impact,
        buying power effect, and whether the trade would trigger a margin call.
      tags:
      - Margin
      requestBody:
        required: true
        description: Calculate margin requirement request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                ticker:
                  type: string
                  description: Ticker symbol
                  example: AAPL
                side:
                  type: string
                  description: Order side
                  enum:
                  - buy
                  - sell_short
                quantity:
                  type: number
                  description: Shares
                  format: double
                  example: 100
                limit_price:
                  type: number
                  description: Estimated price
                  format: double
                  example: 178.0
              required:
              - ticker
              - side
              - quantity
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  initial_requirement:
                    type: object
                    description: Initial margin requirement
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: 8900.0
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                  maintenance_requirement:
                    type: object
                    description: Maintenance margin requirement
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: 6675.0
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                  buying_power_impact:
                    type: object
                    description: Impact on buying power
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: -8900.0
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                  would_trigger_margin_call:
                    type: boolean
                    description: Whether trade would cause margin call
                    example: false
                  post_trade_maintenance_excess:
                    type: object
                    description: Maintenance excess after trade
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: 53600.0
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                required:
                - initial_requirement
                - would_trigger_margin_call
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
  /trading/short-positions:
    get:
      operationId: listShortPositions
      summary: List short positions
      description: Retrieve all open short positions with entry price, current P&L, borrow rate, and accrued borrow cost.
        Short sellers are responsible for dividend payments and must maintain adequate margin.
      tags:
      - Short Selling
      parameters:
      - name: page
        in: query
        required: false
        description: Page number for pagination
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: per_page
        in: query
        required: false
        description: Number of results per page (max 100)
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: sort_by
        in: query
        required: false
        description: Field to sort results by
        schema:
          type: string
      - name: sort_order
        in: query
        required: false
        description: Sort direction
        schema:
          type: string
          enum:
          - asc
          - desc
          default: desc
      - name: account_id
        in: query
        required: false
        description: Filter by account
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        short_position_id:
                          type: string
                          description: Short position identifier
                          format: uuid
                          example: shrt-a1b2c3d4
                        account_id:
                          type: string
                          description: Brokerage account identifier
                          format: uuid
                          example: acct-a1b2c3d4
                        ticker:
                          type: string
                          description: Ticker symbol
                          example: AAPL
                        quantity:
                          type: number
                          description: Shares sold short (positive number)
                          format: double
                          example: 200
                        entry_price:
                          type: number
                          description: Average short sale price
                          format: double
                          example: 185.0
                        current_price:
                          type: number
                          description: Current market price
                          format: double
                          example: 178.5
                        unrealized_pnl:
                          type: object
                          description: Unrealized P&L on short position
                          properties:
                            amount:
                              type: number
                              description: Monetary amount
                              format: double
                              example: 1300.0
                            currency:
                              type: string
                              description: ISO 4217 currency code
                              example: USD
                        borrow_rate:
                          type: number
                          description: Current stock borrow rate (annualized %)
                          format: double
                          example: 0.5
                        borrow_cost_accrued:
                          type: object
                          description: Accumulated borrow cost
                          properties:
                            amount:
                              type: number
                              description: Monetary amount
                              format: double
                              example: 12.5
                            currency:
                              type: string
                              description: ISO 4217 currency code
                              example: USD
                        short_available:
                          type: boolean
                          description: Whether shares are currently available to borrow
                          example: true
                      required:
                      - short_position_id
                      - ticker
                      - quantity
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
                required:
                - data
                - pagination
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
  /trading/short-positions/{short_position_id}:
    get:
      operationId: getShortPosition
      summary: Get short position details
      description: Retrieve detailed short position information including unrealized P&L, current borrow rate, accumulated
        borrow costs, and short squeeze risk indicators.
      tags:
      - Short Selling
      parameters:
      - name: short_position_id
        in: path
        required: true
        description: Unique short position id
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  short_position_id:
                    type: string
                    description: Short position identifier
                    format: uuid
                    example: shrt-a1b2c3d4
                  account_id:
                    type: string
                    description: Brokerage account identifier
                    format: uuid
                    example: acct-a1b2c3d4
                  ticker:
                    type: string
                    description: Ticker symbol
                    example: AAPL
                  quantity:
                    type: number
                    description: Shares sold short (positive number)
                    format: double
                    example: 200
                  entry_price:
                    type: number
                    description: Average short sale price
                    format: double
                    example: 185.0
                  current_price:
                    type: number
                    description: Current market price
                    format: double
                    example: 178.5
                  unrealized_pnl:
                    type: object
                    description: Unrealized P&L on short position
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: 1300.0
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                  borrow_rate:
                    type: number
                    description: Current stock borrow rate (annualized %)
                    format: double
                    example: 0.5
                  borrow_cost_accrued:
                    type: object
                    description: Accumulated borrow cost
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: 12.5
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                  short_available:
                    type: boolean
                    description: Whether shares are currently available to borrow
                    example: true
                required:
                - short_position_id
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
  /trading/locates:
    post:
      operationId: requestBorrowLocate
      summary: Request borrow locate
      description: Request a stock borrow locate to sell short. The locate confirms share availability and provides an indicative
        borrow rate. Locates are valid for the current trading session only.
      tags:
      - Short Selling
      requestBody:
        required: true
        description: Request borrow locate request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                account_id:
                  type: string
                  description: Brokerage account identifier
                  format: uuid
                  example: acct-a1b2c3d4
                ticker:
                  type: string
                  description: Ticker symbol
                  example: AAPL
                quantity:
                  type: integer
                  description: Shares to borrow
                  example: 500
              required:
              - account_id
              - ticker
              - quantity
      responses:
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  locate_id:
                    type: string
                    description: Borrow locate identifier
                    format: uuid
                    example: loc-a1b2c3d4
                  ticker:
                    type: string
                    description: Ticker symbol
                    example: AAPL
                  quantity_requested:
                    type: integer
                    description: Shares requested to borrow
                    example: 500
                  quantity_located:
                    type: integer
                    description: Shares located/available
                    example: 500
                  borrow_rate:
                    type: number
                    description: Indicative borrow rate (annualized %)
                    format: double
                    example: 0.5
                  locate_status:
                    type: string
                    description: Locate status
                    enum:
                    - available
                    - partial
                    - unavailable
                    - expired
                  valid_until:
                    type: string
                    description: Locate validity expiration
                    format: date-time
