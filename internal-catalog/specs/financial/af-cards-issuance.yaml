openapi: 3.0.3
info:
  title: Acme Finance Card Issuance API
  description: End-to-end card issuance pipeline from application submission through production, embossing, and physical fulfillment.
    Manages card applications with credit decisioning, multi-product card programs (credit, debit, prepaid, charge), BIN assignment,
    and network provisioning. Supports batch embossing with quality control workflows, carrier integration for fulfillment
    tracking, and card credential retrieval for instant digital issuance. Handles card reissuance for expired, damaged, or
    compromised cards with configurable PAN retention policies.
  version: 3.2.0
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-cards-issuance
  x-acme-domain: cards
servers:
- url: https://af-cards-issuance.api.acmefin.com/v1
  description: Production
- url: https://af-cards-issuance.staging.acmefin.com/v1
  description: Staging
security:
- BearerAuth: []
tags:
- name: Applications
  description: Card application submission, review, and decisioning
- name: Card Issuance
  description: Card creation, credential management, and reissuance
- name: Embossing
  description: Physical card embossing and production batch management
- name: Fulfillment
  description: Card shipping, tracking, and delivery confirmation
paths:
  /applications:
    post:
      operationId: submitApplication
      summary: Submit a card application
      description: Submits a new card application for processing. The application enters the review queue for identity verification
        and credit assessment (for credit products). Applications are typically decisioned within 60 seconds for pre-qualified
        applicants. The response includes the application ID for status polling.
      tags:
      - Applications
      requestBody:
        required: true
        description: Submit a card application request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                applicant_name:
                  type: string
                  description: Full name of the cardholder as embossed on the card
                  example: Jane A. Doe
                applicant_email:
                  type: string
                  description: Applicant email address
                  format: email
                  example: jane.doe@email.com
                card_type:
                  type: string
                  description: Card product type
                  example: CREDIT
                  enum:
                  - DEBIT
                  - CREDIT
                  - PREPAID
                  - CHARGE
                card_program:
                  type: string
                  description: Card program or product identifier
                  example: platinum-rewards
                ssn_last_four:
                  type: string
                  description: Last four digits of SSN for identity verification
                  example: '4321'
                  minLength: 4
                  maxLength: 4
                annual_income:
                  type: number
                  description: Applicant's annual gross income
                  format: double
                  example: 85000.0
                shipping_address:
                  type: object
                  description: Address for card delivery
                  properties:
                    line1:
                      type: string
                    city:
                      type: string
                    state:
                      type: string
                    postal_code:
                      type: string
                    country:
                      type: string
              required:
              - applicant_name
              - applicant_email
              - card_type
              - card_program
      responses:
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  application_id:
                    type: string
                    description: Unique card application identifier
                    example: app-3f8a21c9
                  applicant_name:
                    type: string
                    description: Full name of the cardholder as embossed on the card
                    example: Jane A. Doe
                  applicant_email:
                    type: string
                    description: Applicant email address
                    format: email
                    example: jane.doe@email.com
                  card_type:
                    type: string
                    description: Card product type
                    example: CREDIT
                    enum:
                    - DEBIT
                    - CREDIT
                    - PREPAID
                    - CHARGE
                  card_program:
                    type: string
                    description: Card program or product identifier
                    example: platinum-rewards
                  status:
                    type: string
                    description: Application processing status
                    example: SUBMITTED
                    enum:
                    - SUBMITTED
                    - UNDER_REVIEW
                    - APPROVED
                    - REJECTED
                    - CANCELLED
                    - EXPIRED
                  credit_limit:
                    type: number
                    description: Approved credit limit (credit cards only)
                    format: double
                    example: 15000.0
                    nullable: true
                  rejection_reason:
                    type: string
                    description: Reason for application rejection, if applicable
                    example: Insufficient credit history
                    nullable: true
                  submitted_at:
                    type: string
                    description: ISO 8601 timestamp
                    format: date-time
                    example: '2025-06-15T14:30:00Z'
                  decided_at:
                    type: string
                    description: Timestamp of approval or rejection decision
                    format: date-time
                    example: '2025-06-15T14:30:00Z'
                    nullable: true
                required:
                - application_id
                - status
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
    get:
      operationId: listApplications
      summary: List card applications
      description: Returns a paginated list of card applications with their processing status. Supports filtering by status,
        card type, program, and submission date. Use for application pipeline management and reporting.
      tags:
      - Applications
      parameters:
      - name: page
        in: query
        required: false
        description: Page number for pagination
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: per_page
        in: query
        required: false
        description: Number of results per page (max 100)
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: sort_by
        in: query
        required: false
        description: Field to sort results by
        schema:
          type: string
      - name: sort_order
        in: query
        required: false
        description: Sort direction
        schema:
          type: string
          enum:
          - asc
          - desc
          default: desc
      - name: status
        in: query
        required: false
        description: Filter by application status
        schema:
          type: string
          enum:
          - SUBMITTED
          - UNDER_REVIEW
          - APPROVED
          - REJECTED
      - name: card_type
        in: query
        required: false
        description: Filter by card type
        schema:
          type: string
          enum:
          - DEBIT
          - CREDIT
          - PREPAID
          - CHARGE
      - name: from_date
        in: query
        required: false
        description: Applications submitted on or after this date
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        application_id:
                          type: string
                          description: Unique card application identifier
                          example: app-3f8a21c9
                        applicant_name:
                          type: string
                          description: Full name of the cardholder as embossed on the card
                          example: Jane A. Doe
                        applicant_email:
                          type: string
                          description: Applicant email address
                          format: email
                          example: jane.doe@email.com
                        card_type:
                          type: string
                          description: Card product type
                          example: CREDIT
                          enum:
                          - DEBIT
                          - CREDIT
                          - PREPAID
                          - CHARGE
                        card_program:
                          type: string
                          description: Card program or product identifier
                          example: platinum-rewards
                        status:
                          type: string
                          description: Application processing status
                          example: SUBMITTED
                          enum:
                          - SUBMITTED
                          - UNDER_REVIEW
                          - APPROVED
                          - REJECTED
                          - CANCELLED
                          - EXPIRED
                        credit_limit:
                          type: number
                          description: Approved credit limit (credit cards only)
                          format: double
                          example: 15000.0
                          nullable: true
                        rejection_reason:
                          type: string
                          description: Reason for application rejection, if applicable
                          example: Insufficient credit history
                          nullable: true
                        submitted_at:
                          type: string
                          description: ISO 8601 timestamp
                          format: date-time
                          example: '2025-06-15T14:30:00Z'
                        decided_at:
                          type: string
                          description: Timestamp of approval or rejection decision
                          format: date-time
                          example: '2025-06-15T14:30:00Z'
                          nullable: true
                      required:
                      - application_id
                      - status
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
                required:
                - data
                - pagination
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
  /applications/{application_id}:
    get:
      operationId: getApplication
      summary: Get application details
      description: Retrieves the full details of a card application including applicant information, requested product, processing
        status, and decision details. For approved applications, includes the assigned credit limit. For rejected applications,
        includes the rejection reason.
      tags:
      - Applications
      parameters:
      - name: application_id
        in: path
        required: true
        description: Unique application id
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  application_id:
                    type: string
                    description: Unique card application identifier
                    example: app-3f8a21c9
                  applicant_name:
                    type: string
                    description: Full name of the cardholder as embossed on the card
                    example: Jane A. Doe
                  applicant_email:
                    type: string
                    description: Applicant email address
                    format: email
                    example: jane.doe@email.com
                  card_type:
                    type: string
                    description: Card product type
                    example: CREDIT
                    enum:
                    - DEBIT
                    - CREDIT
                    - PREPAID
                    - CHARGE
                  card_program:
                    type: string
                    description: Card program or product identifier
                    example: platinum-rewards
                  status:
                    type: string
                    description: Application processing status
                    example: SUBMITTED
                    enum:
                    - SUBMITTED
                    - UNDER_REVIEW
                    - APPROVED
                    - REJECTED
                    - CANCELLED
                    - EXPIRED
                  credit_limit:
                    type: number
                    description: Approved credit limit (credit cards only)
                    format: double
                    example: 15000.0
                    nullable: true
                  rejection_reason:
                    type: string
                    description: Reason for application rejection, if applicable
                    example: Insufficient credit history
                    nullable: true
                  submitted_at:
                    type: string
                    description: ISO 8601 timestamp
                    format: date-time
                    example: '2025-06-15T14:30:00Z'
                  decided_at:
                    type: string
                    description: Timestamp of approval or rejection decision
                    format: date-time
                    example: '2025-06-15T14:30:00Z'
                    nullable: true
                required:
                - application_id
                - status
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
  /applications/{application_id}/approve:
    post:
      operationId: approveApplication
      summary: Approve a card application
      description: Approves a card application and initiates card issuance. The credit limit must be specified for credit
        products. Upon approval, a card record is created and queued for embossing. The applicant is notified via email. Only
        applications in SUBMITTED or UNDER_REVIEW status can be approved.
      tags:
      - Applications
      parameters:
      - name: application_id
        in: path
        required: true
        description: Unique application id
        schema:
          type: string
      requestBody:
        required: true
        description: Approve a card application request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                credit_limit:
                  type: number
                  description: Approved credit limit for credit cards
                  format: double
                  example: 250.0
                card_program:
                  type: string
                  description: Card program or product identifier
                  example: platinum-rewards
                notes:
                  type: string
                  description: Internal approval notes
                  example: Strong credit profile, pre-qualified
      responses:
        '201':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  application_id:
                    type: string
                    description: Unique card application identifier
                    example: app-3f8a21c9
                  applicant_name:
                    type: string
                    description: Full name of the cardholder as embossed on the card
                    example: Jane A. Doe
                  applicant_email:
                    type: string
                    description: Applicant email address
                    format: email
                    example: jane.doe@email.com
                  card_type:
                    type: string
                    description: Card product type
                    example: CREDIT
                    enum:
                    - DEBIT
                    - CREDIT
                    - PREPAID
                    - CHARGE
                  card_program:
                    type: string
                    description: Card program or product identifier
                    example: platinum-rewards
                  status:
                    type: string
                    description: Application processing status
                    example: SUBMITTED
                    enum:
                    - SUBMITTED
                    - UNDER_REVIEW
                    - APPROVED
                    - REJECTED
                    - CANCELLED
                    - EXPIRED
                  credit_limit:
                    type: number
                    description: Approved credit limit (credit cards only)
                    format: double
                    example: 15000.0
                    nullable: true
                  rejection_reason:
                    type: string
                    description: Reason for application rejection, if applicable
                    example: Insufficient credit history
                    nullable: true
                  submitted_at:
                    type: string
                    description: ISO 8601 timestamp
                    format: date-time
                    example: '2025-06-15T14:30:00Z'
                  decided_at:
                    type: string
                    description: Timestamp of approval or rejection decision
                    format: date-time
                    example: '2025-06-15T14:30:00Z'
                    nullable: true
                  card_id:
                    type: string
                    description: Unique card identifier
                    example: card-8a2f4b91
                required:
                - application_id
                - status
                - card_id
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
  /applications/{application_id}/reject:
    post:
      operationId: rejectApplication
      summary: Reject a card application
      description: Rejects a card application with a reason code. The applicant is notified via email with an adverse action
        notice per ECOA requirements. Rejection reasons are recorded for regulatory reporting. Only applications in SUBMITTED
        or UNDER_REVIEW status can be rejected.
      tags:
      - Applications
      parameters:
      - name: application_id
        in: path
        required: true
        description: Unique application id
        schema:
          type: string
      requestBody:
        required: true
        description: Reject a card application request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                rejection_reason:
                  type: string
                  description: Reason for rejection
                  example: Insufficient credit history
                reason_code:
                  type: string
                  description: Standardized rejection reason code
                  example: CREDIT_SCORE
                  enum:
                  - CREDIT_SCORE
                  - INCOME
                  - IDENTITY
                  - FRAUD_RISK
                  - EXISTING_RELATIONSHIP
                  - OTHER
              required:
              - rejection_reason
              - reason_code
      responses:
        '201':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  application_id:
                    type: string
                    description: Unique card application identifier
                    example: app-3f8a21c9
                  applicant_name:
                    type: string
                    description: Full name of the cardholder as embossed on the card
                    example: Jane A. Doe
                  applicant_email:
                    type: string
                    description: Applicant email address
                    format: email
                    example: jane.doe@email.com
                  card_type:
                    type: string
                    description: Card product type
                    example: CREDIT
                    enum:
                    - DEBIT
                    - CREDIT
                    - PREPAID
                    - CHARGE
                  card_program:
                    type: string
                    description: Card program or product identifier
                    example: platinum-rewards
                  status:
                    type: string
                    description: Application processing status
                    example: SUBMITTED
                    enum:
                    - SUBMITTED
                    - UNDER_REVIEW
                    - APPROVED
                    - REJECTED
                    - CANCELLED
                    - EXPIRED
                  credit_limit:
                    type: number
                    description: Approved credit limit (credit cards only)
                    format: double
                    example: 15000.0
                    nullable: true
                  rejection_reason:
                    type: string
                    description: Reason for application rejection, if applicable
                    example: Insufficient credit history
                    nullable: true
                  submitted_at:
                    type: string
                    description: ISO 8601 timestamp
                    format: date-time
                    example: '2025-06-15T14:30:00Z'
                  decided_at:
                    type: string
                    description: Timestamp of approval or rejection decision
                    format: date-time
                    example: '2025-06-15T14:30:00Z'
                    nullable: true
                required:
                - application_id
                - status
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
  /cards:
    post:
      operationId: issueCard
      summary: Issue a new card
      description: Directly issues a new card without requiring a separate application (for pre-approved or internal issuance).
        Assigns a PAN from the configured BIN range, generates expiry date and CVV, and queues the card for embossing. The
        card is created in INACTIVE status and must be activated by the cardholder.
      tags:
      - Card Issuance
      requestBody:
        required: true
        description: Issue a new card request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                cardholder_name:
                  type: string
                  description: Full name of the cardholder as embossed on the card
                  example: Jane A. Doe
                card_type:
                  type: string
                  description: Card product type
                  example: CREDIT
                  enum:
                  - DEBIT
                  - CREDIT
                  - PREPAID
                  - CHARGE
                card_program:
                  type: string
                  description: Card program or product identifier
                  example: platinum-rewards
                network:
                  type: string
                  description: Preferred card network
                  example: VISA
                  enum:
                  - VISA
                  - MASTERCARD
                  - AMEX
                shipping_address:
                  type: object
                  description: Card delivery address
                  properties:
                    line1:
                      type: string
                    city:
                      type: string
                    state:
                      type: string
                    postal_code:
                      type: string
                    country:
                      type: string
              required:
              - cardholder_name
              - card_type
              - card_program
      responses:
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  card_id:
                    type: string
                    description: Unique card identifier
                    example: card-8a2f4b91
                  application_id:
                    type: string
                    description: Unique card application identifier
                    example: app-3f8a21c9
                  masked_pan:
                    type: string
                    description: Masked primary account number
                    example: '****-****-****-4532'
                  cardholder_name:
                    type: string
                    description: Full name of the cardholder as embossed on the card
                    example: Jane A. Doe
                  card_type:
                    type: string
                    description: Card product type
                    example: CREDIT
                    enum:
                    - DEBIT
                    - CREDIT
                    - PREPAID
                    - CHARGE
                  card_program:
                    type: string
                    description: Card program or product identifier
                    example: platinum-rewards
                  expiry_date:
                    type: string
                    description: Card expiration date in MM/YY format
                    example: 12/27
                    pattern: ^(0[1-9]|1[0-2])/[0-9]{2}$
                  status:
                    type: string
                    description: Current card status
                    example: ACTIVE
                    enum:
                    - ACTIVE
                    - INACTIVE
                    - BLOCKED
                    - CLOSED
                    - EXPIRED
                    - LOST
                    - STOLEN
                  embossing_status:
                    type: string
                    description: Physical card embossing status
                    example: COMPLETED
                    enum:
                    - PENDING
                    - IN_PRODUCTION
                    - COMPLETED
                    - SHIPPED
                  bin:
                    type: string
                    description: Bank Identification Number (first 6 digits)
                    example: '453201'
                  network:
                    type: string
                    description: Card network
                    example: VISA
                    enum:
                    - VISA
                    - MASTERCARD
                    - AMEX
                  issued_at:
                    type: string
                    description: ISO 8601 timestamp
                    format: date-time
                    example: '2025-06-15T14:30:00Z'
                required:
                - card_id
                - masked_pan
                - status
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
    get:
      operationId: listIssuedCards
      summary: List issued cards
      description: Returns a paginated list of issued cards with their status, cardholder information, and embossing status.
        Supports filtering by card type, program, network, status, and issuance date range.
      tags:
      - Card Issuance
      parameters:
      - name: page
        in: query
        required: false
        description: Page number for pagination
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: per_page
        in: query
        required: false
        description: Number of results per page (max 100)
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: sort_by
        in: query
        required: false
        description: Field to sort results by
        schema:
          type: string
      - name: sort_order
        in: query
        required: false
        description: Sort direction
        schema:
          type: string
          enum:
          - asc
          - desc
          default: desc
      - name: card_type
        in: query
        required: false
        description: Filter by card type
        schema:
          type: string
          enum:
          - DEBIT
          - CREDIT
          - PREPAID
          - CHARGE
      - name: status
        in: query
        required: false
        description: Filter by card status
        schema:
          type: string
          enum:
          - ACTIVE
          - INACTIVE
          - BLOCKED
          - CLOSED
          - EXPIRED
      - name: network
        in: query
        required: false
        description: Filter by card network
        schema:
          type: string
          enum:
          - VISA
          - MASTERCARD
          - AMEX
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        card_id:
                          type: string
                          description: Unique card identifier
                          example: card-8a2f4b91
                        application_id:
                          type: string
                          description: Unique card application identifier
                          example: app-3f8a21c9
                        masked_pan:
                          type: string
                          description: Masked primary account number
                          example: '****-****-****-4532'
                        cardholder_name:
                          type: string
                          description: Full name of the cardholder as embossed on the card
                          example: Jane A. Doe
                        card_type:
                          type: string
                          description: Card product type
                          example: CREDIT
                          enum:
                          - DEBIT
                          - CREDIT
                          - PREPAID
                          - CHARGE
                        card_program:
                          type: string
                          description: Card program or product identifier
                          example: platinum-rewards
                        expiry_date:
                          type: string
                          description: Card expiration date in MM/YY format
                          example: 12/27
                          pattern: ^(0[1-9]|1[0-2])/[0-9]{2}$
                        status:
                          type: string
                          description: Current card status
                          example: ACTIVE
                          enum:
                          - ACTIVE
                          - INACTIVE
                          - BLOCKED
                          - CLOSED
                          - EXPIRED
                          - LOST
                          - STOLEN
                        embossing_status:
                          type: string
                          description: Physical card embossing status
                          example: COMPLETED
                          enum:
                          - PENDING
                          - IN_PRODUCTION
                          - COMPLETED
                          - SHIPPED
                        bin:
                          type: string
