  /cards/{card_id}/reissue:
    post:
      operationId: reissueCard
      summary: Reissue a card
      description: Initiates reissuance of a card with a new PAN, expiry date, and CVV. The original card is deactivated.
        Common reasons include card damage, upcoming expiry, or compromise. A new embossing job is created and the reissued
        card is shipped to the cardholder's address on file. Active recurring payments are migrated via the card network's
        Account Updater service.
      tags:
      - Card Issuance
      parameters:
      - name: card_id
        in: path
        required: true
        description: Unique card id
        schema:
          type: string
      requestBody:
        required: true
        description: Reissue a card request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for reissuance
                  example: DAMAGED
                  enum:
                  - DAMAGED
                  - EXPIRING
                  - COMPROMISED
                  - NAME_CHANGE
                  - PRODUCT_UPGRADE
                retain_pan:
                  type: boolean
                  description: Whether to retain the current PAN (same number, new expiry/CVV)
                  example: false
                expedited_shipping:
                  type: boolean
                  description: Whether to use expedited shipping
                  example: false
              required:
              - reason
      responses:
        '201':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  new_card_id:
                    type: string
                    description: Identifier of the newly issued replacement card
                    example: card-9b3f5c82
                  old_card_id:
                    type: string
                    description: Unique card identifier
                    example: card-8a2f4b91
                  status:
                    type: string
                    example: INACTIVE
                  estimated_delivery:
                    type: string
                    format: date
                    example: '2025-06-22'
                required:
                - new_card_id
                - old_card_id
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
