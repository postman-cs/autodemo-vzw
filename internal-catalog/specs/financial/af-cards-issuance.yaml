    post:
      operationId: renewCard
      summary: Renew an expiring card
      description: Initiates renewal of a card that is approaching its expiry date. A new card is issued with an extended
        expiry date and a new CVV. The PAN is retained by default for continuity of recurring payments. Renewal cards are
        automatically sent 30 days before expiry, but this endpoint allows manual triggering.
      tags:
      - Card Issuance
      parameters:
      - name: card_id
        in: path
        required: true
        description: Unique card id
        schema:
          type: string
      requestBody:
        required: true
        description: Renew an expiring card request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                extend_years:
                  type: integer
                  description: Number of years to extend the expiry
                  example: 3
                  minimum: 1
                  maximum: 5
      responses:
        '201':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  new_card_id:
                    type: string
                    description: Unique card identifier
                    example: card-9b3f5c82
                  new_expiry_date:
                    type: string
                    description: Card expiration date in MM/YY format
                    example: 12/27
                    pattern: ^(0[1-9]|1[0-2])/[0-9]{2}$
                  status:
                    type: string
                    example: INACTIVE
