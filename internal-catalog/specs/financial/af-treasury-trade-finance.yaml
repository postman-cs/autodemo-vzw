openapi: 3.0.3
info:
  title: Acme Finance Trade Finance API
  description: >-
    Comprehensive trade finance platform covering letter of credit (LC) issuance and amendment, documentary
    collection processing, bank guarantee management, receivables factoring with advance funding, and supply chain
    finance programs with dynamic discounting. Supports UCP 600 compliance for documentary credits, ISP98 for
    standby LCs, and ICC Uniform Rules for demand guarantees (URDG 758).
  version: 3.5.0
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-treasury-trade-finance
  x-acme-domain: treasury
servers:
  - url: https://af-treasury-trade-finance.api.acmefin.com/v1
    description: Production
  - url: https://af-treasury-trade-finance.staging.acmefin.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Letters of Credit
    description: Letter of credit lifecycle from issuance through presentation and settlement
  - name: Guarantees & Collections
    description: Bank guarantees, standby LCs, and documentary collection processing
  - name: Supply Chain Finance
    description: Receivables factoring, supply chain finance, and dynamic discounting
paths:
  /letters-of-credit:
    get:
      operationId: listLettersOfCredit
      summary: List letters of credit
      description: List all letters of credit with filtering by type, status, and beneficiary.
      tags:
        - Letters of Credit
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: type
          in: query
          required: false
          description: "Filter by LC type"
          schema:
            type: "string"
        - name: status
          in: query
          required: false
          description: "Filter by status"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        lc_id:
                          type: string
                          description: "LC ID"
                          format: uuid
                          example: "lc-4a5b6c7d-8e9f-0a1b-2c3d"
                        lc_number:
                          type: string
                          description: "LC reference number"
                          example: "LC-2025-001234"
                        type:
                          type: string
                          description: "LC type"
                          example: "irrevocable"
                          enum:
                            - irrevocable
                            - revocable
                            - standby
                            - transferable
                            - back_to_back
                        amount:
                          type: number
                          description: "LC face amount"
                          format: double
                          example: 500000.0
                        currency:
                          type: string
                          description: "Currency"
                          example: "USD"
                        applicant:
                          type: string
                          description: "Applicant (buyer)"
                          example: "Acme Finance Corp"
                        beneficiary:
                          type: string
                          description: "Beneficiary (seller)"
                          example: "Global Supplier Inc"
                        issuing_bank:
                          type: string
                          description: "Issuing bank"
                          example: "JPMorgan Chase"
                        status:
                          type: string
                          description: "LC status"
                          example: "draft"
                          enum:
                            - draft
                            - issued
                            - advised
                            - amended
                            - documents_presented
                            - paid
                            - expired
                            - cancelled
                        expiry_date:
                          type: string
                          description: "LC expiry date"
                          example: "2025-12-31"
                        created_at:
                          type: string
                          description: "ISO 8601 timestamp"
                          format: date-time
                          example: "2025-06-15T14:30:00Z"
                      required:
                        - lc_id
                        - lc_number
                        - type
                        - amount
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: issueLc
      summary: Issue letter of credit
      description: >-
        Issue a new letter of credit application. The LC is submitted to the issuing bank for processing and
        will be advised to the beneficiary's bank upon issuance.
      tags:
        - Letters of Credit
      requestBody:
        required: true
        description: Issue letter of credit request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    type:
                      type: string
                      description: "LC type"
                      example: "irrevocable"
                      enum:
                        - irrevocable
                        - standby
                        - transferable
                    amount:
                      type: number
                      description: "Face amount"
                      format: double
                      example: 500000.0
                    currency:
                      type: string
                      description: "Currency"
                      example: "USD"
                    beneficiary_name:
                      type: string
                      description: "Beneficiary"
                      example: "Global Supplier Inc"
                    beneficiary_bank:
                      type: string
                      description: "Advising bank"
                      example: "HSBC"
                    expiry_date:
                      type: string
                      description: "Expiry date"
                      example: "2025-12-31"
                    latest_shipment_date:
                      type: string
                      description: "Latest shipment"
                      example: "2025-11-30"
                    port_of_loading:
                      type: string
                      description: "Port of loading"
                      example: "Shanghai"
                    port_of_discharge:
                      type: string
                      description: "Port of discharge"
                      example: "Los Angeles"
                    goods_description:
                      type: string
                      description: "Goods"
                      example: "Electronic components per PO-2025-0789"
                    documents_required:
                      type: array
                      description: "Required documents for presentation"
                      items:
                        type: string
                    partial_shipment:
                      type: boolean
                      description: "Allow partial shipment"
                      example: true
                    transhipment:
                      type: boolean
                      description: "Allow transhipment"
                      example: true
              required:
                - type
                - amount
                - currency
                - beneficiary_name
                - expiry_date
                - goods_description
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  lc_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "lc-4a5b6c7d"
                  lc_number:
                    type: string
                    description: "Reference"
                    example: "LC-2025-001234"
                  status:
                    type: string
                    description: "Status"
                    example: "draft"
                  estimated_fees:
                    type: number
                    description: "Estimated bank fees"
                    format: double
                    example: 2500.0
                required:
                  - lc_id
                  - lc_number
                  - status
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /letters-of-credit/{lc_id}:
    get:
      operationId: getLc
      summary: Get letter of credit
      description: >-
        Retrieve full LC details including terms, document requirements, amendment history, and presentation
        status.
      tags:
        - Letters of Credit
      parameters:
        - name: lc_id
          in: path
          required: true
          description: "Unique lc id"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  lc_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "lc-4a5b6c7d"
                  lc_number:
                    type: string
                    description: "Reference"
                    example: "LC-2025-001234"
                  type:
                    type: string
                    description: "Type"
                    example: "irrevocable"
                  amount:
                    type: number
                    description: "Amount"
                    format: double
                    example: 500000.0
                  beneficiary:
                    type: string
                    description: "Beneficiary"
                    example: "Global Supplier Inc"
                  status:
                    type: string
                    description: "Status"
                    example: "issued"
                  documents_required:
                    type: array
                    description: "Required documents"
                    items:
                      type: string
                required:
                  - lc_id
                  - lc_number
                  - type
                  - status
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    patch:
      operationId: updateLc
      summary: Update LC draft
      description: Update an LC application in draft status before submission.
      tags:
        - Letters of Credit
      parameters:
        - name: lc_id
          in: path
          required: true
          description: "Unique lc id"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Update LC draft request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    amount:
                      type: number
                      description: "Updated amount"
                      format: double
                      example: 600000.0
                    expiry_date:
                      type: string
                      description: "Updated expiry"
                      example: "2026-03-31"
                    goods_description:
                      type: string
                      description: "Updated goods"
                      example: "Electronic components — revised order"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  lc_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "lc-4a5b6c7d"
                  updated_at:
                    type: string
                    description: "ISO 8601 timestamp"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - lc_id
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /letters-of-credit/{lc_id}/amend:
    post:
      operationId: amendLc
      summary: Amend letter of credit
      description: >-
        Submit an amendment request for an issued LC. Amendments to irrevocable LCs require beneficiary
        consent. Supports amount changes, expiry extensions, and terms modifications.
      tags:
        - Letters of Credit
      parameters:
        - name: lc_id
          in: path
          required: true
          description: "Unique lc id"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Amend letter of credit request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    amendment_type:
                      type: string
                      description: "Amendment type"
                      example: "amount_increase"
                      enum:
                        - amount_increase
                        - amount_decrease
                        - extend_expiry
                        - modify_terms
                    new_amount:
                      type: number
                      description: "New amount (if changing)"
                      format: double
                      example: 600000.0
                    new_expiry_date:
                      type: string
                      description: "New expiry (if extending)"
                      example: "2026-03-31"
                    reason:
                      type: string
                      description: "Amendment reason"
                      example: "Increased order quantity per revised PO"
              required:
                - amendment_type
                - reason
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  amendment_id:
                    type: string
                    description: "Amendment ID"
                    format: uuid
                    example: "amd-1a2b3c4d"
                  lc_id:
                    type: string
                    description: "LC"
                    format: uuid
                    example: "lc-4a5b6c7d"
                  status:
                    type: string
                    description: "Status"
                    example: "pending_beneficiary_consent"
                  amendment_number:
                    type: integer
                    description: "Amendment sequence"
                    example: 1
                required:
                  - amendment_id
                  - status
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /letters-of-credit/{lc_id}/present-documents:
    post:
      operationId: presentDocuments
      summary: Present documents
      description: >-
        Submit documents under the LC for examination. The issuing bank examines documents for compliance
        with LC terms per UCP 600 rules within 5 banking days.
      tags:
        - Letters of Credit
      parameters:
        - name: lc_id
          in: path
          required: true
          description: "Unique lc id"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Present documents request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    documents:
                      type: array
                      description: "Presented documents with metadata"
                      items:
                        type: object
                    presentation_date:
                      type: string
                      description: "Presentation date"
                      example: "2025-10-15"
                    shipping_date:
                      type: string
                      description: "Actual shipment date"
                      example: "2025-10-10"
              required:
                - documents
                - presentation_date
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  presentation_id:
                    type: string
                    description: "Presentation ID"
                    format: uuid
                    example: "prs-6a7b8c9d"
                  status:
                    type: string
                    description: "Status"
                    example: "under_examination"
                  examination_deadline:
                    type: string
                    description: "Bank examination deadline"
                    example: "2025-10-22"
                  documents_received:
                    type: integer
                    description: "Documents submitted"
                    example: 6
                required:
                  - presentation_id
                  - status
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /documentary-collections:
    get:
      operationId: listDocumentaryCollections
      summary: List documentary collections
      description: >-
        List documentary collection transactions (D/P and D/A) with their processing status.
      tags:
        - Guarantees & Collections
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        collection_id:
                          type: string
                          description: "Collection ID"
                          format: uuid
                          example: "dc-8a9b0c1d-2e3f"
                        collection_type:
                          type: string
                          description: "Collection type"
                          example: "documents_against_payment"
                          enum:
                            - documents_against_payment
                            - documents_against_acceptance
                        amount:
                          type: number
                          description: "Collection amount"
                          format: double
                          example: 250000.0
                        currency:
                          type: string
                          description: "Currency"
                          example: "EUR"
                        drawer:
                          type: string
                          description: "Drawer (exporter)"
                          example: "Acme Finance Corp"
                        drawee:
                          type: string
                          description: "Drawee (importer)"
                          example: "European Import Ltd"
                        remitting_bank:
                          type: string
                          description: "Remitting bank"
                          example: "JPMorgan Chase"
                        collecting_bank:
                          type: string
                          description: "Collecting bank"
                          example: "Deutsche Bank"
                        status:
                          type: string
                          description: "Collection status"
                          example: "submitted"
                          enum:
                            - submitted
                            - in_transit
                            - presented
                            - accepted
                            - paid
                            - refused
                            - protested
                      required:
                        - collection_id
                        - collection_type
                        - amount
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: createCollection
      summary: Create documentary collection
      description: Submit a new documentary collection instruction per URC 522 rules.
      tags:
        - Guarantees & Collections
      requestBody:
        required: true
        description: Create documentary collection request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    collection_type:
                      type: string
                      description: "Type"
                      example: "documents_against_payment"
                      enum:
                        - documents_against_payment
                        - documents_against_acceptance
                    amount:
                      type: number
                      description: "Amount"
                      format: double
                      example: 250000.0
                    currency:
                      type: string
                      description: "Currency"
                      example: "EUR"
                    drawee_name:
                      type: string
                      description: "Drawee"
                      example: "European Import Ltd"
                    collecting_bank:
                      type: string
                      description: "Collecting bank"
                      example: "Deutsche Bank"
                    documents:
                      type: array
                      description: "Document descriptions"
                      items:
                        type: string
                    tenor:
                      type: string
                      description: "Payment tenor (D/A only)"
                      example: "90 days sight"
              required:
                - collection_type
                - amount
                - currency
                - drawee_name
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  collection_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "dc-8a9b0c1d"
                  status:
                    type: string
                    description: "Status"
                    example: "submitted"
                required:
                  - collection_id
                  - status
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /documentary-collections/{collection_id}:
    get:
      operationId: getCollection
      summary: Get documentary collection
      description: Retrieve collection details with document listing and payment status.
      tags:
        - Guarantees & Collections
      parameters:
        - name: collection_id
          in: path
          required: true
          description: "Unique collection id"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  collection_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "dc-8a9b0c1d"
                  collection_type:
                    type: string
                    description: "Type"
                    example: "documents_against_payment"
                  amount:
                    type: number
                    description: "Amount"
                    format: double
                    example: 250000.0
                  status:
                    type: string
                    description: "Status"
                    example: "presented"
                required:
                  - collection_id
                  - status
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /documentary-collections/{collection_id}/release:
    post:
      operationId: releaseCollectionDocs
      summary: Release collection documents
      description: >-
        Release documents to the drawee upon payment receipt (D/P) or acceptance of draft (D/A).
      tags:
        - Guarantees & Collections
      parameters:
        - name: collection_id
          in: path
          required: true
          description: "Unique collection id"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Release collection documents request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    release_condition:
                      type: string
                      description: "Release condition"
                      example: "payment_received"
                      enum:
                        - payment_received
                        - draft_accepted
                    payment_reference:
                      type: string
                      description: "Payment reference (D/P)"
                      example: "PAY-2025-0678"
              required:
                - release_condition
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  collection_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "dc-8a9b0c1d"
                  status:
                    type: string
                    description: "Status"
                    example: "paid"
                  released_at:
                    type: string
                    description: "ISO 8601 timestamp"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - collection_id
                  - status
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /guarantees:
    get:
      operationId: listGuarantees
      summary: List bank guarantees
      description: List all bank guarantees and standby LCs issued or received.
      tags:
        - Guarantees & Collections
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: type
          in: query
          required: false
          description: "Filter by guarantee type"
          schema:
            type: "string"
        - name: status
          in: query
          required: false
          description: "Filter by status"
