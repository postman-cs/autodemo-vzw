openapi: 3.0.3
info:
  title: Acme Finance Orders API
  description: Full lifecycle order management for equity and ETF trading. Supports market, limit, stop, stop-limit, trailing
    stop, and trailing stop-limit order types with day, GTC, IOC, and FOK time-in-force options. Provides bracket orders (OCO),
    conditional/contingent orders, order modification, cancellation, and detailed execution/fill reporting with venue and
    liquidity analytics.
  version: 5.0.0
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-invest-orders
  x-acme-domain: invest
servers:
- url: https://af-invest-orders.api.acmefin.com/v1
  description: Production
- url: https://af-invest-orders.staging.acmefin.com/v1
  description: Staging
security:
- BearerAuth: []
tags:
- name: Orders
  description: Place, modify, cancel, and query orders across all supported order types
- name: Fills
  description: Execution reports with fill prices, venues, and liquidity indicators
- name: Bracket Orders
  description: One-cancels-other (OCO) bracket order groups with take-profit and stop-loss legs
- name: Conditional Orders
  description: Contingent orders triggered by price, volume, or index-level conditions
- name: Order Book
  description: Aggregated order book depth and time-and-sales data
paths:
  /orders:
    get:
      operationId: listOrders
      summary: List orders
      description: Retrieve orders for the authenticated account with full status lifecycle tracking. Filterable by status,
        side, ticker, order type, and date range. Returns most recent orders first.
      tags:
      - Orders
      parameters:
      - name: page
        in: query
        required: false
        description: Page number for pagination
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: per_page
        in: query
        required: false
        description: Number of results per page (max 100)
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: sort_by
        in: query
        required: false
        description: Field to sort results by
        schema:
          type: string
      - name: sort_order
        in: query
        required: false
        description: Sort direction
        schema:
          type: string
          enum:
          - asc
          - desc
          default: desc
      - name: status
        in: query
        required: false
        description: Filter by order status
        schema:
          type: string
          enum:
          - new
          - partially_filled
          - filled
          - canceled
          - rejected
      - name: side
        in: query
        required: false
        description: Filter by order side
        schema:
          type: string
          enum:
          - buy
          - sell
      - name: ticker
        in: query
        required: false
        description: Filter by ticker symbol
        schema:
          type: string
      - name: from_date
        in: query
        required: false
        description: Start date for order history
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        order_id:
                          type: string
                          description: Order identifier
                          format: uuid
                          example: ord-a1b2c3d4
                        account_id:
                          type: string
                          description: Brokerage account identifier
                          format: uuid
                          example: acct-a1b2c3d4
                        ticker:
                          type: string
                          description: Ticker symbol
                          example: AAPL
                        side:
                          type: string
                          description: Order side
                          enum:
                          - buy
                          - sell
                          - sell_short
                          - buy_to_cover
                        order_type:
                          type: string
                          description: Order type
                          enum:
                          - market
                          - limit
                          - stop
                          - stop_limit
                          - trailing_stop
                          - trailing_stop_limit
                        quantity:
                          type: number
                          description: Order quantity in shares
                          format: double
                          example: 100
                        limit_price:
                          type: number
                          description: Limit price (for limit/stop-limit orders)
                          format: double
                          example: 175.0
                        stop_price:
                          type: number
                          description: Stop/trigger price
                          format: double
                          example: 170.0
                        time_in_force:
                          type: string
                          description: Time in force
                          enum:
                          - day
                          - gtc
                          - ioc
                          - fok
                          - opg
                          - cls
                          - gtd
                        status:
                          type: string
                          description: Order status
                          enum:
                          - pending_new
                          - new
                          - partially_filled
                          - filled
                          - canceled
                          - rejected
                          - expired
                          - pending_cancel
                          - pending_replace
                        filled_qty:
                          type: number
                          description: Shares filled so far
                          format: double
                          example: 50
                        avg_fill_price:
                          type: number
                          description: Average fill price
                          format: double
                          example: 175.12
                        extended_hours:
                          type: boolean
                          description: Extended hours trading enabled
                          example: false
                        submitted_at:
                          type: string
                          description: Order submission timestamp
                          format: date-time
                          example: '2025-06-15T14:30:00Z'
                        filled_at:
                          type: string
                          description: Order fill completion timestamp
                          format: date-time
                          example: ''
                      required:
                      - order_id
                      - account_id
                      - ticker
                      - side
                      - status
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
                required:
                - data
                - pagination
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
    post:
      operationId: placeOrder
      summary: Place an order
      description: Submit a new order for execution. Supports market, limit, stop, stop-limit, trailing stop, and trailing
        stop-limit order types. Validates buying power, margin requirements, and pattern day trader restrictions before acceptance.
      tags:
      - Orders
      requestBody:
        required: true
        description: Place an order request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                account_id:
                  type: string
                  description: Brokerage account identifier
                  format: uuid
                  example: acct-a1b2c3d4
                ticker:
                  type: string
                  description: Ticker symbol
                  example: AAPL
                side:
                  type: string
                  description: Order side
                  enum:
                  - buy
                  - sell
                  - sell_short
                  - buy_to_cover
                order_type:
                  type: string
                  description: Order type
                  enum:
                  - market
                  - limit
                  - stop
                  - stop_limit
                  - trailing_stop
                quantity:
                  type: number
                  description: Shares to trade
                  format: double
                  example: 100
                limit_price:
                  type: number
                  description: Limit price
                  format: double
                  example: 175.0
                stop_price:
                  type: number
                  description: Stop trigger price
                  format: double
                  example: 170.0
                time_in_force:
                  type: string
                  description: Time in force
                  enum:
                  - day
                  - gtc
                  - ioc
                  - fok
                extended_hours:
                  type: boolean
                  description: Enable extended hours
                  example: false
              required:
              - account_id
              - ticker
              - side
              - order_type
              - quantity
      responses:
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  order_id:
                    type: string
                    description: Order identifier
                    format: uuid
                    example: ord-a1b2c3d4
                  account_id:
                    type: string
                    description: Brokerage account identifier
                    format: uuid
                    example: acct-a1b2c3d4
                  ticker:
                    type: string
                    description: Ticker symbol
                    example: AAPL
                  side:
                    type: string
                    description: Order side
                    enum:
                    - buy
                    - sell
                    - sell_short
                    - buy_to_cover
                  order_type:
                    type: string
                    description: Order type
                    enum:
                    - market
                    - limit
                    - stop
                    - stop_limit
                    - trailing_stop
                    - trailing_stop_limit
                  quantity:
                    type: number
                    description: Order quantity in shares
                    format: double
                    example: 100
                  limit_price:
                    type: number
                    description: Limit price (for limit/stop-limit orders)
                    format: double
                    example: 175.0
                  stop_price:
                    type: number
                    description: Stop/trigger price
                    format: double
                    example: 170.0
                  time_in_force:
                    type: string
                    description: Time in force
                    enum:
                    - day
                    - gtc
                    - ioc
                    - fok
                    - opg
                    - cls
                    - gtd
                  status:
                    type: string
                    description: Order status
                    enum:
                    - pending_new
                    - new
                    - partially_filled
                    - filled
                    - canceled
                    - rejected
                    - expired
                    - pending_cancel
                    - pending_replace
                  filled_qty:
                    type: number
                    description: Shares filled so far
                    format: double
                    example: 50
                  avg_fill_price:
                    type: number
                    description: Average fill price
                    format: double
                    example: 175.12
                  extended_hours:
                    type: boolean
                    description: Extended hours trading enabled
                    example: false
                  submitted_at:
                    type: string
                    description: Order submission timestamp
                    format: date-time
                    example: '2025-06-15T14:30:00Z'
                  filled_at:
                    type: string
                    description: Order fill completion timestamp
                    format: date-time
                    example: ''
                required:
                - order_id
                - status
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
  /orders/{order_id}:
    get:
      operationId: getOrder
      summary: Get order details
      description: Retrieve complete order details including current status, fill information, and execution history.
      tags:
      - Orders
      parameters:
      - name: order_id
        in: path
        required: true
        description: Unique order id
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  order_id:
                    type: string
                    description: Order identifier
                    format: uuid
                    example: ord-a1b2c3d4
                  account_id:
                    type: string
                    description: Brokerage account identifier
                    format: uuid
                    example: acct-a1b2c3d4
                  ticker:
                    type: string
                    description: Ticker symbol
                    example: AAPL
                  side:
                    type: string
                    description: Order side
                    enum:
                    - buy
                    - sell
                    - sell_short
                    - buy_to_cover
                  order_type:
                    type: string
                    description: Order type
                    enum:
                    - market
                    - limit
                    - stop
                    - stop_limit
                    - trailing_stop
                    - trailing_stop_limit
                  quantity:
                    type: number
                    description: Order quantity in shares
                    format: double
                    example: 100
                  limit_price:
                    type: number
                    description: Limit price (for limit/stop-limit orders)
                    format: double
                    example: 175.0
                  stop_price:
                    type: number
                    description: Stop/trigger price
                    format: double
                    example: 170.0
                  time_in_force:
                    type: string
                    description: Time in force
                    enum:
                    - day
                    - gtc
                    - ioc
                    - fok
                    - opg
                    - cls
                    - gtd
                  status:
                    type: string
                    description: Order status
                    enum:
                    - pending_new
                    - new
                    - partially_filled
                    - filled
                    - canceled
                    - rejected
                    - expired
                    - pending_cancel
                    - pending_replace
                  filled_qty:
                    type: number
                    description: Shares filled so far
                    format: double
                    example: 50
                  avg_fill_price:
                    type: number
                    description: Average fill price
                    format: double
                    example: 175.12
                  extended_hours:
                    type: boolean
                    description: Extended hours trading enabled
                    example: false
                  submitted_at:
                    type: string
                    description: Order submission timestamp
                    format: date-time
                    example: '2025-06-15T14:30:00Z'
                  filled_at:
                    type: string
                    description: Order fill completion timestamp
                    format: date-time
                    example: ''
                required:
                - order_id
                - status
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
    patch:
      operationId: modifyOrder
      summary: Modify an order
      description: Modify a pending or partially-filled order. Supports changing quantity, limit price, stop price, and time-in-force.
        The order retains its queue priority only if the modification reduces quantity.
      tags:
      - Orders
      parameters:
      - name: order_id
        in: path
        required: true
        description: Unique order id
        schema:
          type: string
      requestBody:
        required: true
        description: Modify an order request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                quantity:
                  type: number
                  description: Updated quantity
                  format: double
                  example: 150
                limit_price:
                  type: number
                  description: Updated limit price
                  format: double
                  example: 176.0
                stop_price:
                  type: number
                  description: Updated stop price
                  format: double
                  example: 171.0
                time_in_force:
                  type: string
                  description: Updated TIF
                  enum:
                  - day
                  - gtc
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  order_id:
                    type: string
                    description: Order identifier
                    format: uuid
                    example: ord-a1b2c3d4
                  account_id:
                    type: string
                    description: Brokerage account identifier
                    format: uuid
                    example: acct-a1b2c3d4
                  ticker:
                    type: string
                    description: Ticker symbol
                    example: AAPL
                  side:
                    type: string
                    description: Order side
                    enum:
                    - buy
                    - sell
                    - sell_short
                    - buy_to_cover
                  order_type:
                    type: string
                    description: Order type
                    enum:
                    - market
                    - limit
                    - stop
                    - stop_limit
                    - trailing_stop
                    - trailing_stop_limit
                  quantity:
                    type: number
                    description: Order quantity in shares
                    format: double
                    example: 100
                  limit_price:
                    type: number
                    description: Limit price (for limit/stop-limit orders)
                    format: double
                    example: 175.0
                  stop_price:
                    type: number
                    description: Stop/trigger price
                    format: double
                    example: 170.0
                  time_in_force:
                    type: string
                    description: Time in force
                    enum:
                    - day
                    - gtc
                    - ioc
                    - fok
                    - opg
                    - cls
                    - gtd
                  status:
                    type: string
                    description: Order status
                    enum:
                    - pending_new
                    - new
                    - partially_filled
                    - filled
                    - canceled
                    - rejected
                    - expired
                    - pending_cancel
                    - pending_replace
                  filled_qty:
                    type: number
                    description: Shares filled so far
                    format: double
                    example: 50
                  avg_fill_price:
                    type: number
                    description: Average fill price
                    format: double
                    example: 175.12
                  extended_hours:
                    type: boolean
                    description: Extended hours trading enabled
                    example: false
                  submitted_at:
                    type: string
                    description: Order submission timestamp
                    format: date-time
                    example: '2025-06-15T14:30:00Z'
                  filled_at:
                    type: string
                    description: Order fill completion timestamp
                    format: date-time
                    example: ''
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
    delete:
      operationId: cancelOrder
      summary: Cancel an order
      description: Request cancellation of a pending or partially-filled order. Returns 204 on accepted cancel request; final
        cancellation is confirmed asynchronously.
      tags:
      - Orders
      parameters:
      - name: order_id
        in: path
        required: true
        description: Unique order id
        schema:
          type: string
      responses:
        '204':
          description: Resource deleted successfully
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
  /orders/cancel-all:
    post:
      operationId: cancelAllOrders
      summary: Cancel all open orders
      description: Request cancellation of all open orders for the authenticated account. Optionally filter by ticker or side.
        Returns count of orders submitted for cancellation.
      tags:
      - Orders
      requestBody:
        required: true
        description: Cancel all open orders request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                account_id:
                  type: string
                  description: Brokerage account identifier
                  format: uuid
                  example: acct-a1b2c3d4
                ticker:
                  type: string
                  description: Ticker symbol
                  example: AAPL
                side:
                  type: string
                  description: Cancel only buy or sell side
                  enum:
                  - buy
                  - sell
              required:
              - account_id
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders_canceled:
                    type: integer
                    description: Number of orders submitted for cancellation
                    example: 5
                  order_ids:
                    type: array
                    description: Order IDs submitted for cancellation
                    items:
                      type: string
                required:
                - orders_canceled
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
  /orders/preview:
    post:
      operationId: previewOrder
      summary: Preview order
      description: Preview an order before submission to see estimated cost, commission, fees, margin impact, and buying power
        effect without actually placing the order.
      tags:
      - Orders
      requestBody:
        required: true
        description: Preview order request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                account_id:
                  type: string
                  description: Brokerage account identifier
                  format: uuid
                  example: acct-a1b2c3d4
                ticker:
                  type: string
                  description: Ticker symbol
                  example: AAPL
                side:
                  type: string
                  description: Order side
                  enum:
                  - buy
                  - sell
                order_type:
                  type: string
                  description: Order type
                  enum:
                  - market
                  - limit
                quantity:
                  type: number
                  description: Shares
                  format: double
                  example: 100
                limit_price:
                  type: number
                  description: Limit price
                  format: double
                  example: 175.0
              required:
              - account_id
              - ticker
              - side
              - order_type
              - quantity
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  estimated_total:
                    type: object
                    description: Estimated total cost/proceeds
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: 17512.0
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                  estimated_commission:
                    type: object
                    description: Estimated commission
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: 0.0
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                  estimated_fees:
                    type: object
                    description: Estimated regulatory fees
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: 0.04
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                  buying_power_effect:
                    type: object
                    description: Impact on buying power
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: -17512.04
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                  margin_requirement:
                    type: object
                    description: Initial margin requirement
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: 8756.0
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                required:
                - estimated_total
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
  /fills:
    get:
      operationId: listFills
      summary: List fills
      description: Retrieve execution/fill reports across all orders. Each fill includes execution price, venue, liquidity
        indicator, commission, and regulatory fees. Multiple fills may exist for a single order.
      tags:
      - Fills
      parameters:
      - name: page
        in: query
        required: false
        description: Page number for pagination
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: per_page
        in: query
        required: false
        description: Number of results per page (max 100)
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: sort_by
        in: query
        required: false
        description: Field to sort results by
        schema:
          type: string
      - name: sort_order
        in: query
        required: false
        description: Sort direction
        schema:
          type: string
          enum:
          - asc
          - desc
          default: desc
      - name: order_id
        in: query
        required: false
        description: Filter fills for a specific order
        schema:
          type: string
      - name: ticker
        in: query
        required: false
        description: Filter by ticker symbol
        schema:
          type: string
      - name: from_date
        in: query
        required: false
        description: Start date
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        fill_id:
                          type: string
                          description: Fill/execution identifier
                          format: uuid
                          example: fill-a1b2c3d4
                        order_id:
                          type: string
                          description: Parent order identifier
                          format: uuid
                          example: ord-a1b2c3d4
                        ticker:
                          type: string
                          description: Ticker symbol
                          example: AAPL
                        side:
                          type: string
                          description: Fill side
                          enum:
                          - buy
                          - sell
                        quantity:
                          type: number
                          description: Fill quantity
                          format: double
                          example: 50
                        price:
                          type: number
                          description: Execution price
                          format: double
                          example: 175.12
                        venue:
                          type: string
                          description: Execution venue
                          example: NYSE
                        liquidity:
                          type: string
                          description: Liquidity indicator
                          enum:
                          - added
                          - removed
                          - routed
                        commission:
                          type: object
                          description: Commission charged
                          properties:
                            amount:
                              type: number
                              description: Monetary amount
                              format: double
                              example: 0.0
                            currency:
                              type: string
                              description: ISO 4217 currency code
                              example: USD
                        fees:
                          type: object
                          description: Regulatory fees (SEC, TAF, FINRA)
                          properties:
                            amount:
