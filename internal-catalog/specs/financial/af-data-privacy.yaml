openapi: 3.0.3
info:
  title: Acme Finance Data Privacy API
  description: >-
    Comprehensive privacy operations platform for managing data subject requests (GDPR, CCPA, LGPD, PIPEDA),
    consent lifecycle, PII detection and scanning, data anonymization with multiple techniques (k-anonymity,
    differential privacy, tokenization), and retention policy enforcement. Ensures regulatory compliance with
    audit trails, deadline tracking, and automated cross-system data discovery for subject access and deletion
    workflows.
  version: 2.5.0
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-data-privacy
  x-acme-domain: data
servers:
  - url: https://af-data-privacy.api.acmefin.com/v1
    description: Production
  - url: https://af-data-privacy.staging.acmefin.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Data Subject Requests
    description: Process data subject access, deletion, rectification, and portability requests
  - name: Consent Management
    description: Manage consent records with lawful basis tracking and expiration
  - name: Anonymization
    description: Run anonymization jobs using privacy-preserving techniques
  - name: PII Detection
    description: Scan datasets for personally identifiable information
  - name: Retention Policies
    description: Define and enforce data retention policies with regulatory alignment
paths:
  /dsr:
    get:
      operationId: listDSRs
      summary: List data subject requests
      description: Retrieve DSRs with filters for request type, status, regulation, and deadline.
      tags:
        - Data Subject Requests
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: type
          in: query
          required: false
          description: Filter by request type
          schema:
            type: "string"
            enum:
              - access
              - deletion
              - rectification
              - portability
              - restriction
        - name: status
          in: query
          required: false
          description: Filter by processing status
          schema:
            type: "string"
        - name: regulation
          in: query
          required: false
          description: Filter by regulation
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        request_id:
                          type: string
                          description: "DSR identifier"
                          format: uuid
                          readOnly: true
                        type:
                          type: string
                          description: "GDPR/CCPA request type"
                          enum:
                            - access
                            - deletion
                            - rectification
                            - portability
                            - restriction
                        subject_id:
                          type: string
                          description: "Data subject identifier (customer ID or email)"
                        status:
                          type: string
                          description: "Processing status"
                          enum:
                            - received
                            - verified
                            - in_progress
                            - completed
                            - rejected
                        regulation:
                          type: string
                          description: "Applicable privacy regulation"
                          enum:
                            - gdpr
                            - ccpa
                            - lgpd
                            - pipeda
                        deadline:
                          type: string
                          description: "Regulatory response deadline"
                          format: date
                        systems_affected:
                          type: array
                          description: "Systems containing subject data"
                          items:
                            type: string
                        submitted_at:
                          type: string
                          format: date-time
                        completed_at:
                          type: string
                          format: date-time
                          nullable: true
                      required:
                        - request_id
                        - type
                        - subject_id
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: createDSR
      summary: Create data subject request
      description: >-
        Submit a new data subject request. Automatically identifies affected systems and calculates the
        regulatory deadline.
      tags:
        - Data Subject Requests
      requestBody:
        required: true
        description: Create data subject request request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    type:
                      type: string
                      enum:
                        - access
                        - deletion
                        - rectification
                        - portability
                        - restriction
                    subject_id:
                      type: string
                    regulation:
                      type: string
                      enum:
                        - gdpr
                        - ccpa
                        - lgpd
                        - pipeda
                    details:
                      type: string
                      description: "Additional request details"
              required:
                - type
                - subject_id
                - regulation
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                    description: "DSR identifier"
                    format: uuid
                    readOnly: true
                  type:
                    type: string
                    description: "GDPR/CCPA request type"
                    enum:
                      - access
                      - deletion
                      - rectification
                      - portability
                      - restriction
                  subject_id:
                    type: string
                    description: "Data subject identifier (customer ID or email)"
                  status:
                    type: string
                    description: "Processing status"
                    enum:
                      - received
                      - verified
                      - in_progress
                      - completed
                      - rejected
                  regulation:
                    type: string
                    description: "Applicable privacy regulation"
                    enum:
                      - gdpr
                      - ccpa
                      - lgpd
                      - pipeda
                  deadline:
                    type: string
                    description: "Regulatory response deadline"
                    format: date
                  systems_affected:
                    type: array
                    description: "Systems containing subject data"
                    items:
                      type: string
                  submitted_at:
                    type: string
                    format: date-time
                  completed_at:
                    type: string
                    format: date-time
                    nullable: true
                required:
                  - request_id
                  - type
                  - status
                  - deadline
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /dsr/{request_id}:
    get:
      operationId: getDSR
      summary: Get DSR details
      description: >-
        Retrieve complete DSR details including affected systems, processing timeline, and audit trail.
      tags:
        - Data Subject Requests
      parameters:
        - name: request_id
          in: path
          required: true
          description: Unique request id
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                    description: "DSR identifier"
                    format: uuid
                    readOnly: true
                  type:
                    type: string
                    description: "GDPR/CCPA request type"
                    enum:
                      - access
                      - deletion
                      - rectification
                      - portability
                      - restriction
                  subject_id:
                    type: string
                    description: "Data subject identifier (customer ID or email)"
                  status:
                    type: string
                    description: "Processing status"
                    enum:
                      - received
                      - verified
                      - in_progress
                      - completed
                      - rejected
                  regulation:
                    type: string
                    description: "Applicable privacy regulation"
                    enum:
                      - gdpr
                      - ccpa
                      - lgpd
                      - pipeda
                  deadline:
                    type: string
                    description: "Regulatory response deadline"
                    format: date
                  systems_affected:
                    type: array
                    description: "Systems containing subject data"
                    items:
                      type: string
                  submitted_at:
                    type: string
                    format: date-time
                  completed_at:
                    type: string
                    format: date-time
                    nullable: true
                required:
                  - request_id
                  - type
                  - status
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    patch:
      operationId: updateDSR
      summary: Update DSR status
      description: Update the processing status of a data subject request.
      tags:
        - Data Subject Requests
      parameters:
        - name: request_id
          in: path
          required: true
          description: Unique request id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Update DSR status request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    status:
                      type: string
                      enum:
                        - verified
                        - in_progress
                        - completed
                        - rejected
                    notes:
                      type: string
                      description: "Processing notes"
              required:
                - status
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                    description: "DSR identifier"
                    format: uuid
                    readOnly: true
                  type:
                    type: string
                    description: "GDPR/CCPA request type"
                    enum:
                      - access
                      - deletion
                      - rectification
                      - portability
                      - restriction
                  subject_id:
                    type: string
                    description: "Data subject identifier (customer ID or email)"
                  status:
                    type: string
                    description: "Processing status"
                    enum:
                      - received
                      - verified
                      - in_progress
                      - completed
                      - rejected
                  regulation:
                    type: string
                    description: "Applicable privacy regulation"
                    enum:
                      - gdpr
                      - ccpa
                      - lgpd
                      - pipeda
                  deadline:
                    type: string
                    description: "Regulatory response deadline"
                    format: date
                  systems_affected:
                    type: array
                    description: "Systems containing subject data"
                    items:
                      type: string
                  submitted_at:
                    type: string
                    format: date-time
                  completed_at:
                    type: string
                    format: date-time
                    nullable: true
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /dsr/{request_id}/execute:
    post:
      operationId: executeDSR
      summary: Execute DSR
      description: >-
        Trigger automated execution of a verified DSR across all affected systems. Access requests generate
        a data export; deletion requests purge data from all systems.
      tags:
        - Data Subject Requests
      parameters:
        - name: request_id
          in: path
          required: true
          description: Unique request id
          schema:
            type: "string"
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  execution_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum:
                      - executing
                      - completed
                  systems_processed:
                    type: integer
                  errors:
                    type: array
                    items:
                      type: object
                required:
                  - execution_id
                  - status
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /consent:
    get:
      operationId: listConsentRecords
      summary: List consent records
      description: >-
        Retrieve consent records with filters for subject, purpose, legal basis, and status.
      tags:
        - Consent Management
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: subject_id
          in: query
          required: false
          description: Filter by data subject
          schema:
            type: "string"
        - name: purpose
          in: query
          required: false
          description: Filter by processing purpose
          schema:
            type: "string"
        - name: status
          in: query
          required: false
          description: Filter by consent status
          schema:
            type: "string"
            enum:
              - granted
              - withdrawn
              - expired
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        consent_id:
                          type: string
                          description: "Consent record identifier"
                          format: uuid
                          readOnly: true
                        subject_id:
                          type: string
                          description: "Data subject identifier"
                        purpose:
                          type: string
                          description: "Processing purpose"
                          example: "marketing_communications"
                        legal_basis:
                          type: string
                          description: "GDPR lawful basis"
                          enum:
                            - consent
                            - contract
                            - legal_obligation
                            - vital_interest
                            - public_interest
                            - legitimate_interest
                        status:
                          type: string
                          description: "Current consent status"
                          enum:
                            - granted
                            - withdrawn
                            - expired
                        granted_at:
                          type: string
                          format: date-time
                        expires_at:
                          type: string
                          format: date-time
                          nullable: true
                        channel:
                          type: string
                          description: "Channel where consent was collected"
                          enum:
                            - web
                            - mobile
                            - branch
                            - phone
                            - api
                      required:
                        - consent_id
                        - subject_id
                        - purpose
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /consent/{consent_id}:
    get:
      operationId: getConsentRecord
      summary: Get consent record
      description: >-
        Retrieve a consent record with full audit history and linked processing activities.
      tags:
        - Consent Management
      parameters:
        - name: consent_id
          in: path
          required: true
          description: Unique consent id
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  consent_id:
                    type: string
                    description: "Consent record identifier"
                    format: uuid
                    readOnly: true
                  subject_id:
                    type: string
                    description: "Data subject identifier"
                  purpose:
                    type: string
                    description: "Processing purpose"
                    example: "marketing_communications"
                  legal_basis:
                    type: string
                    description: "GDPR lawful basis"
                    enum:
                      - consent
                      - contract
                      - legal_obligation
                      - vital_interest
                      - public_interest
                      - legitimate_interest
                  status:
                    type: string
                    description: "Current consent status"
                    enum:
                      - granted
                      - withdrawn
                      - expired
                  granted_at:
                    type: string
                    format: date-time
                  expires_at:
                    type: string
                    format: date-time
                    nullable: true
                  channel:
                    type: string
                    description: "Channel where consent was collected"
                    enum:
                      - web
                      - mobile
                      - branch
                      - phone
                      - api
                required:
                  - consent_id
                  - subject_id
                  - purpose
                  - status
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    patch:
      operationId: updateConsentRecord
      summary: Update consent record
      description: Withdraw or extend a consent grant.
      tags:
        - Consent Management
      parameters:
        - name: consent_id
          in: path
          required: true
          description: Unique consent id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Update consent record request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    status:
                      type: string
                      enum:
                        - withdrawn
                    withdrawal_reason:
                      type: string
              required:
                - status
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  consent_id:
                    type: string
                    description: "Consent record identifier"
                    format: uuid
                    readOnly: true
                  subject_id:
                    type: string
                    description: "Data subject identifier"
                  purpose:
                    type: string
                    description: "Processing purpose"
                    example: "marketing_communications"
                  legal_basis:
                    type: string
                    description: "GDPR lawful basis"
                    enum:
                      - consent
                      - contract
                      - legal_obligation
                      - vital_interest
                      - public_interest
                      - legitimate_interest
                  status:
                    type: string
                    description: "Current consent status"
                    enum:
                      - granted
                      - withdrawn
                      - expired
                  granted_at:
                    type: string
                    format: date-time
                  expires_at:
                    type: string
                    format: date-time
                    nullable: true
                  channel:
                    type: string
                    description: "Channel where consent was collected"
                    enum:
                      - web
                      - mobile
                      - branch
                      - phone
                      - api
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /consent/validate:
    post:
      operationId: validateConsent
      summary: Validate consent
      description: >-
        Check whether valid consent exists for a specific subject and processing purpose. Returns the
        applicable consent record or indicates no valid consent.
      tags:
        - Consent Management
      requestBody:
        required: true
        description: Validate consent request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    subject_id:
                      type: string
                    purpose:
                      type: string
                    processing_context:
                      type: string
                      description: "Additional context for validation"
              required:
                - subject_id
                - purpose
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_valid:
                    type: boolean
                    description: "Whether valid consent exists"
                  consent_id:
                    type: string
                    format: uuid
                    nullable: true
                  legal_basis:
                    type: string
                    nullable: true
                  expires_at:
                    type: string
                    format: date-time
                    nullable: true
                required:
                  - is_valid
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /anonymization/jobs:
    get:
      operationId: listAnonymizationJobs
      summary: List anonymization jobs
      description: >-
        Retrieve anonymization jobs with status, technique, and privacy budget consumption.
      tags:
        - Anonymization
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        job_id:
                          type: string
                          description: "Anonymization job identifier"
                          format: uuid
                          readOnly: true
                        dataset_id:
                          type: string
                          description: "Target dataset"
                          format: uuid
                        technique:
                          type: string
                          description: "Anonymization technique applied"
                          enum:
                            - k_anonymity
                            - l_diversity
                            - t_closeness
                            - differential_privacy
                            - pseudonymization
                            - tokenization
                        status:
                          type: string
                          description: "Job execution status"
                          enum:
                            - queued
                            - running
                            - completed
                            - failed
                        records_processed:
                          type: integer
                        privacy_budget_consumed:
                          type: number
                          description: "Epsilon consumed (differential privacy)"
                          format: double
                        started_at:
                          type: string
                          format: date-time
                      required:
                        - job_id
                        - dataset_id
                        - technique
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: createAnonymizationJob
      summary: Create anonymization job
      description: >-
        Submit a new data anonymization job targeting a specific dataset with the selected privacy-
        preserving technique.
      tags:
        - Anonymization
      requestBody:
        required: true
        description: Create anonymization job request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    dataset_id:
                      type: string
                      format: uuid
                    technique:
                      type: string
                      enum:
                        - k_anonymity
                        - l_diversity
                        - t_closeness
                        - differential_privacy
                        - pseudonymization
                        - tokenization
                    parameters:
                      type: object
                      description: "Technique-specific parameters (k value, epsilon, etc.)"
                    columns:
                      type: array
                      description: "Columns to anonymize"
                      items:
                        type: string
              required:
                - dataset_id
                - technique
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                    description: "Anonymization job identifier"
                    format: uuid
                    readOnly: true
                  dataset_id:
                    type: string
                    description: "Target dataset"
                    format: uuid
                  technique:
                    type: string
