    post:
      operationId: createTravelNotice
      summary: Create a travel notice
      description: Creates a travel notice to inform the fraud detection system of planned international travel. This prevents
        legitimate transactions in the destination countries from being declined as suspicious. Multiple destination countries
        can be specified. The notice becomes active on the departure date and expires on the return date.
      tags:
      - Travel Notices
      requestBody:
        required: true
        description: Create a travel notice request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                card_id:
                  type: string
                  description: Unique card identifier
                  example: card-8a2f4b91
                destinations:
                  type: array
                  description: List of destination country codes
                  items:
                    type: string
                    example: FR
                departure_date:
                  type: string
                  description: Travel start date
                  format: date
                  example: '2025-07-01'
                return_date:
                  type: string
                  description: Travel end date
                  format: date
                  example: '2025-07-15'
                contact_phone:
