  /cards/{card_id}/status-history:
    get:
      operationId: getStatusHistory
      summary: Get card status change history
      description: Returns a chronological list of all status changes for a card. Each entry includes the previous and new
        status, reason, who initiated the change, and when. Use for audit trails and dispute investigation. Results are sorted
        by timestamp descending.
      tags:
      - Card Lifecycle
      parameters:
      - name: page
        in: query
        required: false
        description: Page number for pagination
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: per_page
        in: query
        required: false
        description: Number of results per page (max 100)
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: sort_by
        in: query
        required: false
        description: Field to sort results by
        schema:
          type: string
      - name: sort_order
        in: query
        required: false
        description: Sort direction
        schema:
          type: string
          enum:
          - asc
          - desc
          default: desc
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        event_id:
                          type: string
                          description: Status change event identifier
                          example: evt-9d3c21
                        previous_status:
                          type: string
                          description: Status before the change
                          example: ACTIVE
                          enum:
                          - ACTIVE
                          - INACTIVE
                          - BLOCKED
                          - CLOSED
                          - EXPIRED
                          - LOST
                          - STOLEN
                        new_status:
                          type: string
                          description: Status after the change
                          example: BLOCKED
                          enum:
                          - ACTIVE
                          - INACTIVE
                          - BLOCKED
                          - CLOSED
                          - EXPIRED
                          - LOST
                          - STOLEN
                        reason:
                          type: string
                          description: Reason for the status change
                          example: Cardholder reported card stolen
                        changed_by:
                          type: string
                          description: User or system that initiated the change
                          example: user-cardholder-789
                        changed_at:
                          type: string
                          description: ISO 8601 timestamp
                          format: date-time
                          example: '2025-06-15T14:30:00Z'
                      required:
