openapi: 3.0.3
info:
  title: Acme Finance Card Management API
  description: Comprehensive card lifecycle management covering status transitions, travel notices, notification preferences,
    and transaction controls. Supports blocking and unblocking cards, reporting lost or stolen cards with immediate fraud
    prevention, requesting physical replacements, and permanently closing accounts. Travel notices prevent false fraud declines
    during international travel. Granular transaction controls let cardholders enable or disable specific channels such as
    ATM, online, contactless, and recurring payments. All status changes are logged with full audit trail.
  version: 3.7.0
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-cards-management
  x-acme-domain: cards
servers:
- url: https://af-cards-management.api.acmefin.com/v1
  description: Production
- url: https://af-cards-management.staging.acmefin.com/v1
  description: Staging
security:
- BearerAuth: []
tags:
- name: Card Lifecycle
  description: Card status transitions including block, unblock, lost/stolen reporting, replacement, and closure
- name: Travel Notices
  description: Travel notice management to prevent false fraud declines during international travel
- name: Notifications
  description: Cardholder notification preferences for transaction alerts and payment reminders
- name: Card Controls
  description: Granular channel and category controls for card transactions
paths:
  /cards:
    get:
      operationId: listManagedCards
      summary: List managed cards
      description: Returns a paginated list of cards under management with their current status, cardholder information, and
        last update timestamp. Supports filtering by status, card type, network, and cardholder name. Use for card portfolio
        management and status reporting.
      tags:
      - Card Lifecycle
      parameters:
      - name: page
        in: query
        required: false
        description: Page number for pagination
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: per_page
        in: query
        required: false
        description: Number of results per page (max 100)
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: sort_by
        in: query
        required: false
        description: Field to sort results by
        schema:
          type: string
      - name: sort_order
        in: query
        required: false
        description: Sort direction
        schema:
          type: string
          enum:
          - asc
          - desc
          default: desc
      - name: status
        in: query
        required: false
        description: Filter by card status
        schema:
          type: string
          enum:
          - ACTIVE
          - INACTIVE
          - BLOCKED
          - CLOSED
          - EXPIRED
          - LOST
          - STOLEN
      - name: card_type
        in: query
        required: false
        description: Filter by card type
        schema:
          type: string
          enum:
          - DEBIT
          - CREDIT
          - PREPAID
          - CHARGE
      - name: cardholder_name
        in: query
        required: false
        description: Search by cardholder name (partial match)
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        card_id:
                          type: string
                          description: Unique card identifier
                          example: card-8a2f4b91
                        masked_pan:
                          type: string
                          description: Masked primary account number
                          example: '****-****-****-4532'
                        cardholder_name:
                          type: string
                          description: Full name of the cardholder as embossed on the card
                          example: Jane A. Doe
                        card_type:
                          type: string
                          description: Card product type
                          example: CREDIT
                          enum:
                          - DEBIT
                          - CREDIT
                          - PREPAID
                          - CHARGE
                        status:
                          type: string
                          description: Current card status
                          example: ACTIVE
                          enum:
                          - ACTIVE
                          - INACTIVE
                          - BLOCKED
                          - CLOSED
                          - EXPIRED
                          - LOST
                          - STOLEN
                        expiry_date:
                          type: string
                          description: Card expiration date in MM/YY format
                          example: 12/27
                          pattern: ^(0[1-9]|1[0-2])/[0-9]{2}$
                        network:
                          type: string
                          description: Card payment network
                          example: VISA
                          enum:
                          - VISA
                          - MASTERCARD
                          - AMEX
                        last_four:
                          type: string
                          description: Last four digits of the PAN
                          example: '4532'
                        billing_address:
                          type: object
                          description: Cardholder billing address on file
                          properties:
                            line1:
                              type: string
                              example: 123 Main Street
                            city:
                              type: string
                              example: New York
                            state:
                              type: string
                              example: NY
                            postal_code:
                              type: string
                              example: '10001'
                            country:
                              type: string
                              example: US
                        updated_at:
                          type: string
                          description: ISO 8601 timestamp
                          format: date-time
                          example: '2025-06-15T14:30:00Z'
                      required:
                      - card_id
                      - status
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
                required:
                - data
                - pagination
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
  /cards/{card_id}:
    get:
      operationId: getManagedCard
      summary: Get card details
      description: Retrieves the full management details of a card including its current status, cardholder information, billing
        address, card type, network, and last update timestamp. Use this to display card details in the management portal.
      tags:
      - Card Lifecycle
      parameters:
      - name: card_id
        in: path
        required: true
        description: Unique card id
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  card_id:
                    type: string
                    description: Unique card identifier
                    example: card-8a2f4b91
                  masked_pan:
                    type: string
                    description: Masked primary account number
                    example: '****-****-****-4532'
                  cardholder_name:
                    type: string
                    description: Full name of the cardholder as embossed on the card
                    example: Jane A. Doe
                  card_type:
                    type: string
                    description: Card product type
                    example: CREDIT
                    enum:
                    - DEBIT
                    - CREDIT
                    - PREPAID
                    - CHARGE
                  status:
                    type: string
                    description: Current card status
                    example: ACTIVE
                    enum:
                    - ACTIVE
                    - INACTIVE
                    - BLOCKED
                    - CLOSED
                    - EXPIRED
                    - LOST
                    - STOLEN
                  expiry_date:
                    type: string
                    description: Card expiration date in MM/YY format
                    example: 12/27
                    pattern: ^(0[1-9]|1[0-2])/[0-9]{2}$
                  network:
                    type: string
                    description: Card payment network
                    example: VISA
                    enum:
                    - VISA
                    - MASTERCARD
                    - AMEX
                  last_four:
                    type: string
                    description: Last four digits of the PAN
                    example: '4532'
                  billing_address:
                    type: object
                    description: Cardholder billing address on file
                    properties:
                      line1:
                        type: string
                        example: 123 Main Street
                      city:
                        type: string
                        example: New York
                      state:
                        type: string
                        example: NY
                      postal_code:
                        type: string
                        example: '10001'
                      country:
                        type: string
                        example: US
                  updated_at:
                    type: string
                    description: ISO 8601 timestamp
                    format: date-time
                    example: '2025-06-15T14:30:00Z'
                required:
                - card_id
                - status
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
    patch:
      operationId: updateCardDetails
      summary: Update card details
      description: Updates editable card details such as the cardholder's billing address. Changes to the cardholder name
        require identity verification and may trigger a card reissue. Only ACTIVE cards can be updated. The card's updated_at
        timestamp is set to the current time.
      tags:
      - Card Lifecycle
      parameters:
      - name: card_id
        in: path
        required: true
        description: Unique card id
        schema:
          type: string
      requestBody:
        required: true
        description: Update card details request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                billing_address:
                  type: object
                  description: Cardholder billing address on file
                  properties:
                    line1:
                      type: string
                      example: 123 Main Street
                    city:
                      type: string
                      example: New York
                    state:
                      type: string
                      example: NY
                    postal_code:
                      type: string
                      example: '10001'
                    country:
                      type: string
                      example: US
                cardholder_name:
                  type: string
                  description: Full name of the cardholder as embossed on the card
                  example: Jane A. Doe
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  card_id:
                    type: string
                    description: Unique card identifier
                    example: card-8a2f4b91
                  masked_pan:
                    type: string
                    description: Masked primary account number
                    example: '****-****-****-4532'
                  cardholder_name:
                    type: string
                    description: Full name of the cardholder as embossed on the card
                    example: Jane A. Doe
                  card_type:
                    type: string
                    description: Card product type
                    example: CREDIT
                    enum:
                    - DEBIT
                    - CREDIT
                    - PREPAID
                    - CHARGE
                  status:
                    type: string
                    description: Current card status
                    example: ACTIVE
                    enum:
                    - ACTIVE
                    - INACTIVE
                    - BLOCKED
                    - CLOSED
                    - EXPIRED
                    - LOST
                    - STOLEN
                  expiry_date:
                    type: string
                    description: Card expiration date in MM/YY format
                    example: 12/27
                    pattern: ^(0[1-9]|1[0-2])/[0-9]{2}$
                  network:
                    type: string
                    description: Card payment network
                    example: VISA
                    enum:
                    - VISA
                    - MASTERCARD
                    - AMEX
                  last_four:
                    type: string
                    description: Last four digits of the PAN
                    example: '4532'
                  billing_address:
                    type: object
                    description: Cardholder billing address on file
                    properties:
                      line1:
                        type: string
                        example: 123 Main Street
                      city:
                        type: string
                        example: New York
                      state:
                        type: string
                        example: NY
                      postal_code:
                        type: string
                        example: '10001'
                      country:
                        type: string
                        example: US
                  updated_at:
                    type: string
                    description: ISO 8601 timestamp
                    format: date-time
                    example: '2025-06-15T14:30:00Z'
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
  /cards/{card_id}/block:
    post:
      operationId: blockCard
      summary: Block a card
      description: Temporarily blocks a card, preventing all new transactions including POS, ATM, online, and contactless.
        Existing pre-authorized transactions may still settle. The card can be unblocked later. Use this when the cardholder
        suspects unauthorized activity but has not confirmed fraud. The block takes effect within 30 seconds across all authorization
        systems.
      tags:
      - Card Lifecycle
      parameters:
      - name: card_id
        in: path
        required: true
        description: Unique card id
        schema:
          type: string
      requestBody:
        required: true
        description: Block a card request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for blocking the card
                  example: Suspected unauthorized activity
                notify_cardholder:
                  type: boolean
                  description: Whether to send a notification to the cardholder
                  example: true
              required:
              - reason
      responses:
        '201':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  card_id:
                    type: string
                    description: Unique card identifier
                    example: card-8a2f4b91
                  masked_pan:
                    type: string
                    description: Masked primary account number
                    example: '****-****-****-4532'
                  cardholder_name:
                    type: string
                    description: Full name of the cardholder as embossed on the card
                    example: Jane A. Doe
                  card_type:
                    type: string
                    description: Card product type
                    example: CREDIT
                    enum:
                    - DEBIT
                    - CREDIT
                    - PREPAID
                    - CHARGE
                  status:
                    type: string
                    description: Current card status
                    example: ACTIVE
                    enum:
                    - ACTIVE
                    - INACTIVE
                    - BLOCKED
                    - CLOSED
                    - EXPIRED
                    - LOST
                    - STOLEN
                  expiry_date:
                    type: string
                    description: Card expiration date in MM/YY format
                    example: 12/27
                    pattern: ^(0[1-9]|1[0-2])/[0-9]{2}$
                  network:
                    type: string
                    description: Card payment network
                    example: VISA
                    enum:
                    - VISA
                    - MASTERCARD
                    - AMEX
                  last_four:
                    type: string
                    description: Last four digits of the PAN
                    example: '4532'
                  billing_address:
                    type: object
                    description: Cardholder billing address on file
                    properties:
                      line1:
                        type: string
                        example: 123 Main Street
                      city:
                        type: string
                        example: New York
                      state:
                        type: string
                        example: NY
                      postal_code:
                        type: string
                        example: '10001'
                      country:
                        type: string
                        example: US
                  updated_at:
                    type: string
                    description: ISO 8601 timestamp
                    format: date-time
                    example: '2025-06-15T14:30:00Z'
                required:
                - card_id
                - status
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
  /cards/{card_id}/unblock:
    post:
      operationId: unblockCard
      summary: Unblock a card
      description: Removes the temporary block on a card, restoring it to ACTIVE status. All transaction channels are re-enabled
        according to the card's control settings. The cardholder is notified of the status change. Only cards in BLOCKED status
        can be unblocked; cards reported as lost or stolen require reissuance.
      tags:
      - Card Lifecycle
      parameters:
      - name: card_id
        in: path
        required: true
        description: Unique card id
        schema:
          type: string
      requestBody:
        required: true
        description: Unblock a card request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for unblocking
                  example: Cardholder confirmed transactions were legitimate
      responses:
        '201':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  card_id:
                    type: string
                    description: Unique card identifier
                    example: card-8a2f4b91
                  masked_pan:
                    type: string
                    description: Masked primary account number
                    example: '****-****-****-4532'
                  cardholder_name:
                    type: string
                    description: Full name of the cardholder as embossed on the card
                    example: Jane A. Doe
                  card_type:
                    type: string
                    description: Card product type
                    example: CREDIT
                    enum:
                    - DEBIT
                    - CREDIT
                    - PREPAID
                    - CHARGE
                  status:
                    type: string
                    description: Current card status
                    example: ACTIVE
                    enum:
                    - ACTIVE
                    - INACTIVE
                    - BLOCKED
                    - CLOSED
                    - EXPIRED
                    - LOST
                    - STOLEN
                  expiry_date:
                    type: string
                    description: Card expiration date in MM/YY format
                    example: 12/27
                    pattern: ^(0[1-9]|1[0-2])/[0-9]{2}$
                  network:
                    type: string
                    description: Card payment network
                    example: VISA
                    enum:
                    - VISA
                    - MASTERCARD
                    - AMEX
                  last_four:
                    type: string
                    description: Last four digits of the PAN
                    example: '4532'
                  billing_address:
                    type: object
                    description: Cardholder billing address on file
                    properties:
                      line1:
                        type: string
                        example: 123 Main Street
                      city:
                        type: string
                        example: New York
                      state:
                        type: string
                        example: NY
                      postal_code:
                        type: string
                        example: '10001'
                      country:
                        type: string
                        example: US
                  updated_at:
                    type: string
                    description: ISO 8601 timestamp
                    format: date-time
                    example: '2025-06-15T14:30:00Z'
                required:
                - card_id
                - status
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
  /cards/{card_id}/report-lost:
    post:
      operationId: reportCardLost
      summary: Report a card as lost
      description: Reports a card as lost and immediately blocks all transactions. Unlike a standard block, a lost card cannot
        be unblocked and requires replacement. A replacement card is automatically queued unless the cardholder declines.
        The fraud detection system is alerted to monitor for any attempted usage of the lost card.
      tags:
      - Card Lifecycle
      parameters:
      - name: card_id
        in: path
        required: true
        description: Unique card id
        schema:
          type: string
      requestBody:
        required: true
        description: Report a card as lost request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                last_known_location:
                  type: string
                  description: Where the cardholder last had the card
                  example: Restaurant on 5th Avenue, New York
                auto_replace:
                  type: boolean
                  description: Whether to automatically order a replacement card
                  example: true
                  default: true
      responses:
        '201':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  card_id:
                    type: string
                    description: Unique card identifier
                    example: card-8a2f4b91
                  status:
                    type: string
                    description: Current card status
                    example: LOST
                    enum:
                    - ACTIVE
                    - INACTIVE
                    - BLOCKED
                    - CLOSED
                    - EXPIRED
                    - LOST
                    - STOLEN
                  replacement_card_id:
                    type: string
                    description: Replacement card identifier if auto_replace is true
                    example: card-9b3f5c82
                    nullable: true
                required:
                - card_id
                - status
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
  /cards/{card_id}/report-stolen:
    post:
      operationId: reportCardStolen
      summary: Report a card as stolen
      description: Reports a card as stolen and immediately blocks all transactions. Triggers an automatic fraud review of
        recent transactions within the last 48 hours. Any suspicious transactions are flagged for dispute. A replacement card
        is automatically ordered with expedited shipping. A police report reference can be recorded.
      tags:
      - Card Lifecycle
      parameters:
      - name: card_id
        in: path
        required: true
        description: Unique card id
        schema:
          type: string
      requestBody:
        required: true
        description: Report a card as stolen request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                police_report_number:
                  type: string
                  description: Police report reference number, if available
                  example: NYPD-2025-123456
                last_used_at:
                  type: string
                  description: When the cardholder last knowingly used the card
                  format: date-time
                  example: '2025-06-15T14:30:00Z'
                auto_replace:
                  type: boolean
                  description: Order a replacement card
                  example: true
                  default: true
      responses:
        '201':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  card_id:
                    type: string
                    description: Unique card identifier
                    example: card-8a2f4b91
                  status:
                    type: string
                    description: Current card status
                    example: STOLEN
                    enum:
                    - ACTIVE
                    - INACTIVE
                    - BLOCKED
                    - CLOSED
                    - EXPIRED
                    - LOST
                    - STOLEN
                  replacement_card_id:
                    type: string
                    description: Unique card identifier
                    example: card-9b3f5c82
                    nullable: true
                  fraud_review_id:
                    type: string
                    description: Automatic fraud review case ID
                    example: frd-review-4a8c21
                required:
                - card_id
                - status
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
  /cards/{card_id}/replace:
    post:
      operationId: requestReplacement
      summary: Request a replacement card
      description: Requests a physical replacement for a card that is damaged, has a worn magnetic stripe, or for any other
        non-fraud reason. The replacement card is issued with a new PAN, expiry, and CVV unless PAN retention is requested.
        The original card remains active until the replacement is activated.
      tags:
      - Card Lifecycle
      parameters:
      - name: card_id
        in: path
        required: true
        description: Unique card id
        schema:
          type: string
      requestBody:
        required: true
        description: Request a replacement card request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for replacement
                  example: DAMAGED
                  enum:
                  - DAMAGED
                  - WORN_STRIPE
                  - CHIP_MALFUNCTION
                  - NAME_CHANGE
                  - ADDRESS_CHANGE
                  - OTHER
                retain_pan:
                  type: boolean
                  description: Keep the same card number on the replacement
                  example: true
                shipping_method:
                  type: string
                  description: Shipping speed for the replacement
                  example: STANDARD
                  enum:
                  - STANDARD
                  - EXPRESS
                  - OVERNIGHT
              required:
              - reason
      responses:
        '201':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  replacement_card_id:
                    type: string
                    description: Unique card identifier
                    example: card-9b3f5c82
                  estimated_delivery:
                    type: string
                    format: date
                    example: '2025-06-22'
                  original_card_status:
                    type: string
                    description: Status of the original card (remains ACTIVE until replacement is activated)
                    example: ACTIVE
                    enum:
                    - ACTIVE
                    - INACTIVE
                    - BLOCKED
                    - CLOSED
                    - EXPIRED
                    - LOST
                    - STOLEN
                required:
                - replacement_card_id
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
  /cards/{card_id}/close:
    post:
      operationId: closeCard
      summary: Permanently close a card account
      description: Permanently closes a card account. All pending authorizations are voided and the card is immediately blocked.
        For credit cards, any outstanding balance must be paid before closure is finalized. This action is irreversible. Recurring
        payments linked to this card should be migrated before closure.
      tags:
      - Card Lifecycle
      parameters:
      - name: card_id
        in: path
        required: true
        description: Unique card id
        schema:
          type: string
      requestBody:
        required: true
        description: Permanently close a card account request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for account closure
                  example: Cardholder requested account closure
                waive_annual_fee:
                  type: boolean
                  description: Waive any prorated annual fee for the current year
                  example: false
              required:
              - reason
      responses:
        '201':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  card_id:
                    type: string
                    description: Unique card identifier
                    example: card-8a2f4b91
                  status:
                    type: string
                    description: Current card status
                    example: CLOSED
                    enum:
                    - ACTIVE
                    - INACTIVE
                    - BLOCKED
                    - CLOSED
                    - EXPIRED
                    - LOST
                    - STOLEN
                  outstanding_balance:
                    type: number
                    description: Remaining balance that must be paid
                    format: double
                    example: 0.0
                  closed_at:
                    type: string
                    description: ISO 8601 timestamp
                    format: date-time
                    example: '2025-06-15T14:30:00Z'
                required:
                - card_id
                - status
        '400':
