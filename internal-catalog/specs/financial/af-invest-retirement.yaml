openapi: 3.0.3
info:
  title: Acme Finance Retirement Accounts API
  description: Retirement account management covering Traditional IRA, Roth IRA, SEP IRA, 401(k), 403(b), and 457(b) plans.
    Provides contribution tracking with annual limit enforcement, Required Minimum Distribution (RMD) calculations using IRS
    Uniform Lifetime Table, rollover processing, Roth conversion analysis with tax impact estimation, beneficiary designation,
    and retirement income projection modeling.
  version: 2.4.0
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-invest-retirement
  x-acme-domain: invest
servers:
- url: https://af-invest-retirement.api.acmefin.com/v1
  description: Production
- url: https://af-invest-retirement.staging.acmefin.com/v1
  description: Staging
security:
- BearerAuth: []
tags:
- name: Retirement Accounts
  description: Retirement account profiles with contribution limits and eligibility status
- name: Contributions
  description: Contribution recording, limit tracking, and catch-up eligibility
- name: RMD
  description: Required Minimum Distribution calculations using IRS life expectancy tables
- name: Rollovers
  description: Direct and 60-day indirect rollover processing between retirement accounts
- name: Roth Conversion
  description: Traditional-to-Roth IRA conversion analysis and execution
- name: Beneficiaries
  description: Beneficiary designation management for retirement accounts
- name: Projections
  description: Retirement income projection modeling under multiple scenarios
paths:
  /retirement-accounts:
    get:
      operationId: listRetirementAccounts
      summary: List retirement accounts
      description: Retrieve all retirement accounts for the authenticated user with account types, balances, contribution
        limits, catch-up eligibility, and RMD status.
      tags:
      - Retirement Accounts
      parameters:
      - name: page
        in: query
        required: false
        description: Page number for pagination
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: per_page
        in: query
        required: false
        description: Number of results per page (max 100)
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: sort_by
        in: query
        required: false
        description: Field to sort results by
        schema:
          type: string
      - name: sort_order
        in: query
        required: false
        description: Sort direction
        schema:
          type: string
          enum:
          - asc
          - desc
          default: desc
      - name: account_type
        in: query
        required: false
        description: Filter by account type
        schema:
          type: string
          enum:
          - traditional_ira
          - roth_ira
          - 401k
          - 403b
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        retirement_account_id:
                          type: string
                          description: Retirement account identifier
                          format: uuid
                          example: ret-a1b2c3d4
                        account_type:
                          type: string
                          description: Retirement account type
                          enum:
                          - traditional_ira
                          - roth_ira
                          - sep_ira
                          - simple_ira
                          - 401k
                          - 403b
                          - 457b
                          - solo_401k
                        account_holder:
                          type: string
                          description: Account holder name
                          example: Jane Doe
                        date_of_birth:
                          type: string
                          description: Account holder date of birth
                          format: date
                          example: '1970-05-15'
                        balance:
                          type: object
                          description: Current account balance
                          properties:
                            amount:
                              type: number
                              description: Monetary amount
                              format: double
                              example: 485000.0
                            currency:
                              type: string
                              description: ISO 4217 currency code
                              example: USD
                        ytd_contributions:
                          type: object
                          description: Year-to-date contributions
                          properties:
                            amount:
                              type: number
                              description: Monetary amount
                              format: double
                              example: 6500.0
                            currency:
                              type: string
                              description: ISO 4217 currency code
                              example: USD
                        contribution_limit:
                          type: object
                          description: Annual contribution limit
                          properties:
                            amount:
                              type: number
                              description: Monetary amount
                              format: double
                              example: 7000.0
                            currency:
                              type: string
                              description: ISO 4217 currency code
                              example: USD
                        remaining_contribution_room:
                          type: object
                          description: Remaining contribution room for the year
                          properties:
                            amount:
                              type: number
                              description: Monetary amount
                              format: double
                              example: 500.0
                            currency:
                              type: string
                              description: ISO 4217 currency code
                              example: USD
                        catch_up_eligible:
                          type: boolean
                          description: Whether holder is eligible for catch-up contributions (age 50+)
                          example: true
                        beneficiary_designated:
                          type: boolean
                          description: Whether beneficiary has been designated
                          example: true
                        rmd_required:
                          type: boolean
                          description: Whether required minimum distributions apply
                          example: false
                      required:
                      - retirement_account_id
                      - account_type
                      - balance
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
                required:
                - data
                - pagination
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
  /retirement-accounts/{retirement_account_id}:
    get:
      operationId: getRetirementAccount
      summary: Get retirement account details
      description: Retrieve detailed retirement account information including balance, contribution history, limits, catch-up
        eligibility, beneficiary status, and RMD requirements.
      tags:
      - Retirement Accounts
      parameters:
      - name: retirement_account_id
        in: path
        required: true
        description: Unique retirement account id
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  retirement_account_id:
                    type: string
                    description: Retirement account identifier
                    format: uuid
                    example: ret-a1b2c3d4
                  account_type:
                    type: string
                    description: Retirement account type
                    enum:
                    - traditional_ira
                    - roth_ira
                    - sep_ira
                    - simple_ira
                    - 401k
                    - 403b
                    - 457b
                    - solo_401k
                  account_holder:
                    type: string
                    description: Account holder name
                    example: Jane Doe
                  date_of_birth:
                    type: string
                    description: Account holder date of birth
                    format: date
                    example: '1970-05-15'
                  balance:
                    type: object
                    description: Current account balance
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: 485000.0
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                  ytd_contributions:
                    type: object
                    description: Year-to-date contributions
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: 6500.0
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                  contribution_limit:
                    type: object
                    description: Annual contribution limit
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: 7000.0
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                  remaining_contribution_room:
                    type: object
                    description: Remaining contribution room for the year
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: 500.0
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                  catch_up_eligible:
                    type: boolean
                    description: Whether holder is eligible for catch-up contributions (age 50+)
                    example: true
                  beneficiary_designated:
                    type: boolean
                    description: Whether beneficiary has been designated
                    example: true
                  rmd_required:
                    type: boolean
                    description: Whether required minimum distributions apply
                    example: false
                required:
                - retirement_account_id
                - account_type
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
  /retirement-accounts/{retirement_account_id}/contributions:
    get:
      operationId: listContributions
      summary: List contributions
      description: Retrieve contribution history for a retirement account with amounts, types (regular, catch-up, employer
        match, rollover), and tax year attribution.
      tags:
      - Contributions
      parameters:
      - name: page
        in: query
        required: false
        description: Page number for pagination
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: per_page
        in: query
        required: false
        description: Number of results per page (max 100)
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: sort_by
        in: query
        required: false
        description: Field to sort results by
        schema:
          type: string
      - name: sort_order
        in: query
        required: false
        description: Sort direction
        schema:
          type: string
          enum:
          - asc
          - desc
          default: desc
      - name: tax_year
        in: query
        required: false
        description: Filter by tax year
        schema:
          type: integer
      - name: contribution_type
        in: query
        required: false
        description: Filter by type
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        contribution_id:
                          type: string
                          description: Contribution identifier
                          format: uuid
                          example: contrib-a1b2c3d4
                        retirement_account_id:
                          type: string
                          description: Retirement account
                          format: uuid
                          example: ret-a1b2c3d4
                        amount:
                          type: object
                          description: Contribution amount
                          properties:
                            amount:
                              type: number
                              description: Monetary amount
                              format: double
                              example: 500.0
                            currency:
                              type: string
                              description: ISO 4217 currency code
                              example: USD
                        contribution_type:
                          type: string
                          description: Contribution type
                          enum:
                          - regular
                          - catch_up
                          - employer_match
                          - rollover
                        tax_year:
                          type: integer
                          description: Tax year for contribution
                          example: 2025
                        date:
                          type: string
                          description: Contribution date
                          format: date
                          example: '2025-06-15'
                        status:
                          type: string
                          description: Contribution status
                          enum:
                          - pending
                          - completed
                          - reversed
                      required:
                      - contribution_id
                      - amount
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
                required:
                - data
                - pagination
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
    post:
      operationId: makeContribution
      summary: Make a contribution
      description: Submit a contribution to a retirement account. Validates against annual contribution limits including catch-up
        contribution eligibility for holders age 50+. Contributions are attributed to the specified tax year.
      tags:
      - Contributions
      requestBody:
        required: true
        description: Make a contribution request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: object
                  description: Contribution amount
                  properties:
                    amount:
                      type: number
                      description: Monetary amount
                      format: double
                      example: 500.0
                    currency:
                      type: string
                      description: ISO 4217 currency code
                      example: USD
                contribution_type:
                  type: string
                  description: Contribution type
                  enum:
                  - regular
                  - catch_up
                tax_year:
                  type: integer
                  description: Tax year for contribution
                  example: 2025
                source_account_id:
                  type: string
                  description: Funding source bank/brokerage account
                  example: acct-funding-001
              required:
              - amount
              - contribution_type
              - tax_year
      responses:
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  contribution_id:
                    type: string
                    description: Contribution identifier
                    format: uuid
                    example: contrib-a1b2c3d4
                  retirement_account_id:
                    type: string
                    description: Retirement account
                    format: uuid
                    example: ret-a1b2c3d4
                  amount:
                    type: object
                    description: Contribution amount
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: 500.0
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                  contribution_type:
                    type: string
                    description: Contribution type
                    enum:
                    - regular
                    - catch_up
                    - employer_match
                    - rollover
                  tax_year:
                    type: integer
                    description: Tax year for contribution
                    example: 2025
                  date:
                    type: string
                    description: Contribution date
                    format: date
                    example: '2025-06-15'
                  status:
                    type: string
                    description: Contribution status
                    enum:
                    - pending
                    - completed
                    - reversed
                required:
                - contribution_id
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
  /retirement-accounts/{retirement_account_id}/rmd:
    get:
      operationId: calculateRMD
      summary: Calculate RMD
      description: Calculate the Required Minimum Distribution for the current tax year using the IRS Uniform Lifetime Table.
        Shows the prior-year-end balance, life expectancy factor, calculated RMD amount, and remaining distribution needed
        to satisfy the requirement.
      tags:
      - RMD
      parameters:
      - name: retirement_account_id
        in: path
        required: true
        description: Retirement account identifier
        schema:
          type: string
      - name: tax_year
        in: query
        required: false
        description: Tax year for RMD calculation, defaults to current year
        schema:
          type: integer
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  retirement_account_id:
                    type: string
                    description: Retirement account
                    format: uuid
                    example: ret-a1b2c3d4
                  tax_year:
                    type: integer
                    description: RMD tax year
                    example: 2025
                  prior_year_balance:
                    type: object
                    description: December 31 balance of prior year
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: 485000.0
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                  distribution_period:
                    type: number
                    description: IRS life expectancy factor
                    format: double
                    example: 24.6
                  rmd_amount:
                    type: object
                    description: Required minimum distribution amount
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: 19715.45
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                  amount_distributed_ytd:
                    type: object
                    description: Amount already distributed this year
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: 10000.0
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                  remaining_rmd:
                    type: object
                    description: Remaining RMD to satisfy
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: 9715.45
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                  deadline:
                    type: string
                    description: RMD deadline
                    format: date
                    example: '2025-12-31'
                required:
                - retirement_account_id
                - rmd_amount
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
  /rollovers:
    get:
      operationId: listRollovers
      summary: List rollovers
      description: Retrieve rollover requests across retirement accounts with status tracking for direct and indirect (60-day)
        rollovers.
      tags:
      - Rollovers
      parameters:
      - name: page
        in: query
        required: false
        description: Page number for pagination
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: per_page
        in: query
        required: false
        description: Number of results per page (max 100)
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: sort_by
        in: query
        required: false
        description: Field to sort results by
        schema:
          type: string
      - name: sort_order
        in: query
        required: false
        description: Sort direction
        schema:
          type: string
          enum:
          - asc
          - desc
          default: desc
      - name: status
        in: query
        required: false
        description: Filter by status
        schema:
          type: string
          enum:
          - initiated
          - in_transit
          - completed
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        rollover_id:
                          type: string
                          description: Rollover identifier
                          format: uuid
                          example: roll-a1b2c3d4
                        source_account:
                          type: string
                          description: Source retirement account or plan
                          example: Previous Employer 401(k)
                        source_type:
                          type: string
                          description: Source account type
                          enum:
                          - 401k
                          - 403b
                          - traditional_ira
                          - roth_ira
                          - pension
                        destination_account_id:
                          type: string
                          description: Destination retirement account
                          format: uuid
                          example: ret-a1b2c3d4
                        amount:
                          type: object
                          description: Rollover amount
                          properties:
                            amount:
                              type: number
                              description: Monetary amount
                              format: double
                              example: 125000.0
                            currency:
                              type: string
                              description: ISO 4217 currency code
                              example: USD
                        rollover_type:
                          type: string
                          description: Rollover method
                          enum:
                          - direct
                          - indirect_60_day
                        status:
                          type: string
                          description: Rollover status
                          enum:
                          - initiated
                          - in_transit
                          - completed
                          - rejected
                        initiated_at:
                          type: string
                          description: Rollover initiation date
                          format: date-time
                          example: '2025-06-15T14:30:00Z'
                      required:
                      - rollover_id
                      - status
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
                required:
                - data
                - pagination
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
    post:
      operationId: initiateRollover
      summary: Initiate a rollover
      description: Initiate a direct or 60-day indirect rollover from an external retirement plan or IRA into an Acme Finance
        retirement account. Direct rollovers are transferred trustee-to-trustee; indirect rollovers must be completed within
        60 days.
      tags:
      - Rollovers
      requestBody:
        required: true
        description: Initiate a rollover request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                source_account:
                  type: string
                  description: Source account or plan name
                  example: Previous Employer 401(k)
                source_type:
                  type: string
                  description: Source type
                  enum:
                  - 401k
                  - 403b
                  - traditional_ira
                  - roth_ira
                destination_account_id:
                  type: string
                  description: Destination retirement account
                  format: uuid
                  example: ret-a1b2c3d4
                amount:
                  type: object
                  description: Rollover amount
                  properties:
                    amount:
                      type: number
                      description: Monetary amount
                      format: double
                      example: 125000.0
                    currency:
                      type: string
                      description: ISO 4217 currency code
                      example: USD
                rollover_type:
                  type: string
                  description: Rollover method
                  enum:
                  - direct
                  - indirect_60_day
              required:
              - source_account
              - source_type
              - destination_account_id
              - amount
              - rollover_type
      responses:
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  rollover_id:
                    type: string
                    description: Rollover identifier
                    format: uuid
                    example: roll-a1b2c3d4
                  source_account:
                    type: string
                    description: Source retirement account or plan
                    example: Previous Employer 401(k)
                  source_type:
                    type: string
                    description: Source account type
                    enum:
                    - 401k
                    - 403b
                    - traditional_ira
                    - roth_ira
                    - pension
                  destination_account_id:
                    type: string
                    description: Destination retirement account
                    format: uuid
                    example: ret-a1b2c3d4
                  amount:
                    type: object
                    description: Rollover amount
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: 125000.0
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                  rollover_type:
                    type: string
                    description: Rollover method
                    enum:
                    - direct
                    - indirect_60_day
                  status:
                    type: string
                    description: Rollover status
                    enum:
                    - initiated
                    - in_transit
                    - completed
                    - rejected
                  initiated_at:
                    type: string
                    description: Rollover initiation date
                    format: date-time
                    example: '2025-06-15T14:30:00Z'
                required:
                - rollover_id
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
  /retirement-accounts/{retirement_account_id}/roth-conversion:
    post:
      operationId: analyzeRothConversion
      summary: Analyze Roth conversion
      description: Analyze the tax impact of converting Traditional IRA assets to a Roth IRA. Estimates federal income tax
        based on the conversion amount and current marginal tax bracket. Useful for tax planning in low- income years.
      tags:
      - Roth Conversion
      requestBody:
        required: true
        description: Analyze Roth conversion request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                conversion_amount:
                  type: object
                  description: Amount to convert
                  properties:
                    amount:
                      type: number
                      description: Monetary amount
                      format: double
                      example: 50000.0
                    currency:
                      type: string
                      description: ISO 4217 currency code
                      example: USD
                estimated_taxable_income:
                  type: object
                  description: Estimated taxable income for the year (excluding conversion)
                  properties:
                    amount:
                      type: number
                      description: Monetary amount
                      format: double
                      example: 75000.0
                    currency:
                      type: string
                      description: ISO 4217 currency code
                      example: USD
                filing_status:
                  type: string
                  description: Tax filing status
                  enum:
                  - single
                  - married_filing_jointly
                  - married_filing_separately
                  - head_of_household
              required:
              - conversion_amount
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversion_id:
                    type: string
                    description: Roth conversion identifier
                    format: uuid
                    example: conv-a1b2c3d4
                  source_account_id:
                    type: string
                    description: Traditional IRA source account
                    format: uuid
                    example: ret-a1b2c3d4
