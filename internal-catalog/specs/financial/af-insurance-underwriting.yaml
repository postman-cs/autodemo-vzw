        description: Issue conditional approval request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    approved_premium:
                      type: number
                      format: double
                      example: 28500.0
                    conditions:
                      type: array
                      description: Stipulations that must be satisfied
                      items:
                        type: object
                    conditional_period_days:
                      type: integer
                      description: Days allowed to satisfy conditions
                      example: 60
              required:
                - approved_premium
                - conditions
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  conditional_approval_id:
                    type: string
                    example: "CAP-00482917"
                  conditions_count:
                    type: integer
                  deadline:
                    type: string
                    format: date
                  status:
                    type: string
