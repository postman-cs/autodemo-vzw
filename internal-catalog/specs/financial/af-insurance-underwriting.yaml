openapi: 3.0.3
info:
  title: Acme Finance Insurance Underwriting API
  description: >-
    End-to-end underwriting workflow from submission intake through risk evaluation, medical and financial
    requirements gathering, approval or decline decision, conditional approvals with stipulations, and exception
    processing. Supports personal and commercial lines underwriting with configurable authority levels, automated
    risk scoring using predictive models, and guideline management. Integrates with third-party data sources
    including LexisNexis, D&B, ISO, CLUE, MIB, and prescription drug databases for comprehensive risk assessment.
  version: 2.1.0
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-insurance-underwriting
  x-acme-domain: insurance
servers:
  - url: https://af-insurance-underwriting.api.acmefin.com/v1
    description: Production
  - url: https://af-insurance-underwriting.staging.acmefin.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Submissions
    description: Underwriting submission intake, assignment, and status tracking
  - name: Risk Evaluation
    description: Risk scoring, hazard assessment, and underwriting analysis
  - name: Medical Requirements
    description: APS ordering, paramedical exam tracking, and medical evidence management
  - name: Decisions
    description: Approval, decline, conditional approval, and referral processing
  - name: Exceptions
    description: Underwriting guideline exceptions, rate deviations, and authority overrides
paths:
  /underwriting/submissions:
    get:
      operationId: listSubmissions
      summary: List underwriting submissions
      description: >-
        Retrieve a paginated list of underwriting submissions. Filter by line of business, submission type,
        status, assigned underwriter, or date range. Includes priority indicators for workload management.
      tags:
        - Submissions
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: line_of_business
          in: query
          required: false
          description: Filter by line of business
          schema:
            type: "string"
        - name: status
          in: query
          required: false
          description: Filter by submission status
          schema:
            type: "string"
            enum:
              - RECEIVED
              - IN_REVIEW
              - INFORMATION_REQUESTED
              - RISK_EVALUATED
              - APPROVED
              - DECLINED
              - CONDITIONAL
              - REFERRED
              - BOUND
              - WITHDRAWN
        - name: assigned_underwriter
          in: query
          required: false
          description: Filter by underwriter
          schema:
            type: "string"
        - name: priority
          in: query
          required: false
          description: Filter by priority level
          schema:
            type: "string"
            enum:
              - STANDARD
              - EXPEDITED
              - RUSH
        - name: submission_type
          in: query
          required: false
          description: Filter by submission type
          schema:
            type: "string"
            enum:
              - NEW_BUSINESS
              - RENEWAL
              - REWRITE
              - TAKEOVER
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        submission_id:
                          type: string
                          description: Underwriting submission number
                          example: "UWS-2024-00482917"
                        applicant_name:
                          type: string
                          example: "Meridian Technology Solutions Inc."
                        line_of_business:
                          type: string
                          example: "COMMERCIAL_PROPERTY"
                          enum:
                            - PERSONAL_AUTO
                            - HOMEOWNERS
                            - COMMERCIAL_PROPERTY
                            - GENERAL_LIABILITY
                            - WORKERS_COMP
                            - PROFESSIONAL_LIABILITY
                            - CYBER_LIABILITY
                            - D_AND_O
                            - EPLI
                        submission_type:
                          type: string
                          example: "NEW_BUSINESS"
                          enum:
                            - NEW_BUSINESS
                            - RENEWAL
                            - REWRITE
                            - TAKEOVER
                        requested_effective_date:
                          type: string
                          format: date
                          example: "2024-10-01"
                        total_insured_value:
                          type: number
                          description: Total insured value or exposure
                          format: double
                          example: 5000000.0
                        status:
                          type: string
                          example: "IN_REVIEW"
                          enum:
                            - RECEIVED
                            - IN_REVIEW
                            - INFORMATION_REQUESTED
                            - RISK_EVALUATED
                            - APPROVED
                            - DECLINED
                            - CONDITIONAL
                            - REFERRED
                            - BOUND
                            - WITHDRAWN
                        assigned_underwriter:
                          type: string
                          description: Assigned underwriter
                          example: "UW-00291"
                        priority:
                          type: string
                          example: "STANDARD"
                          enum:
                            - STANDARD
                            - EXPEDITED
                            - RUSH
                        sic_code:
                          type: string
                          description: Standard Industrial Classification code
                          example: "7372"
                        naics_code:
                          type: string
                          description: North American Industry Classification code
                          example: "511210"
                        submitted_date:
                          type: string
                          format: date
                          example: "2024-08-15"
                        target_premium:
                          type: number
                          description: Target premium based on rating
                          format: double
                          example: 28500.0
                      required:
                        - submission_id
                        - applicant_name
                        - line_of_business
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: createSubmission
      summary: Submit for underwriting
      description: >-
        Submit a new insurance application for underwriting review. The submission is assigned to an
        underwriter based on line of business, authority level, and workload balancing. Automated screening
        checks run immediately including OFAC sanctions, prior cancellation history, and loss history
        queries.
      tags:
        - Submissions
      requestBody:
        required: true
        description: Submit for underwriting request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    applicant_name:
                      type: string
                      example: "Meridian Technology Solutions Inc."
                    line_of_business:
                      type: string
                      example: "COMMERCIAL_PROPERTY"
                      enum:
                        - PERSONAL_AUTO
                        - HOMEOWNERS
                        - COMMERCIAL_PROPERTY
                        - GENERAL_LIABILITY
                        - WORKERS_COMP
                        - PROFESSIONAL_LIABILITY
                        - CYBER_LIABILITY
                        - D_AND_O
                        - EPLI
                    submission_type:
                      type: string
                      example: "NEW_BUSINESS"
                      enum:
                        - NEW_BUSINESS
                        - RENEWAL
                        - REWRITE
                        - TAKEOVER
                    requested_effective_date:
                      type: string
                      format: date
                      example: "2024-10-01"
                    total_insured_value:
                      type: number
                      description: Total insured value or exposure
                      format: double
                      example: 5000000.0
                    sic_code:
                      type: string
                      description: Standard Industrial Classification code
                      example: "7372"
                    naics_code:
                      type: string
                      description: North American Industry Classification code
                      example: "511210"
                    priority:
                      type: string
                      example: "STANDARD"
                      enum:
                        - STANDARD
                        - EXPEDITED
                        - RUSH
              required:
                - applicant_name
                - line_of_business
                - submission_type
                - requested_effective_date
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  submission_id:
                    type: string
                    description: Underwriting submission number
                    example: "UWS-2024-00482917"
                  applicant_name:
                    type: string
                    example: "Meridian Technology Solutions Inc."
                  line_of_business:
                    type: string
                    example: "COMMERCIAL_PROPERTY"
                    enum:
                      - PERSONAL_AUTO
                      - HOMEOWNERS
                      - COMMERCIAL_PROPERTY
                      - GENERAL_LIABILITY
                      - WORKERS_COMP
                      - PROFESSIONAL_LIABILITY
                      - CYBER_LIABILITY
                      - D_AND_O
                      - EPLI
                  submission_type:
                    type: string
                    example: "NEW_BUSINESS"
                    enum:
                      - NEW_BUSINESS
                      - RENEWAL
                      - REWRITE
                      - TAKEOVER
                  requested_effective_date:
                    type: string
                    format: date
                    example: "2024-10-01"
                  total_insured_value:
                    type: number
                    description: Total insured value or exposure
                    format: double
                    example: 5000000.0
                  status:
                    type: string
                    example: "IN_REVIEW"
                    enum:
                      - RECEIVED
                      - IN_REVIEW
                      - INFORMATION_REQUESTED
                      - RISK_EVALUATED
                      - APPROVED
                      - DECLINED
                      - CONDITIONAL
                      - REFERRED
                      - BOUND
                      - WITHDRAWN
                  assigned_underwriter:
                    type: string
                    description: Assigned underwriter
                    example: "UW-00291"
                  priority:
                    type: string
                    example: "STANDARD"
                    enum:
                      - STANDARD
                      - EXPEDITED
                      - RUSH
                  sic_code:
                    type: string
                    description: Standard Industrial Classification code
                    example: "7372"
                  naics_code:
                    type: string
                    description: North American Industry Classification code
                    example: "511210"
                  submitted_date:
                    type: string
                    format: date
                    example: "2024-08-15"
                  target_premium:
                    type: number
                    description: Target premium based on rating
                    format: double
                    example: 28500.0
                required:
                  - submission_id
                  - status
                  - assigned_underwriter
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /underwriting/submissions/{submission_id}:
    get:
      operationId: getSubmission
      summary: Retrieve submission details
      description: >-
        Fetch complete underwriting submission details including applicant information, risk
        characteristics, assigned underwriter, outstanding requirements, risk evaluation results, and
        current decision status.
      tags:
        - Submissions
      parameters:
        - name: submission_id
          in: path
          required: true
          description: Unique submission id
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  submission_id:
                    type: string
                    description: Underwriting submission number
                    example: "UWS-2024-00482917"
                  applicant_name:
                    type: string
                    example: "Meridian Technology Solutions Inc."
                  line_of_business:
                    type: string
                    example: "COMMERCIAL_PROPERTY"
                    enum:
                      - PERSONAL_AUTO
                      - HOMEOWNERS
                      - COMMERCIAL_PROPERTY
                      - GENERAL_LIABILITY
                      - WORKERS_COMP
                      - PROFESSIONAL_LIABILITY
                      - CYBER_LIABILITY
                      - D_AND_O
                      - EPLI
                  submission_type:
                    type: string
                    example: "NEW_BUSINESS"
                    enum:
                      - NEW_BUSINESS
                      - RENEWAL
                      - REWRITE
                      - TAKEOVER
                  requested_effective_date:
                    type: string
                    format: date
                    example: "2024-10-01"
                  total_insured_value:
                    type: number
                    description: Total insured value or exposure
                    format: double
                    example: 5000000.0
                  status:
                    type: string
                    example: "IN_REVIEW"
                    enum:
                      - RECEIVED
                      - IN_REVIEW
                      - INFORMATION_REQUESTED
                      - RISK_EVALUATED
                      - APPROVED
                      - DECLINED
                      - CONDITIONAL
                      - REFERRED
                      - BOUND
                      - WITHDRAWN
                  assigned_underwriter:
                    type: string
                    description: Assigned underwriter
                    example: "UW-00291"
                  priority:
                    type: string
                    example: "STANDARD"
                    enum:
                      - STANDARD
                      - EXPEDITED
                      - RUSH
                  sic_code:
                    type: string
                    description: Standard Industrial Classification code
                    example: "7372"
                  naics_code:
                    type: string
                    description: North American Industry Classification code
                    example: "511210"
                  submitted_date:
                    type: string
                    format: date
                    example: "2024-08-15"
                  target_premium:
                    type: number
                    description: Target premium based on rating
                    format: double
                    example: 28500.0
                required:
                  - submission_id
                  - status
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /underwriting/submissions/{submission_id}/risk-evaluation:
    post:
      operationId: performRiskEvaluation
      summary: Perform risk evaluation
      description: >-
        Execute a comprehensive risk evaluation on the submission. The evaluation runs predictive risk
        models, analyzes loss history, assesses financial stability, evaluates hazard exposures, and
        generates a composite risk grade. Results feed into the underwriting decision recommendation.
      tags:
        - Risk Evaluation
      parameters:
        - name: submission_id
          in: path
          required: true
          description: Unique submission id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Perform risk evaluation request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    evaluation_scope:
                      type: string
                      description: Scope of risk evaluation
                      example: "FULL"
                      enum:
                        - FULL
                        - SUPPLEMENTAL
                        - RE_EVALUATION
                    include_third_party_data:
                      type: boolean
                      description: Whether to pull fresh third-party data
                      default: true
                    risk_model_version:
                      type: string
                      description: Risk model version to use
                      example: "v4.2"
              required:
                - evaluation_scope
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  evaluation_id:
                    type: string
                    example: "EVL-00482917"
                  overall_risk_grade:
                    type: string
                    description: Composite risk grade
                    example: "B_GOOD"
                    enum:
                      - A_EXCELLENT
                      - B_GOOD
                      - C_AVERAGE
                      - D_BELOW_AVERAGE
                      - E_POOR
                      - F_UNACCEPTABLE
                  risk_score:
                    type: integer
                    description: Numeric risk score (1-100)
                    example: 72
                    minimum: 1
                    maximum: 100
                  risk_factors:
                    type: array
                    description: Individual risk factor assessments
                    items:
                      type: object
                  loss_history_score:
                    type: integer
                    description: Loss history component score
                    example: 85
                  financial_stability_score:
                    type: integer
                    description: Financial stability component score
                    example: 78
                  hazard_assessment:
                    type: string
                    description: Hazard classification
                    example: "Moderate — standard fire protection, sprinklered"
                  recommendation:
                    type: string
                    example: "APPROVE_STANDARD"
                    enum:
                      - APPROVE_STANDARD
                      - APPROVE_WITH_CONDITIONS
                      - REFER_TO_SENIOR
                      - DECLINE
                  evaluated_by:
                    type: string
                    example: "UW-00291"
                  evaluated_at:
                    type: string
                    format: date-time
                required:
                  - evaluation_id
                  - overall_risk_grade
                  - risk_score
                  - recommendation
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /underwriting/submissions/{submission_id}/risk-evaluation/results:
    get:
      operationId: getRiskEvaluationResults
      summary: Get risk evaluation results
      description: >-
        Retrieve the detailed results of the most recent risk evaluation, including individual risk factor
        scores, third-party data hits, loss projections, and the underwriting recommendation with supporting
        rationale.
      tags:
        - Risk Evaluation
      parameters:
        - name: submission_id
          in: path
          required: true
          description: Submission identifier
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  evaluation_id:
                    type: string
                    example: "EVL-00482917"
                  overall_risk_grade:
                    type: string
                    description: Composite risk grade
                    example: "B_GOOD"
                    enum:
                      - A_EXCELLENT
                      - B_GOOD
                      - C_AVERAGE
                      - D_BELOW_AVERAGE
                      - E_POOR
                      - F_UNACCEPTABLE
                  risk_score:
                    type: integer
                    description: Numeric risk score (1-100)
                    example: 72
                    minimum: 1
                    maximum: 100
                  risk_factors:
                    type: array
                    description: Individual risk factor assessments
                    items:
                      type: object
                  loss_history_score:
                    type: integer
                    description: Loss history component score
                    example: 85
                  financial_stability_score:
                    type: integer
                    description: Financial stability component score
                    example: 78
                  hazard_assessment:
                    type: string
                    description: Hazard classification
                    example: "Moderate — standard fire protection, sprinklered"
                  recommendation:
                    type: string
                    example: "APPROVE_STANDARD"
                    enum:
                      - APPROVE_STANDARD
                      - APPROVE_WITH_CONDITIONS
                      - REFER_TO_SENIOR
                      - DECLINE
                  evaluated_by:
                    type: string
                    example: "UW-00291"
                  evaluated_at:
                    type: string
                    format: date-time
                required:
                  - evaluation_id
                  - overall_risk_grade
                  - recommendation
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /underwriting/submissions/{submission_id}/medical-requirements:
    get:
      operationId: listMedicalRequirements
      summary: List medical requirements
      description: >-
        Retrieve all medical evidence requirements for a life or health insurance submission, including
        Attending Physician Statements (APS), paramedical exams, blood profiles, and specialty evaluations.
      tags:
        - Medical Requirements
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: status
          in: query
          required: false
          description: Filter by requirement status
          schema:
            type: "string"
            enum:
              - REQUESTED
              - ORDERED
              - RECEIVED
              - REVIEWED
              - WAIVED
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        requirement_id:
                          type: string
                          example: "MED-00482917"
                        requirement_type:
                          type: string
                          description: Type of medical requirement
                          example: "APS"
                          enum:
                            - APS
                            - PARAMEDICAL
                            - FULL_MEDICAL
                            - BLOOD_PROFILE
                            - EKG
                            - COGNITIVE_TEST
                            - FUNCTIONAL_CAPACITY
                        description:
                          type: string
                          example: "Attending Physician Statement from Dr. Sarah Johnson, internal medicine"
                        provider_name:
                          type: string
                          description: Medical provider name
                          example: "Dr. Sarah Johnson, MD"
                        status:
                          type: string
                          example: "REQUESTED"
                          enum:
                            - REQUESTED
                            - ORDERED
                            - RECEIVED
                            - REVIEWED
                            - WAIVED
                        requested_date:
                          type: string
                          format: date
                        due_date:
                          type: string
                          format: date
                        received_date:
                          type: string
                          format: date
                          nullable: true
                      required:
                        - requirement_id
                        - requirement_type
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: orderMedicalRequirement
      summary: Order medical requirement
      description: >-
        Order a medical evidence requirement for the submission. APS requests are sent directly to the
        attending physician. Paramedical and lab exams are scheduled through partner exam companies
        (ExamOne, APPS). Requirements are tracked through receipt and underwriter review.
      tags:
        - Medical Requirements
      parameters:
        - name: submission_id
          in: path
          required: true
          description: Unique submission id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Order medical requirement request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    requirement_type:
                      type: string
                      description: Type of medical requirement
                      example: "APS"
                      enum:
                        - APS
                        - PARAMEDICAL
                        - FULL_MEDICAL
                        - BLOOD_PROFILE
                        - EKG
                        - COGNITIVE_TEST
                        - FUNCTIONAL_CAPACITY
                    provider_name:
                      type: string
                      description: Medical provider name
                      example: "Dr. Sarah Johnson, MD"
                    provider_address:
                      type: string
                      description: Provider mailing address for APS requests
                    provider_fax:
                      type: string
                      description: Provider fax number
                    due_date:
                      type: string
                      description: Requested completion date
                      format: date
                    rush:
                      type: boolean
                      description: Whether to expedite the request
                      default: false
              required:
                - requirement_type
                - due_date
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  requirement_id:
                    type: string
                    example: "MED-00482917"
                  requirement_type:
                    type: string
                    description: Type of medical requirement
                    example: "APS"
                    enum:
                      - APS
                      - PARAMEDICAL
                      - FULL_MEDICAL
                      - BLOOD_PROFILE
                      - EKG
                      - COGNITIVE_TEST
                      - FUNCTIONAL_CAPACITY
                  description:
                    type: string
                    example: "Attending Physician Statement from Dr. Sarah Johnson, internal medicine"
                  provider_name:
                    type: string
                    description: Medical provider name
                    example: "Dr. Sarah Johnson, MD"
                  status:
                    type: string
                    example: "REQUESTED"
                    enum:
                      - REQUESTED
                      - ORDERED
                      - RECEIVED
                      - REVIEWED
                      - WAIVED
                  requested_date:
                    type: string
                    format: date
                  due_date:
                    type: string
                    format: date
                  received_date:
                    type: string
                    format: date
                    nullable: true
                required:
                  - requirement_id
                  - status
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
