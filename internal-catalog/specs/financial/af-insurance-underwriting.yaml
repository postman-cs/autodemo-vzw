  /underwriting/submissions/{submission_id}/approve:
    post:
      operationId: approveSubmission
      summary: Approve submission
      description: >-
        Issue an underwriting approval for the submission at the indicated premium and terms. The approval
        authorizes policy issuance and sets the final premium, coverage terms, and any conditions or
        exclusions. Approvals within the underwriter's authority are final; approvals exceeding authority
        thresholds require senior sign-off.
      tags:
        - Decisions
      parameters:
        - name: submission_id
          in: path
          required: true
          description: Unique submission id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Approve submission request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    approved_premium:
                      type: number
                      description: Approved annual premium
                      format: double
                      example: 28500.0
                    approved_terms:
                      type: object
                      description: Approved coverage terms and conditions
                    exclusions:
                      type: array
                      description: Coverage exclusions
                      items:
                        type: string
                    conditions:
                      type: array
                      description: Conditions of approval (e.g., fire alarm installation required within 30 days)
                      items:
                        type: string
                    approval_notes:
                      type: string
                      description: Underwriter approval notes
                      example: "Strong risk profile, clean loss history, adequate protection class"
              required:
                - approved_premium
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  approval_id:
                    type: string
                    example: "APR-00482917"
                  approved_premium:
                    type: number
                    format: double
                  authority_used:
                    type: string
                    example: "WITHIN_AUTHORITY"
                    enum:
                      - WITHIN_AUTHORITY
                      - EXCEEDED_REQUIRES_SENIOR
                  status:
                    type: string
                    example: "APPROVED"
                  valid_until:
                    type: string
                    description: Approval expiration date
                    format: date
                required:
                  - approval_id
                  - status
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /underwriting/submissions/{submission_id}/decline:
    post:
      operationId: declineSubmission
      summary: Decline submission
      description: >-
        Issue an underwriting decline for the submission. The decline letter is generated automatically
        citing the specific reasons and applicable underwriting guidelines. Adverse action notices comply
        with Fair Credit Reporting Act (FCRA) requirements when credit information was used in the decision.
      tags:
        - Decisions
      parameters:
        - name: submission_id
          in: path
          required: true
          description: Unique submission id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Decline submission request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    decline_reasons:
                      type: array
                      description: Specific reasons for declination
                      items:
                        type: string
                        example: "Loss history exceeds guideline threshold — 4 claims in 3 years"
                    guideline_references:
                      type: array
                      description: Underwriting guideline references
                      items:
                        type: string
                        example: "UW-GL-2024-PROP-012: Maximum 2 claims in 3-year experience period"
                    credit_used:
                      type: boolean
                      description: Whether credit information was used in the decision (triggers FCRA notice)
                      example: false
                    alternative_offered:
                      type: boolean
                      description: Whether an alternative coverage was offered
                      default: false
              required:
                - decline_reasons
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  decline_id:
                    type: string
                  adverse_action_notice_id:
                    type: string
                    description: FCRA adverse action notice reference
                    nullable: true
                  status:
                    type: string
                    example: "DECLINED"
                required:
                  - decline_id
                  - status
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
