  /underwriting/submissions/{submission_id}/conditional-approval:
    post:
      operationId: conditionallyApproveSubmission
      summary: Issue conditional approval
      description: >-
        Issue a conditional approval that requires the applicant to satisfy specific stipulations before the
        policy can be bound. Common conditions include property improvements, loss control measures, or
        additional documentation. Conditions have deadlines and are tracked through fulfillment.
      tags:
        - Decisions
      parameters:
        - name: submission_id
          in: path
