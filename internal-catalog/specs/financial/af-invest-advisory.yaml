openapi: 3.0.3
info:
  title: Acme Finance Advisory API
  description: Comprehensive robo-advisory and hybrid advisory services for Acme Finance brokerage clients. Provides goal-
    based financial planning, risk profiling via validated questionnaires, model portfolio selection, suitability verification,
    and AI-driven investment recommendations. Integrates Monte Carlo simulation for probability-of- success projections across
    retirement, education, and wealth-accumulation goals.
  version: 3.2.0
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-invest-advisory
  x-acme-domain: invest
servers:
- url: https://af-invest-advisory.api.acmefin.com/v1
  description: Production
- url: https://af-invest-advisory.staging.acmefin.com/v1
  description: Staging
security:
- BearerAuth: []
tags:
- name: Financial Plans
  description: Create, manage, and monitor goal-based financial plans with Monte Carlo projections
- name: Risk Assessment
  description: Risk tolerance questionnaires and algorithmic risk scoring
- name: Model Portfolios
  description: Pre-built and custom model portfolio templates with target allocations
- name: Recommendations
  description: AI-generated investment recommendations and suitability checks
paths:
  /plans:
    get:
      operationId: listFinancialPlans
      summary: List financial plans
      description: Retrieve all financial plans for the authenticated client, filterable by plan type, status, and advisor
        assignment. Returns Monte Carlo success probabilities.
      tags:
      - Financial Plans
      parameters:
      - name: page
        in: query
        required: false
        description: Page number for pagination
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: per_page
        in: query
        required: false
        description: Number of results per page (max 100)
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: sort_by
        in: query
        required: false
        description: Field to sort results by
        schema:
          type: string
      - name: sort_order
        in: query
        required: false
        description: Sort direction
        schema:
          type: string
          enum:
          - asc
          - desc
          default: desc
      - name: plan_type
        in: query
        required: false
        description: Filter by plan category
        schema:
          type: string
          enum:
          - retirement
          - education
          - wealth_accumulation
          - estate
          - income
      - name: status
        in: query
        required: false
        description: Filter by plan status
        schema:
          type: string
          enum:
          - draft
          - active
          - paused
          - completed
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        plan_id:
                          type: string
                          description: Financial plan identifier
                          format: uuid
                          example: plan-a1b2c3d4
                        account_id:
                          type: string
                          description: Brokerage account identifier
                          format: uuid
                          example: acct-a1b2c3d4
                        plan_name:
                          type: string
                          description: Plan display name
                          example: Retirement 2045
                        plan_type:
                          type: string
                          description: Financial plan category
                          enum:
                          - retirement
                          - education
                          - wealth_accumulation
                          - estate
                          - income
                        risk_score:
                          type: integer
                          description: Computed risk tolerance score (1-100)
                          example: 65
                        target_date:
                          type: string
                          description: Plan target date
                          format: date
                          example: '2045-01-01'
                        target_amount:
                          type: object
                          description: Goal amount
                          properties:
                            amount:
                              type: number
                              description: Monetary amount
                              format: double
                              example: 2500000.0
                            currency:
                              type: string
                              description: ISO 4217 currency code
                              example: USD
                        current_funded_pct:
                          type: number
                          description: Percentage of goal currently funded
                          format: double
                          example: 42.5
                        status:
                          type: string
                          description: Plan status
                          enum:
                          - draft
                          - active
                          - paused
                          - completed
                          - archived
                        advisor_id:
                          type: string
                          description: Assigned financial advisor
                          example: adv-9012
                        created_at:
                          type: string
                          description: Creation timestamp
                          format: date-time
                          example: '2025-06-15T14:30:00Z'
                      required:
                      - plan_id
                      - account_id
                      - plan_type
                      - status
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
                required:
                - data
                - pagination
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
    post:
      operationId: createFinancialPlan
      summary: Create a financial plan
      description: Initialize a new goal-based financial plan. The system runs a preliminary Monte Carlo simulation to estimate
        initial probability of success based on current assets, contribution schedule, and target amount.
      tags:
      - Financial Plans
      requestBody:
        required: true
        description: Create a financial plan request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                plan_name:
                  type: string
                  description: Plan display name
                  example: Retirement 2045
                plan_type:
                  type: string
                  description: Plan category
                  enum:
                  - retirement
                  - education
                  - wealth_accumulation
                  - estate
                  - income
                target_date:
                  type: string
                  description: Goal target date
                  format: date
                  example: '2045-01-01'
                target_amount:
                  type: object
                  description: Goal amount
                  properties:
                    amount:
                      type: number
                      description: Monetary amount
                      format: double
                      example: 2500000.0
                    currency:
                      type: string
                      description: ISO 4217 currency code
                      example: USD
                account_id:
                  type: string
                  description: Brokerage account identifier
                  format: uuid
                  example: acct-a1b2c3d4
              required:
              - plan_name
              - plan_type
              - target_date
              - target_amount
              - account_id
      responses:
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  plan_id:
                    type: string
                    description: Financial plan identifier
                    format: uuid
                    example: plan-a1b2c3d4
                  account_id:
                    type: string
                    description: Brokerage account identifier
                    format: uuid
                    example: acct-a1b2c3d4
                  plan_name:
                    type: string
                    description: Plan display name
                    example: Retirement 2045
                  plan_type:
                    type: string
                    description: Financial plan category
                    enum:
                    - retirement
                    - education
                    - wealth_accumulation
                    - estate
                    - income
                  risk_score:
                    type: integer
                    description: Computed risk tolerance score (1-100)
                    example: 65
                  target_date:
                    type: string
                    description: Plan target date
                    format: date
                    example: '2045-01-01'
                  target_amount:
                    type: object
                    description: Goal amount
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: 2500000.0
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                  current_funded_pct:
                    type: number
                    description: Percentage of goal currently funded
                    format: double
                    example: 42.5
                  status:
                    type: string
                    description: Plan status
                    enum:
                    - draft
                    - active
                    - paused
                    - completed
                    - archived
                  advisor_id:
                    type: string
                    description: Assigned financial advisor
                    example: adv-9012
                  created_at:
                    type: string
                    description: Creation timestamp
                    format: date-time
                    example: '2025-06-15T14:30:00Z'
                required:
                - plan_id
                - account_id
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
  /plans/{plan_id}:
    get:
      operationId: getFinancialPlan
