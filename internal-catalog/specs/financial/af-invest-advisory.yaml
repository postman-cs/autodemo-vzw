      parameters:
      - name: plan_id
        in: path
        required: true
        description: Unique plan id
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  plan_id:
                    type: string
                    description: Financial plan identifier
                    format: uuid
                    example: plan-a1b2c3d4
                  account_id:
                    type: string
                    description: Brokerage account identifier
                    format: uuid
                    example: acct-a1b2c3d4
                  plan_name:
                    type: string
                    description: Plan display name
                    example: Retirement 2045
                  plan_type:
                    type: string
                    description: Financial plan category
                    enum:
                    - retirement
                    - education
                    - wealth_accumulation
                    - estate
                    - income
                  risk_score:
                    type: integer
                    description: Computed risk tolerance score (1-100)
                    example: 65
                  target_date:
                    type: string
                    description: Plan target date
                    format: date
                    example: '2045-01-01'
                  target_amount:
                    type: object
                    description: Goal amount
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: 2500000.0
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                  current_funded_pct:
                    type: number
                    description: Percentage of goal currently funded
                    format: double
                    example: 42.5
                  status:
                    type: string
                    description: Plan status
                    enum:
                    - draft
                    - active
                    - paused
                    - completed
                    - archived
                  advisor_id:
                    type: string
                    description: Assigned financial advisor
                    example: adv-9012
                  created_at:
                    type: string
                    description: Creation timestamp
                    format: date-time
                    example: '2025-06-15T14:30:00Z'
                required:
                - plan_id
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
    patch:
      operationId: updateFinancialPlan
      summary: Update a financial plan
      description: Modify plan parameters such as target date, target amount, or risk preferences. Triggers a Monte Carlo
        re-simulation to recalculate success probability.
      tags:
      - Financial Plans
      parameters:
      - name: plan_id
        in: path
        required: true
        description: Unique plan id
        schema:
          type: string
      requestBody:
        required: true
        description: Update a financial plan request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                plan_name:
                  type: string
                  description: Plan display name
                target_date:
                  type: string
                  description: Updated target date
                  format: date
                  example: '2025-06-15'
                target_amount:
                  type: object
                  description: Updated goal amount
                  properties:
                    amount:
                      type: number
                      description: Monetary amount
                      format: double
                      example: 3000000.0
                    currency:
                      type: string
                      description: ISO 4217 currency code
                      example: USD
                status:
                  type: string
                  description: Plan status
                  enum:
                  - active
                  - paused
                  - archived
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  plan_id:
                    type: string
                    description: Financial plan identifier
                    format: uuid
                    example: plan-a1b2c3d4
                  account_id:
                    type: string
                    description: Brokerage account identifier
                    format: uuid
                    example: acct-a1b2c3d4
                  plan_name:
                    type: string
                    description: Plan display name
                    example: Retirement 2045
                  plan_type:
                    type: string
                    description: Financial plan category
                    enum:
                    - retirement
                    - education
                    - wealth_accumulation
                    - estate
                    - income
                  risk_score:
                    type: integer
                    description: Computed risk tolerance score (1-100)
                    example: 65
                  target_date:
                    type: string
                    description: Plan target date
                    format: date
                    example: '2045-01-01'
                  target_amount:
                    type: object
                    description: Goal amount
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: 2500000.0
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                  current_funded_pct:
                    type: number
                    description: Percentage of goal currently funded
                    format: double
                    example: 42.5
                  status:
                    type: string
                    description: Plan status
                    enum:
                    - draft
                    - active
                    - paused
                    - completed
                    - archived
                  advisor_id:
                    type: string
                    description: Assigned financial advisor
                    example: adv-9012
                  created_at:
                    type: string
                    description: Creation timestamp
                    format: date-time
                    example: '2025-06-15T14:30:00Z'
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
    delete:
      operationId: deleteFinancialPlan
      summary: Delete a financial plan
      description: Permanently remove a financial plan and all associated goals. Active plans must be archived before deletion.
      tags:
      - Financial Plans
      parameters:
      - name: plan_id
        in: path
        required: true
        description: Unique plan id
        schema:
          type: string
      responses:
        '204':
          description: Resource deleted successfully
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
  /plans/{plan_id}/goals:
    get:
      operationId: listPlanGoals
      summary: List goals for a plan
      description: Retrieve all sub-goals associated with a financial plan, each with its own target amount, timeline, and
        probability-of-success projection.
      tags:
      - Financial Plans
      parameters:
      - name: page
        in: query
        required: false
        description: Page number for pagination
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: per_page
        in: query
        required: false
        description: Number of results per page (max 100)
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: sort_by
        in: query
        required: false
        description: Field to sort results by
        schema:
          type: string
      - name: sort_order
        in: query
        required: false
        description: Sort direction
        schema:
          type: string
          enum:
          - asc
          - desc
          default: desc
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        goal_id:
                          type: string
                          description: Goal identifier
                          format: uuid
                          example: goal-a1b2c3d4
                        plan_id:
                          type: string
                          description: Parent plan identifier
                          format: uuid
                          example: plan-a1b2c3d4
                        goal_name:
                          type: string
                          description: Goal description
                          example: College fund for Emily
                        priority:
                          type: string
                          description: Goal priority
                          enum:
                          - critical
                          - high
                          - medium
                          - low
                        target_amount:
                          type: object
                          description: Target savings amount
                          properties:
                            amount:
                              type: number
                              description: Monetary amount
                              format: double
                              example: 120000.0
                            currency:
                              type: string
                              description: ISO 4217 currency code
                              example: USD
                        current_amount:
                          type: object
                          description: Current savings toward goal
                          properties:
                            amount:
                              type: number
                              description: Monetary amount
                              format: double
                              example: 45000.0
                            currency:
                              type: string
                              description: ISO 4217 currency code
                              example: USD
                        target_date:
                          type: string
                          description: Goal target date
                          format: date
                          example: '2030-09-01'
                        probability_of_success:
                          type: number
                          description: Monte Carlo success probability
                          format: double
                          example: 78.3
                      required:
                      - goal_id
                      - plan_id
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
                required:
                - data
                - pagination
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
    post:
      operationId: createPlanGoal
      summary: Add a goal to a plan
      description: Create a new financial goal within an existing plan. The system calculates required monthly savings and
        probability of success using Monte Carlo analysis.
      tags:
      - Financial Plans
      requestBody:
        required: true
        description: Add a goal to a plan request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                goal_name:
                  type: string
                  description: Goal description
                  example: College fund
                priority:
                  type: string
                  description: Goal priority
                  enum:
                  - critical
                  - high
                  - medium
                  - low
                target_amount:
                  type: object
                  description: Target amount
                  properties:
                    amount:
                      type: number
                      description: Monetary amount
                      format: double
                      example: 120000.0
                    currency:
                      type: string
                      description: ISO 4217 currency code
                      example: USD
                target_date:
                  type: string
                  description: Goal target date
                  format: date
                  example: '2030-09-01'
              required:
              - goal_name
              - target_amount
              - target_date
      responses:
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  goal_id:
                    type: string
                    description: Goal identifier
                    format: uuid
                    example: goal-a1b2c3d4
                  plan_id:
                    type: string
                    description: Parent plan identifier
                    format: uuid
                    example: plan-a1b2c3d4
                  goal_name:
                    type: string
                    description: Goal description
                    example: College fund for Emily
                  priority:
                    type: string
                    description: Goal priority
                    enum:
                    - critical
                    - high
                    - medium
                    - low
                  target_amount:
                    type: object
                    description: Target savings amount
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: 120000.0
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                  current_amount:
                    type: object
                    description: Current savings toward goal
                    properties:
                      amount:
                        type: number
                        description: Monetary amount
                        format: double
                        example: 45000.0
                      currency:
                        type: string
                        description: ISO 4217 currency code
                        example: USD
                  target_date:
                    type: string
                    description: Goal target date
                    format: date
                    example: '2030-09-01'
                  probability_of_success:
                    type: number
                    description: Monte Carlo success probability
                    format: double
                    example: 78.3
                required:
                - goal_id
                - plan_id
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
  /risk-questionnaires:
    post:
      operationId: submitRiskQuestionnaire
      summary: Submit risk questionnaire
      description: Submit completed risk tolerance questionnaire answers. The system computes a risk score using a validated
        psychometric model and recommends a matching asset allocation model.
      tags:
      - Risk Assessment
      requestBody:
        required: true
        description: Submit risk questionnaire request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                account_id:
                  type: string
                  description: Brokerage account identifier
                  format: uuid
                  example: acct-a1b2c3d4
                time_horizon:
                  type: string
                  description: Investment horizon
                  enum:
                  - short_term
                  - medium_term
                  - long_term
                  - very_long_term
                risk_tolerance:
                  type: string
                  description: Self-assessed tolerance
                  enum:
                  - conservative
                  - moderate_conservative
                  - moderate
                  - moderate_aggressive
                  - aggressive
                income_stability:
                  type: string
                  description: Income stability
                  enum:
                  - very_stable
                  - stable
                  - variable
                  - uncertain
                loss_reaction:
                  type: string
                  description: Reaction to 20% portfolio loss
                  enum:
                  - sell_everything
                  - sell_some
                  - hold
                  - buy_more
              required:
              - account_id
              - time_horizon
              - risk_tolerance
              - income_stability
      responses:
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  questionnaire_id:
                    type: string
                    description: Risk questionnaire identifier
                    format: uuid
                    example: rq-a1b2c3d4
                  account_id:
                    type: string
                    description: Brokerage account identifier
                    format: uuid
                    example: acct-a1b2c3d4
                  time_horizon:
                    type: string
                    description: Investment time horizon
                    enum:
                    - short_term
                    - medium_term
                    - long_term
                    - very_long_term
                  risk_tolerance:
                    type: string
                    description: Self-assessed risk tolerance
                    enum:
                    - conservative
                    - moderate_conservative
                    - moderate
                    - moderate_aggressive
                    - aggressive
                  income_stability:
                    type: string
                    description: Employment income stability
                    enum:
                    - very_stable
                    - stable
                    - variable
                    - uncertain
                  computed_score:
                    type: integer
                    description: Algorithm-computed risk score (1-100)
                    example: 72
                  recommended_allocation:
                    type: string
                    description: Suggested asset allocation model
                    example: Growth-70-30
                  completed_at:
                    type: string
                    description: Questionnaire completion timestamp
                    format: date-time
                    example: '2025-06-15T14:30:00Z'
                required:
                - questionnaire_id
                - computed_score
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
  /risk-questionnaires/{questionnaire_id}:
    get:
      operationId: getRiskQuestionnaire
      summary: Get risk questionnaire result
      description: Retrieve the results and computed risk score from a previously submitted risk tolerance questionnaire.
      tags:
      - Risk Assessment
      parameters:
      - name: questionnaire_id
        in: path
        required: true
        description: Unique questionnaire id
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  questionnaire_id:
                    type: string
                    description: Risk questionnaire identifier
                    format: uuid
                    example: rq-a1b2c3d4
                  account_id:
                    type: string
                    description: Brokerage account identifier
                    format: uuid
                    example: acct-a1b2c3d4
                  time_horizon:
                    type: string
                    description: Investment time horizon
                    enum:
                    - short_term
                    - medium_term
                    - long_term
                    - very_long_term
                  risk_tolerance:
                    type: string
                    description: Self-assessed risk tolerance
                    enum:
                    - conservative
                    - moderate_conservative
                    - moderate
                    - moderate_aggressive
