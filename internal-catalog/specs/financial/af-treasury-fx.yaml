openapi: 3.0.3
info:
  title: Acme Finance Foreign Exchange Trading API
  description: >-
    Institutional FX trading platform supporting spot and forward currency transactions with real-time streaming
    quotes, automated trade execution, bilateral netting for settlement efficiency, CLS and PvP settlement
    integration, real-time position management with P&L attribution, mark-to-market valuation, and live market
    rate feeds from major FX data providers (Bloomberg, Reuters, ECB).
  version: 4.0.0
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-treasury-fx
  x-acme-domain: treasury
servers:
  - url: https://af-treasury-fx.api.acmefin.com/v1
    description: Production
  - url: https://af-treasury-fx.staging.acmefin.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: FX Trading
    description: Request quotes and execute spot and forward FX trades
  - name: Settlement & Netting
    description: Bilateral netting, settlement instructions, and CLS integration
  - name: Position Management
    description: FX position tracking, mark-to-market, and live rate feeds
paths:
  /quotes/spot:
    post:
      operationId: getSpotQuote
      summary: Get spot FX quote
      description: >-
        Request a real-time spot FX quote for a currency pair with indicative or firm pricing. Firm quotes
        are valid for 15 seconds.
      tags:
        - FX Trading
      requestBody:
        required: true
        description: Get spot FX quote request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    currency_pair:
                      type: string
                      description: "Currency pair (ISO 4217)"
                      example: "EUR/USD"
                    side:
                      type: string
                      description: "Trade side"
                      example: "buy"
                      enum:
                        - buy
                        - sell
                    amount:
                      type: number
                      description: "Notional amount in base currency"
                      format: double
                      example: 1000000.0
                    quote_type:
                      type: string
                      description: "Quote type"
                      example: "indicative"
                      enum:
                        - indicative
                        - firm
              required:
                - currency_pair
                - side
                - amount
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  quote_id:
                    type: string
                    description: "Quote ID"
                    format: uuid
                    example: "qt-3a4b5c6d"
                  currency_pair:
                    type: string
                    description: "Pair"
                    example: "EUR/USD"
                  side:
                    type: string
                    description: "Side"
                    example: "buy"
                  rate:
                    type: number
                    description: "Quoted rate"
                    format: double
                    example: 1.0845
                  inverse_rate:
                    type: number
                    description: "Inverse rate"
                    format: double
                    example: 0.9221
                  amount:
                    type: number
                    description: "Base amount"
                    format: double
                    example: 1000000.0
                  counter_amount:
                    type: number
                    description: "Counter amount"
                    format: double
                    example: 1084500.0
                  valid_until:
                    type: string
                    description: "Quote expiry"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                  value_date:
                    type: string
                    description: "Settlement date"
                    example: "2025-06-17"
                required:
                  - quote_id
                  - rate
                  - valid_until
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /quotes/forward:
    post:
      operationId: getForwardQuote
      summary: Get forward FX quote
      description: >-
        Request a forward FX quote for a specific value date or tenor. Includes forward points and all-in
        rate.
      tags:
        - FX Trading
      requestBody:
        required: true
        description: Get forward FX quote request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    currency_pair:
                      type: string
                      description: "Currency pair"
                      example: "GBP/USD"
                    side:
                      type: string
                      description: "Side"
                      example: "buy"
                      enum:
                        - buy
                        - sell
                    amount:
                      type: number
                      description: "Notional"
                      format: double
                      example: 5000000.0
                    value_date:
                      type: string
                      description: "Forward value date"
                      example: "2025-12-17"
                    tenor:
                      type: string
                      description: "Alternative: tenor code"
                      example: "6M"
                    quote_type:
                      type: string
                      description: "Quote type"
                      example: "indicative"
                      enum:
                        - indicative
                        - firm
              required:
                - currency_pair
                - side
                - amount
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  quote_id:
                    type: string
                    description: "Quote ID"
                    format: uuid
                    example: "qt-7a8b9c0d"
                  currency_pair:
                    type: string
                    description: "Pair"
                    example: "GBP/USD"
                  spot_rate:
                    type: number
                    description: "Current spot"
                    format: double
                    example: 1.265
                  forward_points:
                    type: number
                    description: "Forward points"
                    format: double
                    example: -32.5
                  all_in_rate:
                    type: number
                    description: "All-in forward rate"
                    format: double
                    example: 1.2618
                  amount:
                    type: number
                    description: "Base"
                    format: double
                    example: 5000000.0
                  counter_amount:
                    type: number
                    description: "Counter"
                    format: double
                    example: 6309000.0
                  value_date:
                    type: string
                    description: "Value date"
                    example: "2025-12-17"
                  valid_until:
                    type: string
                    description: "Expiry"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - quote_id
                  - all_in_rate
                  - forward_points
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /trades:
    get:
      operationId: listFxTrades
      summary: List FX trades
      description: >-
        List all FX trades with filtering by currency pair, status, trade date, and counterparty.
      tags:
        - FX Trading
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: currency_pair
          in: query
          required: false
          description: "Filter by pair"
          schema:
            type: "string"
        - name: status
          in: query
          required: false
          description: "Filter by status"
          schema:
            type: "string"
        - name: trade_type
          in: query
          required: false
          description: "Filter by type"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        trade_id:
                          type: string
                          description: "Trade ID"
                          format: uuid
                          example: "fxt-5a6b7c8d-9e0f"
                        currency_pair:
                          type: string
                          description: "Currency pair"
                          example: "EUR/USD"
                        side:
                          type: string
                          description: "Trade side"
                          example: "buy"
                          enum:
                            - buy
                            - sell
                        trade_type:
                          type: string
                          description: "Instrument type"
                          example: "spot"
                          enum:
                            - spot
                            - forward
                            - swap
                            - ndf
                        amount:
                          type: number
                          description: "Notional amount"
                          format: double
                          example: 1000000.0
                        rate:
                          type: number
                          description: "Execution rate"
                          format: double
                          example: 1.0845
                        counter_amount:
                          type: number
                          description: "Counter currency amount"
                          format: double
                          example: 1084500.0
                        status:
                          type: string
                          description: "Trade status"
                          example: "pending"
                          enum:
                            - pending
                            - confirmed
                            - settled
                            - cancelled
                            - failed
                        trade_date:
                          type: string
                          description: "Trade date"
                          example: "2025-06-15"
                        value_date:
                          type: string
                          description: "Settlement date"
                          example: "2025-06-17"
                        counterparty:
                          type: string
                          description: "Counterparty"
                          example: "Deutsche Bank"
                      required:
                        - trade_id
                        - currency_pair
                        - amount
                        - rate
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: executeFxTrade
      summary: Execute FX trade
      description: >-
        Execute an FX trade by accepting a firm quote. The quote must be valid (not expired). Returns the
        confirmed trade with settlement details.
      tags:
        - FX Trading
      requestBody:
        required: true
        description: Execute FX trade request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    quote_id:
                      type: string
                      description: "Quote to execute"
                      format: uuid
                      example: "qt-3a4b5c6d"
                    counterparty_id:
                      type: string
                      description: "Counterparty"
                      format: uuid
                      example: "cpty-4a5b6c7d"
                    settlement_instructions:
                      type: string
                      description: "SSI reference"
                      example: "ssi-usd-jpm-001"
                    internal_reference:
                      type: string
                      description: "Internal booking reference"
                      example: "FX-2025-06-0456"
              required:
                - quote_id
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  trade_id:
                    type: string
                    description: "Trade ID"
                    format: uuid
                    example: "fxt-5a6b7c8d"
                  currency_pair:
                    type: string
                    description: "Pair"
                    example: "EUR/USD"
                  rate:
                    type: number
                    description: "Execution rate"
                    format: double
                    example: 1.0845
                  amount:
                    type: number
                    description: "Base amount"
                    format: double
                    example: 1000000.0
                  counter_amount:
                    type: number
                    description: "Counter"
                    format: double
                    example: 1084500.0
                  status:
                    type: string
                    description: "Status"
                    example: "confirmed"
                  value_date:
                    type: string
                    description: "Value date"
                    example: "2025-06-17"
                required:
                  - trade_id
                  - rate
                  - status
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /trades/{trade_id}:
    get:
      operationId: getFxTrade
      summary: Get FX trade
      description: >-
        Retrieve full trade details including execution info, settlement status, and P&L.
      tags:
        - FX Trading
      parameters:
        - name: trade_id
          in: path
          required: true
          description: "Unique trade id"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  trade_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "fxt-5a6b7c8d"
                  currency_pair:
                    type: string
                    description: "Pair"
                    example: "EUR/USD"
                  side:
                    type: string
                    description: "Side"
                    example: "buy"
                  amount:
                    type: number
                    description: "Amount"
                    format: double
                    example: 1000000.0
                  rate:
                    type: number
                    description: "Rate"
                    format: double
                    example: 1.0845
                  status:
                    type: string
                    description: "Status"
                    example: "confirmed"
                  mtm_value:
                    type: number
                    description: "Current MTM"
                    format: double
                    example: 12500.0
                required:
                  - trade_id
                  - currency_pair
                  - rate
                  - status
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /trades/{trade_id}/confirm:
    post:
      operationId: confirmFxTrade
      summary: Confirm FX trade
      description: Send or acknowledge trade confirmation with the counterparty.
      tags:
        - FX Trading
      parameters:
        - name: trade_id
          in: path
          required: true
          description: "Unique trade id"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Confirm FX trade request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    confirmation_method:
                      type: string
                      description: "Confirmation method"
                      example: "swift"
                      enum:
                        - swift
                        - email
                        - platform
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  trade_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "fxt-5a6b7c8d"
                  status:
                    type: string
                    description: "Status"
                    example: "confirmed"
                  confirmed_at:
                    type: string
                    description: "ISO 8601 timestamp"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - trade_id
                  - status
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /trades/{trade_id}/cancel:
    post:
      operationId: cancelFxTrade
      summary: Cancel FX trade
      description: >-
        Cancel an unconfirmed or pending trade. Confirmed trades require mutual agreement to cancel.
      tags:
        - FX Trading
      parameters:
        - name: trade_id
          in: path
          required: true
          description: "Unique trade id"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Cancel FX trade request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    reason:
                      type: string
                      description: "Cancellation reason"
                      example: "Duplicate trade entry"
              required:
                - reason
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  trade_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "fxt-5a6b7c8d"
                  status:
                    type: string
                    description: "Status"
                    example: "cancelled"
                  cancelled_at:
                    type: string
                    description: "ISO 8601 timestamp"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - trade_id
                  - status
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /trades/{trade_id}/settle:
    post:
      operationId: settleFxTrade
      summary: Settle FX trade
      description: >-
        Initiate settlement of a confirmed trade. Generates payment instructions and submits to the
        settlement system (CLS or bilateral).
      tags:
        - Settlement & Netting
      parameters:
        - name: trade_id
          in: path
          required: true
          description: "Unique trade id"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Settle FX trade request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    settlement_method:
                      type: string
                      description: "Settlement mechanism"
                      example: "cls"
                      enum:
                        - cls
                        - bilateral
                        - pvp
                    ssi_reference:
                      type: string
                      description: "SSI reference"
                      example: "ssi-usd-jpm-001"
              required:
                - settlement_method
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  trade_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "fxt-5a6b7c8d"
                  settlement_id:
                    type: string
                    description: "Settlement reference"
                    format: uuid
                    example: "stl-1a2b3c4d"
                  status:
                    type: string
                    description: "Status"
                    example: "settling"
                  expected_settlement:
                    type: string
                    description: "Expected settlement time"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - trade_id
                  - settlement_id
                  - status
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /netting:
    get:
      operationId: listNettingSets
      summary: List FX netting sets
      description: >-
        List bilateral netting sets grouping trades for net settlement to reduce gross settlement flows.
      tags:
        - Settlement & Netting
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        netting_id:
                          type: string
                          description: "Netting set ID"
                          format: uuid
                          example: "nts-6a7b8c9d"
                        counterparty:
                          type: string
                          description: "Counterparty"
                          example: "Deutsche Bank"
                        value_date:
                          type: string
                          description: "Settlement date"
                          example: "2025-06-17"
                        gross_payments:
                          type: number
                          description: "Gross payment total"
                          format: double
                          example: 25000000.0
                        net_amount:
                          type: number
                          description: "Net settlement amount"
                          format: double
                          example: 3500000.0
                        savings_percent:
                          type: number
                          description: "Netting savings"
                          format: double
                          example: 86.0
                        trade_count:
                          type: integer
                          description: "Trades in set"
                          example: 15
                        status:
                          type: string
                          description: "Netting status"
                          example: "proposed"
                          enum:
                            - proposed
                            - agreed
                            - settled
                      required:
                        - netting_id
                        - counterparty
                        - net_amount
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: createNettingSet
      summary: Create netting set
      description: >-
        Propose a netting set for a counterparty and value date. Automatically identifies eligible
        offsetting trades.
      tags:
        - Settlement & Netting
      requestBody:
        required: true
        description: Create netting set request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    counterparty_id:
                      type: string
                      description: "Counterparty"
                      format: uuid
                      example: "cpty-4a5b6c7d"
                    value_date:
                      type: string
                      description: "Value date"
                      example: "2025-06-17"
                    currencies:
                      type: array
                      description: "Currencies to include in netting"
                      items:
                        type: string
              required:
                - counterparty_id
                - value_date
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  netting_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "nts-6a7b8c9d"
                  trade_count:
                    type: integer
                    description: "Trades netted"
                    example: 15
                  gross_amount:
                    type: number
                    description: "Gross"
                    format: double
                    example: 25000000.0
                  net_amount:
                    type: number
                    description: "Net"
                    format: double
                    example: 3500000.0
                  status:
                    type: string
                    description: "Status"
                    example: "proposed"
                required:
                  - netting_id
                  - net_amount
                  - status
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /netting/{netting_id}:
    get:
      operationId: getNettingSet
      summary: Get netting set
      description: Retrieve netting set details with individual trade breakdown.
      tags:
        - Settlement & Netting
      parameters:
        - name: netting_id
          in: path
          required: true
          description: "Unique netting id"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  netting_id:
