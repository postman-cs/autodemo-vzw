openapi: 3.0.3
info:
  title: Acme Finance Hedging & Risk Management API
  description: >-
    Hedge strategy management platform for interest rate, FX, and commodity risk with effectiveness testing
    (prospective and retrospective), formal hedge designation and de-designation workflows compliant with IFRS 9
    and ASC 815, hedge accounting journal entry generation, and hedging instrument lifecycle management. Supports
    cash flow hedges, fair value hedges, and net investment hedges.
  version: 2.2.0
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-treasury-hedging
  x-acme-domain: treasury
servers:
  - url: https://af-treasury-hedging.api.acmefin.com/v1
    description: Production
  - url: https://af-treasury-hedging.staging.acmefin.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Hedge Strategies
    description: Create, manage, and test hedge strategies with effectiveness analysis
  - name: Hedge Accounting
    description: Formal hedge designation, de-designation, and accounting treatment
paths:
  /strategies:
    get:
      operationId: listHedgeStrategies
      summary: List hedge strategies
      description: >-
        List all hedge strategies with their current effectiveness status and accounting designation.
      tags:
        - Hedge Strategies
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: hedge_type
          in: query
          required: false
          description: "Filter by hedge type"
          schema:
            type: "string"
        - name: risk_type
          in: query
          required: false
          description: "Filter by risk type"
          schema:
            type: "string"
        - name: status
          in: query
          required: false
          description: "Filter by status"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        strategy_id:
                          type: string
                          description: "Strategy ID"
                          format: uuid
                          example: "hs-4a5b6c7d-8e9f"
                        name:
                          type: string
                          description: "Strategy name"
                          example: "EUR Revenue Cash Flow Hedge"
                        hedge_type:
                          type: string
                          description: "Hedge type under IFRS 9"
                          example: "cash_flow"
                          enum:
                            - cash_flow
                            - fair_value
                            - net_investment
                        risk_type:
                          type: string
                          description: "Risk being hedged"
                          example: "fx"
                          enum:
                            - fx
                            - interest_rate
                            - commodity
                            - credit
                        hedged_item:
                          type: string
                          description: "Description of hedged item"
                          example: "Forecasted EUR revenue Q3-Q4 2025"
                        hedging_instrument:
                          type: string
                          description: "Instrument description"
                          example: "EUR/USD forward contracts"
                        notional_amount:
                          type: number
                          description: "Notional value"
                          format: double
                          example: 10000000.0
                        effectiveness_ratio:
                          type: number
                          description: "Current effectiveness ratio"
                          format: double
                          example: 0.92
                        status:
                          type: string
                          description: "Strategy status"
                          example: "active"
                          enum:
                            - active
                            - expired
                            - de_designated
                            - draft
                        designation_date:
                          type: string
                          description: "Formal designation date"
                          example: "2025-01-15"
                      required:
                        - strategy_id
                        - name
                        - hedge_type
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: createHedgeStrategy
      summary: Create hedge strategy
      description: >-
        Define a new hedge strategy documenting the risk management objective, hedged item, hedging
        instrument, and expected effectiveness.
      tags:
        - Hedge Strategies
      requestBody:
        required: true
        description: Create hedge strategy request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    name:
                      type: string
                      description: "Strategy name"
                      example: "USD Interest Rate Swap Hedge"
                    hedge_type:
                      type: string
                      description: "Hedge type"
                      example: "cash_flow"
                      enum:
                        - cash_flow
                        - fair_value
                        - net_investment
                    risk_type:
                      type: string
                      description: "Risk type"
                      example: "fx"
                      enum:
                        - fx
                        - interest_rate
                        - commodity
                        - credit
                    hedged_item_description:
                      type: string
                      description: "Hedged item"
                      example: "Variable rate loan portfolio — 3M SOFR exposure"
                    instrument_type:
                      type: string
                      description: "Instrument type"
                      example: "Interest rate swap (pay fixed, receive float)"
                    notional_amount:
                      type: number
                      description: "Notional"
                      format: double
                      example: 50000000.0
                    currency:
                      type: string
                      description: "Currency"
                      example: "USD"
                    start_date:
                      type: string
                      description: "Hedge start"
                      example: "2025-07-01"
                    end_date:
                      type: string
                      description: "Hedge end"
                      example: "2027-06-30"
                    hedge_ratio:
                      type: number
                      description: "Hedge ratio"
                      format: double
                      example: 1.0
              required:
                - name
                - hedge_type
                - risk_type
                - hedged_item_description
                - notional_amount
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  strategy_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "hs-4a5b6c7d"
                  status:
                    type: string
                    description: "Status"
                    example: "draft"
                required:
                  - strategy_id
                  - status
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /strategies/{strategy_id}:
    get:
      operationId: getHedgeStrategy
      summary: Get hedge strategy
      description: >-
        Retrieve full hedge strategy details including documentation, effectiveness history, and accounting
        entries.
      tags:
        - Hedge Strategies
      parameters:
        - name: strategy_id
          in: path
          required: true
          description: "Unique strategy id"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  strategy_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "hs-4a5b6c7d"
                  name:
                    type: string
                    description: "Name"
                    example: "EUR Revenue Cash Flow Hedge"
                  hedge_type:
                    type: string
                    description: "Type"
                    example: "cash_flow"
                  risk_type:
                    type: string
                    description: "Risk"
                    example: "fx"
                  notional_amount:
                    type: number
                    description: "Notional"
                    format: double
                    example: 10000000.0
                  effectiveness_ratio:
                    type: number
                    description: "Effectiveness"
                    format: double
                    example: 0.92
                  status:
                    type: string
                    description: "Status"
                    example: "active"
                required:
                  - strategy_id
                  - name
                  - hedge_type
                  - status
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    patch:
      operationId: updateHedgeStrategy
      summary: Update hedge strategy
      description: >-
        Update hedge strategy documentation. Material changes may require re-designation.
      tags:
        - Hedge Strategies
      parameters:
        - name: strategy_id
          in: path
          required: true
          description: "Unique strategy id"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Update hedge strategy request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    hedged_item_description:
                      type: string
                      description: "Updated description"
                      example: "Forecasted EUR revenue — updated volumes"
                    hedge_ratio:
                      type: number
                      description: "Updated ratio"
                      format: double
                      example: 0.95
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  strategy_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "hs-4a5b6c7d"
                  updated_at:
                    type: string
                    description: "ISO 8601 timestamp"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - strategy_id
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /strategies/{strategy_id}/effectiveness:
    get:
      operationId: getEffectiveness
      summary: Get effectiveness results
      description: >-
        Retrieve the latest prospective and retrospective effectiveness test results for a hedge strategy.
      tags:
        - Hedge Strategies
      parameters:
        - name: strategy_id
          in: path
          required: true
          description: "Unique strategy id"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  strategy_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "hs-4a5b6c7d"
                  prospective_ratio:
                    type: number
                    description: "Prospective effectiveness (dollar-offset)"
                    format: double
                    example: 0.95
                  retrospective_ratio:
                    type: number
                    description: "Retrospective effectiveness"
                    format: double
                    example: 0.92
                  method:
                    type: string
                    description: "Test method"
                    example: "dollar_offset"
                    enum:
                      - dollar_offset
                      - regression
                      - hypothetical_derivative
                      - critical_terms
                  is_effective:
                    type: boolean
                    description: "Whether hedge qualifies as effective (80%-125%)"
                    example: true
                  hedged_item_change:
                    type: number
                    description: "Hedged item fair value change"
                    format: double
                    example: -450000.0
                  instrument_change:
                    type: number
                    description: "Hedging instrument fair value change"
                    format: double
                    example: 415000.0
                  ineffectiveness:
                    type: number
                    description: "Hedge ineffectiveness amount"
                    format: double
                    example: -35000.0
                  test_date:
                    type: string
                    description: "Test date"
                    example: "2025-06-15"
                required:
                  - strategy_id
                  - prospective_ratio
                  - retrospective_ratio
                  - is_effective
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /strategies/{strategy_id}/effectiveness/test:
    post:
      operationId: testEffectiveness
      summary: Run effectiveness test
      description: >-
        Execute a prospective or retrospective hedge effectiveness test. Results determine whether the hedge
        qualifies for hedge accounting treatment.
      tags:
        - Hedge Strategies
      parameters:
        - name: strategy_id
          in: path
          required: true
          description: "Unique strategy id"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Run effectiveness test request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    test_type:
                      type: string
                      description: "Test type"
                      example: "prospective"
                      enum:
                        - prospective
                        - retrospective
                        - both
                    method:
                      type: string
                      description: "Test method"
                      example: "dollar_offset"
                      enum:
                        - dollar_offset
                        - regression
                        - hypothetical_derivative
                    as_of_date:
                      type: string
                      description: "Test date"
                      example: "2025-06-30"
              required:
                - test_type
                - method
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  strategy_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "hs-4a5b6c7d"
                  prospective_ratio:
                    type: number
                    description: "Prospective"
                    format: double
                    example: 0.94
                  retrospective_ratio:
                    type: number
                    description: "Retrospective"
                    format: double
                    example: 0.91
                  is_effective:
                    type: boolean
                    description: "Effective"
                    example: true
                  ineffectiveness:
                    type: number
                    description: "Ineffectiveness P&L"
                    format: double
                    example: -28000.0
                  test_date:
                    type: string
                    description: "Date"
                    example: "2025-06-30"
                required:
                  - strategy_id
                  - is_effective
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /designations:
    get:
      operationId: listDesignations
      summary: List hedge designations
      description: List all formal hedge accounting designations under IFRS 9 or ASC 815.
      tags:
        - Hedge Accounting
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        designation_id:
                          type: string
                          description: "Designation ID"
                          format: uuid
                          example: "hd-6a7b8c9d"
                        strategy_id:
                          type: string
                          description: "Strategy"
                          format: uuid
                          example: "hs-4a5b6c7d"
                        strategy_name:
                          type: string
                          description: "Strategy name"
                          example: "EUR Revenue Cash Flow Hedge"
                        accounting_standard:
                          type: string
                          description: "Accounting standard"
                          example: "ifrs9"
                          enum:
                            - ifrs9
                            - asc815
                        designation_date:
                          type: string
                          description: "Designation date"
                          example: "2025-01-15"
                        status:
                          type: string
                          description: "Designation status"
                          example: "active"
                          enum:
                            - active
                            - de_designated
                            - expired
                      required:
                        - designation_id
                        - strategy_id
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: createDesignation
      summary: Designate hedge
      description: >-
        Formally designate a hedge strategy for hedge accounting treatment. Creates the required
        documentation package under the applicable standard.
      tags:
        - Hedge Accounting
      requestBody:
        required: true
        description: Designate hedge request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    strategy_id:
                      type: string
                      description: "Strategy to designate"
                      format: uuid
                      example: "hs-4a5b6c7d"
                    accounting_standard:
                      type: string
                      description: "Standard"
                      example: "ifrs9"
                      enum:
                        - ifrs9
                        - asc815
                    designation_date:
                      type: string
                      description: "Effective date"
                      example: "2025-07-01"
                    risk_management_objective:
                      type: string
                      description: "Documented objective"
                      example: "Hedge EUR/USD translation risk on forecasted European revenue"
                    hedge_ratio_justification:
                      type: string
                      description: "Ratio justification"
                      example: "1:1 ratio based on notional amounts matching forecasted exposure"
              required:
                - strategy_id
                - accounting_standard
                - designation_date
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  designation_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "hd-6a7b8c9d"
                  status:
                    type: string
                    description: "Status"
                    example: "active"
                  documentation_complete:
                    type: boolean
                    description: "Documentation is complete"
                    example: true
                required:
                  - designation_id
                  - status
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /designations/{designation_id}:
    get:
      operationId: getDesignation
      summary: Get designation
      description: Retrieve formal hedge designation documentation and status.
      tags:
        - Hedge Accounting
      parameters:
        - name: designation_id
          in: path
          required: true
          description: "Unique designation id"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  designation_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "hd-6a7b8c9d"
                  strategy_id:
                    type: string
                    description: "Strategy"
                    format: uuid
                    example: "hs-4a5b6c7d"
                  accounting_standard:
                    type: string
                    description: "Standard"
                    example: "ifrs9"
                  status:
                    type: string
                    description: "Status"
                    example: "active"
                  documentation_complete:
                    type: boolean
                    description: "Complete"
                    example: true
                required:
                  - designation_id
                  - status
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /designations/{designation_id}/de-designate:
    post:
      operationId: deDesignateHedge
      summary: De-designate hedge
      description: >-
        Voluntarily de-designate a hedge from hedge accounting treatment. Triggers the reclassification of
        accumulated OCI amounts to P&L for cash flow hedges per IFRS 9/ASC 815.
      tags:
        - Hedge Accounting
      parameters:
        - name: designation_id
          in: path
          required: true
          description: "Unique designation id"
          schema:
            type: "string"
      requestBody:
        required: true
        description: De-designate hedge request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    reason:
                      type: string
                      description: "De-designation reason"
                      example: "Hedged item is no longer highly probable"
                    effective_date:
                      type: string
                      description: "Effective date"
                      example: "2025-06-30"
                    reclassification_method:
                      type: string
                      description: "OCI reclassification method"
                      example: "immediately"
                      enum:
                        - immediately
                        - over_remaining_life
              required:
                - reason
                - effective_date
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  designation_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "hd-6a7b8c9d"
                  status:
                    type: string
                    description: "Status"
                    example: "de_designated"
                  oci_to_reclassify:
                    type: number
                    description: "OCI amount to reclassify to P&L"
                    format: double
                    example: -125000.0
                  reclassification_entries:
                    type: array
                    description: "Generated journal entries"
                    items:
                      type: object
                required:
                  - designation_id
                  - status
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /hedge-accounting:
    get:
      operationId: listHedgeAccountingEntries
      summary: List hedge accounting entries
      description: List hedge accounting journal entries for a reporting period.
      tags:
        - Hedge Accounting
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: period
          in: query
          required: false
          description: "Filter by reporting period"
          schema:
            type: "string"
        - name: entry_type
          in: query
          required: false
          description: "Filter by entry type"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        entry_id:
                          type: string
                          description: "Entry ID"
                          format: uuid
                          example: "hae-9a0b1c2d"
                        strategy_id:
