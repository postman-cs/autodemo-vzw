openapi: 3.0.3
info:
  title: Acme Finance ML Model Registry API
  description: >-
    Centralized machine learning model lifecycle management covering registration, versioning, experiment
    tracking, deployment orchestration, and real-time inference. Register models from any framework (scikit-learn,
    XGBoost, TensorFlow, PyTorch, LightGBM), run hyperparameter experiments, deploy to production with canary and
    A/B testing strategies, monitor prediction drift, and manage the feature store for online and offline serving.
  version: 3.2.0
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-data-ml-models
  x-acme-domain: data
servers:
  - url: https://af-data-ml-models.api.acmefin.com/v1
    description: Production
  - url: https://af-data-ml-models.staging.acmefin.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Models
    description: Register, version, and manage ML model artifacts in the model registry
  - name: Deployments
    description: Deploy models to serving infrastructure and monitor health
  - name: Experiments
    description: Track ML experiments and hyperparameter optimization runs
  - name: Feature Store
    description: Manage computed features for model training and online serving
  - name: Predictions
    description: Run real-time and batch predictions against deployed models
paths:
  /models:
    get:
      operationId: listModels
      summary: List registered models
      description: >-
        Retrieve all models in the registry with framework, task type, lifecycle status, and evaluation
        metrics.
      tags:
        - Models
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: framework
          in: query
          required: false
          description: Filter by ML framework
          schema:
            type: "string"
        - name: task_type
          in: query
          required: false
          description: Filter by ML task
          schema:
            type: "string"
        - name: status
          in: query
          required: false
          description: Filter by lifecycle status
          schema:
            type: "string"
            enum:
              - draft
              - staging
              - production
              - archived
              - rejected
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        model_id:
                          type: string
                          description: "Model registry identifier"
                          format: uuid
                          readOnly: true
                        name:
                          type: string
                          description: "Model name"
                          example: "credit-risk-scorer-v3"
                        framework:
                          type: string
                          description: "ML framework"
                          enum:
                            - sklearn
                            - xgboost
                            - tensorflow
                            - pytorch
                            - lightgbm
                            - custom
                        task_type:
                          type: string
                          description: "ML task type"
                          enum:
                            - classification
                            - regression
                            - clustering
                            - ranking
                            - anomaly_detection
                        description:
                          type: string
                          description: "Model purpose and methodology"
                        owner:
                          type: string
                          description: "Model owner team"
                        status:
                          type: string
                          description: "Registry lifecycle status"
                          enum:
                            - draft
                            - staging
                            - production
                            - archived
                            - rejected
                        metrics:
                          type: object
                          description: "Evaluation metrics (AUC, F1, RMSE, etc.)"
                        created_at:
                          type: string
                          format: date-time
                      required:
                        - model_id
                        - name
                        - framework
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: registerModel
      summary: Register model
      description: >-
        Register a new ML model in the registry with its artifact location, framework metadata, and
        evaluation metrics.
      tags:
        - Models
      requestBody:
        required: true
        description: Register model request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    name:
                      type: string
                    framework:
                      type: string
                      enum:
                        - sklearn
                        - xgboost
                        - tensorflow
                        - pytorch
                        - lightgbm
                        - custom
                    task_type:
                      type: string
                      enum:
                        - classification
                        - regression
                        - clustering
                        - ranking
                        - anomaly_detection
                    description:
                      type: string
                    artifact_uri:
                      type: string
                      description: "Model artifact storage URI"
                    metrics:
                      type: object
                      description: "Evaluation metrics"
              required:
                - name
                - framework
                - task_type
                - artifact_uri
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  model_id:
                    type: string
                    description: "Model registry identifier"
                    format: uuid
                    readOnly: true
                  name:
                    type: string
                    description: "Model name"
                    example: "credit-risk-scorer-v3"
                  framework:
                    type: string
                    description: "ML framework"
                    enum:
                      - sklearn
                      - xgboost
                      - tensorflow
                      - pytorch
                      - lightgbm
                      - custom
                  task_type:
                    type: string
                    description: "ML task type"
                    enum:
                      - classification
                      - regression
                      - clustering
                      - ranking
                      - anomaly_detection
                  description:
                    type: string
                    description: "Model purpose and methodology"
                  owner:
                    type: string
                    description: "Model owner team"
                  status:
                    type: string
                    description: "Registry lifecycle status"
                    enum:
                      - draft
                      - staging
                      - production
                      - archived
                      - rejected
                  metrics:
                    type: object
                    description: "Evaluation metrics (AUC, F1, RMSE, etc.)"
                  created_at:
                    type: string
                    format: date-time
                required:
                  - model_id
                  - name
                  - status
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /models/{model_id}:
    get:
      operationId: getModel
      summary: Get model details
      description: >-
        Retrieve complete model metadata including version history, evaluation metrics, deployment status,
        and lineage.
      tags:
        - Models
      parameters:
        - name: model_id
          in: path
          required: true
          description: Unique model id
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  model_id:
                    type: string
                    description: "Model registry identifier"
                    format: uuid
                    readOnly: true
                  name:
                    type: string
                    description: "Model name"
                    example: "credit-risk-scorer-v3"
                  framework:
                    type: string
                    description: "ML framework"
                    enum:
                      - sklearn
                      - xgboost
                      - tensorflow
                      - pytorch
                      - lightgbm
                      - custom
                  task_type:
                    type: string
                    description: "ML task type"
                    enum:
                      - classification
                      - regression
                      - clustering
                      - ranking
                      - anomaly_detection
                  description:
                    type: string
                    description: "Model purpose and methodology"
                  owner:
                    type: string
                    description: "Model owner team"
                  status:
                    type: string
                    description: "Registry lifecycle status"
                    enum:
                      - draft
                      - staging
                      - production
                      - archived
                      - rejected
                  metrics:
                    type: object
                    description: "Evaluation metrics (AUC, F1, RMSE, etc.)"
                  created_at:
                    type: string
                    format: date-time
                required:
                  - model_id
                  - name
                  - framework
                  - status
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    patch:
      operationId: updateModel
      summary: Update model metadata
      description: Update model description, owner, or promote to the next lifecycle stage.
      tags:
        - Models
      parameters:
        - name: model_id
          in: path
          required: true
          description: Unique model id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Update model metadata request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    description:
                      type: string
                    owner:
                      type: string
                    status:
                      type: string
                      enum:
                        - staging
                        - production
                        - archived
                        - rejected
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  model_id:
                    type: string
                    description: "Model registry identifier"
                    format: uuid
                    readOnly: true
                  name:
                    type: string
                    description: "Model name"
                    example: "credit-risk-scorer-v3"
                  framework:
                    type: string
                    description: "ML framework"
                    enum:
                      - sklearn
                      - xgboost
                      - tensorflow
                      - pytorch
                      - lightgbm
                      - custom
                  task_type:
                    type: string
                    description: "ML task type"
                    enum:
                      - classification
                      - regression
                      - clustering
                      - ranking
                      - anomaly_detection
                  description:
                    type: string
                    description: "Model purpose and methodology"
                  owner:
                    type: string
                    description: "Model owner team"
                  status:
                    type: string
                    description: "Registry lifecycle status"
                    enum:
                      - draft
                      - staging
                      - production
                      - archived
                      - rejected
                  metrics:
                    type: object
                    description: "Evaluation metrics (AUC, F1, RMSE, etc.)"
                  created_at:
                    type: string
                    format: date-time
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
    delete:
      operationId: deleteModel
      summary: Delete model
      description: >-
        Remove a model and all versions from the registry. Active deployments must be terminated first.
      tags:
        - Models
      parameters:
        - name: model_id
          in: path
          required: true
          description: Unique model id
          schema:
            type: "string"
      responses:
        "204":
          description: Resource deleted successfully
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /models/{model_id}/versions:
    get:
      operationId: listModelVersions
      summary: List model versions
      description: Retrieve all versions of a registered model with metrics comparison.
      tags:
        - Models
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        version:
                          type: integer
                          description: "Version number"
                        artifact_uri:
                          type: string
                        metrics:
                          type: object
                        status:
                          type: string
                          enum:
                            - draft
                            - staging
                            - production
                            - archived
                        created_at:
                          type: string
                          format: date-time
                      required:
                        - version
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: createModelVersion
      summary: Create model version
      description: Publish a new version of an existing model with updated artifacts and metrics.
      tags:
        - Models
      parameters:
        - name: model_id
          in: path
          required: true
          description: Unique model id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Create model version request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    artifact_uri:
                      type: string
                      description: "New artifact URI"
                    metrics:
                      type: object
                    release_notes:
                      type: string
              required:
                - artifact_uri
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: integer
                  model_id:
                    type: string
                  status:
                    type: string
                required:
                  - version
                  - model_id
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /models/{model_id}/deploy:
    post:
      operationId: deployModel
      summary: Deploy model
      description: >-
        Deploy a model version to the serving infrastructure. Supports canary, blue-green, and shadow
        deployment strategies.
      tags:
        - Models
      parameters:
        - name: model_id
          in: path
          required: true
          description: Unique model id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Deploy model request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    version:
                      type: integer
                      description: "Model version to deploy"
                    environment:
                      type: string
                      enum:
                        - staging
                        - production
                        - shadow
                    strategy:
                      type: string
                      description: "Deployment strategy"
                      enum:
                        - canary
                        - blue_green
                        - rolling
                        - shadow
                    replicas:
                      type: integer
                      description: "Number of serving replicas"
                      default: 2
              required:
                - version
                - environment
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  deployment_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                  endpoint_url:
                    type: string
                required:
                  - deployment_id
                  - status
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /deployments:
    get:
      operationId: listDeployments
      summary: List model deployments
      description: >-
        Retrieve all active model deployments with health metrics, latency, and throughput.
      tags:
        - Deployments
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: environment
          in: query
          required: false
          description: Filter by deployment environment
          schema:
            type: "string"
            enum:
              - staging
              - production
              - shadow
        - name: status
          in: query
          required: false
          description: Filter by deployment status
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        deployment_id:
                          type: string
                          description: "Deployment identifier"
                          format: uuid
                          readOnly: true
                        model_id:
                          type: string
                          format: uuid
                        model_version:
                          type: integer
                          description: "Deployed model version"
                        environment:
                          type: string
                          description: "Target deployment environment"
                          enum:
                            - staging
                            - production
                            - shadow
                        endpoint_url:
                          type: string
                          description: "Prediction endpoint URL"
                        status:
                          type: string
                          description: "Deployment health status"
                          enum:
                            - deploying
                            - active
                            - degraded
                            - draining
                            - terminated
                        replicas:
                          type: integer
                          description: "Number of serving replicas"
                        avg_latency_ms:
                          type: number
                          description: "Average prediction latency"
                          format: double
                        requests_per_minute:
                          type: integer
                          description: "Current throughput"
                        deployed_at:
                          type: string
                          format: date-time
                      required:
                        - deployment_id
                        - model_id
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /deployments/{deployment_id}:
    get:
      operationId: getDeployment
      summary: Get deployment details
      description: >-
        Retrieve deployment configuration, health status, traffic metrics, and serving logs.
      tags:
        - Deployments
      parameters:
        - name: deployment_id
          in: path
          required: true
          description: Unique deployment id
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  deployment_id:
                    type: string
                    description: "Deployment identifier"
                    format: uuid
                    readOnly: true
                  model_id:
                    type: string
                    format: uuid
                  model_version:
                    type: integer
                    description: "Deployed model version"
                  environment:
                    type: string
                    description: "Target deployment environment"
                    enum:
                      - staging
                      - production
                      - shadow
                  endpoint_url:
                    type: string
                    description: "Prediction endpoint URL"
                  status:
                    type: string
                    description: "Deployment health status"
                    enum:
                      - deploying
                      - active
                      - degraded
                      - draining
                      - terminated
                  replicas:
                    type: integer
                    description: "Number of serving replicas"
                  avg_latency_ms:
                    type: number
                    description: "Average prediction latency"
                    format: double
                  requests_per_minute:
                    type: integer
                    description: "Current throughput"
                  deployed_at:
                    type: string
                    format: date-time
                required:
                  - deployment_id
                  - model_id
                  - status
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    delete:
      operationId: terminateDeployment
      summary: Terminate deployment
      description: >-
        Drain traffic and shut down a model deployment. Active requests complete before termination.
      tags:
        - Deployments
      parameters:
        - name: deployment_id
          in: path
          required: true
          description: Unique deployment id
          schema:
            type: "string"
      responses:
        "204":
          description: Resource deleted successfully
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /deployments/{deployment_id}/metrics:
    get:
      operationId: getDeploymentMetrics
      summary: Get deployment metrics
      description: >-
        Retrieve real-time serving metrics including latency percentiles, throughput, error rates, and
        prediction distribution.
      tags:
        - Deployments
      parameters:
        - name: deployment_id
          in: path
          required: true
          description: Unique deployment id
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  deployment_id:
                    type: string
                  latency_p50_ms:
                    type: number
                    format: double
                  latency_p95_ms:
                    type: number
                    format: double
                  latency_p99_ms:
                    type: number
                    format: double
                  requests_per_minute:
                    type: integer
                  error_rate:
                    type: number
                    format: double
                  prediction_drift_score:
                    type: number
                    description: "PSI-based drift score (>0.2 = significant drift)"
                    format: double
                required:
                  - deployment_id
                  - latency_p50_ms
                  - requests_per_minute
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /deployments/{deployment_id}/ab-test:
    post:
      operationId: configureABTest
      summary: Configure A/B test
      description: >-
        Set up an A/B test between two model versions on the same deployment endpoint with configurable
        traffic splits.
      tags:
        - Deployments
      parameters:
        - name: deployment_id
          in: path
          required: true
          description: Unique deployment id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Configure A/B test request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    variant_a_version:
                      type: integer
                      description: "Model version for variant A"
                    variant_b_version:
                      type: integer
                      description: "Model version for variant B"
                    traffic_split_percent:
                      type: integer
