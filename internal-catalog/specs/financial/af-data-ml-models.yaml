        content:
          application/json:
            schema:
              type: object
              properties:
                    model_id:
                      type: string
                      description: "Target model"
                      format: uuid
                    version:
                      type: integer
                      description: "Model version (omit for latest production)"
                    input_features:
                      type: object
                      description: "Input feature values for prediction"
