                    example: "CLM-2024-00048291"
                  policy_id:
                    type: string
                    description: Policy under which the claim is filed
                    example: "POL-10029384"
                  claimant_name:
                    type: string
                    description: Name of the claimant
                    example: "Margaret L. Davis"
                  loss_date:
                    type: string
                    description: Date and time of the reported loss
                    format: date-time
                    example: "2024-08-15T14:30:00Z"
                  reported_date:
                    type: string
                    description: Date FNOL was received
                    format: date-time
                    example: "2024-08-15T16:45:00Z"
                  loss_type:
                    type: string
                    example: "COLLISION"
                    enum:
                      - COLLISION
                      - COMPREHENSIVE
                      - LIABILITY_BI
                      - LIABILITY_PD
                      - PROPERTY_DAMAGE
                      - THEFT
                      - WEATHER
                      - FIRE
                      - WATER_DAMAGE
                      - MEDICAL
                  status:
                    type: string
                    example: "UNDER_INVESTIGATION"
                    enum:
                      - REPORTED
                      - UNDER_INVESTIGATION
                      - ADJUDICATED
                      - APPROVED
                      - DENIED
                      - PAID
                      - CLOSED
                      - REOPENED
                      - LITIGATION
                  severity:
                    type: string
                    description: Claim severity classification
                    example: "MODERATE"
                    enum:
                      - LOW
                      - MODERATE
                      - HIGH
                      - CATASTROPHIC
                  loss_description:
                    type: string
                    description: Narrative description of the loss event
                    example: "Rear-end collision at intersection of Main St and 5th Ave. Airbags deployed."
                  adjuster_id:
                    type: string
                    description: Assigned claims adjuster
                    example: "ADJ-00192"
                  total_incurred:
                    type: number
                    description: Total incurred amount (paid + reserves)
                    format: double
                    example: 14500.0
                  total_paid:
                    type: number
                    description: Total amount paid to date
                    format: double
                    example: 8200.0
                  deductible_amount:
                    type: number
                    description: Applicable deductible
                    format: double
                    example: 1000.0
                  litigation_flag:
                    type: boolean
                    description: Whether claim is in litigation
                    example: false
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /claims/{claim_id}/investigation:
    post:
      operationId: initiateInvestigation
      summary: Initiate claims investigation
      description: >-
        Open a formal investigation on a claim. Assigns an investigator, sets investigation scope, and
        optionally refers the claim to the Special Investigations Unit (SIU) for suspected fraud. Triggers
        ISO ClaimSearch query for prior-loss history.
      tags:
        - Investigation
      parameters:
        - name: claim_id
          in: path
          required: true
          description: Unique claim id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Initiate claims investigation request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    investigation_type:
                      type: string
                      example: "STANDARD"
                      enum:
                        - STANDARD
                        - SIU_REFERRAL
                        - LITIGATION_SUPPORT
                    scope:
                      type: string
                      description: Investigation scope and objectives
                      example: "Verify loss circumstances, obtain recorded statement, inspect damaged property"
                    priority:
                      type: string
                      example: "NORMAL"
                      enum:
                        - NORMAL
                        - URGENT
                        - EXPEDITED
              required:
                - investigation_type
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  investigation_id:
                    type: string
                    example: "INV-00482917"
                  investigator_id:
                    type: string
                    example: "INV-ADJ-0091"
                  status:
                    type: string
                    example: "OPEN"
                    enum:
                      - OPEN
                      - IN_PROGRESS
                  iso_claimsearch_hit:
                    type: boolean
                    description: Whether ISO ClaimSearch returned prior-loss matches
                    example: false
                required:
                  - investigation_id
                  - status
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /claims/{claim_id}/investigation/status:
    get:
      operationId: getInvestigationStatus
      summary: Get investigation status
      description: >-
        Retrieve the current status and findings of the claims investigation, including investigator notes,
        witness statements collected, and SIU determination if applicable.
      tags:
        - Investigation
      parameters:
        - name: claim_id
          in: path
          required: true
          description: Claim identifier
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  investigation_id:
                    type: string
                  status:
                    type: string
                    enum:
                      - OPEN
                      - IN_PROGRESS
                      - COMPLETED
                      - CLOSED
                  findings_summary:
                    type: string
                  siu_determination:
                    type: string
                    enum:
                      - NO_FRAUD
                      - SUSPICIOUS
                      - CONFIRMED_FRAUD
                      - NOT_APPLICABLE
                    nullable: true
                  completion_date:
                    type: string
                    format: date
                    nullable: true
                required:
                  - investigation_id
                  - status
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /claims/{claim_id}/adjudication:
    post:
      operationId: adjudicateClaim
      summary: Adjudicate claim
      description: >-
        Submit a coverage determination and liability assessment for the claim. The adjudication decision
        sets the approved amount, applies the deductible, and establishes the payment authorization. Claims
        exceeding authority limits are escalated to a senior examiner.
      tags:
        - Adjudication
      parameters:
        - name: claim_id
          in: path
          required: true
          description: Unique claim id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Adjudicate claim request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    decision:
                      type: string
                      example: "APPROVE_FULL"
                      enum:
                        - APPROVE_FULL
                        - APPROVE_PARTIAL
                        - DENY
                        - REFER_TO_SENIOR
                    approved_amount:
                      type: number
                      description: Total approved claim amount before deductible
                      format: double
                      example: 14500.0
                    denial_reason:
                      type: string
                      description: Required if decision is DENY
                      nullable: true
                    coverage_analysis:
                      type: string
                      description: Coverage determination narrative
                      example: "Loss is covered under comprehensive coverage. No exclusions apply."
                    liability_assessment:
                      type: string
                      description: Liability determination
                      example: "Insured 0% at fault. Third party 100% liable."
              required:
                - decision
                - coverage_analysis
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  adjudication_id:
                    type: string
                    example: "ADJ-00918274"
                  net_payable:
                    type: number
                    description: Amount payable after deductible
                    format: double
                    example: 13500.0
                  status:
                    type: string
                    example: "APPROVED"
                    enum:
                      - APPROVED
                      - DENIED
                      - PENDING_SENIOR_REVIEW
                required:
                  - adjudication_id
                  - net_payable
                  - status
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /claims/{claim_id}/payments:
    get:
      operationId: listClaimPayments
      summary: List claim payments
      description: >-
        Retrieve all payments issued against a claim, including indemnity payments to the insured, expense
        payments to vendors, and medical payments to providers.
      tags:
        - Payments
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: payment_type
          in: query
          required: false
          description: Filter by payment category
          schema:
            type: "string"
            enum:
              - INDEMNITY
              - EXPENSE
              - MEDICAL
              - LEGAL
              - SALVAGE_RECOVERY
        - name: status
          in: query
          required: false
          description: Filter by payment status
          schema:
            type: "string"
            enum:
              - PENDING
              - ISSUED
              - CLEARED
              - VOIDED
              - STOP_PAY
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        payment_id:
                          type: string
                          example: "PAY-CLM-00928374"
                        claim_id:
                          type: string
                          example: "CLM-2024-00048291"
                        payee_name:
                          type: string
                          description: Payment recipient
                          example: "Davis Auto Body & Repair"
                        payment_type:
                          type: string
                          example: "INDEMNITY"
                          enum:
                            - INDEMNITY
                            - EXPENSE
                            - MEDICAL
                            - LEGAL
                            - SALVAGE_RECOVERY
                        amount:
                          type: number
                          format: double
                          example: 4200.0
                        check_number:
                          type: string
                          description: Check or EFT reference number
                          example: "CHK-000482917"
                        status:
                          type: string
                          example: "ISSUED"
                          enum:
                            - PENDING
                            - ISSUED
                            - CLEARED
                            - VOIDED
                            - STOP_PAY
                        issued_date:
                          type: string
                          format: date
                          example: "2024-09-10"
                      required:
                        - payment_id
                        - amount
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
