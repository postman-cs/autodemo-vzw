  /claims/{claim_id}/reserves:
    get:
      operationId: getClaimReserves
      summary: Retrieve claim reserves
      description: >-
        Get the current reserve position for a claim broken down by reserve category (indemnity, expense,
        medical, legal). Shows initial reserves set at FNOL, current reserves after adjustments, amounts
        paid, and outstanding balances.
      tags:
        - Reserves
      parameters:
        - name: claim_id
          in: path
          required: true
          description: Claim identifier
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  reserves:
                    type: array
                    description: Reserve breakdown by category
                    items:
                      type: object
                  total_initial:
                    type: number
                    format: double
                  total_current:
                    type: number
                    format: double
                  total_paid:
                    type: number
                    format: double
                  total_outstanding:
                    type: number
                    format: double
                required:
                  - total_current
                  - total_outstanding
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    patch:
      operationId: adjustClaimReserves
      summary: Adjust claim reserves
      description: >-
        Adjust reserve amounts for a claim. Reserve changes must include a justification narrative.
        Increases above 50% of initial reserve require supervisory approval. All reserve changes are audited
        for actuarial analysis and IBNR calculations.
      tags:
        - Reserves
      parameters:
        - name: claim_id
          in: path
          required: true
          description: Claim identifier
          schema:
            type: "string"
      requestBody:
        required: true
        description: Adjust claim reserves request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    reserve_type:
                      type: string
                      description: Category of reserve
                      example: "INDEMNITY"
                      enum:
                        - INDEMNITY
                        - EXPENSE
                        - MEDICAL
                        - LEGAL
                    new_amount:
                      type: number
                      description: New reserve amount
                      format: double
                      example: 18000.0
                    reason:
                      type: string
                      description: Justification for reserve change
                      example: "Supplement estimate received; additional structural damage found during tear-down"
              required:
                - reserve_type
                - new_amount
                - reason
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  reserve_id:
                    type: string
                    example: "RSV-00482913"
                  claim_id:
                    type: string
                    example: "CLM-2024-00048291"
                  reserve_type:
                    type: string
                    description: Category of reserve
                    example: "INDEMNITY"
                    enum:
                      - INDEMNITY
                      - EXPENSE
                      - MEDICAL
                      - LEGAL
                  initial_amount:
                    type: number
                    description: Initial reserve set at FNOL
                    format: double
                    example: 10000.0
                  current_amount:
                    type: number
                    description: Current reserve after adjustments
                    format: double
                    example: 14500.0
                  paid_to_date:
                    type: number
                    description: Amount paid against this reserve
                    format: double
                    example: 8200.0
                  remaining:
                    type: number
                    description: Outstanding reserve balance
                    format: double
                    example: 6300.0
                  last_adjusted_date:
                    type: string
                    format: date
                    example: "2024-09-05"
                  adjuster_notes:
                    type: string
                    description: Reserve adjustment rationale
                    example: "Increased reserve after supplement estimate received from body shop."
                required:
                  - reserve_id
                  - current_amount
                  - remaining
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /claims/{claim_id}/subrogation:
    post:
      operationId: initiateSubrogation
      summary: Initiate subrogation
      description: >-
        Open a subrogation file to pursue recovery from a third party or their insurer. Generates a demand
        letter and initiates inter-company arbitration through Arbitration Forums if applicable.
      tags:
        - Subrogation
      parameters:
        - name: claim_id
          in: path
          required: true
          description: Unique claim id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Initiate subrogation request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    adverse_party_name:
                      type: string
                      description: Name of the at-fault party
                      example: "John K. Williams"
                    adverse_carrier:
                      type: string
                      description: At-fault party's insurance carrier
                      example: "National Mutual Insurance Co."
                    adverse_policy_number:
                      type: string
                      description: Adverse party's policy number
                      example: "NMI-PAP-2847291"
                    recovery_amount_sought:
                      type: number
                      description: Total recovery amount demanded
                      format: double
                      example: 14500.0
                    liability_pct:
                      type: number
                      description: Adverse party liability percentage
                      format: double
                      example: 100.0
              required:
                - adverse_party_name
                - recovery_amount_sought
                - liability_pct
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  subrogation_id:
                    type: string
                    example: "SUB-00482918"
                  demand_letter_id:
                    type: string
                  status:
                    type: string
                    example: "DEMAND_SENT"
                    enum:
                      - OPEN
                      - DEMAND_SENT
                      - IN_ARBITRATION
                      - SETTLED
                      - CLOSED
                required:
                  - subrogation_id
                  - status
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /claims/{claim_id}/subrogation/status:
    get:
      operationId: getSubrogationStatus
      summary: Get subrogation status
      description: >-
        Retrieve subrogation recovery status including demand amount, amounts recovered, arbitration status,
        and recovery timeline.
      tags:
        - Subrogation
      parameters:
        - name: claim_id
          in: path
          required: true
          description: Claim identifier
          schema:
            type: "string"
      responses:
