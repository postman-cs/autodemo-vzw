        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: issueClaimPayment
      summary: Issue claim payment
      description: >-
        Create and issue a payment against an adjudicated claim. Payments are validated against the approved
        amount and available reserves. Two-party checks require both payee names. Payments exceeding $25,000
        require supervisory approval.
      tags:
        - Payments
      parameters:
        - name: claim_id
          in: path
          required: true
          description: Unique claim id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Issue claim payment request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    payee_name:
                      type: string
                      description: Payment recipient
                      example: "Davis Auto Body & Repair"
                    payment_type:
                      type: string
                      example: "INDEMNITY"
                      enum:
                        - INDEMNITY
                        - EXPENSE
                        - MEDICAL
                        - LEGAL
                        - SALVAGE_RECOVERY
                    amount:
                      type: number
                      description: Payment amount
                      format: double
                      example: 4200.0
                    payment_method:
                      type: string
                      example: "CHECK"
                      enum:
                        - CHECK
                        - EFT
                        - WIRE
                    memo:
                      type: string
                      description: Payment memo/description
                      example: "Collision repair - Davis Auto Body estimate #E-2948"
              required:
                - payee_name
                - payment_type
                - amount
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  payment_id:
                    type: string
                    example: "PAY-CLM-00928374"
                  claim_id:
                    type: string
                    example: "CLM-2024-00048291"
                  payee_name:
                    type: string
                    description: Payment recipient
                    example: "Davis Auto Body & Repair"
                  payment_type:
                    type: string
                    example: "INDEMNITY"
                    enum:
                      - INDEMNITY
                      - EXPENSE
                      - MEDICAL
                      - LEGAL
                      - SALVAGE_RECOVERY
                  amount:
                    type: number
                    format: double
                    example: 4200.0
                  check_number:
                    type: string
                    description: Check or EFT reference number
                    example: "CHK-000482917"
                  status:
                    type: string
                    example: "ISSUED"
                    enum:
                      - PENDING
                      - ISSUED
                      - CLEARED
                      - VOIDED
                      - STOP_PAY
                  issued_date:
                    type: string
                    format: date
                    example: "2024-09-10"
                required:
                  - payment_id
                  - status
        "400":
