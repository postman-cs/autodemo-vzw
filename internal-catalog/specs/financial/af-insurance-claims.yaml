          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  subrogation_id:
                    type: string
                  status:
                    type: string
                    enum:
                      - OPEN
                      - DEMAND_SENT
                      - IN_ARBITRATION
                      - SETTLED
                      - CLOSED
                  amount_demanded:
                    type: number
                    format: double
                  amount_recovered:
                    type: number
                    format: double
                  recovery_pct:
                    type: number
                    format: double
                  arbitration_forum_case_id:
                    type: string
                    nullable: true
                required:
                  - subrogation_id
                  - status
                  - amount_demanded
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /claims/{claim_id}/salvage:
    post:
      operationId: processSalvage
      summary: Process salvage disposition
      description: >-
        Record salvage disposition for total-loss claims. Captures salvage sale amount, buyer information,
        and title transfer details. Salvage proceeds offset the total claim cost and are reflected in loss-
        ratio reporting.
      tags:
        - Payments
      parameters:
        - name: claim_id
          in: path
          required: true
          description: Unique claim id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Process salvage disposition request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    salvage_type:
                      type: string
                      example: "AUCTION"
                      enum:
                        - AUCTION
                        - DIRECT_SALE
                        - RETAINED_BY_INSURED
                        - DONATED
                    salvage_value:
                      type: number
                      description: Realized salvage amount
                      format: double
                      example: 3200.0
                    buyer_name:
                      type: string
                      description: Salvage buyer (if sold)
                      example: "Copart Auto Auction"
                    title_transferred:
                      type: boolean
                      description: Whether salvage title has been transferred
                      example: true
              required:
                - salvage_type
                - salvage_value
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  salvage_id:
                    type: string
                    example: "SLV-00291847"
                  net_claim_cost:
                    type: number
                    description: Net claim cost after salvage offset
                    format: double
                    example: 11300.0
                  status:
                    type: string
                    example: "RECORDED"
                    enum:
                      - RECORDED
                      - PENDING_TITLE
                required:
                  - salvage_id
                  - net_claim_cost
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /claims/{claim_id}/documents:
