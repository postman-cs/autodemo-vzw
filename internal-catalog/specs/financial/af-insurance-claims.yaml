openapi: 3.0.3
info:
  title: Acme Finance Insurance Claims API
  description: >-
    End-to-end claims management from First Notice of Loss (FNOL) through investigation, adjudication, reserve
    management, payment processing, subrogation recovery, and salvage disposition. Supports severity triage, SIU
    referral for suspicious claims, litigation tracking, and NAIC statistical reporting. Integrates with ISO
    ClaimSearch for prior-loss and fraud detection.
  version: 4.0.0
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-insurance-claims
  x-acme-domain: insurance
servers:
  - url: https://af-insurance-claims.api.acmefin.com/v1
    description: Production
  - url: https://af-insurance-claims.staging.acmefin.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Claims Intake
    description: First Notice of Loss (FNOL) registration, triage, and adjuster assignment
  - name: Investigation
    description: Claims investigation workflow including SIU referral and fraud scoring
  - name: Adjudication
    description: Coverage determination, liability assessment, and claim decision processing
  - name: Payments
    description: Indemnity and expense payment processing, check issuance, and payment recovery
  - name: Reserves
    description: Loss reserve establishment, monitoring, and staircase reserve adjustments
  - name: Subrogation
    description: Subrogation demand, recovery tracking, and arbitration management
paths:
  /claims:
    get:
      operationId: listClaims
      summary: List claims
      description: >-
        Retrieve a paginated list of insurance claims. Supports filtering by policy, status, loss type,
        severity, adjuster assignment, and date ranges. Results include incurred totals and reserve
        summaries.
      tags:
        - Claims Intake
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: policy_id
          in: query
          required: false
          description: Filter by policy number
          schema:
            type: "string"
        - name: status
          in: query
          required: false
          description: Filter by claim status
          schema:
            type: "string"
            enum:
              - REPORTED
              - UNDER_INVESTIGATION
              - ADJUDICATED
              - APPROVED
              - DENIED
              - PAID
              - CLOSED
              - REOPENED
              - LITIGATION
        - name: loss_type
          in: query
          required: false
          description: Filter by type of loss
          schema:
            type: "string"
        - name: severity
          in: query
          required: false
          description: Filter by severity classification
          schema:
            type: "string"
            enum:
              - LOW
              - MODERATE
              - HIGH
              - CATASTROPHIC
        - name: adjuster_id
          in: query
          required: false
          description: Filter by assigned adjuster
          schema:
            type: "string"
        - name: loss_date_from
          in: query
          required: false
          description: Loss date range start (ISO 8601)
          schema:
            type: "string"
            format: "date"
        - name: loss_date_to
          in: query
          required: false
          description: Loss date range end (ISO 8601)
          schema:
            type: "string"
            format: "date"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        claim_id:
                          type: string
                          description: Unique claim number
                          example: "CLM-2024-00048291"
                        policy_id:
                          type: string
                          description: Policy under which the claim is filed
                          example: "POL-10029384"
                        claimant_name:
                          type: string
                          description: Name of the claimant
                          example: "Margaret L. Davis"
                        loss_date:
                          type: string
                          description: Date and time of the reported loss
                          format: date-time
                          example: "2024-08-15T14:30:00Z"
                        reported_date:
                          type: string
                          description: Date FNOL was received
                          format: date-time
                          example: "2024-08-15T16:45:00Z"
                        loss_type:
                          type: string
                          example: "COLLISION"
                          enum:
                            - COLLISION
                            - COMPREHENSIVE
                            - LIABILITY_BI
                            - LIABILITY_PD
                            - PROPERTY_DAMAGE
                            - THEFT
                            - WEATHER
                            - FIRE
                            - WATER_DAMAGE
                            - MEDICAL
                        status:
                          type: string
                          example: "UNDER_INVESTIGATION"
                          enum:
                            - REPORTED
                            - UNDER_INVESTIGATION
                            - ADJUDICATED
                            - APPROVED
                            - DENIED
                            - PAID
                            - CLOSED
                            - REOPENED
                            - LITIGATION
                        severity:
                          type: string
                          description: Claim severity classification
                          example: "MODERATE"
                          enum:
                            - LOW
                            - MODERATE
                            - HIGH
                            - CATASTROPHIC
                        loss_description:
                          type: string
                          description: Narrative description of the loss event
                          example: "Rear-end collision at intersection of Main St and 5th Ave. Airbags deployed."
                        adjuster_id:
                          type: string
                          description: Assigned claims adjuster
                          example: "ADJ-00192"
                        total_incurred:
                          type: number
                          description: Total incurred amount (paid + reserves)
                          format: double
                          example: 14500.0
                        total_paid:
                          type: number
                          description: Total amount paid to date
                          format: double
                          example: 8200.0
                        deductible_amount:
                          type: number
                          description: Applicable deductible
                          format: double
                          example: 1000.0
                        litigation_flag:
                          type: boolean
                          description: Whether claim is in litigation
                          example: false
                      required:
                        - claim_id
                        - policy_id
                        - status
                        - loss_type
                        - loss_date
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /claims/fnol:
    post:
      operationId: submitFNOL
      summary: Submit First Notice of Loss
      description: >-
        File a First Notice of Loss to initiate the claims process. The system performs coverage
        verification against the policy, assigns a severity classification based on loss type and
        description, and routes the claim to an available adjuster in the appropriate territory.
      tags:
        - Claims Intake
      requestBody:
        required: true
        description: Submit First Notice of Loss request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    policy_id:
                      type: string
                      description: Policy under which the claim is filed
                      example: "POL-10029384"
                    claimant_name:
                      type: string
                      description: Name of the claimant
                      example: "Margaret L. Davis"
                    loss_date:
                      type: string
                      description: Date and time of the reported loss
                      format: date-time
                      example: "2024-08-15T14:30:00Z"
                    loss_type:
                      type: string
                      example: "COLLISION"
                      enum:
                        - COLLISION
                        - COMPREHENSIVE
                        - LIABILITY_BI
                        - LIABILITY_PD
                        - PROPERTY_DAMAGE
                        - THEFT
                        - WEATHER
                        - FIRE
                        - WATER_DAMAGE
                        - MEDICAL
                    loss_description:
                      type: string
                      description: Narrative description of the loss event
                      example: "Rear-end collision at intersection of Main St and 5th Ave. Airbags deployed."
                    loss_location:
                      type: string
                      description: Address or location where loss occurred
                      example: "Intersection of Main St and 5th Ave, Hartford, CT"
                    police_report_number:
                      type: string
                      description: Police report number if applicable
                      example: "HPD-2024-08291"
                    injured_parties:
                      type: integer
                      description: Number of injured parties
                      example: 0
              required:
                - policy_id
                - claimant_name
                - loss_date
                - loss_type
                - loss_description
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  claim_id:
                    type: string
                    description: Unique claim number
                    example: "CLM-2024-00048291"
                  policy_id:
                    type: string
                    description: Policy under which the claim is filed
                    example: "POL-10029384"
                  claimant_name:
                    type: string
                    description: Name of the claimant
                    example: "Margaret L. Davis"
                  loss_date:
                    type: string
                    description: Date and time of the reported loss
                    format: date-time
                    example: "2024-08-15T14:30:00Z"
                  reported_date:
                    type: string
                    description: Date FNOL was received
                    format: date-time
                    example: "2024-08-15T16:45:00Z"
                  loss_type:
                    type: string
                    example: "COLLISION"
                    enum:
                      - COLLISION
                      - COMPREHENSIVE
                      - LIABILITY_BI
                      - LIABILITY_PD
                      - PROPERTY_DAMAGE
                      - THEFT
                      - WEATHER
                      - FIRE
                      - WATER_DAMAGE
                      - MEDICAL
                  status:
                    type: string
                    example: "UNDER_INVESTIGATION"
                    enum:
                      - REPORTED
                      - UNDER_INVESTIGATION
                      - ADJUDICATED
                      - APPROVED
                      - DENIED
                      - PAID
                      - CLOSED
                      - REOPENED
                      - LITIGATION
                  severity:
                    type: string
                    description: Claim severity classification
                    example: "MODERATE"
                    enum:
                      - LOW
                      - MODERATE
                      - HIGH
                      - CATASTROPHIC
                  loss_description:
                    type: string
                    description: Narrative description of the loss event
                    example: "Rear-end collision at intersection of Main St and 5th Ave. Airbags deployed."
                  adjuster_id:
                    type: string
                    description: Assigned claims adjuster
                    example: "ADJ-00192"
                  total_incurred:
                    type: number
                    description: Total incurred amount (paid + reserves)
                    format: double
                    example: 14500.0
                  total_paid:
                    type: number
                    description: Total amount paid to date
                    format: double
                    example: 8200.0
                  deductible_amount:
                    type: number
                    description: Applicable deductible
                    format: double
                    example: 1000.0
                  litigation_flag:
                    type: boolean
                    description: Whether claim is in litigation
                    example: false
                required:
                  - claim_id
                  - status
                  - severity
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /claims/{claim_id}:
    get:
      operationId: getClaim
      summary: Retrieve claim details
      description: >-
        Fetch complete claim details including loss information, coverage analysis, adjuster assignment,
        reserve summary, payment history, and current claim status. Includes litigation flags and SIU
        referral status.
      tags:
        - Claims Intake
      parameters:
        - name: claim_id
          in: path
          required: true
          description: Unique claim id
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  claim_id:
                    type: string
                    description: Unique claim number
                    example: "CLM-2024-00048291"
                  policy_id:
                    type: string
                    description: Policy under which the claim is filed
                    example: "POL-10029384"
                  claimant_name:
                    type: string
                    description: Name of the claimant
                    example: "Margaret L. Davis"
                  loss_date:
                    type: string
                    description: Date and time of the reported loss
                    format: date-time
                    example: "2024-08-15T14:30:00Z"
                  reported_date:
                    type: string
                    description: Date FNOL was received
                    format: date-time
                    example: "2024-08-15T16:45:00Z"
                  loss_type:
                    type: string
                    example: "COLLISION"
                    enum:
                      - COLLISION
                      - COMPREHENSIVE
                      - LIABILITY_BI
                      - LIABILITY_PD
                      - PROPERTY_DAMAGE
                      - THEFT
                      - WEATHER
                      - FIRE
                      - WATER_DAMAGE
                      - MEDICAL
                  status:
                    type: string
                    example: "UNDER_INVESTIGATION"
                    enum:
                      - REPORTED
                      - UNDER_INVESTIGATION
                      - ADJUDICATED
                      - APPROVED
                      - DENIED
                      - PAID
                      - CLOSED
                      - REOPENED
                      - LITIGATION
                  severity:
                    type: string
                    description: Claim severity classification
                    example: "MODERATE"
                    enum:
                      - LOW
                      - MODERATE
                      - HIGH
                      - CATASTROPHIC
                  loss_description:
                    type: string
                    description: Narrative description of the loss event
                    example: "Rear-end collision at intersection of Main St and 5th Ave. Airbags deployed."
                  adjuster_id:
                    type: string
                    description: Assigned claims adjuster
                    example: "ADJ-00192"
                  total_incurred:
                    type: number
                    description: Total incurred amount (paid + reserves)
                    format: double
                    example: 14500.0
                  total_paid:
                    type: number
                    description: Total amount paid to date
                    format: double
                    example: 8200.0
                  deductible_amount:
                    type: number
                    description: Applicable deductible
                    format: double
                    example: 1000.0
                  litigation_flag:
                    type: boolean
                    description: Whether claim is in litigation
                    example: false
                required:
                  - claim_id
                  - policy_id
                  - status
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    patch:
      operationId: updateClaim
      summary: Update claim details
      description: >-
        Modify claim information such as loss description, severity reclassification, adjuster reassignment,
        or litigation status. Status transitions follow the claims workflow state machine.
      tags:
        - Claims Intake
      parameters:
        - name: claim_id
          in: path
          required: true
          description: Unique claim id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Update claim details request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    loss_description:
                      type: string
                      description: Narrative description of the loss event
                      example: "Rear-end collision at intersection of Main St and 5th Ave. Airbags deployed."
                    severity:
                      type: string
                      description: Claim severity classification
                      example: "MODERATE"
                      enum:
                        - LOW
                        - MODERATE
                        - HIGH
                        - CATASTROPHIC
                    adjuster_id:
                      type: string
                      description: Assigned claims adjuster
                      example: "ADJ-00192"
                    litigation_flag:
