  /claims/{claim_id}/timeline:
    get:
      operationId: getClaimTimeline
      summary: Get claim timeline
      description: >-
        Retrieve a chronological timeline of all activities on a claim, including status changes, reserve
        adjustments, payments, investigation milestones, and correspondence. Used for audit trails and
        claims diary management.
      tags:
        - Claims Intake
      parameters:
        - name: claim_id
          in: path
          required: true
          description: Claim identifier
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    description: Chronological list of claim events
                    items:
                      type: object
                  total_events:
                    type: integer
                  claim_age_days:
                    type: integer
                    description: Number of days since FNOL
                required:
                  - events
                  - claim_age_days
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
