        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        document_id:
                          type: string
                        document_type:
                          type: string
                          enum:
                            - PHOTO
                            - POLICE_REPORT
                            - MEDICAL_RECORD
