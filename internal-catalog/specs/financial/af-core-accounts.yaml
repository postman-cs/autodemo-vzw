          description: Unique account id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Update account nickname request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    nickname:
                      type: string
                      description: New display name
                      example: "Joint Household"
                      maxLength: 40
              required:
                - nickname
      responses:
        "200":
          description: Successful response
