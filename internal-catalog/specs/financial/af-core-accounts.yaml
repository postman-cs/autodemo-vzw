        "500":
          $ref: "#/components/responses/500"
  /accounts/{account_id}/links:
    get:
      operationId: listLinkedAccounts
      summary: List linked accounts
      description: >-
        Retrieve all accounts linked to this account for sweep, overdraft protection, or collateral
        purposes. Each link shows the relationship type, direction, and current status.
      tags:
        - Linked Accounts
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        link_id:
                          type: string
                          description: Link record identifier
                          example: "lnk-88102"
                        source_account_id:
                          type: string
                          description: Source account in the link
                          example: "acct-10045892"
                        target_account_id:
                          type: string
                          description: Target account in the link
                          example: "acct-20098341"
                        link_type:
                          type: string
                          description: Nature of the account relationship
                          enum:
                            - OVERDRAFT_SWEEP
                            - SAVINGS_SWEEP
                            - FUNDING
                            - COLLATERAL
                            - BENEFICIARY
                        status:
                          type: string
                          description: Link status
                          enum:
                            - ACTIVE
                            - SUSPENDED
                            - TERMINATED
                      required:
                        - link_id
                        - link_type
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: linkAccount
      summary: Link another account
      description: >-
        Create a new link between this account and a target account for overdraft sweep, savings sweep, or
        collateral relationships. Both accounts must be ACTIVE and owned by the same CIF or have a
        documented fiduciary relationship.
      tags:
        - Linked Accounts
      parameters:
        - name: account_id
          in: path
          required: true
          description: Unique account id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Link another account request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    target_account_id:
                      type: string
                      description: Target account in the link
                      example: "acct-20098341"
                    link_type:
                      type: string
                      description: Nature of the account relationship
                      enum:
                        - OVERDRAFT_SWEEP
                        - SAVINGS_SWEEP
                        - FUNDING
                        - COLLATERAL
                        - BENEFICIARY
              required:
                - target_account_id
                - link_type
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  link_id:
                    type: string
                    description: Link record identifier
                    example: "lnk-88102"
                  source_account_id:
                    type: string
                    description: Source account in the link
                    example: "acct-10045892"
                  target_account_id:
                    type: string
                    description: Target account in the link
                    example: "acct-20098341"
                  link_type:
                    type: string
                    description: Nature of the account relationship
                    enum:
                      - OVERDRAFT_SWEEP
                      - SAVINGS_SWEEP
                      - FUNDING
                      - COLLATERAL
                      - BENEFICIARY
                  status:
                    type: string
                    description: Link status
                    enum:
                      - ACTIVE
                      - SUSPENDED
                      - TERMINATED
                required:
                  - link_id
                  - status
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /accounts/{account_id}/history:
    get:
      operationId: getAccountHistory
      summary: Get account history
      description: >-
        Retrieve the audit history of all changes made to the account including status changes, ownership
        transfers, signatory modifications, and preference updates. Each entry includes the acting user,
        timestamp, and before/after values.
      tags:
        - Accounts
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        event_id:
                          type: string
                          description: Unique event identifier
                          example: "evt-881024"
                        event_type:
                          type: string
                          description: Type of change event
                          enum:
                            - STATUS_CHANGE
                            - OWNERSHIP_TRANSFER
                            - SIGNATORY_ADDED
                            - SIGNATORY_REMOVED
                            - PREFERENCE_UPDATE
                            - FREEZE
                            - UNFREEZE
                        timestamp:
                          type: string
                          description: When the event occurred
                          format: date-time
                          example: "2025-05-20T11:00:00Z"
                        actor:
                          type: string
                          description: User who performed the action
                          example: "user-ops-4421"
                        details:
                          type: string
                          description: Human-readable change summary
                          example: "Account frozen — fraud investigation"
                      required:
                        - event_id
                        - event_type
                        - timestamp
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /accounts/{account_id}/nickname:
    patch:
      operationId: updateNickname
      summary: Update account nickname
      description: >-
        Set or change the customer-assigned nickname displayed in digital banking channels. Nicknames are
        limited to 40 characters and must not contain profanity per content policy.
      tags:
        - Preferences
      parameters:
        - name: account_id
          in: path
