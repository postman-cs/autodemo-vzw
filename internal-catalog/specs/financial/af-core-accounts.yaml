  /accounts/{account_id}/signatories/{signatory_id}:
    delete:
      operationId: removeSignatory
      summary: Remove signatory from account
      description: >-
        Remove an authorized signatory from the account. The primary signatory cannot be removed unless
        ownership is transferred first. Removal is effective immediately and the signatory loses all
        transaction authorization.
      tags:
        - Signatories
      parameters:
        - name: signatory_id
          in: path
          required: true
          description: Unique signatory id
          schema:
            type: "string"
      responses:
        "204":
          description: Resource deleted successfully
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
