openapi: 3.0.3
info:
  title: Acme Finance Core Accounts API
  description: >-
    Comprehensive account management for retail and commercial deposit products. Supports the full account
    lifecycle from origination through closure, including KYC-gated opening, multi-party ownership, signatory
    management, and inter-account linking for sweep and overdraft protection. All balance fields reflect real-time
    positions from the Core Ledger service.
  version: 3.1.0
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-core-accounts
  x-acme-domain: core
servers:
  - url: https://af-core-accounts.api.acmefin.com/v1
    description: Production
  - url: https://af-core-accounts.staging.acmefin.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Accounts
    description: Core account CRUD and lifecycle operations
  - name: Signatories
    description: Manage authorized signatories on accounts
  - name: Linked Accounts
    description: Link accounts for sweep, overdraft, and collateral relationships
  - name: Preferences
    description: Account preferences and notification settings
paths:
  /accounts:
    get:
      operationId: listAccounts
      summary: List accounts
      description: >-
        Retrieve a paginated list of accounts with optional filtering by account type, status, branch, or
        primary holder CIF. Returns summary balances suitable for portfolio dashboards. Use the sort_by
        parameter to order by opened_date, current_balance, or account_number.
      tags:
        - Accounts
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: status
          in: query
          required: false
          description: Filter by account status
          schema:
            type: "string"
            enum:
              - ACTIVE
              - FROZEN
              - DORMANT
              - CLOSED
              - PENDING_APPROVAL
        - name: account_type
          in: query
          required: false
          description: Filter by product type
          schema:
            type: "string"
            enum:
              - CHECKING
              - SAVINGS
              - MONEY_MARKET
              - CD
              - IRA
        - name: primary_holder
          in: query
          required: false
          description: Filter by primary holder CIF ID
          schema:
            type: "string"
        - name: branch_code
          in: query
          required: false
          description: Filter by originating branch
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        account_id:
                          type: string
                          description: Unique account identifier
                          example: "acct-10045892"
                        account_number:
                          type: string
                          description: Customer-facing account number
                          example: "4400-1289-7763"
                        routing_number:
                          type: string
                          description: ABA routing transit number
                          example: "021000021"
                          pattern: '^\d{9}$'
                        account_type:
                          type: string
                          description: Product type classification
                          enum:
                            - CHECKING
                            - SAVINGS
                            - MONEY_MARKET
                            - CD
                            - IRA
                        status:
                          type: string
                          description: Current account status
                          enum:
                            - ACTIVE
                            - FROZEN
                            - DORMANT
                            - CLOSED
                            - PENDING_APPROVAL
                        ownership_type:
                          type: string
                          description: Legal ownership structure
                          enum:
                            - INDIVIDUAL
                            - JOINT
                            - TRUST
                            - CUSTODIAL
                            - BUSINESS
                        primary_holder:
                          type: string
                          description: CIF ID of the primary account holder
                          example: "cif-9928341"
                        branch_code:
                          type: string
                          description: Originating branch identifier
                          example: "BR-0042"
                        opened_date:
                          type: string
                          description: Date the account was opened
                          format: date
                          example: "2022-03-15"
                        currency:
                          type: string
                          description: ISO 4217 currency code for the account
                          example: "USD"
                          minLength: 3
                          maxLength: 3
                        current_balance:
                          type: number
                          description: Current ledger balance
                          format: double
                          example: 24589.47
                        available_balance:
                          type: number
                          description: Available balance after holds and pending debits
                          format: double
                          example: 23100.0
                        nickname:
                          type: string
                          description: Customer-assigned friendly name
                          example: "My Checking"
                        overdraft_protection:
                          type: boolean
                          description: Whether overdraft protection is enabled
                          example: true
                      required:
                        - account_id
                        - account_number
                        - account_type
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: openAccount
      summary: Open a new account
      description: >-
        Open a new deposit account after passing KYC and CDD validation. The primary_holder must have an
        active CIF record with verified identity. Accounts are created in PENDING_APPROVAL status until
        back-office review is complete for balances exceeding $250,000.
      tags:
        - Accounts
      requestBody:
        required: true
        description: Open a new account request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    account_type:
                      type: string
                      description: Product type classification
                      enum:
                        - CHECKING
                        - SAVINGS
                        - MONEY_MARKET
                        - CD
                        - IRA
                    ownership_type:
                      type: string
                      description: Legal ownership structure
                      enum:
                        - INDIVIDUAL
                        - JOINT
                        - TRUST
                        - CUSTODIAL
                        - BUSINESS
                    primary_holder:
                      type: string
                      description: CIF ID of the primary account holder
                      example: "cif-9928341"
                    branch_code:
                      type: string
                      description: Originating branch identifier
                      example: "BR-0042"
                    currency:
                      type: string
                      description: ISO 4217 currency code for the account
                      example: "USD"
                      minLength: 3
                      maxLength: 3
                    overdraft_protection:
                      type: boolean
                      description: Whether overdraft protection is enabled
                      example: true
              required:
                - account_type
                - primary_holder
                - branch_code
                - currency
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  account_id:
                    type: string
                    description: Unique account identifier
                    example: "acct-10045892"
                  account_number:
                    type: string
                    description: Customer-facing account number
                    example: "4400-1289-7763"
                  routing_number:
                    type: string
                    description: ABA routing transit number
                    example: "021000021"
                    pattern: '^\d{9}$'
                  account_type:
                    type: string
                    description: Product type classification
                    enum:
                      - CHECKING
                      - SAVINGS
                      - MONEY_MARKET
                      - CD
                      - IRA
                  status:
                    type: string
                    description: Current account status
                    enum:
                      - ACTIVE
                      - FROZEN
                      - DORMANT
                      - CLOSED
                      - PENDING_APPROVAL
                  ownership_type:
                    type: string
                    description: Legal ownership structure
                    enum:
                      - INDIVIDUAL
                      - JOINT
                      - TRUST
                      - CUSTODIAL
                      - BUSINESS
                  primary_holder:
                    type: string
                    description: CIF ID of the primary account holder
                    example: "cif-9928341"
                  branch_code:
                    type: string
                    description: Originating branch identifier
                    example: "BR-0042"
                  opened_date:
                    type: string
                    description: Date the account was opened
                    format: date
                    example: "2022-03-15"
                  currency:
                    type: string
                    description: ISO 4217 currency code for the account
                    example: "USD"
                    minLength: 3
                    maxLength: 3
                  current_balance:
                    type: number
                    description: Current ledger balance
                    format: double
                    example: 24589.47
                  available_balance:
                    type: number
                    description: Available balance after holds and pending debits
                    format: double
                    example: 23100.0
                  nickname:
                    type: string
                    description: Customer-assigned friendly name
                    example: "My Checking"
                  overdraft_protection:
                    type: boolean
                    description: Whether overdraft protection is enabled
                    example: true
                required:
                  - account_id
                  - account_number
                  - status
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /accounts/{account_id}:
    get:
      operationId: getAccount
      summary: Get account details
      description: >-
        Retrieve complete account details including real-time balances, product terms, signatory count, and
        linked account references. The available_balance reflects all posted transactions, pending holds,
        and memo-posted items as of the current instant.
      tags:
        - Accounts
      parameters:
        - name: account_id
          in: path
          required: true
          description: Unique account id
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  account_id:
                    type: string
                    description: Unique account identifier
                    example: "acct-10045892"
                  account_number:
                    type: string
                    description: Customer-facing account number
                    example: "4400-1289-7763"
                  routing_number:
                    type: string
                    description: ABA routing transit number
                    example: "021000021"
                    pattern: '^\d{9}$'
                  account_type:
                    type: string
                    description: Product type classification
                    enum:
                      - CHECKING
                      - SAVINGS
                      - MONEY_MARKET
                      - CD
                      - IRA
                  status:
                    type: string
                    description: Current account status
                    enum:
                      - ACTIVE
                      - FROZEN
                      - DORMANT
                      - CLOSED
                      - PENDING_APPROVAL
                  ownership_type:
                    type: string
                    description: Legal ownership structure
                    enum:
                      - INDIVIDUAL
                      - JOINT
                      - TRUST
                      - CUSTODIAL
                      - BUSINESS
                  primary_holder:
                    type: string
                    description: CIF ID of the primary account holder
                    example: "cif-9928341"
                  branch_code:
                    type: string
                    description: Originating branch identifier
                    example: "BR-0042"
                  opened_date:
                    type: string
                    description: Date the account was opened
                    format: date
                    example: "2022-03-15"
                  currency:
                    type: string
                    description: ISO 4217 currency code for the account
                    example: "USD"
                    minLength: 3
                    maxLength: 3
                  current_balance:
                    type: number
                    description: Current ledger balance
                    format: double
                    example: 24589.47
                  available_balance:
                    type: number
                    description: Available balance after holds and pending debits
                    format: double
                    example: 23100.0
                  nickname:
                    type: string
                    description: Customer-assigned friendly name
                    example: "My Checking"
                  overdraft_protection:
                    type: boolean
                    description: Whether overdraft protection is enabled
                    example: true
                required:
                  - account_id
                  - account_number
                  - status
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    patch:
      operationId: updateAccount
      summary: Update account details
      description: >-
        Update mutable account attributes such as nickname, overdraft protection settings, or branch
        assignment. Core fields like account_type and ownership_type require a separate account conversion
        or ownership change request.
      tags:
        - Accounts
      parameters:
        - name: account_id
          in: path
          required: true
          description: Unique account id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Update account details request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    nickname:
                      type: string
                      description: Customer-assigned friendly name
                      example: "My Checking"
                    overdraft_protection:
                      type: boolean
                      description: Whether overdraft protection is enabled
                      example: true
                    branch_code:
                      type: string
                      description: Originating branch identifier
                      example: "BR-0042"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  account_id:
                    type: string
                    description: Unique account identifier
                    example: "acct-10045892"
                  account_number:
                    type: string
                    description: Customer-facing account number
                    example: "4400-1289-7763"
                  routing_number:
                    type: string
                    description: ABA routing transit number
                    example: "021000021"
                    pattern: '^\d{9}$'
                  account_type:
                    type: string
                    description: Product type classification
                    enum:
                      - CHECKING
                      - SAVINGS
                      - MONEY_MARKET
                      - CD
                      - IRA
                  status:
                    type: string
                    description: Current account status
                    enum:
                      - ACTIVE
                      - FROZEN
                      - DORMANT
                      - CLOSED
                      - PENDING_APPROVAL
                  ownership_type:
                    type: string
                    description: Legal ownership structure
                    enum:
                      - INDIVIDUAL
                      - JOINT
                      - TRUST
                      - CUSTODIAL
                      - BUSINESS
                  primary_holder:
                    type: string
                    description: CIF ID of the primary account holder
                    example: "cif-9928341"
                  branch_code:
                    type: string
                    description: Originating branch identifier
                    example: "BR-0042"
                  opened_date:
                    type: string
                    description: Date the account was opened
                    format: date
                    example: "2022-03-15"
                  currency:
                    type: string
                    description: ISO 4217 currency code for the account
                    example: "USD"
                    minLength: 3
                    maxLength: 3
                  current_balance:
                    type: number
                    description: Current ledger balance
                    format: double
                    example: 24589.47
                  available_balance:
                    type: number
                    description: Available balance after holds and pending debits
                    format: double
                    example: 23100.0
                  nickname:
                    type: string
                    description: Customer-assigned friendly name
                    example: "My Checking"
                  overdraft_protection:
                    type: boolean
                    description: Whether overdraft protection is enabled
                    example: true
                required:
                  - account_id
                  - status
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /accounts/{account_id}/freeze:
    post:
      operationId: freezeAccount
      summary: Freeze account
      description: >-
        Place an administrative freeze on the account, blocking all debit transactions and external
        transfers. Credit transactions such as direct deposits continue to post. Requires COMPLIANCE_OFFICER
        or BRANCH_MANAGER role. The freeze is effective immediately and triggers an alert to the account
        holder via their preferred notification channel.
      tags:
        - Accounts
      parameters:
        - name: account_id
          in: path
          required: true
          description: Unique account id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Freeze account request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    freeze_reason:
                      type: string
                      description: Regulatory or operational reason
                      enum:
                        - FRAUD_INVESTIGATION
                        - COURT_ORDER
                        - COMPLIANCE_REVIEW
                        - CUSTOMER_REQUEST
                        - DECEASED_HOLDER
                    freeze_duration_days:
                      type: integer
                      description: Optional duration in days; omit for indefinite
                      example: 90
                      minimum: 1
                    notes:
                      type: string
                      description: Internal notes for the freeze record
                      example: "SAR filed 2025-06-01 case #FR-8821"
              required:
                - freeze_reason
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  account_id:
                    type: string
                    description: Unique account identifier
                    example: "acct-10045892"
                  status:
                    type: string
                    description: Current account status
                    enum:
                      - ACTIVE
                      - FROZEN
                      - DORMANT
                      - CLOSED
                      - PENDING_APPROVAL
                  frozen_at:
                    type: string
                    description: Timestamp of freeze
                    format: date-time
                    example: "2025-06-10T16:00:00Z"
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /accounts/{account_id}/unfreeze:
    post:
      operationId: unfreezeAccount
      summary: Unfreeze account
      description: >-
        Remove a freeze and restore the account to ACTIVE status. All pending debit transactions that were
        queued during the freeze period are released for processing in FIFO order. Requires the same or
        higher authorization level as the original freeze.
      tags:
        - Accounts
      parameters:
        - name: account_id
          in: path
          required: true
          description: Unique account id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Unfreeze account request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    unfreeze_reason:
                      type: string
                      description: Justification for lifting the freeze
                      example: "Investigation closed — no fraud confirmed"
              required:
                - unfreeze_reason
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  account_id:
                    type: string
                    description: Unique account identifier
                    example: "acct-10045892"
                  status:
                    type: string
                    description: Current account status
                    enum:
                      - ACTIVE
                      - FROZEN
                      - DORMANT
                      - CLOSED
                      - PENDING_APPROVAL
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /accounts/{account_id}/ownership:
    post:
      operationId: changeOwnership
      summary: Change account ownership
      description: >-
        Transfer primary ownership of the account to a different CIF record. Both the current and new
        holders must have verified identities on file. Joint accounts require consent from all existing
        signatories before the transfer is processed.
      tags:
        - Accounts
      parameters:
        - name: account_id
          in: path
          required: true
          description: Unique account id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Change account ownership request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    new_primary_holder:
                      type: string
                      description: CIF ID of the new primary holder
                      example: "cif-5567210"
                    ownership_type:
                      type: string
                      description: Legal ownership structure
                      enum:
                        - INDIVIDUAL
                        - JOINT
                        - TRUST
                        - CUSTODIAL
                        - BUSINESS
                    effective_date:
                      type: string
                      description: Effective date of the transfer
                      format: date
                      example: "2025-07-01"
              required:
                - new_primary_holder
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  account_id:
                    type: string
                    description: Unique account identifier
                    example: "acct-10045892"
                  primary_holder:
                    type: string
                    description: CIF ID of the primary account holder
                    example: "cif-9928341"
                  ownership_type:
                    type: string
                    description: Legal ownership structure
                    enum:
                      - INDIVIDUAL
                      - JOINT
                      - TRUST
                      - CUSTODIAL
                      - BUSINESS
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /accounts/{account_id}/signatories:
    get:
      operationId: listSignatories
      summary: List account signatories
      description: >-
        Retrieve all authorized signatories on the account. Each signatory record includes their CIF
        reference, authorization role, and the date their signing authority became effective.
      tags:
        - Signatories
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        signatory_id:
                          type: string
                          description: Unique signatory record identifier
                          example: "sig-44210"
                        cif_id:
                          type: string
                          description: Customer Information File identifier
                          example: "cif-9928341"
                        name:
                          type: string
                          description: Full legal name of the signatory
                          example: "Jane A. Doe"
                        role:
                          type: string
                          description: Signatory authorization level
                          enum:
                            - PRIMARY
                            - SECONDARY
                            - AUTHORIZED_SIGNER
                            - POWER_OF_ATTORNEY
                        effective_date:
                          type: string
                          description: Date signatory authority begins
                          format: date
                          example: "2023-01-15"
                      required:
                        - signatory_id
                        - cif_id
                        - role
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: addSignatory
      summary: Add signatory to account
      description: >-
        Add an authorized signatory to the account. The new signatory must have a verified CIF record and
        pass OFAC screening. For business accounts, the authorized signer resolution document must be on
        file before this operation is permitted.
      tags:
        - Signatories
      parameters:
        - name: account_id
          in: path
          required: true
          description: Unique account id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Add signatory to account request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    cif_id:
                      type: string
                      description: Customer Information File identifier
                      example: "cif-9928341"
