openapi: 3.0.3
info:
  title: Acme Finance Insurance Policy Administration API
  description: >-
    Comprehensive policy administration system supporting the full policy lifecycle across all personal and
    commercial lines of business. Manage policy issuance, mid-term endorsements, cancellations (insured-requested,
    underwriting, and non-payment), reinstatements, renewals, billing schedules, rider attachments, coverage
    summaries, and policy document generation. Supports flat and auditable endorsement processing with premium
    pro-ration, short-rate and pro-rata cancellation calculations, and NAIC annual statement reporting data
    extraction.
  version: 5.1.0
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-insurance-policy
  x-acme-domain: insurance
servers:
  - url: https://af-insurance-policy.api.acmefin.com/v1
    description: Production
  - url: https://af-insurance-policy.staging.acmefin.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Policy Lifecycle
    description: "Core policy operations: issuance, endorsement, cancellation, reinstatement, and renewal"
  - name: Coverage
    description: Coverage summaries, declarations pages, and coverage analysis
  - name: Riders
    description: Policy rider and optional coverage management
  - name: Billing
    description: Billing schedule, payment plan, and installment management
  - name: Policy Service
    description: Notes, document retrieval, history, and search
paths:
  /policies:
    get:
      operationId: listPolicies
      summary: List policies
      description: >-
        Retrieve a paginated list of insurance policies across all lines of business. Supports filtering by
        policy type, status, policyholder name, agent, and date ranges. Includes premium and billing status
        summary.
      tags:
        - Policy Lifecycle
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: policy_type
          in: query
          required: false
          description: Filter by line of business
          schema:
            type: "string"
            enum:
              - PERSONAL_AUTO
              - HOMEOWNERS
              - COMMERCIAL_PROPERTY
              - GENERAL_LIABILITY
              - WORKERS_COMP
              - PROFESSIONAL_LIABILITY
              - UMBRELLA
              - BOP
        - name: status
          in: query
          required: false
          description: Filter by policy status
          schema:
            type: "string"
            enum:
              - ACTIVE
              - CANCELLED
              - EXPIRED
              - PENDING
              - SUSPENDED
              - NON_RENEWED
              - REINSTATED
        - name: agent_id
          in: query
          required: false
          description: Filter by servicing agent
          schema:
            type: "string"
        - name: policyholder_name
          in: query
          required: false
          description: Filter by named insured (partial match)
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        policy_id:
                          type: string
                          description: Unique policy number
                          example: "POL-10029384"
                        policy_type:
                          type: string
                          description: Line of business
                          example: "HOMEOWNERS"
                          enum:
                            - PERSONAL_AUTO
                            - HOMEOWNERS
                            - COMMERCIAL_PROPERTY
                            - GENERAL_LIABILITY
                            - WORKERS_COMP
                            - PROFESSIONAL_LIABILITY
                            - UMBRELLA
                            - BOP
                        policyholder_name:
                          type: string
                          description: Named insured
                          example: "Katherine M. Reynolds"
                        effective_date:
                          type: string
                          format: date
                          example: "2024-01-15"
                        expiration_date:
                          type: string
                          format: date
                          example: "2025-01-15"
                        status:
                          type: string
                          example: "ACTIVE"
                          enum:
                            - ACTIVE
                            - CANCELLED
                            - EXPIRED
                            - PENDING
                            - SUSPENDED
                            - NON_RENEWED
                            - REINSTATED
                        total_premium:
                          type: number
                          description: Total annual premium
                          format: double
                          example: 2340.0
                        payment_plan:
                          type: string
                          example: "MONTHLY"
                          enum:
                            - PAID_IN_FULL
                            - MONTHLY
                            - QUARTERLY
                            - SEMI_ANNUAL
                            - MORTGAGEE_BILL
                        agent_id:
                          type: string
                          description: Servicing agent
                          example: "AGT-00482193"
                        underwriter_id:
                          type: string
                          description: Assigned underwriter
                          example: "UW-00291"
                        cancel_reason:
                          type: string
                          description: Cancellation reason if applicable
                          nullable: true
                      required:
                        - policy_id
                        - policy_type
                        - policyholder_name
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: issuePolicy
      summary: Issue new policy
      description: >-
        Issue a new insurance policy. The policy is created in PENDING status and transitions to ACTIVE on
        the effective date. Premium is calculated based on rating factors, coverage selections, and
        applicable discounts. The servicing agent receives commission based on the commission schedule.
      tags:
        - Policy Lifecycle
      requestBody:
        required: true
        description: Issue new policy request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    policy_type:
                      type: string
                      description: Line of business
                      example: "HOMEOWNERS"
                      enum:
                        - PERSONAL_AUTO
                        - HOMEOWNERS
                        - COMMERCIAL_PROPERTY
                        - GENERAL_LIABILITY
                        - WORKERS_COMP
                        - PROFESSIONAL_LIABILITY
                        - UMBRELLA
                        - BOP
                    policyholder_name:
                      type: string
                      description: Named insured
                      example: "Katherine M. Reynolds"
                    effective_date:
                      type: string
                      format: date
                      example: "2024-01-15"
                    payment_plan:
                      type: string
                      example: "MONTHLY"
                      enum:
                        - PAID_IN_FULL
                        - MONTHLY
                        - QUARTERLY
                        - SEMI_ANNUAL
                        - MORTGAGEE_BILL
                    agent_id:
                      type: string
                      description: Servicing agent
                      example: "AGT-00482193"
              required:
                - policy_type
                - policyholder_name
                - effective_date
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  policy_id:
                    type: string
                    description: Unique policy number
                    example: "POL-10029384"
                  policy_type:
                    type: string
                    description: Line of business
                    example: "HOMEOWNERS"
                    enum:
                      - PERSONAL_AUTO
                      - HOMEOWNERS
                      - COMMERCIAL_PROPERTY
                      - GENERAL_LIABILITY
                      - WORKERS_COMP
                      - PROFESSIONAL_LIABILITY
                      - UMBRELLA
                      - BOP
                  policyholder_name:
                    type: string
                    description: Named insured
                    example: "Katherine M. Reynolds"
                  effective_date:
                    type: string
                    format: date
                    example: "2024-01-15"
                  expiration_date:
                    type: string
                    format: date
                    example: "2025-01-15"
                  status:
                    type: string
                    example: "ACTIVE"
                    enum:
                      - ACTIVE
                      - CANCELLED
                      - EXPIRED
                      - PENDING
                      - SUSPENDED
                      - NON_RENEWED
                      - REINSTATED
                  total_premium:
                    type: number
                    description: Total annual premium
                    format: double
                    example: 2340.0
                  payment_plan:
                    type: string
                    example: "MONTHLY"
                    enum:
                      - PAID_IN_FULL
                      - MONTHLY
                      - QUARTERLY
                      - SEMI_ANNUAL
                      - MORTGAGEE_BILL
                  agent_id:
                    type: string
                    description: Servicing agent
                    example: "AGT-00482193"
                  underwriter_id:
                    type: string
                    description: Assigned underwriter
                    example: "UW-00291"
                  cancel_reason:
                    type: string
                    description: Cancellation reason if applicable
                    nullable: true
                required:
                  - policy_id
                  - status
                  - total_premium
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /policies/{policy_id}:
    get:
      operationId: getPolicy
      summary: Retrieve policy details
      description: >-
        Fetch complete policy details including named insureds, coverage selections, premium breakdown,
        billing status, endorsement history, agent assignment, and underwriter notes.
      tags:
        - Policy Lifecycle
      parameters:
        - name: policy_id
          in: path
          required: true
          description: Unique policy id
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  policy_id:
                    type: string
                    description: Unique policy number
                    example: "POL-10029384"
                  policy_type:
                    type: string
                    description: Line of business
                    example: "HOMEOWNERS"
                    enum:
                      - PERSONAL_AUTO
                      - HOMEOWNERS
                      - COMMERCIAL_PROPERTY
                      - GENERAL_LIABILITY
                      - WORKERS_COMP
                      - PROFESSIONAL_LIABILITY
                      - UMBRELLA
                      - BOP
                  policyholder_name:
                    type: string
                    description: Named insured
                    example: "Katherine M. Reynolds"
                  effective_date:
                    type: string
                    format: date
                    example: "2024-01-15"
                  expiration_date:
                    type: string
                    format: date
                    example: "2025-01-15"
                  status:
                    type: string
                    example: "ACTIVE"
                    enum:
                      - ACTIVE
                      - CANCELLED
                      - EXPIRED
                      - PENDING
                      - SUSPENDED
                      - NON_RENEWED
                      - REINSTATED
                  total_premium:
                    type: number
                    description: Total annual premium
                    format: double
                    example: 2340.0
                  payment_plan:
                    type: string
                    example: "MONTHLY"
                    enum:
                      - PAID_IN_FULL
                      - MONTHLY
                      - QUARTERLY
                      - SEMI_ANNUAL
                      - MORTGAGEE_BILL
                  agent_id:
                    type: string
                    description: Servicing agent
                    example: "AGT-00482193"
                  underwriter_id:
                    type: string
                    description: Assigned underwriter
                    example: "UW-00291"
                  cancel_reason:
                    type: string
                    description: Cancellation reason if applicable
                    nullable: true
                required:
                  - policy_id
                  - policy_type
                  - status
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    patch:
      operationId: updatePolicy
      summary: Update policy details
      description: >-
        Modify non-coverage policy details such as policyholder contact information, payment plan, or
        servicing agent. Coverage changes require an endorsement.
      tags:
        - Policy Lifecycle
      parameters:
        - name: policy_id
          in: path
          required: true
          description: Unique policy id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Update policy details request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    policyholder_name:
                      type: string
                      description: Named insured
                      example: "Katherine M. Reynolds"
                    payment_plan:
                      type: string
                      example: "MONTHLY"
                      enum:
                        - PAID_IN_FULL
                        - MONTHLY
                        - QUARTERLY
                        - SEMI_ANNUAL
                        - MORTGAGEE_BILL
                    agent_id:
                      type: string
                      description: Servicing agent
                      example: "AGT-00482193"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  policy_id:
                    type: string
                    description: Unique policy number
                    example: "POL-10029384"
                  policy_type:
                    type: string
                    description: Line of business
                    example: "HOMEOWNERS"
                    enum:
                      - PERSONAL_AUTO
                      - HOMEOWNERS
                      - COMMERCIAL_PROPERTY
                      - GENERAL_LIABILITY
                      - WORKERS_COMP
                      - PROFESSIONAL_LIABILITY
                      - UMBRELLA
                      - BOP
                  policyholder_name:
                    type: string
                    description: Named insured
                    example: "Katherine M. Reynolds"
                  effective_date:
                    type: string
                    format: date
                    example: "2024-01-15"
                  expiration_date:
                    type: string
                    format: date
                    example: "2025-01-15"
                  status:
                    type: string
                    example: "ACTIVE"
                    enum:
                      - ACTIVE
                      - CANCELLED
                      - EXPIRED
                      - PENDING
                      - SUSPENDED
                      - NON_RENEWED
                      - REINSTATED
                  total_premium:
                    type: number
                    description: Total annual premium
                    format: double
                    example: 2340.0
                  payment_plan:
                    type: string
                    example: "MONTHLY"
                    enum:
                      - PAID_IN_FULL
                      - MONTHLY
                      - QUARTERLY
                      - SEMI_ANNUAL
                      - MORTGAGEE_BILL
                  agent_id:
                    type: string
                    description: Servicing agent
                    example: "AGT-00482193"
                  underwriter_id:
                    type: string
                    description: Assigned underwriter
                    example: "UW-00291"
                  cancel_reason:
                    type: string
                    description: Cancellation reason if applicable
                    nullable: true
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /policies/{policy_id}/endorse:
    post:
      operationId: endorsePolicy
      summary: Process policy endorsement
      description: >-
        Create a mid-term endorsement to change coverage, limits, deductibles, or other rated policy
        attributes. The endorsement generates a pro-rated premium adjustment based on the remaining term.
        Endorsements are applied sequentially and can be reversed.
      tags:
        - Policy Lifecycle
      parameters:
        - name: policy_id
          in: path
          required: true
          description: Unique policy id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Process policy endorsement request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    effective_date:
                      type: string
                      format: date
                      example: "2024-06-15"
                    endorsement_type:
                      type: string
                      description: Type of policy change
                      example: "Coverage Change"
                    changes:
                      type: object
                      description: Detailed changes being endorsed
                    reason:
                      type: string
                      description: Reason for endorsement
                      example: "Increase dwelling coverage to match updated replacement cost estimate"
              required:
                - effective_date
                - endorsement_type
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  endorsement_id:
                    type: string
                    example: "END-00918274"
                  endorsement_number:
                    type: integer
                    description: Sequential endorsement number
                    example: 3
                  endorsement_type:
                    type: string
                    description: Type of endorsement
                    example: "Coverage Change"
                  effective_date:
                    type: string
                    format: date
                    example: "2024-06-15"
                  premium_change:
                    type: number
                    format: double
                    example: 125.0
                  description:
                    type: string
                    description: Endorsement description
                    example: "Increased dwelling coverage from $350,000 to $400,000"
                  status:
                    type: string
                    example: "APPLIED"
                    enum:
                      - APPLIED
                      - PENDING
                      - REVERSED
                required:
                  - endorsement_id
                  - premium_change
                  - status
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /policies/{policy_id}/cancel:
    post:
      operationId: cancelPolicy
      summary: Cancel policy
      description: >-
        Cancel an active policy. Cancellation can be insured-requested (pro-rata refund), underwriter-
        initiated (short-rate refund with penalty), or non-payment (flat cancellation). State-specific
        notice requirements and minimum earned premium rules are enforced automatically.
      tags:
        - Policy Lifecycle
      parameters:
        - name: policy_id
          in: path
          required: true
          description: Unique policy id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Cancel policy request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    cancellation_type:
                      type: string
                      example: "INSURED_REQUEST"
                      enum:
                        - INSURED_REQUEST
                        - UNDERWRITING
                        - NON_PAYMENT
                        - MATERIAL_MISREPRESENTATION
                    effective_date:
                      type: string
                      format: date
                      example: "2024-09-01"
                    reason:
                      type: string
                      description: Cancellation reason
                      example: "Policyholder sold property"
              required:
                - cancellation_type
                - effective_date
                - reason
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  cancellation_id:
                    type: string
                  refund_amount:
                    type: number
                    description: Premium refund amount
                    format: double
                    example: 580.0
                  refund_method:
                    type: string
                    example: "PRO_RATA"
                    enum:
                      - PRO_RATA
                      - SHORT_RATE
                      - FLAT
                  notice_required_days:
                    type: integer
                    description: Days of advance notice required by state regulation
                    example: 30
                  status:
                    type: string
                    example: "PENDING_EFFECTIVE_DATE"
                required:
                  - refund_amount
                  - refund_method
                  - status
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /policies/{policy_id}/reinstate:
    post:
      operationId: reinstatePolicy
      summary: Reinstate cancelled policy
      description: >-
        Reinstate a previously cancelled or lapsed policy. Reinstatement may require a lapse-in-coverage
        questionnaire, updated inspection, and payment of any outstanding premium balance. Reinstatement
        within 30 days of cancellation typically does not require re-underwriting.
      tags:
        - Policy Lifecycle
      parameters:
        - name: policy_id
          in: path
          required: true
          description: Unique policy id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Reinstate cancelled policy request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    reinstatement_date:
                      type: string
                      format: date
                      example: "2024-10-01"
                    lapse_questionnaire_completed:
                      type: boolean
                      description: Whether lapse-in-coverage questionnaire was completed
                      example: true
                    outstanding_premium_paid:
                      type: boolean
                      example: true
              required:
                - reinstatement_date
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  policy_id:
                    type: string
                  new_status:
                    type: string
                    example: "REINSTATED"
                  lapse_period_days:
                    type: integer
                    example: 15
                  additional_premium_due:
                    type: number
                    format: double
                    example: 0.0
                required:
                  - policy_id
                  - new_status
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /policies/{policy_id}/renew:
    post:
      operationId: renewPolicy
      summary: Renew policy
      description: >-
        Process a policy renewal for the upcoming term. Renewal re-rates the policy using current rating
        factors and loss experience. Premium changes exceeding thresholds trigger a renewal review by
        underwriting.
      tags:
        - Policy Lifecycle
      parameters:
        - name: policy_id
          in: path
          required: true
          description: Unique policy id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Renew policy request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    renewal_term:
                      type: string
                      example: "12_MONTH"
                      enum:
                        - 6_MONTH
                        - 12_MONTH
                    coverage_changes:
                      type: object
                      description: Any coverage modifications for the renewal term
                      nullable: true
              required:
                - renewal_term
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  renewal_policy_id:
                    type: string
                    description: New policy number for the renewal term
                  new_premium:
                    type: number
                    format: double
                  premium_change_pct:
                    type: number
                    description: Percentage change from expiring premium
                    format: double
                  status:
                    type: string
                    example: "RENEWED"
                    enum:
                      - RENEWED
                      - PENDING_UW_REVIEW
                required:
                  - renewal_policy_id
                  - new_premium
                  - status
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /policies/{policy_id}/coverage-summary:
    get:
      operationId: getCoverageSummary
      summary: Get coverage summary
      description: >-
        Retrieve a consolidated summary of all coverage selections on a policy, including coverage types,
        limits, deductibles, and any coverage restrictions or exclusions. This provides the at-a-glance
        coverage view used by agents and customer service.
      tags:
        - Coverage
      parameters:
        - name: policy_id
          in: path
          required: true
          description: Policy identifier
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  policy_id:
                    type: string
                  coverages:
                    type: array
                    description: List of coverage selections
                    items:
                      type: object
                  total_coverage_limit:
                    type: number
                    format: double
                  aggregate_deductible:
                    type: number
                    format: double
                  exclusions:
                    type: array
                    description: Active coverage exclusions
                    items:
                      type: string
                required:
                  - policy_id
                  - coverages
        "401":
          $ref: "#/components/responses/401"
        "404":
