openapi: 3.0.3
info:
  title: Acme Finance Data Catalog API
  description: >-
    Centralized metadata catalog for discovering, registering, and governing enterprise datasets. Provides a
    searchable inventory of all data assets with schema registry integration, lineage visualization, sensitivity
    classification, and self-service access request workflows. Supports Avro, Protobuf, and JSON Schema formats
    with configurable compatibility modes for safe schema evolution.
  version: 3.1.0
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-data-catalog
  x-acme-domain: data
servers:
  - url: https://af-data-catalog.api.acmefin.com/v1
    description: Production
  - url: https://af-data-catalog.staging.acmefin.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Datasets
    description: Register, search, and manage dataset metadata in the enterprise catalog
  - name: Schema Registry
    description: Manage schema definitions with versioning and compatibility enforcement
  - name: Access Requests
    description: Request and approve access to cataloged datasets
  - name: Tags
    description: Organize catalog assets with a controlled tag vocabulary
paths:
  /datasets:
    get:
      operationId: listDatasets
      summary: List datasets
      description: >-
        Retrieve cataloged datasets with filters for classification, format, owner, and tags. Results
        include profiling statistics.
      tags:
        - Datasets
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: classification
          in: query
          required: false
          description: Filter by sensitivity classification
          schema:
            type: "string"
            enum:
              - public
              - internal
              - confidential
              - restricted
        - name: format
          in: query
          required: false
          description: Filter by storage format
          schema:
            type: "string"
            enum:
              - parquet
              - avro
              - csv
              - json
              - delta
        - name: owner
          in: query
          required: false
          description: Filter by data steward email
          schema:
            type: "string"
        - name: tag
          in: query
          required: false
          description: Filter by tag (key:value)
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        dataset_id:
                          type: string
                          description: "Unique dataset identifier"
                          format: uuid
                          readOnly: true
                        name:
                          type: string
                          description: "Fully-qualified dataset name"
                          example: "finance.transactions.daily"
                        description:
                          type: string
                          description: "Business context and usage guidance for this dataset"
                        owner:
                          type: string
                          description: "Data steward responsible for this dataset"
                          example: "data-eng@acmefin.com"
                        classification:
                          type: string
                          description: "Data sensitivity classification"
                          enum:
                            - public
                            - internal
                            - confidential
                            - restricted
                        format:
                          type: string
                          description: "Storage format"
                          enum:
                            - parquet
                            - avro
                            - csv
                            - json
                            - delta
                        location:
                          type: string
                          description: "Physical storage URI"
                          example: "s3://acme-datalake/finance/transactions/"
                        row_count:
                          type: integer
                          description: "Approximate row count from last profiling run"
                          example: 14500000
                        size_bytes:
                          type: integer
                          description: "Storage size in bytes"
                        tags:
                          type: array
                          description: "Catalog tags for discovery"
                          items:
                            type: string
                        created_at:
                          type: string
                          description: "Registration timestamp"
                          format: date-time
                      required:
                        - dataset_id
                        - name
                        - owner
                        - classification
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: registerDataset
      summary: Register dataset
      description: >-
        Register a new dataset in the catalog. Triggers an asynchronous profiling job to compute row counts,
        schema inference, and quality baseline.
      tags:
        - Datasets
      requestBody:
        required: true
        description: Register dataset request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    name:
                      type: string
                      description: "Fully-qualified dataset name"
                    description:
                      type: string
                      description: "Business context"
                    owner:
                      type: string
                      description: "Data steward email"
                    classification:
                      type: string
                      enum:
                        - public
                        - internal
                        - confidential
                        - restricted
                    format:
                      type: string
                      enum:
                        - parquet
                        - avro
                        - csv
                        - json
                        - delta
                    location:
                      type: string
                      description: "Storage URI"
              required:
                - name
                - owner
                - classification
                - format
                - location
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  dataset_id:
                    type: string
                    description: "Unique dataset identifier"
                    format: uuid
                    readOnly: true
                  name:
                    type: string
                    description: "Fully-qualified dataset name"
                    example: "finance.transactions.daily"
                  description:
                    type: string
                    description: "Business context and usage guidance for this dataset"
                  owner:
                    type: string
                    description: "Data steward responsible for this dataset"
                    example: "data-eng@acmefin.com"
                  classification:
                    type: string
                    description: "Data sensitivity classification"
                    enum:
                      - public
                      - internal
                      - confidential
                      - restricted
                  format:
                    type: string
                    description: "Storage format"
                    enum:
                      - parquet
                      - avro
                      - csv
                      - json
                      - delta
                  location:
                    type: string
                    description: "Physical storage URI"
                    example: "s3://acme-datalake/finance/transactions/"
                  row_count:
                    type: integer
                    description: "Approximate row count from last profiling run"
                    example: 14500000
                  size_bytes:
                    type: integer
                    description: "Storage size in bytes"
                  tags:
                    type: array
                    description: "Catalog tags for discovery"
                    items:
                      type: string
                  created_at:
                    type: string
                    description: "Registration timestamp"
                    format: date-time
                required:
                  - dataset_id
                  - name
                  - owner
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /datasets/{dataset_id}:
    get:
      operationId: getDataset
      summary: Get dataset details
      description: >-
        Retrieve complete metadata for a dataset including profiling stats, schema snapshot, and linked
        lineage nodes.
      tags:
        - Datasets
      parameters:
        - name: dataset_id
          in: path
          required: true
          description: Unique dataset id
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  dataset_id:
                    type: string
                    description: "Unique dataset identifier"
                    format: uuid
                    readOnly: true
                  name:
                    type: string
                    description: "Fully-qualified dataset name"
                    example: "finance.transactions.daily"
                  description:
                    type: string
                    description: "Business context and usage guidance for this dataset"
                  owner:
                    type: string
                    description: "Data steward responsible for this dataset"
                    example: "data-eng@acmefin.com"
                  classification:
                    type: string
                    description: "Data sensitivity classification"
                    enum:
                      - public
                      - internal
                      - confidential
                      - restricted
                  format:
                    type: string
                    description: "Storage format"
                    enum:
                      - parquet
                      - avro
                      - csv
                      - json
                      - delta
                  location:
                    type: string
                    description: "Physical storage URI"
                    example: "s3://acme-datalake/finance/transactions/"
                  row_count:
                    type: integer
                    description: "Approximate row count from last profiling run"
                    example: 14500000
                  size_bytes:
                    type: integer
                    description: "Storage size in bytes"
                  tags:
                    type: array
                    description: "Catalog tags for discovery"
                    items:
                      type: string
                  created_at:
                    type: string
                    description: "Registration timestamp"
                    format: date-time
                required:
                  - dataset_id
                  - name
                  - owner
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    patch:
      operationId: updateDataset
      summary: Update dataset metadata
      description: >-
        Update mutable dataset fields such as description, owner, classification, or tags.
      tags:
        - Datasets
      parameters:
        - name: dataset_id
          in: path
          required: true
          description: Unique dataset id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Update dataset metadata request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    description:
                      type: string
                    owner:
                      type: string
                    classification:
                      type: string
                      enum:
                        - public
                        - internal
                        - confidential
                        - restricted
                    tags:
                      type: array
                      items:
                        type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  dataset_id:
                    type: string
                    description: "Unique dataset identifier"
                    format: uuid
                    readOnly: true
                  name:
                    type: string
                    description: "Fully-qualified dataset name"
                    example: "finance.transactions.daily"
                  description:
                    type: string
                    description: "Business context and usage guidance for this dataset"
                  owner:
                    type: string
                    description: "Data steward responsible for this dataset"
                    example: "data-eng@acmefin.com"
                  classification:
                    type: string
                    description: "Data sensitivity classification"
                    enum:
                      - public
                      - internal
                      - confidential
                      - restricted
                  format:
                    type: string
                    description: "Storage format"
                    enum:
                      - parquet
                      - avro
                      - csv
                      - json
                      - delta
                  location:
                    type: string
                    description: "Physical storage URI"
                    example: "s3://acme-datalake/finance/transactions/"
                  row_count:
                    type: integer
                    description: "Approximate row count from last profiling run"
                    example: 14500000
                  size_bytes:
                    type: integer
                    description: "Storage size in bytes"
                  tags:
                    type: array
                    description: "Catalog tags for discovery"
                    items:
                      type: string
                  created_at:
                    type: string
                    description: "Registration timestamp"
                    format: date-time
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /datasets/{dataset_id}/lineage:
    get:
      operationId: getDatasetLineage
      summary: Get dataset lineage
      description: >-
        Retrieve the lineage graph for a dataset showing upstream sources, transformation stages, and
        downstream consumers.
      tags:
        - Datasets
      parameters:
        - name: dataset_id
          in: path
          required: true
          description: Unique dataset id
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  dataset_id:
                    type: string
                    description: "Root dataset"
                  upstream:
                    type: array
                    description: "Upstream source nodes"
                    items:
                      type: object
                  downstream:
                    type: array
                    description: "Downstream consumer nodes"
                    items:
                      type: object
                  depth:
                    type: integer
                    description: "Graph traversal depth"
                required:
                  - dataset_id
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /datasets/search:
    post:
      operationId: searchDatasets
      summary: Search datasets
      description: >-
        Full-text and faceted search across all cataloged datasets. Supports query expansion, fuzzy
        matching, and relevance-ranked results.
      tags:
        - Datasets
      requestBody:
        required: true
        description: Search datasets request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    query:
                      type: string
                      description: "Free-text search query"
                    filters:
                      type: object
                      description: "Structured filters (classification, format, tags)"
                    boost_fields:
                      type: array
                      description: "Fields to boost in relevance scoring"
                      items:
                        type: string
              required:
                - query
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    description: "Ranked search results"
                    items:
                      type: object
                  total_hits:
                    type: integer
                    description: "Total matching datasets"
                  facets:
                    type: object
                    description: "Facet counts for refinement"
                required:
                  - results
                  - total_hits
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /schemas:
    get:
      operationId: listSchemas
      summary: List schemas
      description: >-
        Retrieve all registered schemas with version counts and compatibility configuration.
      tags:
        - Schema Registry
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        schema_id:
                          type: string
                          description: "Unique schema identifier"
                          format: uuid
                          readOnly: true
                        name:
                          type: string
                          description: "Schema name"
                          example: "TransactionEvent"
                        namespace:
                          type: string
                          description: "Schema namespace"
                          example: "com.acmefin.events"
                        format:
                          type: string
                          description: "Schema format"
                          enum:
                            - avro
                            - protobuf
                            - json-schema
                        compatibility_mode:
                          type: string
                          description: "Schema evolution compatibility mode"
                          enum:
                            - backward
                            - forward
                            - full
                            - none
                        version_count:
                          type: integer
                          description: "Number of registered versions"
                        latest_version:
                          type: integer
                          description: "Latest version number"
                      required:
                        - schema_id
                        - name
                        - format
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: registerSchema
      summary: Register schema
      description: >-
        Register a new schema definition. The schema is validated against the specified format before
        registration.
      tags:
        - Schema Registry
      requestBody:
        required: true
        description: Register schema request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    name:
                      type: string
                      description: "Schema name"
                    namespace:
                      type: string
                      description: "Schema namespace"
                    format:
                      type: string
                      enum:
                        - avro
                        - protobuf
                        - json-schema
                    compatibility_mode:
                      type: string
                      enum:
                        - backward
                        - forward
                        - full
                        - none
                    definition:
                      type: string
                      description: "Schema definition body"
              required:
                - name
                - format
                - definition
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  schema_id:
                    type: string
                    description: "Unique schema identifier"
                    format: uuid
                    readOnly: true
                  name:
                    type: string
                    description: "Schema name"
                    example: "TransactionEvent"
                  namespace:
                    type: string
                    description: "Schema namespace"
                    example: "com.acmefin.events"
                  format:
                    type: string
                    description: "Schema format"
                    enum:
                      - avro
                      - protobuf
                      - json-schema
                  compatibility_mode:
                    type: string
                    description: "Schema evolution compatibility mode"
                    enum:
                      - backward
                      - forward
                      - full
                      - none
                  version_count:
                    type: integer
                    description: "Number of registered versions"
                  latest_version:
                    type: integer
                    description: "Latest version number"
                required:
                  - schema_id
                  - name
                  - format
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /schemas/{schema_id}:
    get:
      operationId: getSchema
      summary: Get schema
      description: >-
        Retrieve a schema definition with its full version history and compatibility check results.
      tags:
        - Schema Registry
      parameters:
        - name: schema_id
          in: path
          required: true
          description: Unique schema id
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  schema_id:
                    type: string
                    description: "Unique schema identifier"
                    format: uuid
                    readOnly: true
                  name:
                    type: string
                    description: "Schema name"
                    example: "TransactionEvent"
                  namespace:
                    type: string
                    description: "Schema namespace"
                    example: "com.acmefin.events"
                  format:
                    type: string
                    description: "Schema format"
                    enum:
                      - avro
                      - protobuf
                      - json-schema
                  compatibility_mode:
                    type: string
                    description: "Schema evolution compatibility mode"
                    enum:
                      - backward
                      - forward
                      - full
                      - none
                  version_count:
                    type: integer
                    description: "Number of registered versions"
                  latest_version:
                    type: integer
                    description: "Latest version number"
                required:
                  - schema_id
                  - name
                  - format
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /schemas/{schema_id}/versions:
    get:
      operationId: listSchemaVersions
      summary: List schema versions
      description: Retrieve all versions of a schema with diffs between consecutive versions.
      tags:
        - Schema Registry
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        version:
                          type: integer
                          description: "Version number"
                        checksum:
                          type: string
                          description: "Schema content hash"
                        created_at:
                          type: string
                          format: date-time
                        is_compatible:
                          type: boolean
                          description: "Whether this version passed compatibility check"
                      required:
                        - version
                        - checksum
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /access-requests:
    get:
      operationId: listAccessRequests
      summary: List access requests
      description: Retrieve access requests for datasets, filterable by status and requester.
      tags:
        - Access Requests
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: status
          in: query
          required: false
          description: Filter by approval status
          schema:
            type: "string"
            enum:
              - pending
              - approved
              - denied
              - revoked
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        request_id:
                          type: string
                          description: "Access request identifier"
                          format: uuid
                          readOnly: true
                        dataset_id:
                          type: string
                          description: "Requested dataset"
                          format: uuid
                        requester:
                          type: string
                          description: "Requesting user or service account"
                        justification:
                          type: string
                          description: "Business justification for access"
