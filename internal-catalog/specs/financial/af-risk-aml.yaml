      summary: Perform enhanced due diligence
      description: Initiate Enhanced Due Diligence (EDD) for a high-risk customer. Requires additional documentation, source
        of funds/wealth verification, senior management approval, and ongoing enhanced monitoring. Triggered automatically
        when CDD risk score exceeds threshold or for PEP-associated customers.
