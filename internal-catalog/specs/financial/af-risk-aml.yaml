    post:
      operationId: performCdd
      summary: Perform customer due diligence
      description: Execute standard Customer Due Diligence (CDD) assessment for a customer. Evaluates customer risk profile
        based on product usage, geography, transaction patterns, and entity structure. Determines whether Enhanced Due Diligence
        (EDD) is required based on risk scoring.
      tags:
      - Beneficial Ownership
      requestBody:
        required: true
        description: Perform customer due diligence request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                customer_id:
                  type: string
                  description: Customer identifier
                  example: CUST-90281
                customer_type:
                  type: string
                  description: Customer classification
                  example: individual
                  enum:
                  - individual
                  - sole_proprietor
                  - legal_entity
                  - trust
                products:
                  type: array
                  description: Products and services used
                  items:
                    type: string
                    example: checking
                country_of_residence:
                  type: string
                  description: ISO 3166-1 alpha-2 country code
                  example: US
              required:
              - customer_id
              - customer_type
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  customer_id:
                    type: string
                    description: Customer identifier
                    example: CUST-90281
                  cdd_tier:
                    type: string
                    description: Assigned CDD tier
                    example: standard
                    enum:
                    - simplified
                    - standard
                    - enhanced
                  risk_score:
                    type: integer
                    description: CDD risk score
                    example: 78
                    minimum: 0
                    maximum: 100
                  edd_required:
                    type: boolean
                    description: Whether EDD is triggered
                    example: false
                  next_review_date:
                    type: string
