  /aml/risk-scoring:
    post:
      operationId: calculateAmlRiskScore
      summary: Calculate AML risk score
      description: Compute composite AML risk score for a customer using weighted factors including geographic risk (FATF
        lists), product risk, transaction behavior, entity structure complexity, and adverse media signals. Score methodology
        aligned with Wolfsberg Group AML principles.
      tags:
      - Transaction Analysis
      requestBody:
        required: true
        description: Calculate AML risk score request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                customer_id:
                  type: string
                  description: Customer identifier
                  example: CUST-90281
                include_factors:
                  type: array
                  description: Risk factor categories to include
                  items:
                    type: string
                    example: geographic
              required:
              - customer_id
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  customer_id:
                    type: string
                    description: Customer identifier
                    example: CUST-90281
                  composite_score:
                    type: integer
                    description: Weighted AML risk score
                    example: 72
                    minimum: 0
                    maximum: 100
                  risk_tier:
                    type: string
                    description: Risk tier classification
                    example: high
                    enum:
                    - low
                    - medium
                    - high
                    - very_high
                  factor_scores:
                    type: object
                    description: Individual risk factor scores
                    properties:
                      geographic:
                        type: integer
                        description: Geographic risk score
                        example: 85
                        minimum: 0
                        maximum: 100
                      product:
                        type: integer
                        description: Product risk score
                        example: 45
                        minimum: 0
                        maximum: 100
                      transaction:
                        type: integer
                        description: Transaction behavior score
                        example: 78
                        minimum: 0
                        maximum: 100
                      entity:
                        type: integer
                        description: Entity complexity score
                        example: 60
                        minimum: 0
                        maximum: 100
                required:
                - customer_id
                - composite_score
                - risk_tier
        '400':
          $ref: '#/components/responses/400'
        '401':
