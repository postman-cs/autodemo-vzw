        in: path
        required: true
        description: Unique customer id
        schema:
          type: string
      requestBody:
        required: true
        description: Perform enhanced due diligence request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: EDD trigger reason
                  example: high_risk_score
                  enum:
                  - high_risk_score
                  - pep_associated
                  - high_risk_jurisdiction
                  - unusual_activity
                  - regulatory_requirement
                source_of_funds:
                  type: string
                  description: Declared source of funds
                  example: Employment income and investment returns
                source_of_wealth:
                  type: string
                  description: Declared source of wealth
                  example: Inheritance and business ownership
                additional_documents:
                  type: array
                  description: Required supporting document types
                  items:
                    type: string
                    example: tax_return
              required:
              - reason
      responses:
