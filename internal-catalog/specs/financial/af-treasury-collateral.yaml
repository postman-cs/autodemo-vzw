                            - corporate_bond
                            - equity
                            - cash
                        min_rating:
                          type: string
                          description: "Minimum credit rating"
                          example: "A-"
                        max_concentration_percent:
                          type: number
                          description: "Max concentration limit"
                          format: double
                          example: 25.0
                        haircut_schedule:
                          type: object
                          description: "Haircut by maturity bucket"
                      required:
                        - rule_id
                        - agreement_id
                        - asset_type
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
