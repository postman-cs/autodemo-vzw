openapi: 3.0.3
info:
  title: Acme Finance Collateral Management API
  description: >-
    Collateral lifecycle management for secured lending, derivatives margining, and central counterparty (CCP)
    obligations. Supports pledge, release, and substitution workflows with real-time valuation, haircut
    application, margin call processing, and eligibility rule enforcement per CSA (Credit Support Annex)
    schedules.
  version: 2.0.0
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-treasury-collateral
  x-acme-domain: treasury
servers:
  - url: https://af-treasury-collateral.api.acmefin.com/v1
    description: Production
  - url: https://af-treasury-collateral.staging.acmefin.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Collateral Management
    description: Pledge, release, and substitute collateral assets across agreements
  - name: Valuations & Margin
    description: Mark-to-market valuations, haircuts, and margin call processing
paths:
  /collateral:
    get:
      operationId: listCollateral
      summary: List collateral holdings
      description: >-
        List all collateral assets currently pledged or received, with current market values and haircut-
        adjusted values.
      tags:
        - Collateral Management
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: direction
          in: query
          required: false
          description: "Filter by pledged/received"
          schema:
            type: "string"
            enum:
              - pledged
              - received
        - name: asset_type
          in: query
          required: false
          description: "Filter by asset type"
          schema:
            type: "string"
        - name: counterparty
          in: query
          required: false
          description: "Filter by counterparty"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        collateral_id:
                          type: string
                          description: "Collateral ID"
                          format: uuid
                          example: "col-3a4b5c6d-7e8f"
                        asset_type:
                          type: string
                          description: "Asset type"
                          example: "government_bond"
                          enum:
                            - government_bond
                            - corporate_bond
                            - equity
                            - cash
                            - money_market
                        isin:
                          type: string
                          description: "ISIN code"
                          example: "US9128284Y89"
                        description:
                          type: string
                          description: "Asset description"
                          example: "US Treasury 2.5% 2030"
                        nominal_value:
                          type: number
                          description: "Face/nominal value"
                          format: double
                          example: 5000000.0
                        market_value:
                          type: number
                          description: "Current market value"
                          format: double
                          example: 4875000.0
                        haircut_percent:
                          type: number
                          description: "Applied haircut (%)"
                          format: double
                          example: 2.0
                        adjusted_value:
                          type: number
                          description: "Haircut-adjusted value"
                          format: double
                          example: 4777500.0
                        direction:
                          type: string
                          description: "Collateral direction"
                          example: "pledged"
                          enum:
                            - pledged
                            - received
                        counterparty:
                          type: string
                          description: "Counterparty name"
                          example: "Goldman Sachs"
                        agreement_id:
                          type: string
                          description: "CSA/ISDA agreement"
                          format: uuid
                          example: "csa-9a0b1c2d"
                        status:
                          type: string
                          description: "Status"
                          example: "active"
                          enum:
                            - active
                            - pending_release
                            - released
                            - substituted
                      required:
                        - collateral_id
                        - asset_type
                        - market_value
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /collateral/{collateral_id}:
    get:
      operationId: getCollateral
      summary: Get collateral details
      description: >-
        Retrieve full collateral asset details including valuation history, haircut schedule, and agreement
        terms.
      tags:
        - Collateral Management
      parameters:
        - name: collateral_id
          in: path
          required: true
          description: "Unique collateral id"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  collateral_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "col-3a4b5c6d"
                  asset_type:
                    type: string
                    description: "Type"
                    example: "government_bond"
                  isin:
                    type: string
                    description: "ISIN"
                    example: "US9128284Y89"
                  market_value:
                    type: number
                    description: "Market value"
                    format: double
                    example: 4875000.0
                  haircut_percent:
                    type: number
                    description: "Haircut"
                    format: double
                    example: 2.0
                  adjusted_value:
                    type: number
                    description: "Adjusted value"
                    format: double
                    example: 4777500.0
                  status:
                    type: string
                    description: "Status"
                    example: "active"
                required:
                  - collateral_id
                  - asset_type
                  - market_value
                  - status
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /collateral/pledge:
    post:
      operationId: pledgeCollateral
      summary: Pledge collateral
      description: >-
        Pledge an asset as collateral under a CSA agreement. The asset is valued at current market price
        with the applicable haircut. Pledge requests require counterparty acknowledgment.
      tags:
        - Collateral Management
      requestBody:
        required: true
        description: Pledge collateral request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    asset_type:
                      type: string
                      description: "Asset type"
                      example: "government_bond"
                      enum:
                        - government_bond
                        - corporate_bond
                        - equity
                        - cash
                    isin:
                      type: string
                      description: "ISIN (for securities)"
                      example: "US9128284Y89"
                    nominal_value:
                      type: number
                      description: "Face value"
                      format: double
                      example: 5000000.0
                    currency:
                      type: string
                      description: "Currency"
                      example: "USD"
                    agreement_id:
                      type: string
                      description: "CSA agreement"
                      format: uuid
                      example: "csa-9a0b1c2d"
                    counterparty_id:
                      type: string
                      description: "Counterparty"
                      format: uuid
                      example: "cpty-4a5b6c7d"
                    settlement_date:
                      type: string
                      description: "Settlement date"
                      example: "2025-06-17"
              required:
                - asset_type
                - nominal_value
                - currency
                - agreement_id
                - counterparty_id
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  collateral_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "col-3a4b5c6d"
                  market_value:
                    type: number
                    description: "Current market value"
                    format: double
                    example: 4875000.0
                  haircut_percent:
                    type: number
                    description: "Haircut"
                    format: double
                    example: 2.0
                  adjusted_value:
                    type: number
                    description: "Adjusted value"
                    format: double
                    example: 4777500.0
                  status:
                    type: string
                    description: "Status"
                    example: "pending_acknowledgment"
                required:
                  - collateral_id
                  - market_value
                  - status
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /collateral/{collateral_id}/release:
    post:
      operationId: releaseCollateral
      summary: Release collateral
      description: >-
        Initiate release of a pledged collateral asset. The release is subject to counterparty approval and
        margin adequacy checks.
      tags:
        - Collateral Management
      parameters:
        - name: collateral_id
          in: path
          required: true
          description: "Unique collateral id"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Release collateral request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    reason:
                      type: string
                      description: "Release reason"
                      example: "Margin coverage exceeds 110% — releasing excess collateral"
                    settlement_date:
                      type: string
                      description: "Settlement date"
                      example: "2025-06-18"
              required:
                - reason
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  collateral_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "col-3a4b5c6d"
                  status:
                    type: string
                    description: "Status"
                    example: "pending_release"
                  release_value:
                    type: number
                    description: "Value being released"
                    format: double
                    example: 4875000.0
                required:
                  - collateral_id
                  - status
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /collateral/{collateral_id}/substitute:
    post:
      operationId: substituteCollateral
      summary: Substitute collateral
      description: >-
        Replace one collateral asset with another of equivalent or greater value. Both the release and
        pledge are processed atomically to maintain margin coverage.
      tags:
        - Collateral Management
      parameters:
        - name: collateral_id
          in: path
          required: true
          description: "Unique collateral id"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Substitute collateral request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    replacement_asset_type:
                      type: string
                      description: "Replacement asset type"
                      example: "government_bond"
                      enum:
                        - government_bond
                        - corporate_bond
                        - equity
                        - cash
                    replacement_isin:
                      type: string
                      description: "Replacement ISIN"
                      example: "US912810SV17"
                    replacement_nominal:
                      type: number
                      description: "Replacement face value"
                      format: double
                      example: 5500000.0
                    reason:
                      type: string
                      description: "Substitution reason"
                      example: "Upgrading to higher-rated government bond"
              required:
                - replacement_asset_type
                - replacement_nominal
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  original_collateral_id:
                    type: string
                    description: "Released"
                    format: uuid
                    example: "col-3a4b5c6d"
                  new_collateral_id:
                    type: string
                    description: "New pledge"
                    format: uuid
                    example: "col-1a2b3c4d"
                  net_value_change:
                    type: number
                    description: "Net value change"
                    format: double
                    example: 250000.0
                  status:
                    type: string
                    description: "Status"
                    example: "substituted"
                required:
                  - original_collateral_id
                  - new_collateral_id
                  - status
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /valuations:
    get:
      operationId: listValuations
      summary: List valuations
      description: >-
        List collateral valuations with mark-to-market snapshots and haircut adjustments.
      tags:
        - Valuations & Margin
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        valuation_id:
                          type: string
                          description: "Valuation ID"
                          format: uuid
                          example: "val-6a7b8c9d"
                        collateral_id:
                          type: string
                          description: "Collateral asset"
                          format: uuid
                          example: "col-3a4b5c6d"
                        market_value:
                          type: number
                          description: "Market value at valuation"
                          format: double
                          example: 4875000.0
                        haircut_adjusted:
                          type: number
                          description: "After haircut"
                          format: double
                          example: 4777500.0
                        valuation_date:
                          type: string
                          description: "Valuation date"
                          example: "2025-06-15"
                        source:
                          type: string
                          description: "Pricing source"
                          example: "bloomberg"
                          enum:
                            - bloomberg
                            - reuters
                            - internal
                            - manual
                      required:
                        - valuation_id
                        - collateral_id
                        - market_value
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: createValuation
      summary: Record valuation
      description: >-
        Record a mark-to-market valuation for a collateral asset. Auto-triggers margin call processing if
        coverage falls below threshold.
      tags:
        - Valuations & Margin
      requestBody:
        required: true
        description: Record valuation request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    collateral_id:
                      type: string
                      description: "Asset"
                      format: uuid
                      example: "col-3a4b5c6d"
                    market_value:
                      type: number
                      description: "Current market price"
                      format: double
                      example: 4850000.0
                    source:
                      type: string
                      description: "Source"
                      example: "bloomberg"
                      enum:
                        - bloomberg
                        - reuters
                        - internal
                        - manual
                    valuation_date:
                      type: string
                      description: "Date"
                      example: "2025-06-15"
              required:
                - collateral_id
                - market_value
                - source
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  valuation_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "val-6a7b8c9d"
                  haircut_adjusted:
                    type: number
                    description: "Adjusted"
                    format: double
                    example: 4753000.0
                  margin_call_triggered:
                    type: boolean
                    description: "Whether a margin call was generated"
                    example: false
                required:
                  - valuation_id
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /valuations/{valuation_id}:
    get:
      operationId: getValuation
      summary: Get valuation
      description: Retrieve valuation details.
      tags:
        - Valuations & Margin
      parameters:
        - name: valuation_id
          in: path
          required: true
          description: "Unique valuation id"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  valuation_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "val-6a7b8c9d"
                  collateral_id:
                    type: string
                    description: "Asset"
                    format: uuid
                    example: "col-3a4b5c6d"
                  market_value:
                    type: number
                    description: "Value"
                    format: double
                    example: 4875000.0
                  source:
                    type: string
                    description: "Source"
                    example: "bloomberg"
                required:
                  - valuation_id
                  - market_value
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /margin-calls:
    get:
      operationId: listMarginCalls
      summary: List margin calls
      description: List all margin calls (issued and received) with their resolution status.
      tags:
        - Valuations & Margin
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        margin_call_id:
                          type: string
                          description: "Margin call ID"
                          format: uuid
                          example: "mc-8a9b0c1d"
                        counterparty:
                          type: string
                          description: "Counterparty"
                          example: "Goldman Sachs"
                        direction:
                          type: string
                          description: "Call direction"
                          example: "issued"
                          enum:
                            - issued
                            - received
                        call_amount:
                          type: number
                          description: "Margin call amount"
                          format: double
                          example: 500000.0
                        currency:
                          type: string
                          description: "Currency"
                          example: "USD"
                        status:
                          type: string
                          description: "Call status"
                          example: "open"
                          enum:
                            - open
                            - partially_met
                            - met
                            - disputed
                            - expired
                        deadline:
                          type: string
                          description: "Response deadline"
                          format: date-time
                          example: "2025-06-15T14:30:00Z"
                        issued_at:
                          type: string
                          description: "Call issuance time"
                          format: date-time
                          example: "2025-06-15T14:30:00Z"
                      required:
                        - margin_call_id
                        - counterparty
                        - call_amount
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: issueMarginCall
      summary: Issue margin call
      description: >-
        Issue a margin call to a counterparty when collateral coverage falls below the minimum threshold
        defined in the CSA.
      tags:
        - Valuations & Margin
      requestBody:
        required: true
        description: Issue margin call request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    counterparty_id:
                      type: string
                      description: "Counterparty"
                      format: uuid
                      example: "cpty-4a5b6c7d"
                    agreement_id:
                      type: string
                      description: "CSA"
                      format: uuid
                      example: "csa-9a0b1c2d"
                    call_amount:
                      type: number
                      description: "Amount"
                      format: double
                      example: 500000.0
                    currency:
                      type: string
                      description: "Currency"
                      example: "USD"
                    deadline_hours:
                      type: integer
                      description: "Response deadline in hours"
                      example: 24
                    reason:
                      type: string
                      description: "Call reason"
                      example: "MTM valuation drop below 105% coverage threshold"
              required:
                - counterparty_id
                - agreement_id
                - call_amount
                - currency
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  margin_call_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "mc-8a9b0c1d"
                  status:
                    type: string
                    description: "Status"
                    example: "open"
                  deadline:
                    type: string
                    description: "Deadline"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - margin_call_id
                  - status
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /eligibility-rules:
    get:
      operationId: listEligibilityRules
      summary: List eligibility rules
      description: >-
        List collateral eligibility rules defining which assets are acceptable under each CSA agreement,
        with concentration limits and rating requirements.
      tags:
        - Collateral Management
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
