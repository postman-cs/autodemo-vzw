                    type: array
                    items:
                      type: object
                      properties:
                        rule_id:
                          type: string
                          description: "Rule ID"
                          format: uuid
                          example: "er-5a6b7c8d"
                        agreement_id:
                          type: string
                          description: "CSA agreement"
                          format: uuid
                          example: "csa-9a0b1c2d"
                        asset_type:
                          type: string
                          description: "Eligible asset type"
                          example: "government_bond"
                          enum:
