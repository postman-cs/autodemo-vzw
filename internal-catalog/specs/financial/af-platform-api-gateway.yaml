  /certificates:
    get:
      operationId: listCertificates
      summary: List TLS certificates
      description: >-
        List all TLS certificates managed by the gateway with expiration status and domain coverage.
      tags:
        - Routes
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        cert_id:
                          type: string
                          description: "Certificate ID"
                          format: uuid
                          example: "crt-4a5b6c7d"
                        domains:
                          type: array
                          description: "Covered domains"
                          items:
                            type: string
                        issuer:
                          type: string
                          description: "Certificate issuer"
                          example: "Let's Encrypt"
                        expires_at:
                          type: string
                          description: "Expiration date"
                          format: date-time
                          example: "2025-06-15T14:30:00Z"
                        auto_renew:
                          type: boolean
                          description: "Auto-renewal enabled"
                          example: true
                        status:
                          type: string
                          description: "Certificate status"
                          example: "active"
                          enum:
                            - active
                            - expiring_soon
                            - expired
                      required:
                        - cert_id
                        - domains
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: uploadCertificate
      summary: Upload TLS certificate
      description: Upload a TLS certificate and private key for gateway termination.
      tags:
        - Routes
      requestBody:
        required: true
        description: Upload TLS certificate request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    domains:
                      type: array
                      description: "Domain names"
                      items:
                        type: string
                    certificate_pem:
                      type: string
                      description: "PEM-encoded certificate"
                      example: "-----BEGIN CERTIFICATE-----..."
                    private_key_pem:
                      type: string
                      description: "PEM-encoded private key"
                      example: "-----BEGIN PRIVATE KEY-----..."
                    auto_renew:
                      type: boolean
                      description: "Enable auto-renewal"
                      example: true
              required:
                - domains
                - certificate_pem
                - private_key_pem
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  cert_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "crt-4a5b6c7d"
                  domains:
                    type: array
                    description: "Domains"
                    items:
                      type: string
                  expires_at:
                    type: string
                    description: "Expiration"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                  status:
                    type: string
                    description: "Status"
                    example: "active"
                required:
                  - cert_id
                  - domains
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
