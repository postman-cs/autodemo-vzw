openapi: 3.0.3
info:
  title: Acme Finance API Gateway Management API
  description: >-
    Centralized API gateway configuration managing request routing, rate limiting, authentication policies,
    request/response transformations, TLS certificate management, and upstream health monitoring. Supports path-
    based and header-based routing with weighted traffic distribution, pluggable auth strategies (JWT, OAuth2, API
    key, mTLS), and real-time analytics on request volume, latency percentiles, and error rates.
  version: 4.1.0
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-platform-api-gateway
  x-acme-domain: platform
servers:
  - url: https://af-platform-api-gateway.api.acmefin.com/v1
    description: Production
  - url: https://af-platform-api-gateway.staging.acmefin.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Routes
    description: API route definitions, path matching, and upstream forwarding rules
  - name: Rate Limiting
    description: Rate limiting policies with token bucket and sliding window algorithms
  - name: Auth Policies
    description: Authentication and authorization policy management
  - name: Upstreams
    description: Upstream service registration and health monitoring
paths:
  /routes:
    get:
      operationId: listRoutes
      summary: List routes
      description: >-
        List all API gateway routes with filtering by status, upstream, and path pattern. Returns route
        configuration including middleware chain and traffic weight.
      tags:
        - Routes
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: status
          in: query
          required: false
          description: "Filter by route status"
          schema:
            type: "string"
            enum:
              - active
              - draining
              - disabled
        - name: upstream_id
          in: query
          required: false
          description: "Filter routes by upstream target"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        route_id:
                          type: string
                          description: "Route ID"
                          format: uuid
                          example: "rt-3a4b5c6d-7e8f-9a0b-1c2d-3e4f5a6b7c8d"
                        path:
                          type: string
                          description: "URL path pattern"
                          example: "/api/v1/payments/*"
                        methods:
                          type: array
                          description: "Allowed HTTP methods"
                          items:
                            type: string
                        upstream_id:
                          type: string
                          description: "Target upstream service"
                          format: uuid
                          example: "ups-1a2b3c4d-5e6f-7a8b-9c0d"
                        strip_prefix:
                          type: boolean
                          description: "Strip matched prefix before forwarding"
                          example: true
                        timeout_ms:
                          type: integer
                          description: "Request timeout in milliseconds"
                          example: 30000
                        retries:
                          type: integer
                          description: "Max upstream retries"
                          example: 2
                        status:
                          type: string
                          description: "Route status"
                          example: "active"
                          enum:
                            - active
                            - draining
                            - disabled
                        created_at:
                          type: string
                          description: "ISO 8601 timestamp"
                          format: date-time
                          example: "2025-06-15T14:30:00Z"
                      required:
                        - route_id
                        - path
                        - upstream_id
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: createRoute
      summary: Create a route
      description: >-
        Define a new API route with path matching, upstream forwarding, and optional middleware (auth, rate
        limit, transform). Routes are validated for path conflicts before activation.
      tags:
        - Routes
      requestBody:
        required: true
        description: Create a route request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    path:
                      type: string
                      description: "URL path pattern (supports wildcards)"
                      example: "/api/v2/accounts/*"
                    methods:
                      type: array
                      description: "HTTP methods"
                      items:
                        type: string
                    upstream_id:
                      type: string
                      description: "Target upstream"
                      format: uuid
                      example: "ups-1a2b3c4d"
                    strip_prefix:
                      type: boolean
                      description: "Strip prefix"
                      example: true
                    timeout_ms:
                      type: integer
                      description: "Timeout"
                      example: 30000
                    retries:
                      type: integer
                      description: "Max retries"
                      example: 2
                    auth_policy_id:
                      type: string
                      description: "Auth policy to apply"
                      example: "pol-jwt-default"
                    rate_limit_policy_id:
                      type: string
                      description: "Rate limit policy"
                      example: "rl-standard"
              required:
                - path
                - methods
                - upstream_id
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  route_id:
                    type: string
                    description: "Route ID"
                    format: uuid
                    example: "rt-3a4b5c6d-7e8f-9a0b-1c2d-3e4f5a6b7c8d"
                  path:
                    type: string
                    description: "URL path pattern"
                    example: "/api/v1/payments/*"
                  methods:
                    type: array
                    description: "Allowed HTTP methods"
                    items:
                      type: string
                  upstream_id:
                    type: string
                    description: "Target upstream service"
                    format: uuid
                    example: "ups-1a2b3c4d-5e6f-7a8b-9c0d"
                  strip_prefix:
                    type: boolean
                    description: "Strip matched prefix before forwarding"
                    example: true
                  timeout_ms:
                    type: integer
                    description: "Request timeout in milliseconds"
                    example: 30000
                  retries:
                    type: integer
                    description: "Max upstream retries"
                    example: 2
                  status:
                    type: string
                    description: "Route status"
                    example: "active"
                    enum:
                      - active
                      - draining
                      - disabled
                  created_at:
                    type: string
                    description: "ISO 8601 timestamp"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - route_id
                  - path
                  - status
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /routes/{route_id}:
    get:
      operationId: getRoute
      summary: Get route
      description: >-
        Retrieve full route configuration including middleware chain, upstream target, and traffic
        statistics.
      tags:
        - Routes
      parameters:
        - name: route_id
          in: path
          required: true
          description: "Unique route id"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  route_id:
                    type: string
                    description: "Route ID"
                    format: uuid
                    example: "rt-3a4b5c6d-7e8f-9a0b-1c2d-3e4f5a6b7c8d"
                  path:
                    type: string
                    description: "URL path pattern"
                    example: "/api/v1/payments/*"
                  methods:
                    type: array
                    description: "Allowed HTTP methods"
                    items:
                      type: string
                  upstream_id:
                    type: string
                    description: "Target upstream service"
                    format: uuid
                    example: "ups-1a2b3c4d-5e6f-7a8b-9c0d"
                  strip_prefix:
                    type: boolean
                    description: "Strip matched prefix before forwarding"
                    example: true
                  timeout_ms:
                    type: integer
                    description: "Request timeout in milliseconds"
                    example: 30000
                  retries:
                    type: integer
                    description: "Max upstream retries"
                    example: 2
                  status:
                    type: string
                    description: "Route status"
                    example: "active"
                    enum:
                      - active
                      - draining
                      - disabled
                  created_at:
                    type: string
                    description: "ISO 8601 timestamp"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - route_id
                  - path
                  - status
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    patch:
      operationId: updateRoute
      summary: Update route
      description: >-
        Update route configuration. Path changes are validated for conflicts. Active routes can be updated
        without downtime via hot-reload.
      tags:
        - Routes
      parameters:
        - name: route_id
          in: path
          required: true
          description: "Unique route id"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Update route request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    path:
                      type: string
                      description: "Updated path"
                      example: "/api/v2/accounts/*"
                    methods:
                      type: array
                      description: "Updated methods"
                      items:
                        type: string
                    timeout_ms:
                      type: integer
                      description: "Updated timeout"
                      example: 60000
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  route_id:
                    type: string
                    description: "Route ID"
                    format: uuid
                    example: "rt-3a4b5c6d-7e8f-9a0b-1c2d-3e4f5a6b7c8d"
                  path:
                    type: string
                    description: "URL path pattern"
                    example: "/api/v1/payments/*"
                  methods:
                    type: array
                    description: "Allowed HTTP methods"
                    items:
                      type: string
                  upstream_id:
                    type: string
                    description: "Target upstream service"
                    format: uuid
                    example: "ups-1a2b3c4d-5e6f-7a8b-9c0d"
                  strip_prefix:
                    type: boolean
                    description: "Strip matched prefix before forwarding"
                    example: true
                  timeout_ms:
                    type: integer
                    description: "Request timeout in milliseconds"
                    example: 30000
                  retries:
                    type: integer
                    description: "Max upstream retries"
                    example: 2
                  status:
                    type: string
                    description: "Route status"
                    example: "active"
                    enum:
                      - active
                      - draining
                      - disabled
                  created_at:
                    type: string
                    description: "ISO 8601 timestamp"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - route_id
                  - path
                  - status
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
    delete:
      operationId: deleteRoute
      summary: Delete route
      description: >-
        Remove a route from the gateway. Active routes are drained before removal (existing connections
        complete).
      tags:
        - Routes
      parameters:
        - name: route_id
          in: path
          required: true
          description: "Unique route id"
          schema:
            type: "string"
      responses:
        "204":
          description: Resource deleted successfully
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /routes/{route_id}/rate-limits:
    get:
      operationId: getRouteRateLimit
      summary: Get route rate limit
      description: Retrieve the rate limit configuration applied to a specific route.
      tags:
        - Rate Limiting
      parameters:
        - name: route_id
          in: path
          required: true
          description: "Unique route id"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  route_id:
                    type: string
                    description: "Route ID"
                    format: uuid
                    example: "rt-3a4b5c6d"
                  policy_id:
                    type: string
                    description: "Applied policy"
                    format: uuid
                    example: "rl-5a6b7c8d"
                  requests_per_second:
                    type: integer
                    description: "Allowed RPS"
                    example: 100
                  burst_size:
                    type: integer
                    description: "Burst capacity"
                    example: 150
                  algorithm:
                    type: string
                    description: "Rate limiting algorithm"
                    example: "token_bucket"
                    enum:
                      - token_bucket
                      - sliding_window
                      - fixed_window
                required:
                  - route_id
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    put:
      operationId: setRouteRateLimit
      summary: Set route rate limit
      description: Apply or update the rate limit for a route. Overrides any policy-level defaults.
      tags:
        - Rate Limiting
      parameters:
        - name: route_id
          in: path
          required: true
          description: "Route ID"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Set route rate limit request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    requests_per_second:
                      type: integer
                      description: "RPS limit"
                      example: 100
                    burst_size:
                      type: integer
                      description: "Burst"
                      example: 150
                    algorithm:
                      type: string
                      description: "Algorithm"
                      example: "token_bucket"
                      enum:
                        - token_bucket
                        - sliding_window
              required:
                - requests_per_second
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  route_id:
                    type: string
                    description: "Route"
                    format: uuid
                    example: "rt-3a4b5c6d"
                  requests_per_second:
                    type: integer
                    description: "Applied RPS"
                    example: 100
                  updated_at:
                    type: string
                    description: "ISO 8601 timestamp"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - route_id
                  - requests_per_second
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /rate-limits/policies:
    get:
      operationId: listRateLimitPolicies
      summary: List rate limit policies
      description: >-
        List all rate limiting policies available for assignment to routes. Policies define request quotas,
        burst capacity, and algorithm selection.
      tags:
        - Rate Limiting
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        policy_id:
                          type: string
                          description: "Policy ID"
                          format: uuid
                          example: "rl-5a6b7c8d-9e0f-1a2b-3c4d-5e6f7a8b9c0d"
                        name:
                          type: string
                          description: "Policy name"
                          example: "standard-tier"
                        requests_per_second:
                          type: integer
                          description: "Base RPS"
                          example: 100
                        burst_size:
                          type: integer
                          description: "Burst capacity"
                          example: 150
                        algorithm:
                          type: string
                          description: "Algorithm"
                          example: "token_bucket"
                          enum:
                            - token_bucket
                            - sliding_window
                            - fixed_window
                        scope:
                          type: string
                          description: "Rate limit scope"
                          example: "global"
                          enum:
                            - global
                            - per_client
                            - per_route
                      required:
                        - policy_id
                        - name
                        - requests_per_second
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: createRateLimitPolicy
      summary: Create rate limit policy
      description: >-
        Create a new rate limiting policy. Policies can be scoped globally, per-client (by API key), or per-
        route.
      tags:
        - Rate Limiting
      requestBody:
        required: true
        description: Create rate limit policy request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    name:
                      type: string
                      description: "Policy name"
                      example: "premium-tier"
                    requests_per_second:
                      type: integer
                      description: "RPS"
                      example: 500
                    burst_size:
                      type: integer
                      description: "Burst"
                      example: 750
                    algorithm:
                      type: string
                      description: "Algorithm"
                      example: "token_bucket"
                      enum:
                        - token_bucket
                        - sliding_window
                    scope:
                      type: string
                      description: "Scope"
                      example: "global"
                      enum:
                        - global
                        - per_client
                        - per_route
              required:
                - name
                - requests_per_second
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  policy_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "rl-5a6b7c8d"
                  name:
                    type: string
                    description: "Name"
                    example: "premium-tier"
                  requests_per_second:
                    type: integer
                    description: "RPS"
                    example: 500
                required:
                  - policy_id
                  - name
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /rate-limits/policies/{policy_id}:
    get:
      operationId: getRateLimitPolicy
      summary: Get rate limit policy
      description: Retrieve a rate limit policy configuration with usage statistics.
      tags:
        - Rate Limiting
      parameters:
        - name: policy_id
          in: path
          required: true
          description: "Unique policy id"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  policy_id:
                    type: string
                    description: "Policy ID"
                    format: uuid
                    example: "rl-5a6b7c8d"
                  name:
                    type: string
                    description: "Name"
                    example: "standard-tier"
                  requests_per_second:
                    type: integer
                    description: "RPS"
                    example: 100
                  algorithm:
                    type: string
                    description: "Algorithm"
                    example: "token_bucket"
                required:
                  - policy_id
                  - name
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    patch:
      operationId: updateRateLimitPolicy
      summary: Update rate limit policy
      description: >-
        Update a rate limit policy. Changes propagate to all routes using this policy within 30 seconds.
      tags:
        - Rate Limiting
      parameters:
        - name: policy_id
          in: path
          required: true
          description: "Unique policy id"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Update rate limit policy request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    requests_per_second:
                      type: integer
                      description: "Updated RPS"
                      example: 200
                    burst_size:
                      type: integer
                      description: "Updated burst"
                      example: 300
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  policy_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "rl-5a6b7c8d"
                  requests_per_second:
                    type: integer
                    description: "RPS"
                    example: 200
                  updated_at:
                    type: string
                    description: "ISO 8601 timestamp"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - policy_id
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
    delete:
      operationId: deleteRateLimitPolicy
      summary: Delete rate limit policy
      description: Delete a rate limit policy. Fails if any routes are still using this policy.
      tags:
        - Rate Limiting
      parameters:
        - name: policy_id
          in: path
          required: true
          description: "Unique policy id"
          schema:
            type: "string"
      responses:
        "204":
          description: Resource deleted successfully
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /auth/policies:
    get:
      operationId: listAuthPolicies
      summary: List auth policies
      description: >-
