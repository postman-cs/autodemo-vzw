openapi: 3.0.3
info:
  title: Acme Finance Insurance Property API
  description: >-
    Manage property insurance policies including homeowners (HO-2 through HO-8), dwelling fire (DP-1, DP-3), and
    commercial property (CP) forms. Supports property inspections, replacement cost valuations using Marshall &
    Swift data, scheduled personal property endorsements, loss history verification through CLUE reports, and ISO
    protection class lookups. Handles coverage binding, endorsement processing, and claims integration for
    property losses.
  version: 2.6.0
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-insurance-property
  x-acme-domain: insurance
servers:
  - url: https://af-insurance-property.api.acmefin.com/v1
    description: Production
  - url: https://af-insurance-property.staging.acmefin.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Property Policies
    description: Property insurance policy issuance, coverage binding, and lifecycle management
  - name: Inspections
    description: Property inspection scheduling, completion, and condition assessment
  - name: Valuation
    description: Replacement cost estimation, appraisals, and scheduled personal property
  - name: Loss History
    description: CLUE report queries, prior loss verification, and loss history scoring
paths:
  /property/policies:
    get:
      operationId: listPropertyPolicies
      summary: List property policies
      description: >-
        Retrieve a paginated list of property insurance policies. Filter by property type, form type,
        status, protection class, or geographic area.
      tags:
        - Property Policies
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: property_type
          in: query
          required: false
          description: Filter by property type
          schema:
            type: "string"
            enum:
              - SINGLE_FAMILY
              - CONDO
              - TOWNHOUSE
              - MULTI_FAMILY
              - MANUFACTURED
              - COMMERCIAL
        - name: form_type
          in: query
          required: false
          description: Filter by insurance form
          schema:
            type: "string"
        - name: status
          in: query
          required: false
          description: Filter by policy status
          schema:
            type: "string"
            enum:
              - ACTIVE
              - CANCELLED
              - EXPIRED
              - PENDING
              - SUSPENDED
        - name: zip_code
          in: query
          required: false
          description: Filter by property ZIP code
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        policy_id:
                          type: string
                          description: Property policy number
                          example: "HO-10038472"
                        policyholder_name:
                          type: string
                          example: "William T. Harrison"
                        property_type:
                          type: string
                          example: "SINGLE_FAMILY"
                          enum:
                            - SINGLE_FAMILY
                            - CONDO
                            - TOWNHOUSE
                            - MULTI_FAMILY
                            - MANUFACTURED
                            - COMMERCIAL
                        form_type:
                          type: string
                          description: Insurance form type
                          example: "HO-3"
                          enum:
                            - HO-2
                            - HO-3
                            - HO-4
                            - HO-5
                            - HO-6
                            - HO-8
                            - DP-1
                            - DP-3
                            - CP
                            - BOP
                        property_address:
                          type: string
                          example: "742 Evergreen Terrace, Springfield, IL 62704"
                        year_built:
                          type: integer
                          description: Year property was constructed
                          example: 1998
                        construction_type:
                          type: string
                          example: "FRAME"
                          enum:
                            - FRAME
                            - MASONRY
                            - FIRE_RESISTIVE
                            - MODIFIED_FIRE_RESISTIVE
                            - JOISTED_MASONRY
                            - NON_COMBUSTIBLE
                        protection_class:
                          type: integer
                          description: ISO fire protection class (1-10)
                          example: 4
                          minimum: 1
                          maximum: 10
                        dwelling_coverage:
                          type: number
                          description: Coverage A — Dwelling limit
                          format: double
                          example: 350000.0
                        personal_property_coverage:
                          type: number
                          description: Coverage C — Personal property limit
                          format: double
                          example: 175000.0
                        liability_coverage:
                          type: number
                          description: Coverage E — Personal liability limit
                          format: double
                          example: 300000.0
                        deductible:
                          type: number
                          description: All-peril deductible
                          format: double
                          example: 2500.0
                        total_premium:
                          type: number
                          format: double
                          example: 1890.0
                        status:
                          type: string
                          example: "ACTIVE"
                          enum:
                            - ACTIVE
                            - CANCELLED
                            - EXPIRED
                            - PENDING
                            - SUSPENDED
                        effective_date:
                          type: string
                          format: date
                          example: "2024-03-01"
                        expiration_date:
                          type: string
                          format: date
                          example: "2025-03-01"
                      required:
                        - policy_id
                        - policyholder_name
                        - property_type
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: createPropertyPolicy
      summary: Issue property policy
      description: >-
        Issue a new property insurance policy. Coverage A (dwelling) limit should reflect the estimated
        replacement cost. Premium is calculated using ISO fire protection class, construction type, year
        built, and territorial rating factors.
      tags:
        - Property Policies
      requestBody:
        required: true
        description: Issue property policy request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    policyholder_name:
                      type: string
                      example: "William T. Harrison"
                    property_type:
                      type: string
                      example: "SINGLE_FAMILY"
                      enum:
                        - SINGLE_FAMILY
                        - CONDO
                        - TOWNHOUSE
                        - MULTI_FAMILY
                        - MANUFACTURED
                        - COMMERCIAL
                    form_type:
                      type: string
                      description: Insurance form type
                      example: "HO-3"
                      enum:
                        - HO-2
                        - HO-3
                        - HO-4
                        - HO-5
                        - HO-6
                        - HO-8
                        - DP-1
                        - DP-3
                        - CP
                        - BOP
                    property_address:
                      type: string
                      example: "742 Evergreen Terrace, Springfield, IL 62704"
                    year_built:
                      type: integer
                      description: Year property was constructed
                      example: 1998
                    construction_type:
                      type: string
                      example: "FRAME"
                      enum:
                        - FRAME
                        - MASONRY
                        - FIRE_RESISTIVE
                        - MODIFIED_FIRE_RESISTIVE
                        - JOISTED_MASONRY
                        - NON_COMBUSTIBLE
                    dwelling_coverage:
                      type: number
                      description: Coverage A — Dwelling limit
                      format: double
                      example: 350000.0
                    deductible:
                      type: number
                      description: All-peril deductible
                      format: double
                      example: 2500.0
                    effective_date:
                      type: string
                      format: date
                      example: "2024-03-01"
              required:
                - policyholder_name
                - property_type
                - form_type
                - property_address
                - dwelling_coverage
                - effective_date
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  policy_id:
                    type: string
                    description: Property policy number
                    example: "HO-10038472"
                  policyholder_name:
                    type: string
                    example: "William T. Harrison"
                  property_type:
                    type: string
                    example: "SINGLE_FAMILY"
                    enum:
                      - SINGLE_FAMILY
                      - CONDO
                      - TOWNHOUSE
                      - MULTI_FAMILY
                      - MANUFACTURED
                      - COMMERCIAL
                  form_type:
                    type: string
                    description: Insurance form type
                    example: "HO-3"
                    enum:
                      - HO-2
                      - HO-3
                      - HO-4
                      - HO-5
                      - HO-6
                      - HO-8
                      - DP-1
                      - DP-3
                      - CP
                      - BOP
                  property_address:
                    type: string
                    example: "742 Evergreen Terrace, Springfield, IL 62704"
                  year_built:
                    type: integer
                    description: Year property was constructed
                    example: 1998
                  construction_type:
                    type: string
                    example: "FRAME"
                    enum:
                      - FRAME
                      - MASONRY
                      - FIRE_RESISTIVE
                      - MODIFIED_FIRE_RESISTIVE
                      - JOISTED_MASONRY
                      - NON_COMBUSTIBLE
                  protection_class:
                    type: integer
                    description: ISO fire protection class (1-10)
                    example: 4
                    minimum: 1
                    maximum: 10
                  dwelling_coverage:
                    type: number
                    description: Coverage A — Dwelling limit
                    format: double
                    example: 350000.0
                  personal_property_coverage:
                    type: number
                    description: Coverage C — Personal property limit
                    format: double
                    example: 175000.0
                  liability_coverage:
                    type: number
                    description: Coverage E — Personal liability limit
                    format: double
                    example: 300000.0
                  deductible:
                    type: number
                    description: All-peril deductible
                    format: double
                    example: 2500.0
                  total_premium:
                    type: number
                    format: double
                    example: 1890.0
                  status:
                    type: string
                    example: "ACTIVE"
                    enum:
                      - ACTIVE
                      - CANCELLED
                      - EXPIRED
                      - PENDING
                      - SUSPENDED
                  effective_date:
                    type: string
                    format: date
                    example: "2024-03-01"
                  expiration_date:
                    type: string
                    format: date
                    example: "2025-03-01"
                required:
                  - policy_id
                  - status
                  - total_premium
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /property/policies/{policy_id}:
    get:
      operationId: getPropertyPolicy
      summary: Retrieve property policy details
      description: >-
        Fetch complete property policy details including dwelling characteristics, coverage selections (A
        through F), deductibles, endorsements, inspection history, and loss history.
      tags:
        - Property Policies
      parameters:
        - name: policy_id
          in: path
          required: true
          description: Unique policy id
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  policy_id:
                    type: string
                    description: Property policy number
                    example: "HO-10038472"
                  policyholder_name:
                    type: string
                    example: "William T. Harrison"
                  property_type:
                    type: string
                    example: "SINGLE_FAMILY"
                    enum:
                      - SINGLE_FAMILY
                      - CONDO
                      - TOWNHOUSE
                      - MULTI_FAMILY
                      - MANUFACTURED
                      - COMMERCIAL
                  form_type:
                    type: string
                    description: Insurance form type
                    example: "HO-3"
                    enum:
                      - HO-2
                      - HO-3
                      - HO-4
                      - HO-5
                      - HO-6
                      - HO-8
                      - DP-1
                      - DP-3
                      - CP
                      - BOP
                  property_address:
                    type: string
                    example: "742 Evergreen Terrace, Springfield, IL 62704"
                  year_built:
                    type: integer
                    description: Year property was constructed
                    example: 1998
                  construction_type:
                    type: string
                    example: "FRAME"
                    enum:
                      - FRAME
                      - MASONRY
                      - FIRE_RESISTIVE
                      - MODIFIED_FIRE_RESISTIVE
                      - JOISTED_MASONRY
                      - NON_COMBUSTIBLE
                  protection_class:
                    type: integer
                    description: ISO fire protection class (1-10)
                    example: 4
                    minimum: 1
                    maximum: 10
                  dwelling_coverage:
                    type: number
                    description: Coverage A — Dwelling limit
                    format: double
                    example: 350000.0
                  personal_property_coverage:
                    type: number
                    description: Coverage C — Personal property limit
                    format: double
                    example: 175000.0
                  liability_coverage:
                    type: number
