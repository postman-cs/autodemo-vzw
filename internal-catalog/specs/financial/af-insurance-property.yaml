  /property/policies/{policy_id}/coverage:
    patch:
      operationId: updatePropertyCoverage
      summary: Modify property coverage
      description: >-
        Update coverage limits, deductibles, or optional coverage endorsements on a property policy.
        Coverage A changes trigger a coinsurance adequacy check against the current replacement cost
        valuation. Generates an endorsement with premium adjustment.
      tags:
        - Property Policies
      parameters:
        - name: policy_id
          in: path
          required: true
          description: Property policy identifier
          schema:
            type: "string"
      requestBody:
        required: true
        description: Modify property coverage request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    dwelling_coverage:
                      type: number
                      description: Coverage A — Dwelling limit
                      format: double
                      example: 350000.0
                    personal_property_coverage:
                      type: number
                      description: Coverage C — Personal property limit
                      format: double
                      example: 175000.0
                    liability_coverage:
                      type: number
                      description: Coverage E — Personal liability limit
                      format: double
                      example: 300000.0
                    deductible:
                      type: number
                      description: All-peril deductible
                      format: double
                      example: 2500.0
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  endorsement_id:
                    type: string
                  premium_change:
                    type: number
                    format: double
                  new_total_premium:
                    type: number
                    format: double
                  coinsurance_adequate:
                    type: boolean
                required:
                  - endorsement_id
                  - new_total_premium
                  - coinsurance_adequate
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /property/policies/{policy_id}/loss-history:
    get:
      operationId: getPropertyLossHistory
      summary: Get property loss history
      description: >-
        Query the Comprehensive Loss Underwriting Exchange (CLUE) database for prior losses reported at the
        insured property address. Returns claims filed by current and previous owners within the past 7
        years. Used for underwriting risk assessment and renewal decisions.
      tags:
        - Loss History
      parameters:
        - name: policy_id
          in: path
          required: true
          description: Property policy identifier
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  property_address:
                    type: string
                  clue_report_date:
                    type: string
                    format: date
                  prior_losses:
                    type: array
                    description: Prior loss records from CLUE
                    items:
                      type: object
                  total_prior_claims:
                    type: integer
                    example: 1
                  total_prior_paid:
                    type: number
                    format: double
                    example: 8500.0
                  loss_free_years:
                    type: integer
                    description: Consecutive years without a claim
                    example: 4
                required:
                  - total_prior_claims
                  - loss_free_years
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /property/replacement-cost:
    post:
      operationId: estimateReplacementCost
      summary: Estimate replacement cost
      description: >-
        Calculate a replacement cost estimate for a property based on construction characteristics, square
        footage, quality grade, and local construction cost indices. Uses Marshall & Swift valuation
        methodology.
      tags:
        - Valuation
      requestBody:
        required: true
        description: Estimate replacement cost request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    address:
                      type: string
                      example: "742 Evergreen Terrace, Springfield, IL 62704"
                    square_footage:
                      type: integer
                      example: 2000
                    construction_type:
                      type: string
                      example: "FRAME"
                    year_built:
                      type: integer
                      example: 1998
                    quality_grade:
                      type: string
                      example: "GOOD"
                      enum:
                        - ECONOMY
                        - AVERAGE
                        - GOOD
                        - EXCELLENT
                        - CUSTOM
                    num_stories:
                      type: integer
                      example: 2
                    garage_type:
                      type: string
                      example: "ATTACHED"
                      enum:
                        - ATTACHED
                        - DETACHED
                        - NONE
                    finished_basement:
                      type: boolean
                      example: true
              required:
                - address
                - square_footage
                - construction_type
                - year_built
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  estimated_replacement_cost:
                    type: number
                    format: double
                    example: 362000.0
                  cost_per_sqft:
                    type: number
                    format: double
                    example: 181.0
                  recommended_coverage_a:
                    type: number
                    description: Recommended Coverage A limit
                    format: double
                    example: 365000.0
                  confidence_level:
                    type: string
                    example: "HIGH"
                    enum:
                      - HIGH
                      - MODERATE
                      - LOW
                  local_cost_index:
                    type: number
                    description: Local construction cost multiplier vs national average
                    format: double
                    example: 1.02
                required:
                  - estimated_replacement_cost
                  - recommended_coverage_a
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
