              type: object
              properties:
                    endorsement_form:
                      type: string
                      description: Endorsement form number
                      example: "HO-15"
                    endorsement_name:
                      type: string
                      description: Endorsement description
                      example: "Scheduled Personal Property"
                    effective_date:
                      type: string
                      format: date
