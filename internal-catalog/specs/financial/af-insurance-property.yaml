  /property/policies/{policy_id}/scheduled-items:
    get:
      operationId: listScheduledItems
      summary: List scheduled personal property
      description: >-
        Retrieve all individually scheduled personal property items on a homeowners policy, including
        jewelry, fine art, musical instruments, and collectibles with their appraised values.
