                required:
                  - policy_id
                  - status
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    patch:
      operationId: updatePropertyPolicy
      summary: Update property policy
      description: >-
        Modify non-coverage property policy attributes. Coverage changes require an endorsement and may
        trigger a property re-inspection.
      tags:
        - Property Policies
      parameters:
        - name: policy_id
          in: path
          required: true
          description: Unique policy id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Update property policy request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    policyholder_name:
                      type: string
                      example: "William T. Harrison"
                    property_address:
                      type: string
                      example: "742 Evergreen Terrace, Springfield, IL 62704"
      responses:
        "200":
          description: Successful response
          content:
