  /property/policies/{policy_id}/inspections:
    get:
      operationId: listPropertyInspections
      summary: List property inspections
      description: >-
        Retrieve inspection history for a property policy, including initial inspections, renewal
        inspections, and post-claim inspections.
      tags:
        - Inspections
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        inspection_id:
                          type: string
                          example: "INS-00482917"
                        inspection_type:
                          type: string
                          example: "INITIAL"
                          enum:
                            - INITIAL
                            - RENEWAL
                            - LOSS_CONTROL
                            - POST_CLAIM
                            - REINSTATEMENT
                        inspector_name:
                          type: string
                          example: "Michael Chen"
                        scheduled_date:
                          type: string
                          format: date
                          example: "2024-03-15"
                        completed_date:
                          type: string
                          format: date
                          nullable: true
                        condition_rating:
                          type: string
                          description: Overall property condition rating
                          example: "GOOD"
                          enum:
                            - EXCELLENT
                            - GOOD
                            - FAIR
                            - POOR
                            - UNACCEPTABLE
                        hazards_identified:
                          type: array
                          description: Hazards or concerns found during inspection
                          items:
                            type: string
                            example: "Aging roof (est. 18 years old)"
                        recommendations:
                          type: array
                          description: Inspector recommendations
                          items:
                            type: string
                            example: "Replace roof within 12 months"
                        photos_count:
                          type: integer
                          description: Number of photos taken
                          example: 24
                        status:
                          type: string
                          example: "COMPLETED"
                          enum:
                            - SCHEDULED
                            - COMPLETED
                            - CANCELLED
                            - FAILED_ACCESS
                      required:
                        - inspection_id
                        - inspection_type
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: schedulePropertyInspection
      summary: Schedule property inspection
      description: >-
        Schedule a physical property inspection for underwriting evaluation. Inspections assess roof
        condition, electrical and plumbing systems, foundation integrity, and fire protection measures.
        Initial inspections are required for new business; renewal inspections are triggered by age or claim
        activity.
      tags:
        - Inspections
      parameters:
        - name: policy_id
          in: path
          required: true
          description: Unique policy id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Schedule property inspection request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    inspection_type:
                      type: string
                      example: "INITIAL"
                      enum:
                        - INITIAL
                        - RENEWAL
                        - LOSS_CONTROL
                        - POST_CLAIM
                        - REINSTATEMENT
                    preferred_date:
                      type: string
                      format: date
                      example: "2024-03-15"
                    access_instructions:
                      type: string
                      description: Property access instructions for inspector
                      example: "Ring doorbell, homeowner will be present. Dog is friendly."
                    priority:
                      type: string
                      example: "STANDARD"
                      enum:
                        - STANDARD
                        - RUSH
              required:
                - inspection_type
                - preferred_date
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  inspection_id:
                    type: string
                    example: "INS-00482917"
                  scheduled_date:
                    type: string
                    format: date
                  inspector_name:
                    type: string
                  status:
                    type: string
                    example: "SCHEDULED"
                required:
                  - inspection_id
                  - scheduled_date
                  - status
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /property/policies/{policy_id}/valuation:
    get:
      operationId: getPropertyValuation
      summary: Get property valuation
      description: >-
        Retrieve the current replacement cost valuation for the insured property using Marshall & Swift
        residential or commercial cost estimator. Shows construction cost breakdown, depreciation factors,
        and recommended Coverage A limit.
      tags:
        - Valuation
      parameters:
        - name: policy_id
          in: path
          required: true
          description: Property policy identifier
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  estimated_replacement_cost:
                    type: number
                    format: double
                    example: 362000.0
                  current_dwelling_coverage:
                    type: number
                    format: double
                    example: 350000.0
                  coverage_to_value_ratio:
                    type: number
                    description: Ratio of Coverage A to replacement cost (should be >= 80% to avoid coinsurance penalty)
                    format: double
                    example: 96.7
                  coinsurance_adequate:
                    type: boolean
                    description: Whether Coverage A meets the 80% coinsurance requirement
                    example: true
                  cost_per_sqft:
                    type: number
                    format: double
                    example: 181.0
                  square_footage:
                    type: integer
                    example: 2000
                  valuation_source:
                    type: string
                    example: "Marshall & Swift Residential Estimator v2024.2"
                  valuation_date:
                    type: string
                    format: date
                required:
                  - estimated_replacement_cost
                  - coverage_to_value_ratio
                  - coinsurance_adequate
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
