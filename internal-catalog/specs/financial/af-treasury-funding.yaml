openapi: 3.0.3
info:
  title: Acme Finance Funding & Liquidity Management API
  description: >-
    Comprehensive funding lifecycle management covering funding request workflows with multi-level approval,
    funding source inventory and availability tracking, cost-of-funds calculation with transfer pricing, maturity
    ladder analysis for funding gap identification, contingency funding plan maintenance, allocation optimization,
    and regulatory compliance reporting for NSFR and funding concentration limits.
  version: 2.8.0
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-treasury-funding
  x-acme-domain: treasury
servers:
  - url: https://af-treasury-funding.api.acmefin.com/v1
    description: Production
  - url: https://af-treasury-funding.staging.acmefin.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Funding Requests
    description: Submit, approve, and track funding requests across the organization
  - name: Funding Sources
    description: Manage funding sources, cost of funds, and source availability
  - name: Liquidity Planning
    description: Maturity ladder analysis, contingency planning, and funding compliance
paths:
  /funding-requests:
    get:
      operationId: listFundingRequests
      summary: List funding requests
      description: >-
        List all funding requests across business units with approval status and funding source allocation.
      tags:
        - Funding Requests
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: status
          in: query
          required: false
          description: "Filter by status"
          schema:
            type: "string"
        - name: urgency
          in: query
          required: false
          description: "Filter by urgency"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        request_id:
                          type: string
                          description: "Request ID"
                          format: uuid
                          example: "fr-4a5b6c7d-8e9f"
                        requestor:
                          type: string
                          description: "Requesting business unit"
                          example: "Commercial Banking"
                        amount:
                          type: number
                          description: "Requested amount"
                          format: double
                          example: 25000000.0
                        currency:
                          type: string
                          description: "Currency"
                          example: "USD"
                        purpose:
                          type: string
                          description: "Funding purpose"
                          example: "working_capital"
                          enum:
                            - working_capital
                            - asset_purchase
                            - debt_refinancing
                            - project_finance
                            - regulatory_buffer
                        urgency:
                          type: string
                          description: "Request urgency"
                          example: "routine"
                          enum:
                            - routine
                            - urgent
                            - emergency
                        status:
                          type: string
                          description: "Request status"
                          example: "pending"
                          enum:
                            - pending
                            - under_review
                            - approved
                            - rejected
                            - funded
                            - closed
                        requested_date:
                          type: string
                          description: "Required funding date"
                          example: "2025-07-01"
                        created_at:
                          type: string
                          description: "ISO 8601 timestamp"
                          format: date-time
                          example: "2025-06-15T14:30:00Z"
                      required:
                        - request_id
                        - requestor
                        - amount
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: createFundingRequest
      summary: Submit funding request
      description: >-
        Submit a new funding request for treasury review and approval. Requests above $10M require
        additional credit committee sign-off.
      tags:
        - Funding Requests
      requestBody:
        required: true
        description: Submit funding request request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    requestor:
                      type: string
                      description: "Business unit"
                      example: "Commercial Banking"
                    amount:
                      type: number
                      description: "Amount"
                      format: double
                      example: 25000000.0
                    currency:
                      type: string
                      description: "Currency"
                      example: "USD"
                    purpose:
                      type: string
                      description: "Purpose"
                      example: "working_capital"
                      enum:
                        - working_capital
                        - asset_purchase
                        - debt_refinancing
                        - project_finance
                    urgency:
                      type: string
                      description: "Urgency"
                      example: "routine"
                      enum:
                        - routine
                        - urgent
                        - emergency
                    requested_date:
                      type: string
                      description: "Needed by"
                      example: "2025-07-01"
                    tenor_months:
                      type: integer
                      description: "Funding tenor in months"
                      example: 12
                    justification:
                      type: string
                      description: "Business justification"
                      example: "Working capital for Q3 expansion"
              required:
                - requestor
                - amount
                - currency
                - purpose
                - requested_date
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "fr-4a5b6c7d"
                  status:
                    type: string
                    description: "Status"
                    example: "pending"
                required:
                  - request_id
                  - status
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /funding-requests/{request_id}:
    get:
      operationId: getFundingRequest
      summary: Get funding request
      description: Retrieve full funding request details with approval chain and allocation.
      tags:
        - Funding Requests
      parameters:
        - name: request_id
          in: path
          required: true
          description: "Unique request id"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "fr-4a5b6c7d"
                  requestor:
                    type: string
                    description: "Unit"
                    example: "Commercial Banking"
                  amount:
                    type: number
                    description: "Amount"
                    format: double
                    example: 25000000.0
                  currency:
                    type: string
                    description: "Currency"
                    example: "USD"
                  purpose:
                    type: string
                    description: "Purpose"
                    example: "working_capital"
                  status:
                    type: string
                    description: "Status"
                    example: "approved"
                required:
                  - request_id
                  - amount
                  - status
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    patch:
      operationId: updateFundingRequest
      summary: Update funding request
      description: Update a pending funding request.
      tags:
        - Funding Requests
      parameters:
        - name: request_id
          in: path
          required: true
          description: "Unique request id"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Update funding request request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    amount:
                      type: number
                      description: "Updated amount"
                      format: double
                      example: 30000000.0
                    tenor_months:
                      type: integer
                      description: "Updated tenor"
                      example: 18
                    justification:
                      type: string
                      description: "Updated justification"
                      example: "Increased scope"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "fr-4a5b6c7d"
                  updated_at:
                    type: string
                    description: "ISO 8601 timestamp"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - request_id
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /funding-requests/{request_id}/approve:
    post:
      operationId: approveFundingRequest
      summary: Approve funding request
      description: >-
        Approve a funding request. Approved requests move to the funding allocation pipeline.
      tags:
        - Funding Requests
      parameters:
        - name: request_id
          in: path
          required: true
          description: "Unique request id"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Approve funding request request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    comment:
                      type: string
                      description: "Approval comment"
                      example: "Approved — allocating from commercial paper program"
                    funding_source_id:
                      type: string
                      description: "Preferred source"
                      format: uuid
                      example: "fs-5a6b7c8d"
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "fr-4a5b6c7d"
                  status:
                    type: string
                    description: "Status"
                    example: "approved"
                  approved_by:
                    type: string
                    description: "Approver"
                    example: "treasury-head"
                  approved_at:
                    type: string
                    description: "ISO 8601 timestamp"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - request_id
                  - status
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /funding-requests/{request_id}/reject:
    post:
      operationId: rejectFundingRequest
      summary: Reject funding request
      description: Reject a funding request with a reason.
      tags:
        - Funding Requests
      parameters:
        - name: request_id
          in: path
          required: true
          description: "Unique request id"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Reject funding request request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    reason:
                      type: string
                      description: "Rejection reason"
                      example: "Insufficient justification — resubmit with updated business case"
              required:
                - reason
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "fr-4a5b6c7d"
                  status:
                    type: string
                    description: "Status"
                    example: "rejected"
                  rejected_at:
                    type: string
                    description: "ISO 8601 timestamp"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - request_id
                  - status
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /funding-sources:
    get:
      operationId: listFundingSources
      summary: List funding sources
      description: >-
        List all available funding sources including credit facilities, commercial paper programs, bond
        issuances, and intercompany loans.
      tags:
        - Funding Sources
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number for pagination"
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: "Number of results per page (max 100)"
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: "Field to sort results by"
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: "Sort direction"
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        source_id:
                          type: string
                          description: "Source ID"
                          format: uuid
                          example: "fs-5a6b7c8d-9e0f"
                        name:
                          type: string
                          description: "Source name"
                          example: "Revolving Credit Facility - Citi"
                        type:
                          type: string
                          description: "Source type"
                          example: "revolving_credit"
                          enum:
                            - revolving_credit
                            - term_loan
                            - commercial_paper
                            - bond
                            - intercompany
                            - repo
                            - deposit
                        total_capacity:
                          type: number
                          description: "Total facility size"
                          format: double
                          example: 500000000.0
                        drawn_amount:
                          type: number
                          description: "Currently drawn"
                          format: double
                          example: 125000000.0
                        available:
                          type: number
                          description: "Available capacity"
                          format: double
                          example: 375000000.0
                        currency:
                          type: string
                          description: "Currency"
                          example: "USD"
                        cost_bps:
                          type: integer
                          description: "Current cost in basis points"
                          example: 85
                        maturity_date:
                          type: string
                          description: "Facility maturity"
                          example: "2027-06-15"
                        status:
                          type: string
                          description: "Status"
                          example: "active"
                          enum:
                            - active
                            - fully_drawn
                            - expired
                            - cancelled
                      required:
                        - source_id
                        - name
                        - type
                        - available
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: createFundingSource
      summary: Add funding source
      description: Register a new funding source in the treasury system.
      tags:
        - Funding Sources
      requestBody:
        required: true
        description: Add funding source request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    name:
                      type: string
                      description: "Source name"
                      example: "Term Loan - JPM"
                    type:
                      type: string
                      description: "Type"
                      example: "revolving_credit"
                      enum:
                        - revolving_credit
                        - term_loan
                        - commercial_paper
                        - bond
                        - intercompany
                        - repo
                    total_capacity:
                      type: number
                      description: "Capacity"
                      format: double
                      example: 200000000.0
                    currency:
                      type: string
                      description: "Currency"
                      example: "USD"
                    cost_bps:
                      type: integer
                      description: "Cost (bps)"
                      example: 120
                    maturity_date:
                      type: string
                      description: "Maturity"
                      example: "2028-12-31"
                    covenants:
                      type: object
                      description: "Financial covenant thresholds"
              required:
                - name
                - type
                - total_capacity
                - currency
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  source_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "fs-5a6b7c8d"
                  name:
                    type: string
                    description: "Name"
                    example: "Term Loan - JPM"
                  status:
                    type: string
                    description: "Status"
                    example: "active"
                required:
                  - source_id
                  - name
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /funding-sources/{source_id}:
    get:
      operationId: getFundingSource
      summary: Get funding source
      description: Retrieve funding source details with draw history and covenant compliance.
      tags:
        - Funding Sources
      parameters:
        - name: source_id
          in: path
          required: true
          description: "Unique source id"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  source_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "fs-5a6b7c8d"
                  name:
                    type: string
                    description: "Name"
                    example: "Revolving Credit Facility"
                  type:
                    type: string
                    description: "Type"
                    example: "revolving_credit"
                  total_capacity:
                    type: number
                    description: "Capacity"
                    format: double
                    example: 500000000.0
                  available:
                    type: number
                    description: "Available"
                    format: double
                    example: 375000000.0
                  cost_bps:
                    type: integer
                    description: "Cost"
                    example: 85
                  status:
                    type: string
                    description: "Status"
                    example: "active"
                required:
                  - source_id
                  - name
                  - type
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    patch:
      operationId: updateFundingSource
      summary: Update funding source
      description: Update funding source details.
      tags:
        - Funding Sources
      parameters:
        - name: source_id
          in: path
          required: true
          description: "Unique source id"
          schema:
            type: "string"
      requestBody:
        required: true
        description: Update funding source request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    cost_bps:
                      type: integer
                      description: "Updated cost"
                      example: 90
                    total_capacity:
                      type: number
                      description: "Updated capacity"
                      format: double
                      example: 600000000.0
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  source_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "fs-5a6b7c8d"
                  updated_at:
                    type: string
                    description: "ISO 8601 timestamp"
                    format: date-time
                    example: "2025-06-15T14:30:00Z"
                required:
                  - source_id
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
    delete:
      operationId: removeFundingSource
      summary: Remove funding source
      description: Remove an expired or cancelled funding source.
      tags:
        - Funding Sources
      parameters:
        - name: source_id
          in: path
          required: true
          description: "Unique source id"
          schema:
            type: "string"
      responses:
        "204":
          description: Resource deleted successfully
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /funding-sources/{source_id}/availability:
    get:
      operationId: getSourceAvailability
      summary: Get source availability
      description: >-
        Check real-time availability of a funding source including drawn amount, pending draws, and covenant
        headroom.
      tags:
        - Funding Sources
      parameters:
        - name: source_id
          in: path
          required: true
          description: "Unique source id"
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  source_id:
                    type: string
                    description: "ID"
                    format: uuid
                    example: "fs-5a6b7c8d"
                  total_capacity:
                    type: number
                    description: "Total"
                    format: double
                    example: 500000000.0
                  drawn:
                    type: number
                    description: "Drawn"
                    format: double
                    example: 125000000.0
                  pending_draws:
                    type: number
                    description: "Pending"
                    format: double
                    example: 10000000.0
                  available:
                    type: number
                    description: "Available"
                    format: double
                    example: 365000000.0
                  covenant_headroom:
                    type: object
                    description: "Distance to covenant breach"
                  next_maturity:
                    type: string
                    description: "Next repayment date"
                    example: "2025-12-15"
                required:
                  - source_id
                  - available
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /cost-of-funds:
    get:
      operationId: getCostOfFunds
      summary: Get cost of funds
      description: >-
        Retrieve the blended cost of funds across all funding sources with breakdown by source type,
        currency, and tenor.
      tags:
        - Funding Sources
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  blended_cost_bps:
                    type: integer
                    description: "Blended cost in basis points"
                    example: 95
                  by_source_type:
                    type: object
                    description: "Cost by funding source type"
                  by_currency:
                    type: object
                    description: "Cost by currency"
                  by_tenor:
                    type: object
                    description: "Cost by maturity tenor"
                  total_outstanding:
                    type: number
