      summary: Optimize allocation
      description: >-
        Run the funding allocation optimizer to recommend the lowest-cost funding mix for pending requests
        while respecting source limits and diversification constraints.
      tags:
        - Funding Requests
      requestBody:
        required: true
        description: Optimize allocation request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    pending_request_ids:
                      type: array
                      description: "Funding request IDs to allocate"
                      items:
                        type: string
