openapi: 3.0.3
info:
  title: Acme Finance Checkout API
  description: Hosted checkout experience for online merchants with PCI DSS Level 1 compliant payment processing. Supports
    card payments, digital wallets, saved payment methods, 3D Secure 2.x authentication for PSD2/SCA compliance, express one-click
    checkout, and comprehensive session lifecycle management.
  version: 4.0.1
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-payments-checkout
  x-acme-domain: payments
servers:
- url: https://af-payments-checkout.api.acmefin.com/v1
  description: Production
- url: https://af-payments-checkout.staging.acmefin.com/v1
  description: Staging
security:
- BearerAuth: []
tags:
- name: Checkout Sessions
  description: Create and manage hosted checkout sessions, process payments, and handle 3DS authentication
- name: Saved Payment Methods
  description: Store, retrieve, and manage customer payment instruments
- name: Express Checkout
  description: One-click checkout for returning customers with saved payment methods
paths:
  /checkout/sessions:
    get:
      operationId: listCheckoutSessions
      summary: List checkout sessions
      description: Retrieve checkout sessions with filtering by status, merchant, and creation date. Useful for reconciliation
        and abandoned cart recovery analytics.
      tags:
      - Checkout Sessions
      parameters:
      - name: page
        in: query
        required: false
        description: Page number for pagination
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: per_page
        in: query
        required: false
        description: Number of results per page (max 100)
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: sort_by
        in: query
        required: false
        description: Field to sort results by
        schema:
          type: string
      - name: sort_order
        in: query
        required: false
        description: Sort direction
        schema:
          type: string
          enum:
          - asc
          - desc
          default: desc
      - name: status
        in: query
        required: false
        description: Filter by session status
        schema:
          type: string
      - name: merchant_id
        in: query
        required: false
        description: Filter by merchant
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        session_id:
                          type: string
                          description: Checkout session identifier
                          format: uuid
                        merchant_id:
                          type: string
                          description: Merchant account identifier
                          example: merch-001
                        amount:
                          type: number
                          description: Transaction amount
                          format: double
                          example: 1500.0
                        currency:
                          type: string
                          description: ISO 4217 currency code
                          example: USD
                          minLength: 3
                          maxLength: 3
                        status:
                          type: string
                          enum:
                          - created
                          - pending_payment
                          - processing
                          - completed
                          - expired
                          - abandoned
                        return_url:
                          type: string
                          description: URL to redirect after successful payment
                          format: uri
                        cancel_url:
                          type: string
                          description: URL to redirect on cancellation
                          format: uri
                        expires_at:
                          type: string
                          description: Session expiration timestamp
                          format: date-time
                        line_items:
                          type: array
                          description: Order line items
                          items:
                            type: object
                        customer_email:
                          type: string
                          description: Customer email for receipts
                          format: email
                      required:
                      - session_id
                      - status
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
                required:
                - data
                - pagination
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
    post:
      operationId: createCheckoutSession
      summary: Create checkout session
      description: Initialize a new hosted checkout session. The session URL is returned for redirecting the customer to the
        Acme Finance hosted payment page. Sessions expire after 30 minutes by default.
      tags:
      - Checkout Sessions
      requestBody:
        required: true
        description: Create checkout session request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                merchant_id:
                  type: string
                  description: Merchant account identifier
                  example: merch-001
                amount:
                  type: number
                  description: Transaction amount
                  format: double
                  example: 1500.0
                currency:
                  type: string
                  description: ISO 4217 currency code
                  example: USD
                  minLength: 3
                  maxLength: 3
                return_url:
                  type: string
                  description: URL to redirect after successful payment
                  format: uri
                cancel_url:
                  type: string
                  description: URL to redirect on cancellation
                  format: uri
                customer_email:
                  type: string
                  description: Customer email for receipts
                  format: email
              required:
              - merchant_id
              - amount
              - currency
              - return_url
      responses:
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_id:
                    type: string
                    description: Checkout session identifier
                    format: uuid
                  merchant_id:
                    type: string
                    description: Merchant account identifier
                    example: merch-001
                  amount:
                    type: number
                    description: Transaction amount
                    format: double
                    example: 1500.0
                  currency:
                    type: string
                    description: ISO 4217 currency code
                    example: USD
                    minLength: 3
                    maxLength: 3
                  status:
                    type: string
                    enum:
                    - created
                    - pending_payment
                    - processing
                    - completed
                    - expired
                    - abandoned
                  return_url:
                    type: string
                    description: URL to redirect after successful payment
                    format: uri
                  cancel_url:
                    type: string
                    description: URL to redirect on cancellation
                    format: uri
                  expires_at:
                    type: string
                    description: Session expiration timestamp
                    format: date-time
                  line_items:
                    type: array
                    description: Order line items
                    items:
                      type: object
                  customer_email:
                    type: string
                    description: Customer email for receipts
                    format: email
                  checkout_url:
                    type: string
                    description: Hosted checkout page URL
                    format: uri
                required:
                - session_id
                - checkout_url
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
  /checkout/sessions/{session_id}:
    get:
      operationId: getCheckoutSession
      summary: Get checkout session
      description: Retrieve session details including payment status, line items, and 3D Secure authentication results. Poll
        this endpoint to detect payment completion.
      tags:
      - Checkout Sessions
      parameters:
      - name: session_id
        in: path
        required: true
        description: Unique session id
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_id:
                    type: string
                    description: Checkout session identifier
                    format: uuid
                  merchant_id:
                    type: string
                    description: Merchant account identifier
                    example: merch-001
                  amount:
                    type: number
                    description: Transaction amount
                    format: double
                    example: 1500.0
                  currency:
                    type: string
                    description: ISO 4217 currency code
                    example: USD
                    minLength: 3
                    maxLength: 3
                  status:
                    type: string
                    enum:
                    - created
                    - pending_payment
                    - processing
                    - completed
                    - expired
                    - abandoned
                  return_url:
                    type: string
                    description: URL to redirect after successful payment
                    format: uri
                  cancel_url:
                    type: string
                    description: URL to redirect on cancellation
                    format: uri
                  expires_at:
                    type: string
                    description: Session expiration timestamp
                    format: date-time
                  line_items:
                    type: array
                    description: Order line items
                    items:
                      type: object
                  customer_email:
                    type: string
                    description: Customer email for receipts
                    format: email
                required:
                - session_id
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
    patch:
      operationId: updateCheckoutSession
      summary: Update checkout session
      description: Modify a checkout session before payment is processed. Only sessions in 'created' or 'pending_payment'
        status can be updated.
      tags:
      - Checkout Sessions
      parameters:
      - name: session_id
        in: path
        required: true
        description: Unique session id
        schema:
          type: string
      requestBody:
        required: true
        description: Update checkout session request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                  description: Transaction amount
                  format: double
                  example: 1500.0
                currency:
                  type: string
                  description: ISO 4217 currency code
                  example: USD
                  minLength: 3
                  maxLength: 3
                customer_email:
                  type: string
                  description: Customer email for receipts
                  format: email
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_id:
                    type: string
                    description: Checkout session identifier
                    format: uuid
                  merchant_id:
                    type: string
                    description: Merchant account identifier
                    example: merch-001
                  amount:
                    type: number
                    description: Transaction amount
                    format: double
                    example: 1500.0
                  currency:
                    type: string
                    description: ISO 4217 currency code
                    example: USD
                    minLength: 3
                    maxLength: 3
                  status:
                    type: string
                    enum:
                    - created
                    - pending_payment
                    - processing
                    - completed
                    - expired
                    - abandoned
                  return_url:
                    type: string
                    description: URL to redirect after successful payment
                    format: uri
                  cancel_url:
                    type: string
                    description: URL to redirect on cancellation
                    format: uri
                  expires_at:
                    type: string
                    description: Session expiration timestamp
                    format: date-time
                  line_items:
                    type: array
                    description: Order line items
                    items:
                      type: object
                  customer_email:
                    type: string
                    description: Customer email for receipts
                    format: email
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
  /checkout/sessions/{session_id}/pay:
    post:
      operationId: processPayment
      summary: Process payment
      description: Submit payment for a checkout session. Supports card tokens, saved payment methods, and digital wallet
        tokens. Triggers 3D Secure authentication if required by the issuer or merchant risk rules.
      tags:
      - Checkout Sessions
      parameters:
      - name: session_id
        in: path
        required: true
        description: Unique session id
        schema:
          type: string
      requestBody:
        required: true
        description: Process payment request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                payment_method_id:
                  type: string
                  description: Stored payment method identifier
                  format: uuid
                card_token:
                  type: string
                  description: Tokenized card data from client-side SDK
                save_payment_method:
                  type: boolean
                  description: Store payment method for future use
                  default: false
      responses:
        '201':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_id:
                    type: string
                    description: Checkout session identifier
                    format: uuid
                  status:
                    type: string
                    example: completed
                  transaction_id:
                    type: string
                    format: uuid
                  threeds_required:
                    type: boolean
                  threeds_redirect_url:
                    type: string
                    description: Redirect URL if 3DS challenge is required
                    format: uri
                required:
                - session_id
                - status
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
  /checkout/sessions/{session_id}/expire:
    post:
      operationId: expireCheckoutSession
      summary: Expire checkout session
      description: Manually expire an active checkout session. Use for cleanup when the customer abandons the checkout flow.
      tags:
      - Checkout Sessions
      parameters:
      - name: session_id
        in: path
        required: true
        description: Unique session id
        schema:
          type: string
      responses:
        '202':
          description: Action accepted for processing
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
  /checkout/sessions/{session_id}/refund:
    post:
      operationId: refundCheckoutPayment
      summary: Refund checkout payment
      description: Issue a full or partial refund for a completed checkout payment. Refunds are processed to the original
        payment method.
      tags:
      - Checkout Sessions
      parameters:
      - name: session_id
        in: path
        required: true
        description: Unique session id
        schema:
          type: string
      requestBody:
        required: true
        description: Refund checkout payment request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                  description: Transaction amount
                  format: double
                  example: 1500.0
                reason:
                  type: string
                  description: Refund reason
                  enum:
                  - customer_request
                  - duplicate
                  - fraudulent
                  - product_not_received
      responses:
        '201':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  refund_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    example: pending
                  amount:
                    type: number
                    description: Transaction amount
                    format: double
                    example: 1500.0
                required:
                - refund_id
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
  /checkout/3ds:
    post:
      operationId: initiate3dsAuth
      summary: Initiate 3D Secure
      description: Start a 3D Secure 2.x authentication flow for Strong Customer Authentication (SCA) compliance under PSD2.
        Collects device fingerprint data and determines whether a frictionless or challenge flow is required.
      tags:
      - Checkout Sessions
      requestBody:
        required: true
        description: Initiate 3D Secure request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id:
                  type: string
                  description: Checkout session identifier
                  format: uuid
                card_token:
                  type: string
                browser_info:
                  type: object
                  description: Browser fingerprint data for 3DS risk assessment
                  properties:
                    user_agent:
                      type: string
                    accept_header:
                      type: string
                    screen_width:
                      type: integer
                    java_enabled:
                      type: boolean
              required:
              - session_id
              - card_token
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  threeds_id:
                    type: string
                    description: 3D Secure authentication identifier
                    format: uuid
                  status:
                    type: string
                    enum:
                    - challenge_required
                    - frictionless
                    - authenticated
                    - failed
                    - attempted
                  eci:
                    type: string
                    description: Electronic Commerce Indicator
                    example: '05'
                  cavv:
                    type: string
                    description: Cardholder Authentication Verification Value
                  ds_transaction_id:
                    type: string
                    description: Directory Server transaction ID
                  version:
                    type: string
                    description: 3DS protocol version
                    example: 2.2.0
                  challenge_url:
                    type: string
                    description: ACS challenge URL for cardholder interaction
                    format: uri
                required:
                - threeds_id
                - status
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
  /checkout/3ds/{threeds_id}:
    get:
      operationId: get3dsResult
      summary: Get 3DS result
      description: Retrieve the 3D Secure authentication result after the cardholder completes the challenge flow or frictionless
        authentication.
      tags:
      - Checkout Sessions
      parameters:
      - name: threeds_id
        in: path
        required: true
        description: Unique threeds id
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  threeds_id:
                    type: string
                    description: 3D Secure authentication identifier
                    format: uuid
                  status:
                    type: string
                    enum:
                    - challenge_required
                    - frictionless
                    - authenticated
                    - failed
                    - attempted
                  eci:
                    type: string
                    description: Electronic Commerce Indicator
                    example: '05'
                  cavv:
                    type: string
                    description: Cardholder Authentication Verification Value
                  ds_transaction_id:
                    type: string
                    description: Directory Server transaction ID
                  version:
                    type: string
                    description: 3DS protocol version
                    example: 2.2.0
                  challenge_url:
                    type: string
                    description: ACS challenge URL for cardholder interaction
                    format: uri
                required:
                - threeds_id
                - status
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
  /payment-methods:
    get:
      operationId: listPaymentMethods
      summary: List saved payment methods
      description: Retrieve all stored payment methods for the authenticated customer. Includes card details, expiration status,
        and default selection.
      tags:
      - Saved Payment Methods
      parameters:
      - name: page
        in: query
        required: false
        description: Page number for pagination
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: per_page
        in: query
        required: false
        description: Number of results per page (max 100)
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: sort_by
        in: query
        required: false
        description: Field to sort results by
        schema:
          type: string
      - name: sort_order
        in: query
        required: false
        description: Sort direction
        schema:
          type: string
          enum:
          - asc
          - desc
          default: desc
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        payment_method_id:
                          type: string
                          description: Stored payment method identifier
                          format: uuid
                        type:
                          type: string
                          description: Payment instrument type
                          enum:
                          - card
                          - bank_account
                          - digital_wallet
                        last_four:
                          type: string
                          description: Last four digits of the card or account
                          example: '4242'
                        brand:
                          type: string
                          description: Card brand
                          example: visa
                          enum:
                          - visa
                          - mastercard
                          - amex
                          - discover
                        exp_month:
                          type: integer
                          description: Expiration month
                          example: 12
                        exp_year:
                          type: integer
                          description: Expiration year
                          example: 2027
                        is_default:
                          type: boolean
                          description: Whether this is the default payment method
                        billing_address:
                          type: object
                          description: Billing address on file
                          properties:
                            postal_code:
                              type: string
                            country:
                              type: string
                      required:
                      - payment_method_id
                      - type
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
                required:
                - data
                - pagination
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
    post:
      operationId: savePaymentMethod
      summary: Save payment method
      description: Store a new payment method from a tokenized card or bank account. Card data is never transmitted in plaintext—use
        the client-side SDK to generate a secure token first.
      tags:
      - Saved Payment Methods
      requestBody:
        required: true
        description: Save payment method request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                card_token:
                  type: string
                  description: Secure token from client-side SDK
                type:
                  type: string
                  description: Payment instrument type
                  enum:
                  - card
                  - bank_account
                  - digital_wallet
                set_default:
                  type: boolean
                  default: false
                billing_address:
                  type: object
                  description: Billing address on file
                  properties:
                    postal_code:
                      type: string
                    country:
                      type: string
              required:
              - card_token
              - type
      responses:
        '201':
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  payment_method_id:
                    type: string
                    description: Stored payment method identifier
                    format: uuid
                  type:
                    type: string
                    description: Payment instrument type
                    enum:
                    - card
                    - bank_account
                    - digital_wallet
                  last_four:
                    type: string
                    description: Last four digits of the card or account
                    example: '4242'
                  brand:
                    type: string
                    description: Card brand
                    example: visa
                    enum:
                    - visa
                    - mastercard
                    - amex
                    - discover
                  exp_month:
                    type: integer
                    description: Expiration month
                    example: 12
                  exp_year:
                    type: integer
                    description: Expiration year
                    example: 2027
                  is_default:
                    type: boolean
                    description: Whether this is the default payment method
                  billing_address:
                    type: object
                    description: Billing address on file
                    properties:
                      postal_code:
                        type: string
                      country:
                        type: string
                required:
                - payment_method_id
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '422':
          $ref: '#/components/responses/422'
  /payment-methods/{payment_method_id}:
    get:
      operationId: getPaymentMethod
      summary: Get payment method
      description: Retrieve details for a stored payment method including card brand, last four digits, and expiration.
      tags:
      - Saved Payment Methods
      parameters:
      - name: payment_method_id
        in: path
        required: true
        description: Unique payment method id
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  payment_method_id:
                    type: string
                    description: Stored payment method identifier
                    format: uuid
                  type:
                    type: string
                    description: Payment instrument type
                    enum:
                    - card
                    - bank_account
                    - digital_wallet
                  last_four:
                    type: string
