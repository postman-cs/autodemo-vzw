  /fraud/models/{model_id}/evaluate:
    post:
      operationId: evaluateFraudModel
      summary: Evaluate fraud model performance
      description: Run performance evaluation on a deployed fraud scoring model. Computes precision, recall, F1 score, AUC-ROC,
        and false positive rate against labeled historical data. Used for model monitoring and champion-challenger comparison.
      tags:
      - Real-Time Scoring
      parameters:
      - name: model_id
        in: path
        required: true
        description: Unique model id
        schema:
          type: string
      requestBody:
        required: true
        description: Evaluate fraud model performance request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                evaluation_period_start:
                  type: string
                  description: Start of evaluation period
                  format: date
                  example: '2025-01-01'
                evaluation_period_end:
                  type: string
                  description: End of evaluation period
                  format: date
                  example: '2025-06-30'
                labeled_dataset_id:
                  type: string
                  description: Reference labeled dataset for evaluation
                  example: DS-2025-Q2
              required:
              - evaluation_period_start
              - evaluation_period_end
      responses:
        '201':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  model_id:
                    type: string
                    description: Model identifier
                    example: ensemble-v5.2.1
                  auc_roc:
                    type: number
                    description: Area Under ROC Curve
                    example: 0.943
                  precision:
                    type: number
                    description: Precision at operating threshold
                    example: 0.87
                  recall:
                    type: number
                    description: Recall at operating threshold
                    example: 0.91
                  f1_score:
                    type: number
                    description: F1 score
                    example: 0.89
                  false_positive_rate:
                    type: number
                    description: False positive rate
                    example: 0.08
                  sample_size:
                    type: integer
                    description: Evaluation sample size
                    example: 150000
                required:
                - model_id
                - auc_roc
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
