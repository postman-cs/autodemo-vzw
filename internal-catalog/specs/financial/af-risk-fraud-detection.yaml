                  customer_id:
                    type: string
                    description: Affected customer ID
                    example: CUST-72910
                  rule_ids:
                    type: array
                    description: Fraud rules that triggered this alert
                    items:
                      type: string
                      example: RULE-VEL-001
                  device_fingerprint:
                    type: string
                    description: Device fingerprint hash if available
                    example: df-a8b2c4e6f0
                  created_at:
                    type: string
                    description: Alert generation timestamp
                    format: date-time
                    example: '2025-06-15T14:30:00Z'
                required:
                - alert_id
                - severity
                - score
                - status
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '403':
          $ref: '#/components/responses/403'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
    patch:
      operationId: updateFraudAlert
      summary: Update fraud alert
      description: Update fraud alert status and investigation notes. Status transitions follow the fraud investigation workflow
        and require appropriate investigator permissions.
      tags:
      - Alert Management
      parameters:
      - name: alert_id
        in: path
        required: true
        description: Unique alert id
        schema:
          type: string
      requestBody:
        required: true
        description: Update fraud alert request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  description: Updated status
                  enum:
                  - assigned
                  - investigating
                  - confirmed_fraud
                  - false_positive
                  - closed
                assigned_to:
                  type: string
                  description: Investigator ID
                notes:
                  type: string
                  description: Investigation notes
      responses:
        '200':
