                    - assigned
                    - investigating
                    - confirmed_fraud
                    - false_positive
                    - closed
                  transaction_id:
                    type: string
                    description: Originating transaction identifier
                    example: TXN-8829104
                  channel:
                    type: string
                    description: Transaction channel
                    example: online
                    enum:
                    - online
                    - mobile
                    - atm
                    - branch
                    - wire
                    - ach
                  amount:
                    type: number
                    description: Transaction amount
                    format: double
                    example: 15000.0
                  customer_id:
                    type: string
                    description: Affected customer ID
                    example: CUST-72910
                  rule_ids:
                    type: array
                    description: Fraud rules that triggered this alert
                    items:
                      type: string
                      example: RULE-VEL-001
                  device_fingerprint:
                    type: string
                    description: Device fingerprint hash if available
                    example: df-a8b2c4e6f0
                  created_at:
                    type: string
                    description: Alert generation timestamp
                    format: date-time
                    example: '2025-06-15T14:30:00Z'
        '400':
          $ref: '#/components/responses/400'
