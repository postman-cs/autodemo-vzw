openapi: 3.0.3
info:
  title: Acme Finance Data Governance API
  description: >-
    Enterprise data governance framework for defining and enforcing data policies, managing sensitivity
    classifications, assigning data stewardship, and maintaining a business glossary. Supports retention, access
    control, masking, and quality policies with configurable enforcement levels from advisory to blocking. Ensures
    regulatory compliance with automated policy evaluation and violation tracking.
  version: 2.0.1
  contact:
    name: Acme Finance API Team
    email: api-support@acmefin.com
    url: https://developer.acmefin.com
  license:
    name: Proprietary
    url: https://acmefin.com/terms
  x-acme-catalog-id: af-data-governance
  x-acme-domain: data
servers:
  - url: https://af-data-governance.api.acmefin.com/v1
    description: Production
  - url: https://af-data-governance.staging.acmefin.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Policies
    description: Define and enforce data governance policies across enterprise datasets
  - name: Classifications
    description: Manage sensitivity classifications and detection patterns
  - name: Data Stewards
    description: Assign and manage data stewardship responsibilities
  - name: Glossary
    description: Maintain the enterprise business glossary with approved term definitions
paths:
  /policies:
    get:
      operationId: listPolicies
      summary: List governance policies
      description: >-
        Retrieve all data governance policies with enforcement status and evaluation results.
      tags:
        - Policies
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
        - name: type
          in: query
          required: false
          description: Filter by policy type
          schema:
            type: "string"
            enum:
              - retention
              - access_control
              - masking
              - quality
              - lifecycle
        - name: enforcement
          in: query
          required: false
          description: Filter by enforcement level
          schema:
            type: "string"
            enum:
              - advisory
              - warning
              - blocking
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        policy_id:
                          type: string
                          description: "Policy identifier"
                          format: uuid
                          readOnly: true
                        name:
                          type: string
                          description: "Policy name"
                          example: "PII Retention Policy"
                        type:
                          type: string
                          description: "Policy category"
                          enum:
                            - retention
                            - access_control
                            - masking
                            - quality
                            - lifecycle
                        description:
                          type: string
                          description: "Policy intent and scope"
                        scope:
                          type: string
                          description: "Datasets or domains this policy applies to"
                          example: "domain:core-banking"
                        enforcement:
                          type: string
                          description: "Enforcement level"
                          enum:
                            - advisory
                            - warning
                            - blocking
                        status:
                          type: string
                          description: "Policy lifecycle status"
                          enum:
                            - draft
                            - active
                            - deprecated
                        owner:
                          type: string
                          description: "Policy owner"
                        last_evaluated_at:
                          type: string
                          format: date-time
                      required:
                        - policy_id
                        - name
                        - type
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: createPolicy
      summary: Create governance policy
      description: >-
        Define a new governance policy with scope, enforcement level, and evaluation rules.
      tags:
        - Policies
      requestBody:
        required: true
        description: Create governance policy request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    name:
                      type: string
                    type:
                      type: string
                      enum:
                        - retention
                        - access_control
                        - masking
                        - quality
                        - lifecycle
                    description:
                      type: string
                    scope:
                      type: string
                    enforcement:
                      type: string
                      enum:
                        - advisory
                        - warning
                        - blocking
                    rules:
                      type: object
                      description: "Policy evaluation rules"
              required:
                - name
                - type
                - scope
                - enforcement
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  policy_id:
                    type: string
                    description: "Policy identifier"
                    format: uuid
                    readOnly: true
                  name:
                    type: string
                    description: "Policy name"
                    example: "PII Retention Policy"
                  type:
                    type: string
                    description: "Policy category"
                    enum:
                      - retention
                      - access_control
                      - masking
                      - quality
                      - lifecycle
                  description:
                    type: string
                    description: "Policy intent and scope"
                  scope:
                    type: string
                    description: "Datasets or domains this policy applies to"
                    example: "domain:core-banking"
                  enforcement:
                    type: string
                    description: "Enforcement level"
                    enum:
                      - advisory
                      - warning
                      - blocking
                  status:
                    type: string
                    description: "Policy lifecycle status"
                    enum:
                      - draft
                      - active
                      - deprecated
                  owner:
                    type: string
                    description: "Policy owner"
                  last_evaluated_at:
                    type: string
                    format: date-time
                required:
                  - policy_id
                  - name
                  - status
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /policies/{policy_id}:
    get:
      operationId: getPolicy
      summary: Get policy details
      description: >-
        Retrieve a governance policy with its evaluation history and current violation count.
      tags:
        - Policies
      parameters:
        - name: policy_id
          in: path
          required: true
          description: Unique policy id
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  policy_id:
                    type: string
                    description: "Policy identifier"
                    format: uuid
                    readOnly: true
                  name:
                    type: string
                    description: "Policy name"
                    example: "PII Retention Policy"
                  type:
                    type: string
                    description: "Policy category"
                    enum:
                      - retention
                      - access_control
                      - masking
                      - quality
                      - lifecycle
                  description:
                    type: string
                    description: "Policy intent and scope"
                  scope:
                    type: string
                    description: "Datasets or domains this policy applies to"
                    example: "domain:core-banking"
                  enforcement:
                    type: string
                    description: "Enforcement level"
                    enum:
                      - advisory
                      - warning
                      - blocking
                  status:
                    type: string
                    description: "Policy lifecycle status"
                    enum:
                      - draft
                      - active
                      - deprecated
                  owner:
                    type: string
                    description: "Policy owner"
                  last_evaluated_at:
                    type: string
                    format: date-time
                required:
                  - policy_id
                  - name
                  - type
                  - status
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    patch:
      operationId: updatePolicy
      summary: Update policy
      description: Modify policy rules, scope, or enforcement level.
      tags:
        - Policies
      parameters:
        - name: policy_id
          in: path
          required: true
          description: Unique policy id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Update policy request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    description:
                      type: string
                    scope:
                      type: string
                    enforcement:
                      type: string
                      enum:
                        - advisory
                        - warning
                        - blocking
                    status:
                      type: string
                      enum:
                        - active
                        - deprecated
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  policy_id:
                    type: string
                    description: "Policy identifier"
                    format: uuid
                    readOnly: true
                  name:
                    type: string
                    description: "Policy name"
                    example: "PII Retention Policy"
                  type:
                    type: string
                    description: "Policy category"
                    enum:
                      - retention
                      - access_control
                      - masking
                      - quality
                      - lifecycle
                  description:
                    type: string
                    description: "Policy intent and scope"
                  scope:
                    type: string
                    description: "Datasets or domains this policy applies to"
                    example: "domain:core-banking"
                  enforcement:
                    type: string
                    description: "Enforcement level"
                    enum:
                      - advisory
                      - warning
                      - blocking
                  status:
                    type: string
                    description: "Policy lifecycle status"
                    enum:
                      - draft
                      - active
                      - deprecated
                  owner:
                    type: string
                    description: "Policy owner"
                  last_evaluated_at:
                    type: string
                    format: date-time
        "400":
          $ref: "#/components/responses/400"
        "404":
          $ref: "#/components/responses/404"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
    delete:
      operationId: deletePolicy
      summary: Delete policy
      description: Remove a governance policy. Active policies must be deprecated before deletion.
      tags:
        - Policies
      parameters:
        - name: policy_id
          in: path
          required: true
          description: Unique policy id
          schema:
            type: "string"
      responses:
        "204":
          description: Resource deleted successfully
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /policies/{policy_id}/violations:
    get:
      operationId: listPolicyViolations
      summary: List policy violations
      description: Retrieve datasets currently in violation of this governance policy.
      tags:
        - Policies
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        violation_id:
                          type: string
                          description: "Violation identifier"
                          format: uuid
                        dataset_id:
                          type: string
                          format: uuid
                        dataset_name:
                          type: string
                        severity:
                          type: string
                          enum:
                            - low
                            - medium
                            - high
                            - critical
                        detected_at:
                          type: string
                          format: date-time
                        resolved:
                          type: boolean
                      required:
                        - violation_id
                        - dataset_id
                        - severity
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /classifications:
    get:
      operationId: listClassifications
      summary: List classifications
      description: Retrieve sensitivity classifications with detection patterns and asset counts.
      tags:
        - Classifications
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        classification_id:
                          type: string
                          description: "Classification identifier"
                          format: uuid
                          readOnly: true
                        label:
                          type: string
                          description: "Classification label"
                          example: "PII - Social Security Number"
                        level:
                          type: string
                          description: "Sensitivity level"
                          enum:
                            - public
                            - internal
                            - confidential
                            - restricted
                        detection_pattern:
                          type: string
                          description: "Regex pattern for automatic detection"
                        asset_count:
                          type: integer
                          description: "Number of assets with this classification"
                      required:
                        - classification_id
                        - label
                        - level
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: createClassification
      summary: Create classification
      description: >-
        Define a new sensitivity classification with an optional regex detection pattern for automatic
        tagging.
      tags:
        - Classifications
      requestBody:
        required: true
        description: Create classification request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    label:
                      type: string
                    level:
                      type: string
                      enum:
                        - public
                        - internal
                        - confidential
                        - restricted
                    detection_pattern:
                      type: string
                      description: "Regex for auto-detection"
              required:
                - label
                - level
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  classification_id:
                    type: string
                    description: "Classification identifier"
                    format: uuid
                    readOnly: true
                  label:
                    type: string
                    description: "Classification label"
                    example: "PII - Social Security Number"
                  level:
                    type: string
                    description: "Sensitivity level"
                    enum:
                      - public
                      - internal
                      - confidential
                      - restricted
                  detection_pattern:
                    type: string
                    description: "Regex pattern for automatic detection"
                  asset_count:
                    type: integer
                    description: "Number of assets with this classification"
                required:
                  - classification_id
                  - label
                  - level
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /classifications/{classification_id}:
    get:
      operationId: getClassification
      summary: Get classification
      description: Retrieve a classification with usage statistics and sample matched assets.
      tags:
        - Classifications
      parameters:
        - name: classification_id
          in: path
          required: true
          description: Unique classification id
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  classification_id:
                    type: string
                    description: "Classification identifier"
                    format: uuid
                    readOnly: true
                  label:
                    type: string
                    description: "Classification label"
                    example: "PII - Social Security Number"
                  level:
                    type: string
                    description: "Sensitivity level"
                    enum:
                      - public
                      - internal
                      - confidential
                      - restricted
                  detection_pattern:
                    type: string
                    description: "Regex pattern for automatic detection"
                  asset_count:
                    type: integer
                    description: "Number of assets with this classification"
                required:
                  - classification_id
                  - label
                  - level
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /access-reviews:
    get:
      operationId: listAccessReviews
      summary: List access reviews
      description: Retrieve periodic access review campaigns with completion status.
      tags:
        - Policies
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        review_id:
                          type: string
                          format: uuid
                        campaign_name:
                          type: string
                        status:
                          type: string
                          enum:
                            - pending
                            - in_progress
                            - completed
                        total_grants:
                          type: integer
                        reviewed_grants:
                          type: integer
                        due_date:
                          type: string
                          format: date
                      required:
                        - review_id
                        - campaign_name
                        - status
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
    post:
      operationId: createAccessReview
      summary: Create access review campaign
      description: >-
        Launch a new access review campaign for data stewards to certify or revoke existing access grants.
      tags:
        - Policies
      requestBody:
        required: true
        description: Create access review campaign request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    campaign_name:
                      type: string
                    scope:
                      type: string
                      description: "Review scope (domain or classification)"
                    due_date:
                      type: string
                      format: date
                    reviewers:
                      type: array
                      items:
                        type: string
              required:
                - campaign_name
                - scope
                - due_date
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  review_id:
                    type: string
                    format: uuid
                  campaign_name:
                    type: string
                  status:
                    type: string
                  total_grants:
                    type: integer
                required:
                  - review_id
                  - campaign_name
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "422":
          $ref: "#/components/responses/422"
  /stewards:
    get:
      operationId: listStewards
      summary: List data stewards
      description: Retrieve data stewards with their domain assignments and dataset counts.
      tags:
        - Data Stewards
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: "integer"
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: "string"
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: "string"
            enum:
              - asc
              - desc
            default: "desc"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        steward_id:
                          type: string
                          description: "Steward identifier"
                          format: uuid
                          readOnly: true
                        user_id:
                          type: string
                          description: "User account reference"
                        name:
                          type: string
                          description: "Steward full name"
                          example: "Sarah Chen"
                        email:
                          type: string
                          description: "Contact email"
                        domains:
                          type: array
                          description: "Governed data domains"
                          items:
                            type: string
                        dataset_count:
                          type: integer
                          description: "Number of datasets under stewardship"
                      required:
                        - steward_id
                        - name
                        - email
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
                required:
                  - data
                  - pagination
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
  /stewards/{steward_id}:
    get:
      operationId: getSteward
      summary: Get steward details
      description: >-
        Retrieve steward profile with governed domains, datasets, and active review assignments.
      tags:
        - Data Stewards
      parameters:
        - name: steward_id
          in: path
          required: true
          description: Unique steward id
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  steward_id:
                    type: string
                    description: "Steward identifier"
                    format: uuid
                    readOnly: true
                  user_id:
                    type: string
                    description: "User account reference"
                  name:
                    type: string
                    description: "Steward full name"
