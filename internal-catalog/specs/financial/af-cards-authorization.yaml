  /pre-authorizations:
    post:
      operationId: createPreAuth
      summary: Create a pre-authorization
      description: >-
        Creates a pre-authorization hold for a future transaction. Pre-authorizations are used for estimated
        charges where the final amount is not yet known, such as hotel check-ins, car rentals, and gas
        station pay-at-pump. Pre-auth holds have extended expiry periods (up to 30 days for lodging). The
        hold amount is not charged to the cardholder.
      tags:
        - Authorizations
      requestBody:
        required: true
        description: Create a pre-authorization request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    card_id:
                      type: string
                      description: Unique card identifier
                      example: "card-8a2f4b91"
                    estimated_amount:
                      type: number
                      description: Estimated transaction amount for the hold
                      format: double
                      example: 250.0
                    currency:
                      type: string
                      description: ISO 4217 currency code
                      example: "USD"
                      minLength: 3
                      maxLength: 3
                    merchant_name:
                      type: string
                      description: Merchant name as registered with the acquirer
                      example: "ACME Electronics Store"
                    merchant_category_code:
                      type: string
                      description: ISO 18245 merchant category code
                      example: "5411"
                      pattern: '^[0-9]{4}$'
                    hold_duration_days:
                      type: integer
                      description: Requested hold duration in days (max 30 for lodging)
                      example: 7
                      minimum: 1
                      maximum: 30
              required:
                - card_id
                - estimated_amount
                - currency
                - merchant_name
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
