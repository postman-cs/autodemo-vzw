  /authorizations/{authorization_id}/history:
    get:
      operationId: getAuthorizationHistory
      summary: Get authorization event history
      description: >-
        Returns the complete event history for an authorization including the initial request, fraud check
        results, approval/decline decision, captures, reversals, and settlement events. Each event includes
        a timestamp, type, and associated data. Use for detailed transaction audit and investigation.
      tags:
        - Authorizations
      parameters:
        - name: authorization_id
          in: path
          required: true
          description: Unique authorization id
          schema:
            type: "string"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    description: Authorization lifecycle events in chronological order
                    items:
                      type: string
                      example: "2025-06-15T14:30:00Z: AUTHORIZED for $250.00"
                  total_events:
                    type: integer
                    description: Total number of lifecycle events
                    example: 4
