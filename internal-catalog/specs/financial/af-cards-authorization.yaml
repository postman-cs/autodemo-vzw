  /authorizations/{authorization_id}/reversal:
    post:
      operationId: reverseAuthorization
      summary: Reverse an authorization
      description: >-
        Reverses an authorized transaction, releasing the hold on the cardholder's available balance. Full
        reversals release the entire hold amount. The reversal is processed through the card network and the
        acquirer is notified. Only authorizations in AUTHORIZED status can be fully reversed.
      tags:
        - Authorizations
      parameters:
        - name: authorization_id
          in: path
          required: true
          description: Unique authorization id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Reverse an authorization request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    reason:
                      type: string
                      description: Reason for the reversal
                      example: "Customer cancelled order before shipment"
              required:
                - reason
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  authorization_id:
                    type: string
                    description: Unique authorization identifier
                    example: "auth-4f8a21c9"
                  card_id:
