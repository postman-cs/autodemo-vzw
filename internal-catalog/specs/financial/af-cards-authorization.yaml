  /authorizations/{authorization_id}/incremental:
    post:
      operationId: incrementalAuth
      summary: Request incremental authorization
      description: >-
        Increases the authorized amount for an existing authorization. Common for hotels, car rentals, and
        restaurants where the final amount may exceed the initial authorization. The cardholder's available
        balance is reduced by the incremental amount. Subject to fraud and limit checks. Not all merchant
        categories support incremental authorizations.
      tags:
        - Authorizations
      parameters:
        - name: authorization_id
          in: path
