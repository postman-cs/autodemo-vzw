                    description: Network retrieval reference number for reconciliation
                    example: "025614800012"
                  network:
                    type: string
                    description: Card network that processed the authorization
                    example: "VISA"
                    enum:
                      - VISA
                      - MASTERCARD
                      - AMEX
                      - DISCOVER
                  channel:
                    type: string
                    description: Transaction channel
                    example: "POS"
                    enum:
                      - POS
                      - ECOMMERCE
                      - ATM
                      - MOTO
                      - CONTACTLESS
                      - RECURRING
