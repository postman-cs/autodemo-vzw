  /authorizations/{authorization_id}/void:
    post:
      operationId: voidAuthorization
      summary: Void an authorization
      description: >-
        Voids an authorization that has already been captured but not yet settled. The settlement is
        cancelled and the cardholder's balance is restored. Voids must be submitted before the settlement
        cutoff time (typically 11 PM ET). After settlement, a refund must be used instead.
      tags:
        - Authorizations
      parameters:
        - name: authorization_id
          in: path
          required: true
          description: Unique authorization id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Void an authorization request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    reason:
                      type: string
                      description: Reason for voiding the authorization
                      example: "Duplicate transaction"
              required:
