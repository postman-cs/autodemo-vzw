  /authorizations/{authorization_id}/partial-capture:
    post:
      operationId: partialCapture
      summary: Perform a partial capture
      description: >-
        Captures a portion of the authorized amount and keeps the remaining hold active for a subsequent
        capture. Useful for split shipments where different items ship at different times. The remaining
        hold continues until captured or the authorization expires. Maximum of five partial captures per
        authorization.
      tags:
        - Authorizations
      parameters:
        - name: authorization_id
          in: path
          required: true
          description: Unique authorization id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Perform a partial capture request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    amount:
                      type: number
                      description: Amount to capture in this partial capture
                      format: double
                      example: 250.0
                    is_final:
                      type: boolean
                      description: Whether this is the final capture (releases remaining hold)
                      example: false
              required:
                - amount
