  /authorizations/{authorization_id}/capture:
    post:
      operationId: captureAuthorization
      summary: Capture an authorization
      description: >-
        Captures a previously authorized transaction, initiating the settlement process. The capture amount
        can be equal to or less than the original authorization amount. If the capture amount is less, the
        remaining hold is released. Only authorizations in AUTHORIZED status can be captured. Settlement
        typically occurs within 1-2 business days.
      tags:
        - Authorizations
      parameters:
        - name: authorization_id
          in: path
          required: true
          description: Unique authorization id
          schema:
            type: "string"
      requestBody:
        required: true
        description: Capture an authorization request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                    amount:
                      type: number
                      description: Amount to capture (must be <= authorized amount)
                      format: double
                      example: 250.0
                    settlement_descriptor:
                      type: string
                      description: Statement descriptor for the settlement
                      example: "ACME ELECTRONICS #4521"
              required:
                - amount
      responses:
        "201":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  authorization_id:
                    type: string
                    description: Unique authorization identifier
