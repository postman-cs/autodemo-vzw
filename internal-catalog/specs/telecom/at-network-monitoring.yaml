openapi: 3.0.3
info:
  title: Network Monitoring API
  description: Real-time network health monitoring with KPI dashboards for availability, latency, and throughput. Supports
    SNMP polling, streaming telemetry via gNMI, and synthetic probe testing across all network layers.
  version: 2.8.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-network-monitoring
  x-acme-domain: network
servers:
  - url: https://at-network-monitoring.api.acmetelecom.com/v1
    description: Production
  - url: https://at-network-monitoring.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Monitors
    description: Monitoring probes and collectors
  - name: KPIs
    description: Network performance KPIs
paths:
  /monitors:
    get:
      operationId: listMonitor
      summary: List monitor
      description: List operation for monitor resources.
      tags:
        - Monitors
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: monitor identifier
                    example: monitor-a1b2c3d4
    post:
      operationId: createMonitor
      summary: Create monitor
      description: Create operation for monitor resources.
      tags:
        - Monitors
      requestBody:
        required: true
        description: Create monitor request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: monitor data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: monitor identifier
                    example: monitor-a1b2c3d4
  /monitors/{monitor_id}:
    get:
      operationId: getMonitorById
      summary: Get monitor
      description: Get operation for monitor resources.
      tags:
        - Monitors
      parameters:
        - &a1
          name: monitor_id
          in: path
          required: true
          description: monitor id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: monitor identifier
                    example: monitor-a1b2c3d4
    put:
      operationId: updateMonitorById
      summary: Update monitor
      description: Update operation for monitor resources.
      tags:
        - Monitors
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update monitor request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: monitor data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: monitor identifier
                    example: monitor-a1b2c3d4
    delete:
      operationId: deleteMonitorById
      summary: Delete monitor
      description: Delete operation for monitor resources.
      tags:
        - Monitors
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: monitor identifier
                    example: monitor-a1b2c3d4
  /monitors/{monitor_id}/metrics:
    get:
      operationId: listMetricById
      summary: List metric
      description: List operation for metric resources.
      tags:
        - Monitors
      parameters:
        - name: monitor_id
          in: path
          required: true
          description: monitor id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: metric identifier
                    example: metric-a1b2c3d4
  /kpis:
    get:
      operationId: listKpi
      summary: List kpi
      description: List operation for kpi resources.
      tags:
        - Monitors
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: kpi identifier
                    example: kpi-a1b2c3d4
  /kpis/{kpi_id}:
    get:
      operationId: getKpiById
      summary: Get kpi
      description: Get operation for kpi resources.
      tags:
        - Monitors
      parameters:
        - name: kpi_id
          in: path
          required: true
          description: kpi id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: kpi identifier
                    example: kpi-a1b2c3d4
  /probes:
    get:
      operationId: listProbe
      summary: List probe
      description: List operation for probe resources.
      tags:
        - Monitors
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: probe identifier
                    example: probe-a1b2c3d4
    post:
      operationId: createProbe
      summary: Create probe
      description: Create operation for probe resources.
      tags:
        - Monitors
      requestBody:
        required: true
        description: Create probe request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: probe data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: probe identifier
                    example: probe-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
