openapi: 3.0.3
info:
  title: Viewing Analytics API
  description: Content consumption analytics with audience measurement and engagement scoring. Provides concurrent viewer
    tracking, content performance metrics, and churn correlation analysis for programming decisions.
  version: 1.3.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-media-analytics
  x-acme-domain: media
servers:
  - url: https://at-media-analytics.api.acmetelecom.com/v1
    description: Production
  - url: https://at-media-analytics.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Metrics
    description: Viewing metrics and KPIs
  - name: Audiences
    description: Audience measurement
paths:
  /analytics/views:
    get:
      operationId: listViewEvent
      summary: List view event
      description: List operation for view event resources.
      tags:
        - Metrics
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: view_event identifier
                    example: view_event-a1b2c3d4
  /analytics/concurrent:
    get:
      operationId: getConcurrent
      summary: Get concurrent
      description: Get operation for concurrent resources.
      tags:
        - Metrics
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: concurrent identifier
                    example: concurrent-a1b2c3d4
  /analytics/content/{content_id}:
    get:
      operationId: getContentMetricsById
      summary: Get content metrics
      description: Get operation for content metrics resources.
      tags:
        - Metrics
      parameters:
        - name: content_id
          in: path
          required: true
          description: content id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: content_metrics identifier
                    example: content_metrics-a1b2c3d4
  /analytics/audience/demographics:
    get:
      operationId: getDemographics
      summary: Get demographics
      description: Get operation for demographics resources.
      tags:
        - Metrics
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: demographics identifier
                    example: demographics-a1b2c3d4
  /analytics/reports:
    get:
      operationId: listReport
      summary: List report
      description: List operation for report resources.
      tags:
        - Metrics
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: report identifier
                    example: report-a1b2c3d4
    post:
      operationId: createReport
      summary: Create report
      description: Create operation for report resources.
      tags:
        - Metrics
      requestBody:
        required: true
        description: Create report request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: report data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: report identifier
                    example: report-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
