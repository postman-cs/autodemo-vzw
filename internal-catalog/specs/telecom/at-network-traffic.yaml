openapi: 3.0.3
info:
  title: Traffic Engineering API
  description: Traffic analysis, flow optimization, and congestion management across backbone networks. Supports MPLS
    traffic engineering, segment routing policies, and bandwidth reservation with real-time flow rerouting capabilities.
  version: 2.0.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-network-traffic
  x-acme-domain: network
servers:
  - url: https://at-network-traffic.api.acmetelecom.com/v1
    description: Production
  - url: https://at-network-traffic.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Flows
    description: Traffic flow analysis
  - name: Tunnels
    description: TE tunnel management
paths:
  /flows:
    get:
      operationId: listFlow
      summary: List flow
      description: List operation for flow resources.
      tags:
        - Flows
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: flow identifier
                    example: flow-a1b2c3d4
  /flows/{flow_id}:
    get:
      operationId: getFlowById
      summary: Get flow
      description: Get operation for flow resources.
      tags:
        - Flows
      parameters:
        - name: flow_id
          in: path
          required: true
          description: flow id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: flow identifier
                    example: flow-a1b2c3d4
  /tunnels:
    get:
      operationId: listTunnel
      summary: List tunnel
      description: List operation for tunnel resources.
      tags:
        - Flows
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: tunnel identifier
                    example: tunnel-a1b2c3d4
    post:
      operationId: createTunnel
      summary: Create tunnel
      description: Create operation for tunnel resources.
      tags:
        - Flows
      requestBody:
        required: true
        description: Create tunnel request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: tunnel data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: tunnel identifier
                    example: tunnel-a1b2c3d4
  /tunnels/{tunnel_id}:
    get:
      operationId: getTunnelById
      summary: Get tunnel
      description: Get operation for tunnel resources.
      tags:
        - Flows
      parameters:
        - &a1
          name: tunnel_id
          in: path
          required: true
          description: tunnel id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: tunnel identifier
                    example: tunnel-a1b2c3d4
    put:
      operationId: updateTunnelById
      summary: Update tunnel
      description: Update operation for tunnel resources.
      tags:
        - Flows
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update tunnel request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: tunnel data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: tunnel identifier
                    example: tunnel-a1b2c3d4
    delete:
      operationId: deleteTunnelById
      summary: Delete tunnel
      description: Delete operation for tunnel resources.
      tags:
        - Flows
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: tunnel identifier
                    example: tunnel-a1b2c3d4
  /congestion/hotspots:
    get:
      operationId: listHotspot
      summary: List hotspot
      description: List operation for hotspot resources.
      tags:
        - Flows
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: hotspot identifier
                    example: hotspot-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
