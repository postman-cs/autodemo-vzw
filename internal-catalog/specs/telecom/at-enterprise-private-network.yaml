                    example: spectrum-a1b2c3d4
    put:
      operationId: updateSpectrumById
      summary: Update spectrum
      description: Update operation for spectrum resources.
      tags:
        - Networks
      parameters:
        - *a5
      requestBody:
        required: true
        description: Update spectrum request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: spectrum data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: spectrum identifier
                    example: spectrum-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
