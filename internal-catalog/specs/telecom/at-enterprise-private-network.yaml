openapi: 3.0.3
info:
  title: Private Network API
  description: Private 5G and LTE network deployment and management for enterprise campuses and industrial sites. Provides
    spectrum allocation, RAN configuration, and network slicing for dedicated enterprise wireless coverage.
  version: 1.2.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-enterprise-private-network
  x-acme-domain: enterprise
servers:
  - url: https://at-enterprise-private-network.api.acmetelecom.com/v1
    description: Production
  - url: https://at-enterprise-private-network.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Networks
    description: Private network deployment
  - name: Spectrum
    description: Spectrum allocation management
paths:
  /networks:
    get:
      operationId: listNetwork
      summary: List network
      description: List operation for network resources.
      tags:
        - Networks
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: network identifier
                    example: network-a1b2c3d4
    post:
      operationId: createNetwork
      summary: Create network
      description: Create operation for network resources.
      tags:
        - Networks
      requestBody:
        required: true
        description: Create network request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: network data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: network identifier
                    example: network-a1b2c3d4
  /networks/{network_id}:
    get:
      operationId: getNetworkById
      summary: Get network
      description: Get operation for network resources.
      tags:
        - Networks
      parameters:
        - &a1
          name: network_id
          in: path
          required: true
          description: network id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: network identifier
                    example: network-a1b2c3d4
    put:
      operationId: updateNetworkById
      summary: Update network
      description: Update operation for network resources.
      tags:
        - Networks
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update network request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: network data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: network identifier
                    example: network-a1b2c3d4
  /networks/{network_id}/cells:
    get:
      operationId: listCellById
      summary: List cell
      description: List operation for cell resources.
      tags:
        - Networks
      parameters:
        - &a2
          name: network_id
          in: path
          required: true
          description: network id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: cell identifier
                    example: cell-a1b2c3d4
    post:
      operationId: createCellById
      summary: Create cell
      description: Create operation for cell resources.
      tags:
        - Networks
      parameters:
        - *a2
      requestBody:
        required: true
        description: Create cell request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: cell data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: cell identifier
                    example: cell-a1b2c3d4
  /networks/{network_id}/cells/{cell_id}:
    get:
      operationId: getCellById
      summary: Get cell
      description: Get operation for cell resources.
      tags:
        - Networks
      parameters:
        - &a3
          name: network_id
          in: path
          required: true
          description: network id
          schema:
            type: string
        - &a4
          name: cell_id
          in: path
          required: true
          description: cell id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: cell identifier
                    example: cell-a1b2c3d4
    put:
      operationId: updateCellById
      summary: Update cell
      description: Update operation for cell resources.
      tags:
        - Networks
      parameters:
        - *a3
        - *a4
      requestBody:
        required: true
        description: Update cell request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: cell data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: cell identifier
                    example: cell-a1b2c3d4
  /networks/{network_id}/spectrum:
    get:
      operationId: getSpectrumById
      summary: Get spectrum
      description: Get operation for spectrum resources.
      tags:
        - Networks
      parameters:
        - &a5
          name: network_id
          in: path
          required: true
          description: network id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
