openapi: 3.0.3
info:
  title: Campaign Management API
  description: Multi-channel marketing campaign orchestration with audience segmentation and scheduling. Provides
    conversion tracking, campaign performance analytics, and automated drip sequence management across SMS, email, and
    push channels.
  version: 2.1.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-messaging-campaigns
  x-acme-domain: messaging
servers:
  - url: https://at-messaging-campaigns.api.acmetelecom.com/v1
    description: Production
  - url: https://at-messaging-campaigns.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Campaigns
    description: Campaign creation and scheduling
  - name: Segments
    description: Audience segmentation
paths:
  /campaigns:
    get:
      operationId: listCampaign
      summary: List campaign
      description: List operation for campaign resources.
      tags:
        - Campaigns
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: campaign identifier
                    example: campaign-a1b2c3d4
    post:
      operationId: createCampaign
      summary: Create campaign
      description: Create operation for campaign resources.
      tags:
        - Campaigns
      requestBody:
        required: true
        description: Create campaign request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: campaign data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: campaign identifier
                    example: campaign-a1b2c3d4
  /campaigns/{campaign_id}:
    get:
      operationId: getCampaignById
      summary: Get campaign
      description: Get operation for campaign resources.
      tags:
        - Campaigns
      parameters:
        - &a1
          name: campaign_id
          in: path
          required: true
          description: campaign id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: campaign identifier
                    example: campaign-a1b2c3d4
    put:
      operationId: updateCampaignById
      summary: Update campaign
      description: Update operation for campaign resources.
      tags:
        - Campaigns
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update campaign request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: campaign data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: campaign identifier
                    example: campaign-a1b2c3d4
    delete:
      operationId: deleteCampaignById
      summary: Delete campaign
      description: Delete operation for campaign resources.
      tags:
        - Campaigns
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: campaign identifier
                    example: campaign-a1b2c3d4
  /campaigns/{campaign_id}/launch:
    post:
      operationId: actionCampaignById
      summary: Action campaign
      description: Action operation for campaign resources.
      tags:
        - Campaigns
      parameters:
        - name: campaign_id
          in: path
          required: true
          description: campaign id
          schema:
            type: string
      requestBody:
        required: true
        description: Action campaign request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: campaign data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: campaign identifier
                    example: campaign-a1b2c3d4
  /campaigns/{campaign_id}/metrics:
    get:
      operationId: getMetricsById
      summary: Get metrics
      description: Get operation for metrics resources.
      tags:
        - Campaigns
      parameters:
        - name: campaign_id
          in: path
          required: true
          description: campaign id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: metrics identifier
                    example: metrics-a1b2c3d4
  /segments:
    get:
      operationId: listSegment
      summary: List segment
      description: List operation for segment resources.
      tags:
        - Campaigns
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: segment identifier
                    example: segment-a1b2c3d4
    post:
      operationId: createSegment
      summary: Create segment
      description: Create operation for segment resources.
      tags:
        - Campaigns
      requestBody:
        required: true
        description: Create segment request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: segment data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: segment identifier
                    example: segment-a1b2c3d4
  /segments/{segment_id}:
    get:
      operationId: getSegmentById
      summary: Get segment
      description: Get operation for segment resources.
      tags:
        - Campaigns
      parameters:
        - &a2
          name: segment_id
          in: path
          required: true
          description: segment id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: segment identifier
                    example: segment-a1b2c3d4
    put:
      operationId: updateSegmentById
      summary: Update segment
      description: Update operation for segment resources.
      tags:
        - Campaigns
      parameters:
        - *a2
      requestBody:
        required: true
        description: Update segment request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: segment data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: segment identifier
                    example: segment-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
