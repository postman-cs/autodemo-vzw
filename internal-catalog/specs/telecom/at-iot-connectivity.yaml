openapi: 3.0.3
info:
  title: IoT Connectivity API
  description: Cellular connectivity profile management for IoT devices with APN configuration and data throttling.
    Provides connectivity diagnostics, session monitoring, and automated SIM state management across global networks.
  version: 1.8.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-iot-connectivity
  x-acme-domain: iot
servers:
  - url: https://at-iot-connectivity.api.acmetelecom.com/v1
    description: Production
  - url: https://at-iot-connectivity.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Profiles
    description: Connectivity profile management
  - name: Diagnostics
    description: Connectivity troubleshooting
paths:
  /connectivity/profiles:
    get:
      operationId: listProfile
      summary: List profile
      description: List operation for profile resources.
      tags:
        - Profiles
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: profile identifier
                    example: profile-a1b2c3d4
    post:
      operationId: createProfile
      summary: Create profile
      description: Create operation for profile resources.
      tags:
        - Profiles
      requestBody:
        required: true
        description: Create profile request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: profile data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: profile identifier
                    example: profile-a1b2c3d4
  /connectivity/profiles/{profile_id}:
    get:
      operationId: getProfileById
      summary: Get profile
      description: Get operation for profile resources.
      tags:
        - Profiles
      parameters:
        - &a1
          name: profile_id
          in: path
          required: true
          description: profile id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: profile identifier
                    example: profile-a1b2c3d4
    put:
      operationId: updateProfileById
      summary: Update profile
      description: Update operation for profile resources.
      tags:
        - Profiles
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update profile request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: profile data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: profile identifier
                    example: profile-a1b2c3d4
  /devices/{device_id}/connectivity:
    get:
      operationId: getStatusById
      summary: Get status
      description: Get operation for status resources.
      tags:
        - Profiles
      parameters:
        - name: device_id
          in: path
          required: true
          description: device id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: status identifier
                    example: status-a1b2c3d4
  /devices/{device_id}/connectivity/diagnose:
    post:
      operationId: createDiagnosisById
      summary: Create diagnosis
      description: Create operation for diagnosis resources.
      tags:
        - Profiles
      parameters:
        - name: device_id
          in: path
          required: true
          description: device id
          schema:
            type: string
      requestBody:
        required: true
        description: Create diagnosis request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: diagnosis data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: diagnosis identifier
                    example: diagnosis-a1b2c3d4
  /devices/{device_id}/sessions:
    get:
      operationId: listSessionById
      summary: List session
      description: List operation for session resources.
      tags:
        - Profiles
      parameters:
        - name: device_id
          in: path
          required: true
          description: device id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: session identifier
                    example: session-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
