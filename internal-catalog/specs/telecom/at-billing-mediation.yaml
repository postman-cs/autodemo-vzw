openapi: 3.0.3
info:
  title: CDR Mediation API
  description: Call detail record collection, normalization, and enrichment from network elements. Provides duplicate
    detection, format conversion, error record management, and mediation pipeline monitoring dashboards.
  version: 1.6.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-billing-mediation
  x-acme-domain: billing
servers:
  - url: https://at-billing-mediation.api.acmetelecom.com/v1
    description: Production
  - url: https://at-billing-mediation.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: CDRs
    description: Call detail record processing
  - name: Pipelines
    description: Mediation pipeline management
paths:
  /cdrs:
    get:
      operationId: listCdr
      summary: List cdr
      description: List operation for cdr resources.
      tags:
        - CDRs
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: cdr identifier
                    example: cdr-a1b2c3d4
  /cdrs/{cdr_id}:
    get:
      operationId: getCdrById
      summary: Get cdr
      description: Get operation for cdr resources.
      tags:
        - CDRs
      parameters:
        - name: cdr_id
          in: path
          required: true
          description: cdr id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: cdr identifier
                    example: cdr-a1b2c3d4
  /cdrs/upload:
    post:
      operationId: createBatch
      summary: Create batch
      description: Create operation for batch resources.
      tags:
        - CDRs
      requestBody:
        required: true
        description: Create batch request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: batch data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: batch identifier
                    example: batch-a1b2c3d4
  /pipelines:
    get:
      operationId: listPipeline
      summary: List pipeline
      description: List operation for pipeline resources.
      tags:
        - CDRs
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: pipeline identifier
                    example: pipeline-a1b2c3d4
  /pipelines/{pipeline_id}:
    get:
      operationId: getPipelineById
      summary: Get pipeline
      description: Get operation for pipeline resources.
      tags:
        - CDRs
      parameters:
        - name: pipeline_id
          in: path
          required: true
          description: pipeline id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: pipeline identifier
                    example: pipeline-a1b2c3d4
  /pipelines/{pipeline_id}/errors:
    get:
      operationId: listErrorById
      summary: List error
      description: List operation for error resources.
      tags:
        - CDRs
      parameters:
        - name: pipeline_id
          in: path
          required: true
          description: pipeline id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: error identifier
                    example: error-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
