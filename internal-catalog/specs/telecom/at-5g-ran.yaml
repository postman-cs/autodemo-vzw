openapi: 3.0.3
info:
  title: RAN Management API
  description: Radio access network monitoring, cell configuration, and handover optimization for 5G deployments. Provides
    Open RAN (O-RAN) interface management, RAN sharing configuration, and cell-level performance analytics.
  version: 1.6.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-5g-ran
  x-acme-domain: 5g
servers:
  - url: https://at-5g-ran.api.acmetelecom.com/v1
    description: Production
  - url: https://at-5g-ran.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Cells
    description: Cell site management
  - name: Performance
    description: RAN performance monitoring
paths:
  /cells:
    get:
      operationId: listCell
      summary: List cell
      description: List operation for cell resources.
      tags:
        - Cells
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: cell identifier
                    example: cell-a1b2c3d4
  /cells/{cell_id}:
    get:
      operationId: getCellById
      summary: Get cell
      description: Get operation for cell resources.
      tags:
        - Cells
      parameters:
        - &a1
          name: cell_id
          in: path
          required: true
          description: cell id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: cell identifier
                    example: cell-a1b2c3d4
    put:
      operationId: updateCellById
      summary: Update cell
      description: Update operation for cell resources.
      tags:
        - Cells
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update cell request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: cell data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: cell identifier
                    example: cell-a1b2c3d4
  /cells/{cell_id}/config:
    get:
      operationId: getConfigById
      summary: Get config
      description: Get operation for config resources.
      tags:
        - Cells
      parameters:
        - &a2
          name: cell_id
          in: path
          required: true
          description: cell id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: config identifier
                    example: config-a1b2c3d4
    put:
      operationId: updateConfigById
      summary: Update config
      description: Update operation for config resources.
      tags:
        - Cells
      parameters:
        - *a2
      requestBody:
        required: true
        description: Update config request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: config data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: config identifier
                    example: config-a1b2c3d4
  /cells/{cell_id}/performance:
    get:
      operationId: getPerformanceById
      summary: Get performance
      description: Get operation for performance resources.
      tags:
        - Cells
      parameters:
        - name: cell_id
          in: path
          required: true
          description: cell id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: performance identifier
                    example: performance-a1b2c3d4
  /cells/{cell_id}/neighbors:
    get:
      operationId: listNeighborById
      summary: List neighbor
      description: List operation for neighbor resources.
      tags:
        - Cells
      parameters:
        - name: cell_id
          in: path
          required: true
          description: cell id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: neighbor identifier
                    example: neighbor-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
