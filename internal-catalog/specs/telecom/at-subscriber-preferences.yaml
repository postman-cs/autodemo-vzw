openapi: 3.0.3
info:
  title: Subscriber Preferences API
  description: Communication channel preferences, marketing opt-in/out, and privacy settings management. Provides
    do-not-disturb schedule configuration, language preferences, and consent tracking for regulatory compliance.
  version: 1.3.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-subscriber-preferences
  x-acme-domain: subscriber
servers:
  - url: https://at-subscriber-preferences.api.acmetelecom.com/v1
    description: Production
  - url: https://at-subscriber-preferences.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Preferences
    description: Subscriber preference management
paths:
  /subscribers/{subscriber_id}/preferences:
    get:
      operationId: getPreferencesById
      summary: Get preferences
      description: Get operation for preferences resources.
      tags:
        - Preferences
      parameters:
        - &a1
          name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: preferences identifier
                    example: preferences-a1b2c3d4
    put:
      operationId: updatePreferencesById
      summary: Update preferences
      description: Update operation for preferences resources.
      tags:
        - Preferences
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update preferences request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: preferences data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: preferences identifier
                    example: preferences-a1b2c3d4
  /subscribers/{subscriber_id}/consents:
    get:
      operationId: listConsentById
      summary: List consent
      description: List operation for consent resources.
      tags:
        - Preferences
      parameters:
        - &a2
          name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: consent identifier
                    example: consent-a1b2c3d4
    post:
      operationId: createConsentById
      summary: Create consent
      description: Create operation for consent resources.
      tags:
        - Preferences
      parameters:
        - *a2
      requestBody:
        required: true
        description: Create consent request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: consent data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: consent identifier
                    example: consent-a1b2c3d4
  /subscribers/{subscriber_id}/consents/{consent_id}:
    get:
      operationId: getConsentById
      summary: Get consent
      description: Get operation for consent resources.
      tags:
        - Preferences
      parameters:
        - &a3
          name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
        - &a4
          name: consent_id
          in: path
          required: true
          description: consent id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: consent identifier
                    example: consent-a1b2c3d4
    put:
      operationId: updateConsentById
      summary: Update consent
      description: Update operation for consent resources.
      tags:
        - Preferences
      parameters:
        - *a3
        - *a4
      requestBody:
        required: true
        description: Update consent request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: consent data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: consent identifier
                    example: consent-a1b2c3d4
  /subscribers/{subscriber_id}/dnd:
    get:
      operationId: getDndScheduleById
      summary: Get dnd schedule
      description: Get operation for dnd schedule resources.
      tags:
        - Preferences
      parameters:
        - &a5
          name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: dnd_schedule identifier
                    example: dnd_schedule-a1b2c3d4
    put:
      operationId: updateDndScheduleById
      summary: Update dnd schedule
      description: Update operation for dnd schedule resources.
      tags:
        - Preferences
      parameters:
        - *a5
      requestBody:
        required: true
        description: Update dnd_schedule request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: dnd_schedule data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: dnd_schedule identifier
                    example: dnd_schedule-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
