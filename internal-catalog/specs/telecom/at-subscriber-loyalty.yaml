openapi: 3.0.3
info:
  title: Loyalty Program API
  description: Points accrual, tier management, partner rewards, and redemption catalog for subscriber retention.
    Integrates churn prediction signals to trigger proactive retention offers and personalized loyalty incentives.
  version: 1.4.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-subscriber-loyalty
  x-acme-domain: subscriber
servers:
  - url: https://at-subscriber-loyalty.api.acmetelecom.com/v1
    description: Production
  - url: https://at-subscriber-loyalty.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Points
    description: Loyalty points management
  - name: Rewards
    description: Reward catalog and redemption
paths:
  /loyalty/{subscriber_id}/balance:
    get:
      operationId: getBalanceById
      summary: Get balance
      description: Get operation for balance resources.
      tags:
        - Points
      parameters:
        - name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: balance identifier
                    example: balance-a1b2c3d4
  /loyalty/{subscriber_id}/transactions:
    get:
      operationId: listTransactionById
      summary: List transaction
      description: List operation for transaction resources.
      tags:
        - Points
      parameters:
        - name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: transaction identifier
                    example: transaction-a1b2c3d4
  /loyalty/{subscriber_id}/tier:
    get:
      operationId: getTierById
      summary: Get tier
      description: Get operation for tier resources.
      tags:
        - Points
      parameters:
        - name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: tier identifier
                    example: tier-a1b2c3d4
  /rewards:
    get:
      operationId: listReward
      summary: List reward
      description: List operation for reward resources.
      tags:
        - Points
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: reward identifier
                    example: reward-a1b2c3d4
  /rewards/{reward_id}:
    get:
      operationId: getRewardById
      summary: Get reward
      description: Get operation for reward resources.
      tags:
        - Points
      parameters:
        - name: reward_id
          in: path
          required: true
          description: reward id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: reward identifier
                    example: reward-a1b2c3d4
  /rewards/{reward_id}/redeem:
    post:
      operationId: actionRewardById
      summary: Action reward
      description: Action operation for reward resources.
      tags:
        - Points
      parameters:
        - name: reward_id
          in: path
          required: true
          description: reward id
          schema:
            type: string
      requestBody:
        required: true
        description: Action reward request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: reward data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: reward identifier
                    example: reward-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
