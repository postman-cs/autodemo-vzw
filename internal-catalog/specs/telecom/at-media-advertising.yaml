openapi: 3.0.3
info:
  title: Ad Insertion API
  description: Server-side and client-side ad insertion for streaming content with programmatic ad decisioning. Provides
    ad pod management, impression tracking, frequency capping, and VAST/VMAP compliance for monetization.
  version: 1.8.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-media-advertising
  x-acme-domain: media
servers:
  - url: https://at-media-advertising.api.acmetelecom.com/v1
    description: Production
  - url: https://at-media-advertising.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Ad Pods
    description: Ad pod scheduling
  - name: Impressions
    description: Ad impression tracking
paths:
  /ad-breaks:
    get:
      operationId: listAdBreak
      summary: List ad break
      description: List operation for ad break resources.
      tags:
        - Ad Pods
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ad_break identifier
                    example: ad_break-a1b2c3d4
    post:
      operationId: createAdBreak
      summary: Create ad break
      description: Create operation for ad break resources.
      tags:
        - Ad Pods
      requestBody:
        required: true
        description: Create ad_break request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: ad_break data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ad_break identifier
                    example: ad_break-a1b2c3d4
  /ad-breaks/{break_id}:
    get:
      operationId: getAdBreakById
      summary: Get ad break
      description: Get operation for ad break resources.
      tags:
        - Ad Pods
      parameters:
        - &a1
          name: break_id
          in: path
          required: true
          description: break id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ad_break identifier
                    example: ad_break-a1b2c3d4
    put:
      operationId: updateAdBreakById
      summary: Update ad break
      description: Update operation for ad break resources.
      tags:
        - Ad Pods
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update ad_break request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: ad_break data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ad_break identifier
                    example: ad_break-a1b2c3d4
  /ad-breaks/{break_id}/decisions:
    post:
      operationId: createDecisionById
      summary: Create decision
      description: Create operation for decision resources.
      tags:
        - Ad Pods
      parameters:
        - name: break_id
          in: path
          required: true
          description: break id
          schema:
            type: string
      requestBody:
        required: true
        description: Create decision request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: decision data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: decision identifier
                    example: decision-a1b2c3d4
  /impressions:
    get:
      operationId: listImpression
      summary: List impression
      description: List operation for impression resources.
      tags:
        - Ad Pods
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: impression identifier
                    example: impression-a1b2c3d4
  /campaigns/{campaign_id}/creatives:
    get:
      operationId: listCreativeById
      summary: List creative
      description: List operation for creative resources.
      tags:
        - Ad Pods
      parameters:
        - &a2
          name: campaign_id
          in: path
          required: true
          description: campaign id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: creative identifier
                    example: creative-a1b2c3d4
    post:
      operationId: createCreativeById
      summary: Create creative
      description: Create operation for creative resources.
      tags:
        - Ad Pods
      parameters:
        - *a2
      requestBody:
        required: true
        description: Create creative request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: creative data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: creative identifier
                    example: creative-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
