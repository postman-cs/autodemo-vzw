openapi: 3.0.3
info:
  title: Subscriber Management API
  description: Full subscriber lifecycle management from acquisition through churn, including account hierarchies and
    multi-line management. Supports individual, family, and enterprise account structures with flexible plan
    assignments.
  version: 3.0.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-subscriber-management
  x-acme-domain: subscriber
servers:
  - url: https://at-subscriber-management.api.acmetelecom.com/v1
    description: Production
  - url: https://at-subscriber-management.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Subscribers
    description: Subscriber account management
  - name: Lines
    description: Multi-line management
paths:
  /subscribers:
    get:
      operationId: listSubscriber
      summary: List subscriber
      description: List operation for subscriber resources.
      tags:
        - Subscribers
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: subscriber identifier
                    example: subscriber-a1b2c3d4
    post:
      operationId: createSubscriber
      summary: Create subscriber
      description: Create operation for subscriber resources.
      tags:
        - Subscribers
      requestBody:
        required: true
        description: Create subscriber request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: subscriber data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: subscriber identifier
                    example: subscriber-a1b2c3d4
  /subscribers/{subscriber_id}:
    get:
      operationId: getSubscriberById
      summary: Get subscriber
      description: Get operation for subscriber resources.
      tags:
        - Subscribers
      parameters:
        - &a1
          name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: subscriber identifier
                    example: subscriber-a1b2c3d4
    put:
      operationId: updateSubscriberById
      summary: Update subscriber
      description: Update operation for subscriber resources.
      tags:
        - Subscribers
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update subscriber request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: subscriber data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: subscriber identifier
                    example: subscriber-a1b2c3d4
    delete:
      operationId: deleteSubscriberById
      summary: Delete subscriber
      description: Delete operation for subscriber resources.
      tags:
        - Subscribers
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: subscriber identifier
                    example: subscriber-a1b2c3d4
  /subscribers/{subscriber_id}/lines:
    get:
      operationId: listLineById
      summary: List line
      description: List operation for line resources.
      tags:
        - Subscribers
      parameters:
        - &a2
          name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: line identifier
                    example: line-a1b2c3d4
    post:
      operationId: createLineById
      summary: Create line
      description: Create operation for line resources.
      tags:
        - Subscribers
      parameters:
        - *a2
      requestBody:
        required: true
        description: Create line request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: line data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: line identifier
                    example: line-a1b2c3d4
  /subscribers/{subscriber_id}/lines/{line_id}:
    get:
      operationId: getLineById
      summary: Get line
      description: Get operation for line resources.
      tags:
        - Subscribers
      parameters:
        - &a3
          name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
        - &a4
          name: line_id
          in: path
          required: true
          description: line id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: line identifier
                    example: line-a1b2c3d4
    put:
      operationId: updateLineById
      summary: Update line
      description: Update operation for line resources.
      tags:
        - Subscribers
      parameters:
        - *a3
        - *a4
      requestBody:
        required: true
        description: Update line request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: line data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: line identifier
                    example: line-a1b2c3d4
  /subscribers/search:
    post:
      operationId: searchSubscriber
      summary: Search subscriber
      description: Search operation for subscriber resources.
      tags:
        - Subscribers
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      requestBody:
        required: true
        description: Search subscriber request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: subscriber data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: subscriber identifier
                    example: subscriber-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
