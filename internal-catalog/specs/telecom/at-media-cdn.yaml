openapi: 3.0.3
info:
  title: CDN Management API
  description: Content delivery network provisioning, cache purging, and edge configuration management. Provides origin
    shielding, real-time cache analytics, and geographic distribution control for optimal content delivery performance.
  version: 1.7.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-media-cdn
  x-acme-domain: media
servers:
  - url: https://at-media-cdn.api.acmetelecom.com/v1
    description: Production
  - url: https://at-media-cdn.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Distributions
    description: CDN distribution management
  - name: Cache
    description: Cache management operations
paths:
  /distributions:
    get:
      operationId: listDistribution
      summary: List distribution
      description: List operation for distribution resources.
      tags:
        - Distributions
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: distribution identifier
                    example: distribution-a1b2c3d4
    post:
      operationId: createDistribution
      summary: Create distribution
      description: Create operation for distribution resources.
      tags:
        - Distributions
      requestBody:
        required: true
        description: Create distribution request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: distribution data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: distribution identifier
                    example: distribution-a1b2c3d4
  /distributions/{distribution_id}:
    get:
      operationId: getDistributionById
      summary: Get distribution
      description: Get operation for distribution resources.
      tags:
        - Distributions
      parameters:
        - &a1
          name: distribution_id
          in: path
          required: true
          description: distribution id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: distribution identifier
                    example: distribution-a1b2c3d4
    put:
      operationId: updateDistributionById
      summary: Update distribution
      description: Update operation for distribution resources.
      tags:
        - Distributions
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update distribution request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: distribution data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: distribution identifier
                    example: distribution-a1b2c3d4
    delete:
      operationId: deleteDistributionById
      summary: Delete distribution
      description: Delete operation for distribution resources.
      tags:
        - Distributions
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: distribution identifier
                    example: distribution-a1b2c3d4
  /distributions/{distribution_id}/purge:
    post:
      operationId: actionDistributionById
      summary: Action distribution
      description: Action operation for distribution resources.
      tags:
        - Distributions
      parameters:
        - name: distribution_id
          in: path
          required: true
          description: distribution id
          schema:
            type: string
      requestBody:
        required: true
        description: Action distribution request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: distribution data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: distribution identifier
                    example: distribution-a1b2c3d4
  /distributions/{distribution_id}/analytics:
    get:
      operationId: getAnalyticsById
      summary: Get analytics
      description: Get operation for analytics resources.
      tags:
        - Distributions
      parameters:
        - name: distribution_id
          in: path
          required: true
          description: distribution id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: analytics identifier
                    example: analytics-a1b2c3d4
  /origins:
    get:
      operationId: listOrigin
      summary: List origin
      description: List operation for origin resources.
      tags:
        - Distributions
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: origin identifier
                    example: origin-a1b2c3d4
    post:
      operationId: createOrigin
      summary: Create origin
      description: Create operation for origin resources.
      tags:
        - Distributions
      requestBody:
        required: true
        description: Create origin request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: origin data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: origin identifier
                    example: origin-a1b2c3d4
  /origins/{origin_id}:
    get:
      operationId: getOriginById
      summary: Get origin
      description: Get operation for origin resources.
      tags:
        - Distributions
      parameters:
        - &a2
          name: origin_id
          in: path
          required: true
          description: origin id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: origin identifier
                    example: origin-a1b2c3d4
    put:
      operationId: updateOriginById
      summary: Update origin
      description: Update operation for origin resources.
      tags:
        - Distributions
      parameters:
        - *a2
      requestBody:
        required: true
        description: Update origin request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: origin data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: origin identifier
                    example: origin-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
