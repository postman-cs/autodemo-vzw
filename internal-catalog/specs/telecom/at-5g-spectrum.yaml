openapi: 3.0.3
info:
  title: Spectrum Management API
  description: Radio spectrum allocation, interference management, and dynamic spectrum sharing across frequency bands.
    Supports CBRS coordination, shared spectrum access, and spectrum utilization analytics for regulatory reporting.
  version: 1.4.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-5g-spectrum
  x-acme-domain: 5g
servers:
  - url: https://at-5g-spectrum.api.acmetelecom.com/v1
    description: Production
  - url: https://at-5g-spectrum.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Allocations
    description: Spectrum allocation management
  - name: Interference
    description: Interference detection and management
paths:
  /allocations:
    get:
      operationId: listAllocation
      summary: List allocation
      description: List operation for allocation resources.
      tags:
        - Allocations
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: allocation identifier
                    example: allocation-a1b2c3d4
    post:
      operationId: createAllocation
      summary: Create allocation
      description: Create operation for allocation resources.
      tags:
        - Allocations
      requestBody:
        required: true
        description: Create allocation request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: allocation data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: allocation identifier
                    example: allocation-a1b2c3d4
  /allocations/{allocation_id}:
    get:
      operationId: getAllocationById
      summary: Get allocation
      description: Get operation for allocation resources.
      tags:
        - Allocations
      parameters:
        - &a1
          name: allocation_id
          in: path
          required: true
          description: allocation id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: allocation identifier
                    example: allocation-a1b2c3d4
    put:
      operationId: updateAllocationById
      summary: Update allocation
      description: Update operation for allocation resources.
      tags:
        - Allocations
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update allocation request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: allocation data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: allocation identifier
                    example: allocation-a1b2c3d4
  /interference/reports:
    get:
      operationId: listReport
      summary: List report
      description: List operation for report resources.
      tags:
        - Allocations
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: report identifier
                    example: report-a1b2c3d4
  /interference/reports/{report_id}:
    get:
      operationId: getReportById
      summary: Get report
      description: Get operation for report resources.
      tags:
        - Allocations
      parameters:
        - name: report_id
          in: path
          required: true
          description: report id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: report identifier
                    example: report-a1b2c3d4
  /utilization:
    get:
      operationId: listUtilization
      summary: List utilization
      description: List operation for utilization resources.
      tags:
        - Allocations
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: utilization identifier
                    example: utilization-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
