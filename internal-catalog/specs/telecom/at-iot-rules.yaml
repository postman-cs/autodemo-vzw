openapi: 3.0.3
info:
  title: IoT Rules Engine API
  description: Event-driven rules for IoT data streams with condition evaluation and action triggers. Supports geofence
    rules, threshold alerts, device command dispatch, and complex event processing with temporal pattern matching.
  version: 1.3.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-iot-rules
  x-acme-domain: iot
servers:
  - url: https://at-iot-rules.api.acmetelecom.com/v1
    description: Production
  - url: https://at-iot-rules.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Rules
    description: Rule definition and management
  - name: Actions
    description: Triggered action configuration
paths:
  /rules:
    get:
      operationId: listRule
      summary: List rule
      description: List operation for rule resources.
      tags:
        - Rules
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rule identifier
                    example: rule-a1b2c3d4
    post:
      operationId: createRule
      summary: Create rule
      description: Create operation for rule resources.
      tags:
        - Rules
      requestBody:
        required: true
        description: Create rule request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: rule data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rule identifier
                    example: rule-a1b2c3d4
  /rules/{rule_id}:
    get:
      operationId: getRuleById
      summary: Get rule
      description: Get operation for rule resources.
      tags:
        - Rules
      parameters:
        - &a1
          name: rule_id
          in: path
          required: true
          description: rule id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rule identifier
                    example: rule-a1b2c3d4
    put:
      operationId: updateRuleById
      summary: Update rule
      description: Update operation for rule resources.
      tags:
        - Rules
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update rule request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: rule data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rule identifier
                    example: rule-a1b2c3d4
    delete:
      operationId: deleteRuleById
      summary: Delete rule
      description: Delete operation for rule resources.
      tags:
        - Rules
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rule identifier
                    example: rule-a1b2c3d4
  /rules/{rule_id}/enable:
    post:
      operationId: actionRuleById
      summary: Action rule
      description: Action operation for rule resources.
      tags:
        - Rules
      parameters:
        - name: rule_id
          in: path
          required: true
          description: rule id
          schema:
            type: string
      requestBody:
        required: true
        description: Action rule request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: rule data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rule identifier
                    example: rule-a1b2c3d4
  /rules/{rule_id}/disable:
    post:
      operationId: actionRuleById
      summary: Action rule
      description: Action operation for rule resources.
      tags:
        - Rules
      parameters:
        - name: rule_id
          in: path
          required: true
          description: rule id
          schema:
            type: string
      requestBody:
        required: true
        description: Action rule request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: rule data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rule identifier
                    example: rule-a1b2c3d4
  /rules/{rule_id}/triggers:
    get:
      operationId: listTriggerById
      summary: List trigger
      description: List operation for trigger resources.
      tags:
        - Rules
      parameters:
        - name: rule_id
          in: path
          required: true
          description: rule id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: trigger identifier
                    example: trigger-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
