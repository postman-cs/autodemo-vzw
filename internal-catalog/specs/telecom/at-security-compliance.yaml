openapi: 3.0.3
info:
  title: Regulatory Compliance API
  description: GDPR, CPNI, and lawful intercept compliance management for telecom operations. Provides data retention
    policy enforcement, regulatory audit report generation, and compliance status dashboards with remediation tracking.
  version: 1.5.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-security-compliance
  x-acme-domain: security
servers:
  - url: https://at-security-compliance.api.acmetelecom.com/v1
    description: Production
  - url: https://at-security-compliance.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Compliance
    description: Compliance status and tracking
  - name: Audits
    description: Audit report management
paths:
  /compliance/status:
    get:
      operationId: getStatus
      summary: Get status
      description: Get operation for status resources.
      tags:
        - Compliance
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: status identifier
                    example: status-a1b2c3d4
  /compliance/policies:
    get:
      operationId: listPolicy
      summary: List policy
      description: List operation for policy resources.
      tags:
        - Compliance
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: policy identifier
                    example: policy-a1b2c3d4
    post:
      operationId: createPolicy
      summary: Create policy
      description: Create operation for policy resources.
      tags:
        - Compliance
      requestBody:
        required: true
        description: Create policy request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: policy data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: policy identifier
                    example: policy-a1b2c3d4
  /compliance/policies/{policy_id}:
    get:
      operationId: getPolicyById
      summary: Get policy
      description: Get operation for policy resources.
      tags:
        - Compliance
      parameters:
        - &a1
          name: policy_id
          in: path
          required: true
          description: policy id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: policy identifier
                    example: policy-a1b2c3d4
    put:
      operationId: updatePolicyById
      summary: Update policy
      description: Update operation for policy resources.
      tags:
        - Compliance
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update policy request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: policy data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: policy identifier
                    example: policy-a1b2c3d4
  /audits:
    get:
      operationId: listAudit
      summary: List audit
      description: List operation for audit resources.
      tags:
        - Compliance
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: audit identifier
                    example: audit-a1b2c3d4
    post:
      operationId: createAudit
      summary: Create audit
      description: Create operation for audit resources.
      tags:
        - Compliance
      requestBody:
        required: true
        description: Create audit request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: audit data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: audit identifier
                    example: audit-a1b2c3d4
  /audits/{audit_id}:
    get:
      operationId: getAuditById
      summary: Get audit
      description: Get operation for audit resources.
      tags:
        - Compliance
      parameters:
        - name: audit_id
          in: path
          required: true
          description: audit id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: audit identifier
                    example: audit-a1b2c3d4
  /audits/{audit_id}/findings:
    get:
      operationId: listFindingById
      summary: List finding
      description: List operation for finding resources.
      tags:
        - Compliance
      parameters:
        - name: audit_id
          in: path
          required: true
          description: audit id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: finding identifier
                    example: finding-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
