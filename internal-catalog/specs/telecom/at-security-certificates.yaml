openapi: 3.0.3
info:
  title: Certificate Management API
  description: TLS/SSL certificate lifecycle management including issuance, renewal, and revocation for network endpoints.
    Provides certificate transparency logging, expiry alerting, and automated renewal workflows with ACME protocol
    support.
  version: 1.4.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-security-certificates
  x-acme-domain: security
servers:
  - url: https://at-security-certificates.api.acmetelecom.com/v1
    description: Production
  - url: https://at-security-certificates.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Certificates
    description: Certificate lifecycle management
paths:
  /certificates:
    get:
      operationId: listCertificate
      summary: List certificate
      description: List operation for certificate resources.
      tags:
        - Certificates
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: certificate identifier
                    example: certificate-a1b2c3d4
    post:
      operationId: createCertificate
      summary: Create certificate
      description: Create operation for certificate resources.
      tags:
        - Certificates
      requestBody:
        required: true
        description: Create certificate request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: certificate data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: certificate identifier
                    example: certificate-a1b2c3d4
  /certificates/{cert_id}:
    get:
      operationId: getCertificateById
      summary: Get certificate
      description: Get operation for certificate resources.
      tags:
        - Certificates
      parameters:
        - name: cert_id
          in: path
          required: true
          description: cert id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: certificate identifier
                    example: certificate-a1b2c3d4
  /certificates/{cert_id}/renew:
    post:
      operationId: actionCertificateById
      summary: Action certificate
      description: Action operation for certificate resources.
      tags:
        - Certificates
      parameters:
        - name: cert_id
          in: path
          required: true
          description: cert id
          schema:
            type: string
      requestBody:
        required: true
        description: Action certificate request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: certificate data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: certificate identifier
                    example: certificate-a1b2c3d4
  /certificates/{cert_id}/revoke:
    post:
      operationId: actionCertificateById
      summary: Action certificate
      description: Action operation for certificate resources.
      tags:
        - Certificates
      parameters:
        - name: cert_id
          in: path
          required: true
          description: cert id
          schema:
            type: string
      requestBody:
        required: true
        description: Action certificate request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: certificate data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: certificate identifier
                    example: certificate-a1b2c3d4
  /certificates/expiring:
    get:
      operationId: listCertificate
      summary: List certificate
      description: List operation for certificate resources.
      tags:
        - Certificates
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: certificate identifier
                    example: certificate-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
