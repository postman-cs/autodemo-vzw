openapi: 3.0.3
info:
  title: 5G Positioning API
  description: High-accuracy device positioning using 5G NR signals for indoor and outdoor location services. Provides
    sub-meter accuracy for industrial IoT, geofencing triggers, and location history with privacy-preserving
    anonymization.
  version: 1.1.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-5g-positioning
  x-acme-domain: 5g
servers:
  - url: https://at-5g-positioning.api.acmetelecom.com/v1
    description: Production
  - url: https://at-5g-positioning.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Positioning
    description: Device location services
  - name: Geofences
    description: Location-based geofencing
paths:
  /positions/{device_id}:
    get:
      operationId: getPositionById
      summary: Get position
      description: Get operation for position resources.
      tags:
        - Positioning
      parameters:
        - name: device_id
          in: path
          required: true
          description: device id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: position identifier
                    example: position-a1b2c3d4
  /positions/{device_id}/history:
    get:
      operationId: listPositionById
      summary: List position
      description: List operation for position resources.
      tags:
        - Positioning
      parameters:
        - name: device_id
          in: path
          required: true
          description: device id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: position identifier
                    example: position-a1b2c3d4
  /geofences:
    get:
      operationId: listGeofence
      summary: List geofence
      description: List operation for geofence resources.
      tags:
        - Positioning
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: geofence identifier
                    example: geofence-a1b2c3d4
    post:
      operationId: createGeofence
      summary: Create geofence
      description: Create operation for geofence resources.
      tags:
        - Positioning
      requestBody:
        required: true
        description: Create geofence request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: geofence data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: geofence identifier
                    example: geofence-a1b2c3d4
  /geofences/{geofence_id}:
    get:
      operationId: getGeofenceById
      summary: Get geofence
      description: Get operation for geofence resources.
      tags:
        - Positioning
      parameters:
        - &a1
          name: geofence_id
          in: path
          required: true
          description: geofence id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: geofence identifier
                    example: geofence-a1b2c3d4
    put:
      operationId: updateGeofenceById
      summary: Update geofence
      description: Update operation for geofence resources.
      tags:
        - Positioning
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update geofence request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: geofence data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: geofence identifier
                    example: geofence-a1b2c3d4
    delete:
      operationId: deleteGeofenceById
      summary: Delete geofence
      description: Delete operation for geofence resources.
      tags:
        - Positioning
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: geofence identifier
                    example: geofence-a1b2c3d4
  /geofences/{geofence_id}/events:
    get:
      operationId: listEventById
      summary: List event
      description: List operation for event resources.
      tags:
        - Positioning
      parameters:
        - name: geofence_id
          in: path
          required: true
          description: geofence id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: event identifier
                    example: event-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
