openapi: 3.0.3
info:
  title: Coverage Map API
  description: Radio coverage maps, signal strength predictions, and dead zone identification for mobile networks.
    Supports indoor and outdoor propagation modeling with terrain-aware RF simulation and crowd-sourced measurement
    integration.
  version: 1.2.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-network-coverage
  x-acme-domain: network
servers:
  - url: https://at-network-coverage.api.acmetelecom.com/v1
    description: Production
  - url: https://at-network-coverage.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Coverage
    description: Coverage map data and queries
  - name: Predictions
    description: Signal strength predictions
paths:
  /coverage/maps:
    get:
      operationId: listMap
      summary: List map
      description: List operation for map resources.
      tags:
        - Coverage
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: map identifier
                    example: map-a1b2c3d4
  /coverage/maps/{map_id}:
    get:
      operationId: getMapById
      summary: Get map
      description: Get operation for map resources.
      tags:
        - Coverage
      parameters:
        - name: map_id
          in: path
          required: true
          description: map id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: map identifier
                    example: map-a1b2c3d4
  /coverage/query:
    post:
      operationId: searchCoverage
      summary: Search coverage
      description: Search operation for coverage resources.
      tags:
        - Coverage
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      requestBody:
        required: true
        description: Search coverage request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: coverage data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: coverage identifier
                    example: coverage-a1b2c3d4
  /coverage/dead-zones:
    get:
      operationId: listDeadZone
      summary: List dead zone
      description: List operation for dead zone resources.
      tags:
        - Coverage
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: dead_zone identifier
                    example: dead_zone-a1b2c3d4
  /coverage/predictions:
    post:
      operationId: createPrediction
      summary: Create prediction
      description: Create operation for prediction resources.
      tags:
        - Coverage
      requestBody:
        required: true
        description: Create prediction request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: prediction data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: prediction identifier
                    example: prediction-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
