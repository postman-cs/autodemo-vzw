openapi: 3.0.3
info:
  title: IoT Platform Integration API
  description: Integration adapters for AWS IoT Core, Azure IoT Hub, and Google Cloud IoT platforms. Provides
    bidirectional device message routing, credential synchronization, and platform-agnostic device abstraction layers.
  version: 1.1.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-iot-platforms
  x-acme-domain: iot
servers:
  - url: https://at-iot-platforms.api.acmetelecom.com/v1
    description: Production
  - url: https://at-iot-platforms.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Integrations
    description: Cloud platform integrations
  - name: Routes
    description: Message routing configuration
paths:
  /integrations:
    get:
      operationId: listIntegration
      summary: List integration
      description: List operation for integration resources.
      tags:
        - Integrations
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: integration identifier
                    example: integration-a1b2c3d4
    post:
      operationId: createIntegration
      summary: Create integration
      description: Create operation for integration resources.
      tags:
        - Integrations
      requestBody:
        required: true
        description: Create integration request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: integration data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: integration identifier
                    example: integration-a1b2c3d4
  /integrations/{integration_id}:
    get:
      operationId: getIntegrationById
      summary: Get integration
      description: Get operation for integration resources.
      tags:
        - Integrations
      parameters:
        - &a1
          name: integration_id
          in: path
          required: true
          description: integration id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: integration identifier
                    example: integration-a1b2c3d4
    put:
      operationId: updateIntegrationById
      summary: Update integration
      description: Update operation for integration resources.
      tags:
        - Integrations
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update integration request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: integration data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: integration identifier
                    example: integration-a1b2c3d4
    delete:
      operationId: deleteIntegrationById
      summary: Delete integration
      description: Delete operation for integration resources.
      tags:
        - Integrations
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: integration identifier
                    example: integration-a1b2c3d4
  /integrations/{integration_id}/test:
    post:
      operationId: actionIntegrationById
      summary: Action integration
      description: Action operation for integration resources.
      tags:
        - Integrations
      parameters:
        - name: integration_id
          in: path
          required: true
          description: integration id
          schema:
            type: string
      requestBody:
        required: true
        description: Action integration request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: integration data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: integration identifier
                    example: integration-a1b2c3d4
  /routes:
    get:
      operationId: listRoute
      summary: List route
      description: List operation for route resources.
      tags:
        - Integrations
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: route identifier
                    example: route-a1b2c3d4
    post:
      operationId: createRoute
      summary: Create route
      description: Create operation for route resources.
      tags:
        - Integrations
      requestBody:
        required: true
        description: Create route request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: route data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: route identifier
                    example: route-a1b2c3d4
  /routes/{route_id}:
    get:
      operationId: getRouteById
      summary: Get route
      description: Get operation for route resources.
      tags:
        - Integrations
      parameters:
        - &a2
          name: route_id
          in: path
          required: true
          description: route id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: route identifier
                    example: route-a1b2c3d4
    put:
      operationId: updateRouteById
      summary: Update route
      description: Update operation for route resources.
      tags:
        - Integrations
      parameters:
        - *a2
      requestBody:
        required: true
        description: Update route request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: route data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: route identifier
                    example: route-a1b2c3d4
    delete:
      operationId: deleteRouteById
      summary: Delete route
      description: Delete operation for route resources.
      tags:
        - Integrations
      parameters:
        - *a2
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: route identifier
                    example: route-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
