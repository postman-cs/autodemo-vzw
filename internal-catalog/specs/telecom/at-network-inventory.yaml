openapi: 3.0.3
info:
  title: Network Inventory API
  description: Physical and logical network equipment inventory with rack, shelf, slot, and port-level tracking. Maintains
    asset lifecycle records, spare parts allocation, and equipment decommissioning workflows.
  version: 2.0.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-network-inventory
  x-acme-domain: network
servers:
  - url: https://at-network-inventory.api.acmetelecom.com/v1
    description: Production
  - url: https://at-network-inventory.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Equipment
    description: Network equipment inventory
  - name: Ports
    description: Port and interface management
paths:
  /equipment:
    get:
      operationId: listEquipment
      summary: List equipment
      description: List operation for equipment resources.
      tags:
        - Equipment
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: equipment identifier
                    example: equipment-a1b2c3d4
    post:
      operationId: createEquipment
      summary: Create equipment
      description: Create operation for equipment resources.
      tags:
        - Equipment
      requestBody:
        required: true
        description: Create equipment request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: equipment data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: equipment identifier
                    example: equipment-a1b2c3d4
  /equipment/{equipment_id}:
    get:
      operationId: getEquipmentById
      summary: Get equipment
      description: Get operation for equipment resources.
      tags:
        - Equipment
      parameters:
        - &a1
          name: equipment_id
          in: path
          required: true
          description: equipment id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: equipment identifier
                    example: equipment-a1b2c3d4
    put:
      operationId: updateEquipmentById
      summary: Update equipment
      description: Update operation for equipment resources.
      tags:
        - Equipment
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update equipment request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: equipment data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: equipment identifier
                    example: equipment-a1b2c3d4
    delete:
      operationId: deleteEquipmentById
      summary: Delete equipment
      description: Delete operation for equipment resources.
      tags:
        - Equipment
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: equipment identifier
                    example: equipment-a1b2c3d4
  /equipment/{equipment_id}/ports:
    get:
      operationId: listPortById
      summary: List port
      description: List operation for port resources.
      tags:
        - Equipment
      parameters:
        - name: equipment_id
          in: path
          required: true
          description: equipment id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: port identifier
                    example: port-a1b2c3d4
  /sites:
    get:
      operationId: listSite
      summary: List site
      description: List operation for site resources.
      tags:
        - Equipment
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: site identifier
                    example: site-a1b2c3d4
  /sites/{site_id}:
    get:
      operationId: getSiteById
      summary: Get site
      description: Get operation for site resources.
      tags:
        - Equipment
      parameters:
        - name: site_id
          in: path
          required: true
          description: site id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: site identifier
                    example: site-a1b2c3d4
  /sites/{site_id}/racks:
    get:
      operationId: listRackById
      summary: List rack
      description: List operation for rack resources.
      tags:
        - Equipment
      parameters:
        - name: site_id
          in: path
          required: true
          description: site id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rack identifier
                    example: rack-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
