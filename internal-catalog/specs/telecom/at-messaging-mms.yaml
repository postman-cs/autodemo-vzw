openapi: 3.0.3
info:
  title: MMS Gateway API
  description: Multimedia message sending with image, video, and audio attachments for rich customer engagement. Provides
    content adaptation, transcoding for device compatibility, and delivery optimization based on recipient device
    capabilities.
  version: 2.0.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-messaging-mms
  x-acme-domain: messaging
servers:
  - url: https://at-messaging-mms.api.acmetelecom.com/v1
    description: Production
  - url: https://at-messaging-mms.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Messages
    description: MMS message management
  - name: Media
    description: Media attachment handling
paths:
  /messages:
    get:
      operationId: listMmsMessage
      summary: List mms message
      description: List operation for mms message resources.
      tags:
        - Messages
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: mms_message identifier
                    example: mms_message-a1b2c3d4
    post:
      operationId: createMmsMessage
      summary: Create mms message
      description: Create operation for mms message resources.
      tags:
        - Messages
      requestBody:
        required: true
        description: Create mms_message request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: mms_message data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: mms_message identifier
                    example: mms_message-a1b2c3d4
  /messages/{message_id}:
    get:
      operationId: getMmsMessageById
      summary: Get mms message
      description: Get operation for mms message resources.
      tags:
        - Messages
      parameters:
        - name: message_id
          in: path
          required: true
          description: message id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: mms_message identifier
                    example: mms_message-a1b2c3d4
  /messages/{message_id}/media:
    get:
      operationId: listAttachmentById
      summary: List attachment
      description: List operation for attachment resources.
      tags:
        - Messages
      parameters:
        - name: message_id
          in: path
          required: true
          description: message id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: attachment identifier
                    example: attachment-a1b2c3d4
  /messages/{message_id}/status:
    get:
      operationId: getStatusById
      summary: Get status
      description: Get operation for status resources.
      tags:
        - Messages
      parameters:
        - name: message_id
          in: path
          required: true
          description: message id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: status identifier
                    example: status-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
