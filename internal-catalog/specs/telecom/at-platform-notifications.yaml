openapi: 3.0.3
info:
  title: System Notification API
  description: Internal system event notifications and alerting for operational teams. Provides webhook delivery,
    escalation chains, notification routing based on severity, and integration with PagerDuty and ServiceNow.
  version: 1.5.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-platform-notifications
  x-acme-domain: platform
servers:
  - url: https://at-platform-notifications.api.acmetelecom.com/v1
    description: Production
  - url: https://at-platform-notifications.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Notifications
    description: System notification management
  - name: Webhooks
    description: Webhook endpoint management
paths:
  /notifications:
    get:
      operationId: listNotification
      summary: List notification
      description: List operation for notification resources.
      tags:
        - Notifications
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: notification identifier
                    example: notification-a1b2c3d4
  /notifications/{notification_id}:
    get:
      operationId: getNotificationById
      summary: Get notification
      description: Get operation for notification resources.
      tags:
        - Notifications
      parameters:
        - name: notification_id
          in: path
          required: true
          description: notification id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: notification identifier
                    example: notification-a1b2c3d4
  /webhooks:
    get:
      operationId: listWebhook
      summary: List webhook
      description: List operation for webhook resources.
      tags:
        - Notifications
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: webhook identifier
                    example: webhook-a1b2c3d4
    post:
      operationId: createWebhook
      summary: Create webhook
      description: Create operation for webhook resources.
      tags:
        - Notifications
      requestBody:
        required: true
        description: Create webhook request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: webhook data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: webhook identifier
                    example: webhook-a1b2c3d4
  /webhooks/{webhook_id}:
    get:
      operationId: getWebhookById
      summary: Get webhook
      description: Get operation for webhook resources.
      tags:
        - Notifications
      parameters:
        - &a1
          name: webhook_id
          in: path
          required: true
          description: webhook id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: webhook identifier
                    example: webhook-a1b2c3d4
    put:
      operationId: updateWebhookById
      summary: Update webhook
      description: Update operation for webhook resources.
      tags:
        - Notifications
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update webhook request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: webhook data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: webhook identifier
                    example: webhook-a1b2c3d4
    delete:
      operationId: deleteWebhookById
      summary: Delete webhook
      description: Delete operation for webhook resources.
      tags:
        - Notifications
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: webhook identifier
                    example: webhook-a1b2c3d4
  /webhooks/{webhook_id}/test:
    post:
      operationId: actionWebhookById
      summary: Action webhook
      description: Action operation for webhook resources.
      tags:
        - Notifications
      parameters:
        - name: webhook_id
          in: path
          required: true
          description: webhook id
          schema:
            type: string
      requestBody:
        required: true
        description: Action webhook request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: webhook data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: webhook identifier
                    example: webhook-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
