openapi: 3.0.3
info:
  title: Network Fault Management API
  description: Fault detection, correlation, ticketing, and resolution tracking for network infrastructure. Provides root
    cause analysis through alarm correlation, automated ticket creation, and mean-time-to-repair analytics.
  version: 2.4.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-network-faults
  x-acme-domain: network
servers:
  - url: https://at-network-faults.api.acmetelecom.com/v1
    description: Production
  - url: https://at-network-faults.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Alarms
    description: Network alarm management
  - name: Tickets
    description: Fault ticket lifecycle
paths:
  /alarms:
    get:
      operationId: listAlarm
      summary: List alarm
      description: List operation for alarm resources.
      tags:
        - Alarms
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: alarm identifier
                    example: alarm-a1b2c3d4
  /alarms/{alarm_id}:
    get:
      operationId: getAlarmById
      summary: Get alarm
      description: Get operation for alarm resources.
      tags:
        - Alarms
      parameters:
        - &a1
          name: alarm_id
          in: path
          required: true
          description: alarm id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: alarm identifier
                    example: alarm-a1b2c3d4
    put:
      operationId: updateAlarmById
      summary: Update alarm
      description: Update operation for alarm resources.
      tags:
        - Alarms
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update alarm request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: alarm data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: alarm identifier
                    example: alarm-a1b2c3d4
  /alarms/{alarm_id}/acknowledge:
    post:
      operationId: actionAlarmById
      summary: Action alarm
      description: Action operation for alarm resources.
      tags:
        - Alarms
      parameters:
        - name: alarm_id
          in: path
          required: true
          description: alarm id
          schema:
            type: string
      requestBody:
        required: true
        description: Action alarm request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: alarm data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: alarm identifier
                    example: alarm-a1b2c3d4
  /tickets:
    get:
      operationId: listTicket
      summary: List ticket
      description: List operation for ticket resources.
      tags:
        - Alarms
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ticket identifier
                    example: ticket-a1b2c3d4
    post:
      operationId: createTicket
      summary: Create ticket
      description: Create operation for ticket resources.
      tags:
        - Alarms
      requestBody:
        required: true
        description: Create ticket request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: ticket data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ticket identifier
                    example: ticket-a1b2c3d4
  /tickets/{ticket_id}:
    get:
      operationId: getTicketById
      summary: Get ticket
      description: Get operation for ticket resources.
      tags:
        - Alarms
      parameters:
        - &a2
          name: ticket_id
          in: path
          required: true
          description: ticket id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ticket identifier
                    example: ticket-a1b2c3d4
    put:
      operationId: updateTicketById
      summary: Update ticket
      description: Update operation for ticket resources.
      tags:
        - Alarms
      parameters:
        - *a2
      requestBody:
        required: true
        description: Update ticket request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: ticket data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ticket identifier
                    example: ticket-a1b2c3d4
  /tickets/{ticket_id}/resolve:
    post:
      operationId: actionTicketById
      summary: Action ticket
      description: Action operation for ticket resources.
      tags:
        - Alarms
      parameters:
        - name: ticket_id
          in: path
          required: true
          description: ticket id
          schema:
            type: string
      requestBody:
        required: true
        description: Action ticket request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: ticket data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ticket identifier
                    example: ticket-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
