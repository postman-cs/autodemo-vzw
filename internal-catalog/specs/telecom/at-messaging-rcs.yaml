openapi: 3.0.3
info:
  title: RCS Business Messaging API
  description: Rich Communication Services messaging with carousels, suggested actions, and branded sender profiles.
    Supports RBM agent management, rich card templates, and fallback to SMS for non-RCS capable devices.
  version: 1.6.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-messaging-rcs
  x-acme-domain: messaging
servers:
  - url: https://at-messaging-rcs.api.acmetelecom.com/v1
    description: Production
  - url: https://at-messaging-rcs.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Conversations
    description: RCS conversation management
  - name: Agents
    description: RBM agent configuration
paths:
  /agents:
    get:
      operationId: listAgent
      summary: List agent
      description: List operation for agent resources.
      tags:
        - Conversations
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: agent identifier
                    example: agent-a1b2c3d4
    post:
      operationId: createAgent
      summary: Create agent
      description: Create operation for agent resources.
      tags:
        - Conversations
      requestBody:
        required: true
        description: Create agent request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: agent data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: agent identifier
                    example: agent-a1b2c3d4
  /agents/{agent_id}:
    get:
      operationId: getAgentById
      summary: Get agent
      description: Get operation for agent resources.
      tags:
        - Conversations
      parameters:
        - &a1
          name: agent_id
          in: path
          required: true
          description: agent id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: agent identifier
                    example: agent-a1b2c3d4
    put:
      operationId: updateAgentById
      summary: Update agent
      description: Update operation for agent resources.
      tags:
        - Conversations
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update agent request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: agent data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: agent identifier
                    example: agent-a1b2c3d4
  /conversations:
    get:
      operationId: listConversation
      summary: List conversation
      description: List operation for conversation resources.
      tags:
        - Conversations
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: conversation identifier
                    example: conversation-a1b2c3d4
    post:
      operationId: createConversation
      summary: Create conversation
      description: Create operation for conversation resources.
      tags:
        - Conversations
      requestBody:
        required: true
        description: Create conversation request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: conversation data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: conversation identifier
                    example: conversation-a1b2c3d4
  /conversations/{conversation_id}:
    get:
      operationId: getConversationById
      summary: Get conversation
      description: Get operation for conversation resources.
      tags:
        - Conversations
      parameters:
        - name: conversation_id
          in: path
          required: true
          description: conversation id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: conversation identifier
                    example: conversation-a1b2c3d4
  /conversations/{conversation_id}/messages:
    get:
      operationId: listMessageById
      summary: List message
      description: List operation for message resources.
      tags:
        - Conversations
      parameters:
        - &a2
          name: conversation_id
          in: path
          required: true
          description: conversation id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: message identifier
                    example: message-a1b2c3d4
    post:
      operationId: createMessageById
      summary: Create message
      description: Create operation for message resources.
      tags:
        - Conversations
      parameters:
        - *a2
      requestBody:
        required: true
        description: Create message request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: message data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: message identifier
                    example: message-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
