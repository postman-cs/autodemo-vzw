openapi: 3.0.3
info:
  title: Enterprise VPN API
  description: MPLS VPN and IPsec VPN provisioning for enterprise customers with site-to-site and remote access
    topologies. Provides traffic encryption policy management, tunnel health monitoring, and bandwidth allocation per
    VPN instance.
  version: 2.0.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-enterprise-vpn
  x-acme-domain: enterprise
servers:
  - url: https://at-enterprise-vpn.api.acmetelecom.com/v1
    description: Production
  - url: https://at-enterprise-vpn.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: VPNs
    description: VPN instance management
  - name: Sites
    description: VPN site configuration
paths:
  /vpns:
    get:
      operationId: listVpn
      summary: List vpn
      description: List operation for vpn resources.
      tags:
        - VPNs
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: vpn identifier
                    example: vpn-a1b2c3d4
    post:
      operationId: createVpn
      summary: Create vpn
      description: Create operation for vpn resources.
      tags:
        - VPNs
      requestBody:
        required: true
        description: Create vpn request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: vpn data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: vpn identifier
                    example: vpn-a1b2c3d4
  /vpns/{vpn_id}:
    get:
      operationId: getVpnById
      summary: Get vpn
      description: Get operation for vpn resources.
      tags:
        - VPNs
      parameters:
        - &a1
          name: vpn_id
          in: path
          required: true
          description: vpn id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: vpn identifier
                    example: vpn-a1b2c3d4
    put:
      operationId: updateVpnById
      summary: Update vpn
      description: Update operation for vpn resources.
      tags:
        - VPNs
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update vpn request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: vpn data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: vpn identifier
                    example: vpn-a1b2c3d4
    delete:
      operationId: deleteVpnById
      summary: Delete vpn
      description: Delete operation for vpn resources.
      tags:
        - VPNs
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: vpn identifier
                    example: vpn-a1b2c3d4
  /vpns/{vpn_id}/sites:
    get:
      operationId: listSiteById
      summary: List site
      description: List operation for site resources.
      tags:
        - VPNs
      parameters:
        - &a2
          name: vpn_id
          in: path
          required: true
          description: vpn id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: site identifier
                    example: site-a1b2c3d4
    post:
      operationId: createSiteById
      summary: Create site
      description: Create operation for site resources.
      tags:
        - VPNs
      parameters:
        - *a2
      requestBody:
        required: true
        description: Create site request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: site data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: site identifier
                    example: site-a1b2c3d4
  /vpns/{vpn_id}/sites/{site_id}:
    get:
      operationId: getSiteById
      summary: Get site
      description: Get operation for site resources.
      tags:
        - VPNs
      parameters:
        - &a3
          name: vpn_id
          in: path
          required: true
          description: vpn id
          schema:
            type: string
        - &a4
          name: site_id
          in: path
          required: true
          description: site id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: site identifier
                    example: site-a1b2c3d4
    put:
      operationId: updateSiteById
      summary: Update site
      description: Update operation for site resources.
      tags:
        - VPNs
      parameters:
        - *a3
        - *a4
      requestBody:
        required: true
        description: Update site request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: site data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: site identifier
                    example: site-a1b2c3d4
    delete:
      operationId: deleteSiteById
      summary: Delete site
      description: Delete operation for site resources.
      tags:
        - VPNs
      parameters:
        - *a3
        - *a4
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: site identifier
                    example: site-a1b2c3d4
  /vpns/{vpn_id}/health:
    get:
      operationId: getHealthById
      summary: Get health
      description: Get operation for health resources.
      tags:
        - VPNs
      parameters:
        - name: vpn_id
          in: path
          required: true
          description: vpn id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: health identifier
                    example: health-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
