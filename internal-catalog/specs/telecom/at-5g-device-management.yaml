openapi: 3.0.3
info:
  title: 5G Device Management API
  description: 5G device capability profiling, band support verification, and SA/NSA mode management. Provides device
    firmware tracking, modem configuration, and compatibility matrix queries for network planning.
  version: 1.2.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-5g-device-management
  x-acme-domain: 5g
servers:
  - url: https://at-5g-device-management.api.acmetelecom.com/v1
    description: Production
  - url: https://at-5g-device-management.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Devices
    description: 5G device management
paths:
  /devices:
    get:
      operationId: listDevice
      summary: List device
      description: List operation for device resources.
      tags:
        - Devices
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: device identifier
                    example: device-a1b2c3d4
  /devices/{device_id}:
    get:
      operationId: getDeviceById
      summary: Get device
      description: Get operation for device resources.
      tags:
        - Devices
      parameters:
        - &a1
          name: device_id
          in: path
          required: true
          description: device id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: device identifier
                    example: device-a1b2c3d4
    put:
      operationId: updateDeviceById
      summary: Update device
      description: Update operation for device resources.
      tags:
        - Devices
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update device request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: device data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: device identifier
                    example: device-a1b2c3d4
  /devices/{device_id}/capabilities:
    get:
      operationId: getCapabilitiesById
      summary: Get capabilities
      description: Get operation for capabilities resources.
      tags:
        - Devices
      parameters:
        - name: device_id
          in: path
          required: true
          description: device id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: capabilities identifier
                    example: capabilities-a1b2c3d4
  /devices/{device_id}/bands:
    get:
      operationId: listBandById
      summary: List band
      description: List operation for band resources.
      tags:
        - Devices
      parameters:
        - name: device_id
          in: path
          required: true
          description: device id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: band identifier
                    example: band-a1b2c3d4
  /compatibility:
    post:
      operationId: searchCompatibility
      summary: Search compatibility
      description: Search operation for compatibility resources.
      tags:
        - Devices
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      requestBody:
        required: true
        description: Search compatibility request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: compatibility data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: compatibility identifier
                    example: compatibility-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
