openapi: 3.0.3
info:
  title: Wholesale Services API
  description: MVNO enablement, wholesale voice/data capacity, and white-label service management for partner operators.
    Manages interconnect agreements, wholesale billing, and partner onboarding with self-service portals.
  version: 1.5.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-enterprise-wholesale
  x-acme-domain: enterprise
servers:
  - url: https://at-enterprise-wholesale.api.acmetelecom.com/v1
    description: Production
  - url: https://at-enterprise-wholesale.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Partners
    description: Wholesale partner management
  - name: Capacity
    description: Wholesale capacity allocation
paths:
  /partners:
    get:
      operationId: listPartner
      summary: List partner
      description: List operation for partner resources.
      tags:
        - Partners
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: partner identifier
                    example: partner-a1b2c3d4
    post:
      operationId: createPartner
      summary: Create partner
      description: Create operation for partner resources.
      tags:
        - Partners
      requestBody:
        required: true
        description: Create partner request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: partner data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: partner identifier
                    example: partner-a1b2c3d4
  /partners/{partner_id}:
    get:
      operationId: getPartnerById
      summary: Get partner
      description: Get operation for partner resources.
      tags:
        - Partners
      parameters:
        - &a1
          name: partner_id
          in: path
          required: true
          description: partner id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: partner identifier
                    example: partner-a1b2c3d4
    put:
      operationId: updatePartnerById
      summary: Update partner
      description: Update operation for partner resources.
      tags:
        - Partners
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update partner request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: partner data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: partner identifier
                    example: partner-a1b2c3d4
  /partners/{partner_id}/capacity:
    get:
      operationId: getCapacityById
      summary: Get capacity
      description: Get operation for capacity resources.
      tags:
        - Partners
      parameters:
        - &a2
          name: partner_id
          in: path
          required: true
          description: partner id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: capacity identifier
                    example: capacity-a1b2c3d4
    put:
      operationId: updateCapacityById
      summary: Update capacity
      description: Update operation for capacity resources.
      tags:
        - Partners
      parameters:
        - *a2
      requestBody:
        required: true
        description: Update capacity request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: capacity data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: capacity identifier
                    example: capacity-a1b2c3d4
  /partners/{partner_id}/agreements:
    get:
      operationId: listAgreementById
      summary: List agreement
      description: List operation for agreement resources.
      tags:
        - Partners
      parameters:
        - &a3
          name: partner_id
          in: path
          required: true
          description: partner id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: agreement identifier
                    example: agreement-a1b2c3d4
    post:
      operationId: createAgreementById
      summary: Create agreement
      description: Create operation for agreement resources.
      tags:
        - Partners
      parameters:
        - *a3
      requestBody:
        required: true
        description: Create agreement request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: agreement data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: agreement identifier
                    example: agreement-a1b2c3d4
  /partners/{partner_id}/usage:
    get:
      operationId: getUsageById
      summary: Get usage
      description: Get operation for usage resources.
      tags:
        - Partners
      parameters:
        - name: partner_id
          in: path
          required: true
          description: partner id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: usage identifier
                    example: usage-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
