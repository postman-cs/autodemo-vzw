          name: overlay_id
          in: path
          required: true
          description: overlay id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: edge identifier
                    example: edge-a1b2c3d4
    post:
      operationId: createEdgeById
      summary: Create edge
      description: Create operation for edge resources.
      tags:
        - Overlays
      parameters:
        - *a2
      requestBody:
        required: true
        description: Create edge request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: edge data
      responses:
