openapi: 3.0.3
info:
  title: SD-WAN Management API
  description: Software-defined WAN orchestration with application-aware routing and branch CPE management. Provides WAN
    optimization, traffic steering policies, and centralized configuration for distributed enterprise networks.
  version: 1.6.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-enterprise-sd-wan
  x-acme-domain: enterprise
servers:
  - url: https://at-enterprise-sd-wan.api.acmetelecom.com/v1
    description: Production
  - url: https://at-enterprise-sd-wan.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Overlays
    description: SD-WAN overlay network management
  - name: CPE
    description: Customer premises equipment management
paths:
  /overlays:
    get:
      operationId: listOverlay
      summary: List overlay
      description: List operation for overlay resources.
      tags:
        - Overlays
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: overlay identifier
                    example: overlay-a1b2c3d4
    post:
      operationId: createOverlay
      summary: Create overlay
      description: Create operation for overlay resources.
      tags:
        - Overlays
      requestBody:
        required: true
        description: Create overlay request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: overlay data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: overlay identifier
                    example: overlay-a1b2c3d4
  /overlays/{overlay_id}:
    get:
      operationId: getOverlayById
      summary: Get overlay
      description: Get operation for overlay resources.
      tags:
        - Overlays
      parameters:
        - &a1
          name: overlay_id
          in: path
          required: true
          description: overlay id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: overlay identifier
                    example: overlay-a1b2c3d4
    put:
      operationId: updateOverlayById
      summary: Update overlay
      description: Update operation for overlay resources.
      tags:
        - Overlays
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update overlay request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: overlay data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: overlay identifier
                    example: overlay-a1b2c3d4
  /overlays/{overlay_id}/edges:
    get:
      operationId: listEdgeById
      summary: List edge
      description: List operation for edge resources.
      tags:
        - Overlays
      parameters:
