          name: overlay_id
          in: path
          required: true
          description: overlay id
          schema:
            type: string
        - &a4
          name: edge_id
          in: path
          required: true
          description: edge id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: edge identifier
                    example: edge-a1b2c3d4
    put:
      operationId: updateEdgeById
      summary: Update edge
      description: Update operation for edge resources.
      tags:
        - Overlays
      parameters:
        - *a3
        - *a4
      requestBody:
        required: true
        description: Update edge request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: edge data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: edge identifier
                    example: edge-a1b2c3d4
  /overlays/{overlay_id}/policies:
    get:
      operationId: listPolicyById
      summary: List policy
      description: List operation for policy resources.
      tags:
        - Overlays
      parameters:
