openapi: 3.0.3
info:
  title: Invoice API
  description: Invoice generation, PDF rendering, and electronic distribution with itemized billing detail. Supports tax
    calculation, credit note issuance, and multi-currency billing with regulatory-compliant invoice formatting.
  version: 2.8.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-billing-invoices
  x-acme-domain: billing
servers:
  - url: https://at-billing-invoices.api.acmetelecom.com/v1
    description: Production
  - url: https://at-billing-invoices.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Invoices
    description: Invoice generation and retrieval
  - name: Line Items
    description: Invoice line item details
paths:
  /invoices:
    get:
      operationId: listInvoice
      summary: List invoice
      description: List operation for invoice resources.
      tags:
        - Invoices
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: invoice identifier
                    example: invoice-a1b2c3d4
  /invoices/{invoice_id}:
    get:
      operationId: getInvoiceById
      summary: Get invoice
      description: Get operation for invoice resources.
      tags:
        - Invoices
      parameters:
        - name: invoice_id
          in: path
          required: true
          description: invoice id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: invoice identifier
                    example: invoice-a1b2c3d4
  /invoices/{invoice_id}/pdf:
    get:
      operationId: getPdfById
      summary: Get pdf
      description: Get operation for pdf resources.
      tags:
        - Invoices
      parameters:
        - name: invoice_id
          in: path
          required: true
          description: invoice id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: pdf identifier
                    example: pdf-a1b2c3d4
  /invoices/{invoice_id}/line-items:
    get:
      operationId: listLineItemById
      summary: List line item
      description: List operation for line item resources.
      tags:
        - Invoices
      parameters:
        - name: invoice_id
          in: path
          required: true
          description: invoice id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: line_item identifier
                    example: line_item-a1b2c3d4
  /invoices/{invoice_id}/credit-notes:
    get:
      operationId: listCreditNoteById
      summary: List credit note
      description: List operation for credit note resources.
      tags:
        - Invoices
      parameters:
        - &a1
          name: invoice_id
          in: path
          required: true
          description: invoice id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: credit_note identifier
                    example: credit_note-a1b2c3d4
    post:
      operationId: createCreditNoteById
      summary: Create credit note
      description: Create operation for credit note resources.
      tags:
        - Invoices
      parameters:
        - *a1
      requestBody:
        required: true
        description: Create credit_note request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: credit_note data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: credit_note identifier
                    example: credit_note-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
