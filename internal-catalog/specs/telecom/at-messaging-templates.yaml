openapi: 3.0.3
info:
  title: Message Template API
  description: Create and manage message templates with variable substitution and approval workflows for regulated
    messaging. Supports multi-language variants, A/B testing configurations, and compliance review before activation.
  version: 1.4.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-messaging-templates
  x-acme-domain: messaging
servers:
  - url: https://at-messaging-templates.api.acmetelecom.com/v1
    description: Production
  - url: https://at-messaging-templates.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Templates
    description: Message template management
  - name: Approvals
    description: Template approval workflows
paths:
  /templates:
    get:
      operationId: listTemplate
      summary: List template
      description: List operation for template resources.
      tags:
        - Templates
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: template identifier
                    example: template-a1b2c3d4
    post:
      operationId: createTemplate
      summary: Create template
      description: Create operation for template resources.
      tags:
        - Templates
      requestBody:
        required: true
        description: Create template request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: template data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: template identifier
                    example: template-a1b2c3d4
  /templates/{template_id}:
    get:
      operationId: getTemplateById
      summary: Get template
      description: Get operation for template resources.
      tags:
        - Templates
      parameters:
        - &a1
          name: template_id
          in: path
          required: true
          description: template id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: template identifier
                    example: template-a1b2c3d4
    put:
      operationId: updateTemplateById
      summary: Update template
      description: Update operation for template resources.
      tags:
        - Templates
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update template request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: template data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: template identifier
                    example: template-a1b2c3d4
    delete:
      operationId: deleteTemplateById
      summary: Delete template
      description: Delete operation for template resources.
      tags:
        - Templates
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: template identifier
                    example: template-a1b2c3d4
  /templates/{template_id}/versions:
    get:
      operationId: listVersionById
      summary: List version
      description: List operation for version resources.
      tags:
        - Templates
      parameters:
        - name: template_id
          in: path
          required: true
          description: template id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: version identifier
                    example: version-a1b2c3d4
  /templates/{template_id}/approve:
    post:
      operationId: actionTemplateById
      summary: Action template
      description: Action operation for template resources.
      tags:
        - Templates
      parameters:
        - name: template_id
          in: path
          required: true
          description: template id
          schema:
            type: string
      requestBody:
        required: true
        description: Action template request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: template data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: template identifier
                    example: template-a1b2c3d4
  /templates/{template_id}/test:
    post:
      operationId: createTestSendById
      summary: Create test send
      description: Create operation for test send resources.
      tags:
        - Templates
      parameters:
        - name: template_id
          in: path
          required: true
          description: template id
          schema:
            type: string
      requestBody:
        required: true
        description: Create test_send request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: test_send data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: test_send identifier
                    example: test_send-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
