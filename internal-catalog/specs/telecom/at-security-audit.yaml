openapi: 3.0.3
info:
  title: Audit Logging API
  description: Immutable audit log collection, search, and forensic analysis for security and compliance requirements.
    Supports SIEM integration, compliance-grade log retention, and tamper-evident log chain verification.
  version: 2.1.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-security-audit
  x-acme-domain: security
servers:
  - url: https://at-security-audit.api.acmetelecom.com/v1
    description: Production
  - url: https://at-security-audit.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Logs
    description: Audit log management
  - name: Search
    description: Log search and analysis
paths:
  /logs:
    get:
      operationId: listLogEntry
      summary: List log entry
      description: List operation for log entry resources.
      tags:
        - Logs
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: log_entry identifier
                    example: log_entry-a1b2c3d4
  /logs/{entry_id}:
    get:
      operationId: getLogEntryById
      summary: Get log entry
      description: Get operation for log entry resources.
      tags:
        - Logs
      parameters:
        - name: entry_id
          in: path
          required: true
          description: entry id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: log_entry identifier
                    example: log_entry-a1b2c3d4
  /logs/search:
    post:
      operationId: searchLogEntry
      summary: Search log entry
      description: Search operation for log entry resources.
      tags:
        - Logs
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      requestBody:
        required: true
        description: Search log_entry request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: log_entry data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: log_entry identifier
                    example: log_entry-a1b2c3d4
  /exports:
    get:
      operationId: listExport
      summary: List export
      description: List operation for export resources.
      tags:
        - Logs
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: export identifier
                    example: export-a1b2c3d4
    post:
      operationId: createExport
      summary: Create export
      description: Create operation for export resources.
      tags:
        - Logs
      requestBody:
        required: true
        description: Create export request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: export data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: export identifier
                    example: export-a1b2c3d4
  /exports/{export_id}:
    get:
      operationId: getExportById
      summary: Get export
      description: Get operation for export resources.
      tags:
        - Logs
      parameters:
        - name: export_id
          in: path
          required: true
          description: export id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: export identifier
                    example: export-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
