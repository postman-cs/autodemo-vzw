openapi: 3.0.3
info:
  title: Quality of Service API
  description: QoS policy definition, DSCP marking rules, and bandwidth guarantee configuration. Provides per-subscriber
    and per-service QoS profiles with traffic shaping, policing, and priority queue management across the network.
  version: 1.7.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-network-qos
  x-acme-domain: network
servers:
  - url: https://at-network-qos.api.acmetelecom.com/v1
    description: Production
  - url: https://at-network-qos.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Policies
    description: QoS policy management
  - name: Profiles
    description: QoS profile templates
paths:
  /policies:
    get:
      operationId: listPolicy
      summary: List policy
      description: List operation for policy resources.
      tags:
        - Policies
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: policy identifier
                    example: policy-a1b2c3d4
    post:
      operationId: createPolicy
      summary: Create policy
      description: Create operation for policy resources.
      tags:
        - Policies
      requestBody:
        required: true
        description: Create policy request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: policy data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: policy identifier
                    example: policy-a1b2c3d4
  /policies/{policy_id}:
    get:
      operationId: getPolicyById
      summary: Get policy
      description: Get operation for policy resources.
      tags:
        - Policies
      parameters:
        - &a1
          name: policy_id
          in: path
          required: true
          description: policy id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: policy identifier
                    example: policy-a1b2c3d4
    put:
      operationId: updatePolicyById
      summary: Update policy
      description: Update operation for policy resources.
      tags:
        - Policies
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update policy request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: policy data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: policy identifier
                    example: policy-a1b2c3d4
    delete:
      operationId: deletePolicyById
      summary: Delete policy
      description: Delete operation for policy resources.
      tags:
        - Policies
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: policy identifier
                    example: policy-a1b2c3d4
  /profiles:
    get:
      operationId: listProfile
      summary: List profile
      description: List operation for profile resources.
      tags:
        - Policies
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: profile identifier
                    example: profile-a1b2c3d4
    post:
      operationId: createProfile
      summary: Create profile
      description: Create operation for profile resources.
      tags:
        - Policies
      requestBody:
        required: true
        description: Create profile request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: profile data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: profile identifier
                    example: profile-a1b2c3d4
  /profiles/{profile_id}:
    get:
      operationId: getProfileById
      summary: Get profile
      description: Get operation for profile resources.
      tags:
        - Policies
      parameters:
        - &a2
          name: profile_id
          in: path
          required: true
          description: profile id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: profile identifier
                    example: profile-a1b2c3d4
    put:
      operationId: updateProfileById
      summary: Update profile
      description: Update operation for profile resources.
      tags:
        - Policies
      parameters:
        - *a2
      requestBody:
        required: true
        description: Update profile request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: profile data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: profile identifier
                    example: profile-a1b2c3d4
  /subscribers/{subscriber_id}/qos:
    get:
      operationId: getQosAssignmentById
      summary: Get qos assignment
      description: Get operation for qos assignment resources.
      tags:
        - Policies
      parameters:
        - &a3
          name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: qos_assignment identifier
                    example: qos_assignment-a1b2c3d4
    put:
      operationId: updateQosAssignmentById
      summary: Update qos assignment
      description: Update operation for qos assignment resources.
      tags:
        - Policies
      parameters:
        - *a3
      requestBody:
        required: true
        description: Update qos_assignment request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: qos_assignment data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: qos_assignment identifier
                    example: qos_assignment-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
