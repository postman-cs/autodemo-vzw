openapi: 3.0.3
info:
  title: Billing Disputes API
  description: Billing dispute filing, investigation, and resolution tracking with full audit trails. Provides credit and
    refund issuance, dispute categorization analytics, and SLA monitoring for resolution times.
  version: 1.2.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-billing-disputes
  x-acme-domain: billing
servers:
  - url: https://at-billing-disputes.api.acmetelecom.com/v1
    description: Production
  - url: https://at-billing-disputes.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Disputes
    description: Dispute lifecycle management
paths:
  /disputes:
    get:
      operationId: listDispute
      summary: List dispute
      description: List operation for dispute resources.
      tags:
        - Disputes
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: dispute identifier
                    example: dispute-a1b2c3d4
    post:
      operationId: createDispute
      summary: Create dispute
      description: Create operation for dispute resources.
      tags:
        - Disputes
      requestBody:
        required: true
        description: Create dispute request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: dispute data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: dispute identifier
                    example: dispute-a1b2c3d4
  /disputes/{dispute_id}:
    get:
      operationId: getDisputeById
      summary: Get dispute
      description: Get operation for dispute resources.
      tags:
        - Disputes
      parameters:
        - &a1
          name: dispute_id
          in: path
          required: true
          description: dispute id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: dispute identifier
                    example: dispute-a1b2c3d4
    put:
      operationId: updateDisputeById
      summary: Update dispute
      description: Update operation for dispute resources.
      tags:
        - Disputes
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update dispute request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: dispute data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: dispute identifier
                    example: dispute-a1b2c3d4
  /disputes/{dispute_id}/evidence:
    get:
      operationId: listEvidenceById
      summary: List evidence
      description: List operation for evidence resources.
      tags:
        - Disputes
      parameters:
        - &a2
          name: dispute_id
          in: path
          required: true
          description: dispute id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: evidence identifier
                    example: evidence-a1b2c3d4
    post:
      operationId: createEvidenceById
      summary: Create evidence
      description: Create operation for evidence resources.
      tags:
        - Disputes
      parameters:
        - *a2
      requestBody:
        required: true
        description: Create evidence request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: evidence data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: evidence identifier
                    example: evidence-a1b2c3d4
  /disputes/{dispute_id}/resolve:
    post:
      operationId: actionDisputeById
      summary: Action dispute
      description: Action operation for dispute resources.
      tags:
        - Disputes
      parameters:
        - name: dispute_id
          in: path
          required: true
          description: dispute id
          schema:
            type: string
      requestBody:
        required: true
        description: Action dispute request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: dispute data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: dispute identifier
                    example: dispute-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
