openapi: 3.0.3
info:
  title: Network Slicing API
  description: End-to-end network slice lifecycle management with SLA guarantees for URLLC, eMBB, and mMTC use cases.
    Supports slice templates, instantiation, scaling, monitoring, and graceful decommissioning workflows.
  version: 2.0.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-5g-slicing
  x-acme-domain: 5g
servers:
  - url: https://at-5g-slicing.api.acmetelecom.com/v1
    description: Production
  - url: https://at-5g-slicing.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Slices
    description: Network slice management
  - name: Templates
    description: Slice template catalog
paths:
  /slices:
    get:
      operationId: listSlice
      summary: List slice
      description: List operation for slice resources.
      tags:
        - Slices
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: slice identifier
                    example: slice-a1b2c3d4
    post:
      operationId: createSlice
      summary: Create slice
      description: Create operation for slice resources.
      tags:
        - Slices
      requestBody:
        required: true
        description: Create slice request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: slice data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: slice identifier
                    example: slice-a1b2c3d4
  /slices/{slice_id}:
    get:
      operationId: getSliceById
      summary: Get slice
      description: Get operation for slice resources.
      tags:
        - Slices
      parameters:
        - &a1
          name: slice_id
          in: path
          required: true
          description: slice id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: slice identifier
                    example: slice-a1b2c3d4
    put:
      operationId: updateSliceById
      summary: Update slice
      description: Update operation for slice resources.
      tags:
        - Slices
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update slice request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: slice data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: slice identifier
                    example: slice-a1b2c3d4
    delete:
      operationId: deleteSliceById
      summary: Delete slice
      description: Delete operation for slice resources.
      tags:
        - Slices
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: slice identifier
                    example: slice-a1b2c3d4
  /slices/{slice_id}/scale:
    post:
      operationId: actionSliceById
      summary: Action slice
      description: Action operation for slice resources.
      tags:
        - Slices
      parameters:
        - name: slice_id
          in: path
          required: true
          description: slice id
          schema:
            type: string
      requestBody:
        required: true
        description: Action slice request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: slice data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: slice identifier
                    example: slice-a1b2c3d4
  /slices/{slice_id}/metrics:
    get:
      operationId: getMetricsById
      summary: Get metrics
      description: Get operation for metrics resources.
      tags:
        - Slices
      parameters:
        - name: slice_id
          in: path
          required: true
          description: slice id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: metrics identifier
                    example: metrics-a1b2c3d4
  /templates:
    get:
      operationId: listTemplate
      summary: List template
      description: List operation for template resources.
      tags:
        - Slices
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: template identifier
                    example: template-a1b2c3d4
    post:
      operationId: createTemplate
      summary: Create template
      description: Create operation for template resources.
      tags:
        - Slices
      requestBody:
        required: true
        description: Create template request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: template data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: template identifier
                    example: template-a1b2c3d4
  /templates/{template_id}:
    get:
      operationId: getTemplateById
      summary: Get template
      description: Get operation for template resources.
      tags:
        - Slices
      parameters:
        - &a2
          name: template_id
          in: path
          required: true
          description: template id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: template identifier
                    example: template-a1b2c3d4
    put:
      operationId: updateTemplateById
      summary: Update template
      description: Update operation for template resources.
      tags:
        - Slices
      parameters:
        - *a2
      requestBody:
        required: true
        description: Update template request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: template data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: template identifier
                    example: template-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
