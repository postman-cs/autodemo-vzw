openapi: 3.0.3
info:
  title: 5G QoS Policy API
  description: 5G QoS flow management with guaranteed bit rate and priority levels for differentiated service delivery.
    Provides policy and charging control function (PCF) integration, QoS class mapping, and per-session QoS
    modification.
  version: 1.3.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-5g-qos
  x-acme-domain: 5g
servers:
  - url: https://at-5g-qos.api.acmetelecom.com/v1
    description: Production
  - url: https://at-5g-qos.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: QoS Flows
    description: 5G QoS flow management
  - name: QoS Classes
    description: QoS class identifier mapping
paths:
  /qos-flows:
    get:
      operationId: listQosFlow
      summary: List qos flow
      description: List operation for qos flow resources.
      tags:
        - QoS Flows
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: qos_flow identifier
                    example: qos_flow-a1b2c3d4
    post:
      operationId: createQosFlow
      summary: Create qos flow
      description: Create operation for qos flow resources.
      tags:
        - QoS Flows
      requestBody:
        required: true
        description: Create qos_flow request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: qos_flow data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: qos_flow identifier
                    example: qos_flow-a1b2c3d4
  /qos-flows/{flow_id}:
    get:
      operationId: getQosFlowById
      summary: Get qos flow
      description: Get operation for qos flow resources.
      tags:
        - QoS Flows
      parameters:
        - &a1
          name: flow_id
          in: path
          required: true
          description: flow id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: qos_flow identifier
                    example: qos_flow-a1b2c3d4
    put:
      operationId: updateQosFlowById
      summary: Update qos flow
      description: Update operation for qos flow resources.
      tags:
        - QoS Flows
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update qos_flow request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: qos_flow data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: qos_flow identifier
                    example: qos_flow-a1b2c3d4
    delete:
      operationId: deleteQosFlowById
      summary: Delete qos flow
      description: Delete operation for qos flow resources.
      tags:
        - QoS Flows
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: qos_flow identifier
                    example: qos_flow-a1b2c3d4
  /qos-classes:
    get:
      operationId: listQosClass
      summary: List qos class
      description: List operation for qos class resources.
      tags:
        - QoS Flows
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: qos_class identifier
                    example: qos_class-a1b2c3d4
  /qos-classes/{class_id}:
    get:
      operationId: getQosClassById
      summary: Get qos class
      description: Get operation for qos class resources.
      tags:
        - QoS Flows
      parameters:
        - name: class_id
          in: path
          required: true
          description: class id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: qos_class identifier
                    example: qos_class-a1b2c3d4
  /sessions/{session_id}/qos:
    get:
      operationId: getSessionQosById
      summary: Get session qos
      description: Get operation for session qos resources.
      tags:
        - QoS Flows
      parameters:
        - &a2
          name: session_id
          in: path
          required: true
          description: session id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: session_qos identifier
                    example: session_qos-a1b2c3d4
    put:
      operationId: updateSessionQosById
      summary: Update session qos
      description: Update operation for session qos resources.
      tags:
        - QoS Flows
      parameters:
        - *a2
      requestBody:
        required: true
        description: Update session_qos request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: session_qos data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: session_qos identifier
                    example: session_qos-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
