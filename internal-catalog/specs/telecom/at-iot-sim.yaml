openapi: 3.0.3
info:
  title: IoT SIM Management API
  description: IoT SIM and eSIM provisioning, activation, and suspension for machine-to-machine communications. Supports
    multi-IMSI profiles, global roaming SIM management, and SIM lifecycle operations across carrier networks.
  version: 2.0.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-iot-sim
  x-acme-domain: iot
servers:
  - url: https://at-iot-sim.api.acmetelecom.com/v1
    description: Production
  - url: https://at-iot-sim.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: SIMs
    description: IoT SIM card management
paths:
  /sims:
    get:
      operationId: listSim
      summary: List sim
      description: List operation for sim resources.
      tags:
        - SIMs
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: sim identifier
                    example: sim-a1b2c3d4
    post:
      operationId: createSim
      summary: Create sim
      description: Create operation for sim resources.
      tags:
        - SIMs
      requestBody:
        required: true
        description: Create sim request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: sim data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: sim identifier
                    example: sim-a1b2c3d4
  /sims/{sim_id}:
    get:
      operationId: getSimById
      summary: Get sim
      description: Get operation for sim resources.
      tags:
        - SIMs
      parameters:
        - &a1
          name: sim_id
          in: path
          required: true
          description: sim id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: sim identifier
                    example: sim-a1b2c3d4
    put:
      operationId: updateSimById
      summary: Update sim
      description: Update operation for sim resources.
      tags:
        - SIMs
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update sim request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: sim data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: sim identifier
                    example: sim-a1b2c3d4
  /sims/{sim_id}/activate:
    post:
      operationId: actionSimById
      summary: Action sim
      description: Action operation for sim resources.
      tags:
        - SIMs
      parameters:
        - name: sim_id
          in: path
          required: true
          description: sim id
          schema:
            type: string
      requestBody:
        required: true
        description: Action sim request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: sim data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: sim identifier
                    example: sim-a1b2c3d4
  /sims/{sim_id}/suspend:
    post:
      operationId: actionSimById
      summary: Action sim
      description: Action operation for sim resources.
      tags:
        - SIMs
      parameters:
        - name: sim_id
          in: path
          required: true
          description: sim id
          schema:
            type: string
      requestBody:
        required: true
        description: Action sim request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: sim data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: sim identifier
                    example: sim-a1b2c3d4
  /sims/{sim_id}/usage:
    get:
      operationId: getUsageById
      summary: Get usage
      description: Get operation for usage resources.
      tags:
        - SIMs
      parameters:
        - name: sim_id
          in: path
          required: true
          description: sim id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: usage identifier
                    example: usage-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
