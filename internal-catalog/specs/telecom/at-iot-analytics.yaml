openapi: 3.0.3
info:
  title: IoT Analytics API
  description: Fleet-level IoT analytics with anomaly detection and predictive maintenance scoring. Provides device
    behavior clustering, usage pattern analysis, and custom metric aggregation across device populations.
  version: 1.6.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-iot-analytics
  x-acme-domain: iot
servers:
  - url: https://at-iot-analytics.api.acmetelecom.com/v1
    description: Production
  - url: https://at-iot-analytics.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Analytics
    description: IoT fleet analytics
  - name: Anomalies
    description: Anomaly detection results
paths:
  /analytics/fleet-summary:
    get:
      operationId: getSummary
      summary: Get summary
      description: Get operation for summary resources.
      tags:
        - Analytics
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: summary identifier
                    example: summary-a1b2c3d4
  /analytics/anomalies:
    get:
      operationId: listAnomaly
      summary: List anomaly
      description: List operation for anomaly resources.
      tags:
        - Analytics
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: anomaly identifier
                    example: anomaly-a1b2c3d4
  /analytics/anomalies/{anomaly_id}:
    get:
      operationId: getAnomalyById
      summary: Get anomaly
      description: Get operation for anomaly resources.
      tags:
        - Analytics
      parameters:
        - name: anomaly_id
          in: path
          required: true
          description: anomaly id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: anomaly identifier
                    example: anomaly-a1b2c3d4
  /analytics/metrics:
    get:
      operationId: listMetric
      summary: List metric
      description: List operation for metric resources.
      tags:
        - Analytics
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: metric identifier
                    example: metric-a1b2c3d4
  /analytics/reports:
    get:
      operationId: listReport
      summary: List report
      description: List operation for report resources.
      tags:
        - Analytics
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: report identifier
                    example: report-a1b2c3d4
    post:
      operationId: createReport
      summary: Create report
      description: Create operation for report resources.
      tags:
        - Analytics
      requestBody:
        required: true
        description: Create report request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: report data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: report identifier
                    example: report-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
