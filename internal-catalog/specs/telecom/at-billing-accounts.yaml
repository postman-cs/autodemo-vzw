openapi: 3.0.3
info:
  title: Billing Account API
  description: Billing account lifecycle, payment profile management, and billing address configuration. Supports
    individual and corporate hierarchical billing with consolidated invoicing and split billing arrangements.
  version: 2.3.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-billing-accounts
  x-acme-domain: billing
servers:
  - url: https://at-billing-accounts.api.acmetelecom.com/v1
    description: Production
  - url: https://at-billing-accounts.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Accounts
    description: Billing account management
  - name: Payment Profiles
    description: Payment method configuration
paths:
  /accounts:
    get:
      operationId: listAccount
      summary: List account
      description: List operation for account resources.
      tags:
        - Accounts
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: account identifier
                    example: account-a1b2c3d4
    post:
      operationId: createAccount
      summary: Create account
      description: Create operation for account resources.
      tags:
        - Accounts
      requestBody:
        required: true
        description: Create account request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: account data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: account identifier
                    example: account-a1b2c3d4
  /accounts/{account_id}:
    get:
      operationId: getAccountById
      summary: Get account
      description: Get operation for account resources.
      tags:
        - Accounts
      parameters:
        - &a1
          name: account_id
          in: path
          required: true
          description: account id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: account identifier
                    example: account-a1b2c3d4
    put:
      operationId: updateAccountById
      summary: Update account
      description: Update operation for account resources.
      tags:
        - Accounts
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update account request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: account data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: account identifier
                    example: account-a1b2c3d4
  /accounts/{account_id}/payment-profiles:
    get:
      operationId: listPaymentProfileById
      summary: List payment profile
      description: List operation for payment profile resources.
      tags:
        - Accounts
      parameters:
        - &a2
          name: account_id
          in: path
          required: true
          description: account id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: payment_profile identifier
                    example: payment_profile-a1b2c3d4
    post:
      operationId: createPaymentProfileById
      summary: Create payment profile
      description: Create operation for payment profile resources.
      tags:
        - Accounts
      parameters:
        - *a2
      requestBody:
        required: true
        description: Create payment_profile request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: payment_profile data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: payment_profile identifier
                    example: payment_profile-a1b2c3d4
  /accounts/{account_id}/payment-profiles/{profile_id}:
    get:
      operationId: getPaymentProfileById
      summary: Get payment profile
      description: Get operation for payment profile resources.
      tags:
        - Accounts
      parameters:
        - &a3
          name: account_id
          in: path
          required: true
          description: account id
          schema:
            type: string
        - &a4
          name: profile_id
          in: path
          required: true
          description: profile id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: payment_profile identifier
                    example: payment_profile-a1b2c3d4
    put:
      operationId: updatePaymentProfileById
      summary: Update payment profile
      description: Update operation for payment profile resources.
      tags:
        - Accounts
      parameters:
        - *a3
        - *a4
      requestBody:
        required: true
        description: Update payment_profile request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: payment_profile data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: payment_profile identifier
                    example: payment_profile-a1b2c3d4
    delete:
      operationId: deletePaymentProfileById
      summary: Delete payment profile
      description: Delete operation for payment profile resources.
      tags:
        - Accounts
      parameters:
        - *a3
        - *a4
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: payment_profile identifier
                    example: payment_profile-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
