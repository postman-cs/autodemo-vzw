openapi: 3.0.3
info:
  title: Subscriber Profile API
  description: Customer profile, contact information, and demographic data management with full audit trails. Provides
    GDPR-compliant data access, rectification, and erasure endpoints for privacy regulation adherence.
  version: 2.2.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-subscriber-profiles
  x-acme-domain: subscriber
servers:
  - url: https://at-subscriber-profiles.api.acmetelecom.com/v1
    description: Production
  - url: https://at-subscriber-profiles.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Profiles
    description: Customer profile management
paths:
  /profiles/{subscriber_id}:
    get:
      operationId: getProfileById
      summary: Get profile
      description: Get operation for profile resources.
      tags:
        - Profiles
      parameters:
        - &a1
          name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: profile identifier
                    example: profile-a1b2c3d4
    put:
      operationId: updateProfileById
      summary: Update profile
      description: Update operation for profile resources.
      tags:
        - Profiles
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update profile request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: profile data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: profile identifier
                    example: profile-a1b2c3d4
  /profiles/{subscriber_id}/contacts:
    get:
      operationId: listContactById
      summary: List contact
      description: List operation for contact resources.
      tags:
        - Profiles
      parameters:
        - &a2
          name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: contact identifier
                    example: contact-a1b2c3d4
    post:
      operationId: createContactById
      summary: Create contact
      description: Create operation for contact resources.
      tags:
        - Profiles
      parameters:
        - *a2
      requestBody:
        required: true
        description: Create contact request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: contact data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: contact identifier
                    example: contact-a1b2c3d4
  /profiles/{subscriber_id}/contacts/{contact_id}:
    get:
      operationId: getContactById
      summary: Get contact
      description: Get operation for contact resources.
      tags:
        - Profiles
      parameters:
        - &a3
          name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
        - &a4
          name: contact_id
          in: path
          required: true
          description: contact id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: contact identifier
                    example: contact-a1b2c3d4
    put:
      operationId: updateContactById
      summary: Update contact
      description: Update operation for contact resources.
      tags:
        - Profiles
      parameters:
        - *a3
        - *a4
      requestBody:
        required: true
        description: Update contact request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: contact data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: contact identifier
                    example: contact-a1b2c3d4
    delete:
      operationId: deleteContactById
      summary: Delete contact
      description: Delete operation for contact resources.
      tags:
        - Profiles
      parameters:
        - *a3
        - *a4
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: contact identifier
                    example: contact-a1b2c3d4
  /profiles/{subscriber_id}/gdpr/export:
    post:
      operationId: createExportById
      summary: Create export
      description: Create operation for export resources.
      tags:
        - Profiles
      parameters:
        - name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
      requestBody:
        required: true
        description: Create export request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: export data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: export identifier
                    example: export-a1b2c3d4
  /profiles/{subscriber_id}/gdpr/erase:
    post:
      operationId: actionProfileById
      summary: Action profile
      description: Action operation for profile resources.
      tags:
        - Profiles
      parameters:
        - name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
      requestBody:
        required: true
        description: Action profile request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: profile data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: profile identifier
                    example: profile-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
