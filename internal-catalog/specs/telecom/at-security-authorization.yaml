openapi: 3.0.3
info:
  title: Access Control API
  description: Role-based and attribute-based access control for telecom systems and APIs. Provides API scope management,
    OAuth2 token issuance, and fine-grained permission policies with dynamic evaluation.
  version: 2.0.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-security-authorization
  x-acme-domain: security
servers:
  - url: https://at-security-authorization.api.acmetelecom.com/v1
    description: Production
  - url: https://at-security-authorization.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Roles
    description: Role management
  - name: Policies
    description: Access policy management
paths:
  /roles:
    get:
      operationId: listRole
      summary: List role
      description: List operation for role resources.
      tags:
        - Roles
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: role identifier
                    example: role-a1b2c3d4
    post:
      operationId: createRole
      summary: Create role
      description: Create operation for role resources.
      tags:
        - Roles
      requestBody:
        required: true
        description: Create role request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: role data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: role identifier
                    example: role-a1b2c3d4
  /roles/{role_id}:
    get:
      operationId: getRoleById
      summary: Get role
      description: Get operation for role resources.
      tags:
        - Roles
      parameters:
        - &a1
          name: role_id
          in: path
          required: true
          description: role id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: role identifier
                    example: role-a1b2c3d4
    put:
      operationId: updateRoleById
      summary: Update role
      description: Update operation for role resources.
      tags:
        - Roles
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update role request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: role data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: role identifier
                    example: role-a1b2c3d4
    delete:
      operationId: deleteRoleById
      summary: Delete role
      description: Delete operation for role resources.
      tags:
        - Roles
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: role identifier
                    example: role-a1b2c3d4
