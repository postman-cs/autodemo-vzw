openapi: 3.0.3
info:
  title: Self-Service Portal API
  description: Account management, bill viewing, plan changes, and support ticket creation for self-service portals.
    Provides chatbot integration hooks, FAQ search, and guided troubleshooting flows for common issues.
  version: 2.0.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-subscriber-self-service
  x-acme-domain: subscriber
servers:
  - url: https://at-subscriber-self-service.api.acmetelecom.com/v1
    description: Production
  - url: https://at-subscriber-self-service.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Portal
    description: Self-service portal operations
  - name: Support
    description: Support ticket management
paths:
  /self-service/account:
    get:
      operationId: getAccount
      summary: Get account
      description: Get operation for account resources.
      tags:
        - Portal
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: account identifier
                    example: account-a1b2c3d4
    put:
      operationId: updateAccount
      summary: Update account
      description: Update operation for account resources.
      tags:
        - Portal
      requestBody:
        required: true
        description: Update account request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: account data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: account identifier
                    example: account-a1b2c3d4
  /self-service/bills:
    get:
      operationId: listBill
      summary: List bill
      description: List operation for bill resources.
      tags:
        - Portal
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: bill identifier
                    example: bill-a1b2c3d4
  /self-service/bills/{bill_id}:
    get:
      operationId: getBillById
      summary: Get bill
      description: Get operation for bill resources.
      tags:
        - Portal
      parameters:
        - name: bill_id
          in: path
          required: true
          description: bill id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: bill identifier
                    example: bill-a1b2c3d4
  /self-service/plan-changes:
    get:
      operationId: listPlanChange
      summary: List plan change
      description: List operation for plan change resources.
      tags:
        - Portal
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: plan_change identifier
                    example: plan_change-a1b2c3d4
    post:
      operationId: createPlanChange
      summary: Create plan change
      description: Create operation for plan change resources.
      tags:
        - Portal
      requestBody:
        required: true
        description: Create plan_change request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: plan_change data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: plan_change identifier
                    example: plan_change-a1b2c3d4
  /self-service/tickets:
    get:
      operationId: listTicket
      summary: List ticket
      description: List operation for ticket resources.
      tags:
        - Portal
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ticket identifier
                    example: ticket-a1b2c3d4
    post:
      operationId: createTicket
      summary: Create ticket
      description: Create operation for ticket resources.
      tags:
        - Portal
      requestBody:
        required: true
        description: Create ticket request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: ticket data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ticket identifier
                    example: ticket-a1b2c3d4
  /self-service/tickets/{ticket_id}:
    get:
      operationId: getTicketById
      summary: Get ticket
      description: Get operation for ticket resources.
      tags:
        - Portal
      parameters:
        - &a1
          name: ticket_id
          in: path
          required: true
          description: ticket id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ticket identifier
                    example: ticket-a1b2c3d4
    put:
      operationId: updateTicketById
      summary: Update ticket
      description: Update operation for ticket resources.
      tags:
        - Portal
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update ticket request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: ticket data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ticket identifier
                    example: ticket-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
