openapi: 3.0.3
info:
  title: SIM Activation API
  description: Physical SIM and eSIM activation, profile download, and carrier switching workflows. Supports GSMA RSP for
    remote SIM provisioning, multi-IMSI profile management, and real-time activation status tracking.
  version: 2.0.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-subscriber-activation
  x-acme-domain: subscriber
servers:
  - url: https://at-subscriber-activation.api.acmetelecom.com/v1
    description: Production
  - url: https://at-subscriber-activation.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Activations
    description: SIM activation workflows
  - name: eSIM
    description: eSIM profile management
paths:
  /activations:
    get:
      operationId: listActivation
      summary: List activation
      description: List operation for activation resources.
      tags:
        - Activations
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: activation identifier
                    example: activation-a1b2c3d4
    post:
      operationId: createActivation
      summary: Create activation
      description: Create operation for activation resources.
      tags:
        - Activations
      requestBody:
        required: true
        description: Create activation request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: activation data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: activation identifier
                    example: activation-a1b2c3d4
  /activations/{activation_id}:
    get:
      operationId: getActivationById
      summary: Get activation
      description: Get operation for activation resources.
      tags:
        - Activations
      parameters:
        - name: activation_id
          in: path
          required: true
          description: activation id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: activation identifier
                    example: activation-a1b2c3d4
  /activations/{activation_id}/status:
    get:
      operationId: getStatusById
      summary: Get status
      description: Get operation for status resources.
      tags:
        - Activations
      parameters:
        - name: activation_id
          in: path
          required: true
          description: activation id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: status identifier
                    example: status-a1b2c3d4
  /esim/profiles:
    get:
      operationId: listEsimProfile
      summary: List esim profile
      description: List operation for esim profile resources.
      tags:
        - Activations
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: esim_profile identifier
                    example: esim_profile-a1b2c3d4
    post:
      operationId: createEsimProfile
      summary: Create esim profile
      description: Create operation for esim profile resources.
      tags:
        - Activations
      requestBody:
        required: true
        description: Create esim_profile request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: esim_profile data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: esim_profile identifier
                    example: esim_profile-a1b2c3d4
  /esim/profiles/{profile_id}:
    get:
      operationId: getEsimProfileById
      summary: Get esim profile
      description: Get operation for esim profile resources.
      tags:
        - Activations
      parameters:
        - &a1
          name: profile_id
          in: path
          required: true
          description: profile id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: esim_profile identifier
                    example: esim_profile-a1b2c3d4
    put:
      operationId: updateEsimProfileById
      summary: Update esim profile
      description: Update operation for esim profile resources.
      tags:
        - Activations
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update esim_profile request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: esim_profile data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: esim_profile identifier
                    example: esim_profile-a1b2c3d4
  /esim/profiles/{profile_id}/download:
    post:
      operationId: actionEsimProfileById
      summary: Action esim profile
      description: Action operation for esim profile resources.
      tags:
        - Activations
      parameters:
        - name: profile_id
          in: path
          required: true
          description: profile id
          schema:
            type: string
      requestBody:
        required: true
        description: Action esim_profile request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: esim_profile data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: esim_profile identifier
                    example: esim_profile-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
