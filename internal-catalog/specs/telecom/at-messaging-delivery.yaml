openapi: 3.0.3
info:
  title: Delivery Reports API
  description: Message delivery status tracking, DLR callbacks, and delivery analytics across all messaging channels.
    Provides failure reason categorization, retry management, and aggregate delivery performance dashboards.
  version: 1.5.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-messaging-delivery
  x-acme-domain: messaging
servers:
  - url: https://at-messaging-delivery.api.acmetelecom.com/v1
    description: Production
  - url: https://at-messaging-delivery.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Reports
    description: Delivery report queries
  - name: Callbacks
    description: DLR webhook management
paths:
  /delivery-reports:
    get:
      operationId: listReport
      summary: List report
      description: List operation for report resources.
      tags:
        - Reports
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: report identifier
                    example: report-a1b2c3d4
  /delivery-reports/{report_id}:
    get:
      operationId: getReportById
      summary: Get report
      description: Get operation for report resources.
      tags:
        - Reports
      parameters:
        - name: report_id
          in: path
          required: true
          description: report id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: report identifier
                    example: report-a1b2c3d4
  /delivery-reports/summary:
    get:
      operationId: getSummary
      summary: Get summary
      description: Get operation for summary resources.
      tags:
        - Reports
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: summary identifier
                    example: summary-a1b2c3d4
  /callbacks:
    get:
      operationId: listCallback
      summary: List callback
      description: List operation for callback resources.
      tags:
        - Reports
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: callback identifier
                    example: callback-a1b2c3d4
    post:
      operationId: createCallback
      summary: Create callback
      description: Create operation for callback resources.
      tags:
        - Reports
      requestBody:
        required: true
        description: Create callback request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: callback data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: callback identifier
                    example: callback-a1b2c3d4
  /callbacks/{callback_id}:
    get:
      operationId: getCallbackById
      summary: Get callback
      description: Get operation for callback resources.
      tags:
        - Reports
      parameters:
        - &a1
          name: callback_id
          in: path
          required: true
          description: callback id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: callback identifier
                    example: callback-a1b2c3d4
    put:
      operationId: updateCallbackById
      summary: Update callback
      description: Update operation for callback resources.
      tags:
        - Reports
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update callback request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: callback data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: callback identifier
                    example: callback-a1b2c3d4
    delete:
      operationId: deleteCallbackById
      summary: Delete callback
      description: Delete operation for callback resources.
      tags:
        - Reports
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: callback identifier
                    example: callback-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
