openapi: 3.0.3
info:
  title: Network Capacity API
  description: Capacity planning, forecasting, and threshold management for backbone and access networks. Provides traffic
    growth modeling, bandwidth utilization heatmaps, and augmentation recommendation workflows.
  version: 1.5.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-network-capacity
  x-acme-domain: network
servers:
  - url: https://at-network-capacity.api.acmetelecom.com/v1
    description: Production
  - url: https://at-network-capacity.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Capacity
    description: Capacity monitoring and planning
  - name: Forecasts
    description: Traffic growth forecasting
paths:
  /links/{link_id}/capacity:
    get:
      operationId: getCapacityById
      summary: Get capacity
      description: Get operation for capacity resources.
      tags:
        - Capacity
      parameters:
        - name: link_id
          in: path
          required: true
          description: link id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: capacity identifier
                    example: capacity-a1b2c3d4
  /links/{link_id}/utilization:
    get:
      operationId: listUtilizationById
      summary: List utilization
      description: List operation for utilization resources.
      tags:
        - Capacity
      parameters:
        - name: link_id
          in: path
          required: true
          description: link id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: utilization identifier
                    example: utilization-a1b2c3d4
  /forecasts:
    get:
      operationId: listForecast
      summary: List forecast
      description: List operation for forecast resources.
      tags:
        - Capacity
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: forecast identifier
                    example: forecast-a1b2c3d4
    post:
      operationId: createForecast
      summary: Create forecast
      description: Create operation for forecast resources.
      tags:
        - Capacity
      requestBody:
        required: true
        description: Create forecast request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: forecast data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: forecast identifier
                    example: forecast-a1b2c3d4
  /forecasts/{forecast_id}:
    get:
      operationId: getForecastById
      summary: Get forecast
      description: Get operation for forecast resources.
      tags:
        - Capacity
      parameters:
        - name: forecast_id
          in: path
          required: true
          description: forecast id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: forecast identifier
                    example: forecast-a1b2c3d4
  /thresholds:
    get:
      operationId: listThreshold
      summary: List threshold
      description: List operation for threshold resources.
      tags:
        - Capacity
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: threshold identifier
                    example: threshold-a1b2c3d4
    post:
      operationId: createThreshold
      summary: Create threshold
      description: Create operation for threshold resources.
      tags:
        - Capacity
      requestBody:
        required: true
        description: Create threshold request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: threshold data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: threshold identifier
                    example: threshold-a1b2c3d4
  /thresholds/{threshold_id}:
    get:
      operationId: getThresholdById
      summary: Get threshold
      description: Get operation for threshold resources.
      tags:
        - Capacity
      parameters:
        - &a1
          name: threshold_id
          in: path
          required: true
          description: threshold id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: threshold identifier
                    example: threshold-a1b2c3d4
    put:
      operationId: updateThresholdById
      summary: Update threshold
      description: Update operation for threshold resources.
      tags:
        - Capacity
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update threshold request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: threshold data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: threshold identifier
                    example: threshold-a1b2c3d4
    delete:
      operationId: deleteThresholdById
      summary: Delete threshold
      description: Delete operation for threshold resources.
      tags:
        - Capacity
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: threshold identifier
                    example: threshold-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
