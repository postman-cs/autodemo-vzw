openapi: 3.0.3
info:
  title: Rating Engine API
  description: Real-time event rating for voice calls, data sessions, and value-added services. Supports tiered pricing,
    time-of-day rate variations, promotional discounts, and bundle allowance deduction with rating override
    capabilities.
  version: 2.1.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-billing-rating
  x-acme-domain: billing
servers:
  - url: https://at-billing-rating.api.acmetelecom.com/v1
    description: Production
  - url: https://at-billing-rating.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Rating
    description: Real-time event rating
  - name: Rate Plans
    description: Rate plan configuration
paths:
  /rate-events:
    post:
      operationId: createRatedEvent
      summary: Create rated event
      description: Create operation for rated event resources.
      tags:
        - Rating
      requestBody:
        required: true
        description: Create rated_event request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: rated_event data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rated_event identifier
                    example: rated_event-a1b2c3d4
  /rate-events/{event_id}:
    get:
      operationId: getRatedEventById
      summary: Get rated event
      description: Get operation for rated event resources.
      tags:
        - Rating
      parameters:
        - name: event_id
          in: path
          required: true
          description: event id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rated_event identifier
                    example: rated_event-a1b2c3d4
  /rate-plans:
    get:
      operationId: listRatePlan
      summary: List rate plan
      description: List operation for rate plan resources.
      tags:
        - Rating
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rate_plan identifier
                    example: rate_plan-a1b2c3d4
    post:
      operationId: createRatePlan
      summary: Create rate plan
      description: Create operation for rate plan resources.
      tags:
        - Rating
      requestBody:
        required: true
        description: Create rate_plan request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: rate_plan data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rate_plan identifier
                    example: rate_plan-a1b2c3d4
  /rate-plans/{plan_id}:
    get:
      operationId: getRatePlanById
      summary: Get rate plan
      description: Get operation for rate plan resources.
      tags:
        - Rating
      parameters:
        - &a1
          name: plan_id
          in: path
          required: true
          description: plan id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rate_plan identifier
                    example: rate_plan-a1b2c3d4
    put:
      operationId: updateRatePlanById
      summary: Update rate plan
      description: Update operation for rate plan resources.
      tags:
        - Rating
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update rate_plan request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: rate_plan data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rate_plan identifier
                    example: rate_plan-a1b2c3d4
  /rate-plans/{plan_id}/tiers:
    get:
      operationId: listTierById
      summary: List tier
      description: List operation for tier resources.
      tags:
        - Rating
      parameters:
        - name: plan_id
          in: path
          required: true
          description: plan id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: tier identifier
                    example: tier-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
