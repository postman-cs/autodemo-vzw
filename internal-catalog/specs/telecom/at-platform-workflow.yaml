openapi: 3.0.3
info:
  title: Workflow Engine API
  description: Configurable workflow orchestration for telecom operations with BPMN-compatible process definitions.
    Provides human task management, parallel execution paths, and workflow analytics with SLA tracking.
  version: 1.8.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-platform-workflow
  x-acme-domain: platform
servers:
  - url: https://at-platform-workflow.api.acmetelecom.com/v1
    description: Production
  - url: https://at-platform-workflow.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Workflows
    description: Workflow definition and execution
  - name: Tasks
    description: Human task management
paths:
  /workflows:
    get:
      operationId: listWorkflow
      summary: List workflow
      description: List operation for workflow resources.
      tags:
        - Workflows
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: workflow identifier
                    example: workflow-a1b2c3d4
    post:
      operationId: createWorkflow
      summary: Create workflow
      description: Create operation for workflow resources.
      tags:
        - Workflows
      requestBody:
        required: true
        description: Create workflow request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: workflow data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: workflow identifier
                    example: workflow-a1b2c3d4
  /workflows/{workflow_id}:
    get:
      operationId: getWorkflowById
      summary: Get workflow
      description: Get operation for workflow resources.
      tags:
        - Workflows
      parameters:
        - &a1
          name: workflow_id
          in: path
          required: true
          description: workflow id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: workflow identifier
                    example: workflow-a1b2c3d4
    put:
      operationId: updateWorkflowById
      summary: Update workflow
      description: Update operation for workflow resources.
      tags:
        - Workflows
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update workflow request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: workflow data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: workflow identifier
                    example: workflow-a1b2c3d4
  /workflows/{workflow_id}/instances:
    get:
      operationId: listInstanceById
      summary: List instance
      description: List operation for instance resources.
      tags:
        - Workflows
      parameters:
        - &a2
          name: workflow_id
          in: path
          required: true
          description: workflow id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: instance identifier
                    example: instance-a1b2c3d4
    post:
      operationId: createInstanceById
      summary: Create instance
      description: Create operation for instance resources.
      tags:
        - Workflows
      parameters:
        - *a2
      requestBody:
        required: true
        description: Create instance request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: instance data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: instance identifier
                    example: instance-a1b2c3d4
  /instances/{instance_id}:
    get:
      operationId: getInstanceById
      summary: Get instance
      description: Get operation for instance resources.
      tags:
        - Workflows
      parameters:
        - name: instance_id
          in: path
          required: true
          description: instance id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: instance identifier
                    example: instance-a1b2c3d4
  /instances/{instance_id}/tasks:
    get:
      operationId: listTaskById
      summary: List task
      description: List operation for task resources.
      tags:
        - Workflows
      parameters:
        - name: instance_id
          in: path
          required: true
          description: instance id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: task identifier
                    example: task-a1b2c3d4
  /tasks/{task_id}/complete:
    post:
      operationId: actionTaskById
      summary: Action task
      description: Action operation for task resources.
      tags:
        - Workflows
      parameters:
        - name: task_id
          in: path
          required: true
          description: task id
          schema:
            type: string
      requestBody:
        required: true
        description: Action task request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: task data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: task identifier
                    example: task-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
