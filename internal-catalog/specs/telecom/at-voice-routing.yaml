openapi: 3.0.3
info:
  title: Call Routing API
  description: Intelligent call routing rules with least-cost routing, geographic routing, and time-based rules. Supports
    failover chains, load balancing across trunks, and dynamic routing based on caller attributes and queue depth.
  version: 2.2.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-voice-routing
  x-acme-domain: voice
servers:
  - url: https://at-voice-routing.api.acmetelecom.com/v1
    description: Production
  - url: https://at-voice-routing.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Rules
    description: Routing rule management
  - name: Routes
    description: Route path configuration
paths:
  /routing/rules:
    get:
      operationId: listRule
      summary: List rule
      description: List operation for rule resources.
      tags:
        - Rules
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rule identifier
                    example: rule-a1b2c3d4
    post:
      operationId: createRule
      summary: Create rule
      description: Create operation for rule resources.
      tags:
        - Rules
      requestBody:
        required: true
        description: Create rule request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: rule data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rule identifier
                    example: rule-a1b2c3d4
  /routing/rules/{rule_id}:
    get:
      operationId: getRuleById
      summary: Get rule
      description: Get operation for rule resources.
      tags:
        - Rules
      parameters:
        - &a1
          name: rule_id
          in: path
          required: true
          description: rule id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rule identifier
                    example: rule-a1b2c3d4
    put:
      operationId: updateRuleById
      summary: Update rule
      description: Update operation for rule resources.
      tags:
        - Rules
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update rule request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: rule data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rule identifier
                    example: rule-a1b2c3d4
    delete:
      operationId: deleteRuleById
      summary: Delete rule
      description: Delete operation for rule resources.
      tags:
        - Rules
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rule identifier
                    example: rule-a1b2c3d4
  /routing/routes:
    get:
      operationId: listRoute
      summary: List route
      description: List operation for route resources.
      tags:
        - Rules
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: route identifier
                    example: route-a1b2c3d4
    post:
      operationId: createRoute
      summary: Create route
      description: Create operation for route resources.
      tags:
        - Rules
      requestBody:
        required: true
        description: Create route request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: route data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: route identifier
                    example: route-a1b2c3d4
  /routing/routes/{route_id}:
    get:
      operationId: getRouteById
      summary: Get route
      description: Get operation for route resources.
      tags:
        - Rules
      parameters:
        - &a2
          name: route_id
          in: path
          required: true
          description: route id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: route identifier
                    example: route-a1b2c3d4
    put:
      operationId: updateRouteById
      summary: Update route
      description: Update operation for route resources.
      tags:
        - Rules
      parameters:
        - *a2
      requestBody:
        required: true
        description: Update route request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: route data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: route identifier
                    example: route-a1b2c3d4
  /routing/test:
    post:
      operationId: createTestResult
      summary: Create test result
      description: Create operation for test result resources.
      tags:
        - Rules
      requestBody:
        required: true
        description: Create test_result request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: test_result data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: test_result identifier
                    example: test_result-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
