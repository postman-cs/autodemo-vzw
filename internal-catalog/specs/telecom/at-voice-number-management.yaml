openapi: 3.0.3
info:
  title: Number Management API
  description: Phone number inventory, allocation, and reservation for toll-free, local, and international numbers.
    Manages number lifecycle including porting, regulatory compliance documentation, and vanity number search.
  version: 2.1.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-voice-number-management
  x-acme-domain: voice
servers:
  - url: https://at-voice-number-management.api.acmetelecom.com/v1
    description: Production
  - url: https://at-voice-number-management.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Numbers
    description: Phone number inventory
  - name: Orders
    description: Number acquisition orders
paths:
  /numbers:
    get:
      operationId: listNumber
      summary: List number
      description: List operation for number resources.
      tags:
        - Numbers
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: number identifier
                    example: number-a1b2c3d4
  /numbers/{number_id}:
    get:
      operationId: getNumberById
      summary: Get number
      description: Get operation for number resources.
      tags:
        - Numbers
      parameters:
        - &a1
          name: number_id
          in: path
          required: true
          description: number id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: number identifier
                    example: number-a1b2c3d4
    put:
      operationId: updateNumberById
      summary: Update number
      description: Update operation for number resources.
      tags:
        - Numbers
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update number request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: number data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: number identifier
                    example: number-a1b2c3d4
  /numbers/search:
    post:
      operationId: searchNumber
      summary: Search number
      description: Search operation for number resources.
      tags:
        - Numbers
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      requestBody:
        required: true
        description: Search number request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: number data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: number identifier
                    example: number-a1b2c3d4
  /numbers/reserve:
    post:
      operationId: createReservation
      summary: Create reservation
      description: Create operation for reservation resources.
      tags:
        - Numbers
      requestBody:
        required: true
        description: Create reservation request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: reservation data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: reservation identifier
                    example: reservation-a1b2c3d4
  /orders:
    get:
      operationId: listOrder
      summary: List order
      description: List operation for order resources.
      tags:
        - Numbers
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: order identifier
                    example: order-a1b2c3d4
    post:
      operationId: createOrder
      summary: Create order
      description: Create operation for order resources.
      tags:
        - Numbers
      requestBody:
        required: true
        description: Create order request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: order data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: order identifier
                    example: order-a1b2c3d4
  /orders/{order_id}:
    get:
      operationId: getOrderById
      summary: Get order
      description: Get operation for order resources.
      tags:
        - Numbers
      parameters:
        - name: order_id
          in: path
          required: true
          description: order id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: order identifier
                    example: order-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
