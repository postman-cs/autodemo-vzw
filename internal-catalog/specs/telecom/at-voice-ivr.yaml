openapi: 3.0.3
info:
  title: IVR Management API
  description: Interactive voice response flow design, deployment, and analytics with visual flow builder integration.
    Supports DTMF and speech recognition, natural language understanding, and dynamic menu generation from API data.
  version: 2.0.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-voice-ivr
  x-acme-domain: voice
servers:
  - url: https://at-voice-ivr.api.acmetelecom.com/v1
    description: Production
  - url: https://at-voice-ivr.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Flows
    description: IVR flow management
  - name: Analytics
    description: IVR performance analytics
paths:
  /flows:
    get:
      operationId: listFlow
      summary: List flow
      description: List operation for flow resources.
      tags:
        - Flows
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: flow identifier
                    example: flow-a1b2c3d4
    post:
      operationId: createFlow
      summary: Create flow
      description: Create operation for flow resources.
      tags:
        - Flows
      requestBody:
        required: true
        description: Create flow request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: flow data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: flow identifier
                    example: flow-a1b2c3d4
  /flows/{flow_id}:
    get:
      operationId: getFlowById
      summary: Get flow
      description: Get operation for flow resources.
      tags:
        - Flows
      parameters:
        - &a1
          name: flow_id
          in: path
          required: true
          description: flow id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: flow identifier
                    example: flow-a1b2c3d4
    put:
      operationId: updateFlowById
      summary: Update flow
      description: Update operation for flow resources.
      tags:
        - Flows
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update flow request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: flow data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: flow identifier
                    example: flow-a1b2c3d4
    delete:
      operationId: deleteFlowById
      summary: Delete flow
      description: Delete operation for flow resources.
      tags:
        - Flows
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: flow identifier
                    example: flow-a1b2c3d4
  /flows/{flow_id}/publish:
    post:
      operationId: actionFlowById
      summary: Action flow
      description: Action operation for flow resources.
      tags:
        - Flows
      parameters:
        - name: flow_id
          in: path
          required: true
          description: flow id
          schema:
            type: string
      requestBody:
        required: true
        description: Action flow request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: flow data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: flow identifier
                    example: flow-a1b2c3d4
  /flows/{flow_id}/analytics:
    get:
      operationId: getAnalyticsById
      summary: Get analytics
      description: Get operation for analytics resources.
      tags:
        - Flows
      parameters:
        - name: flow_id
          in: path
          required: true
          description: flow id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: analytics identifier
                    example: analytics-a1b2c3d4
  /flows/{flow_id}/versions:
    get:
      operationId: listVersionById
      summary: List version
      description: List operation for version resources.
      tags:
        - Flows
      parameters:
        - name: flow_id
          in: path
          required: true
          description: flow id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: version identifier
                    example: version-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
