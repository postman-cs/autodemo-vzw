openapi: 3.0.3
info:
  title: Unified Communications API
  description: UCaaS platform management with voice, video, messaging, and presence capabilities. Integrates with
    Microsoft Teams, Zoom, and other collaboration platforms for seamless enterprise communication workflows.
  version: 1.4.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-enterprise-unified-comms
  x-acme-domain: enterprise
servers:
  - url: https://at-enterprise-unified-comms.api.acmetelecom.com/v1
    description: Production
  - url: https://at-enterprise-unified-comms.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Users
    description: UC user management
  - name: Features
    description: UC feature configuration
paths:
  /users:
    get:
      operationId: listUser
      summary: List user
      description: List operation for user resources.
      tags:
        - Users
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: user identifier
                    example: user-a1b2c3d4
    post:
      operationId: createUser
      summary: Create user
      description: Create operation for user resources.
      tags:
        - Users
      requestBody:
        required: true
        description: Create user request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: user data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: user identifier
                    example: user-a1b2c3d4
  /users/{user_id}:
    get:
      operationId: getUserById
      summary: Get user
      description: Get operation for user resources.
      tags:
        - Users
      parameters:
        - &a1
          name: user_id
          in: path
          required: true
          description: user id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: user identifier
                    example: user-a1b2c3d4
    put:
      operationId: updateUserById
      summary: Update user
      description: Update operation for user resources.
      tags:
        - Users
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update user request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: user data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: user identifier
                    example: user-a1b2c3d4
    delete:
      operationId: deleteUserById
      summary: Delete user
      description: Delete operation for user resources.
      tags:
        - Users
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: user identifier
                    example: user-a1b2c3d4
  /users/{user_id}/features:
    get:
      operationId: getFeaturesById
      summary: Get features
      description: Get operation for features resources.
      tags:
        - Users
      parameters:
        - &a2
          name: user_id
          in: path
          required: true
          description: user id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: features identifier
                    example: features-a1b2c3d4
    put:
      operationId: updateFeaturesById
      summary: Update features
      description: Update operation for features resources.
      tags:
        - Users
      parameters:
        - *a2
      requestBody:
        required: true
        description: Update features request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: features data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: features identifier
                    example: features-a1b2c3d4
  /users/{user_id}/presence:
    get:
      operationId: getPresenceById
      summary: Get presence
      description: Get operation for presence resources.
      tags:
        - Users
      parameters:
        - name: user_id
          in: path
          required: true
          description: user id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: presence identifier
                    example: presence-a1b2c3d4
  /integrations:
    get:
      operationId: listIntegration
      summary: List integration
      description: List operation for integration resources.
      tags:
        - Users
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: integration identifier
                    example: integration-a1b2c3d4
    post:
      operationId: createIntegration
      summary: Create integration
      description: Create operation for integration resources.
      tags:
        - Users
      requestBody:
        required: true
        description: Create integration request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: integration data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: integration identifier
                    example: integration-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
