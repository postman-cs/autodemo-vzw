openapi: 3.0.3
info:
  title: Voicemail API
  description: Visual voicemail management with speech-to-text transcription and inbox organization. Provides greeting
    customization, message forwarding, and notification preferences for voicemail delivery across devices.
  version: 1.3.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-voice-voicemail
  x-acme-domain: voice
servers:
  - url: https://at-voice-voicemail.api.acmetelecom.com/v1
    description: Production
  - url: https://at-voice-voicemail.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Messages
    description: Voicemail message management
  - name: Greetings
    description: Voicemail greeting configuration
paths:
  /voicemail/{subscriber_id}/messages:
    get:
      operationId: listMessageById
      summary: List message
      description: List operation for message resources.
      tags:
        - Messages
      parameters:
        - name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: message identifier
                    example: message-a1b2c3d4
  /voicemail/{subscriber_id}/messages/{message_id}:
    get:
      operationId: getMessageById
      summary: Get message
      description: Get operation for message resources.
      tags:
        - Messages
      parameters:
        - &a1
          name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
        - &a2
          name: message_id
          in: path
          required: true
          description: message id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: message identifier
                    example: message-a1b2c3d4
    delete:
      operationId: deleteMessageById
      summary: Delete message
      description: Delete operation for message resources.
      tags:
        - Messages
      parameters:
        - *a1
        - *a2
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: message identifier
                    example: message-a1b2c3d4
  /voicemail/{subscriber_id}/messages/{message_id}/transcription:
    get:
      operationId: getTranscriptionById
      summary: Get transcription
      description: Get operation for transcription resources.
      tags:
        - Messages
      parameters:
        - name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
        - name: message_id
          in: path
          required: true
          description: message id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: transcription identifier
                    example: transcription-a1b2c3d4
  /voicemail/{subscriber_id}/greetings:
    get:
      operationId: listGreetingById
      summary: List greeting
      description: List operation for greeting resources.
      tags:
        - Messages
      parameters:
        - &a3
          name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: greeting identifier
                    example: greeting-a1b2c3d4
    post:
      operationId: createGreetingById
      summary: Create greeting
      description: Create operation for greeting resources.
      tags:
        - Messages
      parameters:
        - *a3
      requestBody:
        required: true
        description: Create greeting request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: greeting data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: greeting identifier
                    example: greeting-a1b2c3d4
  /voicemail/{subscriber_id}/greetings/{greeting_id}:
    get:
      operationId: getGreetingById
      summary: Get greeting
      description: Get operation for greeting resources.
      tags:
        - Messages
      parameters:
        - &a4
          name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
        - &a5
          name: greeting_id
          in: path
          required: true
          description: greeting id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: greeting identifier
                    example: greeting-a1b2c3d4
    put:
      operationId: updateGreetingById
      summary: Update greeting
      description: Update operation for greeting resources.
      tags:
        - Messages
      parameters:
        - *a4
        - *a5
      requestBody:
        required: true
        description: Update greeting request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: greeting data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: greeting identifier
                    example: greeting-a1b2c3d4
    delete:
      operationId: deleteGreetingById
      summary: Delete greeting
      description: Delete operation for greeting resources.
      tags:
        - Messages
      parameters:
        - *a4
        - *a5
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: greeting identifier
                    example: greeting-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
