openapi: 3.0.3
info:
  title: Content Streaming API
  description: Video and audio streaming with adaptive bitrate delivery for live and VOD content. Provides DRM
    integration, multi-device session management, and bandwidth-adaptive quality selection for optimal viewing
    experiences.
  version: 2.3.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-media-streaming
  x-acme-domain: media
servers:
  - url: https://at-media-streaming.api.acmetelecom.com/v1
    description: Production
  - url: https://at-media-streaming.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Streams
    description: Stream session management
  - name: Content
    description: Content catalog access
paths:
  /streams:
    get:
      operationId: listStream
      summary: List stream
      description: List operation for stream resources.
      tags:
        - Streams
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: stream identifier
                    example: stream-a1b2c3d4
    post:
      operationId: createStream
      summary: Create stream
      description: Create operation for stream resources.
      tags:
        - Streams
      requestBody:
        required: true
        description: Create stream request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: stream data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: stream identifier
                    example: stream-a1b2c3d4
  /streams/{stream_id}:
    get:
      operationId: getStreamById
      summary: Get stream
      description: Get operation for stream resources.
      tags:
        - Streams
      parameters:
        - name: stream_id
          in: path
          required: true
          description: stream id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: stream identifier
                    example: stream-a1b2c3d4
  /streams/{stream_id}/heartbeat:
    post:
      operationId: actionStreamById
      summary: Action stream
      description: Action operation for stream resources.
      tags:
        - Streams
      parameters:
        - name: stream_id
          in: path
          required: true
          description: stream id
          schema:
            type: string
      requestBody:
        required: true
        description: Action stream request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: stream data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: stream identifier
                    example: stream-a1b2c3d4
  /content:
    get:
      operationId: listContent
      summary: List content
      description: List operation for content resources.
      tags:
        - Streams
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: content identifier
                    example: content-a1b2c3d4
  /content/{content_id}:
    get:
      operationId: getContentById
      summary: Get content
      description: Get operation for content resources.
      tags:
        - Streams
      parameters:
        - name: content_id
          in: path
          required: true
          description: content id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: content identifier
                    example: content-a1b2c3d4
  /content/{content_id}/playback-url:
    post:
      operationId: createPlaybackById
      summary: Create playback
      description: Create operation for playback resources.
      tags:
        - Streams
      parameters:
        - name: content_id
          in: path
          required: true
          description: content id
          schema:
            type: string
      requestBody:
        required: true
        description: Create playback request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: playback data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: playback identifier
                    example: playback-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
