openapi: 3.0.3
info:
  title: Prepaid Balance API
  description: Prepaid account balance management, top-up processing, and voucher redemption with real-time balance
    deduction. Supports auto-recharge configuration, balance transfer between accounts, and expiry management.
  version: 2.5.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-billing-prepaid
  x-acme-domain: billing
servers:
  - url: https://at-billing-prepaid.api.acmetelecom.com/v1
    description: Production
  - url: https://at-billing-prepaid.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Balances
    description: Prepaid balance operations
  - name: Top-Ups
    description: Balance top-up processing
paths:
  /prepaid/{subscriber_id}/balance:
    get:
      operationId: getBalanceById
      summary: Get balance
      description: Get operation for balance resources.
      tags:
        - Balances
      parameters:
        - name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: balance identifier
                    example: balance-a1b2c3d4
  /prepaid/{subscriber_id}/top-up:
    post:
      operationId: createTopUpById
      summary: Create top up
      description: Create operation for top up resources.
      tags:
        - Balances
      parameters:
        - name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
      requestBody:
        required: true
        description: Create top_up request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: top_up data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: top_up identifier
                    example: top_up-a1b2c3d4
  /prepaid/{subscriber_id}/transactions:
    get:
      operationId: listTransactionById
      summary: List transaction
      description: List operation for transaction resources.
      tags:
        - Balances
      parameters:
        - name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: transaction identifier
                    example: transaction-a1b2c3d4
  /prepaid/{subscriber_id}/auto-recharge:
    get:
      operationId: getAutoRechargeById
      summary: Get auto recharge
      description: Get operation for auto recharge resources.
      tags:
        - Balances
      parameters:
        - &a1
          name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: auto_recharge identifier
                    example: auto_recharge-a1b2c3d4
    put:
      operationId: updateAutoRechargeById
      summary: Update auto recharge
      description: Update operation for auto recharge resources.
      tags:
        - Balances
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update auto_recharge request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: auto_recharge data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: auto_recharge identifier
                    example: auto_recharge-a1b2c3d4
  /vouchers/redeem:
    post:
      operationId: createRedemption
      summary: Create redemption
      description: Create operation for redemption resources.
      tags:
        - Balances
      requestBody:
        required: true
        description: Create redemption request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: redemption data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: redemption identifier
                    example: redemption-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
