          name: developer_id
          in: path
          required: true
          description: developer id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: developer identifier
                    example: developer-a1b2c3d4
    put:
      operationId: updateDeveloperById
      summary: Update developer
      description: Update operation for developer resources.
      tags:
