openapi: 3.0.3
info:
  title: Telecom API Gateway
  description: API exposure platform for monetizing telecom network capabilities to third-party developers. Provides
    developer portal management, rate limiting, usage-based API billing, and sandbox environment provisioning.
  version: 2.5.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-enterprise-api-gateway
  x-acme-domain: enterprise
servers:
  - url: https://at-enterprise-api-gateway.api.acmetelecom.com/v1
    description: Production
  - url: https://at-enterprise-api-gateway.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: APIs
    description: API product management
  - name: Developers
    description: Developer account management
paths:
  /apis:
    get:
      operationId: listApi
      summary: List api
      description: List operation for api resources.
      tags:
        - APIs
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: api identifier
                    example: api-a1b2c3d4
    post:
      operationId: createApi
      summary: Create api
      description: Create operation for api resources.
      tags:
        - APIs
      requestBody:
        required: true
        description: Create api request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: api data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: api identifier
                    example: api-a1b2c3d4
  /apis/{api_id}:
    get:
      operationId: getApiById
      summary: Get api
      description: Get operation for api resources.
      tags:
        - APIs
      parameters:
        - &a1
          name: api_id
          in: path
          required: true
          description: api id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: api identifier
                    example: api-a1b2c3d4
    put:
      operationId: updateApiById
      summary: Update api
      description: Update operation for api resources.
      tags:
        - APIs
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update api request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: api data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: api identifier
                    example: api-a1b2c3d4
  /apis/{api_id}/subscriptions:
    get:
      operationId: listSubscriptionById
      summary: List subscription
      description: List operation for subscription resources.
      tags:
        - APIs
      parameters:
        - name: api_id
          in: path
          required: true
          description: api id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: subscription identifier
                    example: subscription-a1b2c3d4
  /developers:
    get:
      operationId: listDeveloper
      summary: List developer
      description: List operation for developer resources.
      tags:
        - APIs
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
