openapi: 3.0.3
info:
  title: Network Maintenance API
  description: Planned maintenance window scheduling, impact analysis, and customer notification for network changes.
    Integrates with change management systems and provides automated service-impact calculation across affected
    subscribers.
  version: 1.4.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-network-maintenance
  x-acme-domain: network
servers:
  - url: https://at-network-maintenance.api.acmetelecom.com/v1
    description: Production
  - url: https://at-network-maintenance.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Windows
    description: Maintenance window scheduling
  - name: Impact
    description: Service impact analysis
paths:
  /maintenance-windows:
    get:
      operationId: listWindow
      summary: List window
      description: List operation for window resources.
      tags:
        - Windows
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: window identifier
                    example: window-a1b2c3d4
    post:
      operationId: createWindow
      summary: Create window
      description: Create operation for window resources.
      tags:
        - Windows
      requestBody:
        required: true
        description: Create window request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: window data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: window identifier
                    example: window-a1b2c3d4
  /maintenance-windows/{window_id}:
    get:
      operationId: getWindowById
      summary: Get window
      description: Get operation for window resources.
      tags:
        - Windows
      parameters:
        - &a1
          name: window_id
          in: path
          required: true
          description: window id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: window identifier
                    example: window-a1b2c3d4
    put:
      operationId: updateWindowById
      summary: Update window
      description: Update operation for window resources.
      tags:
        - Windows
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update window request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: window data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: window identifier
                    example: window-a1b2c3d4
    delete:
      operationId: deleteWindowById
      summary: Delete window
      description: Delete operation for window resources.
      tags:
        - Windows
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: window identifier
                    example: window-a1b2c3d4
  /maintenance-windows/{window_id}/impact:
    get:
      operationId: getImpactById
      summary: Get impact
      description: Get operation for impact resources.
      tags:
        - Windows
      parameters:
        - name: window_id
          in: path
          required: true
          description: window id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: impact identifier
                    example: impact-a1b2c3d4
  /maintenance-windows/{window_id}/approve:
    post:
      operationId: actionWindowById
      summary: Action window
      description: Action operation for window resources.
      tags:
        - Windows
      parameters:
        - name: window_id
          in: path
          required: true
          description: window id
          schema:
            type: string
      requestBody:
        required: true
        description: Action window request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: window data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: window identifier
                    example: window-a1b2c3d4
  /maintenance-windows/{window_id}/notifications:
    get:
      operationId: listNotificationById
      summary: List notification
      description: List operation for notification resources.
      tags:
        - Windows
      parameters:
        - name: window_id
          in: path
          required: true
          description: window id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: notification identifier
                    example: notification-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
