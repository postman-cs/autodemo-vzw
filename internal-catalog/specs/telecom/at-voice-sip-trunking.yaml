openapi: 3.0.3
info:
  title: SIP Trunking API
  description: SIP trunk provisioning, capacity management, and codec configuration for voice interconnect. Supports
    emergency calling (E911) registration, STIR/SHAKEN attestation, and trunk group high-availability configuration.
  version: 1.9.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-voice-sip-trunking
  x-acme-domain: voice
servers:
  - url: https://at-voice-sip-trunking.api.acmetelecom.com/v1
    description: Production
  - url: https://at-voice-sip-trunking.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Trunks
    description: SIP trunk management
  - name: E911
    description: Emergency calling configuration
paths:
  /trunks:
    get:
      operationId: listTrunk
      summary: List trunk
      description: List operation for trunk resources.
      tags:
        - Trunks
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: trunk identifier
                    example: trunk-a1b2c3d4
    post:
      operationId: createTrunk
      summary: Create trunk
      description: Create operation for trunk resources.
      tags:
        - Trunks
      requestBody:
        required: true
        description: Create trunk request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: trunk data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: trunk identifier
                    example: trunk-a1b2c3d4
  /trunks/{trunk_id}:
    get:
      operationId: getTrunkById
      summary: Get trunk
      description: Get operation for trunk resources.
      tags:
        - Trunks
      parameters:
        - &a1
          name: trunk_id
          in: path
          required: true
          description: trunk id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: trunk identifier
                    example: trunk-a1b2c3d4
    put:
      operationId: updateTrunkById
      summary: Update trunk
      description: Update operation for trunk resources.
      tags:
        - Trunks
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update trunk request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: trunk data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: trunk identifier
                    example: trunk-a1b2c3d4
    delete:
      operationId: deleteTrunkById
      summary: Delete trunk
      description: Delete operation for trunk resources.
      tags:
        - Trunks
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: trunk identifier
                    example: trunk-a1b2c3d4
  /trunks/{trunk_id}/credentials:
    get:
      operationId: getCredentialsById
      summary: Get credentials
      description: Get operation for credentials resources.
      tags:
        - Trunks
      parameters:
        - &a2
          name: trunk_id
          in: path
          required: true
          description: trunk id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: credentials identifier
                    example: credentials-a1b2c3d4
    put:
      operationId: updateCredentialsById
      summary: Update credentials
      description: Update operation for credentials resources.
      tags:
        - Trunks
      parameters:
        - *a2
      requestBody:
        required: true
        description: Update credentials request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: credentials data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: credentials identifier
                    example: credentials-a1b2c3d4
  /trunks/{trunk_id}/e911:
    get:
      operationId: getE911ConfigById
      summary: Get e911 config
      description: Get operation for e911 config resources.
      tags:
        - Trunks
      parameters:
        - &a3
          name: trunk_id
          in: path
          required: true
          description: trunk id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: e911_config identifier
                    example: e911_config-a1b2c3d4
    put:
      operationId: updateE911ConfigById
      summary: Update e911 config
      description: Update operation for e911 config resources.
      tags:
        - Trunks
      parameters:
        - *a3
      requestBody:
        required: true
        description: Update e911_config request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: e911_config data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: e911_config identifier
                    example: e911_config-a1b2c3d4
  /trunks/{trunk_id}/health:
    get:
      operationId: getHealthById
      summary: Get health
      description: Get operation for health resources.
      tags:
        - Trunks
      parameters:
        - name: trunk_id
          in: path
          required: true
          description: trunk id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: health identifier
                    example: health-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
