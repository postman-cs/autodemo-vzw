openapi: 3.0.3
info:
  title: Email Gateway API
  description: Transactional and marketing email delivery with template rendering and variable substitution. Provides
    DKIM/SPF authentication, bounce handling, reputation monitoring, and engagement analytics for deliverability
    optimization.
  version: 1.8.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-messaging-email
  x-acme-domain: messaging
servers:
  - url: https://at-messaging-email.api.acmetelecom.com/v1
    description: Production
  - url: https://at-messaging-email.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Emails
    description: Email sending and tracking
  - name: Reputation
    description: Sender reputation management
paths:
  /emails:
    get:
      operationId: listEmail
      summary: List email
      description: List operation for email resources.
      tags:
        - Emails
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: email identifier
                    example: email-a1b2c3d4
    post:
      operationId: createEmail
      summary: Create email
      description: Create operation for email resources.
      tags:
        - Emails
      requestBody:
        required: true
        description: Create email request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: email data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: email identifier
                    example: email-a1b2c3d4
  /emails/{email_id}:
    get:
      operationId: getEmailById
      summary: Get email
      description: Get operation for email resources.
      tags:
        - Emails
      parameters:
        - name: email_id
          in: path
          required: true
          description: email id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: email identifier
                    example: email-a1b2c3d4
  /emails/{email_id}/status:
    get:
      operationId: getStatusById
      summary: Get status
      description: Get operation for status resources.
      tags:
        - Emails
      parameters:
        - name: email_id
          in: path
          required: true
          description: email id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: status identifier
                    example: status-a1b2c3d4
  /domains:
    get:
      operationId: listDomain
      summary: List domain
      description: List operation for domain resources.
      tags:
        - Emails
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: domain identifier
                    example: domain-a1b2c3d4
    post:
      operationId: createDomain
      summary: Create domain
      description: Create operation for domain resources.
      tags:
        - Emails
      requestBody:
        required: true
        description: Create domain request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: domain data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: domain identifier
                    example: domain-a1b2c3d4
  /domains/{domain_id}:
    get:
      operationId: getDomainById
      summary: Get domain
      description: Get operation for domain resources.
      tags:
        - Emails
      parameters:
        - &a1
          name: domain_id
          in: path
          required: true
          description: domain id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: domain identifier
                    example: domain-a1b2c3d4
    put:
      operationId: updateDomainById
      summary: Update domain
      description: Update operation for domain resources.
      tags:
        - Emails
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update domain request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: domain data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: domain identifier
                    example: domain-a1b2c3d4
  /domains/{domain_id}/verify:
    post:
      operationId: actionDomainById
      summary: Action domain
      description: Action operation for domain resources.
      tags:
        - Emails
      parameters:
        - name: domain_id
          in: path
          required: true
          description: domain id
          schema:
            type: string
      requestBody:
        required: true
        description: Action domain request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: domain data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: domain identifier
                    example: domain-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
