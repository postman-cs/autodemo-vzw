openapi: 3.0.3
info:
  title: Contact Center API
  description: Cloud contact center management with omnichannel routing across voice, chat, email, and social. Provides
    agent management, queue configuration, real-time supervisor dashboards, and workforce optimization analytics.
  version: 2.2.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-enterprise-contact-center
  x-acme-domain: enterprise
servers:
  - url: https://at-enterprise-contact-center.api.acmetelecom.com/v1
    description: Production
  - url: https://at-enterprise-contact-center.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Queues
    description: Contact queue management
  - name: Agents
    description: Agent management and routing
paths:
  /queues:
    get:
      operationId: listQueue
      summary: List queue
      description: List operation for queue resources.
      tags:
        - Queues
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: queue identifier
                    example: queue-a1b2c3d4
    post:
      operationId: createQueue
      summary: Create queue
      description: Create operation for queue resources.
      tags:
        - Queues
      requestBody:
        required: true
        description: Create queue request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: queue data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: queue identifier
                    example: queue-a1b2c3d4
  /queues/{queue_id}:
    get:
      operationId: getQueueById
      summary: Get queue
      description: Get operation for queue resources.
      tags:
        - Queues
      parameters:
        - &a1
          name: queue_id
          in: path
          required: true
          description: queue id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: queue identifier
                    example: queue-a1b2c3d4
    put:
      operationId: updateQueueById
      summary: Update queue
      description: Update operation for queue resources.
      tags:
        - Queues
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update queue request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: queue data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: queue identifier
                    example: queue-a1b2c3d4
  /queues/{queue_id}/metrics:
    get:
      operationId: getMetricsById
      summary: Get metrics
      description: Get operation for metrics resources.
      tags:
        - Queues
      parameters:
        - name: queue_id
          in: path
          required: true
          description: queue id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: metrics identifier
                    example: metrics-a1b2c3d4
  /agents:
    get:
      operationId: listAgent
      summary: List agent
      description: List operation for agent resources.
      tags:
        - Queues
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: agent identifier
                    example: agent-a1b2c3d4
    post:
      operationId: createAgent
      summary: Create agent
      description: Create operation for agent resources.
      tags:
        - Queues
      requestBody:
        required: true
        description: Create agent request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: agent data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: agent identifier
                    example: agent-a1b2c3d4
  /agents/{agent_id}:
    get:
      operationId: getAgentById
      summary: Get agent
      description: Get operation for agent resources.
      tags:
        - Queues
      parameters:
        - &a2
          name: agent_id
          in: path
          required: true
          description: agent id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: agent identifier
                    example: agent-a1b2c3d4
    put:
      operationId: updateAgentById
      summary: Update agent
      description: Update operation for agent resources.
      tags:
        - Queues
      parameters:
        - *a2
      requestBody:
        required: true
        description: Update agent request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: agent data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: agent identifier
                    example: agent-a1b2c3d4
  /agents/{agent_id}/state:
    get:
      operationId: getStateById
      summary: Get state
      description: Get operation for state resources.
      tags:
        - Queues
      parameters:
        - &a3
          name: agent_id
          in: path
          required: true
          description: agent id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: state identifier
                    example: state-a1b2c3d4
    put:
      operationId: updateStateById
      summary: Update state
      description: Update operation for state resources.
      tags:
        - Queues
      parameters:
        - *a3
      requestBody:
        required: true
        description: Update state request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: state data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: state identifier
                    example: state-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
