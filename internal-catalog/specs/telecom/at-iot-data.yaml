openapi: 3.0.3
info:
  title: IoT Data Ingestion API
  description: Telemetry data ingestion from IoT devices via MQTT, CoAP, and HTTP with time-series storage. Provides data
    transformation pipelines, schema validation, and configurable retention policies for high-volume sensor data.
  version: 1.5.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-iot-data
  x-acme-domain: iot
servers:
  - url: https://at-iot-data.api.acmetelecom.com/v1
    description: Production
  - url: https://at-iot-data.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Telemetry
    description: Device telemetry ingestion
  - name: Pipelines
    description: Data transformation pipelines
paths:
  /telemetry:
    post:
      operationId: createTelemetryEvent
      summary: Create telemetry event
      description: Create operation for telemetry event resources.
      tags:
        - Telemetry
      requestBody:
        required: true
        description: Create telemetry_event request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: telemetry_event data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: telemetry_event identifier
                    example: telemetry_event-a1b2c3d4
  /devices/{device_id}/telemetry:
    get:
      operationId: listTelemetryEventById
      summary: List telemetry event
      description: List operation for telemetry event resources.
      tags:
        - Telemetry
      parameters:
        - name: device_id
          in: path
          required: true
          description: device id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: telemetry_event identifier
                    example: telemetry_event-a1b2c3d4
  /devices/{device_id}/telemetry/latest:
    get:
      operationId: getTelemetryEventById
      summary: Get telemetry event
      description: Get operation for telemetry event resources.
      tags:
        - Telemetry
      parameters:
        - name: device_id
          in: path
          required: true
          description: device id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: telemetry_event identifier
                    example: telemetry_event-a1b2c3d4
  /pipelines:
    get:
      operationId: listPipeline
      summary: List pipeline
      description: List operation for pipeline resources.
      tags:
        - Telemetry
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: pipeline identifier
                    example: pipeline-a1b2c3d4
    post:
      operationId: createPipeline
      summary: Create pipeline
      description: Create operation for pipeline resources.
      tags:
        - Telemetry
      requestBody:
        required: true
        description: Create pipeline request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: pipeline data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: pipeline identifier
                    example: pipeline-a1b2c3d4
  /pipelines/{pipeline_id}:
    get:
      operationId: getPipelineById
      summary: Get pipeline
      description: Get operation for pipeline resources.
      tags:
        - Telemetry
      parameters:
        - &a1
          name: pipeline_id
          in: path
          required: true
          description: pipeline id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: pipeline identifier
                    example: pipeline-a1b2c3d4
    put:
      operationId: updatePipelineById
      summary: Update pipeline
      description: Update operation for pipeline resources.
      tags:
        - Telemetry
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update pipeline request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: pipeline data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: pipeline identifier
                    example: pipeline-a1b2c3d4
    delete:
      operationId: deletePipelineById
      summary: Delete pipeline
      description: Delete operation for pipeline resources.
      tags:
        - Telemetry
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: pipeline identifier
                    example: pipeline-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
