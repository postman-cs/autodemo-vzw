openapi: 3.0.3
info:
  title: Network Topology API
  description: Network topology mapping, visualization, and impact analysis across Layer 1-3 infrastructure. Provides
    automated discovery of physical and logical links, node adjacency graphs, and path computation for capacity
    planning.
  version: 2.1.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-network-topology
  x-acme-domain: network
servers:
  - url: https://at-network-topology.api.acmetelecom.com/v1
    description: Production
  - url: https://at-network-topology.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Topology
    description: Network topology discovery and mapping
  - name: Nodes
    description: Network node management
paths:
  /topologies:
    get:
      operationId: listTopology
      summary: List topology
      description: List operation for topology resources.
      tags:
        - Topology
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: topology identifier
                    example: topology-a1b2c3d4
    post:
      operationId: createTopology
      summary: Create topology
      description: Create operation for topology resources.
      tags:
        - Topology
      requestBody:
        required: true
        description: Create topology request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: topology data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: topology identifier
                    example: topology-a1b2c3d4
  /topologies/{topology_id}:
    get:
      operationId: getTopologyById
      summary: Get topology
      description: Get operation for topology resources.
      tags:
        - Topology
      parameters:
        - name: topology_id
          in: path
          required: true
          description: topology id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: topology identifier
                    example: topology-a1b2c3d4
  /topologies/{topology_id}/nodes:
    get:
      operationId: listNodeById
      summary: List node
      description: List operation for node resources.
      tags:
        - Topology
      parameters:
        - name: topology_id
          in: path
          required: true
          description: topology id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: node identifier
                    example: node-a1b2c3d4
  /topologies/{topology_id}/links:
    get:
      operationId: listLinkById
      summary: List link
      description: List operation for link resources.
      tags:
        - Topology
      parameters:
        - name: topology_id
          in: path
          required: true
          description: topology id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: link identifier
                    example: link-a1b2c3d4
  /topologies/{topology_id}/paths:
    post:
      operationId: searchPathById
      summary: Search path
      description: Search operation for path resources.
      tags:
        - Topology
      parameters:
        - name: topology_id
          in: path
          required: true
          description: topology id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      requestBody:
        required: true
        description: Search path request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: path data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: path identifier
                    example: path-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
