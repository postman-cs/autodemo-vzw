openapi: 3.0.3
info:
  title: Content Catalog API
  description: Content metadata management, categorization, and editorial workflows for streaming catalogs. Provides
    multi-language descriptions, artwork asset management, and content availability windowing across regions.
  version: 2.0.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-media-catalog
  x-acme-domain: media
servers:
  - url: https://at-media-catalog.api.acmetelecom.com/v1
    description: Production
  - url: https://at-media-catalog.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Titles
    description: Content title management
  - name: Assets
    description: Media asset management
paths:
  /titles:
    get:
      operationId: listTitle
      summary: List title
      description: List operation for title resources.
      tags:
        - Titles
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: title identifier
                    example: title-a1b2c3d4
    post:
      operationId: createTitle
      summary: Create title
      description: Create operation for title resources.
      tags:
        - Titles
      requestBody:
        required: true
        description: Create title request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: title data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: title identifier
                    example: title-a1b2c3d4
  /titles/{title_id}:
    get:
      operationId: getTitleById
      summary: Get title
      description: Get operation for title resources.
      tags:
        - Titles
      parameters:
        - &a1
          name: title_id
          in: path
          required: true
          description: title id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: title identifier
                    example: title-a1b2c3d4
    put:
      operationId: updateTitleById
      summary: Update title
      description: Update operation for title resources.
      tags:
        - Titles
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update title request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: title data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: title identifier
                    example: title-a1b2c3d4
  /titles/{title_id}/episodes:
    get:
      operationId: listEpisodeById
      summary: List episode
      description: List operation for episode resources.
      tags:
        - Titles
      parameters:
        - &a2
          name: title_id
          in: path
          required: true
          description: title id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: episode identifier
                    example: episode-a1b2c3d4
    post:
      operationId: createEpisodeById
      summary: Create episode
      description: Create operation for episode resources.
      tags:
        - Titles
      parameters:
        - *a2
      requestBody:
        required: true
        description: Create episode request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: episode data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: episode identifier
                    example: episode-a1b2c3d4
  /titles/{title_id}/assets:
