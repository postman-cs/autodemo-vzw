openapi: 3.0.3
info:
  title: Threat Intelligence API
  description: Threat intelligence feed aggregation, IOC correlation, and network-level threat blocking for telecom
    infrastructure. Provides IP reputation scoring, malicious URL detection, and automated blocklist distribution to
    edge devices.
  version: 1.6.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-security-threat-intel
  x-acme-domain: security
servers:
  - url: https://at-security-threat-intel.api.acmetelecom.com/v1
    description: Production
  - url: https://at-security-threat-intel.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Threats
    description: Threat intelligence feeds
  - name: IOCs
    description: Indicator of compromise management
paths:
  /threats:
    get:
      operationId: listThreat
      summary: List threat
      description: List operation for threat resources.
      tags:
        - Threats
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: threat identifier
                    example: threat-a1b2c3d4
  /threats/{threat_id}:
    get:
      operationId: getThreatById
      summary: Get threat
      description: Get operation for threat resources.
      tags:
        - Threats
      parameters:
        - name: threat_id
          in: path
          required: true
          description: threat id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: threat identifier
                    example: threat-a1b2c3d4
  /iocs:
    get:
      operationId: listIoc
      summary: List ioc
      description: List operation for ioc resources.
      tags:
        - Threats
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ioc identifier
                    example: ioc-a1b2c3d4
    post:
      operationId: createIoc
      summary: Create ioc
      description: Create operation for ioc resources.
      tags:
        - Threats
      requestBody:
        required: true
        description: Create ioc request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: ioc data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ioc identifier
                    example: ioc-a1b2c3d4
  /iocs/{ioc_id}:
    get:
      operationId: getIocById
      summary: Get ioc
      description: Get operation for ioc resources.
      tags:
        - Threats
      parameters:
        - name: ioc_id
          in: path
          required: true
          description: ioc id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ioc identifier
                    example: ioc-a1b2c3d4
  /blocklists:
    get:
      operationId: listBlocklist
      summary: List blocklist
      description: List operation for blocklist resources.
      tags:
        - Threats
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: blocklist identifier
                    example: blocklist-a1b2c3d4
    post:
      operationId: createBlocklist
      summary: Create blocklist
      description: Create operation for blocklist resources.
      tags:
        - Threats
      requestBody:
        required: true
        description: Create blocklist request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: blocklist data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: blocklist identifier
                    example: blocklist-a1b2c3d4
  /blocklists/{list_id}:
    get:
      operationId: getBlocklistById
      summary: Get blocklist
      description: Get operation for blocklist resources.
      tags:
        - Threats
      parameters:
        - &a1
          name: list_id
          in: path
          required: true
          description: list id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: blocklist identifier
                    example: blocklist-a1b2c3d4
    put:
      operationId: updateBlocklistById
      summary: Update blocklist
      description: Update operation for blocklist resources.
      tags:
        - Threats
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update blocklist request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: blocklist data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: blocklist identifier
                    example: blocklist-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
