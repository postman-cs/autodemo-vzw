openapi: 3.0.3
info:
  title: Network Provisioning API
  description: Network resource provisioning and activation for circuit, fiber, and wireless connections. Supports
    automated service fulfillment workflows with end-to-end orchestration across transport and access networks.
  version: 3.2.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-network-provisioning
  x-acme-domain: network
servers:
  - url: https://at-network-provisioning.api.acmetelecom.com/v1
    description: Production
  - url: https://at-network-provisioning.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Circuits
    description: Circuit and connection provisioning
  - name: Activations
    description: Service activation and fulfillment
paths:
  /circuits:
    get:
      operationId: listCircuit
      summary: List circuit
      description: List operation for circuit resources.
      tags:
        - Circuits
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: circuit identifier
                    example: circuit-a1b2c3d4
    post:
      operationId: createCircuit
      summary: Create circuit
      description: Create operation for circuit resources.
      tags:
        - Circuits
      requestBody:
        required: true
        description: Create circuit request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: circuit data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: circuit identifier
                    example: circuit-a1b2c3d4
  /circuits/{circuit_id}:
    get:
      operationId: getCircuitById
      summary: Get circuit
      description: Get operation for circuit resources.
      tags:
        - Circuits
      parameters:
        - &a1
          name: circuit_id
          in: path
          required: true
          description: circuit id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: circuit identifier
                    example: circuit-a1b2c3d4
    put:
      operationId: updateCircuitById
      summary: Update circuit
      description: Update operation for circuit resources.
      tags:
        - Circuits
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update circuit request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: circuit data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: circuit identifier
                    example: circuit-a1b2c3d4
    delete:
      operationId: deleteCircuitById
      summary: Delete circuit
      description: Delete operation for circuit resources.
      tags:
        - Circuits
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: circuit identifier
                    example: circuit-a1b2c3d4
  /circuits/{circuit_id}/activate:
    post:
      operationId: actionCircuitById
      summary: Action circuit
      description: Action operation for circuit resources.
      tags:
        - Circuits
      parameters:
        - name: circuit_id
          in: path
          required: true
          description: circuit id
          schema:
            type: string
      requestBody:
        required: true
        description: Action circuit request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: circuit data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: circuit identifier
                    example: circuit-a1b2c3d4
  /connections:
    get:
      operationId: listConnection
      summary: List connection
      description: List operation for connection resources.
      tags:
        - Circuits
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: connection identifier
                    example: connection-a1b2c3d4
    post:
      operationId: createConnection
      summary: Create connection
      description: Create operation for connection resources.
      tags:
        - Circuits
      requestBody:
        required: true
        description: Create connection request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: connection data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: connection identifier
                    example: connection-a1b2c3d4
  /connections/{connection_id}:
    get:
      operationId: getConnectionById
      summary: Get connection
      description: Get operation for connection resources.
      tags:
        - Circuits
      parameters:
        - &a2
          name: connection_id
          in: path
          required: true
          description: connection id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: connection identifier
                    example: connection-a1b2c3d4
    put:
      operationId: updateConnectionById
      summary: Update connection
      description: Update operation for connection resources.
      tags:
        - Circuits
      parameters:
        - *a2
      requestBody:
        required: true
        description: Update connection request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: connection data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: connection identifier
                    example: connection-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
