openapi: 3.0.3
info:
  title: Conferencing API
  description: Audio and video conference bridge management with participant controls and moderation. Supports recording,
    live transcription, dial-in number provisioning, and screen sharing for enterprise collaboration.
  version: 1.8.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-voice-conferencing
  x-acme-domain: voice
servers:
  - url: https://at-voice-conferencing.api.acmetelecom.com/v1
    description: Production
  - url: https://at-voice-conferencing.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Conferences
    description: Conference bridge management
  - name: Participants
    description: Participant control
paths:
  /conferences:
    get:
      operationId: listConference
      summary: List conference
      description: List operation for conference resources.
      tags:
        - Conferences
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: conference identifier
                    example: conference-a1b2c3d4
    post:
      operationId: createConference
      summary: Create conference
      description: Create operation for conference resources.
      tags:
        - Conferences
      requestBody:
        required: true
        description: Create conference request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: conference data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: conference identifier
                    example: conference-a1b2c3d4
  /conferences/{conference_id}:
    get:
      operationId: getConferenceById
      summary: Get conference
      description: Get operation for conference resources.
      tags:
        - Conferences
      parameters:
        - &a1
          name: conference_id
          in: path
          required: true
          description: conference id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: conference identifier
                    example: conference-a1b2c3d4
    put:
      operationId: updateConferenceById
      summary: Update conference
      description: Update operation for conference resources.
      tags:
        - Conferences
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update conference request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: conference data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: conference identifier
                    example: conference-a1b2c3d4
  /conferences/{conference_id}/participants:
    get:
      operationId: listParticipantById
      summary: List participant
      description: List operation for participant resources.
      tags:
        - Conferences
      parameters:
        - &a2
          name: conference_id
          in: path
          required: true
          description: conference id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: participant identifier
                    example: participant-a1b2c3d4
    post:
      operationId: createParticipantById
      summary: Create participant
      description: Create operation for participant resources.
      tags:
        - Conferences
      parameters:
        - *a2
      requestBody:
        required: true
        description: Create participant request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: participant data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: participant identifier
                    example: participant-a1b2c3d4
  /conferences/{conference_id}/participants/{participant_id}:
    get:
      operationId: getParticipantById
      summary: Get participant
      description: Get operation for participant resources.
      tags:
        - Conferences
      parameters:
        - &a3
          name: conference_id
          in: path
          required: true
          description: conference id
          schema:
            type: string
        - &a4
          name: participant_id
          in: path
          required: true
          description: participant id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: participant identifier
                    example: participant-a1b2c3d4
    put:
      operationId: updateParticipantById
      summary: Update participant
      description: Update operation for participant resources.
      tags:
        - Conferences
      parameters:
        - *a3
        - *a4
      requestBody:
        required: true
        description: Update participant request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: participant data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: participant identifier
                    example: participant-a1b2c3d4
    delete:
      operationId: deleteParticipantById
      summary: Delete participant
      description: Delete operation for participant resources.
      tags:
        - Conferences
      parameters:
        - *a3
        - *a4
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: participant identifier
                    example: participant-a1b2c3d4
  /conferences/{conference_id}/recordings:
    get:
      operationId: listRecordingById
      summary: List recording
      description: List operation for recording resources.
      tags:
        - Conferences
      parameters:
        - name: conference_id
          in: path
          required: true
          description: conference id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: recording identifier
                    example: recording-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
