openapi: 3.0.3
info:
  title: Carrier Settlement API
  description: Inter-carrier financial settlement and reconciliation for voice, data, and messaging traffic. Manages
    revenue sharing agreements, wholesale rate schedules, and automated dispute resolution between carriers.
  version: 1.3.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-billing-settlements
  x-acme-domain: billing
servers:
  - url: https://at-billing-settlements.api.acmetelecom.com/v1
    description: Production
  - url: https://at-billing-settlements.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Settlements
    description: Settlement processing
  - name: Agreements
    description: Revenue sharing agreements
paths:
  /settlements:
    get:
      operationId: listSettlement
      summary: List settlement
      description: List operation for settlement resources.
      tags:
        - Settlements
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: settlement identifier
                    example: settlement-a1b2c3d4
  /settlements/{settlement_id}:
    get:
      operationId: getSettlementById
      summary: Get settlement
      description: Get operation for settlement resources.
      tags:
        - Settlements
      parameters:
        - name: settlement_id
          in: path
          required: true
          description: settlement id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: settlement identifier
                    example: settlement-a1b2c3d4
  /settlements/{settlement_id}/reconcile:
    post:
      operationId: actionSettlementById
      summary: Action settlement
      description: Action operation for settlement resources.
      tags:
        - Settlements
      parameters:
        - name: settlement_id
          in: path
          required: true
          description: settlement id
          schema:
            type: string
      requestBody:
        required: true
        description: Action settlement request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: settlement data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: settlement identifier
                    example: settlement-a1b2c3d4
  /agreements:
    get:
      operationId: listAgreement
      summary: List agreement
      description: List operation for agreement resources.
      tags:
        - Settlements
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: agreement identifier
                    example: agreement-a1b2c3d4
    post:
      operationId: createAgreement
      summary: Create agreement
      description: Create operation for agreement resources.
      tags:
        - Settlements
      requestBody:
        required: true
        description: Create agreement request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: agreement data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: agreement identifier
                    example: agreement-a1b2c3d4
  /agreements/{agreement_id}:
    get:
      operationId: getAgreementById
      summary: Get agreement
      description: Get operation for agreement resources.
      tags:
        - Settlements
      parameters:
        - &a1
          name: agreement_id
          in: path
          required: true
          description: agreement id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: agreement identifier
                    example: agreement-a1b2c3d4
    put:
      operationId: updateAgreementById
      summary: Update agreement
      description: Update operation for agreement resources.
      tags:
        - Settlements
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update agreement request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: agreement data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: agreement identifier
                    example: agreement-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
