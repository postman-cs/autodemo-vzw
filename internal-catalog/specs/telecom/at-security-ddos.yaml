openapi: 3.0.3
info:
  title: DDoS Protection API
  description: Volumetric and application-layer DDoS detection and mitigation for network infrastructure. Manages traffic
    scrubbing center activation, attack forensics collection, and post-incident reporting with automated mitigation
    profiles.
  version: 1.3.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-security-ddos
  x-acme-domain: security
servers:
  - url: https://at-security-ddos.api.acmetelecom.com/v1
    description: Production
  - url: https://at-security-ddos.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Attacks
    description: DDoS attack detection
  - name: Mitigation
    description: Mitigation profile management
paths:
  /attacks:
    get:
      operationId: listAttack
      summary: List attack
      description: List operation for attack resources.
      tags:
        - Attacks
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: attack identifier
                    example: attack-a1b2c3d4
  /attacks/{attack_id}:
    get:
      operationId: getAttackById
      summary: Get attack
      description: Get operation for attack resources.
      tags:
        - Attacks
      parameters:
        - name: attack_id
          in: path
          required: true
          description: attack id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: attack identifier
                    example: attack-a1b2c3d4
  /attacks/{attack_id}/mitigate:
    post:
      operationId: actionAttackById
      summary: Action attack
      description: Action operation for attack resources.
      tags:
        - Attacks
      parameters:
        - name: attack_id
          in: path
          required: true
          description: attack id
          schema:
            type: string
      requestBody:
        required: true
        description: Action attack request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: attack data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: attack identifier
                    example: attack-a1b2c3d4
  /mitigations:
    get:
      operationId: listMitigation
      summary: List mitigation
      description: List operation for mitigation resources.
      tags:
        - Attacks
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: mitigation identifier
                    example: mitigation-a1b2c3d4
    post:
      operationId: createMitigation
      summary: Create mitigation
      description: Create operation for mitigation resources.
      tags:
        - Attacks
      requestBody:
        required: true
        description: Create mitigation request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: mitigation data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: mitigation identifier
                    example: mitigation-a1b2c3d4
  /mitigations/{mitigation_id}:
    get:
      operationId: getMitigationById
      summary: Get mitigation
      description: Get operation for mitigation resources.
      tags:
        - Attacks
      parameters:
        - &a1
          name: mitigation_id
          in: path
          required: true
          description: mitigation id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: mitigation identifier
                    example: mitigation-a1b2c3d4
    put:
      operationId: updateMitigationById
      summary: Update mitigation
      description: Update operation for mitigation resources.
      tags:
        - Attacks
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update mitigation request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: mitigation data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: mitigation identifier
                    example: mitigation-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
