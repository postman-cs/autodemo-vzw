openapi: 3.0.3
info:
  title: SLA Management API
  description: Service level agreement definition, monitoring, and breach notification for enterprise customers. Provides
    SLA reporting dashboards, automated credit calculation on breach, and historical SLA performance trending.
  version: 1.8.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-enterprise-sla
  x-acme-domain: enterprise
servers:
  - url: https://at-enterprise-sla.api.acmetelecom.com/v1
    description: Production
  - url: https://at-enterprise-sla.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: SLAs
    description: SLA definition and monitoring
  - name: Breaches
    description: SLA breach management
paths:
  /slas:
    get:
      operationId: listSla
      summary: List sla
      description: List operation for sla resources.
      tags:
        - SLAs
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: sla identifier
                    example: sla-a1b2c3d4
    post:
      operationId: createSla
      summary: Create sla
      description: Create operation for sla resources.
      tags:
        - SLAs
      requestBody:
        required: true
        description: Create sla request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: sla data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: sla identifier
                    example: sla-a1b2c3d4
  /slas/{sla_id}:
    get:
      operationId: getSlaById
      summary: Get sla
      description: Get operation for sla resources.
      tags:
        - SLAs
      parameters:
        - &a1
          name: sla_id
          in: path
          required: true
          description: sla id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: sla identifier
                    example: sla-a1b2c3d4
    put:
      operationId: updateSlaById
      summary: Update sla
      description: Update operation for sla resources.
      tags:
        - SLAs
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update sla request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: sla data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: sla identifier
                    example: sla-a1b2c3d4
  /slas/{sla_id}/metrics:
    get:
      operationId: getMetricsById
      summary: Get metrics
      description: Get operation for metrics resources.
      tags:
        - SLAs
      parameters:
        - name: sla_id
          in: path
          required: true
          description: sla id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: metrics identifier
                    example: metrics-a1b2c3d4
  /slas/{sla_id}/breaches:
    get:
      operationId: listBreachById
      summary: List breach
      description: List operation for breach resources.
      tags:
        - SLAs
      parameters:
        - name: sla_id
          in: path
          required: true
          description: sla id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: breach identifier
                    example: breach-a1b2c3d4
  /slas/{sla_id}/reports:
    get:
      operationId: listReportById
      summary: List report
      description: List operation for report resources.
      tags:
        - SLAs
      parameters:
        - &a2
          name: sla_id
          in: path
          required: true
          description: sla id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: report identifier
                    example: report-a1b2c3d4
    post:
      operationId: createReportById
      summary: Create report
      description: Create operation for report resources.
      tags:
        - SLAs
      parameters:
        - *a2
      requestBody:
        required: true
        description: Create report request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: report data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: report identifier
                    example: report-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
