openapi: 3.0.3
info:
  title: Service Catalog API
  description: Telecom product and service catalog with pricing, availability, and eligibility rules. Supports TMF620
    product catalog management with hierarchical product specifications and configurable product offerings.
  version: 2.2.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-platform-service-catalog
  x-acme-domain: platform
servers:
  - url: https://at-platform-service-catalog.api.acmetelecom.com/v1
    description: Production
  - url: https://at-platform-service-catalog.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Products
    description: Product catalog management
  - name: Offerings
    description: Product offering configuration
paths:
  /products:
    get:
      operationId: listProduct
      summary: List product
      description: List operation for product resources.
      tags:
        - Products
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: product identifier
                    example: product-a1b2c3d4
    post:
      operationId: createProduct
      summary: Create product
      description: Create operation for product resources.
      tags:
        - Products
      requestBody:
        required: true
        description: Create product request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: product data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: product identifier
                    example: product-a1b2c3d4
  /products/{product_id}:
    get:
      operationId: getProductById
      summary: Get product
      description: Get operation for product resources.
      tags:
        - Products
      parameters:
        - &a1
          name: product_id
          in: path
          required: true
          description: product id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: product identifier
                    example: product-a1b2c3d4
    put:
      operationId: updateProductById
      summary: Update product
      description: Update operation for product resources.
      tags:
        - Products
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update product request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: product data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: product identifier
                    example: product-a1b2c3d4
  /offerings:
    get:
      operationId: listOffering
      summary: List offering
      description: List operation for offering resources.
      tags:
        - Products
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: offering identifier
                    example: offering-a1b2c3d4
    post:
      operationId: createOffering
      summary: Create offering
      description: Create operation for offering resources.
      tags:
        - Products
      requestBody:
        required: true
        description: Create offering request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: offering data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: offering identifier
                    example: offering-a1b2c3d4
  /offerings/{offering_id}:
    get:
      operationId: getOfferingById
      summary: Get offering
      description: Get operation for offering resources.
      tags:
        - Products
      parameters:
        - &a2
          name: offering_id
          in: path
          required: true
          description: offering id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: offering identifier
                    example: offering-a1b2c3d4
    put:
      operationId: updateOfferingById
      summary: Update offering
      description: Update operation for offering resources.
      tags:
        - Products
      parameters:
        - *a2
      requestBody:
        required: true
        description: Update offering request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: offering data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: offering identifier
                    example: offering-a1b2c3d4
  /offerings/{offering_id}/eligibility:
    post:
      operationId: createEligibilityById
      summary: Create eligibility
      description: Create operation for eligibility resources.
      tags:
        - Products
      parameters:
        - name: offering_id
          in: path
          required: true
          description: offering id
          schema:
            type: string
      requestBody:
        required: true
        description: Create eligibility request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: eligibility data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: eligibility identifier
                    example: eligibility-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
