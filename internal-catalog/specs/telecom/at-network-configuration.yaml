openapi: 3.0.3
info:
  title: Network Configuration API
  description: Device configuration management with version control, diff comparison, and rollback capabilities. Supports
    template-based provisioning, compliance auditing against golden configurations, and bulk configuration deployment.
  version: 1.9.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-network-configuration
  x-acme-domain: network
servers:
  - url: https://at-network-configuration.api.acmetelecom.com/v1
    description: Production
  - url: https://at-network-configuration.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Configs
    description: Device configuration management
  - name: Templates
    description: Configuration template library
paths:
  /devices/{device_id}/config:
    get:
      operationId: getConfigById
      summary: Get config
      description: Get operation for config resources.
      tags:
        - Configs
      parameters:
        - &a1
          name: device_id
          in: path
          required: true
          description: device id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: config identifier
                    example: config-a1b2c3d4
    put:
      operationId: updateConfigById
      summary: Update config
      description: Update operation for config resources.
      tags:
        - Configs
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update config request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: config data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: config identifier
                    example: config-a1b2c3d4
  /devices/{device_id}/config/history:
    get:
      operationId: listVersionById
      summary: List version
      description: List operation for version resources.
      tags:
        - Configs
      parameters:
        - name: device_id
          in: path
          required: true
          description: device id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: version identifier
                    example: version-a1b2c3d4
  /devices/{device_id}/config/rollback:
    post:
      operationId: actionConfigById
      summary: Action config
      description: Action operation for config resources.
      tags:
        - Configs
      parameters:
        - name: device_id
          in: path
          required: true
          description: device id
          schema:
            type: string
      requestBody:
        required: true
        description: Action config request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: config data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: config identifier
                    example: config-a1b2c3d4
  /templates:
    get:
      operationId: listTemplate
      summary: List template
      description: List operation for template resources.
      tags:
        - Configs
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: template identifier
                    example: template-a1b2c3d4
    post:
      operationId: createTemplate
      summary: Create template
      description: Create operation for template resources.
      tags:
        - Configs
      requestBody:
        required: true
        description: Create template request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: template data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: template identifier
                    example: template-a1b2c3d4
  /templates/{template_id}:
    get:
      operationId: getTemplateById
      summary: Get template
      description: Get operation for template resources.
      tags:
        - Configs
      parameters:
        - &a2
          name: template_id
          in: path
          required: true
          description: template id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: template identifier
                    example: template-a1b2c3d4
    put:
      operationId: updateTemplateById
      summary: Update template
      description: Update operation for template resources.
      tags:
        - Configs
      parameters:
        - *a2
      requestBody:
        required: true
        description: Update template request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: template data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: template identifier
                    example: template-a1b2c3d4
    delete:
      operationId: deleteTemplateById
      summary: Delete template
      description: Delete operation for template resources.
      tags:
        - Configs
      parameters:
        - *a2
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: template identifier
                    example: template-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
