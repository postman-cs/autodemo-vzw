openapi: 3.0.3
info:
  title: Integration Hub API
  description: System integration middleware for BSS/OSS interconnection with adapter management. Provides message
    transformation, protocol mediation, and reliable message delivery with dead-letter queue handling.
  version: 1.6.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-platform-integration
  x-acme-domain: platform
servers:
  - url: https://at-platform-integration.api.acmetelecom.com/v1
    description: Production
  - url: https://at-platform-integration.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Adapters
    description: Integration adapter management
  - name: Messages
    description: Message routing and transformation
paths:
  /adapters:
    get:
      operationId: listAdapter
      summary: List adapter
      description: List operation for adapter resources.
      tags:
        - Adapters
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: adapter identifier
                    example: adapter-a1b2c3d4
    post:
      operationId: createAdapter
      summary: Create adapter
      description: Create operation for adapter resources.
      tags:
        - Adapters
      requestBody:
        required: true
        description: Create adapter request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: adapter data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: adapter identifier
                    example: adapter-a1b2c3d4
  /adapters/{adapter_id}:
    get:
      operationId: getAdapterById
      summary: Get adapter
      description: Get operation for adapter resources.
      tags:
        - Adapters
      parameters:
        - &a1
          name: adapter_id
          in: path
          required: true
          description: adapter id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: adapter identifier
                    example: adapter-a1b2c3d4
    put:
      operationId: updateAdapterById
      summary: Update adapter
      description: Update operation for adapter resources.
      tags:
        - Adapters
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update adapter request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: adapter data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: adapter identifier
                    example: adapter-a1b2c3d4
    delete:
      operationId: deleteAdapterById
      summary: Delete adapter
      description: Delete operation for adapter resources.
      tags:
        - Adapters
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: adapter identifier
                    example: adapter-a1b2c3d4
  /adapters/{adapter_id}/test:
    post:
      operationId: actionAdapterById
      summary: Action adapter
      description: Action operation for adapter resources.
      tags:
        - Adapters
      parameters:
        - name: adapter_id
          in: path
          required: true
          description: adapter id
          schema:
            type: string
      requestBody:
        required: true
        description: Action adapter request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: adapter data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: adapter identifier
                    example: adapter-a1b2c3d4
  /messages:
    get:
      operationId: listMessage
      summary: List message
      description: List operation for message resources.
      tags:
        - Adapters
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: message identifier
                    example: message-a1b2c3d4
  /messages/{message_id}:
    get:
      operationId: getMessageById
      summary: Get message
      description: Get operation for message resources.
      tags:
        - Adapters
      parameters:
        - name: message_id
          in: path
          required: true
          description: message id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: message identifier
                    example: message-a1b2c3d4
  /dead-letters:
    get:
      operationId: listDeadLetter
      summary: List dead letter
      description: List operation for dead letter resources.
      tags:
        - Adapters
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: dead_letter identifier
                    example: dead_letter-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
