openapi: 3.0.3
info:
  title: IoT Security API
  description: IoT device authentication, certificate provisioning, and security policy enforcement. Provides device
    attestation, anomaly-based threat detection, and automated quarantine for compromised devices.
  version: 1.2.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-iot-security
  x-acme-domain: iot
servers:
  - url: https://at-iot-security.api.acmetelecom.com/v1
    description: Production
  - url: https://at-iot-security.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Certificates
    description: Device certificate management
  - name: Threats
    description: Threat detection and response
paths:
  /certificates:
    get:
      operationId: listCertificate
      summary: List certificate
      description: List operation for certificate resources.
      tags:
        - Certificates
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: certificate identifier
                    example: certificate-a1b2c3d4
    post:
      operationId: createCertificate
      summary: Create certificate
      description: Create operation for certificate resources.
      tags:
        - Certificates
      requestBody:
        required: true
        description: Create certificate request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: certificate data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: certificate identifier
                    example: certificate-a1b2c3d4
  /certificates/{cert_id}:
    get:
      operationId: getCertificateById
      summary: Get certificate
      description: Get operation for certificate resources.
      tags:
        - Certificates
      parameters:
        - &a1
          name: cert_id
          in: path
          required: true
          description: cert id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: certificate identifier
                    example: certificate-a1b2c3d4
    delete:
      operationId: deleteCertificateById
      summary: Delete certificate
      description: Delete operation for certificate resources.
      tags:
        - Certificates
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: certificate identifier
                    example: certificate-a1b2c3d4
  /certificates/{cert_id}/revoke:
    post:
      operationId: actionCertificateById
      summary: Action certificate
      description: Action operation for certificate resources.
      tags:
        - Certificates
      parameters:
        - name: cert_id
          in: path
          required: true
          description: cert id
          schema:
            type: string
      requestBody:
        required: true
        description: Action certificate request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: certificate data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: certificate identifier
                    example: certificate-a1b2c3d4
  /threats:
    get:
      operationId: listThreat
      summary: List threat
      description: List operation for threat resources.
      tags:
        - Certificates
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: threat identifier
                    example: threat-a1b2c3d4
  /threats/{threat_id}:
    get:
      operationId: getThreatById
      summary: Get threat
      description: Get operation for threat resources.
      tags:
        - Certificates
      parameters:
        - name: threat_id
          in: path
          required: true
          description: threat id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: threat identifier
                    example: threat-a1b2c3d4
  /devices/{device_id}/quarantine:
    post:
      operationId: actionDeviceById
      summary: Action device
      description: Action operation for device resources.
      tags:
        - Certificates
      parameters:
        - name: device_id
          in: path
          required: true
          description: device id
          schema:
            type: string
      requestBody:
        required: true
        description: Action device request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: device data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: device identifier
                    example: device-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
