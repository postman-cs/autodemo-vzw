openapi: 3.0.3
info:
  title: Push Notification API
  description: Multi-platform push notification delivery via FCM and APNs with audience targeting. Supports topic
    subscriptions, silent data pushes, scheduled delivery windows, and A/B testing of notification content.
  version: 2.3.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-messaging-push
  x-acme-domain: messaging
servers:
  - url: https://at-messaging-push.api.acmetelecom.com/v1
    description: Production
  - url: https://at-messaging-push.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Notifications
    description: Push notification delivery
  - name: Topics
    description: Topic subscription management
paths:
  /notifications:
    get:
      operationId: listNotification
      summary: List notification
      description: List operation for notification resources.
      tags:
        - Notifications
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: notification identifier
                    example: notification-a1b2c3d4
    post:
      operationId: createNotification
      summary: Create notification
      description: Create operation for notification resources.
      tags:
        - Notifications
      requestBody:
        required: true
        description: Create notification request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: notification data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: notification identifier
                    example: notification-a1b2c3d4
  /notifications/{notification_id}:
    get:
      operationId: getNotificationById
      summary: Get notification
      description: Get operation for notification resources.
      tags:
        - Notifications
      parameters:
        - name: notification_id
          in: path
          required: true
          description: notification id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: notification identifier
                    example: notification-a1b2c3d4
  /topics:
    get:
      operationId: listTopic
      summary: List topic
      description: List operation for topic resources.
      tags:
        - Notifications
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: topic identifier
                    example: topic-a1b2c3d4
    post:
      operationId: createTopic
      summary: Create topic
      description: Create operation for topic resources.
      tags:
        - Notifications
      requestBody:
        required: true
        description: Create topic request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: topic data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: topic identifier
                    example: topic-a1b2c3d4
  /topics/{topic_id}:
    get:
      operationId: getTopicById
      summary: Get topic
      description: Get operation for topic resources.
      tags:
        - Notifications
      parameters:
        - &a1
          name: topic_id
          in: path
          required: true
          description: topic id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: topic identifier
                    example: topic-a1b2c3d4
    put:
      operationId: updateTopicById
      summary: Update topic
      description: Update operation for topic resources.
      tags:
        - Notifications
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update topic request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: topic data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: topic identifier
                    example: topic-a1b2c3d4
    delete:
      operationId: deleteTopicById
      summary: Delete topic
      description: Delete operation for topic resources.
      tags:
        - Notifications
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: topic identifier
                    example: topic-a1b2c3d4
  /topics/{topic_id}/subscribers:
    get:
      operationId: listSubscriberById
      summary: List subscriber
      description: List operation for subscriber resources.
      tags:
        - Notifications
      parameters:
        - name: topic_id
          in: path
          required: true
          description: topic id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: subscriber identifier
                    example: subscriber-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
