          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ix_port identifier
                    example: ix_port-a1b2c3d4
    post:
      operationId: createIxPort
      summary: Create ix port
      description: Create operation for ix port resources.
      tags:
        - Peers
      requestBody:
        required: true
        description: Create ix_port request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: ix_port data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ix_port identifier
                    example: ix_port-a1b2c3d4
  /ix-ports/{port_id}:
    get:
      operationId: getIxPortById
      summary: Get ix port
      description: Get operation for ix port resources.
      tags:
        - Peers
      parameters:
        - &a2
          name: port_id
          in: path
          required: true
          description: port id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ix_port identifier
                    example: ix_port-a1b2c3d4
    put:
      operationId: updateIxPortById
      summary: Update ix port
      description: Update operation for ix port resources.
      tags:
        - Peers
      parameters:
        - *a2
      requestBody:
        required: true
        description: Update ix_port request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: ix_port data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ix_port identifier
                    example: ix_port-a1b2c3d4
  /peers/{peer_id}/traffic:
    get:
      operationId: getTrafficById
      summary: Get traffic
      description: Get operation for traffic resources.
      tags:
        - Peers
      parameters:
        - name: peer_id
          in: path
          required: true
          description: peer id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: traffic identifier
                    example: traffic-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
