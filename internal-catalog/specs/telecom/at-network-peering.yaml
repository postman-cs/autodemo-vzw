openapi: 3.0.3
info:
  title: Interconnect Peering API
  description: BGP peering agreement management, IX port provisioning, and traffic exchange monitoring. Supports
    settlement-free and paid peering arrangements with automated route policy generation and traffic ratio analysis.
  version: 1.3.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-network-peering
  x-acme-domain: network
servers:
  - url: https://at-network-peering.api.acmetelecom.com/v1
    description: Production
  - url: https://at-network-peering.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Peers
    description: Peering partner management
  - name: IX Ports
    description: Internet exchange port management
paths:
  /peers:
    get:
      operationId: listPeer
      summary: List peer
      description: List operation for peer resources.
      tags:
        - Peers
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: peer identifier
                    example: peer-a1b2c3d4
    post:
      operationId: createPeer
      summary: Create peer
      description: Create operation for peer resources.
      tags:
        - Peers
      requestBody:
        required: true
        description: Create peer request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: peer data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: peer identifier
                    example: peer-a1b2c3d4
  /peers/{peer_id}:
    get:
      operationId: getPeerById
      summary: Get peer
      description: Get operation for peer resources.
      tags:
        - Peers
      parameters:
        - &a1
          name: peer_id
          in: path
          required: true
          description: peer id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: peer identifier
                    example: peer-a1b2c3d4
    put:
      operationId: updatePeerById
      summary: Update peer
      description: Update operation for peer resources.
      tags:
        - Peers
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update peer request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: peer data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: peer identifier
                    example: peer-a1b2c3d4
  /peers/{peer_id}/sessions:
    get:
      operationId: listSessionById
      summary: List session
      description: List operation for session resources.
      tags:
        - Peers
      parameters:
        - name: peer_id
          in: path
          required: true
          description: peer id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: session identifier
                    example: session-a1b2c3d4
  /ix-ports:
    get:
      operationId: listIxPort
      summary: List ix port
      description: List operation for ix port resources.
      tags:
        - Peers
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
