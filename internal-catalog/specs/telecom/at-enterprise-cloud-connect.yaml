openapi: 3.0.3
info:
  title: Cloud Connect API
  description: Direct cloud interconnect provisioning to AWS, Azure, and GCP with virtual cross-connect management.
    Supports multi-cloud networking, bandwidth scaling, and BGP route exchange for hybrid cloud architectures.
  version: 1.7.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-enterprise-cloud-connect
  x-acme-domain: enterprise
servers:
  - url: https://at-enterprise-cloud-connect.api.acmetelecom.com/v1
    description: Production
  - url: https://at-enterprise-cloud-connect.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Connections
    description: Cloud interconnect management
  - name: Cross-Connects
    description: Virtual cross-connect provisioning
paths:
  /connections:
    get:
      operationId: listConnection
      summary: List connection
      description: List operation for connection resources.
      tags:
        - Connections
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: connection identifier
                    example: connection-a1b2c3d4
    post:
      operationId: createConnection
      summary: Create connection
      description: Create operation for connection resources.
      tags:
        - Connections
      requestBody:
        required: true
        description: Create connection request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: connection data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: connection identifier
                    example: connection-a1b2c3d4
  /connections/{connection_id}:
    get:
      operationId: getConnectionById
      summary: Get connection
      description: Get operation for connection resources.
      tags:
        - Connections
      parameters:
        - &a1
          name: connection_id
          in: path
          required: true
          description: connection id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: connection identifier
                    example: connection-a1b2c3d4
    put:
      operationId: updateConnectionById
      summary: Update connection
      description: Update operation for connection resources.
      tags:
        - Connections
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update connection request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: connection data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: connection identifier
                    example: connection-a1b2c3d4
    delete:
      operationId: deleteConnectionById
      summary: Delete connection
      description: Delete operation for connection resources.
      tags:
        - Connections
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: connection identifier
                    example: connection-a1b2c3d4
  /connections/{connection_id}/cross-connects:
    get:
      operationId: listCrossConnectById
      summary: List cross connect
      description: List operation for cross connect resources.
      tags:
        - Connections
      parameters:
        - &a2
          name: connection_id
          in: path
          required: true
          description: connection id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: cross_connect identifier
                    example: cross_connect-a1b2c3d4
    post:
      operationId: createCrossConnectById
      summary: Create cross connect
      description: Create operation for cross connect resources.
      tags:
        - Connections
      parameters:
        - *a2
      requestBody:
        required: true
        description: Create cross_connect request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: cross_connect data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: cross_connect identifier
                    example: cross_connect-a1b2c3d4
  /connections/{connection_id}/routes:
    get:
      operationId: listRouteById
      summary: List route
      description: List operation for route resources.
      tags:
        - Connections
      parameters:
        - name: connection_id
          in: path
          required: true
          description: connection id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: route identifier
                    example: route-a1b2c3d4
  /providers:
    get:
      operationId: listProvider
      summary: List provider
      description: List operation for provider resources.
      tags:
        - Connections
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: provider identifier
                    example: provider-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
