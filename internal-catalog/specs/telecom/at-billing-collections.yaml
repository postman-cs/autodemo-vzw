openapi: 3.0.3
info:
  title: Collections API
  description: Debt collection workflow management with configurable dunning letter sequences and escalation rules.
    Supports payment arrangement negotiation, write-off processing, and integration with external collection agencies.
  version: 1.4.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-billing-collections
  x-acme-domain: billing
servers:
  - url: https://at-billing-collections.api.acmetelecom.com/v1
    description: Production
  - url: https://at-billing-collections.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Dunning
    description: Dunning process management
  - name: Arrangements
    description: Payment arrangement negotiation
paths:
  /collections/cases:
    get:
      operationId: listCase
      summary: List case
      description: List operation for case resources.
      tags:
        - Dunning
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: case identifier
                    example: case-a1b2c3d4
  /collections/cases/{case_id}:
    get:
      operationId: getCaseById
      summary: Get case
      description: Get operation for case resources.
      tags:
        - Dunning
      parameters:
        - &a1
          name: case_id
          in: path
          required: true
          description: case id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: case identifier
                    example: case-a1b2c3d4
    put:
      operationId: updateCaseById
      summary: Update case
      description: Update operation for case resources.
      tags:
        - Dunning
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update case request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: case data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: case identifier
                    example: case-a1b2c3d4
  /collections/cases/{case_id}/dunning:
    get:
      operationId: listDunningStepById
      summary: List dunning step
      description: List operation for dunning step resources.
      tags:
        - Dunning
      parameters:
        - name: case_id
          in: path
          required: true
          description: case id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: dunning_step identifier
                    example: dunning_step-a1b2c3d4
  /collections/cases/{case_id}/arrangements:
    get:
      operationId: listArrangementById
      summary: List arrangement
      description: List operation for arrangement resources.
      tags:
        - Dunning
      parameters:
        - &a2
          name: case_id
          in: path
          required: true
          description: case id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: arrangement identifier
                    example: arrangement-a1b2c3d4
    post:
      operationId: createArrangementById
      summary: Create arrangement
      description: Create operation for arrangement resources.
      tags:
        - Dunning
      parameters:
        - *a2
      requestBody:
        required: true
        description: Create arrangement request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: arrangement data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: arrangement identifier
                    example: arrangement-a1b2c3d4
  /collections/cases/{case_id}/write-off:
    post:
      operationId: actionCaseById
      summary: Action case
      description: Action operation for case resources.
      tags:
        - Dunning
      parameters:
        - name: case_id
          in: path
          required: true
          description: case id
          schema:
            type: string
      requestBody:
        required: true
        description: Action case request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: case data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: case identifier
                    example: case-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
