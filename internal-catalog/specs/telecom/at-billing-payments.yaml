openapi: 3.0.3
info:
  title: Payment Processing API
  description: Payment collection via credit card, direct debit, and digital wallets with PCI-DSS compliance. Provides
    tokenized payment storage, recurring payment scheduling, and real-time payment status with refund processing.
  version: 3.0.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-billing-payments
  x-acme-domain: billing
servers:
  - url: https://at-billing-payments.api.acmetelecom.com/v1
    description: Production
  - url: https://at-billing-payments.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Payments
    description: Payment processing and tracking
  - name: Refunds
    description: Refund management
paths:
  /payments:
    get:
      operationId: listPayment
      summary: List payment
      description: List operation for payment resources.
      tags:
        - Payments
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: payment identifier
                    example: payment-a1b2c3d4
    post:
      operationId: createPayment
      summary: Create payment
      description: Create operation for payment resources.
      tags:
        - Payments
      requestBody:
        required: true
        description: Create payment request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: payment data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: payment identifier
                    example: payment-a1b2c3d4
  /payments/{payment_id}:
    get:
      operationId: getPaymentById
      summary: Get payment
      description: Get operation for payment resources.
      tags:
        - Payments
      parameters:
        - name: payment_id
          in: path
          required: true
          description: payment id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: payment identifier
                    example: payment-a1b2c3d4
  /payments/{payment_id}/refund:
    post:
      operationId: createRefundById
      summary: Create refund
      description: Create operation for refund resources.
      tags:
        - Payments
      parameters:
        - name: payment_id
          in: path
          required: true
          description: payment id
          schema:
            type: string
      requestBody:
        required: true
        description: Create refund request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: refund data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: refund identifier
                    example: refund-a1b2c3d4
  /recurring:
    get:
      operationId: listRecurringPayment
      summary: List recurring payment
      description: List operation for recurring payment resources.
      tags:
        - Payments
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: recurring_payment identifier
                    example: recurring_payment-a1b2c3d4
    post:
      operationId: createRecurringPayment
      summary: Create recurring payment
      description: Create operation for recurring payment resources.
      tags:
        - Payments
      requestBody:
        required: true
        description: Create recurring_payment request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: recurring_payment data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: recurring_payment identifier
                    example: recurring_payment-a1b2c3d4
  /recurring/{recurring_id}:
    get:
      operationId: getRecurringPaymentById
      summary: Get recurring payment
      description: Get operation for recurring payment resources.
      tags:
        - Payments
      parameters:
        - &a1
          name: recurring_id
          in: path
          required: true
          description: recurring id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: recurring_payment identifier
                    example: recurring_payment-a1b2c3d4
    put:
      operationId: updateRecurringPaymentById
      summary: Update recurring payment
      description: Update operation for recurring payment resources.
      tags:
        - Payments
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update recurring_payment request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: recurring_payment data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: recurring_payment identifier
                    example: recurring_payment-a1b2c3d4
    delete:
      operationId: deleteRecurringPaymentById
      summary: Delete recurring payment
      description: Delete operation for recurring payment resources.
      tags:
        - Payments
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: recurring_payment identifier
                    example: recurring_payment-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
