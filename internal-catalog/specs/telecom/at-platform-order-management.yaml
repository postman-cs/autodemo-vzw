openapi: 3.0.3
info:
  title: Order Management API
  description: Order lifecycle management from capture to fulfillment with multi-step orchestration. Supports TMF622
    product ordering, order decomposition into service and resource orders, and real-time status tracking.
  version: 2.5.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-platform-order-management
  x-acme-domain: platform
servers:
  - url: https://at-platform-order-management.api.acmetelecom.com/v1
    description: Production
  - url: https://at-platform-order-management.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Orders
    description: Order lifecycle management
  - name: Tasks
    description: Order fulfillment tasks
paths:
  /orders:
    get:
      operationId: listOrder
      summary: List order
      description: List operation for order resources.
      tags:
        - Orders
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: order identifier
                    example: order-a1b2c3d4
    post:
      operationId: createOrder
      summary: Create order
      description: Create operation for order resources.
      tags:
        - Orders
      requestBody:
        required: true
        description: Create order request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: order data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: order identifier
                    example: order-a1b2c3d4
  /orders/{order_id}:
    get:
      operationId: getOrderById
      summary: Get order
      description: Get operation for order resources.
      tags:
        - Orders
      parameters:
        - &a1
          name: order_id
          in: path
          required: true
          description: order id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: order identifier
                    example: order-a1b2c3d4
    put:
      operationId: updateOrderById
      summary: Update order
      description: Update operation for order resources.
      tags:
        - Orders
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update order request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: order data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: order identifier
                    example: order-a1b2c3d4
  /orders/{order_id}/items:
    get:
      operationId: listOrderItemById
      summary: List order item
      description: List operation for order item resources.
      tags:
        - Orders
      parameters:
        - name: order_id
          in: path
          required: true
          description: order id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: order_item identifier
                    example: order_item-a1b2c3d4
  /orders/{order_id}/cancel:
    post:
      operationId: actionOrderById
      summary: Action order
      description: Action operation for order resources.
      tags:
        - Orders
      parameters:
        - name: order_id
          in: path
          required: true
          description: order id
          schema:
            type: string
      requestBody:
        required: true
        description: Action order request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: order data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: order identifier
                    example: order-a1b2c3d4
  /tasks:
    get:
      operationId: listTask
      summary: List task
      description: List operation for task resources.
      tags:
        - Orders
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: task identifier
                    example: task-a1b2c3d4
  /tasks/{task_id}:
    get:
      operationId: getTaskById
      summary: Get task
      description: Get operation for task resources.
      tags:
        - Orders
      parameters:
        - &a2
          name: task_id
          in: path
          required: true
          description: task id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: task identifier
                    example: task-a1b2c3d4
    put:
      operationId: updateTaskById
      summary: Update task
      description: Update operation for task resources.
      tags:
        - Orders
      parameters:
        - *a2
      requestBody:
        required: true
        description: Update task request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: task data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: task identifier
                    example: task-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
