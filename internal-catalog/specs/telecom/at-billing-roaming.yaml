openapi: 3.0.3
info:
  title: Roaming Charges API
  description: Roaming usage rating, TAP file processing, and inter-operator tariff management. Provides EU
    roam-like-at-home compliance, roaming zone configuration, and real-time roaming spend alerts for subscribers.
  version: 1.7.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-billing-roaming
  x-acme-domain: billing
servers:
  - url: https://at-billing-roaming.api.acmetelecom.com/v1
    description: Production
  - url: https://at-billing-roaming.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Roaming
    description: Roaming charge management
  - name: TAP
    description: TAP file processing
paths:
  /roaming/usage/{subscriber_id}:
    get:
      operationId: getUsageById
      summary: Get usage
      description: Get operation for usage resources.
      tags:
        - Roaming
      parameters:
        - name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: usage identifier
                    example: usage-a1b2c3d4
  /roaming/rates:
    get:
      operationId: listRate
      summary: List rate
      description: List operation for rate resources.
      tags:
        - Roaming
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rate identifier
                    example: rate-a1b2c3d4
  /roaming/rates/{zone_id}:
    get:
      operationId: getRateById
      summary: Get rate
      description: Get operation for rate resources.
      tags:
        - Roaming
      parameters:
        - &a1
          name: zone_id
          in: path
          required: true
          description: zone id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rate identifier
                    example: rate-a1b2c3d4
    put:
      operationId: updateRateById
      summary: Update rate
      description: Update operation for rate resources.
      tags:
        - Roaming
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update rate request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: rate data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rate identifier
                    example: rate-a1b2c3d4
  /roaming/tap-files:
    get:
      operationId: listTapFile
      summary: List tap file
      description: List operation for tap file resources.
      tags:
        - Roaming
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: tap_file identifier
                    example: tap_file-a1b2c3d4
  /roaming/tap-files/{file_id}:
    get:
      operationId: getTapFileById
      summary: Get tap file
      description: Get operation for tap file resources.
      tags:
        - Roaming
      parameters:
        - name: file_id
          in: path
          required: true
          description: file id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: tap_file identifier
                    example: tap_file-a1b2c3d4
  /roaming/alerts/{subscriber_id}:
    get:
      operationId: getAlertConfigById
      summary: Get alert config
      description: Get operation for alert config resources.
      tags:
        - Roaming
      parameters:
        - &a2
          name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: alert_config identifier
                    example: alert_config-a1b2c3d4
    put:
      operationId: updateAlertConfigById
      summary: Update alert config
      description: Update operation for alert config resources.
      tags:
        - Roaming
      parameters:
        - *a2
      requestBody:
        required: true
        description: Update alert_config request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: alert_config data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: alert_config identifier
                    example: alert_config-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
