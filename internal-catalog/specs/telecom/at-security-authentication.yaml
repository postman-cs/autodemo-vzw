openapi: 3.0.3
info:
  title: Network Authentication API
  description: SIM-based silent authentication, mobile identity verification, and multi-factor auth for secure access.
    Supports Number Verify, Mobile Connect standards, and header enrichment for frictionless subscriber identification.
  version: 1.9.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-security-authentication
  x-acme-domain: security
servers:
  - url: https://at-security-authentication.api.acmetelecom.com/v1
    description: Production
  - url: https://at-security-authentication.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Auth
    description: Authentication operations
  - name: Verification
    description: Identity verification
paths:
  /auth/verify-number:
    post:
      operationId: createVerification
      summary: Create verification
      description: Create operation for verification resources.
      tags:
        - Auth
      requestBody:
        required: true
        description: Create verification request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: verification data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: verification identifier
                    example: verification-a1b2c3d4
  /auth/silent-auth:
    post:
      operationId: createAuthResult
      summary: Create auth result
      description: Create operation for auth result resources.
      tags:
        - Auth
      requestBody:
        required: true
        description: Create auth_result request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: auth_result data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: auth_result identifier
                    example: auth_result-a1b2c3d4
  /auth/mfa/send:
    post:
      operationId: createChallenge
      summary: Create challenge
      description: Create operation for challenge resources.
      tags:
        - Auth
      requestBody:
        required: true
        description: Create challenge request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: challenge data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: challenge identifier
                    example: challenge-a1b2c3d4
  /auth/mfa/verify:
    post:
      operationId: createVerification
      summary: Create verification
      description: Create operation for verification resources.
      tags:
        - Auth
      requestBody:
        required: true
        description: Create verification request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: verification data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: verification identifier
                    example: verification-a1b2c3d4
  /auth/sessions:
    get:
      operationId: listSession
      summary: List session
      description: List operation for session resources.
      tags:
        - Auth
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: session identifier
                    example: session-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
