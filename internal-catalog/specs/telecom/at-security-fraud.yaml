openapi: 3.0.3
info:
  title: Telecom Fraud Detection API
  description: Real-time fraud detection for SIM swap, international revenue share fraud (IRSF), and Wangiri attacks.
    Employs machine learning risk scoring, automated blocking rules, and fraud analyst investigation workflows.
  version: 2.6.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-security-fraud
  x-acme-domain: security
servers:
  - url: https://at-security-fraud.api.acmetelecom.com/v1
    description: Production
  - url: https://at-security-fraud.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Alerts
    description: Fraud alert management
  - name: Rules
    description: Fraud detection rules
paths:
  /alerts:
    get:
      operationId: listAlert
      summary: List alert
      description: List operation for alert resources.
      tags:
        - Alerts
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: alert identifier
                    example: alert-a1b2c3d4
  /alerts/{alert_id}:
    get:
      operationId: getAlertById
      summary: Get alert
      description: Get operation for alert resources.
      tags:
        - Alerts
      parameters:
        - &a1
          name: alert_id
          in: path
          required: true
          description: alert id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: alert identifier
                    example: alert-a1b2c3d4
    put:
      operationId: updateAlertById
      summary: Update alert
      description: Update operation for alert resources.
      tags:
        - Alerts
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update alert request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: alert data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: alert identifier
                    example: alert-a1b2c3d4
  /alerts/{alert_id}/investigate:
    post:
      operationId: actionAlertById
      summary: Action alert
      description: Action operation for alert resources.
      tags:
        - Alerts
      parameters:
        - name: alert_id
          in: path
          required: true
          description: alert id
          schema:
            type: string
      requestBody:
        required: true
        description: Action alert request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: alert data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: alert identifier
                    example: alert-a1b2c3d4
  /rules:
    get:
      operationId: listRule
      summary: List rule
      description: List operation for rule resources.
      tags:
        - Alerts
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rule identifier
                    example: rule-a1b2c3d4
    post:
      operationId: createRule
      summary: Create rule
      description: Create operation for rule resources.
      tags:
        - Alerts
      requestBody:
        required: true
        description: Create rule request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: rule data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rule identifier
                    example: rule-a1b2c3d4
  /rules/{rule_id}:
    get:
      operationId: getRuleById
      summary: Get rule
      description: Get operation for rule resources.
      tags:
        - Alerts
      parameters:
        - &a2
          name: rule_id
          in: path
          required: true
          description: rule id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rule identifier
                    example: rule-a1b2c3d4
    put:
      operationId: updateRuleById
      summary: Update rule
      description: Update operation for rule resources.
      tags:
        - Alerts
      parameters:
        - *a2
      requestBody:
        required: true
        description: Update rule request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: rule data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rule identifier
                    example: rule-a1b2c3d4
    delete:
      operationId: deleteRuleById
      summary: Delete rule
      description: Delete operation for rule resources.
      tags:
        - Alerts
      parameters:
        - *a2
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rule identifier
                    example: rule-a1b2c3d4
  /risk-scores/{subscriber_id}:
    get:
      operationId: getRiskScoreById
      summary: Get risk score
      description: Get operation for risk score resources.
      tags:
        - Alerts
      parameters:
        - name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: risk_score identifier
                    example: risk_score-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
