openapi: 3.0.3
info:
  title: Media Transcoding API
  description: Video and audio transcoding with format conversion and quality optimization workflows. Supports H.264,
    H.265, AV1 codecs, adaptive streaming packaging for HLS/DASH, and thumbnail extraction at scale.
  version: 1.4.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-media-transcoding
  x-acme-domain: media
servers:
  - url: https://at-media-transcoding.api.acmetelecom.com/v1
    description: Production
  - url: https://at-media-transcoding.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Jobs
    description: Transcoding job management
  - name: Presets
    description: Encoding preset configuration
paths:
  /jobs:
    get:
      operationId: listJob
      summary: List job
      description: List operation for job resources.
      tags:
        - Jobs
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: job identifier
                    example: job-a1b2c3d4
    post:
      operationId: createJob
      summary: Create job
      description: Create operation for job resources.
      tags:
        - Jobs
      requestBody:
        required: true
        description: Create job request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: job data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: job identifier
                    example: job-a1b2c3d4
  /jobs/{job_id}:
    get:
      operationId: getJobById
      summary: Get job
      description: Get operation for job resources.
      tags:
        - Jobs
      parameters:
        - name: job_id
          in: path
          required: true
          description: job id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: job identifier
                    example: job-a1b2c3d4
  /jobs/{job_id}/cancel:
    post:
      operationId: actionJobById
      summary: Action job
      description: Action operation for job resources.
      tags:
        - Jobs
      parameters:
        - name: job_id
          in: path
          required: true
          description: job id
          schema:
            type: string
      requestBody:
        required: true
        description: Action job request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: job data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: job identifier
                    example: job-a1b2c3d4
  /presets:
    get:
      operationId: listPreset
      summary: List preset
      description: List operation for preset resources.
      tags:
        - Jobs
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: preset identifier
                    example: preset-a1b2c3d4
    post:
      operationId: createPreset
      summary: Create preset
      description: Create operation for preset resources.
      tags:
        - Jobs
      requestBody:
        required: true
        description: Create preset request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: preset data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: preset identifier
                    example: preset-a1b2c3d4
  /presets/{preset_id}:
    get:
      operationId: getPresetById
      summary: Get preset
      description: Get operation for preset resources.
      tags:
        - Jobs
      parameters:
        - &a1
          name: preset_id
          in: path
          required: true
          description: preset id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: preset identifier
                    example: preset-a1b2c3d4
    put:
      operationId: updatePresetById
      summary: Update preset
      description: Update operation for preset resources.
      tags:
        - Jobs
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update preset request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: preset data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: preset identifier
                    example: preset-a1b2c3d4
    delete:
      operationId: deletePresetById
      summary: Delete preset
      description: Delete operation for preset resources.
      tags:
        - Jobs
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: preset identifier
                    example: preset-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
