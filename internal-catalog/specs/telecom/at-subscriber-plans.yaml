openapi: 3.0.3
info:
  title: Plan Catalog API
  description: Voice, data, and bundle plan catalog with pricing tiers and promotional offers. Provides plan comparison
    tools, migration eligibility rules, and localized pricing for multi-market deployments.
  version: 2.5.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-subscriber-plans
  x-acme-domain: subscriber
servers:
  - url: https://at-subscriber-plans.api.acmetelecom.com/v1
    description: Production
  - url: https://at-subscriber-plans.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Plans
    description: Plan catalog and pricing
  - name: Promotions
    description: Promotional offers and discounts
paths:
  /plans:
    get:
      operationId: listPlan
      summary: List plan
      description: List operation for plan resources.
      tags:
        - Plans
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: plan identifier
                    example: plan-a1b2c3d4
  /plans/{plan_id}:
    get:
      operationId: getPlanById
      summary: Get plan
      description: Get operation for plan resources.
      tags:
        - Plans
      parameters:
        - name: plan_id
          in: path
          required: true
          description: plan id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: plan identifier
                    example: plan-a1b2c3d4
  /plans/compare:
    post:
      operationId: searchComparison
      summary: Search comparison
      description: Search operation for comparison resources.
      tags:
        - Plans
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      requestBody:
        required: true
        description: Search comparison request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: comparison data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: comparison identifier
                    example: comparison-a1b2c3d4
  /promotions:
    get:
      operationId: listPromotion
      summary: List promotion
      description: List operation for promotion resources.
      tags:
        - Plans
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: promotion identifier
                    example: promotion-a1b2c3d4
  /promotions/{promotion_id}:
    get:
      operationId: getPromotionById
      summary: Get promotion
      description: Get operation for promotion resources.
      tags:
        - Plans
      parameters:
        - name: promotion_id
          in: path
          required: true
          description: promotion id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: promotion identifier
                    example: promotion-a1b2c3d4
  /subscribers/{subscriber_id}/eligible-plans:
    get:
      operationId: listPlanById
      summary: List plan
      description: List operation for plan resources.
      tags:
        - Plans
      parameters:
        - name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: plan identifier
                    example: plan-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
