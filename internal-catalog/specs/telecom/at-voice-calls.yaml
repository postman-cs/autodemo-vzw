openapi: 3.0.3
info:
  title: Voice Call API
  description: Programmatic voice call initiation, transfer, and call detail record generation for CPaaS scenarios.
    Supports WebRTC and PSTN bridging, real-time transcription, and call progress event webhooks.
  version: 2.5.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-voice-calls
  x-acme-domain: voice
servers:
  - url: https://at-voice-calls.api.acmetelecom.com/v1
    description: Production
  - url: https://at-voice-calls.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Calls
    description: Voice call management
  - name: Legs
    description: Call leg and transfer control
paths:
  /calls:
    get:
      operationId: listCall
      summary: List call
      description: List operation for call resources.
      tags:
        - Calls
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: call identifier
                    example: call-a1b2c3d4
    post:
      operationId: createCall
      summary: Create call
      description: Create operation for call resources.
      tags:
        - Calls
      requestBody:
        required: true
        description: Create call request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: call data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: call identifier
                    example: call-a1b2c3d4
  /calls/{call_id}:
    get:
      operationId: getCallById
      summary: Get call
      description: Get operation for call resources.
      tags:
        - Calls
      parameters:
        - name: call_id
          in: path
          required: true
          description: call id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: call identifier
                    example: call-a1b2c3d4
  /calls/{call_id}/transfer:
    post:
      operationId: actionCallById
      summary: Action call
      description: Action operation for call resources.
      tags:
        - Calls
      parameters:
        - name: call_id
          in: path
          required: true
          description: call id
          schema:
            type: string
      requestBody:
        required: true
        description: Action call request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: call data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: call identifier
                    example: call-a1b2c3d4
  /calls/{call_id}/hangup:
    post:
      operationId: actionCallById
      summary: Action call
      description: Action operation for call resources.
      tags:
        - Calls
      parameters:
        - name: call_id
          in: path
          required: true
          description: call id
          schema:
            type: string
      requestBody:
        required: true
        description: Action call request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: call data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: call identifier
                    example: call-a1b2c3d4
  /calls/{call_id}/dtmf:
    post:
      operationId: createDtmfById
      summary: Create dtmf
      description: Create operation for dtmf resources.
      tags:
        - Calls
      parameters:
        - name: call_id
          in: path
          required: true
          description: call id
          schema:
            type: string
      requestBody:
        required: true
        description: Create dtmf request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: dtmf data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: dtmf identifier
                    example: dtmf-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
