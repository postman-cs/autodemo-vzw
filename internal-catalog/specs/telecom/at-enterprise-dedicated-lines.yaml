openapi: 3.0.3
info:
  title: Dedicated Line API
  description: Leased line provisioning, bandwidth management, and SLA monitoring for enterprise connectivity. Supports
    Ethernet, wavelength, and dark fiber services with automated bandwidth-on-demand scaling and proactive fault
    notification.
  version: 1.3.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-enterprise-dedicated-lines
  x-acme-domain: enterprise
servers:
  - url: https://at-enterprise-dedicated-lines.api.acmetelecom.com/v1
    description: Production
  - url: https://at-enterprise-dedicated-lines.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Lines
    description: Dedicated line management
  - name: Bandwidth
    description: Bandwidth provisioning and scaling
paths:
  /lines:
    get:
      operationId: listLine
      summary: List line
      description: List operation for line resources.
      tags:
        - Lines
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: line identifier
                    example: line-a1b2c3d4
    post:
      operationId: createLine
      summary: Create line
      description: Create operation for line resources.
      tags:
        - Lines
      requestBody:
        required: true
        description: Create line request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: line data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: line identifier
                    example: line-a1b2c3d4
  /lines/{line_id}:
    get:
      operationId: getLineById
      summary: Get line
      description: Get operation for line resources.
      tags:
        - Lines
      parameters:
        - &a1
          name: line_id
          in: path
          required: true
          description: line id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: line identifier
                    example: line-a1b2c3d4
    put:
      operationId: updateLineById
      summary: Update line
      description: Update operation for line resources.
      tags:
        - Lines
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update line request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: line data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: line identifier
                    example: line-a1b2c3d4
  /lines/{line_id}/bandwidth:
    get:
      operationId: getBandwidthById
      summary: Get bandwidth
      description: Get operation for bandwidth resources.
      tags:
        - Lines
      parameters:
        - &a2
          name: line_id
          in: path
          required: true
          description: line id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: bandwidth identifier
                    example: bandwidth-a1b2c3d4
    put:
      operationId: updateBandwidthById
      summary: Update bandwidth
      description: Update operation for bandwidth resources.
      tags:
        - Lines
      parameters:
        - *a2
      requestBody:
        required: true
        description: Update bandwidth request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: bandwidth data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: bandwidth identifier
                    example: bandwidth-a1b2c3d4
  /lines/{line_id}/sla:
    get:
      operationId: getSlaMetricsById
      summary: Get sla metrics
      description: Get operation for sla metrics resources.
      tags:
        - Lines
      parameters:
        - name: line_id
          in: path
          required: true
          description: line id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: sla_metrics identifier
                    example: sla_metrics-a1b2c3d4
  /lines/{line_id}/faults:
    get:
      operationId: listFaultById
      summary: List fault
      description: List operation for fault resources.
      tags:
        - Lines
      parameters:
        - name: line_id
          in: path
          required: true
          description: line id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: fault identifier
                    example: fault-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
