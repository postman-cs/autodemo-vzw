        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: group identifier
                    example: group-a1b2c3d4
    post:
      operationId: createGroup
      summary: Create group
      description: Create operation for group resources.
      tags:
        - Devices
      requestBody:
        required: true
        description: Create group request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: group data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: group identifier
                    example: group-a1b2c3d4
  /groups/{group_id}:
    get:
      operationId: getGroupById
      summary: Get group
      description: Get operation for group resources.
      tags:
        - Devices
      parameters:
        - &a3
          name: group_id
          in: path
          required: true
          description: group id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: group identifier
                    example: group-a1b2c3d4
    put:
      operationId: updateGroupById
      summary: Update group
      description: Update operation for group resources.
      tags:
        - Devices
      parameters:
        - *a3
      requestBody:
        required: true
        description: Update group request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: group data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: group identifier
                    example: group-a1b2c3d4
  /groups/{group_id}/devices:
    get:
      operationId: listDeviceById
      summary: List device
      description: List operation for device resources.
      tags:
        - Devices
      parameters:
        - name: group_id
          in: path
          required: true
          description: group id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: device identifier
                    example: device-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
