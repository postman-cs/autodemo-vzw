openapi: 3.0.3
info:
  title: IoT Device Registry API
  description: IoT device onboarding, lifecycle management, and metadata tagging for large-scale deployments. Supports
    device twins, hierarchical group management, and bulk provisioning operations with import/export capabilities.
  version: 2.4.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-iot-devices
  x-acme-domain: iot
servers:
  - url: https://at-iot-devices.api.acmetelecom.com/v1
    description: Production
  - url: https://at-iot-devices.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Devices
    description: IoT device management
  - name: Groups
    description: Device group management
paths:
  /devices:
    get:
      operationId: listDevice
      summary: List device
      description: List operation for device resources.
      tags:
        - Devices
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: device identifier
                    example: device-a1b2c3d4
    post:
      operationId: createDevice
      summary: Create device
      description: Create operation for device resources.
      tags:
        - Devices
      requestBody:
        required: true
        description: Create device request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: device data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: device identifier
                    example: device-a1b2c3d4
  /devices/{device_id}:
    get:
      operationId: getDeviceById
      summary: Get device
      description: Get operation for device resources.
      tags:
        - Devices
      parameters:
        - &a1
          name: device_id
          in: path
          required: true
          description: device id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: device identifier
                    example: device-a1b2c3d4
    put:
      operationId: updateDeviceById
      summary: Update device
      description: Update operation for device resources.
      tags:
        - Devices
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update device request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: device data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: device identifier
                    example: device-a1b2c3d4
    delete:
      operationId: deleteDeviceById
      summary: Delete device
      description: Delete operation for device resources.
      tags:
        - Devices
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: device identifier
                    example: device-a1b2c3d4
  /devices/{device_id}/twin:
    get:
      operationId: getTwinById
      summary: Get twin
      description: Get operation for twin resources.
      tags:
        - Devices
      parameters:
        - &a2
          name: device_id
          in: path
          required: true
          description: device id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: twin identifier
                    example: twin-a1b2c3d4
    put:
      operationId: updateTwinById
      summary: Update twin
      description: Update operation for twin resources.
      tags:
        - Devices
      parameters:
        - *a2
      requestBody:
        required: true
        description: Update twin request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: twin data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: twin identifier
                    example: twin-a1b2c3d4
  /groups:
    get:
      operationId: listGroup
      summary: List group
      description: List operation for group resources.
      tags:
        - Devices
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
