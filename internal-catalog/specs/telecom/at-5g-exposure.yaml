openapi: 3.0.3
info:
  title: Network Exposure API
  description: CAMARA-aligned network capability exposure for third-party developers and enterprise applications. Provides
    device status, connectivity insights, quality-on-demand APIs, and network event subscriptions.
  version: 1.8.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-5g-exposure
  x-acme-domain: 5g
servers:
  - url: https://at-5g-exposure.api.acmetelecom.com/v1
    description: Production
  - url: https://at-5g-exposure.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Capabilities
    description: Network capability exposure
  - name: Subscriptions
    description: Event subscription management
paths:
  /capabilities:
    get:
      operationId: listCapability
      summary: List capability
      description: List operation for capability resources.
      tags:
        - Capabilities
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: capability identifier
                    example: capability-a1b2c3d4
  /capabilities/{capability_id}:
    get:
      operationId: getCapabilityById
      summary: Get capability
      description: Get operation for capability resources.
      tags:
        - Capabilities
      parameters:
        - name: capability_id
          in: path
          required: true
          description: capability id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: capability identifier
                    example: capability-a1b2c3d4
  /device-status/{device_id}:
    get:
      operationId: getDeviceStatusById
      summary: Get device status
      description: Get operation for device status resources.
      tags:
        - Capabilities
      parameters:
        - name: device_id
          in: path
          required: true
          description: device id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: device_status identifier
                    example: device_status-a1b2c3d4
  /subscriptions:
    get:
      operationId: listSubscription
      summary: List subscription
      description: List operation for subscription resources.
      tags:
        - Capabilities
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: subscription identifier
                    example: subscription-a1b2c3d4
    post:
      operationId: createSubscription
      summary: Create subscription
      description: Create operation for subscription resources.
      tags:
        - Capabilities
      requestBody:
        required: true
        description: Create subscription request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: subscription data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: subscription identifier
                    example: subscription-a1b2c3d4
  /subscriptions/{subscription_id}:
    get:
      operationId: getSubscriptionById
      summary: Get subscription
      description: Get operation for subscription resources.
      tags:
        - Capabilities
      parameters:
        - &a1
          name: subscription_id
          in: path
          required: true
          description: subscription id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: subscription identifier
                    example: subscription-a1b2c3d4
    put:
      operationId: updateSubscriptionById
      summary: Update subscription
      description: Update operation for subscription resources.
      tags:
        - Capabilities
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update subscription request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: subscription data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: subscription identifier
                    example: subscription-a1b2c3d4
    delete:
      operationId: deleteSubscriptionById
      summary: Delete subscription
      description: Delete operation for subscription resources.
      tags:
        - Capabilities
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: subscription identifier
                    example: subscription-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
