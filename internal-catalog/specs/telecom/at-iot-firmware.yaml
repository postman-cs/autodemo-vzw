openapi: 3.0.3
info:
  title: IoT Firmware OTA API
  description: Over-the-air firmware update campaigns for IoT device fleets with staged rollout control. Supports delta
    updates, version compatibility checks, rollback triggers, and per-device update status tracking.
  version: 1.4.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-iot-firmware
  x-acme-domain: iot
servers:
  - url: https://at-iot-firmware.api.acmetelecom.com/v1
    description: Production
  - url: https://at-iot-firmware.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Firmware
    description: Firmware version management
  - name: Campaigns
    description: OTA update campaign management
paths:
  /firmware:
    get:
      operationId: listFirmware
      summary: List firmware
      description: List operation for firmware resources.
      tags:
        - Firmware
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: firmware identifier
                    example: firmware-a1b2c3d4
    post:
      operationId: createFirmware
      summary: Create firmware
      description: Create operation for firmware resources.
      tags:
        - Firmware
      requestBody:
        required: true
        description: Create firmware request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: firmware data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: firmware identifier
                    example: firmware-a1b2c3d4
  /firmware/{firmware_id}:
    get:
      operationId: getFirmwareById
      summary: Get firmware
      description: Get operation for firmware resources.
      tags:
        - Firmware
      parameters:
        - name: firmware_id
          in: path
          required: true
          description: firmware id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: firmware identifier
                    example: firmware-a1b2c3d4
  /campaigns:
    get:
      operationId: listCampaign
      summary: List campaign
      description: List operation for campaign resources.
      tags:
        - Firmware
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: campaign identifier
                    example: campaign-a1b2c3d4
    post:
      operationId: createCampaign
      summary: Create campaign
      description: Create operation for campaign resources.
      tags:
        - Firmware
      requestBody:
        required: true
        description: Create campaign request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: campaign data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: campaign identifier
                    example: campaign-a1b2c3d4
  /campaigns/{campaign_id}:
    get:
      operationId: getCampaignById
      summary: Get campaign
      description: Get operation for campaign resources.
      tags:
        - Firmware
      parameters:
        - &a1
          name: campaign_id
          in: path
          required: true
          description: campaign id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: campaign identifier
                    example: campaign-a1b2c3d4
    put:
      operationId: updateCampaignById
      summary: Update campaign
      description: Update operation for campaign resources.
      tags:
        - Firmware
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update campaign request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: campaign data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: campaign identifier
                    example: campaign-a1b2c3d4
  /campaigns/{campaign_id}/rollout:
    get:
      operationId: getRolloutById
      summary: Get rollout
      description: Get operation for rollout resources.
      tags:
        - Firmware
      parameters:
        - &a2
          name: campaign_id
          in: path
          required: true
          description: campaign id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rollout identifier
                    example: rollout-a1b2c3d4
    put:
      operationId: updateRolloutById
      summary: Update rollout
      description: Update operation for rollout resources.
      tags:
        - Firmware
      parameters:
        - *a2
      requestBody:
        required: true
        description: Update rollout request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: rollout data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rollout identifier
                    example: rollout-a1b2c3d4
  /devices/{device_id}/firmware:
    get:
      operationId: getDeviceFirmwareById
      summary: Get device firmware
      description: Get operation for device firmware resources.
      tags:
        - Firmware
      parameters:
        - name: device_id
          in: path
          required: true
          description: device id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: device_firmware identifier
                    example: device_firmware-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
