openapi: 3.0.3
info:
  title: Number Portability API
  description: Mobile and fixed-line number porting between carriers with regulatory compliance tracking. Manages port-in
    and port-out requests, FOC scheduling, and conflict resolution with automated carrier notification.
  version: 1.8.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-subscriber-porting
  x-acme-domain: subscriber
servers:
  - url: https://at-subscriber-porting.api.acmetelecom.com/v1
    description: Production
  - url: https://at-subscriber-porting.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Port Requests
    description: Number port request management
paths:
  /port-requests:
    get:
      operationId: listPortRequest
      summary: List port request
      description: List operation for port request resources.
      tags:
        - Port Requests
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: port_request identifier
                    example: port_request-a1b2c3d4
    post:
      operationId: createPortRequest
      summary: Create port request
      description: Create operation for port request resources.
      tags:
        - Port Requests
      requestBody:
        required: true
        description: Create port_request request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: port_request data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: port_request identifier
                    example: port_request-a1b2c3d4
  /port-requests/{request_id}:
    get:
      operationId: getPortRequestById
      summary: Get port request
      description: Get operation for port request resources.
      tags:
        - Port Requests
      parameters:
        - &a1
          name: request_id
          in: path
          required: true
          description: request id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: port_request identifier
                    example: port_request-a1b2c3d4
    put:
      operationId: updatePortRequestById
      summary: Update port request
      description: Update operation for port request resources.
      tags:
        - Port Requests
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update port_request request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: port_request data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: port_request identifier
                    example: port_request-a1b2c3d4
  /port-requests/{request_id}/approve:
    post:
      operationId: actionPortRequestById
      summary: Action port request
      description: Action operation for port request resources.
      tags:
        - Port Requests
      parameters:
        - name: request_id
          in: path
          required: true
          description: request id
          schema:
            type: string
      requestBody:
        required: true
        description: Action port_request request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: port_request data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: port_request identifier
                    example: port_request-a1b2c3d4
  /port-requests/{request_id}/reject:
    post:
      operationId: actionPortRequestById
      summary: Action port request
      description: Action operation for port request resources.
      tags:
        - Port Requests
      parameters:
        - name: request_id
          in: path
          required: true
          description: request id
          schema:
            type: string
      requestBody:
        required: true
        description: Action port_request request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: port_request data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: port_request identifier
                    example: port_request-a1b2c3d4
  /port-requests/{request_id}/status:
    get:
      operationId: getStatusById
      summary: Get status
      description: Get operation for status resources.
      tags:
        - Port Requests
      parameters:
        - name: request_id
          in: path
          required: true
          description: request id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: status identifier
                    example: status-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
