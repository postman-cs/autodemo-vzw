openapi: 3.0.3
info:
  title: 5G Core Network API
  description: 5G core network function management including AMF, SMF, UPF, and PCF lifecycle operations. Provides network
    function scaling, health monitoring, and service-based interface configuration for 5GC deployment.
  version: 2.3.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-5g-core
  x-acme-domain: 5g
servers:
  - url: https://at-5g-core.api.acmetelecom.com/v1
    description: Production
  - url: https://at-5g-core.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: NFs
    description: Core network function management
  - name: Health
    description: NF health monitoring
paths:
  /nfs:
    get:
      operationId: listNetworkFunction
      summary: List network function
      description: List operation for network function resources.
      tags:
        - NFs
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: network_function identifier
                    example: network_function-a1b2c3d4
  /nfs/{nf_id}:
    get:
      operationId: getNetworkFunctionById
      summary: Get network function
      description: Get operation for network function resources.
      tags:
        - NFs
      parameters:
        - &a1
          name: nf_id
          in: path
          required: true
          description: nf id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: network_function identifier
                    example: network_function-a1b2c3d4
    put:
      operationId: updateNetworkFunctionById
      summary: Update network function
      description: Update operation for network function resources.
      tags:
        - NFs
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update network_function request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: network_function data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: network_function identifier
                    example: network_function-a1b2c3d4
  /nfs/{nf_id}/health:
    get:
      operationId: getHealthById
      summary: Get health
      description: Get operation for health resources.
      tags:
        - NFs
      parameters:
        - name: nf_id
          in: path
          required: true
          description: nf id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: health identifier
                    example: health-a1b2c3d4
  /nfs/{nf_id}/scale:
    post:
      operationId: actionNetworkFunctionById
      summary: Action network function
      description: Action operation for network function resources.
      tags:
        - NFs
      parameters:
        - name: nf_id
          in: path
          required: true
          description: nf id
          schema:
            type: string
      requestBody:
        required: true
        description: Action network_function request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: network_function data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: network_function identifier
                    example: network_function-a1b2c3d4
  /nfs/{nf_id}/config:
    get:
      operationId: getConfigById
      summary: Get config
      description: Get operation for config resources.
      tags:
        - NFs
      parameters:
        - &a2
          name: nf_id
          in: path
          required: true
          description: nf id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: config identifier
                    example: config-a1b2c3d4
    put:
      operationId: updateConfigById
      summary: Update config
      description: Update operation for config resources.
      tags:
        - NFs
      parameters:
        - *a2
      requestBody:
        required: true
        description: Update config request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: config data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: config identifier
                    example: config-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
