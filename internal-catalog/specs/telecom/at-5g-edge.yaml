openapi: 3.0.3
info:
  title: Edge Computing API
  description: Multi-access edge computing application deployment and lifecycle management at network edge locations.
    Provides edge node discovery, workload placement optimization, and low-latency routing for latency-critical
    applications.
  version: 1.5.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-5g-edge
  x-acme-domain: 5g
servers:
  - url: https://at-5g-edge.api.acmetelecom.com/v1
    description: Production
  - url: https://at-5g-edge.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Applications
    description: Edge application management
  - name: Nodes
    description: Edge node discovery
paths:
  /applications:
    get:
      operationId: listApplication
      summary: List application
      description: List operation for application resources.
      tags:
        - Applications
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: application identifier
                    example: application-a1b2c3d4
    post:
      operationId: createApplication
      summary: Create application
      description: Create operation for application resources.
      tags:
        - Applications
      requestBody:
        required: true
        description: Create application request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: application data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: application identifier
                    example: application-a1b2c3d4
  /applications/{app_id}:
    get:
      operationId: getApplicationById
      summary: Get application
      description: Get operation for application resources.
      tags:
        - Applications
      parameters:
        - &a1
          name: app_id
          in: path
          required: true
          description: app id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: application identifier
                    example: application-a1b2c3d4
    put:
      operationId: updateApplicationById
      summary: Update application
      description: Update operation for application resources.
      tags:
        - Applications
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update application request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: application data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: application identifier
                    example: application-a1b2c3d4
    delete:
      operationId: deleteApplicationById
      summary: Delete application
      description: Delete operation for application resources.
      tags:
        - Applications
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: application identifier
                    example: application-a1b2c3d4
  /applications/{app_id}/deploy:
    post:
      operationId: actionApplicationById
      summary: Action application
      description: Action operation for application resources.
      tags:
        - Applications
      parameters:
        - name: app_id
          in: path
          required: true
          description: app id
          schema:
            type: string
      requestBody:
        required: true
        description: Action application request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: application data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: application identifier
                    example: application-a1b2c3d4
  /nodes:
    get:
      operationId: listNode
      summary: List node
      description: List operation for node resources.
      tags:
        - Applications
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: node identifier
                    example: node-a1b2c3d4
  /nodes/{node_id}:
    get:
      operationId: getNodeById
      summary: Get node
      description: Get operation for node resources.
      tags:
        - Applications
      parameters:
        - name: node_id
          in: path
          required: true
          description: node id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: node identifier
                    example: node-a1b2c3d4
  /nodes/{node_id}/metrics:
    get:
      operationId: getMetricsById
      summary: Get metrics
      description: Get operation for metrics resources.
      tags:
        - Applications
      parameters:
        - name: node_id
          in: path
          required: true
          description: node id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: metrics identifier
                    example: metrics-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
