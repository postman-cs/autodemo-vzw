openapi: 3.0.3
info:
  title: Content Recommendation API
  description: Personalized content recommendations using collaborative filtering and viewing history analysis. Supports
    editorial overrides, trending content promotion, and contextual recommendations based on time, device, and mood.
  version: 1.5.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-media-recommendations
  x-acme-domain: media
servers:
  - url: https://at-media-recommendations.api.acmetelecom.com/v1
    description: Production
  - url: https://at-media-recommendations.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Recommendations
    description: Content recommendation retrieval
paths:
  /recommendations/{subscriber_id}:
    get:
      operationId: getRecommendationsById
      summary: Get recommendations
      description: Get operation for recommendations resources.
      tags:
        - Recommendations
      parameters:
        - name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: recommendations identifier
                    example: recommendations-a1b2c3d4
  /recommendations/{subscriber_id}/trending:
    get:
      operationId: getTrendingById
      summary: Get trending
      description: Get operation for trending resources.
      tags:
        - Recommendations
      parameters:
        - name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: trending identifier
                    example: trending-a1b2c3d4
  /recommendations/{subscriber_id}/history:
    get:
      operationId: listWatchHistoryById
      summary: List watch history
      description: List operation for watch history resources.
      tags:
        - Recommendations
      parameters:
        - name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: watch_history identifier
                    example: watch_history-a1b2c3d4
  /editorial/overrides:
    get:
      operationId: listOverride
      summary: List override
      description: List operation for override resources.
      tags:
        - Recommendations
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: override identifier
                    example: override-a1b2c3d4
    post:
      operationId: createOverride
      summary: Create override
      description: Create operation for override resources.
      tags:
        - Recommendations
      requestBody:
        required: true
        description: Create override request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: override data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: override identifier
                    example: override-a1b2c3d4
  /editorial/overrides/{override_id}:
    get:
      operationId: getOverrideById
      summary: Get override
      description: Get operation for override resources.
      tags:
        - Recommendations
      parameters:
        - &a1
          name: override_id
          in: path
          required: true
          description: override id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: override identifier
                    example: override-a1b2c3d4
    put:
      operationId: updateOverrideById
      summary: Update override
      description: Update operation for override resources.
      tags:
        - Recommendations
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update override request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: override data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: override identifier
                    example: override-a1b2c3d4
    delete:
      operationId: deleteOverrideById
      summary: Delete override
      description: Delete operation for override resources.
      tags:
        - Recommendations
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: override identifier
                    example: override-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
