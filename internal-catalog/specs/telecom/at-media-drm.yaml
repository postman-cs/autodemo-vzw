openapi: 3.0.3
info:
  title: Digital Rights Management API
  description: Content encryption, license server management, and playback policy enforcement for premium content.
    Supports Widevine, FairPlay, and PlayReady DRM systems with offline license provisioning and concurrent stream
    limiting.
  version: 1.2.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-media-drm
  x-acme-domain: media
servers:
  - url: https://at-media-drm.api.acmetelecom.com/v1
    description: Production
  - url: https://at-media-drm.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Licenses
    description: DRM license management
  - name: Policies
    description: Playback policy configuration
paths:
  /licenses:
    get:
      operationId: listLicense
      summary: List license
      description: List operation for license resources.
      tags:
        - Licenses
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: license identifier
                    example: license-a1b2c3d4
    post:
      operationId: createLicense
      summary: Create license
      description: Create operation for license resources.
      tags:
        - Licenses
      requestBody:
        required: true
        description: Create license request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: license data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: license identifier
                    example: license-a1b2c3d4
  /licenses/{license_id}:
    get:
      operationId: getLicenseById
      summary: Get license
      description: Get operation for license resources.
      tags:
        - Licenses
      parameters:
        - name: license_id
          in: path
          required: true
          description: license id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: license identifier
                    example: license-a1b2c3d4
  /licenses/{license_id}/revoke:
    post:
      operationId: actionLicenseById
      summary: Action license
      description: Action operation for license resources.
      tags:
        - Licenses
      parameters:
        - name: license_id
          in: path
          required: true
          description: license id
          schema:
            type: string
      requestBody:
        required: true
        description: Action license request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: license data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: license identifier
                    example: license-a1b2c3d4
  /policies:
    get:
      operationId: listPolicy
      summary: List policy
      description: List operation for policy resources.
      tags:
        - Licenses
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: policy identifier
                    example: policy-a1b2c3d4
    post:
      operationId: createPolicy
      summary: Create policy
      description: Create operation for policy resources.
      tags:
        - Licenses
      requestBody:
        required: true
        description: Create policy request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: policy data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: policy identifier
                    example: policy-a1b2c3d4
  /policies/{policy_id}:
    get:
      operationId: getPolicyById
      summary: Get policy
      description: Get operation for policy resources.
      tags:
        - Licenses
      parameters:
        - &a1
          name: policy_id
          in: path
          required: true
          description: policy id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: policy identifier
                    example: policy-a1b2c3d4
    put:
      operationId: updatePolicyById
      summary: Update policy
      description: Update operation for policy resources.
      tags:
        - Licenses
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update policy request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: policy data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: policy identifier
                    example: policy-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
