openapi: 3.0.3
info:
  title: IoT Billing API
  description: Usage-based metering and billing for IoT connectivity across device fleets. Provides per-device and
    per-fleet billing with configurable rate plans, volume discounts, and automated invoice generation.
  version: 1.0.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-iot-billing
  x-acme-domain: iot
servers:
  - url: https://at-iot-billing.api.acmetelecom.com/v1
    description: Production
  - url: https://at-iot-billing.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Metering
    description: IoT usage metering
  - name: Rate Plans
    description: IoT billing rate plans
paths:
  /metering/{device_id}:
    get:
      operationId: getMeterById
      summary: Get meter
      description: Get operation for meter resources.
      tags:
        - Metering
      parameters:
        - name: device_id
          in: path
          required: true
          description: device id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: meter identifier
                    example: meter-a1b2c3d4
  /metering/fleet/{fleet_id}:
    get:
      operationId: getFleetMeterById
      summary: Get fleet meter
      description: Get operation for fleet meter resources.
      tags:
        - Metering
      parameters:
        - name: fleet_id
          in: path
          required: true
          description: fleet id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: fleet_meter identifier
                    example: fleet_meter-a1b2c3d4
  /rate-plans:
    get:
      operationId: listRatePlan
      summary: List rate plan
      description: List operation for rate plan resources.
      tags:
        - Metering
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rate_plan identifier
                    example: rate_plan-a1b2c3d4
    post:
      operationId: createRatePlan
      summary: Create rate plan
      description: Create operation for rate plan resources.
      tags:
        - Metering
      requestBody:
        required: true
        description: Create rate_plan request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: rate_plan data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rate_plan identifier
                    example: rate_plan-a1b2c3d4
  /rate-plans/{plan_id}:
    get:
      operationId: getRatePlanById
      summary: Get rate plan
      description: Get operation for rate plan resources.
      tags:
        - Metering
      parameters:
        - &a1
          name: plan_id
          in: path
          required: true
          description: plan id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rate_plan identifier
                    example: rate_plan-a1b2c3d4
    put:
      operationId: updateRatePlanById
      summary: Update rate plan
      description: Update operation for rate plan resources.
      tags:
        - Metering
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update rate_plan request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: rate_plan data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: rate_plan identifier
                    example: rate_plan-a1b2c3d4
  /invoices:
    get:
      operationId: listInvoice
      summary: List invoice
      description: List operation for invoice resources.
      tags:
        - Metering
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: invoice identifier
                    example: invoice-a1b2c3d4
  /invoices/{invoice_id}:
    get:
      operationId: getInvoiceById
      summary: Get invoice
      description: Get operation for invoice resources.
      tags:
        - Metering
      parameters:
        - name: invoice_id
          in: path
          required: true
          description: invoice id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: invoice identifier
                    example: invoice-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
