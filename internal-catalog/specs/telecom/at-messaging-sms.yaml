openapi: 3.0.3
info:
  title: SMS Gateway API
  description: A2P and P2P SMS sending, receiving, and delivery confirmation with high-throughput message processing.
    Supports concatenated messages, sender ID management, opt-out handling, and regulatory compliance across multiple
    countries.
  version: 3.1.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-messaging-sms
  x-acme-domain: messaging
servers:
  - url: https://at-messaging-sms.api.acmetelecom.com/v1
    description: Production
  - url: https://at-messaging-sms.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Messages
    description: SMS message sending and receiving
  - name: Sender IDs
    description: Sender ID registration and management
paths:
  /messages:
    get:
      operationId: listMessage
      summary: List message
      description: List operation for message resources.
      tags:
        - Messages
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: message identifier
                    example: message-a1b2c3d4
    post:
      operationId: createMessage
      summary: Create message
      description: Create operation for message resources.
      tags:
        - Messages
      requestBody:
        required: true
        description: Create message request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: message data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: message identifier
                    example: message-a1b2c3d4
  /messages/{message_id}:
    get:
      operationId: getMessageById
      summary: Get message
      description: Get operation for message resources.
      tags:
        - Messages
      parameters:
        - name: message_id
          in: path
          required: true
          description: message id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: message identifier
                    example: message-a1b2c3d4
  /messages/{message_id}/status:
    get:
      operationId: getStatusById
      summary: Get status
      description: Get operation for status resources.
      tags:
        - Messages
      parameters:
        - name: message_id
          in: path
          required: true
          description: message id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: status identifier
                    example: status-a1b2c3d4
  /sender-ids:
    get:
      operationId: listSenderId
      summary: List sender id
      description: List operation for sender id resources.
      tags:
        - Messages
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: sender_id identifier
                    example: sender_id-a1b2c3d4
    post:
      operationId: createSenderId
      summary: Create sender id
      description: Create operation for sender id resources.
      tags:
        - Messages
      requestBody:
        required: true
        description: Create sender_id request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: sender_id data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: sender_id identifier
                    example: sender_id-a1b2c3d4
  /sender-ids/{sender_id}:
    get:
      operationId: getSenderIdById
      summary: Get sender id
      description: Get operation for sender id resources.
      tags:
        - Messages
      parameters:
        - &a1
          name: sender_id
          in: path
          required: true
          description: sender id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: sender_id identifier
                    example: sender_id-a1b2c3d4
    put:
      operationId: updateSenderIdById
      summary: Update sender id
      description: Update operation for sender id resources.
      tags:
        - Messages
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update sender_id request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: sender_id data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: sender_id identifier
                    example: sender_id-a1b2c3d4
    delete:
      operationId: deleteSenderIdById
      summary: Delete sender id
      description: Delete operation for sender id resources.
      tags:
        - Messages
      parameters:
        - *a1
      responses:
        "200":
          description: Resource deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: sender_id identifier
                    example: sender_id-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
