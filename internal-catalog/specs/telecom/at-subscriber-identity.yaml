openapi: 3.0.3
info:
  title: Subscriber Identity API
  description: KYC verification, identity document validation, and regulatory compliance for subscriber onboarding.
    Supports eKYC workflows, biometric verification, and document authenticity checks with anti-fraud scoring.
  version: 1.5.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-subscriber-identity
  x-acme-domain: subscriber
servers:
  - url: https://at-subscriber-identity.api.acmetelecom.com/v1
    description: Production
  - url: https://at-subscriber-identity.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Verifications
    description: Identity verification management
  - name: Documents
    description: Identity document handling
paths:
  /verifications:
    get:
      operationId: listVerification
      summary: List verification
      description: List operation for verification resources.
      tags:
        - Verifications
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: verification identifier
                    example: verification-a1b2c3d4
    post:
      operationId: createVerification
      summary: Create verification
      description: Create operation for verification resources.
      tags:
        - Verifications
      requestBody:
        required: true
        description: Create verification request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: verification data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: verification identifier
                    example: verification-a1b2c3d4
  /verifications/{verification_id}:
    get:
      operationId: getVerificationById
      summary: Get verification
      description: Get operation for verification resources.
      tags:
        - Verifications
      parameters:
        - name: verification_id
          in: path
          required: true
          description: verification id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: verification identifier
                    example: verification-a1b2c3d4
  /verifications/{verification_id}/documents:
    get:
      operationId: listDocumentById
      summary: List document
      description: List operation for document resources.
      tags:
        - Verifications
      parameters:
        - &a1
          name: verification_id
          in: path
          required: true
          description: verification id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: document identifier
                    example: document-a1b2c3d4
    post:
      operationId: createDocumentById
      summary: Create document
      description: Create operation for document resources.
      tags:
        - Verifications
      parameters:
        - *a1
      requestBody:
        required: true
        description: Create document request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: document data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: document identifier
                    example: document-a1b2c3d4
  /verifications/{verification_id}/complete:
    post:
      operationId: actionVerificationById
      summary: Action verification
      description: Action operation for verification resources.
      tags:
        - Verifications
      parameters:
        - name: verification_id
          in: path
          required: true
          description: verification id
          schema:
            type: string
      requestBody:
        required: true
        description: Action verification request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: verification data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: verification identifier
                    example: verification-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
