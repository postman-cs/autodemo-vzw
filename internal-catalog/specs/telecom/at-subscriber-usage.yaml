openapi: 3.0.3
info:
  title: Usage Tracking API
  description: Real-time voice, data, and SMS usage tracking with quota management and overage prevention. Provides usage
    alerts, threshold notifications, and historical usage pattern analysis for plan optimization recommendations.
  version: 2.6.0
  contact:
    name: Acme Telecom API Team
    email: api-support@acmetelecom.com
    url: https://developer.acmetelecom.com
  license:
    name: Proprietary
    url: https://acmetelecom.com/terms
  x-acme-catalog-id: at-subscriber-usage
  x-acme-domain: subscriber
servers:
  - url: https://at-subscriber-usage.api.acmetelecom.com/v1
    description: Production
  - url: https://at-subscriber-usage.staging.acmetelecom.com/v1
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: Usage
    description: Real-time usage tracking
  - name: Quotas
    description: Usage quota management
paths:
  /subscribers/{subscriber_id}/usage:
    get:
      operationId: getUsageSummaryById
      summary: Get usage summary
      description: Get operation for usage summary resources.
      tags:
        - Usage
      parameters:
        - name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: usage_summary identifier
                    example: usage_summary-a1b2c3d4
  /subscribers/{subscriber_id}/usage/voice:
    get:
      operationId: listVoiceRecordById
      summary: List voice record
      description: List operation for voice record resources.
      tags:
        - Usage
      parameters:
        - name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: voice_record identifier
                    example: voice_record-a1b2c3d4
  /subscribers/{subscriber_id}/usage/data:
    get:
      operationId: listDataRecordById
      summary: List data record
      description: List operation for data record resources.
      tags:
        - Usage
      parameters:
        - name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: data_record identifier
                    example: data_record-a1b2c3d4
  /subscribers/{subscriber_id}/usage/sms:
    get:
      operationId: listSmsRecordById
      summary: List sms record
      description: List operation for sms record resources.
      tags:
        - Usage
      parameters:
        - name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: sms_record identifier
                    example: sms_record-a1b2c3d4
  /subscribers/{subscriber_id}/quotas:
    get:
      operationId: getQuotaById
      summary: Get quota
      description: Get operation for quota resources.
      tags:
        - Usage
      parameters:
        - &a1
          name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: quota identifier
                    example: quota-a1b2c3d4
    put:
      operationId: updateQuotaById
      summary: Update quota
      description: Update operation for quota resources.
      tags:
        - Usage
      parameters:
        - *a1
      requestBody:
        required: true
        description: Update quota request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: quota data
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: quota identifier
                    example: quota-a1b2c3d4
  /subscribers/{subscriber_id}/alerts:
    get:
      operationId: listAlertById
      summary: List alert
      description: List operation for alert resources.
      tags:
        - Usage
      parameters:
        - &a2
          name: subscriber_id
          in: path
          required: true
          description: subscriber id
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: per_page
          in: query
          required: false
          description: Number of results per page (max 100)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          required: false
          description: Field to sort results by
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: alert identifier
                    example: alert-a1b2c3d4
    post:
      operationId: createAlertById
      summary: Create alert
      description: Create operation for alert resources.
      tags:
        - Usage
      parameters:
        - *a2
      requestBody:
        required: true
        description: Create alert request payload
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: alert data
      responses:
        "201":
          description: Resource created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: alert identifier
                    example: alert-a1b2c3d4
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acmetelecom.com/authorize
          tokenUrl: https://auth.acmetelecom.com/token
          scopes:
            telecom:read: Read telecom data
            telecom:write: Write telecom data
            telecom:admin: Administer telecom resources
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
      required:
        - code
        - message
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
