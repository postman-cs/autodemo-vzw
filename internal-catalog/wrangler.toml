name = "vzw-internal-catalog"
account_id = "c99ca0b9ebff4418013b938ff6262abc"
main = "src/index.ts"
compatibility_date = "2026-02-09"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public/client"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/auth/logout"]

# KV namespaces — uncomment once created
# [[kv_namespaces]]
# binding = "PORTAL_CONFIG"
# id = "your_kv_namespace_id_here"
#
# [[kv_namespaces]]
# binding = "SERVICE_REGISTRY"
# id = "your_kv_namespace_id_here"

[[kv_namespaces]]
binding = "WORKER_LOGS"
id = "cf341bcb44da429fbb6660d7a5d4baf7"

[[kv_namespaces]]
binding = "TEAM_REGISTRY"
id = "10f568e7db2842689f5dcb691bd0d703"

[[workflows]]
name = "provision-graph"
binding = "PROVISION_GRAPH_WORKFLOW"
class_name = "ProvisionGraphWorkflow"

[[routes]]
pattern = "vzw.pm-demo.dev"
custom_domain = true

[vars]
GITHUB_TARGET_ORG = "postman-cs"
AUTH_ENABLED = "true"
LOCAL_DEV_AUTH_MODE = "strict"
CF_ACCESS_TEAM_DOMAIN = "jaredboynton"
CF_ACCESS_AUD = "d83f1067e48a252dac159775692dc851631e63bd67395a35530b793d77cedfa4"
WORKER_ORIGIN = "https://vzw.pm-demo.dev"
CF_ACCESS_CLIENT_ID = "4b79c30fec111a0fc680932790bd9322.access"
CF_ACCOUNT_ID = "c99ca0b9ebff4418013b938ff6262abc"
AWS_REGION = "eu-central-1"

[triggers]
crons = [
  "17 * * * *",   # Hourly: env->SM bootstrap + SM->KV cache reconcile
  "47 3 * * *",   # Daily: full credential health refresh for all teams
]

# Worker secrets (set via CF API, not committed):
# Bootstrap credentials (required to fetch SM secret bundle at cold start):
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION
#
# All other secrets (POSTMAN_API_KEY, POSTMAN_ACCESS_TOKEN, GH_TOKEN,
# AIRTABLE_API_KEY, AIRTABLE_BASE_ID, CF_API_KEY, CF_EMAIL, etc.) are
# fetched from AWS Secrets Manager at /vzw-partner-demo/worker-env on cold start.
# See src/lib/worker-secret-bundle.ts and src/lib/worker-config-cache.ts.

# Tenant secret sync (set via CF API, not committed):
# TENANT_SECRETS_SYNC_ENABLED, TENANT_SECRETS_AWS_ACCESS_KEY_ID,
# TENANT_SECRETS_AWS_SECRET_ACCESS_KEY, TENANT_SECRETS_AWS_REGION,
# TENANT_SECRETS_PREFIX

[limits]
cpu_ms = 300_000

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
