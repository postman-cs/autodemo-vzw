name: Deploy Cloudflare Workers

on:
  push:
    branches:
      - main
    paths:
      - 'internal-catalog/**'
      - 'partner-portal/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CLOUDFLARE_ACCOUNT_ID: "c99ca0b9ebff4418013b938ff6262abc"
  WRANGLER_VERSION: "4"

jobs:
  deploy_internal_catalog:
    name: Build and deploy internal-catalog
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: internal-catalog
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: internal-catalog/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

      - name: Deploy worker
        run: npx wrangler@${{ env.WRANGLER_VERSION }} deploy --config wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy_partner_portal:
    name: Build and deploy partner-portal
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: partner-portal
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: partner-portal/package-lock.json
      - name: Install dependencies
        run: npm ci

      - name: Deploy worker
        run: npx wrangler@${{ env.WRANGLER_VERSION }} deploy --config wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
