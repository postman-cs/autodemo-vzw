openapi: 3.0.3

info:
  title: "HERE Location Services - Demo"
  description: "HERE Routing v8 and Geocoding APIs for the Metro City Dispatch partner demo."
  version: "1.0.0"

servers:
  - url: "{{here_base}}"
    description: "HERE Mock Server"

security:
  - apiKey: []

tags:
  - name: Routing
  - name: Geocoding

paths:
  /v8/routes:
    get:
      tags:
        - Routing
      summary: "Calculate a route between two points"
      description: "Returns the fastest or shortest route between an origin and destination for the specified transport mode."
      operationId: "getRoute"
      parameters:
        - name: origin
          in: query
          required: true
          schema:
            type: string
          example: "37.7749,-122.4194"
          description: "Origin coordinates as lat,lng"
        - name: destination
          in: query
          required: true
          schema:
            type: string
          example: "37.7554,-122.4057"
          description: "Destination coordinates as lat,lng"
        - name: transportMode
          in: query
          required: true
          schema:
            type: string
            enum:
              - car
              - truck
              - pedestrian
              - bicycle
          example: "car"
          description: "Mode of transportation"
        - name: routingMode
          in: query
          required: false
          schema:
            type: string
            enum:
              - fast
              - short
          example: "fast"
          description: "Routing strategy"
        - name: return
          in: query
          required: false
          schema:
            type: string
          example: "polyline,summary"
          description: "Fields to include in response"
        - name: departureTime
          in: query
          required: false
          schema:
            type: string
            format: date-time
          example: "2026-03-26T18:30:00Z"
          description: "Planned departure time"
      responses:
        "200":
          description: "Successful response with route information"
          content:
            application/json:
              schema:
                type: object
                properties:
                  routes:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          example: "route-1"
                        sections:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                                example: "section-1"
                              type:
                                type: string
                                example: "vehicle"
                              departure:
                                type: object
                                properties:
                                  place:
                                    type: object
                                    properties:
                                      location:
                                        type: object
                                        properties:
                                          lat:
                                            type: number
                                            example: 37.7749
                                          lng:
                                            type: number
                                            example: -122.4194
                              arrival:
                                type: object
                                properties:
                                  place:
                                    type: object
                                    properties:
                                      location:
                                        type: object
                                        properties:
                                          lat:
                                            type: number
                                            example: 37.7554
                                          lng:
                                            type: number
                                            example: -122.4057
                              summary:
                                type: object
                                properties:
                                  duration:
                                    type: integer
                                    description: "Duration in seconds"
                                    example: 420
                                  length:
                                    type: integer
                                    description: "Length in meters"
                                    example: 6100
                              polyline:
                                type: string
                                example: "BFoz5xJ67i1B1B7PzIhaxL7Y"
                              transport:
                                type: object
                                properties:
                                  mode:
                                    type: string
                                    example: "car"
              example:
                routes:
                  - id: "route-1"
                    sections:
                      - id: "section-1"
                        type: "vehicle"
                        departure:
                          place:
                            location:
                              lat: 37.7749
                              lng: -122.4194
                        arrival:
                          place:
                            location:
                              lat: 37.7554
                              lng: -122.4057
                        summary:
                          duration: 420
                          length: 6100
                        polyline: "BFoz5xJ67i1B1B7PzIhaxL7Y"
                        transport:
                          mode: "car"

  /geocode:
    get:
      tags:
        - Geocoding
      summary: "Search for geocoding results"
      description: "Search for addresses and places using the HERE Geocoding API."
      operationId: "searchGeocode"
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          example: "1001 Potrero Ave, San Francisco, CA 94110"
          description: "Search query string"
        - name: at
          in: query
          required: false
          schema:
            type: string
          example: "37.7749,-122.4194"
          description: "Search around these coordinates"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
          example: 1
          description: "Maximum number of results"
        - name: lang
          in: query
          required: false
          schema:
            type: string
          example: "en-US"
          description: "Response language code"
      responses:
        "200":
          description: "Successful geocoding response"
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        title:
                          type: string
                          example: "1001 Potrero Ave, San Francisco, CA 94110, United States"
                        id:
                          type: string
                          example: "here:pds:place:840ccf9d-a5c65d499a3d4e1f97391c66afe4c8f7"
                        resultType:
                          type: string
                          enum:
                            - houseNumber
                            - street
                            - locality
                          example: "houseNumber"
                        address:
                          type: object
                          properties:
                            label:
                              type: string
                              example: "1001 Potrero Ave, San Francisco, CA 94110, United States"
                            countryCode:
                              type: string
                              example: "USA"
                            state:
                              type: string
                              example: "California"
                            city:
                              type: string
                              example: "San Francisco"
                            street:
                              type: string
                              example: "Potrero Ave"
                            houseNumber:
                              type: string
                              example: "1001"
                            postalCode:
                              type: string
                              example: "94110"
                        position:
                          type: object
                          properties:
                            lat:
                              type: number
                              example: 37.7554
                            lng:
                              type: number
                              example: -122.4057
              example:
                items:
                  - title: "1001 Potrero Ave, San Francisco, CA 94110, United States"
                    id: "here:pds:place:840ccf9d-a5c65d499a3d4e1f97391c66afe4c8f7"
                    resultType: "houseNumber"
                    address:
                      label: "1001 Potrero Ave, San Francisco, CA 94110, United States"
                      countryCode: "USA"
                      state: "California"
                      city: "San Francisco"
                      street: "Potrero Ave"
                      houseNumber: "1001"
                      postalCode: "94110"
                    position:
                      lat: 37.7554
                      lng: -122.4057

components:
  securitySchemes:
    apiKey:
      type: apiKey
      name: apiKey
      in: query
